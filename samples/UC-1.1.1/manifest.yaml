uc_id: "1.1.1"
sourcetype: "cpu"
index: "os"
source: "/opt/splunkforwarder/bin/scripts/cpu.sh"
host: "linux-prod-01"
timerange: "-24h"
expected:
  min_count: 3
  fields:
    - name: host
      values: ["linux-prod-01"]
    - name: pctIdle
      max: 10
origin: "vendor-doc"
origin_ref: "https://docs.splunk.com/Documentation/AddOns/released/UnixLinux/Sourcetypes"
last_reviewed: "2026-04-16"
reviewer: "@splunk-monitoring-use-cases"
notes: |
  The cpu sourcetype is emitted by bin/cpu.sh in Splunk_TA_nix. It produces
  per-second samples containing pctUser, pctSystem, pctIowait and pctIdle.
  These three positive events simulate a host pinned above 90% utilization
  (pctIdle < 10), which is what UC-1.1.1 alerts on.

name: "FP Triage: CPU Utilization Trending (Linux)"
uc_id: "UC-1.1.1"
uc_url: "https://fenre.github.io/splunk-monitoring-use-cases/uc/UC-1.1.1/"
description: |
  Detects Linux hosts whose CPU has been pinned above 90% on average for an hour, indicating sustained overload that will cause request queuing and SLA breaches before users notice.

  Business value: Sustained CPU saturation almost always surfaces as user-visible latency, queued connections, or batch overruns. Catching it on the host first means you rebalance, scale, or kill a runaway process before it becomes an incident — and the trend line tells you whether to add capacity now or schedule a hardware refresh next quarter.
human_acknowledgement_required: true
escalation_contact_placeholder: "{customer-on-call}"
pre_conditions: |
  Human-in-the-loop required for OT/safety-critical actions. Confirm alert is not a known maintenance window or approved test activity.
do_not_section: |
  No OT/safety-specific prohibitions apply to this use case. Follow standard change-management for any containment action.
spl_reference: "index=os sourcetype=cpu host=* CPU=\"all\"\n| eval cpu_used = 100 - pctIdle\n| timechart span=1h avg(cpu_used) as avg_cpu by host\n| where avg_cpu > 90"

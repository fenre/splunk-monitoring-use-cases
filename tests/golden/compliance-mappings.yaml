# Golden compliance mapping test set
#
# Locked at Phase 1.5b (docs/coverage-methodology.md v1.0.0).
#
# Each entry below is a ground-truth assertion that must be satisfied by the
# live UC catalogue (the cat-22 JSON sidecars under use-cases/cat-22/).
#
# Semantics (matched by scripts/audit_compliance_mappings.py):
#   uc:                 the UC ID (matches the `id` field in a JSON sidecar).
#   regulation:         the `regulation` field of one of that UC's compliance[] entries.
#   version:            the `version` field (must match a version in data/regulations.json).
#   clause:             the `clause` field; must obey the regulation-version's clauseGrammar.
#   mode:               one of satisfies | detects-violation-of.
#   min_assurance:      the lowest assurance level the entry is allowed to claim, from
#                       {contributing < partial < full}.
#   note:               free-form human-readable rationale; not enforced by the audit script.
#
# Rules:
#   - If a (uc, regulation, version, clause, mode) tuple is missing in the UC,
#     the audit script fails.
#   - If the tuple exists but assurance is below min_assurance, the audit
#     script fails.
#   - New golden entries can be appended; nothing here should be deleted
#     except in a CHANGELOG.md-documented methodology change.
#
# Selection principles for the initial 50:
#   * 8 regulations chosen to exercise 8 different clauseGrammar regexes.
#   * At least 4 entries per tier-1 regulation, biased toward clauses with
#     priorityWeight == 1.0 in data/regulations.json.
#   * Each entry references a UC that currently exists on disk; an
#     add-only test suite, never a moving target.

version: "1.0.0"

   * catalogue's markup so toggle feels identical across pages.
   * Default is light unless the user has explicitly saved 'dark'.)
   * ============================================================ */
  var THEME_KEY = 'cisco-ui-theme';
  var root = document.documentElement;
  var themeBtn = document.getElementById('theme-btn');
  var themeLabel = document.getElementById('theme-label');
  var themeIco = document.getElementById('theme-ico');
  function applyThemeUI() {
    var isDark = root.classList.contains('dark');
    if (themeLabel) themeLabel.textContent = isDark ? 'Light' : 'Dark';
    if (themeIco) themeIco.textContent = isDark ? '\u2600' : '\u263E';
  }
  applyThemeUI();
  if (themeBtn) {
    themeBtn.addEventListener('click', function () {
      root.classList.toggle('dark');
      var isDark = root.classList.contains('dark');
      try { localStorage.setItem(THEME_KEY, isDark ? 'dark' : 'light'); } catch (_) { /* ignore */ }
      applyThemeUI();
    });
  }

  /* ============================================================
   * AUDIENCE TOGGLE (Buyer / Auditor / Implementer)
   * Single page, three views; each section in renderDetail() declares
   * which views it appears in via data-cs-show="buyer auditor impl".
   * Order of precedence: ?view=  →  localStorage  →  default 'buyer'.
   * ============================================================ */
  var VIEW_KEY = 'cs-audience-view';
  var VALID_VIEWS = ['buyer', 'auditor', 'impl'];
  function getDefaultView() {
    var v = getParam('view');
    if (v && VALID_VIEWS.indexOf(v) !== -1) return v;
    try {
      var saved = localStorage.getItem(VIEW_KEY);
      if (saved && VALID_VIEWS.indexOf(saved) !== -1) return saved;
    } catch (_) { /* ignore */ }
    return 'buyer';
  }
  function applyView(view, opts) {
    if (VALID_VIEWS.indexOf(view) === -1) view = 'buyer';
    if (document.body && document.body.setAttribute) {
      document.body.setAttribute('data-cs-view', view);
    }
    var pillbar = document.getElementById('cs-view-pillbar');
    if (pillbar && pillbar.querySelectorAll) {
      pillbar.querySelectorAll('button[data-view]').forEach(function (btn) {
        btn.setAttribute('aria-pressed', btn.getAttribute('data-view') === view ? 'true' : 'false');
      });
    }
    if (document.querySelectorAll) {
      document.querySelectorAll('.cs-view-mobile-bar button[data-view]').forEach(function (btn) {
        btn.setAttribute('aria-pressed', btn.getAttribute('data-view') === view ? 'true' : 'false');
      });
    }
    try { localStorage.setItem(VIEW_KEY, view); } catch (_) { /* ignore */ }
    if (!opts || opts.updateUrl !== false) {
      try {
        var url = new URL(location.href);
        url.searchParams.set('view', view);
        history.replaceState(null, '', url.toString());
      } catch (_) { /* sandboxed test environments may not have URL/history */ }
    }
  }
  function showAudienceToggle(visible) {
    var pillbar = document.getElementById('cs-view-pillbar');
    if (!pillbar) return;
    if (visible) pillbar.removeAttribute('hidden');
    else pillbar.setAttribute('hidden', 'hidden');
  }
  function wireAudienceToggle() {
    var pillbar = document.getElementById('cs-view-pillbar');
    if (!pillbar || !pillbar.addEventListener) return;
    pillbar.addEventListener('click', function (e) {
      var btn = e.target && e.target.closest && e.target.closest('button[data-view]');
      if (!btn) return;
      applyView(btn.getAttribute('data-view'));
    });
  }

  /* ---------- helpers ---------- */
  function escapeHtml(s) {
    return String(s == null ? "" : s)
      .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;").replace(/'/g, "&#39;");
  }
  function escapeAttr(s) { return escapeHtml(s); }
  function pct(x) {
    if (x == null || isNaN(x)) return "\u2014";
    return (Math.round(Number(x) * 10) / 10).toFixed(1) + "%";
  }
  function getParam(name) {
    var m = location.search.match(new RegExp("[?&]" + name + "=([^&]+)"));
    if (!m) return null;
    try { return decodeURIComponent(m[1]); } catch (_) { return m[1]; }
  }
  /* Format an ISO timestamp as 'Mon DD, YYYY' plus a relative
   * "(N days ago)" suffix — used by the trust ribbon. */
  function formatGenerated(iso) {
    if (!iso) return "";
    var d = new Date(iso);
    if (isNaN(d.getTime())) return iso;
    var months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    var pretty = months[d.getMonth()] + " " + d.getDate() + ", " + d.getFullYear();
    var diff = Math.floor((Date.now() - d.getTime()) / 1000);
    var rel;
    if      (diff < 60)        rel = "just now";
    else if (diff < 3600)      rel = Math.floor(diff/60) + " min ago";
    else if (diff < 86400)     rel = Math.floor(diff/3600) + " h ago";
    else if (diff < 86400*7)   rel = Math.floor(diff/86400) + " d ago";
    else if (diff < 86400*30)  rel = Math.floor(diff/86400/7) + " w ago";
    else if (diff < 86400*365) rel = Math.floor(diff/86400/30) + " mo ago";
    else                       rel = Math.floor(diff/86400/365) + " y ago";
    return pretty + " (" + rel + ")";
  }
  /* The story generator emits a stock 'Clause … carries a regulator-
   * assigned priority weight of N, and the catalogue covers it at
   * assurance=…' line for every highlight. That sentence is mechanical
   * and adds no buyer/SE value; detect it so we can substitute a
   * better sentence when richer data is available. */
  function isBoilerplateWhy(s) {
    if (!s) return true;
    return /carries a regulator-assigned priority weight/i.test(s)
        && /assurance=/.test(s);
  }
  /* Plain-language explainer for each assurance level — wired into the
   * inline tooltips on the legend so buyers/auditors don't need to
   * leave the page to understand the colour coding. */
  var ASSURANCE_TIPS = {
    full: "Full assurance — at least one mapped use case directly satisfies the clause as written. The auditor can sample the saved-search output as primary evidence.",
    partial: "Partial assurance — the clause is satisfied in part (e.g. one of multiple sub-requirements, or weaker control strength). Pair with another UC for full evidence.",
    contributing: "Contributing — supporting / parallel telemetry that informs the clause but is not the primary evidence on its own. Useful for triangulation.",
    uncovered: "Uncovered — no use case in the catalogue currently maps to this clause. Tracked in docs/compliance-gaps.md until a UC is authored."
  };
  function setTitle(t) {
    document.title = t + " — Compliance story — Splunk monitoring use cases";
  }
  function showError(html) {
    document.getElementById("cs-content").innerHTML =
      '<div class="cs-error">' + html + "</div>";
  }

  /* ---------- routing: with/without ?reg= ---------- */
  document.addEventListener("DOMContentLoaded", function () {
    wireAudienceToggle();
    var regId = getParam("reg");
    if (regId) {
      // Apply audience BEFORE the fetch so the initial paint matches
      // the saved preference (no flash of buyer content).
      applyView(getDefaultView(), { updateUrl: false });
      showAudienceToggle(true);
      loadDetail(regId);
    } else {
      // Landing view: toggle is meaningless (no detail to filter).
      if (document.body && document.body.setAttribute) {
        document.body.setAttribute('data-cs-view', 'buyer');
      }
      showAudienceToggle(false);
      loadLanding();
    }
  });

  /* =========================================================
   * Landing view (no ?reg=)
   * ========================================================= */
  function loadLanding() {
    fetch("api/v1/compliance/story/index.json", {
      credentials: "same-origin",
      headers: { Accept: "application/json" },
    })
      .then(function (r) {
        if (!r.ok) throw new Error("HTTP " + r.status);
        return r.json();
      })
      .then(renderLanding)
      .catch(function (err) {
        console.error("[compliance-story] landing load failed:", err);
        showError(
          "<strong>Could not load compliance story index.</strong>" +
          escapeHtml(String(err && err.message ? err.message : err))
        );
      });
  }

  function renderLanding(payload) {
    var regs = Array.isArray(payload.regulations) ? payload.regulations.slice() : [];

    /* Tier asc, then regulation short-name asc. */
    regs.sort(function (a, b) {
      var ta = a.tier || 99, tb = b.tier || 99;
      if (ta !== tb) return ta - tb;
      return String(a.regulationShortName || "").localeCompare(
        String(b.regulationShortName || ""), undefined, { sensitivity: "base" }
      );
    });

    setTitle("Every regulation we tell a story about");
    var subEl = document.getElementById("cs-brand-sub");
    if (subEl) subEl.textContent = "Community Reference";

    /* Read filters from the URL so a link with ?q=…&tier=…&cov=…
     * restores the same filtered view. */
    var initialQ    = getParam("q") || "";
    var initialTier = getParam("tier") || "all";
    var initialCov  = getParam("cov") || "all";

    var html = "";
    html += '<section class="cs-landing-intro">';
    html += "<h2>Every regulation we tell a story about</h2>";
    html += "<p>One card per regulation. Each card opens a buyer-first narrative &mdash; " +
      "what the law is, who it affects, how Splunk helps, what we cover today, and the gaps " +
      "we already know about. Tier 1 = primary frameworks with full evidence packs; Tier 2 / 3 = secondary and supplementary.</p>";
    html += "</section>";

    html += '<section class="cs-filter-row">';
    html += '<div style="flex:1;min-width:260px"><label for="cs-filter-search">Filter</label>' +
      '<input type="search" id="cs-filter-search" placeholder="Regulation name, short name, or coverage headline\u2026" autocomplete="off" value="' + escapeAttr(initialQ) + '"></div>';
    html += '<div><label for="cs-filter-tier">Tier</label>' +
      '<select id="cs-filter-tier" style="min-width:160px">' +
        '<option value="all">All tiers</option>' +
        '<option value="1">Tier 1 &mdash; primary</option>' +
        '<option value="2">Tier 2 &mdash; secondary</option>' +
        '<option value="3">Tier 3 &mdash; supplementary</option>' +
      "</select></div>";
    html += '<div><label for="cs-filter-cov">Coverage</label>' +
      '<select id="cs-filter-cov" style="min-width:200px">' +
        '<option value="all">All coverage</option>' +
        '<option value="strong">Strong (\u2265 75%)</option>' +
        '<option value="mid">Mid (40 \u2013 75%)</option>' +
        '<option value="early">Early (1 \u2013 40%)</option>' +
        '<option value="none">Mapping only</option>' +
      '</select></div>';
    html += '<div style="margin-left:auto"><span id="cs-card-count" class="cs-card-short" style="font-size:11px"></span></div>';
    html += "</section>";

    html += '<section class="cs-cards" id="cs-cards-root">';
    html += regs.map(renderCard).join("");
    html += "</section>";

    /* No-results placeholder (hidden until filters return zero) */
    html += '<div id="cs-cards-empty" class="cs-empty-info" style="margin-top:14px" hidden>' +
      '<strong>No regulations match the current filters.</strong>' +
      'Clear the filters or pick a different tier / coverage band.</div>';

    document.getElementById("cs-content").innerHTML = html;

    /* Restore + wire filters */
    var search   = document.getElementById("cs-filter-search");
    var tier     = document.getElementById("cs-filter-tier");
    var cov      = document.getElementById("cs-filter-cov");
    var countEl  = document.getElementById("cs-card-count");
    var emptyEl  = document.getElementById("cs-cards-empty");
    tier.value = initialTier;
    cov.value  = initialCov;

    function applyFilters() {
      var q = (search.value || "").trim().toLowerCase();
      var t = tier.value;
      var c = cov.value;
      var visible = 0;
      var cards = document.querySelectorAll("#cs-cards-root .cs-card");
      cards.forEach(function (card) {
        var blob = (card.getAttribute("data-blob") || "").toLowerCase();
        var cTier = card.getAttribute("data-tier");
        var cBand = card.getAttribute("data-cov-band");
        var show = (!q || blob.indexOf(q) !== -1)
                && (t === "all" || cTier === t)
                && (c === "all" || cBand === c);
        card.style.display = show ? "" : "none";
        if (show) visible++;
      });
      if (countEl) countEl.textContent = visible + " of " + cards.length + " regulations";
      if (emptyEl) emptyEl.hidden = visible !== 0;
      /* Reflect the filter state in the URL so deep-links round-trip.
       * Wrapped in a try/catch so sandboxed test environments without
       * URL/history don't break the filter pipeline. */
      try {
        var url = new URL(location.href);
        function setOrDel(k, v, def) {
          if (!v || v === def) url.searchParams.delete(k);
          else url.searchParams.set(k, v);
        }
        setOrDel("q",    q,        "");
        setOrDel("tier", t,        "all");
        setOrDel("cov",  c,        "all");
        history.replaceState(null, "", url.toString());
      } catch (_) { /* ignore in sandboxed environments */ }
    }
    search.addEventListener("input", applyFilters);
    tier.addEventListener("change", applyFilters);
    cov.addEventListener("change", applyFilters);
    applyFilters();
  }

  /* Coverage-strength bands used for the index filter. The bands are
   * deliberately coarse — they're a first-glance signal, not a
   * scorecard replacement. */
  function covBand(pctVal) {
    if (pctVal == null || isNaN(pctVal) || pctVal <= 0) return "none";
    if (pctVal >= 75) return "strong";
    if (pctVal >= 40) return "mid";
    return "early";
  }

  function renderCard(r) {
    var tier = r.tier || 3;
    var headline = r.coverageHeadline || "";
    var pctVal = Number(r.priorityWeightedCoveragePercent) || 0;
    var pctText = (r.priorityWeightedCoveragePercent == null) ? "\u2014" : pct(r.priorityWeightedCoveragePercent);
    var band = covBand(r.priorityWeightedCoveragePercent);
    var covClass = band === "strong" ? "cov-full"
                 : band === "mid"    ? "cov-partial"
                 : band === "early"  ? "cov-contributing"
                 : "cov-uncovered";
    var covLabel = band === "none" ? "Mapping only" : (pctText + " priority-weighted");

    var coveredClauses = (r.coveredClauseCount != null ? r.coveredClauseCount : 0);
    var totalClauses   = (r.commonClauseCount   != null ? r.commonClauseCount  : 0);
    var anyPct = totalClauses > 0 ? Math.round((coveredClauses / totalClauses) * 100) : 0;

    var blob = [r.regulationId || "", r.regulationShortName || "", headline].join(" ");
    var href = "compliance-story.html?reg=" + encodeURIComponent(r.regulationId || "");

    /* Customer-readable headline: when band is 'none' emphasise that
     * it's an early-stage mapping rather than a quality signal. */
    var headlineHtml;
    if (band === "none") {
      headlineHtml = '<em>Early-stage mapping.</em> ' + escapeHtml(headline ||
        "Clauses are mapped but no priority-weighted evidence has landed yet \u2014 follow the gap log to track authoring.");
    } else {
      headlineHtml = escapeHtml(headline);
    }

    return (
      '<a class="cs-card" href="' + escapeAttr(href) +
        '" data-blob="' + escapeAttr(blob) +
        '" data-tier="' + escapeAttr(String(tier)) +
        '" data-cov-band="' + escapeAttr(band) + '">' +
        '<div class="cs-card-head">' +
          '<div class="cs-card-name">' + escapeHtml(r.regulationShortName || r.regulationId || "") + '</div>' +
          '<span class="cs-pill tier-' + tier + '">Tier ' + tier + '</span>' +
        "</div>" +
        '<div class="cs-card-short">' + escapeHtml(r.regulationId || "") + "</div>" +
        '<div class="cs-card-headline">' + headlineHtml + "</div>" +
        '<div class="cs-card-meta">' +
          '<span class="cs-pill ' + covClass + '" title="Priority-weighted coverage band">' + escapeHtml(covLabel) + "</span>" +
          "<span><strong>" + coveredClauses +
          "</strong> of <strong>" + totalClauses +
          "</strong> clauses (" + anyPct + "% mapped)</span>" +
          (r.evidencePackPresent ? '<span title="Evidence pack available">\u2713 evidence pack</span>' : '') +
        "</div>" +
      "</a>"
    );
  }

  /* =========================================================
   * Detail view (?reg=<id>)
   * ========================================================= */
  function loadDetail(regId) {
    var safe = regId.replace(/[^a-zA-Z0-9_-]/g, "");
    if (!safe || safe !== regId) {
      showError(
        "<strong>Invalid regulation id.</strong>" +
        "Regulation ids must match [a-zA-Z0-9_-]. Received: <code>" +
        escapeHtml(regId) + "</code>"
      );
      return;
    }
    fetch("api/v1/compliance/story/" + safe + ".json", {
      credentials: "same-origin",
      headers: { Accept: "application/json" },
    })
      .then(function (r) {
        if (r.status === 404) throw new Error("No story payload for " + safe + " — check /api/v1/compliance/story/ for supported ids.");
        if (!r.ok) throw new Error("HTTP " + r.status);
        return r.json();
      })
      .then(function (data) { renderDetail(data); })
      .catch(function (err) {
        console.error("[compliance-story] detail load failed:", err);
        showError(
          "<strong>Could not load compliance story.</strong>" +
          escapeHtml(String(err && err.message ? err.message : err)) +
          '<br><br><a href="compliance-story.html">&larr; Back to all regulations</a>'
        );
      });
  }

  function renderDetail(data) {
    var title = data.regulationShortName || data.regulationName || data.regulationId || "Regulation";
    setTitle(title);
    var subEl = document.getElementById("cs-brand-sub");
    if (subEl) subEl.textContent = "Compliance story \u00b7 " + title;

    var narrative = data.narrative || {};
    var buyer = data.buyer || {};
    var summary = buyer.summary || {};
    var stateCounts = summary.stateCounts || {};
    var topFive = Array.isArray(buyer.topFiveHighlights) ? buyer.topFiveHighlights : [];
    var topGapsRaw = Array.isArray(buyer.topThreeGaps) ? buyer.topThreeGaps : [];
    var playbook = (data.implementer || {}).quickStartPlaybook || [];
    var related = data.relatedEndpoints || {};
    var tier = data.tier || 3;
    var juris = Array.isArray(data.jurisdiction) ? data.jurisdiction.join(" / ") : (data.jurisdiction || "");
    var deepCoverage = data.deepCoverage || null;

    /* Build a per-clause UC-detail lookup so highlight cards can pick
     * up controlObjective from the playbook for the same clause when
     * the auto-generated `why` is the boilerplate sentence. */
    var ucByClause = {};
    playbook.forEach(function (entry) {
      var k = (entry.clause || "").trim();
      if (k) ucByClause[k] = entry;
    });

    /* Compute three honest coverage numbers. The original payload
     * shows priorityWeightedCoveragePercent prominently, which reads
     * as 'we're at 50%' to a non-technical reader who just saw '52 of
     * 52 covered'. Surface all three so the page tells the truth. */
    var f = stateCounts["covered-full"] || 0;
    var p = stateCounts["covered-partial"] || 0;
    var c = stateCounts["contributing-only"] || 0;
    var u = stateCounts["uncovered"] || 0;
    var totalClauses = (summary.commonClauseCount != null)
        ? summary.commonClauseCount
        : (f + p + c + u);
    var coveredAny = f + p + c;
    var anyPct = totalClauses > 0 ? (coveredAny / totalClauses) * 100 : 0;
    var fullPct = totalClauses > 0 ? (f / totalClauses) * 100 : 0;
    var pwc = summary.priorityWeightedCoveragePercent;

    var html = "";

    /* ---- back link ---- */
    html += '<a class="cs-back" href="compliance-story.html">&larr; All regulations</a>';

    /* ---- mobile audience toggle (header pillbar collapses on narrow viewports) ---- */
    html += '<div class="cs-view-mobile-bar" role="group" aria-label="Audience view">' +
      '<span>View as</span>' +
      '<button type="button" data-view="buyer">Buyer</button>' +
      '<button type="button" data-view="auditor">Auditor</button>' +
      '<button type="button" data-view="impl">Implementer</button>' +
    '</div>';

    /* ---- trust ribbon (always visible — anchors authority) ---- */
    html += renderTrustRibbon(data, related);

    /* ---- hero ---- */
    html += '<section class="cs-hero">';
    html += '<div class="cs-hero-badges">';
    html += '<span class="cs-pill tier-' + tier + '">Tier ' + tier + "</span>";
    if (juris) html += '<span class="cs-pill tier-3">' + escapeHtml(juris) + "</span>";
    if (narrative.matchedBy) {
      html += '<span class="cs-pill tier-3" title="How this regulation was matched in the build">Map: ' + escapeHtml(narrative.matchedBy) + '</span>';
    }
    html += "</div>";
    html += "<h2>" + escapeHtml(data.regulationName || title) + "</h2>";
    html += '<div class="cs-hero-sub">' +
      '<strong>' + escapeHtml(data.regulationShortName || "") + "</strong>" +
      (data.regulationId ? ' &middot; <code>' + escapeHtml(data.regulationId) + "</code>" : "") +
    "</div>";
    /* Replace the often-tautological coverageHeadline with a regenerated,
     * audience-aware sentence built from the actual numbers. */
    var headlineProse = buildCoverageHeadline({
      total: totalClauses, full: f, partial: p, contributing: c, uncovered: u,
      pwc: pwc, regShort: data.regulationShortName || data.regulationId
    });
    if (headlineProse) html += '<div class="cs-hero-headline">' + escapeHtml(headlineProse) + "</div>";
    html += "</section>";

    /* ---- narrative (what/who/so-what) — buyer + impl ---- */
    if (narrative.whatItIs || narrative.whoItAffects || narrative.splunkValue) {
      html += '<section class="cs-narrative" data-cs-show="buyer impl">';
      if (narrative.whatItIs) html += narrativeCard("What the law is", narrative.whatItIs);
      if (narrative.whoItAffects) html += narrativeCard("Who it affects", narrative.whoItAffects);
      if (narrative.splunkValue) html += narrativeCard("How Splunk helps", narrative.splunkValue);
      html += "</section>";
    }

    /* ---- coverage hero (3-number KPI strip + ring + headline) — all views ---- */
    html += '<section class="cs-section" data-cs-show="buyer auditor impl">';
    html += "<h3>Coverage at a glance</h3>";
    html += '<p class="cs-section-sub">Three views on the same clause set. Hover any label for the definition.</p>';
    html += renderCoverageHero({
      total: totalClauses, full: f, partial: p, contributing: c, uncovered: u,
      anyPct: anyPct, fullPct: fullPct, pwc: pwc
    });
    html += renderCoverageLegend({ full: f, partial: p, contributing: c, uncovered: u });
    html += "</section>";

    /* ---- deep coverage (auditor-only) ---- */
    if (deepCoverage) {
      html += '<div data-cs-show="auditor">' + renderDeepCoverage(deepCoverage) + '</div>';
    }

    /* ---- highlights (buyer + auditor) ---- */
    html += '<section class="cs-section" data-cs-show="buyer auditor">';
    html += "<h3>What we cover today";
    if (topFive.length) html += ' <span class="cs-h3-tag">top ' + topFive.length + '</span>';
    html += "</h3>";
    html += '<p class="cs-section-sub">Highest-priority clauses the catalogue already satisfies with a live use case &mdash; ranked by regulator priority, then assurance strength. Click a UC to open it in the catalogue.</p>';
    if (!topFive.length) {
      html += '<div class="cs-empty-info"><strong>No full-evidence highlights yet.</strong>' +
        'This regulation is at an earlier stage of mapping. Open the ' +
        '<a href="clause-navigator.html#reg=' + encodeURIComponent(data.regulationShortName || data.regulationId) + '">clause navigator</a> ' +
        'to see partial- and contributing-assurance mappings, or the ' +
        '<a href="docs/compliance-gaps.md" target="_blank" rel="noopener">gap log</a> ' +
        'to see what\u2019s scheduled.</div>';
    } else {
      html += '<section class="cs-highlights">';
      html += topFive.map(function (h) { return renderHighlight(h, ucByClause); }).join("");
      html += "</section>";
    }
    html += "</section>";

    /* ---- gaps / where to invest next (buyer + auditor) ---- */
    var gapsResolved = resolveGaps(topGapsRaw, playbook, stateCounts);
    html += '<section class="cs-section" data-cs-show="buyer auditor">';
    html += "<h3>" + escapeHtml(gapsResolved.title) + "</h3>";
    html += '<p class="cs-section-sub">' + gapsResolved.subtitleHtml + '</p>';
    if (!gapsResolved.items.length) {
      html += '<div class="cs-empty-bright"><strong>No outstanding gaps on the regulator-priority clauses.</strong>' +
        'Every priority clause has at least contributing evidence in the catalogue. The clause navigator and evidence pack carry the full breakdown.</div>';
    } else {
      html += '<section class="cs-gaps">';
      html += gapsResolved.items.map(renderGap).join("");
      html += "</section>";
    }
    html += "</section>";

    /* ---- implementer playbook (impl + auditor) ---- */
    if (playbook.length) {
      html += '<section class="cs-section" data-cs-show="impl auditor" id="cs-playbook-section">';
      html += "<h3>Quick-start implementation playbook";
      html += ' <span class="cs-h3-tag">' + playbook.length + ' clauses</span>';
      html += "</h3>";
      html += '<p class="cs-section-sub">Per covered clause, up to three use cases ranked by assurance &rarr; criticality &rarr; UC-id. Filter by coverage state, criticality, or mode &mdash; or search clause / UC / topic.</p>';
      html += renderPlaybookToolbar();
      html += '<section class="cs-playbook" id="cs-playbook-root">';
      html += renderPlaybook(playbook);
      html += "</section>";
      html += "</section>";
    }

    /* ---- related resources (always) ---- */
    html += '<section class="cs-section" data-cs-show="buyer auditor impl">';
    html += "<h3>Related resources</h3>";
    html += '<section class="cs-related">';
    html += relatedLink("clause-navigator.html#reg=" + encodeURIComponent(data.regulationShortName || data.regulationId),
      "Clause navigator",
      "Auditor view: one row per clause, drill into covering UCs.");
    var primerAnchor = (related.primerAnchor || narrative.primer || "");
    if (primerAnchor) {
      primerAnchor = primerAnchor
        .replace(/^docs\/regulatory-primer\.md/, "regulatory-primer.html");
      html += relatedLink(primerAnchor, "Regulatory primer",
        "Plain-language deep dive on this regulation &mdash; 1-pager style.");
    }
    if (narrative.evidencePack || related.evidencePack) {
      html += relatedLink(narrative.evidencePack || related.evidencePack, "Evidence pack",
        "Markdown pack for auditors: clause, UC, SPL, source, status.");
    }
    html += relatedLink("api/v1/compliance/story/" + encodeURIComponent(data.regulationId) + ".json",
      "Story JSON", "Raw machine-readable payload used by this page.");
    if (related.regulation) {
      html += relatedLink(related.regulation.replace(/^\/+/, ""), "Regulation JSON",
        "Full coverage matrix for CI, dashboards, or custom UIs.");
    }
    html += relatedLink("index.html#reg=" + encodeURIComponent(data.regulationShortName || data.regulationId),
      "Filter the catalogue", "Open the catalogue pre-filtered to every UC tagged with this regulation.");
    html += "</section>";
    html += "</section>";

    document.getElementById("cs-content").innerHTML = html;

    /* Wire post-render interactions: mobile toggle, playbook filters, permalinks. */
    wireDetailInteractions(playbook);
    handleClauseAnchor();
  }

  /* ============================================================
   * RENDER HELPERS — detail view
   * ============================================================ */

  function renderTrustRibbon(data, related) {
    var bits = [];
    if (data.catalogueVersion) {
      bits.push('<span><strong>Catalogue v' + escapeHtml(data.catalogueVersion) + '</strong></span>');
    }
    if (data.generatedAt) {
      bits.push('<span title="' + escapeAttr(data.generatedAt) + '">Generated <strong>' +
        escapeHtml(formatGenerated(data.generatedAt)) + '</strong></span>');
    }
    if (data.regulationId) {
      bits.push('<span><code>' + escapeHtml(data.regulationId) + '</code></span>');
    }
    bits.push('<span><a href="LEGAL.md" target="_blank" rel="noopener">Provenance &amp; legal</a></span>');
    bits.push('<span><a href="docs/coverage-methodology.md" target="_blank" rel="noopener">Coverage methodology</a></span>');
    if (related && related.regulation) {
      bits.push('<span><a href="' + escapeAttr(related.regulation.replace(/^\/+/, "")) + '" target="_blank" rel="noopener">JSON&nbsp;API</a></span>');
    }
    return '<div class="cs-trust-ribbon">' +
      bits.join('<span class="cs-trust-sep" aria-hidden="true">&middot;</span>') +
      '</div>';
  }

  /* Build a one-sentence headline from the raw clause counts. The
   * generated payload's coverageHeadline often reads as a contradiction
   * ("52 of 52 covered" vs "50.6% priority-weighted") — this version
   * frames both numbers honestly. */
  function buildCoverageHeadline(s) {
    if (!s.total) return "";
    var anyPct = s.total ? Math.round(((s.full + s.partial + s.contributing) / s.total) * 100) : 0;
    var fullPct = s.total ? Math.round((s.full / s.total) * 100) : 0;
    var pwc = (s.pwc != null) ? (Math.round(Number(s.pwc) * 10) / 10) : null;
    var parts = [];
    if (s.uncovered === 0) {
      parts.push("Every one of the " + s.total + " regulator-priority clauses has at least contributing evidence.");
    } else {
      parts.push(anyPct + "% of the " + s.total + " regulator-priority clauses (" +
                 (s.full + s.partial + s.contributing) + " of " + s.total + ") are mapped to a use case.");
    }
    if (s.full > 0) {
      parts.push(fullPct + "% (" + s.full + " of " + s.total + ") have full-evidence coverage today.");
    }
    if (pwc != null) {
      parts.push("Weighted by regulator emphasis, the catalogue currently satisfies " + pwc + "%.");
    }
    return parts.join(" ");
  }

  function renderCoverageHero(s) {
    var safeTotal = (s.full + s.partial + s.contributing + s.uncovered) || 1;
    var stops = [
      (s.full / safeTotal) * 100,
      ((s.full + s.partial) / safeTotal) * 100,
      ((s.full + s.partial + s.contributing) / safeTotal) * 100
    ];
    var ringStyle =
      "--pct-full: " + stops[0].toFixed(2) + "%;" +
      "--pct-partial: " + stops[1].toFixed(2) + "%;" +
      "--pct-contributing: " + stops[2].toFixed(2) + "%;";
    var pwcText = (s.pwc != null) ? pct(s.pwc) : "\u2014";
    return (
      '<div class="cs-coverage-hero">' +
        '<div class="cs-ring-wrap">' +
          '<div class="cs-ring" style="' + ringStyle + '" role="img" aria-label="Coverage distribution: ' +
            s.full + ' full, ' + s.partial + ' partial, ' + s.contributing + ' contributing, ' + s.uncovered + ' uncovered">' +
            '<div class="cs-ring-label">' +
              '<div class="cs-ring-big">' + pwcText + "</div>" +
              '<div class="cs-ring-small">Priority-weighted</div>' +
            "</div>" +
          "</div>" +
        "</div>" +
        '<div class="cs-coverage-kpis">' +
          kpi('full',     pct(s.fullPct), 'Full evidence',
              s.full + ' of ' + s.total + ' clauses', ASSURANCE_TIPS.full) +
          kpi('partial',  pct(s.fullPct + (s.total ? (s.partial/s.total)*100 : 0)),
              'Full + Partial', (s.full + s.partial) + ' of ' + s.total + ' clauses',
              "Partial assurance — at least one mapped UC contributes meaningful evidence even if the clause isn\u2019t fully satisfied. Add depth to convert these to Full.") +
          kpi('priority', pct(s.pwc), 'Priority-weighted',
              'Regulator emphasis applied',
              "Each clause is multiplied by its regulator-assigned priority (typically 1.0 for priority items) before averaging — high-risk clauses dominate the score.") +
        '</div>' +
      "</div>"
    );
  }

  function kpi(kind, value, label, sub, tip) {
    var labelHtml = tip
      ? '<span class="cs-tip" data-tip="' + escapeAttr(tip) + '" tabindex="0">' + escapeHtml(label) + '</span>'
      : escapeHtml(label);
    return '<div class="cs-kpi kpi-' + kind + '">' +
      '<div class="cs-kpi-value">' + escapeHtml(value) + '</div>' +
      '<span class="cs-kpi-label">' + labelHtml + '</span>' +
      '<div class="cs-kpi-sub">' + escapeHtml(sub) + '</div>' +
    '</div>';
  }

  function renderCoverageLegend(c) {
    return '<div class="cs-legend" style="margin-top:14px">' +
      legendItem("cov-full",         "Full",         c.full,         ASSURANCE_TIPS.full) +
      legendItem("cov-partial",      "Partial",      c.partial,      ASSURANCE_TIPS.partial) +
      legendItem("cov-contributing", "Contributing", c.contributing, ASSURANCE_TIPS.contributing) +
      legendItem("cov-uncovered",    "Uncovered",    c.uncovered,    ASSURANCE_TIPS.uncovered) +
    '</div>';
  }

  /* Decide what to show in the gaps section. The original payload's
   * topThreeGaps[] is empty whenever uncovered=0, even if there are
   * dozens of partial-only or contributing-only clauses worth flagging.
   * Fall back to those when needed and rename the section. */
  function resolveGaps(topGaps, playbook, stateCounts) {
    if (topGaps && topGaps.length) {
      return {
        title: "Where the gaps are",
        subtitleHtml: 'Regulator-priority clauses with no covering UC. Tracked in <a href="docs/compliance-gaps.md" target="_blank" rel="noopener">docs/compliance-gaps.md</a> until a UC lands.',
        items: topGaps
      };
    }
    var partial = (stateCounts || {})["covered-partial"] || 0;
    var contrib = (stateCounts || {})["contributing-only"] || 0;
    if (!partial && !contrib) {
      return { title: "Where to invest next", subtitleHtml: 'No outstanding clauses on the priority list.', items: [] };
    }
    /* Derive up to 3 candidates from the playbook: prefer partial >
     * contributing, then by priorityWeight desc, then clause asc. */
    var rank = { "covered-partial": 1, "contributing-only": 2 };
    var candidates = (playbook || [])
      .filter(function (e) { return e.coverageState === "covered-partial" || e.coverageState === "contributing-only"; })
      .map(function (e) {
        var firstUc = (e.quickStartUcs || [])[0] || {};
        return {
          clause: e.clause,
          version: "",
          topic: e.topic,
          priorityWeight: e.priorityWeight,
          coverageState: e.coverageState,
          mitigationNote: firstUc.controlObjective ||
            ("Currently at " +
              (e.coverageState === "covered-partial" ? "partial" : "contributing") +
              " assurance via UC-" + (firstUc.ucId || "?") + " &mdash; deepen with an additional UC to lift it to full evidence."),
          _rank: rank[e.coverageState] || 9
        };
      })
      .sort(function (a, b) {
        if (a._rank !== b._rank) return a._rank - b._rank;
        var pa = a.priorityWeight || 0, pb = b.priorityWeight || 0;
        if (pb !== pa) return pb - pa;
        return String(a.clause).localeCompare(String(b.clause));
      })
      .slice(0, 3);
    return {
      title: "Where to invest next",
      subtitleHtml: 'No clauses are fully uncovered, but these priority clauses are still at partial or contributing strength &mdash; the next round of authoring should target these. Full breakdown in the <a href="docs/compliance-gaps.md" target="_blank" rel="noopener">gap log</a>.',
      items: candidates
    };
  }

  function narrativeCard(heading, body) {
    return '<div class="cs-narrative-card"><h3>' + escapeHtml(heading) + "</h3><p>" + escapeHtml(body) + "</p></div>";
  }

  /* Tooltip-aware legend item used by renderCoverageLegend(). */
  function legendItem(cls, heading, n, tip) {
    return (
      '<div class="cs-legend-item">' +
        '<span class="cs-legend-dot cs-legend-' + cls.replace("cov-", "") + '" aria-hidden="true"></span>' +
        '<div class="cs-legend-label"><strong><span class="cs-tip" data-tip="' + escapeAttr(tip || "") +
          '" tabindex="0">' + escapeHtml(heading) + '</span> &middot; ' + n + "</strong></div>" +
      "</div>"
    );
  }

  function renderDeepCoverage(dc) {
    var coverage = dc.coverageByType || {};
    var assurance = dc.assuranceByTarget || {};
    var confidence = dc.reviewConfidence || {};
    var sources = dc.sourceCoverage || {};
    var domains = Array.isArray(dc.domainOverview) ? dc.domainOverview : [];
    var artifacts = dc.canonicalArtifacts || {};
    var html = '<section class="cs-section">';
    html += '<h3>' + escapeHtml(dc.title || "Deep coverage overview") + '</h3>';
    html += '<p class="cs-section-sub">' + escapeHtml(dc.summary || "") + '</p>';
    html += '<div class="cs-deep-panel">';
    html += '<div class="cs-deep-metrics">';
    html += deepMetric(dc.matrixRows, "Matrix rows");
    html += deepMetric(dc.monitorableRows, "Monitorable rows");
    html += deepMetric(dc.nis2UcCount, "Tagged UCs");
    html += deepMetric(dc.legalBoundaryRowCount, "Legal-boundary rows");
    html += '</div>';
    html += '<div class="cs-deep-grid">';
    html += deepList("Coverage by type", coverage);
    html += deepList("Assurance target", assurance);
    html += deepList("Review confidence", confidence);
    html += deepList("Source authority", sources);
    html += '</div>';
    if (domains.length) {
      html += '<div class="cs-deep-domains"><table>';
      html += '<thead><tr><th>Control family</th><th>Rows</th><th>Full</th><th>Partial</th><th>Contributing</th><th>Not monitorable</th></tr></thead><tbody>';
      html += domains.map(function (d) {
        var cov = d.coverageByType || {};
        return '<tr>' +
          '<td>' + escapeHtml(d.controlFamily || "") + '</td>' +
          '<td>' + escapeHtml(String(d.rowCount || 0)) + '</td>' +
          '<td>' + escapeHtml(String(cov.full || 0)) + '</td>' +
          '<td>' + escapeHtml(String(cov.partial || 0)) + '</td>' +
          '<td>' + escapeHtml(String(cov.contributing || 0)) + '</td>' +
          '<td>' + escapeHtml(String(cov["not-monitorable"] || 0)) + '</td>' +
          '</tr>';
      }).join("");
      html += '</tbody></table></div>';
    }
    if (dc.noOverclaimingPolicy) {
      html += '<p class="cs-deep-policy"><strong>No overclaiming:</strong> ' +
        escapeHtml(dc.noOverclaimingPolicy) + '</p>';
    }
    if (artifacts && (artifacts.matrix || artifacts.sourceMap || artifacts.evidencePack || artifacts.methodology)) {
      html += '<section class="cs-related" style="margin-top:12px">';
      if (artifacts.evidencePack) html += relatedLink(artifacts.evidencePack, "Evidence pack", "Auditor-facing per-regulation evidence pack.");
      if (artifacts.matrix) html += relatedLink(artifacts.matrix, "Coverage matrix (data)", "Authoritative no-gap obligation matrix in data/.");
      if (artifacts.sourceMap) html += relatedLink(artifacts.sourceMap, "Source map (data)", "Authoritative source register and authority ranking.");
      if (artifacts.methodology) html += relatedLink(artifacts.methodology, "Monitoring methodology", "Method, scoping, and review-confidence calibration.");
      if (artifacts.externalReview) html += relatedLink(artifacts.externalReview, "External review pack", "Peer-review handout for auditors and external reviewers.");
      if (artifacts.maturityBenchmark) html += relatedLink(artifacts.maturityBenchmark, "Maturity benchmark", "Capability ladder for monitoring posture.");
      html += '</section>';
    }
    html += '</div></section>';
    return html;
  }

  function deepMetric(value, label) {
    var display = value == null ? "\u2014" : String(value);
    return '<div class="cs-deep-metric"><strong>' + escapeHtml(display) + '</strong><span>' + escapeHtml(label) + '</span></div>';
  }

  function deepList(title, obj) {
    var keys = Object.keys(obj || {}).sort();
    var html = '<div class="cs-deep-card"><h4>' + escapeHtml(title) + '</h4>';
    if (!keys.length) return html + '<ul><li>No data</li></ul></div>';
    html += '<ul>';
    keys.forEach(function (key) {
      html += '<li><code>' + escapeHtml(key) + '</code>: ' + escapeHtml(String(obj[key])) + '</li>';
    });
    html += '</ul></div>';
    return html;
  }

  function renderHighlight(h, ucByClause) {
    var ucHref = h.killerUcId ? ("index.html#uc-" + encodeURIComponent(h.killerUcId)) : "#";
    /* When the generator's `why` is the boilerplate sentence, build a
     * better one from clause + UC + assurance + (when available) the
     * playbook entry's controlObjective for the SAME clause. */
    var why = h.why || "";
    var entry = (ucByClause && ucByClause[h.clause]) || null;
    var firstUc = entry ? ((entry.quickStartUcs || [])[0] || {}) : {};
    var killerUcInPlaybook = entry && (entry.quickStartUcs || []).find(function (u) {
      return u && u.ucId === h.killerUcId;
    });
    /* Only borrow the playbook's controlObjective when it actually
     * describes the killer UC. Otherwise the buyer reads
     * "by UC-17.1.36 ... Splunk UC-22.44.1: ..." which is confusing
     * — the same clause may have several mapped UCs but we want the
     * sentence to stay anchored on the one we just named. */
    var co = (killerUcInPlaybook && killerUcInPlaybook.controlObjective) || "";
    if (isBoilerplateWhy(why)) {
      var assur = h.topAssurance ? h.topAssurance : "mapped";
      var lead = "Satisfied at <strong>" + escapeHtml(assur) + "</strong> assurance" +
        (h.killerUcId ? " by <strong>UC-" + escapeHtml(h.killerUcId) + "</strong>" : "") + ".";
      var detail = co
        ? " " + escapeHtml(co)
        : " The clause covers " + (h.topic ? "<em>" + escapeHtml(h.topic) + "</em>" : "this priority area") +
          "; open the UC to inspect the SPL, data sources, and evidence artefacts.";
      why = lead + detail;
    } else {
      why = escapeHtml(why);
    }
    var killerUcTitle = h.killerUcTitle ||
      (killerUcInPlaybook && killerUcInPlaybook.ucTitle) || "";
    var anchorId = "clause-" + cssSafe(h.clause || "");
    return (
      '<article class="cs-highlight-card" id="' + escapeAttr(anchorId) + '">' +
        '<div class="cs-highlight-head">' +
          '<div class="cs-highlight-clause">' + escapeHtml(h.clause || "\u2014") +
            ' <button class="cs-permalink" type="button" data-clause="' + escapeAttr(h.clause || "") +
            '" title="Copy permalink to this clause" aria-label="Copy permalink">#</button>' +
          '</div>' +
          '<div class="cs-highlight-version">' + escapeHtml(h.version || "") + "</div>" +
        "</div>" +
        (h.topic ? '<div class="cs-highlight-topic">' + escapeHtml(h.topic) + "</div>" : "") +
        (killerUcTitle ? '<p class="cs-uc-title-line"><strong>UC-' + escapeHtml(h.killerUcId || "") + '</strong> &mdash; ' + escapeHtml(killerUcTitle) + '</p>' : "") +
        '<div class="cs-highlight-body">' + why + "</div>" +
        '<div class="cs-highlight-footer">' +
          (h.killerUcId
            ? ('<a class="cs-killer-uc" href="' + escapeAttr(ucHref) + '">Open UC-' + escapeHtml(h.killerUcId) + " &rarr;</a>")
            : "") +
          (h.topAssurance
            ? '<span class="cs-pill cov-' + cssSafe(h.topAssurance) + '" title="Highest assurance reached for this clause">' + escapeHtml(h.topAssurance) + "</span>"
            : "") +
          (h.priorityWeight != null
            ? '<span class="cs-pill tier-1" title="Priority weight assigned by the regulator (typically 1.0 for priority items)">Priority ' + escapeHtml(String(h.priorityWeight)) + "</span>"
            : "") +
        "</div>" +
      "</article>"
    );
  }

  /* Gap card. Handles both the original payload shape (clause, version,
   * topic, mitigationNote, priorityWeight) and the resolveGaps-derived
   * shape (adds coverageState). */
  function renderGap(g) {
    var anchorId = "clause-" + cssSafe(g.clause || "");
    var stateBadge = "";
    if (g.coverageState) {
      var label = g.coverageState === "covered-partial" ? "partial only"
                : g.coverageState === "contributing-only" ? "contributing only"
                : g.coverageState === "uncovered" ? "uncovered"
                : g.coverageState;
      var cls = g.coverageState === "covered-partial" ? "cov-partial"
              : g.coverageState === "contributing-only" ? "cov-contributing"
              : "cov-uncovered";
      stateBadge = '<span class="cs-pill ' + cls + '" title="Current strongest assurance for this clause">' + escapeHtml(label) + '</span>';
    }
    /* Allow controlled HTML (<em>/<strong>/<a>) in mitigationNote when the
     * resolver built it; raw payload notes are escaped. */
    var bodyHtml = (g.mitigationNote && /<\/?(em|strong|code|a)\b/.test(g.mitigationNote))
      ? g.mitigationNote
      : escapeHtml(g.mitigationNote || "No mitigation note on file.");
    return (
      '<article class="cs-gap-card" id="' + escapeAttr(anchorId) + '">' +
        '<div class="cs-gap-head">' +
          '<div class="cs-gap-clause">' + escapeHtml(g.clause || "\u2014") +
            ' <button class="cs-permalink" type="button" data-clause="' + escapeAttr(g.clause || "") +
            '" title="Copy permalink to this clause" aria-label="Copy permalink">#</button>' +
          '</div>' +
          '<div class="cs-gap-version">' + escapeHtml(g.version || "") + "</div>" +
        "</div>" +
        (g.topic ? '<div class="cs-gap-topic">' + escapeHtml(g.topic) + "</div>" : "") +
        '<div class="cs-gap-body">' + bodyHtml + "</div>" +
        '<div class="cs-gap-footer">' +
          stateBadge +
          (g.priorityWeight != null
            ? '<span class="cs-pill tier-1" title="Priority weight assigned by the regulator">Priority ' + escapeHtml(String(g.priorityWeight)) + "</span>"
            : "") +
        "</div>" +
      "</article>"
    );
  }

  /* ============================================================
   * PLAYBOOK
   * The implementer / auditor needs the playbook to be explorable, not
   * a wall of 50–130 collapsed entries. Group by coverage state (the
   * most actionable axis the data carries today) and offer search +
   * chips for criticality and mode.
   * ============================================================ */
  var PB_SECTIONS = [
    { key: "covered-full",      label: "Deploy now",
      sub: "Full-evidence clauses &mdash; the saved-search output IS the auditor evidence.",
      pillCls: "cov-full" },
    { key: "covered-partial",   label: "Deepen existing",
      sub: "Partial coverage today &mdash; pair with one more UC to reach full evidence.",
      pillCls: "cov-partial" },
    { key: "contributing-only", label: "Triangulating evidence",
      sub: "Supporting telemetry only &mdash; useful as parallel signal, not primary evidence.",
      pillCls: "cov-contributing" },
    { key: "uncovered",         label: "Outstanding",
      sub: "No mapped UC yet &mdash; tracked in the gap log.",
      pillCls: "cov-uncovered" }
  ];

  function renderPlaybookToolbar() {
    function chipgroup(name, label, options) {
      var btns = options.map(function (o) {
        return '<button type="button" data-pb-filter="' + name + '" data-value="' + escapeAttr(o.v) +
          '" aria-pressed="' + (o.v === "all" ? "true" : "false") + '"' +
          (o.title ? ' title="' + escapeAttr(o.title) + '"' : "") + ">" +
          escapeHtml(o.l) + "</button>";
      }).join("");
      return '<div>' +
        '<span class="cs-pb-chipgroup-label">' + escapeHtml(label) + '</span>' +
        '<div class="cs-pb-chipgroup">' + btns + '</div>' +
      '</div>';
    }
    return '<div class="cs-pb-toolbar" role="toolbar" aria-label="Playbook filters">' +
      '<input type="search" id="cs-pb-search" placeholder="Search clauses, UC IDs, topics, titles\u2026" autocomplete="off" aria-label="Search playbook">' +
      chipgroup("state", "Coverage", [
        { v: "all", l: "All" },
        { v: "covered-full",      l: "Full",     title: ASSURANCE_TIPS.full },
        { v: "covered-partial",   l: "Partial",  title: ASSURANCE_TIPS.partial },
        { v: "contributing-only", l: "Contrib.", title: ASSURANCE_TIPS.contributing },
        { v: "uncovered",         l: "Uncov.",   title: ASSURANCE_TIPS.uncovered }
      ]) +
      chipgroup("criticality", "Criticality", [
        { v: "all", l: "All" },
        { v: "critical", l: "Critical" },
        { v: "high",     l: "High" },
        { v: "medium",   l: "Medium" }
      ]) +
      chipgroup("mode", "Mode", [
        { v: "all", l: "All" },
        { v: "satisfies",   l: "Satisfies" },
        { v: "contributes", l: "Contributes" }
      ]) +
    '</div>';
  }

  function renderPlaybook(playbook) {
    /* Bucket by coverageState in PB_SECTIONS order. */
    var buckets = {};
    PB_SECTIONS.forEach(function (s) { buckets[s.key] = []; });
    playbook.forEach(function (e) {
      var k = e.coverageState || "uncovered";
      if (!buckets[k]) buckets[k] = [];
      buckets[k].push(e);
    });
    /* Sort each bucket by priority desc, then clause asc. */
    Object.keys(buckets).forEach(function (k) {
      buckets[k].sort(function (a, b) {
        var pa = a.priorityWeight || 0, pb = b.priorityWeight || 0;
        if (pb !== pa) return pb - pa;
        return String(a.clause).localeCompare(String(b.clause));
      });
    });
    var html = "";
    PB_SECTIONS.forEach(function (s) {
      var entries = buckets[s.key] || [];
      if (!entries.length) return;
      html += '<div class="cs-pb-section" data-pb-section="' + s.key + '">' +
        '<div class="cs-pb-section-head">' +
          '<h4>' + escapeHtml(s.label) + '</h4>' +
          '<span class="cs-pb-count">' + entries.length + '</span>' +
          '<span class="cs-pb-section-sub">' + s.sub + '</span>' +
        '</div>' +
        entries.map(function (e) { return renderPlaybookEntry(e, s.pillCls); }).join("") +
        '<div class="cs-pb-empty" data-pb-empty hidden>No matches in this group with the current filters.</div>' +
      '</div>';
    });
    return html;
  }

  function renderPlaybookEntry(entry, pillCls) {
    var ucs = Array.isArray(entry.quickStartUcs) ? entry.quickStartUcs : [];
    var summaryLabel = entry.coverageState === "covered-full" ? "Full"
                     : entry.coverageState === "covered-partial" ? "Partial"
                     : entry.coverageState === "uncovered" ? "Uncovered" : "Contributing";
    /* Pre-compute searchable / filterable metadata as a single string
     * for cheap client-side filtering. */
    var searchBlob = [
      entry.clause, entry.topic,
      ucs.map(function (u) { return u.ucId + " " + (u.ucTitle || ""); }).join(" ")
    ].join(" ").toLowerCase();
    var crits = ucs.map(function (u) { return (u.criticality || "").toLowerCase(); }).filter(Boolean);
    var modes = ucs.map(function (u) { return (u.mode || "").toLowerCase(); }).filter(Boolean);
    var anchorId = "clause-" + cssSafe(entry.clause || "");
    return (
      '<details data-pb-entry' +
        ' data-state="' + escapeAttr(entry.coverageState || "") + '"' +
        ' data-criticality="' + escapeAttr(crits.join(" ")) + '"' +
        ' data-mode="' + escapeAttr(modes.join(" ")) + '"' +
        ' data-search="' + escapeAttr(searchBlob) + '"' +
        ' id="' + escapeAttr(anchorId) + '">' +
        "<summary>" +
          '<span class="cs-clause-code">' + escapeHtml(entry.clause || "\u2014") + "</span>" +
          '<span class="cs-clause-topic">' + escapeHtml(entry.topic || "") + "</span>" +
          (entry.priorityWeight != null
            ? '<span class="cs-pill tier-1" title="Regulator priority weight">P ' + escapeHtml(String(entry.priorityWeight)) + '</span>'
            : '') +
          '<span class="cs-pill ' + (pillCls || "cov-contributing") + '">' + escapeHtml(summaryLabel) + "</span>" +
          '<button class="cs-permalink" type="button" data-clause="' + escapeAttr(entry.clause || "") +
            '" title="Copy permalink to this clause" aria-label="Copy permalink">#</button>' +
        "</summary>" +
        '<div class="cs-playbook-inner">' +
          ucs.map(renderPlaybookUc).join("") +
        "</div>" +
      "</details>"
    );
  }

  function renderPlaybookUc(uc) {
    var ucId = uc.ucId || "";
    var assurClass = "cov-" + cssSafe(uc.assurance || "contributing");
    var meta = [];
    if (uc.mode) meta.push('<span class="cs-pill mode-' + cssSafe(uc.mode) + '">' + escapeHtml(uc.mode) + "</span>");
    if (uc.assurance) meta.push('<span class="cs-pill ' + assurClass + '">' + escapeHtml(uc.assurance) + "</span>");
    if (uc.criticality) meta.push("<span>criticality: <strong>" + escapeHtml(uc.criticality) + "</strong></span>");
    /* Surface controlObjective inline when present — high-value for the
     * SE because it's the SAME field they paste into a customer email. */
    var coLine = uc.controlObjective
      ? '<div class="cs-playbook-uc-meta" style="margin-top:6px;color:var(--text-secondary);font-size:12px;line-height:1.45">' +
          escapeHtml(uc.controlObjective) +
        '</div>'
      : "";
    return (
      '<div class="cs-playbook-uc">' +
        '<a class="cs-playbook-uc-link" href="index.html#uc-' + encodeURIComponent(ucId) + '" title="Open UC in catalogue">UC-' + escapeHtml(ucId) + "</a>" +
        '<div class="cs-playbook-uc-body">' +
          '<div class="cs-playbook-uc-title">' + escapeHtml(uc.ucTitle || "") + "</div>" +
          '<div class="cs-playbook-uc-meta">' + meta.join(" &middot; ") + "</div>" +
          coLine +
        "</div>" +
      "</div>"
    );
  }

  /* ---------- post-render wiring (filters, permalinks, anchors) ---------- */
  function wireDetailInteractions(playbook) {
    /* Audience toggle (mobile in-content fallback) */
    if (document.querySelectorAll) {
      document.querySelectorAll('.cs-view-mobile-bar button[data-view]').forEach(function (btn) {
        var on = (document.body && document.body.getAttribute && document.body.getAttribute('data-cs-view')) === btn.getAttribute('data-view');
        btn.setAttribute('aria-pressed', on ? 'true' : 'false');
        if (btn.addEventListener) {
          btn.addEventListener('click', function () { applyView(btn.getAttribute('data-view')); });
        }
      });
    }
    /* Permalink chip copy-to-clipboard */
    if (document.querySelectorAll) {
      document.querySelectorAll('.cs-permalink').forEach(function (btn) {
        if (!btn.addEventListener) return;
        btn.addEventListener('click', function (e) {
          e.preventDefault(); e.stopPropagation();
          var clause = btn.getAttribute('data-clause') || "";
          var url = location.origin + location.pathname + location.search + "#clause=" + encodeURIComponent(clause);
          try {
            navigator.clipboard.writeText(url);
            var prev = btn.textContent;
            btn.textContent = "\u2713";
            setTimeout(function () { btn.textContent = prev; }, 900);
          } catch (_) {
            location.hash = "clause=" + encodeURIComponent(clause);
          }
        });
      });
    }
    /* Playbook filters: state / criticality / mode + search */
    var pbRoot = document.getElementById('cs-playbook-root');
    if (!pbRoot) return;
    var search = document.getElementById('cs-pb-search');
    var activeFilters = { state: "all", criticality: "all", mode: "all" };
    function apply() {
      var q = (search && search.value || "").trim().toLowerCase();
      pbRoot.querySelectorAll('details[data-pb-entry]').forEach(function (el) {
        var st = el.getAttribute('data-state') || "";
        var crit = el.getAttribute('data-criticality') || "";
        var mode = el.getAttribute('data-mode') || "";
        var blob = el.getAttribute('data-search') || "";
        var visible = true;
        if (activeFilters.state !== "all"        && st !== activeFilters.state)            visible = false;
        if (activeFilters.criticality !== "all"  && crit.indexOf(activeFilters.criticality) === -1) visible = false;
        if (activeFilters.mode !== "all"         && mode.indexOf(activeFilters.mode) === -1) visible = false;
        if (q && blob.indexOf(q) === -1)         visible = false;
        el.style.display = visible ? "" : "none";
      });
      pbRoot.querySelectorAll('[data-pb-section]').forEach(function (sec) {
        var anyVisible = sec.querySelector('details[data-pb-entry]:not([style*="display: none"])');
        sec.style.display = anyVisible ? "" : "none";
        var emptyEl = sec.querySelector('[data-pb-empty]');
        if (emptyEl) emptyEl.hidden = anyVisible ? true : false;
      });
    }
    var toolbar = pbRoot.parentElement && pbRoot.parentElement.querySelectorAll
      ? pbRoot.parentElement.querySelectorAll('button[data-pb-filter]')
      : [];
    toolbar.forEach(function (btn) {
      btn.addEventListener('click', function () {
        var name = btn.getAttribute('data-pb-filter');
        var val = btn.getAttribute('data-value');
        activeFilters[name] = val;
        var group = btn.parentElement;
        group.querySelectorAll('button[data-pb-filter="' + name + '"]').forEach(function (b) {
          b.setAttribute('aria-pressed', b === btn ? 'true' : 'false');
        });
        apply();
      });
    });
    if (search && search.addEventListener) {
      search.addEventListener('input', apply);
    }
  }

  function handleClauseAnchor() {
    /* Support #clause=Art.21(2)(d) deep-links: scroll the matching
     * card / playbook entry into view, expand if collapsed, and flash. */
    var hash = (location.hash || "").replace(/^#/, "");
    if (!hash) return;
    var m = hash.match(/^clause=(.+)$/);
    if (!m) return;
    var clause = decodeURIComponent(m[1]);
    var id = "clause-" + cssSafe(clause);
    setTimeout(function () {
      var el = document.getElementById(id);
      if (!el) return;
      if (el.tagName === "DETAILS") el.open = true;
      el.classList.add("cs-flash");
      if (el.scrollIntoView) el.scrollIntoView({ behavior: "smooth", block: "start" });
    }, 50);
  }

  function relatedLink(href, heading, sub) {
    // Internal paths (docs/... or *.md) open in a new tab since they're
    // often GitHub-rendered. Everything else stays in the current tab.
    var isExternal = /\.md($|#)/.test(href);
    var target = isExternal ? ' target="_blank" rel="noopener"' : "";
    return (
      '<a href="' + escapeAttr(href) + '"' + target + ">" +
        "<strong>" + escapeHtml(heading) + "</strong>" +
        "<span>" + escapeHtml(sub) + "</span>" +
      "</a>"
    );
  }

  function cssSafe(s) {
    return String(s).toLowerCase().replace(/[^a-z0-9-]+/g, "-");
  }
})();
</script>
</body>
</html>

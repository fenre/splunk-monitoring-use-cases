(function () {

  var THEME_KEY = 'cisco-ui-theme';
  var root = document.documentElement;
  var themeBtn = document.getElementById('theme-btn');
  var themeLabel = document.getElementById('theme-label');
  var themeIco = document.getElementById('theme-ico');

  function applyThemeUI() {
    var isDark = root.classList.contains('dark');

  if (themeBtn) {
    themeBtn.addEventListener('click', function () {
      root.classList.toggle('dark');
      try { localStorage.setItem(THEME_KEY, root.classList.contains('dark') ? 'dark' : 'light'); } catch (_) {}
      applyThemeUI();
    });
  }

  function escapeHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  function slugify(text) {
    return String(text).toLowerCase()
      .replace(/\u00a0/g, ' ')
      .replace(/[^\w\s-]/g, '')
      .replace(/\s/g, '-')
      .replace(/^-+|-+$/g, '');
  }

  function renderInline(raw) {
    var tokens = [];
    var text = String(raw).replace(/`([^`\n]+?)`/g, function (_, inner) {
      var i = tokens.length;
      tokens.push('<code>' + escapeHtml(inner) + '</code>');
      return '\u0000CODE' + i + '\u0000';
    });
    text = escapeHtml(text);
    text = text.replace(/\[([^\]]+)\]\(([^)\s]+)(?:\s+"[^"]*")?\)/g, function (_, label, url) {
      if (!/^(https?:|mailto:|#|\.?\.?\/)/i.test(url)) return _;
      var external = /^https?:\/\//i.test(url);
      var attrs = external ? ' target="_blank" rel="noopener noreferrer"' : '';
      return '<a href="' + escapeHtml(url) + '"' + attrs + '>' + label + '</a>';
    });
    text = text.replace(/\*\*([^*\n]+?)\*\*/g, '<strong>$1</strong>');
    text = text.replace(/(^|[^*])\*([^*\n]+?)\*(?!\*)/g, '$1<em>$2</em>');
    text = text.replace(/---/g, '&mdash;').replace(/--/g, '&ndash;');
    text = text.replace(/\u0000CODE(\d+)\u0000/g, function (_, i) { return tokens[+i]; });
    return text;
  }

  function splitTableRow(line) {
    var cells = [], cur = '';
    for (var i = 0; i < line.length; i++) {
      var c = line[i];
      if (c === '\\' && line[i + 1] === '|') { cur += '|'; i++; }
      else if (c === '|') { cells.push(cur); cur = ''; }
      else { cur += c; }
    }
    cells.push(cur);
    if (cells.length > 1) {
      if (cells[0].trim() === '') cells.shift();
      if (cells.length && cells[cells.length - 1].trim() === '') cells.pop();
    }
    return cells.map(function (x) { return x.trim(); });
  }

  function isTableSeparator(s) {
    return /^\|?\s*:?-{3,}:?\s*(\|\s*:?-{3,}:?\s*)+\|?$/.test(s.trim());
  }

  function renderMarkdown(md) {
    // Strip YAML front matter
    md = md.replace(/^---\n[\s\S]*?\n---\n/, '');

    var lines = md.replace(/\r\n/g, '\n').split('\n');
    var out = [];
    var i = 0;

    function flushParagraph(buf) {
      if (!buf.length) return;
      var para = buf.join(' ').trim();
      if (para) out.push('<p>' + renderInline(para) + '</p>');
      buf.length = 0;
    }

    while (i < lines.length) {
      var line = lines[i];
      var stripped = line.replace(/\s+$/, '');

      if (!stripped.trim()) { i++; continue; }
      if (/^---\s*$/.test(stripped) || /^\*{3,}\s*$/.test(stripped)) { out.push('<hr>'); i++; continue; }

      // Fenced code block
      var fenceMatch = stripped.match(/^(`{3,})([\w-]*)\s*$/);
      if (fenceMatch) {
        var fence = fenceMatch[1];
        var lang = fenceMatch[2] || '';
        var codeLines = [];
        i++;
        while (i < lines.length) {
          if (lines[i].trimEnd() === fence || lines[i].trimEnd().indexOf(fence) === 0 && lines[i].trim().length === fence.length) { i++; break; }
          codeLines.push(lines[i]);
          i++;
        }
        var codeContent = escapeHtml(codeLines.join('\n'));
        if (lang === 'mermaid') {
          out.push('<div class="gr-mermaid">[Mermaid diagram — view on <a href="https://github.com/fenre/splunk-monitoring-use-cases/blob/main/' + escapeHtml(GUIDE_SRC) + '" target="_blank">GitHub</a> for rendered diagrams]</div>');
        } else {
          var langLabel = lang ? '<span class="gr-lang-label">' + escapeHtml(lang) + '</span>' : '';
          out.push('<pre>' + langLabel + '<code>' + codeContent + '</code></pre>');
        }
        continue;
      }

      // ATX heading
      var hm = stripped.match(/^(#{1,6})\s+(.*?)\s*#*\s*$/);
      if (hm) {
        var level = hm[1].length;
        var htext = hm[2];
        var id = slugify(htext);
        out.push('<h' + level + ' id="' + escapeHtml(id) + '">' + renderInline(htext) + '</h' + level + '>');
        i++; continue;
      }

      // Blockquote
      if (/^>\s?/.test(stripped)) {
        var bqBuf = [];
        while (i < lines.length && /^>\s?/.test(lines[i])) { bqBuf.push(lines[i].replace(/^>\s?/, '')); i++; }
        var parts = bqBuf.join('\n').split(/\n\s*\n/);
        out.push('<blockquote>' + parts.map(function (p) { return '<p>' + renderInline(p.replace(/\n/g, ' ').trim()) + '</p>'; }).join('') + '</blockquote>');
        continue;
      }

      // Table
      if (/\|/.test(stripped) && i + 1 < lines.length && isTableSeparator(lines[i + 1])) {
        var header = splitTableRow(stripped);
        var sep = splitTableRow(lines[i + 1]);
        var aligns = sep.map(function (s) {
          var t = s.trim();
          if (/^:-+:$/.test(t)) return 'center';
          if (/^:-+$/.test(t)) return 'left';
          if (/^-+:$/.test(t)) return 'right';
          return '';
        });
        i += 2;
        var rows = [];
        while (i < lines.length && /\|/.test(lines[i]) && lines[i].trim()) { rows.push(splitTableRow(lines[i])); i++; }
        var thtml = '<div class="gr-tablewrap"><table><thead><tr>';
        header.forEach(function (h, idx) {
          var sty = aligns[idx] ? ' style="text-align:' + aligns[idx] + '"' : '';
          thtml += '<th' + sty + '>' + renderInline(h) + '</th>';
        });
        thtml += '</tr></thead><tbody>';
        rows.forEach(function (r) {
          thtml += '<tr>';
          for (var c = 0; c < header.length; c++) {
            var cell = r[c] != null ? r[c] : '';
            var sty2 = aligns[c] ? ' style="text-align:' + aligns[c] + '"' : '';
            thtml += '<td' + sty2 + '>' + renderInline(cell) + '</td>';
          }
          thtml += '</tr>';
        });
        thtml += '</tbody></table></div>';
        out.push(thtml);
        continue;
      }

      // Unordered list
      if (/^(\s*)([-*+])\s+/.test(stripped)) {
        var ulItems = [];
        while (i < lines.length) {
          var raw = lines[i];
          var mm = raw.match(/^(\s*)([-*+])\s+(.*)$/);
          if (mm) { ulItems.push(mm[3]); i++; }
          else if (/^\s{2,}\S/.test(raw) && ulItems.length) { ulItems[ulItems.length - 1] += ' ' + raw.trim(); i++; }
          else if (!raw.trim()) { if (i + 1 < lines.length && /^(\s*)([-*+])\s+/.test(lines[i + 1])) { i++; continue; } break; }
          else { break; }
        }
        out.push('<ul>' + ulItems.map(function (it) { return '<li>' + renderInline(it) + '</li>'; }).join('') + '</ul>');
        continue;
      }

      // Ordered list
      if (/^(\s*)\d+\.\s+/.test(stripped)) {
        var olItems = [];
        while (i < lines.length) {
          var raw2 = lines[i];
          var om = raw2.match(/^(\s*)\d+\.\s+(.*)$/);
          if (om) { olItems.push(om[2]); i++; }
          else if (/^\s{2,}\S/.test(raw2) && olItems.length) { olItems[olItems.length - 1] += ' ' + raw2.trim(); i++; }
          else if (!raw2.trim()) { if (i + 1 < lines.length && /^(\s*)\d+\.\s+/.test(lines[i + 1])) { i++; continue; } break; }
          else { break; }
        }
        out.push('<ol>' + olItems.map(function (it) { return '<li>' + renderInline(it) + '</li>'; }).join('') + '</ol>');
        continue;
      }

      // Paragraph
      var pBuf = [stripped];
      i++;
      while (i < lines.length) {
        var nxt = lines[i];
        if (!nxt.trim()) break;
        if (/^#{1,6}\s+/.test(nxt)) break;
        if (/^---\s*$/.test(nxt) || /^\*{3,}\s*$/.test(nxt)) break;
        if (/^>\s?/.test(nxt)) break;
        if (/^(\s*)([-*+])\s+/.test(nxt)) break;
        if (/^(\s*)\d+\.\s+/.test(nxt)) break;
        if (/^`{3,}/.test(nxt)) break;
        if (/\|/.test(nxt) && i + 1 < lines.length && isTableSeparator(lines[i + 1])) break;
        pBuf.push(nxt);
        i++;
      }
      flushParagraph(pBuf);
    }
    return out.join('\n');
  }

  function decorateAnchors(article) {
    var hs = article.querySelectorAll('h2[id], h3[id]');
    hs.forEach(function (h) {
      var a = document.createElement('a');
      a.className = 'gr-anchor';
      a.href = '#' + h.id;
      a.setAttribute('aria-label', 'Copy link to ' + (h.textContent || '').trim());
      a.title = 'Copy link to this section';
      a.textContent = '\u00b6';
      a.addEventListener('click', function (ev) {
        if (ev.metaKey || ev.ctrlKey || ev.shiftKey) return;
        ev.preventDefault();
        try { if (navigator.clipboard) navigator.clipboard.writeText(window.location.origin + window.location.pathname + window.location.search + '#' + h.id); } catch (_) {}
        history.replaceState(null, '', window.location.pathname + window.location.search + '#' + h.id);
        h.scrollIntoView({ behavior: 'smooth', block: 'start' });
      });
      h.insertBefore(a, h.firstChild);
    });
  }

  function buildTOC(article) {
    var tocList = document.getElementById('gr-toc-list');
    if (!tocList) return;
    tocList.innerHTML = '';
    var hs = article.querySelectorAll('h2[id], h3[id], h4[id]');
    var items = [];
    hs.forEach(function (h) {
      var level = parseInt(h.tagName.substring(1), 10);
      var li = document.createElement('li');
      li.className = 'gr-toc-l' + level;
      var a = document.createElement('a');
      a.href = '#' + h.id;
      a.textContent = (h.textContent || '').replace(/^\s*\u00b6\s*/, '').trim();
      a.setAttribute('data-target', h.id);
      a.addEventListener('click', function (ev) {
        ev.preventDefault();
        history.replaceState(null, '', window.location.pathname + window.location.search + '#' + h.id);
        h.scrollIntoView({ behavior: 'smooth', block: 'start' });
      });
      li.appendChild(a);
      tocList.appendChild(li);
      items.push({ el: h, link: a });
    });
    return items;
  }

  function wireTOCSearch() {
    var input = document.getElementById('gr-toc-search');
    var list = document.getElementById('gr-toc-list');
    if (!input || !list) return;
    input.addEventListener('input', function () {
      var q = input.value.trim().toLowerCase();
      list.querySelectorAll('li').forEach(function (li) {
        var t = (li.textContent || '').toLowerCase();
        if (!q || t.indexOf(q) !== -1) li.classList.remove('gr-hidden');
        else li.classList.add('gr-hidden');
      });
    });
  }

  function wireTOCHighlight(items) {
    if (!items || !items.length || !('IntersectionObserver' in window)) return;
    var activeLink = null;
    function setActive(link) {
      if (activeLink === link) return;
      if (activeLink) activeLink.classList.remove('gr-active');
      if (link) link.classList.add('gr-active');
      activeLink = link;
      if (link && window.matchMedia('(min-width: 1081px)').matches) {
        var toc = document.getElementById('gr-toc');
        if (toc) { var tr = toc.getBoundingClientRect(), lr = link.getBoundingClientRect(); if (lr.top < tr.top + 40 || lr.bottom > tr.bottom - 40) link.scrollIntoView({ block: 'nearest' }); }
      }
    }
    var linkById = {};
    items.forEach(function (it) { linkById[it.el.id] = it.link; });
    var visible = {};
    var io = new IntersectionObserver(function (entries) {
      entries.forEach(function (e) { visible[e.target.id] = e.isIntersecting; });
      var topMost = null, topY = Infinity;
      items.forEach(function (it) {
        if (!visible[it.el.id]) return;
        var y = it.el.getBoundingClientRect().top;
        if (y < topY && y >= -20) { topY = y; topMost = it.el.id; }
      });
      if (topMost && linkById[topMost]) setActive(linkById[topMost]);
    }, { rootMargin: '-64px 0px -70% 0px', threshold: [0, 1] });
    items.forEach(function (it) { io.observe(it.el); });
  }

  function wireProgress() {
    var fill = document.getElementById('gr-progress-fill');
    var topBtn = document.getElementById('gr-top');
    var article = document.getElementById('gr-main');
    if (!fill || !topBtn || !article) return;
    function update() {
      var rect = article.getBoundingClientRect();
      var total = rect.height - window.innerHeight;
      var scrolled = -rect.top;
      var pct = total > 0 ? Math.max(0, Math.min(1, scrolled / total)) : 0;
      fill.style.width = (pct * 100).toFixed(2) + '%';
      if (scrolled > 280) topBtn.classList.add('gr-visible'); else topBtn.classList.remove('gr-visible');
    }
    update();
    window.addEventListener('scroll', update, { passive: true });
    window.addEventListener('resize', update);
    topBtn.addEventListener('click', function () { window.scrollTo({ top: 0, behavior: 'smooth' }); });
  }

  var GUIDE_SRC = '';
  var GITHUB_RAW = 'https://github.com/fenre/splunk-monitoring-use-cases/blob/main/';

  function showError(msg, detail) {
    var main = document.getElementById('gr-main');
    main.innerHTML = '<div class="gr-error"><h2>Could not load the guide</h2>' +
      '<p>' + escapeHtml(msg) + '</p>' +
      (detail ? '<p style="color:var(--text-tertiary);font-size:13px">' + escapeHtml(detail) + '</p>' : '') +
      '<p style="margin-top:14px"><a href="' + escapeHtml(GITHUB_RAW + GUIDE_SRC) + '" target="_blank" rel="noopener">View on GitHub &rarr;</a></p></div>';
    var tocList = document.getElementById('gr-toc-list');
    if (tocList) tocList.innerHTML = '<li><a href="#" style="color:var(--text-tertiary)">(unavailable)</a></li>';
  }

  function boot() {
    var params = new URLSearchParams(window.location.search);
    GUIDE_SRC = params.get('src') || '';

    if (!GUIDE_SRC || !/^docs\/guides\/[\w-]+\.md$/i.test(GUIDE_SRC)) {
      showError('No valid guide source specified.', 'URL must include ?src=docs/guides/<name>.md');
      return;
    }

    // Update page metadata
    var srcLabel = document.getElementById('gr-footer-src-label');
    var srcLink = document.getElementById('gr-footer-src');
    if (srcLabel) srcLabel.textContent = GUIDE_SRC;
    if (srcLink) srcLink.href = GUIDE_SRC;

    var article = document.getElementById('gr-main');
    var controller = new AbortController();
    var timer = setTimeout(function () { controller.abort(); }, 15000);

    fetch(GUIDE_SRC, { cache: 'no-cache', credentials: 'same-origin', signal: controller.signal })
      .then(function (r) { clearTimeout(timer); if (!r.ok) throw new Error('HTTP ' + r.status); return r.text(); })
      .then(function (md) {
        // Strip TOC section since we build our own
        md = md.replace(/\n## Table of Contents[\s\S]*?(?=\n## )/, '\n');

        var html = renderMarkdown(md);
        article.innerHTML = html;

        // Remove rendered TOC heading if strip missed it
        article.querySelectorAll('h2').forEach(function (h) {
          if (/^table of contents$/i.test((h.textContent || '').trim())) h.remove();
        });

        // Update page title from h1
        var h1 = article.querySelector('h1');
        if (h1) document.title = (h1.textContent || '').trim() + ' — Splunk monitoring use cases';

        decorateAnchors(article);

        // Subtitle with render info
        if (h1 && !article.querySelector('.gr-subtitle')) {
          var sub = document.createElement('div');
          sub.className = 'gr-subtitle';
          sub.innerHTML = '<span class="gr-stamp">Rendered ' + escapeHtml(new Date().toISOString().slice(0, 10)) + '</span>' +
            '<span>Source:&nbsp;<a href="' + escapeHtml(GUIDE_SRC) + '" target="_blank" rel="noopener">' + escapeHtml(GUIDE_SRC) + '</a></span>';
          h1.insertAdjacentElement('afterend', sub);
        }

        var items = buildTOC(article);
        wireTOCSearch();
        wireTOCHighlight(items);
        wireProgress();

        if (window.location.hash && window.location.hash.length > 1) {
          var target = document.getElementById(window.location.hash.slice(1));
          if (target) setTimeout(function () { target.scrollIntoView({ behavior: 'auto', block: 'start' }); }, 50);
        }
      })
      .catch(function (err) {
        clearTimeout(timer);
        var msg = (err && err.name === 'AbortError')
          ? 'The request timed out after 15 seconds.'
          : 'Could not load ' + GUIDE_SRC + ' from this server.';
        showError(msg, err && err.message ? String(err.message) : '');
      });
  }

  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', boot);
  else boot();
})();
</script>
</body>
</html>

<style>
  :root { color-scheme: light dark; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #F7F7F7; color: #1B1F23;
    display: flex; align-items: center; justify-content: center;

  }
  @media (prefers-color-scheme: dark) {
    body { background: #0F1214; color: #ECEFF4; }
    .gr-fallback { background: #1B1F23; border-color: #3A4049; }
    .gr-fallback a { color: #6DA4F2; }
  }
  .gr-fallback {
    max-width: 480px; margin: 32px 18px;
    background: #FFFFFF; border: 1px solid #E1E4E8; border-radius: 14px;
    box-shadow: 0 12px 32px rgba(0,0,0,0.10);
    padding: 32px;
    text-align: center;
  }
  .gr-fallback h1 {
    font-size: 22px; font-weight: 700; letter-spacing: -0.01em;
    margin: 0 0 8px;
  }
  .gr-fallback p { margin: 0 0 14px; color: #464C54; font-size: 14px; }
  @media (prefers-color-scheme: dark) {
    .gr-fallback p { color: #CBD1D9; }
  }
  .gr-fallback a {
    display: inline-block; margin-top: 8px;
    background: #003B8A; color: #fff;
    padding: 10px 18px; border-radius: 999px;
    font-weight: 600; font-size: 13px;
    text-decoration: none; transition: background 0.15s;
  }
  .gr-fallback a:hover { background: #049FD9; }
  .gr-fallback .secondary { background: transparent; color: #1D69CC; padding: 6px 12px; }
  @media (prefers-color-scheme: dark) {
    .gr-fallback .secondary { color: #6DA4F2; }
  }
  .gr-fallback code {
    font-family: 'Roboto Mono', Consolas, monospace;
    font-size: 12px; background: rgba(0,0,0,0.04); padding: 2px 6px; border-radius: 4px;
  }
  @media (prefers-color-scheme: dark) {
    .gr-fallback code { background: rgba(255,255,255,0.08); }
  }
</style>
<script>
/*  guide-reader.html — thin redirector
 *  ---------------------------------------------------------------------
 *  The standalone integration guide reader has been folded into the
 *  documentation wiki at docs.html, where every guide lives inside the
 *  same master-detail layout as the catalog use cases. Direct deep links
 *  of the historical form
 *
 *      guide-reader.html?src=docs/guides/aws.md
 *      guide-reader.html?src=docs/guides/aws.md#some-section
 *
 *  are still valid: this page parses the ``src`` and any URL hash and
 *  forwards to the canonical reader as
 *
 *      docs.html#doc=docs/guides/aws.md
 *      docs.html#doc=docs/guides/aws.md!some-section
 *
 *  using ``location.replace`` so the redirect leaves no entry in the
 *  browser history. The fallback HTML below is shown only when JS is
 *  disabled or when ``src`` is missing / invalid. */
(function () {
  'use strict';
  var qs = window.location.search || '';
  var srcMatch = qs.match(/[?&]src=([^&]+)/);
  if (!srcMatch) {
    return;
  }
  var src;
  try { src = decodeURIComponent(srcMatch[1]); } catch (_) { src = srcMatch[1]; }
  if (!/^[A-Za-z0-9_./-]+\.(md|markdown)$/.test(src)) {
    return;
  }
  var hash = window.location.hash || '';
  var anchor = '';
  if (hash && hash.length > 1) {
    var raw = hash.replace(/^#/, '');
    if (/^[A-Za-z0-9_-]+$/.test(raw)) anchor = raw;
  }
  var target = 'docs.html#doc=' + src + (anchor ? '!' + anchor : '');
  try { window.location.replace(target); }
  catch (_) { window.location.href = target; }
})();
</script>
</head>
<body>
<noscript>
  <div class="gr-fallback">
    <h1>JavaScript required</h1>
    <p>This guide reader has been folded into the documentation wiki. Open <a href="docs.html">docs.html</a> and pick the guide you want from the left sidebar.</p>
    <a href="docs.html">Open the documentation wiki &rarr;</a>
  </div>
</noscript>
<div class="gr-fallback" id="gr-fallback" style="display:none">
  <h1>Guide reader moved</h1>
  <p>The standalone guide reader is now part of the documentation wiki. Pick a guide from the left sidebar of <code>docs.html</code> &mdash; every doc renders in-page with cross-references.</p>
  <a href="docs.html">Open the documentation wiki &rarr;</a>
  <p style="margin-top:16px"><a class="secondary" href="https://github.com/fenre/splunk-monitoring-use-cases/tree/main/docs/guides">Browse guides on GitHub</a></p>
</div>
<script>
/* If we got here without a valid ?src=…, show the fallback instead of a
 * blank page. This runs only when the redirect above didn't fire. */
(function () {
  if (!window.location.search.match(/[?&]src=/)) {
    var el = document.getElementById('gr-fallback');
    if (el) el.style.display = 'block';
  }
})();
</script>
</body>

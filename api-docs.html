<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <title>Splunk Monitoring Use Cases — Catalog API</title>
  <meta name="description" content="Read-only JSON API serving 6,300+ curated Splunk monitoring use cases. OpenAPI 3.1 spec rendered with Swagger UI.">

  <link rel="stylesheet" href="vendor/swagger-ui/swagger-ui.css">
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <style>
    body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    header {
      background: #1B1B1F;
      color: #fff;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #333;
    }
    header h1 { font-size: 1.1rem; margin: 0; font-weight: 500; }
    header a { color: #62B5E5; text-decoration: none; font-size: 0.9rem; }
    header a:hover { text-decoration: underline; }
    .topbar { display: none; }
  </style>
</head>
<body>
  <header>
    <h1>Splunk Monitoring Use Cases — Catalog API</h1>
    <nav>
      <a href="index.html">Dashboard</a>
      &nbsp;·&nbsp;
      <a href="openapi.yaml">openapi.yaml</a>
      &nbsp;·&nbsp;
      <a href="https://github.com/fenre/splunk-monitoring-use-cases">GitHub</a>
    </nav>
  </header>
  <div id="swagger-ui"></div>

  <script src="vendor/swagger-ui/swagger-ui-bundle.js"></script>
  <script src="vendor/swagger-ui/swagger-ui-standalone-preset.js"></script>
  <script>
    window.addEventListener('DOMContentLoaded', function () {
      window.ui = SwaggerUIBundle({
        url: 'openapi.yaml',
        dom_id: '#swagger-ui',
        deepLinking: true,
        docExpansion: 'list',
        tagsSorter: 'alpha',
        operationsSorter: 'alpha',
        presets: [SwaggerUIBundle.presets.apis, SwaggerUIStandalonePreset],
        plugins: [SwaggerUIBundle.plugins.DownloadUrl],
        layout: 'BaseLayout',
        tryItOutEnabled: true,
        persistAuthorization: false,
      });
    });

name: Bug report
description: Something in the catalog, dashboard, build pipeline or content pack is broken.
title: "[Bug] "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. Please provide enough detail for a maintainer to reproduce
        the issue without asking follow-up questions.

  - type: dropdown
    id: area
    attributes:
      label: Affected area
      description: Where did you encounter the bug?
      options:
        - Dashboard (index.html / UI)
        - Catalog content (use-cases/*.md)
        - Build pipeline (build.py / scripts/)
        - TA content pack (TA-splunk-use-cases)
        - ITSI content pack (DA-ITSI-monitoring-use-cases)
        - ES content pack (DA-ESS-monitoring-use-cases)
        - API (openapi.yaml / api/*.json)
        - CI workflow
        - Documentation
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version affected
      description: Check the `VERSION` file or the dashboard footer.
      placeholder: "5.2"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: What did you observe? What did you expect instead?
      placeholder: |
        I ran `python3 build.py` and got ... but I expected ...
    validations:
      required: true

  - type: textarea
    id: reproducer
    attributes:
      label: Reproducer
      description: Exact steps, SPL snippet, or UC ID(s).
      placeholder: |
        1. Open UC-10.1.5
        2. Copy the SPL into a Splunk search head running 9.3.2
        3. Run with earliest -1h latest now
        4. ...
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Splunk version, browser, OS, etc. Delete what doesn't apply.
      placeholder: |
        - Splunk Enterprise 10.2.1 (non-SHC)
        - CIM 6.0.2, ES 8.1, ITSI 4.19
        - Firefox 137 / Chrome 133
        - macOS 14.5
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / errors
      description: Paste relevant stack traces or Splunk errors here.
      render: shell
    validations:
      required: false

  - type: checkboxes
    id: prerequisites
    attributes:
      label: Pre-flight
      options:
        - label: I searched existing issues before filing.
          required: true
        - label: This is not a security issue (those should go through private reporting — see SECURITY.md).
          required: true

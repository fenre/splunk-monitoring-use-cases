name: Use case feedback
description: Wrong SPL, sourcetype, TA, or typo in a specific use case.
title: "[UC Feedback] UC-"
labels: ["content", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Tip: from the [live dashboard](https://fenre.github.io/splunk-monitoring-use-cases/),
        open any use case and click **Report issue on GitHub** — the UC id, category,
        link to `use-cases/*.md`, and dashboard `#uc-…` URL are pre-filled for you.

  - type: input
    id: uc-id
    attributes:
      label: UC ID
      description: e.g. UC-10.1.5 — you can find this at the top of every use-case card.
      placeholder: "UC-10.1.5"
    validations:
      required: true

  - type: dropdown
    id: issue-type
    attributes:
      label: What is wrong?
      options:
        - Incorrect SPL (syntax, logic, will not run)
        - Wrong sourcetype / index assumption
        - Outdated TA name or Splunkbase ID
        - Incorrect MITRE ATT&CK mapping
        - Incorrect CIM / data model mapping
        - Broken reference link
        - Typo / wording
        - Missing field (KFP, Status, etc.)
        - Other
    validations:
      required: true

  - type: textarea
    id: details
    attributes:
      label: Details
      description: Describe what is wrong and paste exact SPL or field contents if relevant.
      placeholder: |
        The SPL uses `sourcetype=linux:auth` but the Splunk_TA_nix actually produces `sourcetype=linux_secure`.
    validations:
      required: true

  - type: textarea
    id: fix
    attributes:
      label: Suggested fix (optional)
      description: Correct SPL, updated link, or a link to a pull request.
    validations:
      required: false

name: Feature request
description: Suggest a new use case, new category, tooling improvement, or process change.
title: "[Feature] "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement! Before filing, please check the
        [`ROADMAP.md`](../blob/main/ROADMAP.md) — your idea may already be planned
        or explicitly declined.

  - type: dropdown
    id: scope
    attributes:
      label: Request scope
      options:
        - New use case(s)
        - New category or subcategory
        - Dashboard UX / UI improvement
        - Build pipeline / tooling
        - Content pack (TA / ITSI / ES)
        - API / OpenAPI
        - Documentation
        - Community / process
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What user need or pain point does this address?
      placeholder: |
        Splunk customers who run Oracle Exadata currently have to ...
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the feature, use case, or change in detail.
      placeholder: |
        Add a new subcategory 7.11 "Oracle Exadata monitoring" with ~20 UCs covering ...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you considered and why they are worse.
    validations:
      required: false

  - type: textarea
    id: references
    attributes:
      label: References
      description: Links to vendor docs, Splunk blogs, CIM / data models, or existing content that inspired the request.
    validations:
      required: false

  - type: checkboxes
    id: interest
    attributes:
      label: Contribution interest
      description: How would you like to be involved?
      options:
        - label: I am willing to author the initial pull request.
          required: false
        - label: I can help review the work.
          required: false
        - label: I am requesting this feature but cannot commit time myself.
          required: false

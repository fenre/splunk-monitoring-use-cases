name: False positive report
description: A use-case detection fired in your environment but was benign or incorrectly tuned.
title: "[FP Report] UC-"
labels: ["false-positive", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Use this form when a **catalogue use case behaved incorrectly in your Splunk
        deployment** — an alert fired on benign activity, a threshold was too aggressive,
        or CIM-normalised data in your environment produced a misleading result.

        This is **not** the same as [Use case feedback](https://github.com/fenre/splunk-monitoring-use-cases/issues/new?template=use-case-feedback.yml),
        which is for **catalogue content errors** (wrong SPL syntax, sourcetype, TA name,
        typo, or broken reference in the JSON sidecar).

        Read the maintainer triage process before filing:
        [`docs/false-positive-process.md`](../blob/main/docs/false-positive-process.md).

        **Redact PII, customer names, hostnames, and raw event payloads** before
        submitting — this is a public issue tracker.

  - type: input
    id: uc-id
    attributes:
      label: UC ID
      description: The use case that produced the false positive (format UC-X.Y.Z).
      placeholder: "UC-10.1.5"
    validations:
      required: true
      pattern: '^UC-\d+\.\d+\.\d+$'
      patternMismatch: "Use the format UC-X.Y.Z (e.g. UC-10.1.5)."

  - type: dropdown
    id: splunk_version
    attributes:
      label: Splunk version
      description: The Splunk platform where you observed the false positive. Options align with the catalogue `splunkVersions[]` vocabulary.
      options:
        - 8.x
        - 9.x
        - 9.0+
        - 9.1+
        - 9.2+
        - 9.3+
        - 10.x
        - Cloud
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment context
      description: Index, sourcetype, approximate event volume, and any CIM/TA context that matters. Redact customer-identifying details.
      placeholder: |
        - Index: main, sourcetype: linux_secure
        - ~50k auth events/day per search head
        - CIM Authentication data model accelerated; Splunk_TA_nix 8.9.0
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: Did an alert fire? Did a scheduled search return non-zero results? What threshold or schedule was in play?
      placeholder: |
        UC-10.1.5 alert fired twice during a planned maintenance window.
        The saved search returned 12 hosts with count > 0 over a 15-minute window.
    validations:
      required: true

  - type: textarea
    id: why-fp
    attributes:
      label: Why this is a false positive
      description: Explain why the activity was benign or why the catalogue assumption does not hold in your environment.
      placeholder: |
        Failed SSH attempts were from our vulnerability scanner service account,
        which is authorised and excluded in our runbooks but not documented in the UC.
    validations:
      required: true

  - type: textarea
    id: spl-diff
    attributes:
      label: SPL diff (optional)
      description: Paste a tuned SPL variant or threshold change that would suppress the false positive in your environment.
      render: shell
    validations:
      required: false

  - type: checkboxes
    id: cite-consent
    attributes:
      label: Citation consent
      description: Optional — helps maintainers improve `knownFalsePositives` documentation for everyone.
      options:
        - label: I agree that maintainers may cite anonymised learnings from this report in catalogue documentation (no customer names or raw event payloads).
          required: false

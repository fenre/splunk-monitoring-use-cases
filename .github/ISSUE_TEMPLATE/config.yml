# Issue chooser configuration.
# https://docs.github.com/en/communities/using-templates-to-encourage-useful-issues-and-pull-requests/configuring-issue-templates-for-your-repository#configuring-the-template-chooser
blank_issues_enabled: true
contact_links:
  - name: Security vulnerability
    url: https://github.com/fenre/splunk-monitoring-use-cases/security/advisories/new
    about: Please DO NOT open a public issue for security reports. Use GitHub's private vulnerability reporting instead.
  - name: Splunk product bug
    url: https://www.splunk.com/en_us/product-security.html
    about: For bugs in Splunk Enterprise, ITSI, or Enterprise Security themselves, report to Splunk's product security team.
  - name: Community discussion
    url: https://github.com/fenre/splunk-monitoring-use-cases/discussions
    about: Questions, ideas, and general chat belong in GitHub Discussions.

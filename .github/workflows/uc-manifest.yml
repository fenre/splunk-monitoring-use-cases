name: UC manifest

on:
  push:
    paths:
      - "use-cases/**/*.md"
      - "scripts/parse_uc_catalog.py"
      - "config/uc_to_log_family.json"
      - ".github/workflows/uc-manifest.yml"
  pull_request:
    paths:
      - "use-cases/**/*.md"
      - "scripts/parse_uc_catalog.py"
      - "config/uc_to_log_family.json"
      - ".github/workflows/uc-manifest.yml"

permissions:
  contents: read

jobs:
  generate-and-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          # Aligned with the other workflows in .github/workflows/ which
          # all standardise on 3.12 (validate.yml, uc-tests.yml, link-check.yml,
          # regulatory-watch.yml). Single-version policy avoids "works on
          # validate, fails on manifest" surprises when scripts/ uses a
          # 3.12-only feature like the new ``zoneinfo`` defaults or the
          # ``str.removeprefix`` improvements.
          python-version: "3.12"

      - name: Generate manifest-all.json
        run: python3 scripts/parse_uc_catalog.py --output /tmp/manifest-all.json --check

      - name: Validate JSON and UC count
        run: |
          python3 - <<'PY'
          import json
          with open("/tmp/manifest-all.json", encoding="utf-8") as f:
              d = json.load(f)
          n = d.get("uc_count", 0)
          assert n >= 4000, f"expected uc_count >= 4000, got {n}"
          assert len(d.get("use_cases", [])) == n
          print("ok: uc_count =", n)
          PY

      - name: HEC NDJSON generator (top 10)
        run: |
          python3 scripts/generate_manifest_samples.py --manifest eventgen_data/manifest-top10.json --output /tmp/top10.ndjson
          test -s /tmp/top10.ndjson

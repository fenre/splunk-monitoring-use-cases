name: UC manifest

on:
  push:
    paths:
      - "content/cat-*/UC-*.json"
      - "scripts/parse_uc_catalog.py"
      - "config/uc_to_log_family.json"
      - ".github/workflows/uc-manifest.yml"
  pull_request:
    paths:
      - "content/cat-*/UC-*.json"
      - "scripts/parse_uc_catalog.py"
      - "config/uc_to_log_family.json"
      - ".github/workflows/uc-manifest.yml"

permissions:
  contents: read

jobs:
  generate-and-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        # F19 (2026-05-12): centralised in the composite action so the
        # toolchain pin lives in one file instead of rippling across
        # nine workflows. The single-version (3.12) policy is now
        # enforced by the composite action's ``python-version`` default,
        # so no overrides are needed here.
        uses: ./.github/actions/setup-python

      - name: Generate manifest-all.json
        run: python3 scripts/parse_uc_catalog.py --output /tmp/manifest-all.json --check

      - name: Validate JSON and UC count
        run: |
          python3 - <<'PY'
          import json
          with open("/tmp/manifest-all.json", encoding="utf-8") as f:
              d = json.load(f)
          n = d.get("uc_count", 0)
          assert n >= 4000, f"expected uc_count >= 4000, got {n}"
          assert len(d.get("use_cases", [])) == n
          print("ok: uc_count =", n)
          PY

      - name: HEC NDJSON generator (top 10)
        # P6 (scripts taxonomy, Tier 2 batch 2, 2026-05-09): routed through the dispatcher.
        run: |
          PYTHONPATH=src python3 -m splunk_uc generate-manifest-samples \
            --manifest eventgen_data/manifest-top10.json \
            --output /tmp/top10.ndjson
          test -s /tmp/top10.ndjson

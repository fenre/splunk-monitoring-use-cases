name: Link check

on:
  schedule:
    # Run every Monday at 06:00 UTC. The audit tolerates transient outages
    # because it ignores domains registered in .link-check-ignore.
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  audit-references:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        # F19 (2026-05-12): centralised in the composite action so the
        # toolchain pin lives in one file instead of rippling across
        # nine workflows. ``splunk_uc audit-links`` is stdlib + first-
        # party, so no extras are required — preserving the prior
        # behaviour exactly.
        uses: ./.github/actions/setup-python

      - name: Run link audit
        id: audit
        # `set +e` lets the workflow keep running so we can upload logs and
        # file a tracking issue on failure.  The crux is `${PIPESTATUS[0]}`
        # — without it, `code=$?` would capture `tee`'s exit (always 0)
        # and the auditor's broken-link findings would be silently masked.
        # The final `exit 0` is intentional: the next step's `if:` gate
        # (`steps.audit.outputs.exit_code != '0'`) is the real failure
        # signal, not the step exit, so reviewers always get an issue
        # with the broken-reference list rather than a red CI run with
        # no actionable artefact.
        # P6 (scripts taxonomy, 2026-05-09): routed through the dispatcher.
        run: |
          set +e
          PYTHONPATH=src python3 -m splunk_uc audit-links 2>audit.err | tee audit.out
          code=${PIPESTATUS[0]}
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload audit logs
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: link-audit-logs
          path: |
            audit.out
            audit.err
          retention-days: 14

      - name: Open or update tracking issue on failure
        if: steps.audit.outputs.exit_code != '0'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BROKEN_COUNT=$(grep -c '^BROKEN ' audit.err || true)
          TITLE="[link-check] ${BROKEN_COUNT} broken references detected"
          BODY=$'Automated weekly link audit found broken references.\n\nTop 20 entries:\n\n```\n'
          BODY+=$(head -n 40 audit.err)
          BODY+=$'\n```\n\nRe-run with `make audit-links` (or `python3 -m splunk_uc audit-links`) locally to reproduce.'
          EXISTING=$(gh issue list --label link-check --state open --json number \
            --jq '.[0].number' || true)
          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --body "$BODY"
          else
            gh issue create \
              --title "$TITLE" \
              --label link-check \
              --body "$BODY"
          fi

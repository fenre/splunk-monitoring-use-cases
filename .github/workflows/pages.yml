# Build and deploy the Splunk monitoring use case catalog to GitHub Pages.
#
# v7.0 contract (see docs/architecture.md):
#   1. tools/build/build.py is the only entrypoint that produces dist/.
#   2. CI runs the build twice with --reproducible and asserts byte
#      identity, so every published bundle is reproducible from the
#      same source SHA.
#   3. dist/integrity.json + dist/BUILD-INFO.json are signed by the
#      GitHub OIDC identity via actions/attest-build-provenance@v4
#      (Sigstore keyless), so consumers can verify a download with:
#          gh attestation verify dist/integrity.json --owner <owner>
#   4. Quality gates (Lighthouse, axe, budgets, schema-meta, schema-diff,
#      url-freeze) live in validate.yml and block merge to main; pages.yml
#      only runs on main, so by the time a build reaches here every gate
#      has already passed.

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  attestations: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      uc-count: ${{ steps.summary.outputs.uc_count }}
      build-sha: ${{ steps.summary.outputs.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0   # need full history for git log -1 --format=%cI HEAD

      - name: Setup Python
        # F19 (2026-05-12): centralised in the composite action so the
        # toolchain pin lives in one file instead of rippling across
        # nine workflows. The build pipeline + dispatcher entrypoints
        # used by this job (tools/build, tools/audits/schema_meta,
        # asset_drift, splunk_uc generate-api-surface, splunk_uc
        # generate-evidence-packs) are stdlib + first-party, so no
        # extras are required — preserving the prior behaviour exactly.
        uses: ./.github/actions/setup-python

      - name: Pre-build audits — schema metadata
        run: python3 tools/audits/schema_meta.py

      - name: Pre-build audits — asset drift (src/ ↔ legacy index.html)
        run: python3 tools/audits/asset_drift.py --verbose

      # The ``api/`` tree is gitignored (every file under ``api/*`` except
      # ``api/README.md`` — see ``.gitignore``). ``tools/build/build.py``
      # does not regenerate it; it mirrors whatever is on disk via
      # ``_mirror_legacy_root_into_dist``. If we skip regeneration here,
      # ``dist/api/v1/compliance/*`` (clauses/, story/, regulations/ — the
      # back-end for clause-navigator.html, compliance-story.html, and
      # regulatory-primer.html's clause autolinker) and
      # ``dist/api/v1/evidence-packs/*`` never ship, and those pages 404
      # on every fetch. ``validate.yml`` only runs on ``pull_request``,
      # so a direct push to main (what pages.yml triggers on) gets none
      # of the drift checks either. We therefore invoke the two
      # generators that own the api/v1/ tree directly before the build:
      #   * ``generate-api-surface`` — owns api/v1/ (compliance/, equipment/,
      #     mitre/, oscal/, recommender/, openapi.yaml, context.jsonld,
      #     manifest.json). Internally invokes generate_clause_index.py,
      #     augment_regulation_api.py, and generate_story_payload.py for
      #     the full compliance/ subtree.
      #   * ``generate-evidence-packs`` — owns api/v1/evidence-packs/
      #     (listed in api_surface::_EXTERNAL_SUBTREES so the first
      #     generator leaves it alone).
      # P6 (scripts taxonomy, Tier 2 batch 2, 2026-05-09): both routed
      # through the dispatcher.
      - name: Regenerate api/v1/ (static JSON surface)
        run: |
          PYTHONPATH=src python3 -m splunk_uc generate-api-surface
          PYTHONPATH=src python3 -m splunk_uc generate-evidence-packs
          echo "---"
          echo "api/v1 summary:"
          find api/v1 -type f | wc -l
          echo "compliance/clauses: $(find api/v1/compliance/clauses -type f 2>/dev/null | wc -l)"
          echo "compliance/story:   $(find api/v1/compliance/story -type f 2>/dev/null | wc -l)"
          echo "compliance/regs:    $(find api/v1/compliance/regulations -type f 2>/dev/null | wc -l)"
          echo "evidence-packs:     $(find api/v1/evidence-packs -type f 2>/dev/null | wc -l)"

      - name: Build dist/ (reproducible)
        run: |
          python3 tools/build/build.py --out dist --reproducible
          echo "---"
          echo "Top-level files in dist/:"
          ls -la dist/ | head -40
          echo "---"
          echo "dist size:"
          du -sh dist/

      - name: Reproducibility check (build twice → diff)
        run: |
          python3 tools/build/build.py --out dist-rebuild --reproducible
          if ! diff -r dist dist-rebuild > /tmp/diff.out; then
            echo "::error::Build is not reproducible. See diff:" >&2
            head -200 /tmp/diff.out >&2
            exit 1
          fi
          echo "OK: two consecutive --reproducible builds are byte-identical"
          rm -rf dist-rebuild

      # Budgets, Lighthouse, axe, schema-diff and url-freeze run pre-merge
      # in validate.yml. pages.yml only runs on main, after merge,
      # so the gates have already passed.
      - name: Summary
        id: summary
        run: |
          uc_count=$(jq -r '.counts.useCases' dist/BUILD-INFO.json)
          sha=$(jq -r '.git.shortSha' dist/BUILD-INFO.json)
          echo "uc_count=$uc_count" >> "$GITHUB_OUTPUT"
          echo "sha=$sha"           >> "$GITHUB_OUTPUT"
          echo "## Build summary"            >> "$GITHUB_STEP_SUMMARY"
          echo "- UC count: $uc_count"        >> "$GITHUB_STEP_SUMMARY"
          echo "- git SHA:  $sha"             >> "$GITHUB_STEP_SUMMARY"
          echo "- size:     $(du -sh dist/ | cut -f1)" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload integrity manifest as workflow artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: integrity-manifest
          path: |
            dist/integrity.json
            dist/BUILD-INFO.json
          retention-days: 90

      # Sigstore keyless attestation of the integrity manifest. Verifiable with
      #   gh attestation verify dist/integrity.json --owner <owner>
      - name: Sign integrity manifest (Sigstore via OIDC)
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: dist/integrity.json

      - name: Setup Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0

# Deploy the use case dashboard to GitHub Pages.
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Regenerate every artefact that is advertised by `openapi.yaml` but
      # NOT tracked in git (primarily `api/cat-N.json` + `api/index.json`,
      # which are in `.gitignore` because they bloat the history).
      #
      # `build.py` uses stdlib only and internally chains
      # `scripts/build_provenance.py` + `scripts/generate_scorecard.py`, so
      # `catalog.json`, `provenance.json`, `scorecard.json`, `data.js`,
      # `llms.txt`, `llms-full.txt`, `sitemap.xml` and `api/*.json` are all
      # regenerated deterministically here, shadowing the tracked copies.
      - name: Build catalog + static API slices
        run: |
          python3 build.py
          echo "---"
          echo "Generated api/ endpoints:"
          ls -lh api/ | head -30

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

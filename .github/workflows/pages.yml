# Build and deploy the Splunk monitoring use case catalog to GitHub Pages.
#
# v7.0 contract (see docs/architecture.md):
#   1. tools/build/build.py is the only entrypoint that produces dist/.
#   2. CI runs the build twice with --reproducible and asserts byte
#      identity, so every published bundle is reproducible from the
#      same source SHA.
#   3. dist/integrity.json + dist/BUILD-INFO.json are signed by the
#      GitHub OIDC identity via actions/attest-build-provenance@v4
#      (Sigstore keyless), so consumers can verify a download with:
#          gh attestation verify dist/integrity.json --owner <owner>
#   4. Quality gates (Lighthouse, axe, budgets, schema-meta, schema-diff,
#      url-freeze) live in validate.yml and block merge to main; pages.yml
#      only runs on main, so by the time a build reaches here every gate
#      has already passed.

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  attestations: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      uc-count: ${{ steps.summary.outputs.uc_count }}
      build-sha: ${{ steps.summary.outputs.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0   # need full history for git log -1 --format=%cI HEAD

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Pre-build audits — schema metadata
        run: python3 tools/audits/schema_meta.py

      - name: Pre-build audits — asset drift (src/ ↔ legacy index.html)
        run: python3 tools/audits/asset_drift.py --verbose

      - name: Build dist/ (reproducible)
        run: |
          python3 tools/build/build.py --out dist --reproducible
          echo "---"
          echo "Top-level files in dist/:"
          ls -la dist/ | head -40
          echo "---"
          echo "dist size:"
          du -sh dist/

      - name: Reproducibility check (build twice → diff)
        run: |
          python3 tools/build/build.py --out dist-rebuild --reproducible
          if ! diff -r dist dist-rebuild > /tmp/diff.out; then
            echo "::error::Build is not reproducible. See diff:" >&2
            head -200 /tmp/diff.out >&2
            exit 1
          fi
          echo "OK: two consecutive --reproducible builds are byte-identical"
          rm -rf dist-rebuild

      # Budgets, Lighthouse, axe, schema-diff and url-freeze run pre-merge
      # in validate.yml. pages.yml only runs on main, after merge,
      # so the gates have already passed.
      - name: Summary
        id: summary
        run: |
          uc_count=$(jq -r '.counts.useCases' dist/BUILD-INFO.json)
          sha=$(jq -r '.git.shortSha' dist/BUILD-INFO.json)
          echo "uc_count=$uc_count" >> "$GITHUB_OUTPUT"
          echo "sha=$sha"           >> "$GITHUB_OUTPUT"
          echo "## Build summary"            >> "$GITHUB_STEP_SUMMARY"
          echo "- UC count: $uc_count"        >> "$GITHUB_STEP_SUMMARY"
          echo "- git SHA:  $sha"             >> "$GITHUB_STEP_SUMMARY"
          echo "- size:     $(du -sh dist/ | cut -f1)" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload integrity manifest as workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: integrity-manifest
          path: |
            dist/integrity.json
            dist/BUILD-INFO.json
          retention-days: 90

      # Sigstore keyless attestation of the integrity manifest. Verifiable with
      #   gh attestation verify dist/integrity.json --owner <owner>
      - name: Sign integrity manifest (Sigstore via OIDC)
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: dist/integrity.json

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

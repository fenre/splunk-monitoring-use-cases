# CodeQL configuration
#
# Repo-overhaul plan §P2 (2026-05-08): scopes CodeQL analysis to
# first-party code only, excluding vendored upstream libraries,
# generated artefacts, and large data fixtures that would slow the
# analysis without producing actionable results.

name: "splunk-uc-codeql"

paths:
  - "tools/build"
  - "scripts"
  - "tests"
  - "mcp/src"
  - "src/scripts"
  - "public"

paths-ignore:
  # Generated/cached artefacts — analysis on these is misleading and slow.
  # The legacy root-level ``data.js`` was retired in v8.2.0
  # (commit faffd68e4); ``dist/data.js`` is now generated then
  # immediately evicted by tools/build/build.py.
  - "dist"
  - "dist-before"
  - "dist-rebuild"
  - "**/__pycache__"
  - "**/*.egg-info"

  # Vendored or third-party code we don't own.
  - "vendor"
  - "node_modules"

  # Sample fixtures — they're scaffolding, not production code.
  - "samples"
  - "sample-data"
  - "templates"

  # Build outputs and logs.
  - "build"  # the ``build/`` directory is the legacy SSG output, not the package
  - "**/.pytest_cache"
  - "**/.mypy_cache"
  - "**/.ruff_cache"

# query-filters lets us suppress noisy rules across the whole codebase.
# Currently empty — add entries here only with a written justification
# and a docs/architecture reference, never to silence genuine findings.
query-filters: []

# Dependabot configuration for splunk-monitoring-use-cases.
#
# This file is the missing-but-promised companion to
# .github/workflows/uc-tests.yml, whose comment reads:
#
#   # Pinned digest is updated by Dependabot via the
#   # docker ecosystem entry in .github/dependabot.yml.
#
# Ecosystems covered here:
#
#  * github-actions — every workflow in .github/workflows/ pins third-party
#    actions by major-version tag (actions/checkout@v4 etc.).  Dependabot
#    will open weekly PRs when a new minor/patch is published so we keep
#    pace with security fixes (e.g. CVE-2025-3xxxx in actions/checkout)
#    without needing a human to remember to bump.
#
#  * docker — the ``services.splunk`` block in .github/workflows/uc-tests.yml
#    runs ``splunk/splunk:9.4.1`` to validate UC fixtures end-to-end.  The
#    digest is the security-relevant part; Dependabot will replace
#    ``splunk/splunk:9.4.1`` with ``splunk/splunk:9.4.1@sha256:...`` and
#    keep the pin fresh as Splunk publish patch releases on the same tag.
#
#  * npm — root ``package.json`` / ``package-lock.json`` (site tooling, CI
#    devDependencies, recommender/scorecard tests).
#
#  * pip — Python dependencies under ``mcp/`` (see pip note below).
#
# Pull requests are intentionally kept low-volume:
#
#  * weekly schedule (Mondays 06:00 UTC)
#  * single open PR per ecosystem (avoids review thrash)
#  * grouped by ecosystem so reviewers see one combined update
#
# ``pip`` updates for the MCP server are tracked via the ``package-ecosystem:
# pip`` entry with ``directory: /mcp`` (pyproject.toml, requirements-lock.txt,
# etc.), so dependency PRs stay scoped to that subtree.

version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 1
    groups:
      github-actions:
        patterns:
          - "*"
    labels:
      - "dependencies"
      - "github_actions"

  - package-ecosystem: "docker"
    # Dockerfile-style detection looks at all directories — the only Docker
    # reference we have today is the ``services.splunk`` image in
    # .github/workflows/uc-tests.yml, which is picked up via the
    # github-actions ecosystem above for the workflow itself, but the
    # tag/digest for ``splunk/splunk:9.4.1`` lives in the workflow YAML
    # rather than a Dockerfile, so this entry is currently a no-op for
    # detection purposes.  We keep it declared so the next time someone
    # adds a real Dockerfile (e.g. a self-hosted runner image, a CI
    # helper) Dependabot picks it up automatically without a config edit.
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 1
    labels:
      - "dependencies"
      - "docker"

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 1
    groups:
      npm-deps:
        patterns:
          - "*"
    labels:
      - "dependencies"
      - "javascript"

  - package-ecosystem: "pip"
    directory: "/mcp"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 1
    labels:
      - "dependencies"
      - "python"

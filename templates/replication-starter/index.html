<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Replication Starter Catalog</title>
  <style>
    :root { color-scheme: light dark; }
    body { font-family: system-ui, sans-serif; max-width: 900px; margin: 2rem auto; padding: 0 1rem; }
    h1 { margin-bottom: 0; }
    .meta { color: #888; }
    input[type=search] { width: 100%; padding: 0.5rem; margin: 1rem 0; font-size: 1rem; }
    .cat { margin-top: 2rem; }
    .sub { margin-top: 1rem; }
    .uc { border: 1px solid #ccc; border-radius: 6px; padding: 0.75rem 1rem; margin: 0.5rem 0; }
    .uc h3 { margin: 0 0 0.25rem 0; font-size: 1rem; }
    .uc .fields { font-size: 0.875rem; color: #555; }
    @media (prefers-color-scheme: dark) { .uc { border-color: #444; } .uc .fields { color: #aaa; } .meta { color: #aaa; } }
  </style>
</head>
<body>
  <h1>Catalog</h1>
  <p class="meta">A minimal replication-starter dashboard. See <a href="../../docs/replication-guide.md">the replication guide</a> for the full reference.</p>
  <input id="q" type="search" placeholder="Filter by title…" autocomplete="off">
  <div id="cats"></div>

  <script src="data.js"></script>
  <script>
    const cats = document.getElementById('cats');
    function render(query) {
      const q = (query || '').toLowerCase();
      cats.innerHTML = '';
      for (const cat of DATA) {
        const catEl = document.createElement('section');
        catEl.className = 'cat';
        catEl.innerHTML = `<h2>${cat.i}. ${cat.n}</h2>`;
        let shown = 0;
        for (const sub of (cat.s || [])) {
          const subEl = document.createElement('div');
          subEl.className = 'sub';
          subEl.innerHTML = `<h3>${sub.i} ${sub.n}</h3>`;
          for (const uc of (sub.u || [])) {
            if (q && !(`UC-${uc.i} ${uc.n}`.toLowerCase().includes(q))) continue;
            const el = document.createElement('article');
            el.className = 'uc';
            const fields = Object.entries(uc)
              .filter(([k]) => !['i', 'n'].includes(k))
              .map(([k, v]) => `<div><strong>${k}:</strong> ${String(v).slice(0, 200)}</div>`)
              .join('');
            el.innerHTML = `<h3>UC-${uc.i} — ${uc.n}</h3><div class="fields">${fields}</div>`;
            subEl.appendChild(el);
            shown++;
          }
          if (subEl.children.length > 1) catEl.appendChild(subEl);
        }
        if (shown > 0) cats.appendChild(catEl);
      }
    }
    document.getElementById('q').addEventListener('input', (e) => render(e.target.value));
    render('');
  </script>
</body>
</html>

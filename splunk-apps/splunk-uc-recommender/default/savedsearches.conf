description = DORA ICT Third-Party Exit Strategy Readiness | UC 22.3.18 | regulations=DORA | criticality=high | clauses=Art.28(8) | Bundled by splunk-uc-recommender. Disabled by default — review SPL and adjust index= filters before enabling.

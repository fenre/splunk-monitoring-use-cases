description = NIS2 Art.23 — Significant Incident Reporting Package Completeness and Timeline Control | UC 22.2.49 | regulations=NIS2 | criticality=critical | clauses=Art.23; Art.23(1); Art.23(10); Art.23(11); Art.23(2); Art.23(3)(a); Art.23(3)(b); Art.23(4)(a); Art.23(4)(b); Art.23(4)(c); Art.23(4)(d); Art.23(4)(e); Art.23(5); Art.23(6); Art.23(7) | Bundled by splunk-uc-recommender. Disabled by default — review SPL and adjust index= filters before enabling.

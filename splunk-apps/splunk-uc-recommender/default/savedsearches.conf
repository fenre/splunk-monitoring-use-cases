description = AWIA Section 1433(c) ERP coordination — evidence the Emergency Response Plan is coordinated with state, local, tribal, and territorial partners | UC 22.53.4 | regulations=AWIA | criticality=high | clauses=AWIA-s1433c | Bundled by splunk-uc-recommender. Disabled by default — review SPL and adjust index= filters before enabling.

description = SOCI CIRMP Rule 8(2) sanctions & FOCI screening — detect supplier or beneficial-owner additions to sanctions / consolidated lists | UC 22.52.19 | regulations=SOCI Act | criticality=critical | clauses=SOCI-CIRMP-r8.2 | Bundled by splunk-uc-recommender. Disabled by default — review SPL and adjust index= filters before enabling.

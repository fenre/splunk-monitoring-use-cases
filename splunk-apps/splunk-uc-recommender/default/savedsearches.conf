description = France LPM 24h cyber-incident reporting to ANSSI via CERT-FR — automated submission + receipt evidence | UC 22.58.2 | regulations=France LPM (OIV) | criticality=critical | clauses=FR-ANSSI-rule-incident-reporting | Bundled by splunk-uc-recommender. Disabled by default — review SPL and adjust index= filters before enabling.

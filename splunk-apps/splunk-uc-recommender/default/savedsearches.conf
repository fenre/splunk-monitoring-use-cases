description = Cisco ISE Deployment Replication Health and PSN Sync Lag | UC 17.1.28 | regulations=DORA,ISO 27001,NIS2,NIST 800-53,SOC 2 | criticality=high | clauses=A.5.30; A1.2; Art.21(2)(g); Art.5; CP-7 | Bundled by splunk-uc-recommender. Disabled by default — review SPL and adjust index= filters before enabling.
search = index=nac sourcetype="cisco:ise:syslog" ("ReplicationStatus" OR MessageCode IN (60100, 60101, 60102, 60103, 60110, 60111)) \
| rex "NodeName=(?<node>[^,\s]+)" \
| rex "NodePersona=(?<persona>[^,\s]+)" \
| rex "ReplicationStatus=(?<repl_status>[^,\s]+)" \
| rex "SyncQueueSize=(?<queue_size>\d+)" \
| rex "LastSyncDelta=(?<delta_seconds>\d+)" \
| eval delta_seconds = coalesce(tonumber(delta_seconds), 0) \
| stats latest(repl_status) as repl_status latest(queue_size) as queue_size max(delta_seconds) as max_lag_seconds latest(_time) as last_event by node, persona \
| eval lag_minutes = round(max_lag_seconds/60, 1) \
| where repl_status != "In Sync" OR lag_minutes > 5 OR queue_size > 100 \
| sort - lag_minutes

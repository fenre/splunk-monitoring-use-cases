description = Cisco ISE Certificate Expiry and Trust-Chain Health | UC 17.1.31 | regulations=HIPAA Security,ISO 27001,NIS2,NIST 800-53,PCI DSS | criticality=high | clauses=12.3.3; 4.2; A.8.24; Art.21(2)(h); SC-12; SC-17; §164.312(e)(1) | Bundled by splunk-uc-recommender. Disabled by default — review SPL and adjust index= filters before enabling.
search = (index=nac sourcetype="cisco:ise:syslog" MessageCode IN (52055, 52056, 60520)) OR (index=nac sourcetype="cisco:ise:cert_inventory") \
| eval days_until_expiry = round((strptime(valid_to, "%Y-%m-%dT%H:%M:%S") - now()) / 86400, 0) \
| where (sourcetype="cisco:ise:cert_inventory" AND days_until_expiry < 60) OR (sourcetype="cisco:ise:syslog") \
| eval severity = case( \
    days_until_expiry < 7, "CRITICAL", \
    days_until_expiry < 14, "HIGH", \
    days_until_expiry < 30, "MEDIUM", \
    days_until_expiry < 60, "LOW", \
    MessageCode=="52055" OR MessageCode=="52056", "HIGH", \
    true(), "INFO") \
| stats min(days_until_expiry) as days_left, latest(valid_to) as expires, latest(usage) as usage, latest(severity) as severity, latest(_time) as last_seen by node, subject, issuer \
| where severity != "INFO" \
| sort + days_left

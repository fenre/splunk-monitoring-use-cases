description = EASA Part-IS Information Security Management System (ISMS) audit-evidence register and scope coverage - IS.OR.200 + IS.OR.245 cross-organisation roll-up | UC 22.60.14 | regulations=DO-326A / ED-202A | criticality=critical | clauses=DO-326A-s4-2; EASA-Part-IS-IS-OR-200; EASA-Part-IS-IS-OR-205; EASA-Part-IS-IS-OR-245 | Bundled by splunk-uc-recommender. Disabled by default — review SPL and adjust index= filters before enabling.

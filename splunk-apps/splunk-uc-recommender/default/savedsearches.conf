description = TSA-SD-Pipeline Cybersecurity Coordinator (CC) + Alternate roster — 24×7 cover, SSI eligibility, and 7-day-notice-of-change surveillance | UC 22.56.2 | regulations=TSA Surface SDs | criticality=high | clauses=TSA-SD-P-2021-01-s3 | Bundled by splunk-uc-recommender. Disabled by default — review SPL and adjust index= filters before enabling.

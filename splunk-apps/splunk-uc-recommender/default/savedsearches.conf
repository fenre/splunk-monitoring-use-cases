description = CIIO Reg. Art. 14 + Cybersecurity Review Measures 2022 — pre-procurement Cybersecurity Review filing tracker for CIIO network products and services | UC 22.61.10 | regulations=CN CSL / DSL / PIPL | criticality=critical | clauses=CIIO-Reg-Art-14 | Bundled by splunk-uc-recommender. Disabled by default — review SPL and adjust index= filters before enabling.
search = | inputlookup cn_csrm_filings_lookup \

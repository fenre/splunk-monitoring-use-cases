description = CIRCIA Report-Content Template Validator — every submission includes the 11 NPRM §226.8 required elements before transmission | UC 22.54.12 | regulations=CIRCIA | criticality=high | clauses=CIRCIA-NPRM-report-content | Bundled by splunk-uc-recommender. Disabled by default — review SPL and adjust index= filters before enabling.

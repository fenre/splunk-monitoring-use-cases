description = CIRCIA OT / ICS / SCADA Incident Detection — industrial-environment substantial-incident triggers wired into the CIRCIA flow | UC 22.54.21 | regulations=CIRCIA | criticality=critical | clauses=CIRCIA-CISA-ot-incident | Bundled by splunk-uc-recommender. Disabled by default — review SPL and adjust index= filters before enabling.
search = (index=ot_security sourcetype IN ("cisco:cybervision:event", "claroty:ctd:event", "claroty:xdome:alert", "nozomi:guardian:event", "nozomi:vantage:alert", "dragos:platform:event")) \
    OR (index=ot_plc sourcetype="safety:bypass") \
| where severity IN ("high", "critical") OR alert_category IN ("unauthorized_write", "plc_program_change", "safety_bypass", "protocol_anomaly") \
| eval ot_site_id = coalesce(site_id, ot_zone, plc_site) \
| lookup circia_entity_register_lookup entity_id AS ot_site_owner OUTPUT entity_status circia_relevant \
| where circia_relevant=true AND entity_status="active" \

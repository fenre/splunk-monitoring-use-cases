[UC-22.2.48 — NIS2 Art.20/21 governance — Board approval, management training and risk acceptance evidence]
description = NIS2 Art.20/21 governance — Board approval, management training and risk acceptance evidence | UC 22.2.48 | regulations=NIS2 | criticality=critical | clauses=Art.20; Art.20(1); Art.20(2); Art.21(1); Art.21(4) | Bundled by splunk-uc-recommender. Disabled by default — review SPL and adjust index= filters before enabling.

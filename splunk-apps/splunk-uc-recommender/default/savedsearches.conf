description = NIS2 Backup Management and Disaster Recovery Verification | UC 22.2.17 | regulations=NIS2 | criticality=critical | clauses=Art.21(2)(c) | Bundled by splunk-uc-recommender. Disabled by default — review SPL and adjust index= filters before enabling.
search = (index=backup sourcetype=backup:job_status earliest=-14d@d) OR (index=backup sourcetype=backup:restore_test earliest=-120d@d) \
| eval system_key=coalesce(host,target_system,vm_name,client_name) \
| eval lane=if(sourcetype="backup:job_status","backup_job","restore_test") \
| lookup nis2_backup_schedule system_name AS system_key OUTPUT backup_policy, rpo_hours, rto_hours, last_successful_backup \

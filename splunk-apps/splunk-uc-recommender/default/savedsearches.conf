description = Maritime cyber-incident detection + flag-State + RO + USCG NRC + port-State 24-hour reporting clock — automated multi-authority notification with submission receipts | UC 22.59.13 | regulations=IMO MSC.428(98) | criticality=critical | clauses=IMO-ISM-Code-s8-2; IMO-MSC-FAL-Circ-3-s2-4 | Bundled by splunk-uc-recommender. Disabled by default — review SPL and adjust index= filters before enabling.

description = CIRCIA + SEC Form 8-K Item 1.05 Materiality-Triangulation — every public-issuer incident is dual-tracked for SEC + CIRCIA | UC 22.54.23 | regulations=CIRCIA | criticality=critical | clauses=CIRCIA-CISA-sec-form-8-k | Bundled by splunk-uc-recommender. Disabled by default — review SPL and adjust index= filters before enabling.

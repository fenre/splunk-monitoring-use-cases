description = Cisco ISE License Consumption, Endpoint Capacity and MnT Log Retention | UC 17.1.32 | regulations=HIPAA Security,ISO 27001,PCI DSS,SOX ITGC | criticality=high | clauses=10.5.1; A.5.32; A.5.33; A.8.6; ITGC.AccessMgmt.Privileged; §164.316(b)(2) | Bundled by splunk-uc-recommender. Disabled by default — review SPL and adjust index= filters before enabling.

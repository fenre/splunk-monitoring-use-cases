[UC-22.54.5 — CIRCIA Records-Preservation Activation — freeze and retain every artefact relevant to a reported incident for at least 2 years]
description = CIRCIA Records-Preservation Activation — freeze and retain every artefact relevant to a reported incident for at least 2 years | UC 22.54.5 | regulations=CIRCIA | criticality=high | clauses=CIRCIA-NPRM-data-preservation; CIRCIA-s2242f | Bundled by splunk-uc-recommender. Disabled by default — review SPL and adjust index= filters before enabling.

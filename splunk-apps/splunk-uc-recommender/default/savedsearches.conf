description = CIRCIA 72-Hour Clock Determination-Point Detection — timestamp the 'reasonably believes' decision with auditable provenance | UC 22.54.10 | regulations=CIRCIA | criticality=critical | clauses=CIRCIA-NPRM-72hr-reporting | Bundled by splunk-uc-recommender. Disabled by default — review SPL and adjust index= filters before enabling.
search = index=itsm sourcetype="snow:sn_si_incident" circia_classification="reportable_72h_clock" earliest=-30d@d \
| rename _time AS sir_opened_at \
| eval reasonable_belief_epoch = strptime(reasonable_belief_at, "%Y-%m-%dT%H:%M:%S.%QZ") \

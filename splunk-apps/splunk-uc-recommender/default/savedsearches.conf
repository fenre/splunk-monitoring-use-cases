description = DO-326A Plan for Security Aspects of Certification (PSecAA) register and milestone tracker for type certifications and major modifications, with FAA / EASA finding-of-non-compliance early-warning | UC 22.60.1 | regulations=DO-326A / ED-202A | criticality=critical | clauses=DO-326A-s2-2; EASA-AMC-20-42-s4; FAA-AC-20-186-s5 | Bundled by splunk-uc-recommender. Disabled by default — review SPL and adjust index= filters before enabling.
search = | inputlookup do326a_psecaa_lookup \
| eval now_ts = now() \
| eval days_to_due = round((milestone_due_date - now_ts) / 86400, 1) \

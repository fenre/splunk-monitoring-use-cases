description = Airworthiness Directive (AD) and Service Bulletin (SB) security-related operator compliance tracker - DO-355A + EASA Part-IS overdue-AD risk score with grounding-risk modeling | UC 22.60.5 | regulations=DO-326A / ED-202A | criticality=critical | clauses=DO-355A-s2-1; EASA-Part-IS-IS-OR-205 | Bundled by splunk-uc-recommender. Disabled by default — review SPL and adjust index= filters before enabling.
search = | inputlookup do355a_sb_ad_lookup \
| where security_relevant = "true" \
| join type=outer ad_or_sb_id airframe_type [ \
    | inputlookup do326a_fleet_lookup \
    | where in_service = "true" \
    | rename airframe_type AS fleet_airframe_type \
    | eval airframe_type = fleet_airframe_type \
    | stats values(tail_number) AS affected_tails count AS affected_tails_count by airframe_type ] \
| eval ad_or_sb_id = ad_or_sb_id \
| join type=outer ad_or_sb_id [ \
    | inputlookup do355a_compliance_records_lookup \

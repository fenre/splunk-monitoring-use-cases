description = NIS2 Safety System Integrity Monitoring (SIL / SIS Interlocks) | UC 22.2.40 | regulation=nis2 | criticality=critical | clauses=Art.21(2)(c)
search = (index=ot_safety (sourcetype=sis:status OR sourcetype=edge_hub:modbus OR sourcetype=sis:change_log)) earliest=-30d \

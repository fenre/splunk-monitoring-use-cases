description = NIS2 Business Continuity and Crisis Management Monitoring | UC 22.2.4 | regulation=nis2 | criticality=critical | clauses=Art.21(2)(c)
search = (index=itsm (sourcetype=snow:sn_grc_policy OR (sourcetype=snow:task category=bcp_review)) earliest=-180d@d) OR (index=itsi sourcetype=itsi:service_health is_drill=1 earliest=-24h) \

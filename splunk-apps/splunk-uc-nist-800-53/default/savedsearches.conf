[UC-9.1.3 — Privileged Group Membership Changes]
description = Privileged Group Membership Changes | UC 9.1.3 | regulation=nist-800-53 | criticality=critical | clauses=AC-2(7)
search = index=wineventlog sourcetype="WinEventLog:Security" EventCode IN (4728,4732,4756) \
| search TargetUserName IN ("Domain Admins","Enterprise Admins","Schema Admins","Administrators") \
| table _time, MemberName, TargetUserName, SubjectUserName

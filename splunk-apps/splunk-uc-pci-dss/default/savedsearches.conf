description = NSC Configuration Change Correlation to Change Tickets | UC 22.11.2 | regulation=pci-dss | criticality=critical | clauses=1.2.1
search = index=netfw sourcetype="pan:config" earliest=-7d \
| eval chg_hint=if(match(_raw,"CHG\\d{7}"),replace(_raw,".*?(CHG\\d{7}).*","\\1"),null()) \
| where isnotnull(chg_hint) \
| join type=left max=1 chg_hint [ \

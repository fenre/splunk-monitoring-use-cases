description = ISO/IEC 27001:2022 Clause 7.2 — Competence evidence: role-based training completion | UC 22.6.53 | regulation=iso-27001 | criticality=medium | clauses=7.2
search = index=hr sourcetype=hr:role_assignment earliest=-30d \

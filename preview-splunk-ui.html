<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Splunk Infrastructure Monitoring — Use Case Repository (Splunk UI Preview)</title>
<!-- Splunk Design System–aligned: design tokens, typography, accessibility (WCAG), component styling -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Inconsolata:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ==========================================================================
   Splunk Design System–inspired tokens (splunkui.splunk.com)
   - Design tokens: colors, typography, spacing (8px grid), elevation, borders
   - Accessibility: WCAG contrast, focus rings, color+ (labels with color)
   - Typography: Splunk Platform Sans–like (Source Sans 3), mono (Inconsolata)
   ========================================================================== */
:root {
  /* Surfaces (dark theme) */
  --splunk-bg-base: #1a1d21;
  --splunk-bg-surface: #25282c;
  --splunk-bg-elevated: #2d3136;
  --splunk-bg-overlay: #363a40;
  /* Borders */
  --splunk-border-subtle: #3d4249;
  --splunk-border-default: #4a5058;
  --splunk-border-strong: #5c636b;
  /* Text */
  --splunk-text-primary: #e8e8e8;
  --splunk-text-secondary: #9e9e9e;
  --splunk-text-tertiary: #6b7280;
  /* Brand / accent */
  --splunk-green: #00b07c;
  --splunk-green-hover: #00c98a;
  --splunk-green-muted: rgba(0, 176, 124, 0.15);
  /* Semantic (with sufficient contrast for color+) */
  --splunk-critical: #e74c3c;
  --splunk-high: #f39c12;
  --splunk-medium: #f1c40f;
  --splunk-low: #27ae60;
  /* Spacing (8px grid) */
  --space-1: 4px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 20px;
  --space-6: 24px;
  --space-8: 32px;
  /* Typography */
  --font-sans: 'Source Sans 3', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --font-mono: 'Inconsolata', 'JetBrains Mono', ui-monospace, monospace;
  --text-xs: 11px;
  --text-sm: 13px;
  --text-base: 14px;
  --text-lg: 16px;
  --text-xl: 20px;
  --text-2xl: 24px;
  --line-tight: 1.25;
  --line-normal: 1.5;
  /* Radius / elevation */
  --radius-sm: 4px;
  --radius-md: 6px;
  --radius-lg: 8px;
  --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.2);
  --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.25);
  --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.3);
  /* Focus (accessibility) */
  --focus-ring: 0 0 0 3px rgba(0, 176, 124, 0.35);
  /* Aliases for JS-generated content that references original vars */
  --text-dim: var(--splunk-text-secondary);
  --accent: var(--splunk-green);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--font-sans);
  font-size: var(--text-base);
  line-height: var(--line-normal);
  background: var(--splunk-bg-base);
  color: var(--splunk-text-primary);
  min-height: 100vh;
  overflow-x: hidden;
}

.bg-gradient {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: -1;
  background: var(--splunk-bg-base);
}
.bg-orbs { display: none; }

/* Cards: flat surface, clear border (design tokens) */
.glass {
  background: var(--splunk-bg-surface);
  border: 1px solid var(--splunk-border-subtle);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-sm);
  transition: border-color 0.2s ease, box-shadow 0.2s ease;
}
.glass:hover {
  border-color: var(--splunk-border-default);
  box-shadow: var(--shadow-md);
}

/* Header */
header {
  padding: var(--space-3) var(--space-8);
  position: sticky; top: 0; z-index: 100;
  background: var(--splunk-bg-surface);
  border-bottom: 1px solid var(--splunk-border-subtle);
}
.header-inner {
  max-width: 1600px; margin: 0 auto;
  display: flex; align-items: center; gap: var(--space-6); flex-wrap: wrap;
}
.logo {
  display: flex; align-items: center; gap: var(--space-3); flex-shrink: 0;
}
.logo-icon {
  width: 36px; height: 36px; border-radius: var(--radius-md);
  background: var(--splunk-green);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; font-weight: 700; color: #fff;
}
.logo h1 {
  font-size: var(--text-lg); font-weight: 600; color: var(--splunk-text-primary);
  letter-spacing: -0.02em;
}
.logo .subtitle {
  font-size: var(--text-xs); color: var(--splunk-text-secondary); font-weight: 400;
}

/* Search — Splunk-style search bar */
.search-wrap {
  flex: 1; min-width: 280px; max-width: 480px; position: relative;
}
.search-wrap input {
  width: 100%; padding: var(--space-2) var(--space-4) var(--space-2) 40px;
  background: var(--splunk-bg-base);
  border: 1px solid var(--splunk-border-subtle);
  border-radius: var(--radius-md);
  color: var(--splunk-text-primary);
  font-size: var(--text-base); font-family: inherit;
  transition: border-color 0.2s, box-shadow 0.2s;
  outline: none;
}
.search-wrap input:hover { border-color: var(--splunk-border-default); }
.search-wrap input:focus {
  border-color: var(--splunk-green);
  box-shadow: var(--focus-ring);
}
.search-wrap input::placeholder { color: var(--splunk-text-tertiary); }
.search-icon {
  position: absolute; left: var(--space-3); top: 50%; transform: translateY(-50%);
  color: var(--splunk-text-tertiary); font-size: 16px;
}

.header-stat {
  font-size: var(--text-sm); color: var(--splunk-text-secondary);
  display: flex; align-items: center; gap: var(--space-1); flex-shrink: 0;
}
.header-stat .num { font-weight: 600; color: var(--splunk-green); font-size: var(--text-base); }

/* Layout — sidebar and main align on same top and shared column grid */
.app-layout {
  max-width: 1600px; margin: 0 auto; padding: var(--space-6);
  display: grid;
  grid-template-columns: 280px 1fr;
  gap: var(--space-6);
  align-items: start;
  min-height: calc(100vh - 100px);
}

/* Sidebar — nav list styling */
.sidebar {
  width: 280px; flex-shrink: 0; position: sticky; top: 100px;
  max-height: calc(100vh - 124px); overflow-y: auto;
  padding: var(--space-4);
  scrollbar-width: thin;
  scrollbar-color: var(--splunk-border-default) transparent;
}
.sidebar .cat-item:first-child { margin-top: 0; }
.sidebar::-webkit-scrollbar { width: 6px; }
.sidebar::-webkit-scrollbar-thumb { background: var(--splunk-border-default); border-radius: 3px; }

.cat-item {
  padding: var(--space-2) var(--space-3);
  border-radius: var(--radius-md);
  cursor: pointer;
  margin-bottom: var(--space-1);
  transition: background 0.15s ease;
  display: flex; align-items: center; gap: var(--space-2);
  font-size: var(--text-sm); font-weight: 400; color: var(--splunk-text-secondary);
}
.cat-item:hover { background: var(--splunk-bg-elevated); color: var(--splunk-text-primary); }
.cat-item:focus-visible { outline: 2px solid var(--splunk-green); outline-offset: 2px; }
.cat-item.active {
  background: var(--splunk-green-muted);
  color: var(--splunk-text-primary);
  font-weight: 600;
  border: 1px solid rgba(0, 176, 124, 0.35);
}
.cat-num {
  width: 24px; height: 24px; border-radius: var(--radius-sm);
  background: var(--splunk-bg-elevated);
  display: flex; align-items: center; justify-content: center;
  font-size: var(--text-xs); font-weight: 600; flex-shrink: 0;
  color: var(--splunk-green);
}
.cat-item.active .cat-num {
  background: var(--splunk-green);
  color: #fff;
}
.cat-count {
  margin-left: auto; font-size: var(--text-xs); color: var(--splunk-text-tertiary);
  background: var(--splunk-bg-elevated); padding: 2px var(--space-2);
  border-radius: var(--radius-sm);
}
.cat-chevron {
  margin-left: var(--space-1); font-size: 10px; color: var(--splunk-text-tertiary);
  transition: transform 0.2s ease; flex-shrink: 0;
}
.cat-item.active .cat-chevron { transform: rotate(90deg); }
.subcat-list {
  max-height: 0; overflow: hidden; transition: max-height 0.25s ease;
  margin-left: var(--space-4); border-left: 1px solid var(--splunk-border-subtle);
}
.subcat-list.open { max-height: 2000px; }
.subcat-item {
  padding: var(--space-1) var(--space-3);
  border-radius: var(--radius-sm);
  cursor: pointer;
  margin: 1px 0;
  font-size: var(--text-sm);
  color: var(--splunk-text-secondary);
  transition: background 0.15s ease;
  display: flex; align-items: center; gap: var(--space-2);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.subcat-item:hover { background: var(--splunk-bg-elevated); color: var(--splunk-text-primary); }
.subcat-item.active {
  background: var(--splunk-green-muted);
  color: var(--splunk-green);
  font-weight: 500;
}
.subcat-item .sc-count { margin-left: auto; font-size: var(--text-xs); color: var(--splunk-text-tertiary); flex-shrink: 0; }

/* Main content — align with sidebar: same top (cards align), same left gutter (16px) */
.main-content {
  min-width: 0;
  padding: 0 0 0 var(--space-4);
}
.main-content > .glass:first-child,
.main-content > .ov-hero:first-child,
.main-content > .cat-header:first-child { margin-top: 0; }

/* Category header — 16px top so first line aligns with sidebar first row */
.cat-header {
  padding: var(--space-4) var(--space-8) var(--space-5) 0;
  margin-bottom: var(--space-5);
  background: var(--splunk-bg-surface);
  border: 1px solid var(--splunk-border-subtle);
  border-radius: var(--radius-lg);
}
.cat-header h2 {
  font-size: var(--text-2xl); font-weight: 700; color: var(--splunk-text-primary);
  margin-bottom: var(--space-2);
}
.cat-header .cat-meta {
  font-size: var(--text-sm); color: var(--splunk-text-secondary);
  display: flex; gap: var(--space-4);
}

/* Filter bar — left aligns with main content gutter */
.filter-bar {
  display: flex; gap: var(--space-2); flex-wrap: wrap; margin-bottom: var(--space-5); padding: 0;
}
.filter-btn {
  padding: var(--space-2) var(--space-3);
  border-radius: var(--radius-md);
  border: 1px solid var(--splunk-border-subtle);
  background: var(--splunk-bg-surface);
  color: var(--splunk-text-secondary);
  font-size: var(--text-sm); font-weight: 500; cursor: pointer;
  font-family: inherit;
  transition: border-color 0.2s, background 0.2s, color 0.2s;
}
.filter-btn:hover { background: var(--splunk-bg-elevated); color: var(--splunk-text-primary); }
.filter-btn:focus-visible { outline: 2px solid var(--splunk-green); outline-offset: 2px; }
.filter-btn.active {
  background: var(--splunk-green-muted);
  border-color: var(--splunk-green);
  color: var(--splunk-green);
}
.filter-btn.crit { border-color: rgba(231, 76, 60, 0.5); }
.filter-btn.crit.active { background: rgba(231, 76, 60, 0.12); color: var(--splunk-critical); }
.filter-btn.high { border-color: rgba(243, 156, 18, 0.5); }
.filter-btn.high.active { background: rgba(243, 156, 18, 0.12); color: var(--splunk-high); }
.filter-btn.med { border-color: rgba(241, 196, 15, 0.5); }
.filter-btn.med.active { background: rgba(241, 196, 15, 0.12); color: var(--splunk-medium); }
.filter-btn.low2 { border-color: rgba(39, 174, 96, 0.5); }
.filter-btn.low2.active { background: rgba(39, 174, 96, 0.12); color: var(--splunk-low); }
.filter-sep {
  width: 1px; height: 24px; background: var(--splunk-border-subtle);
  margin: 0 var(--space-1); align-self: center;
}
.filter-btn.beg { border-color: rgba(0, 176, 124, 0.5); }
.filter-btn.beg.active { background: var(--splunk-green-muted); color: var(--splunk-green); }
.filter-btn.inter { border-color: rgba(52, 152, 219, 0.5); }
.filter-btn.inter.active { background: rgba(52, 152, 219, 0.12); color: #3498db; }
.filter-btn.advf { border-color: rgba(243, 156, 18, 0.5); }
.filter-btn.advf.active { background: rgba(243, 156, 18, 0.12); color: var(--splunk-high); }
.filter-btn.expf { border-color: rgba(231, 76, 60, 0.5); }
.filter-btn.expf.active { background: rgba(231, 76, 60, 0.12); color: var(--splunk-critical); }

.uc-diff-badge {
  font-size: var(--text-xs); padding: 2px var(--space-2); border-radius: var(--radius-sm);
  font-weight: 600; flex-shrink: 0; margin-left: auto;
}
.uc-diff-badge.beginner { background: var(--splunk-green-muted); color: var(--splunk-green); }
.uc-diff-badge.intermediate { background: rgba(52, 152, 219, 0.12); color: #3498db; }
.uc-diff-badge.advanced { background: rgba(243, 156, 18, 0.12); color: var(--splunk-high); }
.uc-diff-badge.expert { background: rgba(231, 76, 60, 0.12); color: var(--splunk-critical); }

.subcat-section { margin-bottom: var(--space-6); }
.subcat-header {
  font-size: var(--text-base); font-weight: 600; color: var(--splunk-green);
  padding: var(--space-2) 0; margin-bottom: var(--space-3);
  border-bottom: 1px solid var(--splunk-border-subtle);
  display: flex; align-items: center; gap: var(--space-2);
}
.subcat-count { font-size: var(--text-xs); color: var(--splunk-text-secondary); font-weight: 400; }

/* Use case cards */
.uc-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: var(--space-4);
}
.uc-card {
  padding: var(--space-4);
  cursor: pointer;
  position: relative;
  overflow: hidden;
}
.uc-card:focus-visible { outline: 2px solid var(--splunk-green); outline-offset: 2px; }
.uc-card::before {
  content: '';
  position: absolute; top: 0; left: 0; width: 3px; height: 100%;
  border-radius: 3px 0 0 3px;
}
.uc-card.critical::before { background: var(--splunk-critical); }
.uc-card.high::before { background: var(--splunk-high); }
.uc-card.medium::before { background: var(--splunk-medium); }
.uc-card.low::before { background: var(--splunk-low); }

.uc-card-head {
  display: flex; align-items: flex-start; gap: var(--space-2); margin-bottom: var(--space-2);
}
.uc-id {
  font-size: var(--text-xs); font-weight: 600; font-family: var(--font-mono);
  color: var(--splunk-text-secondary);
  padding: 2px var(--space-2); border-radius: var(--radius-sm);
  background: var(--splunk-bg-elevated);
  flex-shrink: 0;
}
.uc-name { font-size: var(--text-base); font-weight: 600; color: var(--splunk-text-primary); line-height: var(--line-tight); }
.uc-crit-dot {
  width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 6px;
}
.uc-crit-dot.critical { background: var(--splunk-critical); }
.uc-crit-dot.high { background: var(--splunk-high); }
.uc-crit-dot.medium { background: var(--splunk-medium); }
.uc-crit-dot.low { background: var(--splunk-low); }

.uc-value {
  font-size: var(--text-sm); color: var(--splunk-text-secondary);
  line-height: var(--line-normal);
  display: -webkit-box;
  -webkit-line-clamp: 2;
  line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.uc-tags { display: flex; gap: var(--space-2); flex-wrap: wrap; margin-top: var(--space-2); }
.uc-tag {
  font-size: var(--text-xs); padding: 2px var(--space-2); border-radius: var(--radius-sm);
  background: rgba(0, 176, 124, 0.1); color: var(--splunk-green);
  border: 1px solid rgba(0, 176, 124, 0.25);
  font-family: var(--font-mono);
  max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.uc-cim-tag {
  font-size: var(--text-xs); padding: 2px var(--space-2); border-radius: var(--radius-sm);
  background: var(--splunk-green-muted); color: var(--splunk-green);
  border: 1px solid rgba(0, 176, 124, 0.3);
  font-family: var(--font-mono);
  white-space: nowrap;
}
.mitre-link { color: var(--splunk-green); text-decoration: underline; }
.mitre-link:hover { color: var(--splunk-green-hover); }
.uc-mtype-tag {
  font-size: var(--text-xs); padding: 2px var(--space-2); border-radius: var(--radius-sm);
  background: rgba(52, 152, 219, 0.12); color: #3498db;
  border: 1px solid rgba(52, 152, 219, 0.25);
  white-space: nowrap;
}

.mtype-filter-wrap {
  display: flex; align-items: center; gap: var(--space-2); flex-wrap: wrap;
  margin-bottom: var(--space-4); padding: var(--space-2) 0;
  border-bottom: 1px solid var(--splunk-border-subtle);
}
.mtype-filter-wrap .mtype-label { font-size: var(--text-sm); font-weight: 600; color: var(--splunk-text-secondary); flex-shrink: 0; }
.mtype-filter-chip {
  font-size: var(--text-sm); padding: var(--space-2) var(--space-3); border-radius: var(--radius-md);
  background: var(--splunk-bg-surface);
  border: 1px solid var(--splunk-border-subtle);
  color: var(--splunk-text-secondary); cursor: pointer;
  transition: border-color 0.2s, background 0.2s, color 0.2s;
}
.mtype-filter-chip:hover { background: var(--splunk-bg-elevated); color: var(--splunk-text-primary); }
.mtype-filter-chip.active {
  background: rgba(52, 152, 219, 0.12);
  border-color: #3498db;
  color: #3498db;
}

/* Modal */
.modal-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0, 0, 0, 0.6);
  z-index: 1000; display: none; justify-content: center; align-items: flex-start;
  padding: 60px var(--space-6); overflow-y: auto;
}
.modal-overlay.show { display: flex; }
.modal {
  width: 100%; max-width: 800px;
  background: var(--splunk-bg-surface);
  border: 1px solid var(--splunk-border-default);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-lg);
  padding: var(--space-8);
  animation: modalIn 0.25s ease-out;
}
@keyframes modalIn {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}
.modal-close {
  position: absolute; top: var(--space-4); right: var(--space-5);
  width: 36px; height: 36px;
  border-radius: var(--radius-md);
  border: 1px solid var(--splunk-border-subtle);
  background: var(--splunk-bg-elevated);
  color: var(--splunk-text-secondary);
  font-size: 18px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.2s, color 0.2s, border-color 0.2s;
  z-index: 10;
}
.modal-close:hover { background: rgba(231, 76, 60, 0.15); color: var(--splunk-critical); border-color: rgba(231, 76, 60, 0.3); }
.modal-close:focus-visible { outline: 2px solid var(--splunk-green); outline-offset: 2px; }

.modal-head {
  display: flex; align-items: flex-start; gap: var(--space-4); margin-bottom: var(--space-6);
  padding-right: 48px;
}
.modal-crit-badge {
  padding: var(--space-1) var(--space-3); border-radius: var(--radius-sm);
  font-size: var(--text-sm); font-weight: 600; flex-shrink: 0;
}
.modal-crit-badge.critical { background: rgba(231, 76, 60, 0.12); color: var(--splunk-critical); border: 1px solid rgba(231, 76, 60, 0.35); }
.modal-crit-badge.high { background: rgba(243, 156, 18, 0.12); color: var(--splunk-high); border: 1px solid rgba(243, 156, 18, 0.35); }
.modal-crit-badge.medium { background: rgba(241, 196, 15, 0.12); color: var(--splunk-medium); border: 1px solid rgba(241, 196, 15, 0.35); }
.modal-crit-badge.low { background: rgba(39, 174, 96, 0.12); color: var(--splunk-low); border: 1px solid rgba(39, 174, 96, 0.35); }
.modal-crit-badge.beginner { background: var(--splunk-green-muted); color: var(--splunk-green); border: 1px solid rgba(0, 176, 124, 0.35); }
.modal-crit-badge.intermediate { background: rgba(52, 152, 219, 0.12); color: #3498db; border: 1px solid rgba(52, 152, 219, 0.35); }
.modal-crit-badge.advanced { background: rgba(243, 156, 18, 0.12); color: var(--splunk-high); border: 1px solid rgba(243, 156, 18, 0.35); }
.modal-crit-badge.expert { background: rgba(231, 76, 60, 0.12); color: var(--splunk-critical); border: 1px solid rgba(231, 76, 60, 0.35); }

.modal h2 { font-size: var(--text-xl); font-weight: 700; color: var(--splunk-text-primary); line-height: var(--line-tight); }
.modal-id { font-size: var(--text-sm); font-family: var(--font-mono); color: var(--splunk-text-secondary); margin-top: var(--space-1); }
.modal-section { margin-bottom: var(--space-5); }
.modal-section h3 {
  font-size: var(--text-xs); text-transform: uppercase; letter-spacing: 0.06em;
  color: var(--splunk-green); margin-bottom: var(--space-2); font-weight: 600;
}
.modal-section p, .modal-section div { font-size: var(--text-base); line-height: 1.6; color: var(--splunk-text-primary); }
.impl-expand-section { margin-top: var(--space-2); }
.impl-details {
  border: 1px solid var(--splunk-border-subtle);
  border-radius: var(--radius-md);
  background: var(--splunk-bg-base);
  overflow: hidden;
}
.impl-details-summary {
  padding: var(--space-3) var(--space-4);
  font-size: var(--text-sm); font-weight: 600; color: var(--splunk-green);
  cursor: pointer; list-style: none; user-select: none;
}
.impl-details-summary::-webkit-details-marker { display: none; }

<script>
// Same app logic as index.html — only CSS differs (Splunk Design System preview)
var SITE = Object.assign({

  statUseCases: "Use Cases",
  statCategories: "Categories",
  statSubcategories: "Subcategories",
  statQuickWins: "Quick Wins",
  roadmapTitle: "Implementation Roadmap",
  roadmapSub: "A phased approach to building comprehensive infrastructure monitoring",
  phase1Title: "Phase 1 · Week 1–2",
  phase1Heading: "Foundation",
  phase1Desc: "Deploy forwarders and start collecting data for immediate visibility.",
  phase2Title: "Phase 2 · Week 3–4",
  phase2Heading: "Core Monitoring",

  phase3Title: "Phase 3 · Month 2",
  phase3Heading: "Expand Coverage",

  phase4Title: "Phase 4 · Month 3+",

  filterAll: "All Categories",

}, window.SITE_CUSTOM || {});

let allUCs = [];
let ucIndex = {};
DATA.forEach(cat => {
  cat.s.forEach(sc => {
    sc.u.forEach(uc => {
      const entry = {cat, sc, uc, flatIdx: allUCs.length};
      allUCs.push(entry);
      ucIndex[uc.i] = entry;
    });
  });
});

let currentCat = null, currentFilter = 'all', currentDiffFilter = 'all', currentMtypeFilter = 'all', currentSearch = '', currentUCIdx = -1;
document.getElementById('total-count').textContent = allUCs.length;
let currentSubcat = null;

function buildSidebar() {
  const sb = document.getElementById('sidebar');
  let html = '<div class="cat-item' + (!currentCat ? ' active' : '') + '" onclick="selectCat(null)">';
  html += '<div class="cat-num">&#9733;</div><span>Overview</span><span class="cat-count">' + allUCs.length + '</span></div>';
  DATA.forEach(cat => {
    const count = cat.s.reduce((a,s) => a + s.u.length, 0);
    const active = currentCat === cat.i ? ' active' : '';
    html += '<div class="cat-item' + active + '" onclick="selectCat(' + cat.i + ')">';
    html += '<div class="cat-num">' + cat.i + '</div><span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + cat.n + '</span>';
    html += '<span class="cat-count">' + count + '</span><span class="cat-chevron">&#9654;</span></div>';
    html += '<div class="subcat-list' + (currentCat === cat.i ? ' open' : '') + '">';
    cat.s.forEach(sc => {
      const scActive = currentSubcat === sc.i ? ' active' : '';
      html += '<div class="subcat-item' + scActive + '" onclick="event.stopPropagation(); scrollToSubcat(\'' + sc.i + '\')">';
      html += '<span style="overflow:hidden;text-overflow:ellipsis">' + sc.i + ' ' + sc.n + '</span><span class="sc-count">' + sc.u.length + '</span></div>';
    });
    html += '</div>';
  });
  sb.innerHTML = html;
}

function scrollToSubcat(scId) {
  currentSubcat = scId;
  buildSidebar();
  const el = document.getElementById('sc-' + scId.replace('.','_'));
  if (el) el.scrollIntoView({behavior: 'smooth', block: 'start'});
}

const CRIT_ORDER = {critical:0, high:1, medium:2, low:3};
const DIFF_ORDER = {beginner:0, intermediate:1, advanced:2, expert:3};
function getStarters(cat, n) {
  const ucs = [];
  cat.s.forEach(sc => sc.u.forEach(uc => {
    if ((uc.c==='critical'||uc.c==='high') && uc.f==='beginner') ucs.push({uc, sc: sc.n});
  }));
  ucs.sort((a,b) => (CRIT_ORDER[a.uc.c]||9) - (CRIT_ORDER[b.uc.c]||9) || (DIFF_ORDER[a.uc.f]||9) - (DIFF_ORDER[b.uc.f]||9));
  return ucs.slice(0, n||5);
}

function getMtypeFilterBtns(catId, resultsForTypes) {
  const types = new Set();
  if (resultsForTypes && resultsForTypes.length) resultsForTypes.forEach(e => { const uc = e.uc || e; if (Array.isArray(uc.mtype)) uc.mtype.forEach(t => types.add(t)); });
  else if (catId != null) { const cat = DATA.find(c => c.i === catId); if (cat) cat.s.forEach(sc => sc.u.forEach(uc => { if (Array.isArray(uc.mtype)) uc.mtype.forEach(t => types.add(t)); })); }
  if (types.size === 0) return '';
  const order = ['Availability','Performance','Security','Configuration','Capacity','Fault','Anomaly','Compliance'];
  const sorted = [...types].sort((a,b) => { const ia = order.indexOf(a), ib = order.indexOf(b); if (ia>=0 && ib>=0) return ia-ib; if (ia>=0) return -1; if (ib>=0) return 1; return a.localeCompare(b); });
  let html = '<div class="mtype-filter-wrap"><span class="mtype-label">Monitoring type:</span>';
  html += '<button class="mtype-filter-chip' + (currentMtypeFilter==='all'?' active':'') + '" data-mtype="all" onclick="setMtypeFilter(this.dataset.mtype)">All</button>';

  return html + '</div>';
}

function renderSearchResults() {
  const q = currentSearch.toLowerCase();
  let results = allUCs.filter(e => {
    const u = e.uc;
    return u.n.toLowerCase().includes(q) || u.i.includes(q) || u.v.toLowerCase().includes(q) || u.q.toLowerCase().includes(q) || u.t.toLowerCase().includes(q) || u.d.toLowerCase().includes(q) || u.m.toLowerCase().includes(q) || e.cat.n.toLowerCase().includes(q) || e.sc.n.toLowerCase().includes(q) || (Array.isArray(u.a) && u.a.join(' ').toLowerCase().includes(q)) || (Array.isArray(u.mtype) && u.mtype.join(' ').toLowerCase().includes(q));
  });
  if (currentFilter !== 'all') results = results.filter(e => e.uc.c === currentFilter);
  if (currentDiffFilter !== 'all') results = results.filter(e => e.uc.f === currentDiffFilter);

});
document.getElementById('modal-overlay').addEventListener('click', function(e) { if (e.target === this) closeModal(); });
document.getElementById('sidebar-toggle').addEventListener('click', function() { var sidebar = document.getElementById('sidebar'); sidebar.classList.toggle('open'); this.setAttribute('aria-expanded', sidebar.classList.contains('open')); });

buildSidebar();
renderOverview();
</script>

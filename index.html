e Hub bridges OT/IT network segmentation by polling SNMP-enabled devices on isolated networks and forwarding data to Splunk Cloud.","t":"Splunk Edge Hub (SNMP integration), Splunk OT Intelligence","d":"`index=edge-hub-snmp sourcetype=edge_hub` \u2014 SNMP polls via Edge Hub to local devices","q":"index=edge-hub-snmp hub_name=\"datacenter-eh-01\" sourcetype=edge_hub\n| stats latest(value) as current by oid_alias\n| table oid_alias, current\n\n`` Monitor polling health: ``\nindex=edge-hub-logs sourcetype=splunk_edge_hub_log \"snmp\" (\"timeout\" OR \"unreachable\")\n| stats count by host, message","m":"Configure SNMP polling via Edge Hub Advanced Settings \u2192 SNMP tab. Add devices by IP, set SNMP version (v1/v2c/v3), community string or v3 credentials, and define OIDs with aliases. Set polling interval (default 60s). Edge Hub polls local OT devices and forwards results to `edge-hub-snmp` index via HEC. This bridges the air-gap \u2014 enterprise Splunk never touches the OT network directly. Alert on device unreachability or metric threshold violations.","z":"Table (device OID values), Status grid (device \u00d7 poll status), Line chart (metric trends)."},{"i":"14.3.7","n":"Edge-to-Cloud Data Pipeline Health","c":"high","f":"intermediate","v":"Edge Hub pipeline health ensures IoT/OT data reaches Splunk. A disconnected Edge Hub creates blind spots \u2014 the device backlogs up to 3M sensor data points locally in SQLite.","t":"Splunk Edge Hub (system health), Splunk OT Intelligence","d":"`index=edge-hub-health sourcetype=edge_hub` (device health metrics), `index=edge-hub-logs sourcetype=splunk_edge_hub_log` (system logs)","q":"`` Device resource health: ``\nindex=edge-hub-health sourcetype=edge_hub\n| stats latest(cpu_usage) as CPU, latest(memory_usage) as Memory,\n        latest(disk_usage) as Disk by host\n| eval Health=if(CPU<80 AND Memory<80 AND Disk<80, \"Healthy\", \"Warning\")\n\n`` Connectivity and forwarding issues: ``\nindex=edge-hub-logs sourcetype=splunk_edge_hub_log\n  (\"connection\" OR \"unreachable\" OR \"timeout\")\n| timechart count by log_level","m":"Edge Hub streams device health data to `edge-hub-health` index and system logs to `edge-hub-logs` index. The device checks Splunk reachability every 15 seconds \u2014 LED ring shows green (connected) or red (disconnected). When disconnected, data backlogs locally: 3M sensor data points and 100K health/logs/anomalies/SNMP entries each (FIFO, batches of 100 via HEC on reconnect). Monitor CPU, memory, disk utilization on the device. Alert on connectivity loss or sustained high resource usage.","z":"Single value (connectivity status with LED color mapping), Gauge (CPU/memory/disk), Line chart (forwarding rate over time)."},{"i":"14.3.8","n":"Data Center Humidity & Condensation Risk","c":"critical","f":"intermediate","v":"Prevents equipment failure by detecting dew point conditions before condensation forms on servers and network infrastructure.","t":"Splunk Edge Hub (humidity + temperature sensors), Splunk OT Intelligence","d":"`index=edge-hub-data` tag=humidity tag=temperature, `sourcetype=edge_hub`","q":"| mstats avg(Humidity), avg(Temperature) as temp by host\n| eval dew_point=(243.04*(ln(Humidity/100)+((17.625*temp)/(243.04+temp))))/(17.625-ln(Humidity/100)-((17.625*temp)/(243.04+temp)))\n| eval condensation_risk=case(temp<=dew_point, \"CRITICAL\", temp-dew_point<2, \"HIGH\", 1=1, \"NORMAL\")\n| where condensation_risk!=\"NORMAL\"","m":"Deploy Edge Hub in raised floor or ceiling-mounted configuration with humidity sensor exposed to air circulation. Configure Advanced Settings \u2192 Sensor Polling interval to 30 seconds for real-time dew point calculation. Use local SQLite backlog to ensure no readings are lost during Splunk connectivity outages.","z":"Gauge (dew point vs actual temp), time-series overlay, condensation risk heatmap."},{"i":"14.3.9","n":"Cold Storage Room Temperature Excursion Alert","c":"critical","f":"advanced","v":"Ensures pharmaceutical, food, or vaccine storage integrity by alerting within minutes of unplanned temperature rise.","t":"Splunk Edge Hub (temperature sensor \u00b10.2\u00b0C), Splunk OT Intelligence","d":"`index=edge-hub-data` metric_name=temperature, `sourcetype=edge_hub`","q":"| mstats avg(temperature) as temp by host, _time span=5m\n| eval expected_range=\"[-20,-15]\"\n| where temp > -15 OR temp < -20\n| eval deviation=if(temp > -15, temp - (-15), (-20) - temp)\n| stats count as excursion_count, max(deviation) as max_deviation by host\n| where excursion_count >= 3","m":"Configure temperature sensor with Advanced Settings \u2192 Alerts enabled at -15\u00b0C upper threshold. Store locally for 30 minutes via SQLite backlog. For sub-zero operation, verify Edge Hub -40\u00b0C to 80\u00b0C operating range covers your environment. MQTT topic subscription can include external low-cost temp probes via I\u00b2C port (3.5mm jack).","z":"Single-value alert indicator, time-series trend, deviation log."},{"i":"14.3.10","n":"Museum & Archive Climate Control Compliance","c":"high","f":"intermediate","v":"Documents preservation requirements (typically 18-21\u00b0C, 35-45% RH) for regulatory compliance and insurance.","t":"Splunk Edge Hub (temperature + humidity dual sensor), Splunk OT Intelligence","d":"`index=edge-hub-data` metric_name=temperature OR metric_name=humidity, `sourcetype=edge_hub`","q":"| mstats avg(temperature) as temp, avg(humidity) as rh by host, _time span=10m\n| eval temp_compliant=if(temp>=18 AND temp<=21, 1, 0), rh_compliant=if(rh>=35 AND rh<=45, 1, 0)\n| eval compliance_score=((temp_compliant + rh_compliant) / 2) * 100\n| stats avg(compliance_score) as avg_compliance, count as hours by host\n| where avg_compliance < 95","m":"Mount Edge Hub in archival vault with sensors in passive airflow zone. Configure 10-minute polling intervals via Advanced Settings \u2192 Sensor Polling for daily compliance reporting. Use edge-hub-health index to track sensor drift (humidity can drift \u00b15% annually). Maintain audit trail in edge-hub-logs for regulatory documentation.","z":"Compliance scorecard, historical trend, excursion timeline."},{"i":"14.3.11","n":"Greenhouse Humidity & Growth Optimization","c":"medium","f":"advanced","v":"Optimizes plant growth rates by maintaining ideal VPD (vapor pressure deficit) and reducing fungal disease risk.","t":"Splunk Edge Hub (humidity + temperature + optional light sensor), custom edge.json container","d":"`index=edge-hub-data` metric_name=humidity OR metric_name=temperature OR metric_name=light, `sourcetype=edge_hub`","q":"| mstats avg(temperature) as temp, avg(humidity) as rh, max(light_level) as lux by host, _time span=1h\n| eval sat_pressure=610.5*exp((17.27*temp)/(temp+237.7))\n| eval vpd=(sat_pressure*(100-rh)/100)/1000\n| eval growth_optimal=if(vpd>=0.8 AND vpd<=1.5 AND temp>=20 AND temp<=28, \"YES\", \"NO\")\n| stats count(eval(growth_optimal=\"YES\")) as optimal_hours, count as total_hours by host\n| eval growth_score=(optimal_hours/total_hours)*100","m":"Deploy Edge Hub with external humidity/temp probe via I\u00b2C (3.5mm jack) placed in plant canopy zone. Optional light sensor integration measures lux for photosynthesis optimization. Build custom ARM64 container to interface with greenhouse HVAC controller via Modbus TCP (port 502) for automated adjustment. Store 3M data points locally for real-time analytics without cloud latency.","z":"VPD gauge, growth score trend, hourly optimization heatmap."},{"i":"14.3.12","n":"Security Camera Motion Detection with Light Level Correlation","c":"high","f":"expert","v":"Reduces false motion alerts by correlating camera motion events with ambient light levels and eliminating day/night false positives.","t":"Splunk Edge Hub (light sensor + USB camera container with NPU), v2.1+","d":"`index=edge-hub-data` metric_name=light, `index=edge-hub-logs` sourcetype=splunk_edge_hub_log, camera motion event","q":"index=edge-hub-logs sourcetype=splunk_edge_hub_log motion_detected=true\n| join host [| mstats avg(light_level) as lux by host, _time span=5m | where lux < 10]\n| stats count as false_positives by host\n| eval false_positive_rate=(false_positives / (false_positives + true_detections)) * 100","m":"Deploy Edge Hub with USB camera attached (requires USB device passthrough v2.1+). Build custom ARM64 container with OpenCV + NPU inference for motion detection. Filter detections with built-in ambient light sensor: suppress alerts when lux < 10 (night) or > 50000 (direct sun glare). Configure edge.json manifest with resource limits (memory: 256MB, CPU: 1 core) to avoid impacting sensor polling.","z":"Motion vs light correlation scatter, false positive trend, alert effectiveness dashboard."},{"i":"14.3.13","n":"Energy Management & HVAC Occupancy-Based Control","c":"medium","f":"expert","v":"Reduces HVAC energy consumption 15-30% by correlating occupancy detection with temperature setpoints.","t":"Splunk Edge Hub (light + USB camera + custom container), Modbus TCP actuator control","d":"`index=edge-hub-data` metric_name=light, `index=edge-hub-logs` camera_occupancy_count, `index=edge-hub-logs` sourcetype=edge_hub modbus_register","q":"| mstats avg(light_level) as lux by host, _time span=15m\n| join host [index=edge-hub-logs camera_occupancy_count > 0 | stats count as people_detected by host, _time span=15m]\n| eval hvac_mode=case(people_detected > 0 AND lux < 500, \"COMFORT\", people_detected = 0 AND lux > 500, \"ECO\", 1=1, \"TRANSITION\")\n| stats count by hvac_mode, host","m":"Deploy custom ARM64 container with TensorFlow Lite occupancy counting model (CNN) running on NPU. Integrate Modbus TCP gateway to read/write HVAC controller setpoint registers (port 502). Use light sensor as secondary occupancy indicator. Configure container resource limits to ensure 30-second sensor polling remains unaffected. Implement local alerting logic in container to adjust setpoint without cloud round-trip latency.","z":"Occupancy vs light scatter, energy savings trend, HVAC mode timeline."},{"i":"14.3.14","n":"Warehouse Inventory Light-Based Shelf Monitoring","c":"medium","f":"expert","v":"Detects empty or partially depleted shelves in real-time by monitoring light pattern changes in high-bay storage.","t":"Splunk Edge Hub (light sensor array), custom container for pattern recognition","d":"`index=edge-hub-data` metric_name=light, `sourcetype=edge_hub`","q":"| mstats avg(light_level) as lux by host, rack_id, shelf_position, _time span=5m\n| delta lux as lux_change\n| eval significant_change=if(abs(lux_change) > 20, \"YES\", \"NO\")\n| stats count(eval(significant_change=\"YES\")) as change_events, avg(lux) as avg_lux by host, rack_id, shelf_position\n| where change_events > 5\n| eval inventory_status=case(avg_lux > 1000, \"EMPTY\", avg_lux > 500, \"LOW\", 1=1, \"STOCKED\")","m":"Mount Edge Hub light sensor facing shelving unit. Deploy custom Python container that learns baseline light patterns for each shelf over 1-week baseline period. Use machine learning to detect sustained light increases (empty shelf) vs brief shadows (restocking activity). Reference Advanced Settings \u2192 Containers tab to set container polling interval to 5 minutes. Store 3M light data points locally for historical baseline calculation.","z":"Shelf occupancy heatmap, light level trend by shelf, inventory status dashboard."},{"i":"14.3.15","n":"Structural Health Monitoring via Vibration Baseline Drift","c":"high","f":"expert","v":"Detects early-stage structural degradation (loose bolts, bearing wear) before catastrophic failure by monitoring vibration signature drift.","t":"Splunk Edge Hub (3-axis accelerometer + 6-axis gyroscope), Splunk OT Intelligence","d":"`index=edge-hub-data` metric_name=acceleration_x OR acceleration_y OR acceleration_z, `sourcetype=edge_hub`","q":"| mstats avg(acceleration_x) as ax, avg(acceleration_y) as ay, avg(acceleration_z) as az by host, _time span=10m\n| eval vibration_magnitude=sqrt((ax^2 + ay^2 + az^2))\n| eval baseline=avg(vibration_magnitude)\n| relative_entropy baseline, vibration_magnitude\n| where vibration_magnitude > (baseline * 1.5)\n| stats count as anomalies, max(vibration_magnitude) as peak_mag by host","m":"Mount Edge Hub on bridge structure, machinery frame, or building floor with accelerometer facing primary load direction. Collect 7-day baseline using kNN built-in anomaly detection (one model per sensor). Enable MLTK Smart Outlier Detection v4.8.0+ for drift tracking over months. Store 3M data points locally for baseline comparison. Note: MQTT sensors only support MLTK; if using built-in accelerometer, use built-in kNN algorithm.","z":"Vibration magnitude trend, baseline drift scatter, anomaly frequency timeline."},{"i":"14.3.16","n":"Door Open/Close Detection via Accelerometer Tilt","c":"medium","f":"advanced","v":"Monitors facility access by detecting door swing events without motion sensors or contact switches.","t":"Splunk Edge Hub (3-axis accelerometer with gravity component), custom edge.json container","d":"`index=edge-hub-data` metric_name=acceleration_x OR acceleration_y OR acceleration_z, `sourcetype=edge_hub`","q":"| mstats avg(acceleration_z) as az, avg(acceleration_y) as ay by host, _time span=100ms\n| eval tilt_angle=atan2(ay, az) * (180 / pi())\n| delta tilt_angle as tilt_change\n| eval door_event=if(abs(tilt_change) > 15 AND (tilt_change > 0 OR tilt_change < 0), \"SWING\", \"STATIC\")\n| stats count as swings by host, door_id\n| where swings > 0","m":"Mount Edge Hub vertically on doorframe with accelerometer Z-axis aligned to gravity. Configure 100ms sampling interval (Advanced Settings \u2192 Sensor Polling) to capture door swing signatures (typically 0.5-2 second transit). Build custom ARM64 container that implements state machine for distinguishing between single swing (door passing) vs sustained tilt (propped open). Store local SQLite events for 24+ hours via 100K event backlog.","z":"Door swing timeline, access frequency histogram, anomalous access alert."},{"i":"14.3.17","n":"Equipment Alignment & Vibration Analysis via Gyroscope","c":"medium","f":"advanced","v":"Monitors rotational alignment of rotating equipment to predict misalignment-induced failures.","t":"Splunk Edge Hub (6-axis gyroscope), Splunk OT Intelligence","d":"`index=edge-hub-data` metric_name=gyro_x OR gyro_y OR gyro_z, `sourcetype=edge_hub`","q":"| mstats avg(gyro_x) as gx, avg(gyro_y) as gy, avg(gyro_z) as gz by host, equipment_id, _time span=1m\n| eval rotation_magnitude=sqrt((gx^2 + gy^2 + gz^2))\n| eval z_axis_dominant=if(abs(gz) > abs(gx) AND abs(gz) > abs(gy), \"YES\", \"NO\")\n| stats avg(rotation_magnitude) as avg_rot, stdev(rotation_magnitude) as std_rot by equipment_id\n| where (avg_rot > 50) AND (std_rot > 10)","m":"Mount Edge Hub at equipment bearing or motor coupling with gyroscope Z-axis aligned to equipment rotation axis. Collect 30-day baseline for expected rotation rate and variation. Use built-in kNN anomaly detection to flag unexpected rotational patterns (e.g., gyroscopic precession from misalignment). For precision industrial environments, integrate with OPC-UA PLC (port 4840) to read encoder data for ground-truth validation. Local 3M backlog ensures all rotation events are captured.","z":"Rotation rate trend, z-axis dominance heatmap, misalignment risk gauge."},{"i":"14.3.18","n":"Sound Frequency Analysis for Equipment Signatures","c":"medium","f":"advanced","v":"Identifies equipment degradation by detecting shifts in characteristic sound frequencies (bearing wear, compressor blade damage).","t":"Splunk Edge Hub (stereo microphone + custom NPU container), v2.1+","d":"`index=edge-hub-logs` sourcetype=splunk_edge_hub_log audio_frequency_analysis, `index=edge-hub-data` metric_name=sound_level","q":"index=edge-hub-logs sourcetype=splunk_edge_hub_log audio_signature_extracted=true\n| stats avg(peak_frequency_hz) as avg_peak, stdev(peak_frequency_hz) as freq_std,\n        max(frequency_band_2k_4k_db) as mid_high_power by equipment_id, _time span=5m\n| eval freq_shift=abs(avg_peak - 3000)\n| where freq_shift > 500\n| eval signature_change=\"DEGRADATION_RISK\"","m":"Position Edge Hub stereo microphone 0.5-2m from equipment (not in direct high-velocity air). Build custom ARM64 container using FFT (Fast Fourier Transform) library to extract peak frequencies and power spectral density. Deploy on NPU (v2.1+) for real-time FFT computation without cloud round-trip. Reference frequency baseline from first 7 days of operation. Store sound level metric data locally for pattern matching without streaming audio to cloud (privacy + bandwidth).","z":"Frequency spectrum waterfall, peak frequency trend, degradation risk timeline."},{"i":"14.3.19","n":"Multi-Sensor Environmental Baseline & Drift Detection","c":"medium","f":"expert","v":"Detects sensor failures, calibration drift, or environmental changes by correlating expected relationships between temperature, humidity, pressure, and light.","t":"Splunk Edge Hub (multi-sensor fusion), Splunk OT Intelligence","d":"`index=edge-hub-data` metric_name=temperature OR metric_name=humidity OR metric_name=pressure OR metric_name=light, `sourcetype=edge_hub`","q":"| mstats avg(temperature) as temp, avg(humidity) as rh, avg(pressure) as press, avg(light_level) as lux by host, _time span=1h\n| stats avg(temp) as avg_temp, stdev(temp) as std_temp,\n        avg(rh) as avg_rh, stdev(rh) as std_rh,\n        avg(press) as avg_press, stdev(press) as std_press,\n        avg(lux) as avg_lux, stdev(lux) as std_lux by host\n| eval temp_anomaly=if(std_temp > 5, \"DRIFT\", \"NORMAL\"),\n        rh_anomaly=if(std_rh > 15, \"DRIFT\", \"NORMAL\"),\n        press_anomaly=if(std_press > 10, \"DRIFT\", \"NORMAL\"),\n        lux_anomaly=if(std_lux > 5000, \"DRIFT\", \"NORMAL\")\n| where temp_anomaly=\"DRIFT\" OR rh_anomaly=\"DRIFT\" OR press_anomaly=\"DRIFT\" OR lux_anomaly=\"DRIFT\"","m":"Enable all available sensors on Edge Hub (temperature, humidity, optional pressure, optional light). Configure 1-hour aggregation interval (Advanced Settings \u2192 Sensor Polling). Establish 30-day baseline for expected correlation between sensors (e.g., temp and humidity should not fluctuate independently in sealed rooms). Use MLTK Smart Outlier Detection to detect when sensor relationships break down (indicator of sensor failure or environmental change). Store baseline profiles in edge-hub-data index for historical comparison.","z":"Multi-sensor correlation matrix, drift detection alerts, baseline comparison chart."},{"i":"14.3.20","n":"Pressure Monitoring for Cleanroom Compliance","c":"critical","f":"intermediate","v":"Ensures pharmaceutical and semiconductor cleanroom integrity by verifying positive pressure differentials between zones.","t":"Splunk Edge Hub (optional pressure sensor \u00b10.12 hPa), Splunk OT Intelligence","d":"`index=edge-hub-data` metric_name=pressure, `sourcetype=edge_hub`","q":"index=edge-hub-data metric_name=pressure\n| stats avg(pressure) as avg_press by room, zone, _time span=5m\n| eval zone_pair=room + \"_\" + zone\n| eventstats avg(avg_press) as zone_avg by zone_pair\n| eval pressure_diff=avg_press - zone_avg\n| where pressure_diff < 0.5\n| eval compliance=\"FAIL\"","m":"Deploy Edge Hub with optional pressure sensor in each cleanroom zone. Configure 5-minute polling interval (Advanced Settings \u2192 Sensor Polling) for real-time compliance monitoring. Cleanrooms require 0.5-2.0 hPa positive pressure differential from adjacent areas. Set threshold alerts at 0.5 hPa minimum. Enable continuous local logging (edge-hub-logs index) for regulatory audit trail. Pressure sensor range 300-1100 hPa covers sea-level and altitude variations.","z":"Pressure differential gauge, zone comparison heatmap, compliance timeline."},{"i":"14.3.21","n":"HVAC Duct Pressure & Velocity Monitoring","c":"medium","f":"advanced","v":"Monitors HVAC filter clogging and airflow efficiency by tracking duct static pressure trends.","t":"Splunk Edge Hub (optional pressure sensor), Modbus TCP integration","d":"`index=edge-hub-data` metric_name=pressure, `index=edge-hub-logs` sourcetype=edge_hub modbus_register","q":"| mstats avg(pressure) as static_press by duct_zone, _time span=10m\n| delta static_press as press_delta\n| eval filter_condition=case(static_press > 2.5, \"CLOGGED\", static_press > 1.5, \"RESTRICTED\", 1=1, \"NORMAL\")\n| stats avg(filter_condition) as predominant_condition, avg(static_press) as avg_press by duct_zone\n| where predominant_condition!=\"NORMAL\"","m":"Install Edge Hub pressure sensor in return air duct upstream of main filter. Configure 10-minute sampling. Correlate with Modbus TCP fan speed register reads (port 502) from HVAC controller: increasing pressure + constant fan speed = clogged filter. Typical clogged filter threshold: > 2.5 in H2O (84.7 hPa). Store local SQLite data for 7-day history to track pressure rise rate (rate of clogging). Integrate with OPC-UA SCADA (port 4840) for automated filter change alerts.","z":"Duct pressure trend, filter condition gauge, maintenance alert timeline."},{"i":"14.3.22","n":"Weather Station Data Integration & Altitude Compensation","c":"medium","f":"advanced","v":"Provides pressure-altitude data for facility environmental baselines and corrects sensor readings for elevation changes.","t":"Splunk Edge Hub (optional pressure sensor), MQTT integration","d":"`index=edge-hub-data` metric_name=pressure, `index=edge-hub-logs` sourcetype=splunk_edge_hub_log external_weather_device","q":"| mstats avg(pressure) as edge_press by host, _time span=1h\n| join host [| mstats avg(external_pressure) as ext_press by host, _time span=1h]\n| eval altitude_diff = (44330 * (1.0 - ((edge_press / ext_press)^(1/5.255))))\n| where altitude_diff != 0\n| eval altitude_compensated_reading = edge_press - (altitude_diff * 0.0001198)","m":"Deploy Edge Hub with optional pressure sensor at facility location. Subscribe to external MQTT weather station (Advanced Settings \u2192 MQTT Subscriptions) publishing atmospheric pressure. Use barometric formula to compute altitude or detect pressure sensor drift. Store readings in edge-hub-data metric index. Pressure range 300-1100 hPa covers sea-level to 3,000m elevation. Use local SQLite backlog for real-time compensation without cloud latency.","z":"Altitude vs time, pressure correction factor trend, weather correlation chart."},{"i":"14.3.23","n":"Custom Python Container for Data Transformation & Enrichment","c":"medium","f":"advanced","v":"Pre-processes edge sensor data locally before forwarding to Splunk, reducing bandwidth and enabling offline analytics.","t":"Splunk Edge Hub (custom container), gRPC SDK","d":"`index=edge-hub-data` all metrics post-transformation, `index=edge-hub-logs` container_event_log","q":"index=edge-hub-logs sourcetype=splunk_edge_hub_log container_name=transform_enrichment\n| stats count as successful_transforms, count(eval(error_code!=0)) as failed_transforms by host\n| eval transform_success_rate = (successful_transforms / (successful_transforms + failed_transforms)) * 100","m":"Build custom ARM64 Python container (requires Dockerfile with Python 3.9+ and gRPC client library) to read sensor data via Edge Hub gRPC API. Implement custom enrichment logic (e.g., add facility ID, shift code, operator ID). Redact PII or sensitive fields before forwarding to cloud. Configure edge.json manifest with resource limits (memory: 512MB, CPU: 2 cores). Container runs as non-root (v2.0+). Deploy via Advanced Settings \u2192 Containers tab. Local SQLite backlog absorbs data if container crashes.","z":"Transform success rate trend, processing latency histogram, error frequency chart."},{"i":"14.3.24","n":"BACnet-to-MQTT Protocol Gateway Container","c":"high","f":"advanced","v":"Bridges legacy BACnet-based building control systems with modern MQTT/Splunk pipeline without expensive protocol gateway hardware.","t":"Splunk Edge Hub (custom container), MQTT broker","d":"`index=edge-hub-logs` sourcetype=splunk_edge_hub_log bacnet_translation_event, MQTT subscribed topics","q":"index=edge-hub-logs sourcetype=splunk_edge_hub_log bacnet_translation_event\n| stats count as bacnet_objects_polled, count(eval(translation_status=\"SUCCESS\")) as successful by host\n| eval gateway_health = (successful / bacnet_objects_polled) * 100\n| where gateway_health < 95","m":"Build custom ARM64 container using python-bacnet or BACnet4J library. Container reads BACnet object properties from legacy controllers (IP broadcast network) and translates to MQTT messages (publishes to Edge Hub MQTT broker on port 1883). Configure container resource limits (memory: 256MB, CPU: 1 core) in edge.json manifest. Enable USB device passthrough (v2.1+) if BACnet gateway requires serial/USB interface. Store translation event logs locally for audit trail.","z":"BACnet object discovery count, translation success rate, latency histogram."},{"i":"14.3.25","n":"Local Alerting & GPIO Relay Control Container","c":"high","f":"advanced","v":"Enables immediate equipment shutdown or alarm triggering at the edge without cloud latency, critical for safety-critical systems.","t":"Splunk Edge Hub (custom container), gRPC SDK, GPIO control","d":"`index=edge-hub-data` all sensor metrics, `index=edge-hub-logs` container_alert_log","q":"index=edge-hub-logs sourcetype=splunk_edge_hub_log container_name=local_alerting alert_triggered=true\n| stats count as alerts_triggered, count(eval(relay_state=\"ENERGIZED\")) as equipment_stopped by host\n| eval safety_response_rate = (equipment_stopped / alerts_triggered) * 100","m":"Build custom ARM64 container with gRPC client library and GPIO library (RPi.GPIO or gpiod). Container subscribes to Edge Hub gRPC sensor stream, implements local thresholds (e.g., temperature > 90\u00b0C), and directly controls GPIO pins to energize/de-energize relays (e.g., kill power to pump, trigger siren). No cloud round-trip latency\u2014decisions made in <100ms. Configure edge.json with resource limits (memory: 128MB, CPU: 0.5 core). Store alert events in local edge-hub-logs for compliance.","z":"Alert frequency timeline, relay activation log, response latency histogram."},{"i":"14.3.26","n":"Edge Analytics Container for Rolling Statistics & Threshold Logic","c":"medium","f":"advanced","v":"Computes advanced analytics (moving averages, percentiles, trend detection) locally, reducing cloud computation burden.","t":"Splunk Edge Hub (custom container), gRPC SDK","d":"`index=edge-hub-data` computed_statistics, `index=edge-hub-logs` container_analytics_event","q":"index=edge-hub-data metric_name=temperature\n| timechart avg(temperature) as temp_avg by host\n| delta temp_avg as temp_trend\n| stats avg(temp_trend) as avg_trend, stdev(temp_trend) as trend_std by host\n| eval trend_anomaly=if(abs(temp_trend) > (avg_trend + (2*trend_std)), \"YES\", \"NO\")","m":"Build custom ARM64 container with NumPy/Pandas libraries (may require multi-stage build to reduce image size). Container implements rolling window statistics (5/15/60-minute moving averages) via gRPC sensor stream. Compute percentiles, trend lines, and detect threshold crossings locally. Publish results as new metrics to MQTT (Advanced Settings \u2192 MQTT Publish) or directly to Splunk via gRPC SDK. Store raw + computed metrics locally (3M backlog) for redundancy. Configure resource limits: memory 512MB, CPU 1.5 cores.","z":"Rolling average trend, threshold crossing frequency, anomaly detection timeline."},{"i":"14.3.27","n":"BLE Beacon Asset Tracking & Presence Detection","c":"medium","f":"intermediate","v":"Tracks valuable equipment or personnel location within facility using low-cost BLE tags without requiring dedicated asset management infrastructure.","t":"Splunk Edge Hub (Bluetooth connectivity), custom container","d":"`index=edge-hub-logs` sourcetype=splunk_edge_hub_log bluetooth_beacon_event, `index=edge-hub-data` metric_name=rssi_strength","q":"index=edge-hub-logs sourcetype=splunk_edge_hub_log bluetooth_beacon_event beacon_uuid=* beacon_major=* beacon_minor=*\n| stats latest(_time) as last_seen, avg(rssi_strength) as avg_rssi by beacon_id, host\n| eval presence_status=if((now() - last_seen) < 300, \"PRESENT\", \"ABSENT\")\n| stats count(eval(presence_status=\"PRESENT\")) as present_assets by host, location","m":"Enable Bluetooth scanning on Edge Hub. Build custom ARM64 container that listens for iBeacon or AltBeacon advertisements, parses UUID/major/minor identifiers, and logs beacon_id + RSSI (signal strength). Use RSSI to estimate distance (typically 1-10m range for Edge Hub antenna). Store beacon events locally via 100K event backlog. Implement trilateration logic in container or Splunk downstream to estimate asset location across 3+ Edge Hubs. MQTT publish beacon sightings to central location service.","z":"Asset presence map, RSSI range heatmap, movement timeline."},{"i":"14.3.28","n":"USB Camera Barcode & QR Code Scanning Container","c":"medium","f":"advanced","v":"Automates material tracking and inventory verification by scanning barcodes/QR codes at the edge without manual entry.","t":"Splunk Edge Hub (USB camera + custom container), v2.1+ (USB passthrough)","d":"`index=edge-hub-logs` sourcetype=splunk_edge_hub_log barcode_scan_event, `index=edge-hub-data` scan_metadata","q":"index=edge-hub-logs sourcetype=splunk_edge_hub_log barcode_scan_event\n| regex barcode_value=\"^[0-9]{12,14}$\"\n| stats count as successful_scans, count(eval(barcode_valid=\"NO\")) as invalid_scans by host, scan_location\n| eval scan_accuracy = (successful_scans / (successful_scans + invalid_scans)) * 100\n| where scan_accuracy < 95","m":"Connect USB camera to Edge Hub USB port (requires v2.1+ for USB device passthrough). Build custom ARM64 container using OpenCV + pyzbar/python-qrcode libraries for barcode detection. Container captures video frames, decodes barcodes/QR codes, and logs scan_id + barcode_value to edge-hub-logs. Implement local SQLite database (in container) to store scanned inventory and prevent duplicate entries. Publish scan events to MQTT (Advanced Settings \u2192 MQTT Publish) for downstream processing. Configure edge.json resource limits: memory 512MB, CPU 2 cores (video processing is CPU-intensive).","z":"Scan success rate trend, invalid barcode timeline, inventory reconciliation report."},{"i":"14.3.29","n":"Audio Classification for Anomalous Sound Detection","c":"medium","f":"expert","v":"Detects equipment distress (compressor cavitation, bearing squeal, motor whine) by classifying sound types without FFT spectral analysis.","t":"Splunk Edge Hub (stereo microphone + NPU container), v2.1+","d":"`index=edge-hub-logs` sourcetype=splunk_edge_hub_log audio_classification_event, `index=edge-hub-data` audio_class_confidence","q":"index=edge-hub-logs sourcetype=splunk_edge_hub_log audio_classification_event\n| stats count as classification_attempts, count(eval(sound_class=\"ABNORMAL\")) as anomalies by host, equipment_type\n| eval anomaly_rate = (anomalies / classification_attempts) * 100\n| where anomaly_rate > 5","m":"Deploy TensorFlow Lite audio classification model (v2.1+ NPU support) in custom ARM64 container. Train model on normal equipment sounds (baseline) and abnormal sounds (target classes: cavitation, squeal, whine, vibration). Container processes 1-second audio chunks from stereo microphone at 16kHz, runs inference on NPU, publishes classification result (sound_class + confidence) to MQTT. Store classification logs locally for retraining. Configure edge.json: memory 512MB, CPU 1 core. Note: Do not stream raw audio to cloud (privacy); only log classification results.","z":"Anomaly classification frequency, confidence score distribution, sound type timeline."},{"i":"14.3.30","n":"Predictive Maintenance via NPU-Based Model Inference","c":"high","f":"advanced","v":"Predicts equipment failures (bearing degradation, motor insulation breakdown) 7-30 days in advance using on-device ML inference.","t":"Splunk Edge Hub (NPU + custom container), v2.1+, OT Intelligence","d":"`index=edge-hub-data` raw sensor metrics, `index=edge-hub-logs` predictive_maintenance_inference","q":"index=edge-hub-logs sourcetype=splunk_edge_hub_log predictive_model_inference failure_risk_score>0.7\n| stats count as high_risk_predictions, avg(failure_risk_score) as avg_risk by equipment_id, host\n| eval maintenance_urgency=case(avg_risk > 0.85, \"CRITICAL\", avg_risk > 0.7, \"HIGH\", 1=1, \"MEDIUM\")","m":"Train XGBoost or TensorFlow Lite model offline using historical sensor data (temperature, vibration, power consumption trends). Quantize model to INT8 for NPU deployment. Build custom ARM64 container that streams sensor features (via gRPC API) into model inference pipeline running on NPU. Model outputs failure_risk_score (0-1 scale). If score > 0.7, trigger alert and log predictive maintenance event. Store raw feature vectors locally (3M backlog) for continuous model retraining. Configure edge.json: memory 512MB, CPU 2 cores, NPU enabled.","z":"Failure risk score trend, maintenance urgency gauge, prediction accuracy (post-hoc) scatter."},{"i":"14.3.31","n":"OPC-UA Tag Browsing & Change Detection","c":"high","f":"advanced","v":"Monitors PLC tag changes in real-time and alerts on unexpected data type or value changes indicating program modification or malfunction.","t":"Splunk Edge Hub (OPC-UA client), Splunk OT Intelligence","d":"`index=edge-hub-logs` sourcetype=splunk_edge_hub_opcua, `index=edge-hub-health` sourcetype=edge_hub","q":"index=edge-hub-logs sourcetype=splunk_edge_hub_opcua opcua_tag=* opcua_value=*\n| stats latest(opcua_value) as latest_val, latest(opcua_data_type) as latest_type by opcua_tag, host\n| join opcua_tag [| rest /services/saved/data-model/indexes/OT_Industry_Process_Assets | fields asset_id, tag_name, expected_data_type]\n| where latest_type != expected_data_type\n| eval change_alert=\"DATA_TYPE_MISMATCH\"","m":"Configure OPC-UA connection in Advanced Settings \u2192 OPC-UA tab with PLC/SCADA server hostname (port 4840), username/password or anonymous authentication. Browse PLC namespace to discover tags. Enable continuous polling of selected tags at 5-second intervals. Configure threshold alerts on value changes (delta > 20% or absolute > threshold). Store tag values in edge-hub-logs index with sourcetype=splunk_edge_hub_opcua. Detect unexpected data type changes (INT to FLOAT) or tag disappearance (PLC program change). Use local SQLite backlog (100K event capacity) for connectivity loss resilience.","z":"Tag value trend, data type change alert, PLC program integrity dashboard."},{"i":"14.3.32","n":"Modbus TCP Register Monitoring for Industrial Equipment","c":"high","f":"advanced","v":"Monitors equipment operational parameters via Modbus registers without requiring specialized data collection agents.","t":"Splunk Edge Hub (Modbus TCP client), Splunk OT Intelligence","d":"`index=edge-hub-logs` sourcetype=edge_hub modbus_register, `index=edge-hub-data` modbus_metric","q":"index=edge-hub-logs sourcetype=edge_hub modbus_register\n| regex modbus_register_name=\"^(voltage|current|frequency)\"\n| stats latest(register_value) as latest_val by modbus_register_name, modbus_device_ip\n| eval register_healthy=case(\n    modbus_register_name=\"voltage\" AND latest_val >= 210 AND latest_val <= 250, \"YES\",\n    modbus_register_name=\"current\" AND latest_val >= 0 AND latest_val <= 100, \"YES\",\n    modbus_register_name=\"frequency\" AND latest_val >= 49 AND latest_val <= 51, \"YES\",\n    1=1, \"NO\")\n| where register_healthy=\"NO\"","m":"Configure Modbus TCP in Advanced Settings \u2192 Modbus tab with equipment IP/port (default 502). Define register map (coils, discrete inputs, holding registers, input registers) with OID aliases for readability. Configure polling interval (10-30 seconds typical) and register read strategy (optimized batching). Store register values in edge-hub-logs (events) or as metrics in edge-hub-data. Map register indices to human-readable tags (e.g., 0x1234\u2192\"VFD_Speed_Hz\"). Local SQLite backlog stores 100K Modbus events for offline resilience.","z":"Register value trend, equipment health gauge, Modbus gateway connection status."},{"i":"14.3.33","n":"Multi-Protocol Sensor Fusion (OPC-UA + MQTT + Built-in)","c":"high","f":"intermediate","v":"Correlates data from heterogeneous sources (PLC via OPC-UA, IoT devices via MQTT, internal sensors) to identify root causes of anomalies.","t":"Splunk Edge Hub (multi-protocol aggregation), Splunk OT Intelligence","d":"`index=edge-hub-logs` sourcetype=splunk_edge_hub_opcua OR splunk_edge_hub_log (MQTT), `index=edge-hub-data` all metric types","q":"(index=edge-hub-logs sourcetype=splunk_edge_hub_opcua OR index=edge-hub-logs sourcetype=splunk_edge_hub_log mqtt_topic=*)\nOR index=edge-hub-data metric_name=temperature\n| stats avg(temperature) as temp, avg(opc_ua_motor_current) as motor_current,\n        avg(mqtt_load_percent) as load by equipment_id, _time span=5m\n| eval correlation=correlation(temp, motor_current)\n| where correlation > 0.8\n| eval root_cause=case(\n    temp > 80 AND motor_current > 15, \"THERMAL_OVERLOAD\",\n    temp > 80 AND motor_current < 5, \"SENSOR_FAILURE\",\n    1=1, \"UNKNOWN\")","m":"Configure all three connectivity modes simultaneously: (1) OPC-UA to PLC (Advanced Settings \u2192 OPC-UA), (2) MQTT subscriptions to IoT devices (Advanced Settings \u2192 MQTT Subscriptions), (3) Enable built-in sensors (temperature, humidity, etc.). Set each protocol's polling interval (OPC-UA 5s, MQTT 10s, sensors 30s) to minimize latency skew. Ingest all data streams with consistent timestamps. Local SQLite backlog (3M data points) ensures data fusion doesn't lose events. Use downstream Splunk correlation SPL for multi-modal root cause analysis.","z":"Multi-protocol correlation heatmap, root cause attribution waterfall, equipment health scorecard."},{"i":"14.3.34","n":"Protocol Gateway Health & Connectivity Monitoring","c":"medium","f":"intermediate","v":"Tracks OPC-UA/Modbus/MQTT gateway uptime and connection quality to prevent silent data loss.","t":"Splunk Edge Hub (health monitoring), Splunk OT Intelligence","d":"`index=edge-hub-health` sourcetype=edge_hub, `index=edge-hub-logs` sourcetype=splunk_edge_hub_log connection_event","q":"index=edge-hub-health sourcetype=edge_hub gateway_name=*\n| stats latest(connection_status) as status, latest(response_time_ms) as response_time,\n        count(eval(error_code!=0)) as error_count by gateway_name, host\n| eval gateway_health=case(\n    status=\"CONNECTED\" AND response_time < 1000 AND error_count < 5, \"HEALTHY\",\n    status=\"CONNECTED\" AND response_time >= 1000, \"SLOW\",\n    status=\"DISCONNECTED\" OR error_count > 10, \"DEGRADED\",\n    1=1, \"UNKNOWN\")","m":"Edge Hub continuously monitors OPC-UA (port 4840), Modbus TCP (port 502), and MQTT broker (port 1883) connectivity every 15 seconds. Log connection attempts + response times to edge-hub-health index (sourcetype=edge_hub). Track error codes (authentication failures, timeouts, handshake errors). Store 100K health events locally. If gateway disconnects, LED ring turns red. Resume transmission via local SQLite backlog (FIFO) when connectivity restored. Configure alert thresholds: downtime > 1 minute = critical, response time > 2s = warning.","z":"Gateway uptime timeline, response time histogram, error rate trend."},{"i":"14.3.35","n":"Industrial Alarm Management via OPC-UA","c":"critical","f":"intermediate","v":"Centralizes alarm processing from multiple PLCs via OPC-UA Alarms & Events service, preventing missed critical alerts.","t":"Splunk Edge Hub (OPC-UA A&E client), Splunk OT Intelligence","d":"`index=edge-hub-logs` sourcetype=splunk_edge_hub_opcua alarm_event, `index=edge-hub-health` sourcetype=edge_hub","q":"index=edge-hub-logs sourcetype=splunk_edge_hub_opcua alarm_event=true\n| stats count as alarm_count, latest(alarm_severity) as severity, latest(alarm_message) as msg by source_node_id, _time span=1m\n| where severity=\"HIGH\" OR severity=\"CRITICAL\"\n| eval acknowledgment_status=if(isnotnull(acknowledged_time), \"ACK\", \"UNACK\")\n| where acknowledgment_status=\"UNACK\"","m":"Configure OPC-UA in Advanced Settings \u2192 OPC-UA tab with Alarms & Events subscription enabled. Define event filters for alarm severity levels (High, Critical). Edge Hub subscribes to server's Alarms & Events namespace and logs all alarm state changes (triggered, acknowledged, cleared) to edge-hub-logs (sourcetype=splunk_edge_hub_opcua). Store alarm events locally via 100K backlog for resilience. Implement alarm acknowledgment workflow: operator ack in Splunk \u2192 webhook \u2192 OPC-UA Acknowledge operation. Color LED ring based on highest unacknowledged severity (red=critical, orange=high).","z":"Alarm frequency timeline, severity distribution pie, acknowledgment status list."},{"i":"14.3.36","n":"Energy Meter Integration via Modbus TCP","c":"medium","f":"advanced","v":"Monitors power consumption and demand charges in real-time to identify energy waste and optimize utility costs.","t":"Splunk Edge Hub (Modbus TCP client), Splunk OT Intelligence","d":"`index=edge-hub-logs` sourcetype=edge_hub modbus_register meter_type=energy, `index=edge-hub-data` metric_name=power","q":"index=edge-hub-logs sourcetype=edge_hub modbus_register meter_type=energy modbus_register_name=total_energy_kwh\n| stats latest(register_value) as total_kwh, latest(_time) as latest_time by meter_id\n| join meter_id [| rest /services/saved/data-model/indexes/energy_meter_cost_model | fields meter_id, cost_per_kwh]\n| eval daily_cost=(total_kwh * cost_per_kwh)\n| stats sum(daily_cost) as total_daily_cost by meter_id\n| where total_daily_cost > threshold","m":"Deploy Edge Hub with Modbus TCP connectivity to energy meter (Schneider, Siemens, ABB models typical support). Configure register map: 0x0000=voltage, 0x0002=current, 0x0004=power_factor, 0x000C=total_energy_kwh. Set polling interval to 1-5 minutes for demand tracking. Store register values in edge-hub-logs as events or convert to metrics (kW, kVAR) in edge-hub-data for time-series analysis. Local SQLite backlog ensures no consumption data is lost. Implement demand charge alerts (cost spike detection) via SPL.","z":"Energy consumption trend, cost breakdown by zone, demand charge projection."},{"i":"14.3.37","n":"PLC Program Change Detection via OPC-UA Timestamp Monitoring","c":"critical","f":"expert","v":"Detects unauthorized or accidental PLC program modifications by tracking program last-edit timestamp changes.","t":"Splunk Edge Hub (OPC-UA client), Splunk OT Intelligence","d":"`index=edge-hub-logs` sourcetype=splunk_edge_hub_opcua program_timestamp_event","q":"index=edge-hub-logs sourcetype=splunk_edge_hub_opcua program_timestamp_event\n| stats latest(program_last_modified) as current_timestamp by program_id, plc_ip\n| join program_id [| rest /services/saved/data-model/indexes/plc_program_baseline | fields program_id, last_known_timestamp, last_known_user]\n| where current_timestamp != last_known_timestamp\n| eval program_change=\"DETECTED\"\n| eval time_since_change_hours=((now() - current_timestamp) / 3600)","m":"Configure OPC-UA subscriptions to PLC program metadata tags (if available) or implement custom OPC-UA node reads for program timestamp info. Some PLC vendors expose system time for last program write. Query these tags every 5-10 minutes. Store baseline program timestamp on first run. Alert if current timestamp differs from baseline (indicates program reload or modification). Log change details to edge-hub-logs. Correlate with PLC user login logs (if available via separate data source) to identify who modified program. This is security-critical for industrial environments.","z":"Program timestamp timeline, change detection alert, modification history."},{"i":"14.3.38","n":"SCADA HMI Event Capture & Operator Action Logging","c":"medium","f":"intermediate","v":"Audits all HMI operator actions (setpoint changes, equipment starts/stops) for compliance and root cause analysis.","t":"Splunk Edge Hub (OPC-UA tag subscription), Splunk OT Intelligence","d":"`index=edge-hub-logs` sourcetype=splunk_edge_hub_opcua hmi_event, `index=edge-hub-health` sourcetype=edge_hub","q":"index=edge-hub-logs sourcetype=splunk_edge_hub_opcua hmi_event=true\n| regex field_name=\"setpoint|start|stop|mode\"\n| stats count as action_count, latest(field_value) as value by operator_id, _time span=1h\n| eval action_frequency=(action_count / 60)\n| where action_frequency > 5\n| eval operator_behavior=\"UNUSUAL\"","m":"Configure OPC-UA subscriptions to HMI write tags (setpoints, control commands). Enable change notification for tags with ValueWrite attributes. Log tag writes with operator context (user ID from HMI session) to edge-hub-logs (sourcetype=splunk_edge_hub_opcua). Store events locally (100K backlog) for audit trail continuity. Implement audit report: operator ID, timestamp, tag name, old value, new value, status. Alert on unusual operator behavior patterns (too many commands in short time window).","z":"Operator action timeline, command frequency histogram, unusual behavior alert."},{"i":"14.3.39","n":"Multi-Device Fleet Firmware Version Compliance","c":"high","f":"expert","v":"Ensures all Edge Hubs in a fleet run current firmware versions to maintain security and feature parity.","t":"Splunk Edge Hub (multiple devices), Splunk OT Intelligence","d":"`index=edge-hub-health` sourcetype=edge_hub firmware_version, `index=edge-hub-logs` firmware_update_event","q":"index=edge-hub-health sourcetype=edge_hub\n| stats latest(firmware_version) as fw_version, latest(os_build_number) as build by host, device_id\n| stats dc(fw_version) as unique_versions, count as total_devices by location\n| where unique_versions > 1\n| eval compliance=\"DRIFTED\"\n| join location [| rest /services/data-model/indexes/edge_hub_fleet_baseline | fields location, target_firmware_version]\n| where fw_version != target_firmware_version","m":"Central Splunk instance receives health data from all Edge Hubs via HEC (HTTP Event Collector). Health heartbeat includes firmware_version + build_number every 5 minutes (stored in edge-hub-health index). Create baseline search for target firmware per location/site. Alert when devices drift from baseline (old firmware detected). Implement scheduled search that flags out-of-compliance devices for manual firmware update. Store update history in edge-hub-logs for audit trail. For multi-region deployments, allow per-region firmware versions.","z":"Firmware version distribution pie, device compliance status list, update history timeline."},{"i":"14.3.40","n":"Device Location Tracking via GNSS","c":"medium","f":"advanced","v":"Monitors Edge Hub physical location for mobile/outdoor deployments to verify proper coverage and detect theft/unauthorized movement.","t":"Splunk Edge Hub (cellular + GNSS), Splunk OT Intelligence","d":"`index=edge-hub-logs` sourcetype=edge_hub gnss_position, `index=edge-hub-health` sourcetype=edge_hub location_heartbeat","q":"index=edge-hub-logs sourcetype=edge_hub gnss_position=true\n| stats latest(latitude) as lat, latest(longitude) as lon, latest(accuracy_meters) as accuracy by device_id\n| join device_id [| rest /services/data-model/indexes/edge_hub_location_baseline | fields device_id, expected_latitude, expected_longitude, geofence_radius_meters]\n| eval distance=sqrt(((lat - expected_latitude)*111111)^2 + ((lon - expected_longitude)*111111*cos(expected_latitude*pi()/180))^2)\n| where distance > geofence_radius_meters\n| eval location_drift=\"ALERT\"","m":"Edge Hub with cellular module (LTE/4G) includes integrated GNSS receiver. Enable GNSS in Advanced Settings (requires clear sky line-of-sight). Edge Hub logs GPS position (latitude, longitude, accuracy_meters) to edge-hub-logs every 15 minutes. Store expected location + geofence radius per device. Alert if device moves outside geofence (e.g., trailer theft detection, equipment relocation). For outdoor industrial sites, track GNSS acquisition time and accuracy metrics (typically 5-20m accuracy in open sky). Local SQLite stores 30+ days of position history.","z":"Device location map, geofence status indicator, movement timeline."},{"i":"14.3.41","n":"Cellular Connectivity Quality & Signal Strength Monitoring","c":"high","f":"intermediate","v":"Tracks LTE/4G signal strength and network latency to predict connectivity issues and plan network upgrades.","t":"Splunk Edge Hub (cellular module), Splunk OT Intelligence","d":"`index=edge-hub-health` sourcetype=edge_hub cellular_signal, `index=edge-hub-logs` cellular_connect_event","q":"index=edge-hub-health sourcetype=edge_hub\n| stats latest(rssi_dbm) as signal_dbm, latest(sinr_db) as sinr, latest(latency_ms) as latency,\n        latest(network_type) as net_type by host, cell_id\n| eval signal_quality=case(\n    signal_dbm > -80 AND sinr > 15, \"EXCELLENT\",\n    signal_dbm > -90 AND sinr > 5, \"GOOD\",\n    signal_dbm > -100, \"FAIR\",\n    1=1, \"POOR\")\n| stats avg(latency) as avg_latency by signal_quality, host","m":"Edge Hub cellular module reports RSSI (signal strength -140 to 0 dBm), SINR (signal-to-interference noise ratio dB), network latency (ms), and network type (LTE Band, 4G, etc.) to edge-hub-health index every 5 minutes. Strong signal: RSSI > -80 dBm. Acceptable signal: RSSI -80 to -100 dBm. Poor signal: RSSI < -100 dBm. Track carrier (AT&T, Verizon, etc.) and band for capacity planning. Alert if signal drops below -100 dBm or latency exceeds 500ms (indicates backhaul congestion or dead zone).","z":"Signal strength heatmap, latency trend, network type distribution."},{"i":"14.3.42","n":"Edge Hub Resource Capacity Planning & CPU/Memory Utilization","c":"medium","f":"intermediate","v":"Prevents Edge Hub performance degradation and data loss by tracking resource utilization and planning for container resource allocation.","t":"Splunk Edge Hub (system monitoring), Splunk OT Intelligence","d":"`index=edge-hub-health` sourcetype=edge_hub cpu_percent, memory_percent, disk_used_mb","q":"index=edge-hub-health sourcetype=edge_hub\n| stats avg(cpu_percent) as avg_cpu, max(cpu_percent) as peak_cpu,\n        avg(memory_percent) as avg_mem, max(memory_percent) as peak_mem,\n        latest(disk_used_mb) as disk_used by host, _time span=1h\n| eval cpu_headroom=(100 - peak_cpu), mem_headroom=(100 - peak_mem), disk_available_mb=(32000 - disk_used)\n| where cpu_headroom < 10 OR mem_headroom < 5 OR disk_available_mb < 1000\n| eval resource_alert=\"CAPACITY_WARNING\"","m":"Edge Hub OS reports CPU %, memory %, disk %, and container-level resource stats to edge-hub-health index every 5 minutes. NXP IMX8M has 8GB RAM total: allocate 4GB for OS/system, 4GB for containers. Each container configured with memory limits in edge.json (e.g., 512MB, 256MB). Monitor peak CPU during data bursts (e.g., video processing, FFT computation). Alert when peak CPU > 80% (insufficient headroom for spikes) or memory > 95% (OOM risk). Plan container consolidation or upgrade if resources consistently constrained.","z":"CPU usage trend, memory usage gauge, container resource breakdown pie, capacity projection."},{"i":"14.3.43","n":"Configuration Drift Detection Across Fleet","c":"high","f":"expert","v":"Ensures all Edge Hubs in a fleet maintain consistent configuration (MQTT topics, OPC-UA endpoints, polling intervals) to prevent data inconsistencies.","t":"Splunk Edge Hub (fleet management), Splunk OT Intelligence","d":"`index=edge-hub-logs` sourcetype=edge_hub config_hash, `index=edge-hub-health` configuration_snapshot","q":"index=edge-hub-health sourcetype=edge_hub configuration_snapshot=true\n| stats latest(config_hash) as current_hash, latest(config_timestamp) as timestamp by host, location\n| stats dc(current_hash) as unique_configs, count as total_devices by location\n| where unique_configs > 1\n| eval config_drift=\"DETECTED\"\n| join location [| rest /services/data-model/indexes/approved_fleet_configs | fields location, approved_config_hash, approved_timestamp]\n| where current_hash != approved_config_hash","m":"Edge Hub computes MD5 hash of entire configuration (MQTT subscriptions, OPC-UA endpoints, Modbus registers, container definitions, sensor polling intervals) and reports to edge-hub-health index weekly. Central Splunk instance generates baseline config hash per location/site. Alert if device config hash differs (indicates manual configuration, failed deployment, or malicious modification). Implement remediation workflow: flag device for manual inspection or trigger automated config re-deployment via edge.json manifest update. Store configuration snapshots locally for historical comparison.","z":"Config drift alert, baseline hash variance, deployment history timeline."},{"i":"14.3.44","n":"Local Backlog Monitoring & Data Loss Prevention","c":"critical","f":"intermediate","v":"Prevents silent data loss by monitoring local SQLite backlog capacity and alerting before data is discarded.","t":"Splunk Edge Hub (local storage), Splunk OT Intelligence","d":"`index=edge-hub-health` sourcetype=edge_hub backlog_status, `index=edge-hub-logs` backlog_overflow_event","q":"index=edge-hub-health sourcetype=edge_hub\n| stats latest(backlog_sensor_data_count) as sensor_backlog, latest(backlog_max_capacity) as capacity,\n        latest(backlog_events_lost) as lost_count by host\n| eval backlog_utilization=(sensor_backlog / capacity) * 100\n| eval data_loss_risk=case(\n    backlog_utilization > 95, \"CRITICAL\",\n    backlog_utilization > 80, \"HIGH\",\n    backlog_utilization > 60, \"MEDIUM\",\n    1=1, \"LOW\")\n| where data_loss_risk!=\"LOW\"","m":"Edge Hub tracks SQLite backlog capacity: 3M sensor data points, 100K events (logs/health/anomalies), 100K SNMP data points. Report current backlog size + utilization % to edge-hub-health index every 5 minutes. Alert if utilization exceeds 80% (indicates connectivity outage or ingestion backlog). During Splunk cloud outage, Edge Hub continues logging to local SQLite; upon reconnection, HEC batch processor sends oldest 10K entries in batches of 100 until caught up. Implement alert: if backlog at 95% capacity for >30 minutes, oldest data will be lost (FIFO). Set escalating alert thresholds to trigger remediation.","z":"Backlog utilization gauge, lost data counter, recovery timeline."},{"i":"14.3.45","n":"USB Camera People Counting for Occupancy & Capacity Management","c":"medium","f":"expert","v":"Enables real-time facility occupancy tracking and automatic alerts when spaces exceed safe capacity thresholds.","t":"Splunk Edge Hub (USB camera + NPU container), v2.1+","d":"`index=edge-hub-logs` sourcetype=splunk_edge_hub_log people_count_event, `index=edge-hub-data` metric_name=occupancy_count","q":"index=edge-hub-logs sourcetype=splunk_edge_hub_log people_count_event\n| stats latest(people_detected) as occupancy, latest(_time) as timestamp, max(people_detected) as peak_occupancy by location, camera_id\n| join location [| rest /services/data-model/indexes/facility_capacity_limits | fields location, max_occupancy_safe, max_occupancy_emergency]\n| eval capacity_status=case(\n    occupancy > max_occupancy_emergency, \"EMERGENCY_EXCEEDED\",\n    occupancy > max_occupancy_safe, \"OVERCROWDED\",\n    1=1, \"NORMAL\")\n| stats latest(capacity_status) as status, avg(occupancy) as avg_occ by location","m":"Deploy Edge Hub with USB camera (v2.1+ USB passthrough required). Build custom ARM64 container using TensorFlow Lite + OpenCV for person detection + counting (YOLO or MobileNet models work well). Container processes video frames at 1-2 fps, outputs people_count metric to MQTT and event logs. Run inference on NPU (v2.1+) for real-time performance. Configure container resource limits: memory 512MB, CPU 2 cores. Set safe + emergency capacity thresholds per location. Alert if occupancy exceeds safe threshold; trigger intercom/visual alerts if emergency threshold exceeded.","z":"Occupancy trend by location, capacity status heatmap, peak occupancy histogram."},{"i":"14.3.46","n":"USB Camera Visual Inspection for Manufacturing Defects","c":"high","f":"advanced","v":"Automates defect detection on assembly lines by running visual inspection models on captured images without human intervention.","t":"Splunk Edge Hub (USB camera + NPU container), v2.1+, OT Intelligence","d":"`index=edge-hub-logs` sourcetype=splunk_edge_hub_log visual_inspection_event, `index=edge-hub-data` inspection_metadata","q":"index=edge-hub-logs sourcetype=splunk_edge_hub_log visual_inspection_event defect_detected=true\n| stats count as defect_count, count(eval(defect_severity=\"CRITICAL\")) as critical_defects by location, product_line\n| eval defect_rate=(defect_count / total_parts_inspected) * 100\n| where defect_rate > acceptable_defect_rate\n| eval quality_alert=\"DEFECT_RATE_EXCEEDED\"","m":"Deploy Edge Hub with USB camera pointing at assembly line. Train TensorFlow Lite object detection model (e.g., SSD MobileNet) on product images with annotated defects (scratches, dents, misalignment, discoloration). Build custom ARM64 container that captures images at takt time (e.g., 1 image per part), runs inference on NPU, logs result (defect_detected=true/false, defect_class, confidence) to edge-hub-logs. Store images locally only if defect detected (privacy + storage). Implement local alerting: if defect severity=CRITICAL, trigger relay to stop conveyor belt. Configure edge.json resource limits: memory 512MB, CPU 2 cores, GPU (NPU) enabled.","z":"Defect detection timeline, defect type distribution pie, quality trend chart."},{"i":"14.3.47","n":"Custom Python Container for API Integration & Data Enrichment","c":"medium","f":"expert","v":"Integrates Edge Hub data with external APIs (weather, commodity prices, inventory systems) to enrich sensor context without cloud latency.","t":"Splunk Edge Hub (custom container), gRPC SDK, HTTP client","d":"`index=edge-hub-data` enriched_sensor_metrics, `index=edge-hub-logs` enrichment_event","q":"index=edge-hub-data metric_name=temperature\n| join host [| mstats avg(temperature) as avg_temp by host | eval weather_context_available=1]\n| stats avg(avg_temp) as sensor_temp, latest(external_air_temp_c) as api_air_temp by host\n| eval correlation=correlation(sensor_temp, api_air_temp)\n| where correlation < 0.5\n| eval enrichment_anomaly=\"LOW_CORRELATION\"","m":"Build custom ARM64 container with Python requests library. Container subscribes to sensor data via gRPC API, periodically fetches external data (weather API, stock prices, etc.) via HTTPS, correlates with sensor data, and publishes enriched metrics back to MQTT. Example: fetch external air temperature from weather API every 30 minutes, correlate with Edge Hub inside temperature to detect HVAC failures. Implement caching layer to minimize API calls. Store enrichment logs locally. Configure edge.json: memory 256MB, CPU 1 core. Container runs as non-root (v2.0+).","z":"Sensor vs API correlation scatter, enrichment success rate trend, external data staleness timeline."},{"i":"14.3.48","n":"Pressure & Humidity Sensor Correlation for Leakage Detection","c":"high","f":"expert","v":"Detects water leaks or condensation damage early by correlating pressure drop with humidity rise in sealed enclosures.","t":"Splunk Edge Hub (pressure + humidity sensors), Splunk OT Intelligence","d":"`index=edge-hub-data` metric_name=pressure OR metric_name=humidity, `sourcetype=edge_hub`","q":"| mstats avg(pressure) as press, avg(humidity) as rh by host, _time span=5m\n| delta press as press_change\n| stats avg(press_change) as avg_press_delta, stdev(rh) as rh_volatility by host\n| eval leak_risk=case(\n    avg_press_delta < -0.5 AND rh_volatility > 10, \"CRITICAL_LEAK\",\n    avg_press_delta < -0.2 AND rh_volatility > 5, \"POTENTIAL_LEAK\",\n    1=1, \"NORMAL\")\n| where leak_risk!=\"NORMAL\"","m":"Deploy Edge Hub in sealed enclosure (electrical room, equipment cabinet) with optional pressure sensor (\u00b10.12 hPa accuracy) and built-in humidity sensor exposed to enclosure air. Configure 5-minute polling. Monitor pressure trend: sealed enclosure pressure should remain stable (\u00b11 hPa). Pressure drop + humidity rise = leakage from outside or failed seal. Humidity rise alone = internal moisture generation (faulty equipment). Implement baseline: first week = normal enclosure profile. Alert if pressure drops >1 hPa/hour (rapid leak). Store local SQLite data for 30+ days to track seasonal humidity variations. Trigger maintenance ticket on leak detection.","z":"Pressure vs humidity scatter plot, leak risk gauge, enclosure seal integrity trend."},{"i":"14.3.49","n":"Sound Level & Frequency Band Monitoring for Regulatory Compliance","c":"medium","f":"advanced","v":"Monitors workplace noise levels to ensure OSHA compliance (90 dB over 8 hours) and tracks frequency bands for hearing loss risk.","t":"Splunk Edge Hub (stereo microphone + custom container), gRPC SDK","d":"`index=edge-hub-data` metric_name=sound_level_db OR metric_name=frequency_band_power, `sourcetype=edge_hub`","q":"| mstats avg(sound_level_db) as avg_db, max(sound_level_db) as peak_db by location, _time span=1h\n| stats avg(avg_db) as hourly_avg_db, max(peak_db) as hourly_peak_db by location\n| eval osha_exposure_rating=case(\n    hourly_avg_db >= 90, \"NO_PROTECTION_REQUIRED\",\n    hourly_avg_db >= 85, \"HEARING_PROTECTION_REQUIRED\",\n    1=1, \"SAFE\")\n| where osha_exposure_rating=\"HEARING_PROTECTION_REQUIRED\"","m":"Deploy Edge Hub with stereo microphone in warehouse/factory/airport locations. Configure 1-hour aggregation for OSHA 8-hour TWA (time-weighted average). Build custom container that computes: (1) dB(A) sound pressure level (apply A-weighting curve), (2) frequency band powers (125Hz, 250Hz, 500Hz, 1kHz, 2kHz, 4kHz, 8kHz octave bands). Store hourly averages in edge-hub-data metrics. Alert if hourly average exceeds 85 dB (OSHA hearing protection threshold). Log high-frequency band power (4-8kHz) for hearing loss risk assessment. Note: Do not stream raw audio; only log processed metrics for privacy.","z":"Noise level trend by location, frequency band heatmap, OSHA compliance status."},{"i":"14.3.50","n":"Accelerometer-Based Fall Detection & Impact Monitoring","c":"high","f":"advanced","v":"Detects equipment falls or impacts (e.g., dropped sensors, dropped parts on conveyor) to trigger automatic alerts and prevent asset loss.","t":"Splunk Edge Hub (3-axis accelerometer + custom container)","d":"`index=edge-hub-logs` sourcetype=splunk_edge_hub_log impact_event, `index=edge-hub-data` metric_name=acceleration_magnitude","q":"index=edge-hub-logs sourcetype=splunk_edge_hub_log impact_event=true\n| stats count as impact_count, max(peak_acceleration_g) as max_impact_g by device_id, location\n| eval impact_severity=case(\n    max_impact_g > 15, \"CRITICAL_DAMAGE_RISK\",\n    max_impact_g > 10, \"SEVERE_IMPACT\",\n    max_impact_g > 5, \"MODERATE_IMPACT\",\n    1=1, \"LIGHT_IMPACT\")\n| where impact_severity!=\"LIGHT_IMPACT\"","m":"Build custom ARM64 container that monitors 3-axis accelerometer data via gRPC API in real-time (100Hz sampling). Implement impact detection: compute magnitude sqrt(ax^2 + ay^2 + az^2), apply high-pass filter to remove gravity component, detect transient spikes > 5g lasting < 500ms (characteristic of impacts). Log impact events with peak acceleration and timestamp. Configure local alerting: if peak > 15g, trigger relay to activate warning LED/buzzer. Store impact history locally (100K backlog) for root cause analysis. Use for monitoring fragile sensor deployments or tracking dropped parts on assembly lines.","z":"Impact event timeline, severity distribution histogram, peak acceleration trend."},{"i":"14.3.51","n":"Temperature & Humidity Sensor Calibration Drift Detection","c":"high","f":"intermediate","v":"Detects when sensors exceed acceptable calibration drift to trigger preventive recalibration and ensure measurement accuracy.","t":"Splunk Edge Hub (temperature + humidity sensors), Splunk OT Intelligence","d":"`index=edge-hub-health` sourcetype=edge_hub sensor_calibration_status, `index=edge-hub-data` sensor_drift_metric","q":"index=edge-hub-health sourcetype=edge_hub sensor_type=temperature OR sensor_type=humidity\n| stats latest(last_calibration_date) as last_cal, latest(sensor_drift_percent) as drift by sensor_type, host\n| eval days_since_calibration=(now() - strptime(last_cal, \"%Y-%m-%d\")) / 86400\n| eval calibration_status=case(\n    drift > 5 OR days_since_calibration > 365, \"OUT_OF_SPEC\",\n    drift > 2 OR days_since_calibration > 180, \"MARGINAL\",\n    1=1, \"GOOD\")\n| where calibration_status!=\"GOOD\"","m":"Edge Hub firmware tracks sensor calibration date and calculates drift estimate (comparison to stable reference or statistical baseline). Temperature sensor nominal accuracy \u00b10.2\u00b0C; alert if drift exceeds \u00b10.5\u00b0C (\u00b12.5x drift). Humidity sensor nominal accuracy \u00b12%; alert if drift exceeds \u00b15% RH (\u00b12.5x drift). Report calibration status to edge-hub-health every week. Recommend recalibration every 12 months or after >2% drift detected. Store calibration history in edge-hub-logs for audit trail. For critical environments (pharmaceutical, food), set more aggressive drift thresholds (\u00b11% per year).","z":"Sensor drift gauge, calibration status list, recalibration due timeline."},{"i":"14.3.52","n":"Light Sensor Ambient Light Level Anomaly Detection","c":"medium","f":"advanced","v":"Detects sudden lighting failures or unauthorized facility access by monitoring ambient light level anomalies.","t":"Splunk Edge Hub (light sensor), Splunk OT Intelligence","d":"`index=edge-hub-data` metric_name=light_level, `sourcetype=edge_hub`","q":"| mstats avg(light_level) as lux by location, _time span=5m\n| stats avg(lux) as baseline_lux, stdev(lux) as lux_std by location\n| relative_entropy baseline_lux, lux\n| where lux < (baseline_lux - 3*lux_std)\n| eval light_anomaly=case(\n    lux < 10, \"LIGHTS_OFF_OR_DARKNESS\",\n    lux < (baseline_lux / 2), \"SEVERE_DIMMING\",\n    1=1, \"MODERATE_DIMMING\")","m":"Deploy Edge Hub light sensor in areas with regular light schedule (e.g., office hours 8am-6pm, lights expected 200-500 lux). Collect 7-day baseline to learn normal lighting schedule. Use built-in kNN anomaly detection to flag sudden light level changes (e.g., lights switched off during business hours = facility access anomaly). Alert if lux drops below 10 for extended period (darkness = potential theft/intrusion). Configure 5-minute polling interval. Light sensor high sensitivity range: 0-65535 lux. Store local SQLite data for 30+ days to track seasonal lighting changes.","z":"Light level trend by location, anomaly detection timeline, darkness event log."},{"i":"14.3.53","n":"Vibration Magnitude Threshold Monitoring for Equipment Protection","c":"critical","f":"expert","v":"Protects precision equipment from damage by triggering automatic shutdowns when vibration exceeds safe operating thresholds.","t":"Splunk Edge Hub (3-axis accelerometer + custom container), gRPC SDK","d":"`index=edge-hub-data` metric_name=vibration_magnitude, `index=edge-hub-logs` vibration_threshold_event","q":"| mstats max(vibration_magnitude) as peak_vib by equipment_id, _time span=10s\n| eval equipment_class=\"PRECISION_MACHINERY\"\n| join equipment_class [| rest /services/data-model/indexes/equipment_vibration_limits | fields equipment_class, vibration_max_safe_g, vibration_alarm_g]\n| where peak_vib > vibration_alarm_g\n| eval shutdown_required=\"YES\"\n| stats count as alarm_count, max(peak_vib) as max_vibration by equipment_id","m":"Deploy Edge Hub accelerometer on precision equipment (CNC machine, semiconductor wafer scanner, optical alignment tool). Configure 10-second rolling window for vibration magnitude calculation. Set alarm threshold based on equipment manufacturer specs (typical: 3-5g for precision machinery). Build custom container that monitors vibration in real-time and triggers GPIO relay to cut equipment power if threshold exceeded (safety interlock). Store vibration magnitude in edge-hub-data metrics. Implement hierarchical alerts: 80% threshold = warning, 100% threshold = equipment shutdown. Local alert response avoids cloud latency (critical for safety).","z":"Vibration magnitude trend, threshold exceedance timeline, equipment protection status."},{"i":"14.3.54","n":"Multi-Zone Temperature Gradient Monitoring for Optimal Environment","c":"medium","f":"advanced","v":"Monitors temperature gradients across facility zones to optimize HVAC distribution and detect unequal cooling/heating.","t":"Splunk Edge Hub (multiple temperature sensors via MQTT or external probes), Splunk OT Intelligence","d":"`index=edge-hub-data` metric_name=temperature, `sourcetype=edge_hub` zone=*","q":"| mstats avg(temperature) as zone_temp by zone, _time span=5m\n| stats avg(zone_temp) as avg_zone_temp by zone\n| eventstats avg(avg_zone_temp) as facility_avg_temp\n| eval temp_offset=(avg_zone_temp - facility_avg_temp)\n| stats max(abs(temp_offset)) as max_gradient by zone\n| where max_gradient > 3\n| eval gradient_alert=\"HVAC_IMBALANCE\"","m":"Deploy Edge Hub in central location with MQTT subscriptions to external temperature sensors in multiple zones (Advanced Settings \u2192 MQTT Subscriptions). Or use external probes connected to I\u00b2C port (3.5mm jack). Configure 5-minute polling to capture HVAC response dynamics. Acceptable temperature gradient: \u00b11-2\u00b0C across zones. Gradient > 3\u00b0C indicates HVAC distribution issue (blocked duct, stuck valve). Store zone temperatures in edge-hub-data metrics. Implement trend analysis: if gradient increasing over days = duct blockage. If gradient constant but offset = thermostat miscalibration. Alert HVAC maintenance if gradient exceeds threshold.","z":"Zone temperature heatmap, gradient trend, HVAC balance status."},{"i":"14.3.55","n":"Acoustic Anomaly Detection for Equipment Health Assessment","c":"medium","f":"expert","v":"Identifies subtle equipment changes (bearing looseness, gearbox wear) by detecting acoustic signature shifts without manual FFT analysis.","t":"Splunk Edge Hub (stereo microphone + ML container), v2.1+","d":"`index=edge-hub-logs` sourcetype=splunk_edge_hub_log acoustic_anomaly_event, `index=edge-hub-data` acoustic_baseline_deviation","q":"index=edge-hub-logs sourcetype=splunk_edge_hub_log acoustic_classification_event\n| stats latest(acoustic_anomaly_score) as anomaly_score, count as detections by equipment_id\n| where anomaly_score > 0.7\n| eval equipment_health=\"DEGRADED\"\n| stats count(eval(equipment_health=\"DEGRADED\")) as degraded_count by facility\n| where degraded_count > 0","m":"Build custom ARM64 container with TensorFlow Lite audio anomaly detection model (autoencoder or isolation forest on MFCC spectral features). Container captures 5-second audio windows at 1-minute intervals, extracts MFCC features, computes reconstruction error vs baseline model (trained on normal equipment sounds), outputs anomaly_score (0-1). Score > 0.7 = significant acoustic change. Deploy NPU inference (v2.1+) for real-time processing. Store anomaly events locally (100K backlog). Useful for early detection of bearing wear, compressor cavitation, motor bearing looseness before catastrophic failure. Do not stream raw audio to cloud (privacy).","z":"Anomaly score timeline, detection frequency histogram, equipment health trend."},{"i":"14.3.56","n":"MQTT Topic Latency & Message Loss Monitoring","c":"high","f":"intermediate","v":"Ensures MQTT message delivery reliability by tracking topic latency and detecting lost or delayed messages.","t":"Splunk Edge Hub (MQTT broker + client), Splunk OT Intelligence","d":"`index=edge-hub-logs` sourcetype=splunk_edge_hub_log mqtt_latency_event, `index=edge-hub-health` sourcetype=edge_hub mqtt_broker_health","q":"index=edge-hub-logs sourcetype=splunk_edge_hub_log mqtt_latency_event\n| stats avg(publish_to_receive_latency_ms) as avg_latency, max(publish_to_receive_latency_ms) as peak_latency,\n        count(eval(latency_ms > 5000)) as slow_messages by mqtt_topic, host\n| eval latency_status=case(\n    avg_latency > 1000, \"SEVERE_DELAY\",\n    avg_latency > 500, \"SLOW\",\n    1=1, \"NORMAL\")\n| where latency_status!=\"NORMAL\"","m":"Configure MQTT subscriptions with latency tracking enabled (Advanced Settings \u2192 MQTT Subscriptions). Edge Hub MQTT client publishes test messages with timestamp to topics, subscribes to responses, measures round-trip latency. Monitor message sequence numbers to detect loss (gap in sequence = lost message). Store latency metrics in edge-hub-logs. Typical acceptable latency: < 500ms for sensor data (< 1s for anomaly alerts). Alert if average latency exceeds 1s (indicates broker congestion or network saturation). Check MQTT broker resource usage (CPU, memory, subscriber count) if latency degrades. Local SQLite backlog ensures no latency data is lost.","z":"MQTT latency trend by topic, message loss rate, broker health timeline."},{"i":"14.3.57","n":"Temperature Sensor Response Time Validation & Lag Detection","c":"medium","f":"advanced","v":"Validates temperature sensor response time to ensure rapid detection of thermal events (e.g., fire detection latency < 30 seconds).","t":"Splunk Edge Hub (temperature sensor), Splunk OT Intelligence","d":"`index=edge-hub-logs` sourcetype=edge_hub temperature_response_test, `index=edge-hub-data` sensor_response_metrics","q":"index=edge-hub-logs sourcetype=edge_hub temperature_response_test=true stimulus_type=heat_pulse\n| stats latest(stimulus_start_time) as heat_start, latest(temperature_rise_detected_time) as detection_time by sensor_id\n| eval response_latency_seconds=round((detection_time - heat_start) / 1000, 1)\n| stats avg(response_latency_seconds) as avg_response_time, max(response_latency_seconds) as worst_case by sensor_id\n| where avg_response_time > 30 OR worst_case > 60\n| eval sensor_status=\"SLOW_RESPONSE\"","m":"Implement quarterly temperature sensor response test: apply controlled heat source (heat lamp, hot water bath) near sensor, record time from stimulus application to temperature rise detection (configurable threshold: +5\u00b0C from baseline). Temperature sensor response time (Edge Hub spec): ~1-5 seconds in air, ~10-30 seconds in slow-moving air. Response time > 60 seconds indicates sensor degradation (fouled sensing element, thermal insulation issue). Store test results in edge-hub-logs. Alert if average response time exceeds equipment-specific safety limit (e.g., fire detection requires < 30 second response). Use test data for recalibration/replacement decisions.","z":"Sensor response time trend, test results timeline, response time validation pass/fail status."}]},{"i":"14.4","n":"IoT Platforms & Sensors","u":[{"i":"14.4.1","n":"Smart Sensor Fleet Health","c":"high","f":"beginner","v":"IoT sensors with low batteries or offline status create monitoring gaps. Fleet management ensures comprehensive coverage.","t":"IoT platform API input","d":"IoT platform device management API","q":"index=iot sourcetype=\"iot_platform:devices\"\n| where battery_pct < 20 OR status!=\"online\" OR last_seen < relative_time(now(),\"-4h\")\n| table device_id, device_type, location, battery_pct, status, last_seen","m":"Poll IoT platform API for device status. Track battery levels, connectivity, and data freshness. Alert on low battery (<20%) and offline devices (>4 hours). Report on fleet health for maintenance planning.","z":"Table (devices needing attention), Gauge (fleet health %), Pie chart (device status distribution), Map (device locations with status)."},{"i":"14.4.2","n":"Environmental Monitoring","c":"high","f":"beginner","v":"Distributed environmental sensors provide early warning of conditions that could damage equipment or inventory.","t":"MQTT input, IoT platform API","d":"Environmental sensor data (temperature, humidity, water leak, smoke)","q":"index=iot sourcetype=\"sensor:environmental\"\n| where water_detected=\"true\" OR smoke_detected=\"true\" OR temp_f > 90\n| table _time, sensor_id, location, alert_type, value","m":"Deploy environmental sensors in server rooms, warehouses, and facilities. Ingest via MQTT or API. Alert immediately on water leak or smoke detection. Track temperature/humidity trends per location.","z":"Floor plan (sensors with status), Line chart (environmental trends), Table (alerts), Single value (active environmental alerts)."},{"i":"14.4.3","n":"Asset Tracking","c":"medium","f":"beginner","v":"Real-time asset location reduces search time, prevents loss, and enables utilization optimization.","t":"Custom API input, BLE/GPS data","d":"GPS/BLE beacon data, RFID events","q":"index=iot sourcetype=\"asset_tracking\"\n| stats latest(location) as current_location, latest(_time) as last_seen by asset_id, asset_type\n| eval hours_since=round((now()-last_seen)/3600,1)\n| where hours_since > 24","m":"Ingest asset tracking data from GPS/BLE/RFID systems. Track asset locations and movement patterns. Alert when high-value assets leave designated zones. Report on asset utilization by location.","z":"Map (asset locations), Table (asset inventory with location), Timeline (asset movement), Single value (assets not reporting)."},{"i":"14.4.4","n":"Home Automation Monitoring","c":"low","f":"beginner","v":"Smart home monitoring provides energy usage insights, security awareness, and automation troubleshooting.","t":"Custom API input (Homey, Home Assistant)","d":"Homey/Home Assistant API (device events, energy data)","q":"index=smarthome sourcetype=\"homey:events\"\n| stats count by device_name, capability, event_type\n| sort -count","m":"Configure Homey/Home Assistant webhook or API to send events to Splunk HEC. Track device states, energy consumption, and automation triggers. Create dashboards for home energy management and security.","z":"Line chart (energy usage), Table (device events), Status grid (device \u00d7 state), Single value (energy today)."},{"i":"14.4.5","n":"IoT Device Firmware Compliance","c":"high","f":"intermediate","v":"IoT devices are frequently targeted for botnets. Outdated firmware creates network security risks.","t":"IoT platform API","d":"Device inventory with firmware versions","q":"index=iot sourcetype=\"iot_platform:inventory\"\n| stats latest(firmware_version) as current by device_type, model\n| lookup iot_approved_firmware.csv device_type, model OUTPUT approved_version\n| where current!=approved_version\n| table device_type, model, count, current, approved_version","m":"Export IoT device inventory with firmware versions periodically. Maintain approved firmware lookup. Report on compliance percentage. Prioritize updates for internet-connected devices. Track firmware update campaigns.","z":"Table (non-compliant devices), Pie chart (compliant vs non-compliant), Bar chart (by device type), Single value (compliance %)."}]}]},{"i":15,"n":"Data Center Physical Infrastructure","s":[{"i":"15.1","n":"Power & UPS","u":[{"i":"15.1.1","n":"UPS Battery Health","c":"critical","f":"beginner","v":"UPS battery degradation is the single largest cause of unprotected power events. Proactive replacement prevents data center outages.","t":"SNMP TA (UPS-MIB)","d":"SNMP UPS-MIB (battery status, charge, runtime, temperature, replace indicator)","q":"index=power sourcetype=\"snmp:ups\"\n| where battery_replace_indicator=\"yes\" OR charge_pct < 80 OR runtime_min < 15\n| table ups_name, location, battery_status, charge_pct, runtime_min, battery_age_months","m":"Poll UPS battery metrics via SNMP every 5 minutes. Alert on replace indicator, low charge, or low runtime. Track battery age and capacity trend over time to predict replacement needs.","z":"Table (UPS battery status), Gauge (charge per UPS), Line chart (capacity trend), Single value (UPS needing replacement)."},{"i":"15.

}]},{"i":"5.7","n":"Network Flow Data","u":[{"i":"5.7.1","n":"Top Talkers Analysis","c":"medium","f":"beginner","v":"Identifies top bandwidth consumers. Essential for troubleshooting congestion and capacity planning.","t":"Splunk Add-on for NetFlow","d":"`sourcetype=netflow`, sFlow, IPFIX","q":"index=netflow\n| stats sum(bytes) as total_bytes by src_ip, dest_ip\n| sort -total_bytes | head 20\n| eval total_GB=round(total_bytes/1073741824,2)","m":"Export NetFlow from routers/switches to a NetFlow collector that forwards to Splunk. Install NetFlow TA for field parsing.","z":"Table (source, dest, bytes), Sankey diagram, Bar chart."},{"i":"5.7.2","n":"Anomalous Traffic Patterns","c":"high","f":"intermediate","v":"Unusual flows (new protocols, unexpected destinations) indicate compromise, misconfiguration, or shadow IT.","t":"Splunk Add-on for NetFlow","d":"`sourcetype=netflow`","q":"index=netflow\n| stats dc(dest_port) as unique_ports, dc(dest_ip) as unique_dests by src_ip\n| where unique_ports > 100 OR unique_dests > 500\n| sort -unique_ports","m":"Baseline normal flow patterns over 30 days. Alert on new protocol/port combinations, new external destinations, or unusual volume patterns.","z":"Table, Scatter plot (ports vs. destinations), Timechart."},{"i":"5.7.3","n":"Bandwidth by Application","c":"medium","f":"beginner","v":"Application-level bandwidth breakdown helps prioritize QoS policies and justify network upgrades.","t":"Splunk Add-on for NetFlow (with NBAR)","d":"NetFlow with application identification","q":"index=netflow\n| stats sum(bytes) as total_bytes by application\n| sort -total_bytes | head 20 | eval GB=round(total_bytes/1073741824,2)","m":"Enable NBAR (Network-Based Application Recognition) on Cisco routers to export application-tagged NetFlow. Ingest in Splunk.","z":"Pie chart (bandwidth by app), Bar chart, Table."},{"i":"5.7.4","n":"East-West Traffic Monitoring","c":"medium","f":"intermediate","v":"Lateral traffic between internal segments reveals application dependencies and detects lateral movement.","t":"Splunk Add-on for NetFlow","d":"NetFlow from internal segments","q":"index=netflow\n| where cidrmatch(\"10.0.0.0/8\",src_ip) AND cidrmatch(\"10.0.0.0/8\",dest_ip)\n| stats sum(bytes) as bytes, count as flows by src_ip, dest_ip, dest_port\n| sort -bytes | head 50","m":"Export NetFlow from internal router/switch interfaces. Analyze internal traffic patterns. Establish baseline for anomaly detection.","z":"Chord diagram, Table, Sankey diagram."},{"i":"5.7.5","n":"Data Exfiltration Detection","c":"critical","f":"intermediate","v":"Unusually large outbound transfers to uncommon destinations may be data theft.","t":"Splunk Add-on for NetFlow","d":"NetFlow","q":"index=netflow direction=\"outbound\"\n| stats sum(bytes) as total_bytes by src_ip, dest_ip\n| where total_bytes > 1073741824\n| lookup known_destinations dest_ip OUTPUT known\n| where isnull(known)\n| sort -total_bytes","m":"Baseline normal outbound transfer volumes per host. Alert when transfers exceed threshold to unknown destinations. Correlate with DNS and firewall logs.","z":"Table, Bar chart, Map (destination GeoIP)."},{"i":"5.7.6","n":"Port Scan Detection","c":"high","f":"intermediate","v":"Hosts scanning many ports on targets indicate reconnaissance, worm propagation, or vulnerability scanning.","t":"Splunk Add-on for NetFlow","d":"NetFlow","q":"index=netflow\n| stats dc(dest_port) as unique_ports by src_ip, dest_ip\n| where unique_ports > 50\n| sort -unique_ports","m":"Detect hosts connecting to >50 unique ports on a single target in 5 minutes. Alert with source and target details.","z":"Table, Scatter plot, Timeline."},{"i":"5.7.7","n":"Protocol Distribution Analysis","c":"medium","f":"intermediate","v":"Understanding protocol mix helps validate network policies and detect unauthorized protocols (e.g., unexpected SSH, RDP, or P2P traffic).","t":"Splunk Stream, NetFlow integrator","d":"`sourcetype=netflow`, `sourcetype=stream:tcp`","q":"index=network sourcetype=\"netflow\"\n| lookup service_lookup dest_port OUTPUT service_name\n| stats sum(bytes) as total_bytes dc(src_ip) as unique_sources by protocol, service_name\n| eval GB=round(total_bytes/1073741824,2) | sort -total_bytes\n| head 20","m":"Collect NetFlow/sFlow/IPFIX from routers and switches. Map port numbers to service names via lookup. Baseline protocol distribution. Alert on new protocols or significant shifts.","z":"Pie chart (by protocol), Treemap (by service + volume), Timechart."},{"i":"5.7.8","n":"Multicast Traffic Monitoring","c":"medium","f":"intermediate","v":"Uncontrolled multicast traffic floods switches and consumes bandwidth. Monitoring ensures multicast storms are detected before impacting unicast traffic.","t":"Splunk Stream, NetFlow integrator","d":"`sourcetype=netflow`, `sourcetype=cisco:ios`","q":"index=network sourcetype=\"netflow\" dest_ip=\"224.0.0.0/4\"\n| stats sum(bytes) as total_bytes, dc(src_ip) as sources by dest_ip\n| eval MB=round(total_bytes/1048576,1) | sort -total_bytes\n| head 20","m":"Enable NetFlow on core/distribution switches. Filter for multicast destination range (224.0.0.0/4). Baseline expected multicast groups. Alert on new or high-volume groups.","z":"Table (multicast group, volume, sources), Timechart (multicast volume), Bar chart."},{"i":"5.7.9","n":"Unauthorized VLAN Traffic Detection","c":"critical","f":"advanced","v":"Traffic originating from or destined to unauthorized VLANs indicates misconfigured switch ports, VLAN hopping attacks, or rogue devices.","t":"Splunk Stream, NetFlow integrator","d":"`sourcetype=netflow`, `sourcetype=cisco:ios`","q":"index=network sourcetype=\"netflow\"\n| lookup vlan_authorization_lookup src_vlan OUTPUT authorized\n| where authorized!=\"yes\" OR isnull(authorized)\n| stats sum(bytes) as bytes, dc(src_ip) as unique_hosts by src_vlan, input_interface\n| sort -bytes","m":"Map flow data to VLANs via input interface. Maintain a lookup of authorized VLANs per port. Alert on traffic from unauthorized VLANs. Correlate with 802.1X status.","z":"Table (VLAN, interface, hosts, volume), Alert panel, Status grid."},{"i":"5.7.10","n":"Long-Duration Flow Detection","c":"high","f":"intermediate","v":"Extremely long-lived flows may indicate data exfiltration, persistent backdoors, or stuck sessions consuming resources.","t":"Splunk Stream, NetFlow integrator","d":"`sourcetype=netflow`","q":"index=network sourcetype=\"netflow\"\n| eval duration_min=duration/60\n| where duration_min > 60\n| stats sum(bytes) as total_bytes, max(duration_min) as max_duration by src_ip, dest_ip, dest_port\n| eval GB=round(total_bytes/1073741824,2) | sort -max_duration\n| head 20","m":"Analyze flow records for duration >60 minutes. Cross-reference with known long-lived services (VPN, database replication). Flag unknown long flows for investigation.","z":"Table (source, destination, port, duration, bytes), Scatter plot (duration vs. bytes)."}]},{"i":"5.8","n":"Network Management Platforms","u":[{"i":"5.8.1","n":"DNA Center Assurance Alerts","c":"medium","f":"beginner","v":"DNA Center provides AI/ML-driven network issue detection. Centralizing in Splunk enables cross-domain correlation.","t":"Splunk-TA-cisco-dnacenter (API)","d":"DNA Center API (issues, events)","q":"index=network sourcetype=\"cisco:dnac:issues\"\n| stats count by priority, category, name | sort -priority -count","m":"Configure DNA Center API integration in Splunk TA. Poll for issues and client health. Alert on P1/P2 issues.","z":"Table (issue, priority, category), Bar chart, Single value."},{"i":"5.8.2","n":"Meraki Organization Monitoring","c":"medium","f":"intermediate","v":"Tracks Meraki device status across all networks and organizations from a single pane.","t":"`Splunk_TA_cisco_meraki` (API), `TA-meraki` (syslog) (API + syslog)","d":"Meraki Dashboard API, syslog","q":"index=network sourcetype=\"meraki:api\"\n| stats count by network, status | eval is_offline=if(status=\"offline\",1,0)\n| where is_offline > 0","m":"Configure Meraki API integration (API key + org ID). Poll device statuses. Forward syslog for events. Dashboard showing organization-wide health.","z":"Map (device locations), Table, Status grid, Single value (offline count)."},{"i":"5.8.3","n":"SNMP Trap Consolidation","c":"medium","f":"beginner","v":"Centralizing SNMP traps from all sources enables cross-tool correlation and reduces monitoring tool sprawl.","t":"Splunk Add-on for SNMP (trap receiver)","d":"SNMP traps","q":"index=network sourcetype=\"snmp:trap\"\n| stats count by trap_oid, host, severity | sort -count","m":"Configure Splunk SNMP trap receiver (UDP 162). Map trap OIDs to human-readable names via lookup. Correlate with syslog events from the same device.","z":"Table (device, trap, severity), Bar chart, Timeline."},{"i":"5.8.4","n":"Network Device Inventory","c":"low","f":"intermediate","v":"Up-to-date inventory supports change management, vulnerability tracking, and compliance auditing.","t":"Combined sources (NMS APIs, SNMP sysDescr)","d":"NMS discovery, SNMP polling","q":"index=network sourcetype=\"snmp:system\"\n| stats latest(sysDescr) as description, latest(sysLocation) as location by host\n| table host description location","m":"Poll SNMP sysDescr, sysName, sysLocation from all devices. Cross-reference with NMS discovery exports. Maintain inventory lookup for enrichment.","z":"Table (device, model, location, version), Pie chart (by model/vendor)."},{"i":"5.8.5","n":"Network Device Backup Compliance","c":"high","f":"intermediate","v":"Missing backups mean a failed device requires manual rebuilding. Tracking backup success ensures rapid disaster recovery.","t":"RANCID/Oxidized logs, SolarWinds NCM, custom scripts","d":"`sourcetype=rancid`, `sourcetype=oxidized`","q":"index=network sourcetype=\"oxidized\"\n| stats latest(status) as backup_status, latest(_time) as last_backup by device\n| eval days_since=round((now()-last_backup)/86400,0)\n| where backup_status!=\"success\" OR days_since > 7\n| sort -days_since","m":"Integrate config backup tool (Oxidized/RANCID) logs into Splunk. Track success/failure per device. Alert when a device hasn't been backed up in >7 days.","z":"Table (device, status, days since backup), Single value (compliance %), Status grid."},{"i":"5.8.6","n":"ISE Endpoint Posture Compliance","c":"high","f":"intermediate","v":"Non-compliant endpoints (missing patches, disabled AV) on the network increase attack surface. ISE posture data enables enforcement visibility.","t":"`Splunk_TA_cisco-ise`","d":"`sourcetype=cisco:ise:syslog`","q":"index=network sourcetype=\"cisco:ise:syslog\" \"Posture\"\n| rex \"PostureStatus=(?<posture_status>\\w+).*?EndpointMacAddress=(?<mac>\\S+)\"\n| stats count by posture_status, mac\n| where posture_status=\"NonCompliant\"\n| sort -count","m":"Forward ISE posture assessment logs to Splunk. Track compliant vs. non-compliant endpoints. Alert when non-compliance rate exceeds 10%. Drill down by failure reason.","z":"Pie chart (compliant vs non-compliant), Table (non-compliant endpoints), Timechart (compliance trend)."},{"i":"5.8.7","n":"Network Configuration Drift Detection","c":"high","f":"intermediate","v":"Configuration drift from golden standards introduces vulnerabilities and operational inconsistencies. Detecting drift maintains compliance.","t":"RANCID/Oxidized, custom diff scripts, DNA Center","d":"`sourcetype=config:diff`, `sourcetype=cisco:dnac`","q":"index=network sourcetype=\"config:diff\"\n| rex \"device=(?<device>\\S+).*?lines_changed=(?<changes>\\d+)\"\n| where changes > 0\n| stats sum(changes) as total_changes, count as change_events by device\n| sort -total_changes","m":"Schedule config pulls via Oxidized/RANCID. Diff against golden templates. Ingest diff results into Splunk. Alert on unauthorized changes (outside change windows).","z":"Table (device, changes, last modified), Timeline (change events), Single value (devices with drift)."},{"i":"5.8.8","n":"SNMP Polling Gap Detection","c":"medium","f":"intermediate","v":"Missing SNMP polls create gaps in monitoring data. Detecting polling failures ensures metrics dashboards remain accurate.","t":"Splunk core (metadata search)","d":"Any SNMP sourcetype","q":"| tstats count where index=network sourcetype=\"snmp:*\" by host, sourcetype, _time span=10m\n| stats range(_time) as time_range, count as poll_count by host, sourcetype\n| eval expected_polls=round(time_range/300,0)\n| eval gap_pct=round((1-poll_count/expected_polls)*100,1)\n| where gap_pct > 20 | sort -gap_pct","m":"Track SNMP data arrival per device using `tstats`. Compare expected vs. actual poll count. Alert when gap exceeds 20%. Investigate SNMP community/credential issues.","z":"Table (device, expected, actual, gap %), Single value (devices with gaps), Heatmap."}]},{"i":"5.9","n":"Cisco Meraki","u":[{"i":"5.9.1","n":"Wireless Client Association Failures","c":"high","f":"beginner","v":"Identifies recurring authentication failures and SSID configuration issues that prevent users from connecting to wireless networks.","t":"`Splunk_TA_cisco_meraki` (API), `TA-meraki` (syslog)","d":"`sourcetype=meraki type=security_event","q":"index=cisco_network sourcetype=\"meraki\" type=security_event signature=\"*Association*\" OR signature=\"*authentication*\" status=\"failure\"\n| stats count by ap_name, client_mac, reason, signature\n| sort - count","m":"Monitor syslog events from Meraki MR access points for failed association attempts. Correlate with SSID configuration and 802.1X radius responses.","z":"Table with top APs/clients by failure count; time-series chart of failures over time by AP."},{"i":"5.9.2","n":"RSSI/Signal Strength Degradation Detection","c":"medium","f":"intermediate","v":"Proactively identifies weak WiFi coverage areas and client placement issues before users experience connectivity problems.","t":"`Splunk_TA_cisco_meraki` (API), `TA-meraki` (syslog)","d":"`sourcetype=meraki:api","q":"index=cisco_network sourcetype=\"meraki:api\"\n| eval rssi_level=case(rssi>=-50, \"Excellent\", rssi>=-60, \"Good\", rssi>=-70, \"Fair\", rssi<-70, \"Poor\")\n| stats avg(rssi) as avg_rssi, min(rssi) as min_rssi, count by ap_name, ssid, rssi_level\n| where min_rssi < -70 or avg_rssi < -65","m":"Ingest Meraki API client data periodically; analyze RSSI distribution by AP and SSID. Set thresholds for \"poor\" signal (< -70 dBm).","z":"Heatmap of RSSI by AP location; histogram of signal strength distribution; gauge charts for coverage quality by SSID."},{"i":"5.9.3","n":"Excessive Client Roaming Activity","c":"medium","f":"intermediate","v":"Detects unstable roaming patterns and AP handoff issues that cause latency spikes and dropped connections.","t":"`Splunk_TA_cisco_meraki` (API), `TA-meraki` (syslog)","d":"`sourcetype=meraki type=security_event signature=\"*Roaming*\" OR signature=\"*handoff*\"","q":"index=cisco_network sourcetype=\"meraki\" type=security_event (signature=\"*Roaming*\" OR signature=\"*handoff*\")\n| stats count as roam_count by client_mac, ap_name\n| eventstats sum(roam_count) as total_roams by client_mac\n| where total_roams > 20\n| sort - total_roams","m":"Track client handoff events between APs. Alert when a single client roams more than threshold in a 15-minute window.","z":"Table of heavy roamers; line chart of roaming frequency by client; network diagram showing roam paths."},{"i":"5.9.4","n":"SSID Performance Ranking and Trend Analysis","c":"medium","f":"intermediate","v":"Compares performance across multiple SSIDs to identify underperforming networks and optimize deployment strategy.","t":"`Splunk_TA_cisco_meraki` (API), `TA-meraki` (syslog)","d":"`sourcetype=meraki:api sourcetype=meraki:api","q":"index=cisco_network sourcetype=\"meraki:api\"\n| stats avg(connection_duration) as avg_duration, count as client_count, avg(rssi) as avg_rssi by ssid\n| eval performance_score=round((avg_rssi+100)*client_count/100, 2)\n| sort - performance_score","m":"Aggregate client connection metrics by SSID. Compare average connection duration, client count, and signal strength.","z":"Bar chart comparing SSID performance; sparklines for trend; scorecard showing top/bottom performers."},{"i":"5.9.5","n":"WiFi Channel Utilization and Interference Detection","c":"high","f":"advanced","v":"Identifies channel congestion and interference sources to optimize channel assignments and reduce co-channel interference.","t":"`Splunk_TA_cisco_meraki` (API), `TA-meraki` (syslog)","d":"`sourcetype=meraki:api sourcetype=meraki","q":"index=cisco_network sourcetype=\"meraki:api\" device_type=MR\n| stats count by channel, band\n| eval utilization_pct=round(count*100/sum(count), 2)\n| where utilization_pct > 40\n| sort - utilization_pct","m":"Query API device data for MR access points; track channel assignments. Correlate with interference signature logs.","z":"Stacked bar chart of channel utilization by band; channel heatmap over time; interference event timeline."},{"i":"5.9.6","n":"Rogue and Unauthorized AP Detection (Air Marshal)","c":"critical","f":"intermediate","v":"Identifies unauthorized wireless networks and malicious APs that may represent security threats or network intrusion attempts.","t":"`Splunk_TA_cisco_meraki` (API), `TA-meraki` (syslog)","d":"`sourcetype=meraki type=air_marshal","q":"index=cisco_network sourcetype=\"meraki\" type=air_marshal signature=\"*Rogue*\" OR signature=\"*Unauthorized*\"\n| stats count by ssid, bssid, first_detected, last_seen, threat_level\n| where threat_level=\"high\" OR threat_level=\"critical\"\n| sort - first_detected","m":"Enable Air Marshal on MR APs and ingest syslog events. Create alert for new rogue AP detections with risk scoring.","z":"Table of detected rogues with threat indicators; map showing rogue AP locations; timeline of detections."},{"i":"5.9.7","n":"Client Device Type Distribution and Compliance","c":"medium","f":"intermediate","v":"Tracks device types connecting to network for capacity planning, security policy enforcement, and support optimization.","t":"`Splunk_TA_cisco_meraki` (API), `TA-meraki` (syslog)","d":"`sourcetype=meraki:api","q":"index=cisco_network sourcetype=\"meraki:api\"\n| stats count as device_count by os_type, device_family\n| eval pct=round(device_count*100/sum(device_count), 2)\n| sort - device_count","m":"Use API clients endpoint to retrieve device OS and type information. Aggregate across network.","z":"Pie chart of device types; bar chart by OS; treemap of device distribution; trend sparklines."},{"i":"5.9.8","n":"Band Steering Effectiveness Assessment","c":"medium","f":"intermediate","v":"Measures effectiveness of steering clients from 2.4GHz to 5GHz bands to reduce congestion and improve performance.","t":"`Splunk_TA_cisco_meraki` (API), `TA-meraki` (syslog)","d":"`sourcetype=meraki:api","q":"index=cisco_network sourcetype=\"meraki:api\"\n| stats count as client_count by band\n| eval band_ratio=round(client_count*100/sum(client_count), 2)\n| fields band, client_count, band_ratio","m":"Query clients API to get current band distribution. Compare against expected ratio for band steering policy.","z":"Gauge showing 5GHz percentage; pie chart of band distribution; trend line showing steering progress."},{"i":"5.9.9","n":"Failed DHCP Assignments and IP Pool Exhaustion","c":"high","f":"beginner","v":"Detects DHCP server failures and IP pool exhaustion that prevent new clients from obtaining addresses.","t":"`Splunk_TA_cisco_meraki` (API), `TA-meraki` (syslog)","d":"`sourcetype=meraki type=security_event signature=\"*DHCP*\"","q":"index=cisco_network sourcetype=\"meraki\" type=security_event signature=\"*DHCP*\" (signature=\"*failure*\" OR signature=\"*NACK*\")\n| stats count as failure_count by ap_name, signature\n| where failure_count > 5\n| sort - failure_count","m":"Monitor syslog for DHCP NACK and failure events. Alert on sustained failure rate.","z":"Table of DHCP failures by AP; time-series showing failure spike; alert dashboard."},{"i":"5.9.10","n":"802.1X Authentication Failures and Radius Issues","c":"high","f":"intermediate","v":"Identifies authentication server problems, credential issues, and 802.1X configuration mismatches.","t":"`Splunk_TA_cisco_meraki` (API), `TA-meraki` (syslog)","d":"`sourcetype=meraki type=security_event signature=\"*802.1X*\" OR signature=\"*Radius*\"","q":"index=cisco_network sourcetype=\"meraki\" type=security_event (signature=\"*802.1X*\" OR signature=\"*Radius*\" OR signature=\"*authentication*\")\n| stats count as auth_failures by client_mac, ap_name, signature\n| eventstats sum(auth_failures) as total_failures by client_mac\n| where total_failures > 10\n| sort - total_failures","m":"Ingest 802.1X and RADIUS-related syslog events. Correlate with RADIUS server logs.","z":"Table of failing clients; time-series of auth failures; client-level detail dashboard."},{"i":"5.9.11","n":"DNS Resolution Performance and Failures","c":"medium","f":"beginner","v":"Monitors DNS query resolution times and failures to identify misconfiguration or server issues affecting user experience.","t":"`Splunk_TA_cisco_meraki` (API), `TA-meraki` (syslog)","d":"`sourcetype=meraki type=security_event signature=\"*DNS*\"","q":"index=cisco_network sourcetype=\"meraki\" type=security_event signature=\"*DNS*\" resolution_time=*\n| stats avg(resolution_time) as avg_dns_time, max(resolution_time) as max_dns_time, count by ap_name\n| where avg_dns_time > 100","m":"Extract DNS query timing from syslog events. Set SLA thresholds (e.g., <100ms average).","z":"Gauge showing average DNS time; histogram of query times; slow query detail table."},{"i":"5.9.12","n":"Wireless Latency Analysis by SSID and Location","c":"medium","f":"intermediate","v":"Identifies latency patterns across network to optimize AP placement, channel allocation, and client routing.","t":"`Splunk_TA_cisco_meraki` (API), `TA-meraki` (syslog)","d":"`sourcetype=meraki:api","q":"index=cisco_network sourcetype=\"meraki:api\" latency=*\n| stats avg(latency) as avg_latency, max(latency) as max_latency, count by ssid, ap_name\n| eval latency_sla=\"OK\"\n| eval latency_sla=if(avg_latency > 50, \"Warning\", latency_sla)\n| eval latency_sla=if(avg_latency > 100, \"Critical\", latency_sla)","m":"Use API clients endpoint with latency metric. Aggregate by SSID and AP location.","z":"Heatmap of latency by AP; line chart of latency trends; SLA compliance dashboard."},{"i":"5.9.13","n":"Splash Page Engagement and Redirection Analytics","c":"low","f":"beginner","v":"Tracks guest network splash page performance and user acceptance rates for marketing and network access purposes.","t":"`Splunk_TA_cisco_meraki` (API), `TA-meraki` (syslog)","d":"`sourcetype=meraki type=security_event signature=\"*Splash*\"","q":"index=cisco_network sourcetype=\"meraki\" type=security_event signature=\"*Splash*\"\n| stats count as redirect_count by result, ap_name\n| eval acceptance_rate=round(count*100/sum(count), 2)","m":"Capture splash page interaction events from syslog. Track accepts vs. denies.","z":"Pie chart of acceptance rates; funnel chart of splash interactions; time-series trending."},{"i":"5.9.14","n":"Multicast and Broadcast Storm Detection","c":"high","f":"intermediate","v":"Identifies multicast/broadcast flooding that degrades wireless performance across multiple client devices.","t":"`Splunk_TA_cisco_meraki` (API), `TA-meraki` (syslog)","d":"`sourcetype=meraki type=flow","q":"index=cisco_network sourcetype=\"meraki\" type=flow dest_ip=\"255.255.255.255\" OR dest_mac=\"ff:ff:ff:ff:ff:ff\"\n| stats sum(sent_bytes) as total_bytes, count as pkt_count by ap_name, src_mac\n| where pkt_count > 1000\n| sort - pkt_count","m":"Monitor broadcast/multicast flows in syslog. Set thresholds for abnormal packet rates.","z":"Table of broadcast sources; time-series of broadcast packets; alert threshold dashboard."},{"i":"5.9.15","n":"Wireless Health Score Trending","c":"medium","f":"intermediate","v":"Provides a composite health metric across all APs to facilitate executive reporting and trend analysis.","t":"`Splunk_TA_cisco_meraki` (API), `TA-meraki` (syslog)","d":"`sourcetype=meraki:api device_type=MR","q":"index=cisco_network sourcetype=\"meraki:api\" device_type=MR\n| stats avg(health_score) as network_health, min(health_score) as worst_ap, count(eval(health_score<80)) as unhealthy_aps by network_id\n| eval health_status=if(network_health >= 85, \"Healthy\", if(network_health >= 70, \"Degraded\", \"Critical\"))","m":"Pull health_score metric from MR devices API. Aggregate across network.","z":"Gauge of overall health; bar chart of individual AP health; trend sparkline; KPI dashboard."},{"i":"5.9.16","n":"Connected Client Count Trending and Capacity Planning","c":"medium","f":"intermediate","v":"Tracks client density by AP and SSID for capacity planning and performance optimization.","t":"`Splunk_TA_cisco_meraki` (API), `TA-meraki` (syslog)","d":"`sourcetype=meraki:api","q":"index=cisco_network sourcetype=\"meraki:api\"\n| stats count as client_count by ap_name, ssid\n| eval capacity_pct=round(client_count*100/30, 2)\n| where capacity_pct > 70\n| sort - client_count","m":"Query clients API to count connected devices. Track over time.","z":"Bubble chart of capacity by AP; stacked bar of clients by SSID; capacity gauge."},{"i":"5.9.17","n":"Top Talker Analysis and Bandwidth Hogs","c":"medium","f":"intermediate","v":"Identifies bandwidth-intensive clients and applications to enforce QoS policies and prevent network congestion.","t":"`Splunk_TA_cisco_meraki` (API), `TA-meraki` (syslog)","d":"`sourcetype=meraki type=flow","q":"index=cisco_network sourcetype=\"meraki\" type=flow\n| stats sum(sent_bytes) as upload_bytes, sum(received_bytes) as download_bytes by client_mac, application\n| eval total_bytes=upload_bytes+download_bytes\n| sort - total_bytes\n| head 20","m":"Analyze flow records from syslog; track data usage by client and application.","z":"Table of top talkers; horizontal bar chart of data usage; Sankey diagram of flows."},{"i":"5.9.18","n":"Connection Duration and Session Quality","c":"low","f":"intermediate","v":"Analyzes typical session lengths and stability to identify problematic SSIDs or time-based issues.","t":"`Splunk_TA_cisco_meraki` (API), `TA-meraki` (syslog)","d":"`sourcetype=meraki:api","q":"index=cisco_network sourcetype=\"meraki:api\" connection_duration=*\n| stats avg(connection_duration) as avg_session_time, min(connection_duration) as min_session, max(connection_duration) as max_session by ssid\n| eval session_quality=if(avg_session_time > 3600, \"Stable\", \"Short\")","m":"Extract connection_duration from clients API. Aggregate by SSID and time of day.","z":"Histogram of session durations; time-of-day heatmap; SSID comparison chart."},{"i":"5.9.19","n":"AP Uptime and Availability Monitoring","c":"critical","f":"beginner","v":"Ensures all access points are online and operational; alerts on unexpected AP outages.","t":"`Splunk_TA_cisco_meraki` (API), `TA-meraki` (syslog)","d":"`sourcetype=meraki:api device_type=MR","q":"index=cisco_network sourcetype=\"meraki:api\" device_type=MR\n| stats latest(status) as ap_status, latest(last_status_change) as last_change by ap_name, ap_mac\n| where ap_status=\"offline\"","m":"Monitor device status API for all MR devices. Alert on status=\"offline\".","z":"Status table with last seen time; uptime percentage gauge; event alert dashboard."},{"i":"5.9.20","n":"Mesh Network Link Quality and Backhaul Health","c":"high","f":"intermediate","v":"Monitors wireless mesh backhaul links to ensure reliability of remote AP connections.","t":"`Splunk_TA_cisco_meraki` (API), `TA-meraki` (syslog)","d":"`sourcetype=meraki:api device_type=MR sourcetype=meraki type=security_event","q":"index=cisco_network sourcetype=\"meraki:api\" device_type=MR mesh_link_quality=*\n| stats avg(mesh_link_quality) as avg_link_quality by ap_name, upstream_ap\n| where avg_link_quality < 70\n| sort avg_link_quality","m":"Query MR device API for mesh_link_quality metric. Alert on degraded quality (<70%).","z":"Network topology showing link quality; color-coded links; detail table with metrics."},{"i":"5.9.21","n":"Guest Network Access Patterns and Usage","c":"low","f":"intermediate","v":"Tracks guest network adoption, usage patterns, and peak times for network provisioning.","t":"`Splunk_TA_cisco_meraki` (API), `TA-meraki` (syslog)","d":"`sourcetype=meraki:api ssid=\"guest*\"","q":"index=cisco_network sourcetype=\"meraki:api\" ssid=\"guest\"\n| stats count as guest_users by _time\n| timechart avg(guest_users) as avg_concurrent_guests","m":"Filter clients API results for guest SSIDs. Track concurrent count over time.","z":"Time-series of guest users; daily/weekly heatmap; trend dashboard."},{"i":"5.9.22","n":"WiFi Geolocation and Location Analytics","c":"low","f":"beginner","v":"Uses Cisco Meraki location services to track foot traffic patterns and heat maps in physical spaces.","t":"`Splunk_TA_cisco_meraki` (API)","d":"`sourcetype=meraki:api location_data=*","q":"index=cisco_network sourcetype=\"meraki:api\" ap_name=*\n| stats count as foot_traffic by ap_name, floor\n| geom geo_from_metric lat, lon","m":"Use Meraki location API to get AP-based location estimates. Map to floor/zone.","z":"Heat map by physical location; AP heat map overlay; zone traffic comparison."},{"i":"5.9.23","n":"Port Utilization and Congestion Alerts","c":"medium","f":"intermediate","v":"Identifies port saturation and congestion events that require capacity upgrades or load balancing adjustments.","t":"`Splunk_TA_cisco_meraki` (API), `TA-meraki` (syslog)","d":"`sourcetype=meraki:api device_type=MS","q":"index=cisco_network sourcetype=\"meraki:api\" device_type=MS\n| stats avg(port_utilization) as avg_util, max(port_utilization) as max_util by switch_name, port_id\n| where max_util > 80\n| sort - max_util","m":"Query MS switch device API for port utilization metrics. Alert on sustained >80% utilization.","z":"Table of congested ports; timeline showing peak congestion; port utilization heatmap."},{"i":"5.9.24","n":"Power over Ethernet (PoE) Consumption Tracking","c":"medium","f":"intermediate","v":"Monitors PoE power allocation to prevent over-subscription and ensure sufficient power for all devices.","t":"`Splunk_TA_cisco_meraki` (API), `TA-meraki` (syslog)","d":"`sourcetype=meraki:api device_type=MS","q":"index=cisco_network sourcetype=\"meraki:api\" device_type=MS poe_consumption=*\n| stats sum(poe_consumption) as total_power_watts, avg(poe_consumption) as avg_power by switch_name\n| eval power_capacity_pct=round(total_power_watts*100/1000, 2)\n| where power_capacity_pct > 80","m":"Pull poe_consumption metrics from MS device API. Aggregate by switch.","z":"Gauge showing power utilization percentage; stacked bar of PoE by port; capacity dashboard."},{"i":"5.9.25","n":"Spanning Tree Protocol (STP) Topology Changes","c":"high","f":"beginner","v":"Alerts on unexpected STP topology changes that indicate link failures or network configuration issues.","t":"`Splunk_TA_cisco_meraki` (API), `TA-meraki` (syslog)","d":"`sourcetype=meraki type=security_event signature=\"*STP*\" OR signature=\"*topology*\"","q":"index=cisco_network sourcetype=\"meraki\" type=security_event (signature=\"*STP*\" OR signature=\"*topology*\")\n| stats count as change_count by switch_name, change_type\n| where change_count > 3","m":"Monitor STP-related syslog events. Alert on excessive topology changes.","z":"Timeline of topology changes; table of affected switches; alert dashboard."},{"i":"5.9.26","n":"Port Security Violations and Rogue Device Detection","c":"critical","f":"intermediate","v":"Detects unauthorized MAC addresses and port security breaches that indicate potential network intrusion.","t":"`Splunk_TA_cisco_meraki` (API), `TA-meraki` (syslog)","d":"`sourcetype=meraki type=security_event signature=\"*Port Security*\" OR signature=\"*Unauthorized MAC*\"","q":"index=cisco_network sourcetype=\"meraki\" type=security_event (signature=\"*Port Security*\" OR signature=\"*Unauthorized*\")\n| stats count as violation_count by switch_name, port_id, mac_address\n| where violation_count > 0\n| sort - violation_count","m":"Monitor port security violation events from syslog. Create alert for each unique violation.","z":"Table of violations; timeline of events; network detail with affected ports."},{"i":"5.9.27","n":"Switch Interface Up/Down Events and Link Flapping","c":"high","f":"beginner","v":"Identifies port flapping, cable issues, and unstable link states that cause intermittent connectivity.","t":"`Splunk_TA_cisco_meraki` (API), `TA-meraki` (syslog)","d":"`sourcetype=meraki type=security_event signature=\"*link*\" OR signature=\"*Interface*\"","q":"index=cisco_network sourcetype=\"meraki\" type=security_event (signature=\"*link*\" OR signature=\"*Interface*\" OR signature=\"*up*\" OR signature=\"*down*\")\n| stats count as event_count by switch_name, port_id\n| eval flap_rate=round(event_count/24, 2)\n| where flap_rate > 2","m":"Track interface up/down state changes over 24 hours. Alert on flapping (>2 changes/hour).","z":"Time-series showing flap events; table of affected ports; link state history."},{"i":"5.9.28","n":"VLAN Configuration Mismatches and Tagging Violations","c":"medium","f":"intermediate","v":"Detects VLAN configuration errors and tagging violations that disrupt network segmentation.","t":"`Splunk_TA_cisco_meraki` (API), `TA-meraki` (syslog)","d":"`sourcetype=meraki:api device_type=MS sourcetype=meraki","q":"index=cisco_network sourcetype=\"meraki\" type=security_event signature=\"*VLAN*\"\n| stats count as vlan_error_count by switch_name, vlan_id\n| where vlan_error_count > 5","m":"Monitor VLAN-related error events. Cross-reference with API device VLAN config.","z":"Table of VLAN issues; timeline of configuration changes; network diagram with VLAN details."},{"i":"5.9.29","n":"MAC Flooding and Bridge Table Exhaustion","c":"high","f":"beginner","v":"Detects MAC address table exhaustion and flooding attacks that could overwhelm switch resources.","t":"`Splunk_TA_cisco_meraki` (API), `TA-meraki` (syslog)","d":"`sourcetype=meraki type=security_event signature=\"*MAC*\" OR signature=\"*bridge*\"","q":"index=cisco_network sourcetype=\"meraki\" type=security_event (signature=\"*MAC*\" OR signature=\"*flood*\")\n| stats count as flood_count by switch_name, port_id\n| where flood_count > 50","m":"Monitor MAC-related syslog events. Alert on suspicious patterns.","z":"Table of affected switches/ports; time-series of flood events; alert dashboard."},{"i":"5.9.30","n":"DHCP Snooping Violations","c":"high","f":"beginner","v":"Detects unauthorized DHCP servers and spoofing attempts that disrupt network address allocation.","t":"`Splunk_TA_cisco_meraki` (API), `TA-meraki` (syslog)","d":"`sourcetype=meraki type=security_event signature=\"*DHCP Snooping*\"","q":"index=cisco_network sourcetype=\"meraki\" type=security_event signature=\"*DHCP*Snooping*\"\n| stats count as violation_count by switch_name, port_id, server_ip\n| where violation_count > 0","m":"Enable DHCP snooping on MS switches. Monitor syslog for violations.","z":"Table of violations; timeline of events; affected port details."},{"i":"5.9.31","n":"Broadcast Storm Detection and Mitigation","c":"critical","f":"intermediate","v":"Identifies and alerts on broadcast storms that can freeze network performance across all switches.","t":"`Splunk_TA_cisco_meraki` (API), `TA-meraki` (syslog)","d":"`sourcetype=meraki type=security_event signature=\"*broadcast*\"","q":"index=cisco_network sourcetype=\"meraki\" type=security_event signature=\"*broadcast*\"\n| stats sum(packet_count) as broadcast_packets by switch_name, port_id\n| where broadcast_packets > 10000","m":"Monitor broadcast traffic thresholds. Alert on sustained high broadcast rates.","z":"Real-time alert dashboard; time-series of broadcast packets; affected port list."},{"i":"5.9.32","n":"Switch CPU and Memory Utilization","c":"medium","f":"beginner","v":"Monitors switch hardware resources to prevent performance degradation or device failure.","t":"`Splunk_TA_cisco_meraki` (API), `TA-meraki` (syslog)","d":"`sourcetype=meraki:api device_type=MS","q":"index=cisco_network sourcetype=\"meraki:api\" device_type=MS\n| stats avg(cpu_usage) as avg_cpu, max(cpu_usage) as peak_cpu, avg(memory_usage) as avg_mem by switch_name\n| where avg_cpu > 75 OR avg_mem > 80","m":"Query MS device API for CPU and memory metrics. Alert on threshold breaches.","z":"Gauge charts for CPU/memory; time-series trends; capacity planning dashboard."},{"i":"5.9.33","n":"Stack Unit and Redundancy Health","c":"high","f":"beginner","v":"Ensures switch stacking configuration remains healthy and redundancy is not compromised.","t":"`Splunk_TA_cisco_meraki` (API), `TA-meraki` (syslog)","d":"`sourcetype=meraki:api device_type=MS stack_id=*","q":"index=cisco_network sourcetype=\"meraki:api\" device_type=MS stack_id=*\n| stats count as stack_members, count(eval(status=\"offline\")) as offline_members by stack_id\n| where offline_members > 0","m":"Monitor stack member status via device API. Alert on member removal or failure.","z":"Table of stack members and status; redundancy gauge; alert dashboard."},{"i":"5.9.34","n":"Trunk Link Utilization and Performance","c":"medium","f":"intermediate","v":"Monitors inter-switch and uplink trunk utilization to identify bandwidth constraints.","t":"`Splunk_TA_cisco_meraki` (API), `TA-meraki` (syslog)","d":"`sourcetype=meraki:api device_type=MS","q":"index=cisco_network sourcetype=\"meraki:api\" device_type=MS port_type=\"trunk\"\n| stats avg(port_utilization) as avg_trunk_util, max(port_utilization) as peak_util by switch_name, port_id\n| where peak_util > 70\n| sort - peak_util","m":"Query MS API for trunk port utilization. Alert on sustained high utilization.","z":"Trunk link utilization heatmap; timeline showing peak demand; capacity planning chart."},{"i":"5.9.35","n":"QoS Queue Drops and Priority Violations","c":"medium","f":"beginner","v":"Detects QoS queue overflow and drops that indicate traffic priority issues.","t":"`Splunk_TA_cisco_meraki` (API), `TA-meraki` (syslog)","d":"`sourcetype=meraki type=security_event signature=\"*QoS*\" OR signature=\"*queue*\"","q":"index=cisco_network sourcetype=\"meraki\" type=security_event (signature=\"*QoS*\" OR signature=\"*queue*\" OR signature=\"*drop*\")\n| stats sum(packets_dropped) as total_drops by switch_name, queue_id\n| where total_drops > 1000","m":"Monitor QoS-related syslog events and drops. Alert on significant drop rates.","z":"Table of drops by queue; time-series of drop events; traffic distribution pie chart."},{"i":"5.9.36","n":"Port Access Control List (ACL) Hits and Block Events","c":"medium","f":"beginner","v":"Tracks ACL rule hits to monitor policy enforcement and identify anomalous traffic.","t":"`Splunk_TA_cisco_meraki` (API), `TA-meraki` (syslog)","d":"`sourcetype=meraki type=security_event signature=\"*ACL*\"","q":"index=cisco_network sourcetype=\"meraki\" type=security_event signature=\"*ACL*\" action=\"block\"\n| stats count as block_count by switch_name, src_mac, dest_mac\n| sort - block_count","m":"Monitor ACL deny/block events from syslog. Track frequently blocked source/destinations.","z":"Table of blocked traffic; timeline of ACL hits; top blocked addresses chart."},{"i":"5.9.37","n":"Cable Test Results and Port Diagnostics","c":"medium","f":"beginner","v":"Analyzes cable integrity test results to identify wiring faults before they cause outages.","t":"`Splunk_TA_cisco_meraki` (API), `TA-meraki` (syslog)","d":"`sourcetype=meraki type=security_event signature=\"*cable*\" OR signature=\"*diagnostic*\"","q":"index=cisco_network sourcetype=\"meraki\" type=security_event (signature=\"*cable*\" OR signature=\"*diagnostic*\")\n| stats count as test_count by switch_name, port_id, test_result\n| where test_result=\"FAIL\"","m":"Periodically run cable tests on switch ports. Ingest results into syslog.","z":"Table of failed cable tests; port detail with diagnostic results; failure timeline."},{"i":"5.9.38","n":"Uplink Health and Failover Events","c":"critical","f":"beginner","v":"Monitors primary/secondary uplink status to detect failover events and connection issues.","t":"`Splunk_TA_cisco_meraki` (API), `TA-meraki` (syslog)","d":"`sourcetype=meraki type=security_event signature=\"*Uplink*\" OR signature=\"*failover*\"","q":"index=cisco_network sourcetype=\"meraki\" type=security_event (signature=\"*Uplink*\" OR signature=\"*failover*\")\n| stats count as failover_count by uplink_name, event_type\n| where failover_count > 0","m":"Monitor uplink status change events in syslog. Alert on failover.","z":"Uplink status dashboard; failover event timeline; connection health gauge."},{"i":"5.9.39","n":"VPN Tunnel Status and Path Monitoring","c":"critical","f":"intermediate","v":"Ensures all site-to-site and client VPN tunnels remain active and operative.","t":"`Splunk_TA_cisco_meraki` (API), `TA-meraki` (syslog)","d":"`sourcetype=meraki type=vpn sourcetype=meraki:api","q":"index=cisco_network sourcetype=\"meraki\" type=vpn\n| stats latest(status) as tunnel_status, latest(last_changed) as status_change_time by tunnel_id, remote_site\n| where tunnel_status=\"down\" OR tunnel_status=\"unstable\"","m":"Monitor VPN tunnel state from syslog and API. Alert on status != \"up\".","z":"VPN tunnel status matrix; site connectivity map; tunnel health sparklines."},{"i":"5.9.40","n":"Content Filtering and URL Category Blocks","c":"high","f":"beginner","v":"Tracks blocked URLs and categories to monitor policy compliance and identify misclassified content.","t":"`Splunk_TA_cisco_meraki` (API), `TA-meraki` (syslog)","d":"`sourcetype=meraki type=urls action=\"blocked\"","q":"index=cisco_network sourcetype=\"meraki\" type=urls action=\"blocked\"\n| stats count as block_count by url_category, src_ip\n| sort - block_count\n| head 20","m":"Ingest URL filtering events from MX syslog. Categorize by policy.","z":"Table of top blocked categories; bar chart by category; user detail table."},{"i":"5.9.41","n":"IDS/IPS Alert Analysis and Threat Scoring","c":"critical","f":"intermediate","v":"Identifies and prioritizes intrusion detection alerts for investigation and threat response.","t":"`Splunk_TA_cisco_meraki` (API), `TA-meraki` (syslog)","d":"`sourcetype=meraki type=ids_alert","q":"index=cisco_network sourcetype=\"meraki\" type=ids_alert\n| stats count as alert_count by signature, priority, src_ip, dest_ip\n| eval severity=case(priority=1, \"Critical\", priority=2, \"High\", priority=3, \"Medium\", 1=1, \"Low\")\n| where priority <= 2\n| sort - alert_count","m":"Ingest IDS/IPS alert events from MX appliance. Enrich with threat intelligence.","z":"Alert timeline; severity breakdown pie chart; alert detail table; threat map."},{"i":"5.9.42","n":"Malware Detection and AMP File Reputation Events","c":"critical","f":"intermediate","v":"Detects and tracks file-based threats to respond quickly to potential malware infections.","t":"`Splunk_TA_cisco_meraki` (API), `TA-meraki` (syslog)","d":"`sourcetype=meraki type=security_event signature=\"*malware*\" OR signature=\"*AMP*\"","q":"index=cisco_network sourcetype=\"meraki\" type=security_event (signature=\"*malware*\" OR signature=\"*AMP*\")\n| stats count as malware_count by src_ip, threat_name, file_name\n| where malware_count > 0\n| sort - malware_count","m":"Enable AMP on MX appliance. Ingest malware detection events.","z":"Threat timeline; infected hosts table; file reputation detail; incident dashboard."},{"i":"5.9.43","n":"Firewall Rule Hit Analysis and Top Denied Flows","c":"medium","f":"intermediate","v":"Identifies top denied flows to optimize firewall rules and detect policy violations.","t":"`Splunk_TA_cisco_meraki` (API), `TA-meraki` (syslog)","d":"`sourcetype=meraki type=flow action=\"deny\"","q":"index=cisco_network sourcetype=\"meraki\" type=flow action=\"deny\"\n| stats count as deny_count by firewall_rule, src_ip, dest_ip, dest_port\n| sort - deny_count\n| head 20","m":"Analyze firewall deny events from flow logs. Correlate with rules.","z":"Top denied flows table; denial timeline; source/dest distribution heatmap."},{"i":"5.9.44","n":"Traffic Shaping Effectiveness and QoS Policy Analysis","c":"medium","f":"intermediate","v":"Measures the impact of traffic shaping policies on bandwidth distribution and priority.","t":"`Splunk_TA_cisco_meraki` (API), `TA-meraki` (syslog)","d":"`sourcetype=meraki type=flow sourcetype=meraki:api","q":"index=cisco_network sourcetype=\"meraki\" type=flow priority_queue=*\n| stats sum(bytes) as total_bytes, avg(latency) as avg_latency by priority_queue\n| eval efficiency=round(total_bytes/sum(total_bytes)*100, 2)","m":"Extract priority_queue field from flow logs. Measure bandwidth by priority.","z":"Stacked bar chart of bandwidth by priority; latency by QoS class; efficiency gauge."},{"i":"5.9.45","n":"Site-to-Site VPN Latency and Performance","c":"medium","f":"beginner","v":"Monitors latency and jitter on VPN tunnels to ensure quality of critical business traffic.","t":"`Splunk_TA_cisco_meraki` (API), `TA-meraki` (syslog)","d":"`sourcetype=meraki type=vpn sourcetype=meraki:api","q":"index=cisco_network sourcetype=\"meraki\" type=vpn latency=*\n| stats avg(latency) as avg_vpn_latency, max(jitter) as max_jitter by tunnel_id, remote_site\n| where avg_vpn_latency > 50","m":"Extract VPN latency and jitter metrics. Monitor tunnel performance.","z":"Gauge of VPN latency; latency trend line; jitter comparison chart."},{"i":"5.9.46","n":"Client VPN Connections and Remote Access Patterns","c":"medium","f":"beginner","v":"Tracks client VPN usage patterns for remote workers and identifies problematic connections.","t":"`Splunk_TA_cisco_meraki` (API), `TA-meraki` (syslog)","d":"`sourcetype=meraki type=vpn client_vpn=true","q":"index=cisco_network sourcetype=\"meraki\" type=vpn client_vpn=true\n| stats count as connection_count, avg(duration) as avg_session_length by user_id, src_ip\n| where connection_count > 10","m":"Filter VPN logs for client connections. Track by user and source IP.","z":"Connected users timeline; session duration histogram; geography map of remote users."},{"i":"5.9.47","n":"NAT Pool Usage and Exhaustion Alerts","c":"high","f":"intermediate","v":"Monitors NAT pool utilization to prevent address exhaustion that could block outbound traffic.","t":"`Splunk_TA_cisco_meraki` (API), `TA-meraki` (syslog)","d":"`sourcetype=meraki:api","q":"index=cisco_network sourcetype=\"meraki:api\" nat_pool_usage=*\n| stats max(nat_pool_usage) as peak_nat_usage, count by nat_pool_id\n| eval nat_capacity_pct=round(peak_nat_usage*100/254, 2)\n| where nat_capacity_pct > 80","m":"Query appliance API for NAT pool metrics. Alert on >80% utilization.","z":"Gauge of NAT pool usage; capacity timeline; pool exhaustion alert dashboard."},{"i":"5.9.48","n":"BGP Peering Status and Route Stability","c":"high","f":"beginner","v":"Ensures BGP peers remain established and routing remains stable for multi-ISP designs.","t":"`Splunk_TA_cisco_meraki` (API), `TA-meraki` (syslog)","d":"`sourcetype=meraki type=security_event signature=\"*BGP*\"","q":"index=cisco_network sourcetype=\"meraki\" type=security_event signature=\"*BGP*\" (signature=\"*neighbor*\" OR signature=\"*route*\")\n| stats count as bgp_event_count by bgp_neighbor, event_type\n| where bgp_event_count > 5","m":"Monitor BGP event syslog. Alert on neighbor state changes.","z":"BGP peer status table; route change timeline; peering stability gauge."},{"i":"5.9.49","n":"DHCP Pool Exhaustion and Address Allocation Issues","c":"high","f":"intermediate","v":"Alerts when DHCP pools approach depletion to prevent clients from obtaining IP addresses.","t":"`Splunk_TA_cisco_meraki` (API), `TA-meraki` (syslog)","d":"`sourcetype=meraki:api","q":"index=cisco_network sourcetype=\"meraki:api\" dhcp_pool=*\n| stats latest(addresses_available) as available_ips, latest(pool_size) as total_pool by vlan_id\n| eval allocation_pct=round((total_pool-available_ips)*100/total_pool, 2)\n| where allocation_pct > 85","m":"Query appliance API for DHCP metrics by VLAN. Alert on >85% allocation.","z":"DHCP pool gauge per VLAN; timeline of pool usage; alert dashboard."},{"i":"5.9.50","n":"Threat Intelligence Correlation and IoC Matching","c":"critical","f":"intermediate","v":"Correlates network traffic with threat intelligence databases to detect known malicious IPs and domains.","t":"`Splunk_TA_cisco_meraki` (API), `TA-meraki` (syslog)","d":"`sourcetype=meraki type=security_event OR type=urls OR type=flow","q":"index=cisco_network sourcetype=\"meraki\" (type=security_event OR type=urls OR type=flow)\n| lookup threat_intelligence_list src_ip as src_ip OUTPUTNEW threat_name, threat_severity\n| where threat_severity=\"high\" OR threat_severity=\"critical\"\n| stats count as hit_count by src_ip, dest_ip, threat_name\n| sort - hit_count","m":"Create threat intelligence lookup table. Correlate with network events.","z":"IoC match timeline; threat severity breakdown; affected hosts table."},{"i":"5.9.51","n":"Geo-Blocking Event Tracking and Geographic Policy Enforcement","c":"medium","f":"beginner","v":"Tracks geo-blocking policy enforcement to verify compliance with data residency and export controls.","t":"`Splunk_TA_cisco_meraki` (API), `TA-meraki` (syslog)","d":"`sourcetype=meraki type=urls action=\"blocked\" country=*","q":"index=cisco_network sourcetype=\"meraki\" type=urls action=\"blocked\"\n| lookup geo_ip.csv dest_ip OUTPUTNEW country, city\n| stats count as block_count by country\n| sort - block_count","m":"Ingest URL logs with GeoIP enrichment. Track blocks by geography.","z":"Geo-block map; country block count chart; policy compliance dashboard."},{"i":"5.9.52","n":"Application Visibility and Network Application Trending","c":"medium","f":"intermediate","v":"Identifies top applications and protocols on network to understand usage patterns and detect anomalies.","t":"`Splunk_TA_cisco_meraki` (API), `TA-meraki` (syslog)","d":"`sourcetype=meraki type=flow application=*","q":"index=cisco_network sourcetype=\"meraki\" type=flow application=*\n| stats sum(bytes) as app_bytes, count as flow_count by application, application_category\n| eval app_bandwidth_pct=round(app_bytes*100/sum(app_bytes), 2)\n| sort - app_bytes\n| head 20","m":"Extract application field from flow logs. Aggregate by app and category.","z":"App bandwidth pie chart; top apps bar chart; bandwidth timeline by app."},{"i":"5.9.53","n":"Bandwidth by Application and Department","c":"medium","f":"intermediate","v":"Tracks bandwidth consumption by application and business unit for chargeback and optimization.","t":"`Splunk_TA_cisco_meraki` (API), `TA-meraki` (syslog)","d":"`sourcetype=meraki type=flow","q":"index=cisco_network sourcetype=\"meraki\" type=flow\n| lookup department_by_ip.csv src_ip OUTPUTNEW department\n| stats sum(sent_bytes) as upload_mb, sum(received_bytes) as download_mb by application, department\n| eval total_mb=upload_mb+download_mb\n| sort - total_mb","m":"Correlate flows with IP-to-department mapping. Aggregate by app and dept.","z":"Stacked bar of bandwidth by dept/app; heatmap of app usage per dept."},{"i":"5.9.54","n":"WAN Link Quality Monitoring (Jitter, Latency, Packet Loss)","c":"high","f":"intermediate","v":"Continuously monitors WAN quality metrics to detect link degradation before impacting users.","t":"`Splunk_TA_cisco_meraki` (API), `TA-meraki` (syslog)","d":"`sourcetype=meraki:api wan_metrics=*","q":"index=cisco_network sourcetype=\"meraki:api\" uplink=*\n| stats avg(latency) as avg_latency, avg(jitter) as avg_jitter, avg(packet_loss) as avg_loss by uplink_id\n| eval link_quality=case(avg_loss > 5, \"Critical\", avg_latency > 100, \"Poor\", avg_jitter > 50, \"Fair\", 1=1, \"Good\")","m":"Query appliance API for uplink WAN metrics. Monitor quality KPIs.","z":"Uplink quality scorecard; latency/jitter/loss timeline; quality gauge per uplink."},{"i":"5.9.55","n":"Internet Uplink Failover Events and Recovery Time","c":"critical","f":"beginner","v":"Tracks failover events, recovery time, and uplink behavior to ensure high availability.","t":"`Splunk_TA_cisco_meraki` (API), `TA-meraki` (syslog)","d":"`sourcetype=meraki type=security_event signature=\"*failover*\" OR signature=\"*recovery*\"","q":"index=cisco_network sourcetype=\"meraki\" type=security_event (signature=\"*failover*\" OR signature=\"*recovery*\")\n| stats count as failover_count, latest(recovery_time) as recovery_duration by uplink_id, failure_reason\n| where failover_count > 0","m":"Monitor failover and recovery events from syslog. Calculate recovery MTTR.","z":"Failover timeline; recovery time gauge; uplink failure cause pie chart."},{"i":"5.9.56","n":"Cellular Modem Failover Activation and Usage","c":"high","f":"beginner","v":"Tracks cellular backup activation to monitor failover effectiveness and cellular data usage.","t":"`Splunk_TA_cisco_meraki` (API), `TA-meraki` (syslog)","d":"`sourcetype=meraki type=security_event signature=\"*cellular*\" OR signature=\"*4G*\"","q":"index=cisco_network sourcetype=\"meraki\" type=security_event (signature=\"*cellular*\" OR signature=\"*4G*\" OR signature=\"*LTE*\")\n| stats count as cellular_events, sum(data_usage_mb) as total_cellular_data by event_type\n| where total_cellular_data > 0","m":"Ingest cellular failover events. Track data consumption.","z":"Cellular usage timeline; failover event table; data usage gauge."},{"i":"5.9.57","n":"Warm Spare Failover and Appliance Redundancy","c":"critical","f":"beginner","v":"Ensures warm spare failover mechanism is operational and redundancy is maintained.","t":"`Splunk_TA_cisco_meraki` (API), `TA-meraki` (syslog)","d":"`sourcetype=meraki type=security_event signature=\"*warm spare*\" OR signature=\"*HA*\"","q":"index=cisco_network sourcetype=\"meraki\" type=security_event (signature=\"*warm spare*\" OR signature=\"*HA*\" OR signature=\"*redundancy*\")\n| stats latest(ha_status) as redundancy_status, count as status_change_count by appliance_pair\n| where ha_status!=\"active/standby\"","m":"Monitor HA/warm spare events. Alert on status != \"active/standby\".","z":"HA status dashboard; failover timeline; redundancy health gauge."},{"i":"5.9.58","n":"Auto VPN Path Changes and Tunnel Switching","c":"medium","f":"beginner","v":"Tracks automatic VPN path optimization to understand tunnel usage and convergence behavior.","t":"`Splunk_TA_cisco_meraki` (API), `TA-meraki` (syslog)","d":"`sourcetype=meraki type=vpn signature=\"*Auto VPN*\" OR signature=\"*path change*\"","q":"index=cisco_network sourcetype=\"meraki\" type=vpn (signature=\"*Auto VPN*\" OR signature=\"*path change*\")\n| stats count as path_change_count by tunnel_id, new_path, old_path\n| where path_change_count > 3","m":"Monitor Auto VPN path optimization events. Alert on excessive changes.","z":"Path change timeline; tunnel path change distribution; convergence analysis."},{"i":"5.9.59","n":"Connection Rate Analysis and DOS Detection","c":"critical","f":"intermediate","v":"Detects denial of service attacks by analyzing abnormal connection establishment rates.","t":"`Splunk_TA_cisco_meraki` (API), `TA-meraki` (syslog)","d":"`sourcetype=meraki type=flow protocol=\"tcp\" tcp_flags=\"SYN\"","q":"index=cisco_network sourcetype=\"meraki\" type=flow protocol=\"tcp\" tcp_flags=\"SYN\"\n| timechart count as new_connections by src_ip\n| where new_connections > 1000","m":"Monitor TCP SYN rate by source IP. Alert on anomalous connection rates.","z":"Connection rate timeline; source IP detail table; DOS alert dashboard."},{"i":"5.9.60","n":"Data Loss Prevention (DLP) Event Analysis","c":"critical","f":"beginner","v":"Detects and alerts on sensitive data transmission to prevent data exfiltration.","t":"`Splunk_TA_cisco_meraki` (API), `TA-meraki` (syslog)","d":"`sourcetype=meraki type=security_event signature=\"*DLP*\"","q":"index=cisco_network sourcetype=\"meraki\" type=security_event signature=\"*DLP*\"\n| stats count as dlp_match_count by src_ip, dest_ip, dlp_policy, data_type\n| where dlp_match_count > 0\n| sort - dlp_match_count","m":"Enable DLP on MX appliance. Ingest DLP match events.","z":"DLP incident timeline; data type breakdown; source/destination detail."},{"i":"5.9.61","n":"SSL/TLS Certificate Expiration Tracking","c":"medium","f":"intermediate","v":"Monitors SSL certificate expiration dates on all network devices to prevent outages.","t":"`Splunk_TA_cisco_meraki` (API)","d":"`sourcetype=meraki:api","q":"index=cisco_network sourcetype=\"meraki:api\" certificate_expiry=*\n| eval days_until_expiry=round((strptime(certificate_expiry, \"%Y-%m-%d\")-now())/86400, 0)\n| where days_until_expiry < 30\n| stats latest(days_until_expiry) as days_left by device_name, device_type\n| sort days_left","m":"Query device API for certificate expiry dates. Alert on <30 days.","z":"Expiration countdown gauge; timeline of expiring certs; alert table."},{"i":"5.9.62","n":"Firmware Update Compliance and Version Tracking","c":"medium","f":"intermediate","v":"Ensures all network devices run supported firmware versions and patches.","t":"`Splunk_TA_cisco_meraki` (API)","d":"`sourcetype=meraki:api","q":"index=cisco_network sourcetype=\"meraki:api\"\n| stats latest(firmware_version) as current_fw, count as device_count by device_type\n| lookup recommended_firmware.csv device_type OUTPUTNEW recommended_fw\n| where current_fw != recommended_fw","m":"Query device API for firmware versions. Compare to recommended baseline.","z":"Firmware version table by device type; compliance percentage gauge; outdated device list."},{"i":"5.9.63","n":"API Call Rate Monitoring and Rate Limit Alerts","c":"medium","f":"intermediate","v":"Monitors API usage to prevent rate limit hits and optimize automation efficiency.","t":"`Splunk_TA_cisco_meraki` (API)","d":"`sourcetype=meraki:api","q":"index=cisco_network sourcetype=\"meraki:api:*\"\n| timechart count as api_calls by source, endpoint\n| eval call_rate=api_calls/60\n| where call_rate > 9","m":"Log all API calls with timestamps. Monitor call rate by endpoint.","z":"API call timeline; rate limit gauge; endpoint usage breakdown."},{"i":"5.9.64","n":"License Expiration Tracking and Renewal Alerts","c":"critical","f":"intermediate","v":"Ensures licenses don't expire unexpectedly and features remain available.","t":"`Splunk_TA_cisco_meraki` (API)","d":"`sourcetype=meraki:api","q":"index=cisco_network sourcetype=\"meraki:api\" license_expiry=*\n| eval days_until_expire=round((strptime(license_expiry, \"%Y-%m-%d\")-now())/86400, 0)\n| stats latest(days_until_expire) as days_left, latest(license_expiry) as expiry_date by license_type, organization\n| where days_left < 90\n| sort days_left","m":"Query organization API for license expiry. Alert on <90 days.","z":"License expiration countdown; renewal timeline; license detail table."},{"i":"5.9.65","n":"Network Device Inventory and Change Audit","c":"medium","f":"advanced","v":"Maintains accurate inventory of network devices and tracks hardware/software changes.","t":"`Splunk_TA_cisco_meraki` (API)","d":"`sourcetype=meraki:api `sourcetype=meraki:api","q":"index=cisco_network sourcetype=\"meraki:api\"\n| stats count as device_count by device_type, network_id\n| append [search index=cisco_network sourcetype=\"meraki:api\" | stats count as org_count]\n| fillnull device_count value=0","m":"Query devices API to build current inventory. Track additions/removals.","z":"Inventory summary table; device count by type pie chart; change log timeline."},{"i":"5.9.66","n":"Admin Activity Logging and Access Control Audit","c":"critical","f":"beginner","v":"Tracks administrator actions and logins for compliance and security auditing.","t":"`Splunk_TA_cisco_meraki` (API)","d":"`sourcetype=meraki type=security_event signature=\"*admin*\" OR signature=\"*login*\"","q":"index=cisco_network sourcetype=\"meraki\" type=security_event (signature=\"*admin*\" OR signature=\"*login*\")\n| stats count as admin_action_count by admin_user, action_type, timestamp\n| where admin_action_count > 0","m":"Enable admin audit logging. Ingest login and action events.","z":"Admin activity timeline; action type breakdown; user activity detail table."},{"i":"5.9.67","n":"Admin Privilege Changes and Permission Escalation","c":"critical","f":"beginner","v":"Detects unauthorized privilege changes and permission escalation attempts.","t":"`Splunk_TA_cisco_meraki` (API)","d":"`sourcetype=meraki type=security_event signature=\"*privilege*\" OR signature=\"*permission*\"","q":"index=cisco_network sourcetype=\"meraki\" type=security_event (signature=\"*privilege*\" OR signature=\"*permission*\")\n| stats count as priv_change_count by admin_user, old_role, new_role\n| where priv_change_count > 0","m":"Monitor privilege and role change events. Alert on escalations.","z":"Privilege change timeline; role change audit table; escalation alert dashboard."},{"i":"5.9.68","n":"Alert Volume Trending and Alert Fatigue Analysis","c":"medium","f":"beginner","v":"Analyzes alert volume trends to optimize alerting rules and reduce false positives.","t":"`Splunk_TA_cisco_meraki` (webhooks)","d":"`sourcetype=meraki:webhook","q":"index=cisco_network sourcetype=\"meraki:webhook\"\n| timechart count as alert_count by alert_type\n| eval alert_ratio=alert_count/sum(alert_count)","m":"Ingest webhook alerts. Track volume and types over time.","z":"Alert volume timeline; alert type pie chart; trend sparklines."},{"i":"5.9.69","n":"Network Health Score Aggregation and Executive Reporting","c":"medium","f":"intermediate","v":"Provides high-level network health metric for executive dashboards and trend reporting.","t":"`Splunk_TA_cisco_meraki` (API)","d":"`sourcetype=meraki:api `sourcetype=meraki:api","q":"index=cisco_network sourcetype=\"meraki:api\"\n| stats avg(health_score) as device_health, count(eval(status=\"offline\")) as offline_count by network_id\n| eval network_health=round(device_health - (offline_count*5), 2)\n| eval health_status=case(network_health >= 85, \"Healthy\", network_health >= 70, \"Degraded\", 1=1, \"Critical\")","m":"Aggregate device health scores. Calculate composite network score.","z":"Network health gauge; health trend sparkline; status KPI dashboard."},{"i":"5.9.70","n":"Device Online/Offline Status Monitoring","c":"critical","f":"intermediate","v":"Tracks device connectivity status to quickly identify and respond to device failures.","t":"`Splunk_TA_cisco_meraki` (API)","d":"`sourcetype=meraki:api","q":"index=cisco_network sourcetype=\"meraki:api\"\n| stats latest(status) as device_status, latest(last_status_change) as status_change_time, count(eval(status=\"offline\")) as offline_count by network_id\n| eval offline_pct=round(offline_count*100/count, 2)\n| where offline_count > 0","m":"Poll devices API for status. Alert on offline devices.","z":"Device status table; offline count gauge; status change timeline."},{"i":"5.9.71","n":"Multi-Organization Comparison and Benchmarking","c":"low","f":"beginner","v":"Compares metrics across organizations to identify best practices and outliers.","t":"`Splunk_TA_cisco_meraki` (API)","d":"`sourcetype=meraki:api `sourcetype=meraki:api","q":"index=cisco_network sourcetype=\"meraki:api\"\n| stats avg(health_score) as avg_health, count as device_count by organization\n| sort - avg_health","m":"Aggregate metrics across multiple organizations. Create comparison views.","z":"Organization comparison bar chart; health rank table; benchmark line chart."},{"i":"5.9.72","n":"Configuration Change Window Compliance","c":"medium","f":"beginner","v":"Ensures configuration changes only occur within approved maintenance windows.","t":"`Splunk_TA_cisco_meraki` (API)","d":"`sourcetype=meraki type=security_event signature=\"*config*\"","q":"index=cisco_network sourcetype=\"meraki\" type=security_event signature=\"*config*\"\n| eval hour=strftime(_time, \"%H\")\n| stats count as config_change_count by hour\n| eval window_compliant=if(hour>=22 OR hour<6, \"Yes\", \"No\")\n| where window_compliant=\"No\" AND config_change_count > 0","m":"Monitor configuration change events. Check against maintenance windows.","z":"Change compliance timeline; out-of-window change alert table."},{"i":"5.9.73","n":"Webhook Delivery Failure Tracking","c":"medium","f":"beginner","v":"Ensures webhook notifications reach integrations and alerts don't get lost.","t":"`Splunk_TA_cisco_meraki` (webhooks)","d":"`sourcetype=meraki:webhook status=\"failure\" OR status=\"error\"","q":"index=cisco_network sourcetype=\"meraki:webhook\" (status=\"failure\" OR status=\"error\")\n| stats count as failure_count, latest(error_message) as last_error by webhook_id, organization\n| where failure_count > 5","m":"Log webhook delivery attempts. Alert on sustained failures.","z":"Webhook failure timeline; failure cause breakdown; affected org list."},{"i":"5.9.74","n":"API Error Rate and Endpoint Health","c":"medium","f":"intermediate","v":"Monitors API endpoint health and error rates to ensure automation reliability.","t":"`Splunk_TA_cisco_meraki` (API)","d":"`sourcetype=meraki:api (http_status_code=4* OR http_status_code=5*)","q":"index=cisco_network sourcetype=\"meraki:api:*\" (http_status_code=4* OR http_status_code=5*)\n| stats count as error_count, values(http_status_code) as status_codes by endpoint, method\n| eval error_rate=round(error_count*100/total_requests, 2)\n| where error_rate > 5","m":"Log API responses with status codes. Alert on error rate threshold.","z":"API error timeline; endpoint error breakdown; error rate gauge."},{"i":"5.9.75","n":"Dashboard Configuration and Export Backup","c":"low","f":"beginner","v":"Tracks dashboard configuration backups to enable disaster recovery and configuration review.","t":"`Splunk_TA_cisco_meraki` (API)","d":"`sourcetype=meraki:api","q":"index=cisco_network sourcetype=\"meraki:api\" backup_timestamp=*\n| stats latest(backup_timestamp) as last_backup, count as backup_count by organization\n| eval backup_age_days=round((now()-strptime(backup_timestamp, \"%Y-%m-%d\"))/86400, 0)\n| where backup_age_days > 7","m":"Periodically backup organization configurations. Track backup history.","z":"Last backup timestamp by org; backup recency gauge; backup history timeline."},{"i":"5.9.76","n":"Camera Uptime and Availability Tracking","c":"medium","f":"intermediate","v":"Monitors video surveillance system availability to ensure continuous monitoring coverage.","t":"`Splunk_TA_cisco_meraki` (API)","d":"`sourcetype=meraki:api device_type=MV sourcetype=meraki:api","q":"index=cisco_network sourcetype=\"meraki:api\" device_type=MV\n| stats latest(status) as camera_status, latest(last_status_change) as status_change by camera_name, location\n| where camera_status=\"offline\"","m":"Monitor MV camera status via device API. Alert on offline cameras.","z":"Camera status map; offline camera list; availability percentage gauge."},{"i":"5.9.77","n":"Video Retention and Cloud Archive Storage Utilization","c":"medium","f":"intermediate","v":"Tracks cloud storage usage for video archives to manage costs and ensure retention SLA.","t":"`Splunk_TA_cisco_meraki` (API)","d":"`sourcetype=meraki:api","q":"index=cisco_network sourcetype=\"meraki:api\" storage_usage=*\n| stats sum(storage_usage) as total_storage_gb by camera_id, retention_days\n| eval storage_pct=round(total_storage_gb*100/1000, 2)\n| where storage_pct > 80","m":"Query camera API for storage metrics. Alert on >80% utilization.","z":"Storage utilization gauge; retention timeline; storage trend chart."},{"i":"5.9.78","n":"Motion Detection Events and Alert Volume Analysis","c":"low","f":"intermediate","v":"Analyzes motion detection event patterns to optimize camera sensitivity and reduce false alerts.","t":"`Splunk_TA_cisco_meraki` (API)","d":"`sourcetype=meraki type=security_event signature=\"*motion*\"","q":"index=cisco_network sourcetype=\"meraki\" type=security_event signature=\"*motion*\"\n| timechart count as motion_events by camera_name\n| eval daily_avg=round(motion_events/1440, 2)","m":"Ingest motion detection events. Track volume and patterns.","z":"Motion detection timeline; heat map by time of day; camera comparison chart."},{"i":"5.9.79","n":"Camera Video Quality Score and Stream Health","c":"medium","f":"intermediate","v":"Monitors video quality metrics to identify network or hardware issues affecting video feeds.","t":"`Splunk_TA_cisco_meraki` (API)","d":"`sourcetype=meraki:api","q":"index=cisco_network sourcetype=\"meraki:api\" quality_score=*\n| stats avg(quality_score) as avg_quality, min(quality_score) as min_quality by camera_name\n| where avg_quality < 80\n| sort avg_quality","m":"Query camera API for quality_score metric. Alert on <80 average.","z":"Quality score gauge per camera; quality trend line; affected camera list."},{"i":"5.9.80","n":"Cloud Archive Status and Backup Validation","c":"medium","f":"beginner","v":"Ensures video archives are successfully uploaded to cloud and backup integrity is maintained.","t":"`Splunk_TA_cisco_meraki` (API)","d":"`sourcetype=meraki:api archive_status=*","q":"index=cisco_network sourcetype=\"meraki:api\" archive_status=*\n| stats latest(archive_status) as backup_status, latest(last_archive_time) as last_backup by camera_id\n| where archive_status != \"success\"","m":"Check camera API archive status. Alert on failures.","z":"Archive status table; last backup time timeline; failure alert dashboard."},{"i":"5.9.81","n":"Video Stream Connection Errors and Quality Issues","c":"medium","f":"beginner","v":"Detects video stream connection failures that prevent remote viewing or recording.","t":"`Splunk_TA_cisco_meraki` (API)","d":"`sourcetype=meraki type=security_event signature=\"*stream*\" OR signature=\"*connection*\"","q":"index=cisco_network sourcetype=\"meraki\" type=security_event (signature=\"*stream*\" OR signature=\"*connection*\")\n| stats count as error_count by camera_name, error_type\n| where error_count > 10","m":"Monitor stream connection events. Alert on error spikes.","z":"Connection error timeline; affected camera list; error type breakdown."},{"i":"5.9.82","n":"Camera Firmware Compliance and Update Management","c":"medium","f":"intermediate","v":"Ensures all cameras run current firmware with security patches.","t":"`Splunk_TA_cisco_meraki` (API)","d":"`sourcetype=meraki:api device_type=MV","q":"index=cisco_network sourcetype=\"meraki:api\" device_type=MV\n| stats latest(firmware_version) as camera_fw, count as camera_count\n| lookup recommended_camera_fw.csv camera_model OUTPUTNEW recommended_version\n| where camera_fw != recommended_version","m":"Query MV device API for firmware. Compare to recommended baseline.","z":"Firmware version table; compliance percentage gauge; outdated camera list."},{"i":"5.9.83","n":"Night Mode Effectiveness and Low-Light Performance","c":"low","f":"beginner","v":"Monitors camera performance in low-light conditions to ensure night surveillance effectiveness.","t":"`Splunk_TA_cisco_meraki` (API)","d":"`sourcetype=meraki:api night_mode=true","q":"index=cisco_network sourcetype=\"meraki:api\" night_mode=true\n| stats avg(quality_score) as night_quality, count as night_mode_events by camera_name\n| where night_quality < 75","m":"Track camera performance during night mode. Monitor quality metrics.","z":"Night mode quality gauge; low-light performance timeline; affected camera list."},{"i":"5.9.84","n":"People Counting Trends and Occupancy Analytics","c":"low","f":"beginner","v":"Uses camera people counting to track foot traffic trends for space utilization and facility planning.","t":"`Splunk_TA_cisco_meraki` (API)","d":"`sourcetype=meraki:api people_count=*","q":"index=cisco_network sourcetype=\"meraki:api\" people_count=*\n| timechart avg(people_count) as avg_occupancy by location","m":"Extract people_count metrics from camera API. Aggregate by location and time.","z":"Occupancy heat map by time of day; location comparison bar chart; trend sparkline."},{"i":"5.9.85","n":"Temperature Sensor Threshold Alerts","c":"high","f":"beginner","v":"Alerts when environmental temperatures exceed safe thresholds to prevent equipment damage.","t":"`Splunk_TA_cisco_meraki` (API)","d":"`sourcetype=meraki type=security_event signature=\"*temperature*\"","q":"index=cisco_network sourcetype=\"meraki\" type=security_event signature=\"*temperature*\"\n| stats latest(temperature) as current_temp, min(temperature) as min_temp, max(temperature) as max_temp by sensor_location\n| where current_temp > 30 OR current_temp < 5","m":"Monitor temperature sensor threshold alerts from syslog. Alert on exceedance.","z":"Temperature gauge per location; trend timeline; alert dashboard."},{"i":"5.9.86","n":"Humidity Monitoring and Dew Point Tracking","c":"medium","f":"beginner","v":"Monitors humidity levels to ensure optimal conditions for equipment and prevent moisture damage.","t":"`Splunk_TA_cisco_meraki` (API)","d":"`sourcetype=meraki type=security_event signature=\"*humidity*\"","q":"index=cisco_network sourcetype=\"meraki\" type=security_event signature=\"*humidity*\"\n| stats latest(humidity) as current_humidity, avg(humidity) as avg_humidity by sensor_location\n| eval dew_point=\"calculated_value\"","m":"Monitor humidity sensor data. Calculate dew point for condensation risk.","z":"Humidity gauge per location; humidity vs temperature correlation; trend chart."},{"i":"5.9.87","n":"Door Open/Close Event Detection and Alerts","c":"high","f":"beginner","v":"Tracks door access events for security and facility monitoring.","t":"`Splunk_TA_cisco_meraki` (API)","d":"`sourcetype=meraki type=security_event signature=\"*door*\"","q":"index=cisco_network sourcetype=\"meraki\" type=security_event signature=\"*door*\" (action=\"open\" OR action=\"close\")\n| stats count as door_events, latest(timestamp) as last_event by door_location, action","m":"Monitor door sensor events. Alert on unusual access patterns.","z":"Door event timeline; access pattern analysis; alert table."},{"i":"5.9.88","n":"Water Leak Detection and Flood Alerts","c":"critical","f":"intermediate","v":"Immediately detects water leaks to prevent equipment damage and business interruption.","t":"`Splunk_TA_cisco_meraki` (API)","d":"`sourcetype=meraki type=security_event signature=\"*water*\" OR signature=\"*leak*\"","q":"index=cisco_network sourcetype=\"meraki\" type=security_event (signature=\"*water*\" OR signature=\"*leak*\")\n| stats count as leak_events, latest(timestamp) as last_detection by sensor_location\n| where leak_events > 0","m":"Monitor water/leak detection sensors. Create critical alert.","z":"Leak alert dashboard; sensor location map; event timeline."},{"i":"5.9.89","n":"Power Monitoring and Electrical Load Analysis","c":"medium","f":"intermediate","v":"Tracks electrical power consumption and load to identify anomalies and plan upgrades.","t":"`Splunk_TA_cisco_meraki` (API)","d":"`sourcetype=meraki:api","q":"index=cisco_network sourcetype=\"meraki:api\" sensor_type=\"power\" power_watts=*\n| stats avg(power_watts) as avg_power, max(power_watts) as peak_power by location\n| eval power_capacity_pct=round(peak_power*100/15000, 2)","m":"Query sensor API for power metrics. Track consumption and peaks.","z":"Power consumption gauge; peak load timeline; capacity planning chart."},{"i":"5.9.90","n":"Air Quality and CO2 Monitoring","c":"medium","f":"beginner","v":"Monitors indoor air quality to ensure safe working conditions.","t":"`Splunk_TA_cisco_meraki` (API)","d":"`sourcetype=meraki:api sensor_type=\"air_quality\"","q":"index=cisco_network sourcetype=\"meraki:api\" sensor_type=\"air_quality\" co2_ppm=*\n| stats latest(co2_ppm) as current_co2, avg(co2_ppm) as avg_co2 by location\n| where current_co2 > 1000","m":"Monitor CO2 and air quality sensor data. Alert on high levels.","z":"CO2 level gauge per location; trend timeline; air quality status chart."},{"i":"5.9.91","n":"Ambient Noise Level Monitoring and Trend Analysis","c":"low","f":"beginner","v":"Tracks noise levels to ensure comfortable working environment and detect anomalies.","t":"`Splunk_TA_cisco_meraki` (API)","d":"`sourcetype=meraki:api sensor_type=\"noise\"","q":"index=cisco_network sourcetype=\"meraki:api\" sensor_type=\"noise\" noise_db=*\n| stats avg(noise_db) as avg_noise, max(noise_db) as peak_noise by location\n| timechart avg(noise_db) by location","m":"Ingest noise sensor data. Track by location and time of day.","z":"Noise level gauge; time-of-day heat map; location comparison chart."},{"i":"5.9.92","n":"Indoor Climate Trending and HVAC Optimization","c":"low","f":"beginner","v":"Analyzes temperature and humidity trends to optimize HVAC system efficiency.","t":"`Splunk_TA_cisco_meraki` (API)","d":"`sourcetype=meraki:api sensor_type IN (\"temperature\", \"humidity\")","q":"index=cisco_network sourcetype=\"meraki:api\" sensor_type IN (\"temperature\", \"humidity\")\n| stats avg(value) as avg_value by sensor_type, location\n| timechart avg(value) by sensor_type","m":"Correlate temperature and humidity data. Identify optimization opportunities.","z":"Climate trend line chart; comfort zone indicator; energy efficiency analysis."},{"i":"5.9.93","n":"Environmental Sensor Battery Health and Replacement Alerts","c":"medium","f":"intermediate","v":"Tracks sensor battery levels to ensure sensors remain operational and schedule replacements.","t":"`Splunk_TA_cisco_meraki` (API)","d":"`sourcetype=meraki:api","q":"index=cisco_network sourcetype=\"meraki:api\" battery_level=*\n| stats latest(battery_level) as battery_pct by sensor_id, location\n| where battery_pct < 20\n| sort battery_pct","m":"Query sensor API for battery metrics. Alert on <20% battery.","z":"Battery health table; battery trend timeline; replacement alert dashboard."},{"i":"5.9.94","n":"Sensor Connectivity and Heartbeat Monitoring","c":"high","f":"intermediate","v":"Ensures all sensors maintain connectivity and operational status.","t":"`Splunk_TA_cisco_meraki` (API)","d":"`sourcetype=meraki:api","q":"index=cisco_network sourcetype=\"meraki:api\"\n| stats latest(last_report) as last_checkin by sensor_id\n| eval hours_since_checkin=round((now()-strptime(last_report, \"%Y-%m-%dT%H:%M:%S\"))/3600, 1)\n| where hours_since_checkin > 2","m":"Query sensor API for last report time. Alert on missing heartbeats.","z":"Sensor status table; last heartbeat timeline; offline sensor list."},{"i":"5.9.95","n":"Device Compliance Status and Policy Enforcement","c":"high","f":"intermediate","v":"Ensures all managed devices comply with security policies and configuration standards.","t":"`Splunk_TA_cisco_meraki` (API)","d":"`sourcetype=meraki:api compliance_status=*","q":"index=cisco_network sourcetype=\"meraki:api\" (compliance_status=\"noncompliant\" OR compliance_status=\"unknown\")\n| stats count as noncompliant_count by os_type, compliance_reason\n| eval compliance_pct=round(noncompliant_count*100/total_devices, 2)","m":"Query device compliance status from SM API. Alert on noncompliance.","z":"Compliance status table; compliance percentage gauge; noncompliant device list."},{"i":"5.9.96","n":"Mobile Device Enrollment and MDM Status Tracking","c":"medium","f":"beginner","v":"Tracks device enrollment status to ensure mobile device management coverage.","t":"`Splunk_TA_cisco_meraki` (API)","d":"`sourcetype=meraki:api enrollment_status=*","q":"index=cisco_network sourcetype=\"meraki:api\" enrollment_status IN (\"enrolled\", \"pending\", \"failed\")\n| stats count as device_count by enrollment_status, os_type\n| eval enrollment_pct=round(count*100/sum(count), 2)","m":"Query device enrollment status. Track pending and failed enrollments.","z":"Enrollment status pie chart; pending enrollment timeline; device count by OS."},{"i":"5.9.97","n":"Geofencing Alerts and Location-Based Policy Triggers","c":"medium","f":"beginner","v":"Uses geofencing to detect when devices leave secure zones and trigger location-base

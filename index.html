d policies.","t":"`Splunk_TA_cisco_meraki` (API)","d":"`sourcetype=meraki type=security_event signature=\"*geofence*\"","q":"index=cisco_network sourcetype=\"meraki\" type=security_event signature=\"*geofence*\"\n| stats count as geofence_event_count by device_id, zone_name, event_type\n| where event_type=\"left_zone\"","m":"Monitor geofence event triggers. Track zone entry/exit by device.","z":"Geofence event timeline; zone heat map; affected device list."},{"i":"5.9.98","n":"Mobile Security Policy Violations and App Restrictions","c":"high","f":"beginner","v":"Detects policy violations and restricted app usage attempts.","t":"`Splunk_TA_cisco_meraki` (API)","d":"`sourcetype=meraki type=security_event signature=\"*policy*\" OR signature=\"*app*\"","q":"index=cisco_network sourcetype=\"meraki\" type=security_event (signature=\"*policy*\" OR signature=\"*app*\") violation=\"true\"\n| stats count as violation_count by device_id, policy_name, violation_type\n| where violation_count > 5","m":"Monitor security policy violation events. Alert on repeated violations.","z":"Policy violation timeline; violation type breakdown; affected device list."},{"i":"5.9.99","n":"Lost Mode Device Activation and Recovery Tracking","c":"high","f":"beginner","v":"Tracks activation of lost mode on devices to ensure recovery protocols are working.","t":"`Splunk_TA_cisco_meraki` (API)","d":"`sourcetype=meraki type=security_event signature=\"*lost mode*\"","q":"index=cisco_network sourcetype=\"meraki\" type=security_event signature=\"*lost mode*\"\n| stats count as lost_mode_count, latest(timestamp) as last_activation by device_id, activation_reason","m":"Monitor lost mode activation events. Track recovery time.","z":"Lost mode event timeline; affected device table; recovery status dashboard."},{"i":"5.9.100","n":"Mobile App Deployment Success Rate and Distribution Status","c":"medium","f":"beginner","v":"Tracks app deployment success and identifies devices with failed or incomplete deployments.","t":"`Splunk_TA_cisco_meraki` (API)","d":"`sourcetype=meraki type=security_event signature=\"*app*deployment*\"","q":"index=cisco_network sourcetype=\"meraki\" type=security_event signature=\"*app*deployment*\"\n| stats count as deployment_count, count(eval(status=\"success\")) as success_count, count(eval(status=\"failed\")) as failed_count by app_name\n| eval success_rate=round(success_count*100/deployment_count, 2)\n| where success_rate < 95","m":"Monitor app deployment status events. Alert on low success rates.","z":"Deployment success rate gauge; app deployment timeline; failure detail table."},{"i":"5.9.101","n":"Cellular Gateway Signal Strength Trending","c":"medium","f":"intermediate","v":"Monitors cellular signal strength to ensure reliable backup connectivity.","t":"`Splunk_TA_cisco_meraki` (API), `TA-meraki` (syslog)","d":"`sourcetype=meraki:api device_type=MG","q":"index=cisco_network sourcetype=\"meraki:api\" device_type=MG\n| stats avg(signal_strength) as avg_signal, min(signal_strength) as min_signal by cellular_gateway_id\n| eval signal_quality=case(avg_signal > -90, \"Excellent\", avg_signal > -110, \"Good\", 1=1, \"Poor\")","m":"Query MG device API for signal metrics. Alert on degraded signal.","z":"Signal strength gauge; trend timeline; cellular quality status."},{"i":"5.9.102","n":"Cellular Data Usage and Overage Monitoring","c":"medium","f":"intermediate","v":"Tracks cellular data consumption to manage carrier costs and prevent overages.","t":"`Splunk_TA_cisco_meraki` (API), `TA-meraki` (syslog)","d":"`sourcetype=meraki:api device_type=MG data_usage=*","q":"index=cisco_network sourcetype=\"meraki:api\" device_type=MG data_usage=*\n| stats sum(data_usage) as total_data_usage_mb by cellular_gateway_id\n| eval overage_alert=if(total_data_usage_mb > 100000, \"Yes\", \"No\")","m":"Query MG API for data usage metrics. Track monthly consumption.","z":"Data usage gauge per gateway; consumption timeline; overage alert table."},{"i":"5.9.103","n":"Carrier Connection Health and Network Performance","c":"high","f":"beginner","v":"Monitors carrier connectivity and network performance metrics for backup internet links.","t":"`Splunk_TA_cisco_meraki` (API), `TA-meraki` (syslog)","d":"`sourcetype=meraki type=security_event signature=\"*cellular*\" OR signature=\"*carrier*\"","q":"index=cisco_network sourcetype=\"meraki\" type=security_event (signature=\"*cellular*\" OR signature=\"*carrier*\")\n| stats count as event_count by event_type, carrier_name\n| where event_type=\"connection_error\" OR event_type=\"network_error\"","m":"Monitor carrier connection and network events. Alert on issues.","z":"Carrier health timeline; connection error table; network performance gauge."},{"i":"5.9.104","n":"SIM Status and Plan Monitoring","c":"medium","f":"intermediate","v":"Tracks SIM card status and plan expiration to ensure continuous cellular connectivity.","t":"`Splunk_TA_cisco_meraki` (API), `TA-meraki` (syslog)","d":"`sourcetype=meraki:api device_type=MG sim_status=*","q":"index=cisco_network sourcetype=\"meraki:api\" device_type=MG\n| stats latest(sim_status) as sim_status, latest(plan_expiry) as expiry_date by gateway_id, sim_id\n| eval days_until_expire=round((strptime(plan_expiry, \"%Y-%m-%d\")-now())/86400, 0)\n| where sim_status != \"active\" OR days_until_expire < 30","m":"Query MG API for SIM status and plan expiry. Alert before expiration.","z":"SIM status table; plan expiry countdown; renewal alert dashboard."}]}]},{"i":6,"n":"Storage & Backup","s":[{"i":"6.1","n":"SAN / NAS Storage","u":[{"i":"6.1.1","n":"Volume Capacity Trending","c":"critical","f":"intermediate","v":"Prevents application outages caused by full volumes. Enables proactive capacity planning and procurement.","t":"Vendor TA (e.g., `TA-netapp_ontap`) or scripted API input","d":"Storage array REST API metrics, SNMP hrStorageTable","q":"index=storage sourcetype=\"netapp:ontap:volume\"\n| timechart span=1d avg(size_used_percent) as pct_used by volume_name\n| where pct_used > 85","m":"Deploy vendor TA on a heavy forwarder. Configure REST API polling (every 15 min) for volume metrics. Create alert for >85% and >95% thresholds. Build capacity forecast using `predict` command.","z":"Line chart (capacity trend per volume), Single value (current % used), Table (volumes above threshold)."},{"i":"6.1.2","n":"Storage Latency Monitoring","c":"critical","f":"beginner","v":"High storage latency directly impacts application performance. Early detection prevents SLA breaches and user experience degradation.","t":"Vendor TA or SNMP polling","d":"Array performance metrics (avg_latency, read_latency, write_latency)","q":"index=storage sourcetype=\"netapp:ontap:volume_perf\"\n| timechart span=5m avg(avg_latency) as latency_ms by volume_name\n| where latency_ms > 20","m":"Poll latency metrics via REST or SNMP every 5 minutes. Set tiered alerts: warning >10ms, critical >20ms for production volumes. Correlate with IOPS spikes to distinguish overload from hardware issues.","z":"Line chart (latency over time by volume), Heatmap (volume \u00d7 time), Single value (current avg latency)."},{"i":"6.1.3","n":"IOPS Trending per Volume","c":"high","f":"intermediate","v":"Identifies workload hotspots and enables data placement optimization. Supports capacity planning for storage refreshes.","t":"Vendor TA or SNMP","d":"Array performance metrics (read_ops, write_ops, other_ops)","q":"index=storage sourcetype=\"netapp:ontap:volume_perf\"\n| timechart span=15m sum(total_ops) as iops by volume_name\n| sort -iops","m":"Collect IOPS metrics per volume/LUN at 5-15 min intervals. Baseline normal patterns and alert on deviations exceeding 2\u00d7 baseline. Correlate with application deployment events.","z":"Line chart (IOPS trend by volume), Stacked bar (read vs write IOPS), Table (top IOPS consumers)."},{"i":"6.1.4","n":"Disk Failure Alerts","c":"critical","f":"beginner","v":"Immediate awareness of disk failures allows replacement before RAID degradation leads to data loss.","t":"Vendor TA, SNMP traps","d":"Array event/alert logs, SNMP traps","q":"index=storage sourcetype=\"netapp:ontap:ems\" severity=\"EMERGENCY\" OR severity=\"ALERT\"\n| search disk_fail* OR disk_broken OR disk_error\n| table _time, node, disk, severity, message","m":"Enable SNMP traps or syslog forwarding for disk failure events. Create high-priority alert with PagerDuty/ServiceNow integration. Track spare disk inventory to ensure replacements are available.","z":"Single value (failed disk count), Table (failed disks with details), Timeline (failure events)."},{"i":"6.1.5","n":"Replication Lag Monitoring","c":"critical","f":"intermediate","v":"Replication lag directly impacts RPO. Monitoring ensures DR readiness and compliance with data protection SLAs.","t":"Vendor TA, REST API polling","d":"Array replication status (SnapMirror, RecoverPoint, etc.)","q":"index=storage sourcetype=\"netapp:ontap:snapmirror\"\n| eval lag_minutes=lag_time/60\n| where lag_minutes > 60\n| table _time, source_volume, destination_volume, lag_minutes, state","m":"Poll replication status every 15 minutes. Alert when lag exceeds RPO target (e.g., >60 min for hourly replication). Track replication state (idle, transferring, broken-off) and alert on non-healthy states.","z":"Single value (max replication lag), Table (replication pairs with lag), Line chart (lag over time)."},{"i":"6.1.6","n":"Controller Failover Events","c":"critical","f":"beginner","v":"Controller failovers indicate hardware problems and may cause transient performance impact. Quick detection ensures rapid root cause analysis.","t":"Vendor TA, syslog","d":"Array event logs, cluster status","q":"index=storage sourcetype=\"netapp:ontap:ems\"\n| search \"cf.takeover*\" OR \"cf.giveback*\" OR failover\n| table _time, node, event, message","m":"Forward array event logs (syslog or API) to Splunk. Filter for failover/takeover events. Create critical alert with incident auto-creation. Track MTBF between failover events per controller.","z":"Timeline (failover events), Single value (days since last failover), Table (event details)."},{"i":"6.1.7","n":"Thin Provisioning Overcommit","c":"high","f":"beginner","v":"Over-committed thin-provisioned storage can cause sudden outages when physical capacity is exhausted. Monitoring prevents surprise failures.","t":"Vendor TA, API polling","d":"Aggregate/pool capacity metrics (logical vs physical)","q":"index=storage sourcetype=\"netapp:ontap:aggregate\"\n| eval overcommit_ratio=logical_used/physical_used\n| where overcommit_ratio > 1.5\n| table aggregate, physical_used_pct, logical_used, overcommit_ratio","m":"Poll aggregate/pool metrics showing logical vs physical capacity. Calculate overcommit ratio. Alert when physical utilization exceeds safe thresholds relative to committed capacity.","z":"Gauge (overcommit ratio per pool), Table (aggregates with overcommit stats), Bar chart (logical vs physical)."},{"i":"6.1.8","n":"Snapshot Space Consumption","c":"high","f":"intermediate","v":"Runaway snapshot growth can consume all available space, causing volume and application outages.","t":"Vendor TA, REST API","d":"Snapshot usage metrics per volume","q":"index=storage sourcetype=\"netapp:ontap:volume\"\n| eval snap_pct=snapshot_used_bytes/size_total*100\n| where snap_pct > 20\n| table volume_name, snap_pct, snapshot_used_bytes, snapshot_count\n| sort -snap_pct","m":"Poll snapshot usage per volume. Alert when snapshot reserve exceeds threshold (e.g., >20% of volume). Track snapshot count and age. Create scheduled report for snapshot cleanup candidates.","z":"Bar chart (snapshot usage by volume), Table (volumes with high snapshot usage), Line chart (snapshot growth trend)."},{"i":"6.1.9","n":"Fibre Channel Port Errors","c":"high","f":"intermediate","v":"FC port errors cause storage performance degradation and potential path failovers. Early detection prevents cascading failures.","t":"SNMP TA, FC switch syslog","d":"FC switch logs (Brocade, Cisco MDS), SNMP IF-MIB","q":"index=network sourcetype=\"brocade:syslog\" OR sourcetype=\"cisco:mds\"\n| search CRC_error OR link_failure OR signal_loss OR sync_loss\n| stats count by switch, port, error_type\n| where count > 10","m":"Forward FC switch syslog to Splunk. Poll SNMP counters for FC error rates. Alert on error rate exceeding baseline. Correlate with storage latency spikes to identify fabric issues.","z":"Table (ports with errors), Bar chart (error counts by type), Timeline (error events)."},{"i":"6.1.10","n":"Storage Array Firmware Compliance","c":"medium","f":"intermediate","v":"Outdated firmware exposes arrays to known bugs and security vulnerabilities. Compliance tracking supports patching cadence.","t":"Vendor TA, scripted inventory input","d":"Array system info (firmware version, model), vendor advisory feeds","q":"index=storage sourcetype=\"netapp:ontap:system\"\n| stats latest(version) as firmware by node, model\n| lookup approved_firmware_versions model OUTPUT approved_version\n| where firmware!=approved_version\n| table node, model, firmware, approved_version","m":"Poll system version info periodically (daily). Maintain a lookup table of approved firmware versions per model. Alert when arrays are running non-approved versions. Report on fleet firmware distribution.","z":"Table (arrays with firmware status), Pie chart (firmware version distribution), Single value (% compliant)."}]},{"i":"6.2","n":"Object Storage","u":[{"i":"6.2.1","n":"Bucket Capacity Trending","c":"medium","f":"beginner","v":"Tracks storage growth for cost forecasting and lifecycle policy effectiveness. Prevents unexpected cloud bills.","t":"`Splunk_TA_aws` (CloudWatch), Splunk_TA_microsoft-cloudservices","d":"CloudWatch S3 metrics (BucketSizeBytes), Azure Blob metrics","q":"index=aws sourcetype=\"aws:cloudwatch\" metric_name=\"BucketSizeBytes\"\n| timechart span=1d latest(Average) as size_bytes by bucket_name\n| eval size_gb=size_bytes/1024/1024/1024","m":"Enable S3 storage metrics in CloudWatch (request metrics may incur cost). Ingest via Splunk Add-on for AWS. Create trending reports by bucket and apply `predict` for growth forecasting.","z":"Line chart (bucket size over time), Stacked area (total storage by bucket), Table (largest buckets)."},{"i":"6.2.2","n":"Access Pattern Anomalies","c":"high","f":"advanced","v":"Unusual access patterns may indicate data breaches, compromised credentials, or misconfigured applications.","t":"`Splunk_TA_aws` (S3 access logs), Azure Blob diagnostics","d":"S3 access logs, Azure Blob analytics logs","q":"index=aws sourcetype=\"aws:s3:accesslogs\"\n| stats count by bucket_name, requester, operation\n| eventstats avg(count) as avg_ops, stdev(count) as stdev_ops by bucket_name, operation\n| where count > avg_ops + 3*stdev_ops","m":"Enable S3 server access logging to a dedicated logging bucket. Ingest via SQS-based S3 input. Baseline normal access patterns and alert on statistical outliers. Correlate with IAM changes.","z":"Line chart (access volume over time), Table (anomalous access events), Bar chart (operations by requester)."},{"i":"6.2.3","n":"Public Bucket Detection","c":"critical","f":"beginner","v":"Public buckets are a top cloud security risk, leading to data breaches. Immediate detection is essential for compliance.","t":"`Splunk_TA_aws` (Config), Azure Policy","d":"AWS Config rules, S3 ACL/policy evaluations","q":"index=aws sourcetype=\"aws:config:rule\"\n| search configRuleName=\"s3-bucket-public-read-prohibited\" OR configRuleName=\"s3-bucket-public-write-prohibited\"\n| where complianceType=\"NON_COMPLIANT\"\n| table _time, resourceId, configRuleName, complianceType","m":"Enable AWS Config rules for S3 public access. Ingest Config compliance data. Create critical alert for any NON_COMPLIANT result. Also monitor S3 Block Public Access settings at account level.","z":"Single value (public bucket count \u2014 should be 0), Table (non-compliant buckets), Status indicator (red/green)."},{"i":"6.2.4","n":"Lifecycle Policy Compliance","c":"medium","f":"intermediate","v":"Ensures storage cost optimization policies are working. Objects not transitioning per policy waste money.","t":"Cloud provider TAs","d":"CloudWatch storage class metrics, lifecycle action logs","q":"index=aws sourcetype=\"aws:cloudwatch\" metric_name=\"BucketSizeBytes\"\n| stats latest(Average) as size by bucket_name, StorageType\n| xyseries bucket_name StorageType size","m":"Monitor storage class distribution per bucket over time. Compare against defined lifecycle policies. Alert when objects remain in expensive storage classes longer than policy dictates.","z":"Stacked bar (storage class distribution per bucket), Table (policy violations), Pie chart (total storage by class)."},{"i":"6.2.5","n":"Cross-Region Replication Lag","c":"high","f":"beginner","v":"Replication lag affects DR readiness. Monitoring ensures geo-redundant data meets RPO requirements.","t":"Cloud provider TAs","d":"S3 replication metrics (ReplicationLatency, OperationsPendingReplication)","q":"index=aws sourcetype=\"aws:cloudwatch\" metric_name=\"ReplicationLatency\"\n| timechart span=1h avg(Average) as replication_lag_sec by bucket_name\n| where replication_lag_sec > 3600","m":"Enable S3 replication metrics in CloudWatch. Ingest and alert when replication latency or pending operations exceed thresholds. Correlate with data ingestion spikes that may cause temporary lag.","z":"Line chart (replication lag over time), Single value (max lag), Table (buckets with lag exceeding SLA)."}]},{"i":"6.3","n":"Backup & Recovery","u":[{"i":"6.3.1","n":"Backup Job Success Rate","c":"critical","f":"advanced","v":"Failed backups leave systems unprotected. Tracking success rate ensures recoverability and compliance with data protection policies.","t":"Veeam App for Splunk, Commvault Splunk App, or scripted API input","d":"Backup server job logs (job name, status, start/end time, data size)","q":"index=backup sourcetype=\"veeam:job\"\n| stats count(eval(status=\"Success\")) as success, count(eval(status=\"Failed\")) as failed, count as total by job_name\n| eval success_rate=round(success/total*100,1)\n| where success_rate < 100\n| sort success_rate","m":"Install vendor TA or configure scripted input to poll backup API. Ingest job completion events. Create daily report of job outcomes. Alert immediately on any failure for critical systems.","z":"Single value (overall success rate %), Table (failed jobs with details), Bar chart (success/fail by job), Trend line (daily success rate)."},{"i":"6.3.2","n":"Backup Job Duration Trending","c":"medium","f":"intermediate","v":"Increasing backup durations signal data growth, network congestion, or storage performance issues. Prevents backup window overruns.","t":"Vendor TA","d":"Backup job logs (start/end timestamps, data transferred)","q":"index=backup sourcetype=\"veeam:job\" status=\"Success\"\n| eval duration_min=(end_time-start_time)/60\n| timechart span=1d avg(duration_min) as avg_duration by job_name","m":"Calculate job duration from start/end timestamps. Track trend over weeks/months. Alert when duration exceeds historical average by >50%. Correlate with data volume changes.","z":"Line chart (duration trend per job), Table (longest running jobs), Bar chart (avg duration by job)."},{"i":"6.3.3","n":"Missed Backup Detection","c":"critical","f":"advanced","v":"A backup that doesn't run at all is worse than one that fails \u2014 it's invisible. Detection ensures no system is left unprotected.","t":"Vendor TA, custom correlation","d":"Backup scheduler logs, expected schedule lookup","q":"| inputlookup backup_schedule.csv\n| join type=left job_name\n    [search index=backup sourcetype=\"veeam:job\" earliest=-24h\n     | stats latest(_time) as last_run by job_name]\n| where isnull(last_run) OR last_run < relative_time(now(), \"-26h\")\n| table job_name, expected_schedule, last_run","m":"Maintain a lookup table of expected backup schedules. Run a scheduled search comparing expected vs actual runs. Alert when any job misses its window. Correlate with backup server health events.","z":"Table (missed jobs with schedule details), Single value (number of missed jobs), Status grid (job name \u00d7 date)."},{"i":"6.3.4","n":"Backup Storage Capacity","c":"high","f":"advanced","v":"Running out of backup repository space causes all backup jobs to fail. Proactive monitoring prevents cascading failures.","t":"Vendor TA, scripted input","d":"Backup repository/tape library capacity metrics","q":"index=backup sourcetype=\"veeam:repository\"\n| eval pct_used=round(used_space/total_space*100,1)\n| where pct_used > 80\n| table repository_name, total_space_gb, used_space_gb, pct_used","m":"Poll backup repository capacity via API or scripted input. Alert at 80% and 90% thresholds. Track growth rate and forecast when capacity will be exhausted using `predict`.","z":"Gauge (% used per repository), Line chart (capacity trend), Table (repositories above threshold)."},{"i":"6.3.5","n":"Restore Test Tracking","c":"high","f":"intermediate","v":"Backups are worthless if restores fail. Tracking restore tests ensures confidence in recoverability and satisfies audit requirements.","t":"Manual/scripted input, backup TA","d":"Restore test logs, manual test result entries","q":"index=backup sourcetype=\"restore_test\"\n| stats latest(_time) as last_test, latest(result) as result by system_name\n| eval days_since_test=round((now()-last_test)/86400)\n| where days_since_test > 90 OR result!=\"Success\"\n| table system_name, last_test, result, days_since_test","m":"Log all restore test results (automated or manual) to a dedicated index. Maintain a lookup of systems requiring quarterly restore tests. Alert when any system exceeds 90 days without a successful test.","z":"Table (systems with test status), Single value (% tested in last 90d), Status grid (system \u00d7 quarter)."},{"i":"6.3.6","n":"Backup SLA Compliance","c":"critical","f":"advanced","v":"Consolidated view of backup coverage and RPO/RTO compliance. Essential for management reporting and audit evidence.","t":"Combined backup data + CMDB lookup","d":"Backup job logs, CMDB/asset inventory","q":"| inputlookup cmdb_systems.csv WHERE requires_backup=\"yes\"\n| join type=left system_name\n    [search index=backup sourcetype=\"veeam:job\" status=\"Success\" earliest=-7d\n     | stats latest(_time) as last_backup, max(data_size) as backup_size by system_name]\n| eval compliant=if(isnotnull(last_backup),\"Yes\",\"No\")\n| stats count(eval(compliant=\"Yes\")) as covered, count as total\n| eval coverage_pct=round(covered/total*100,1)","m":"Cross-reference CMDB inventory with backup job data. Identify systems with no backup coverage. Calculate RPO compliance (time since last successful backup vs required RPO). Produce weekly executive report.","z":"Single value (SLA compliance %), Table (non-compliant systems), Pie chart (covered vs uncovered), Dashboard with filters by business unit."},{"i":"6.3.7","n":"Backup Data Volume Trending","c":"medium","f":"intermediate","v":"Tracks data growth rate for capacity planning of backup infrastructure. Identifies unexpected data surges early.","t":"Vendor TA","d":"Backup job statistics (data transferred per job)","q":"index=backup sourcetype=\"veeam:job\" status=\"Success\"\n| timechart span=1d sum(data_transferred_gb) as daily_volume\n| predict daily_volume as predicted future_timespan=30","m":"Sum data transferred across all backup jobs daily. Track trend and apply predictive analytics for 30/60/90-day forecasts. Compare against available repository capacity.","z":"Line chart (daily backup volume with prediction), Bar chart (volume by job type), Single value (total backed up today)."},{"i":"6.3.8","n":"Tape Library Health","c":"medium","f":"beginner","v":"Tape media and drive failures can silently corrupt backups. Monitoring ensures long-term archival reliability.","t":"SNMP TA, vendor syslog","d":"Tape library logs, SNMP traps, drive error counters","q":"index=backup sourcetype=\"tape_library\"\n| search media_error OR drive_error OR cleaning_required\n| stats count by library, drive_id, error_type\n| where count > 0","m":"Forward tape library syslog to Splunk. Poll SNMP for drive error counters and media faults. Alert on drive errors, media faults, or cleaning cartridge expiration. Track tape media lifecycle.","z":"Table (drive/media errors), Single value (drives needing attention), Timeline (error events)."}]},{"i":"6.4","n":"File Services","u":[{"i":"6.4.1","n":"File Access Audit","c":"high","f":"beginner","v":"Provides full audit trail of file access for compliance (SOX, HIPAA, PCI-DSS). Enables investigation of data breaches and unauthorized access.","t":"`Splunk_TA_windows` (Security Event Log)","d":"Windows Security Event Log (Event ID 4663 \u2014 object access), NFS access logs","q":"index=wineventlog sourcetype=\"WinEventLog:Security\" EventCode=4663\n| stats count by Account_Name, ObjectName, AccessMask\n| sort -count\n| head 50","m":"Enable \"Audit Object Access\" via GPO on file servers. Configure SACLs on sensitive folders. Forward Security logs via Universal Forwarder. Filter high-volume events to focus on sensitive paths.","z":"Table (user, file, access type, count), Bar chart (top accessed files), Timeline (access events for specific files)."},{"i":"6.4.2","n":"Ransomware Indicator Detection","c":"critical","f":"intermediate","v":"Ransomware causes mass file encryption in minutes. Detecting the pattern early can limit damage by triggering automated isolation.","t":"`Splunk_TA_windows`, custom alert logic","d":"Windows Security Event Log (4663, 4656, 4659 \u2014 file create/modify/delete)","q":"index=wineventlog sourcetype=\"WinEventLog:Security\" EventCode=4663\n| bucket _time span=1m\n| stats dc(ObjectName) as unique_files count by Account_Name, _time\n| where unique_files > 100 AND count > 500","m":"Enable file audit logging on critical file shares. Create high-urgency alert for mass file modification patterns (>100 unique files modified by one user in 1 minute). Integrate with SOAR for automated account disable/network isolation.","z":"Single value (files modified per minute \u2014 current), Line chart (modification rate over time), Table (users with anomalous activity)."},{"i":"6.4.3","n":"DFS Replication Health","c":"high","f":"intermediate","v":"DFS-R backlog and conflicts indicate replication failures that can lead to data inconsistency and user complaints.","t":"`Splunk_TA_windows` (DFS-R event logs)","d":"DFS Replication event log (Event IDs 4012, 4302, 4304, 5002, 5008)","q":"index=wineventlog sourcetype=\"WinEventLog:DFS Replication\"\n| search EventCode=4302 OR EventCode=4304 OR EventCode=5002\n| stats count by EventCode, ComputerName, ReplicationGroupName\n| sort -count","m":"Forward DFS Replication event logs from all DFS servers. Monitor backlog size via `dfsrdiag backlog` scripted input. Alert on replication conflicts and high backlog counts. Track resolution time.","z":"Table (replication groups with backlog), Line chart (backlog trend), Single value (total conflicts today)."},{"i":"6.4.4","n":"Share Permission Changes","c":"high","f":"beginner","v":"Unauthorized permission changes can expose sensitive data. Change detection supports compliance and security posture.","t":"`Splunk_TA_windows`","d":"Windows Security Event Log (Event IDs 4670 \u2014 permissions changed, 5143 \u2014 share modified)","q":"index=wineventlog sourcetype=\"WinEventLog:Security\" EventCode=4670 OR EventCode=5143\n| table _time, Account_Name, ObjectName, ObjectServer, ProcessName\n| sort -_time","m":"Enable \"Audit Policy Change\" and \"Audit File System\" via GPO. Forward Security events from file servers. Alert on any permission change to critical shares. Correlate with change management tickets.","z":"Table (permission changes with details), Timeline (change events), Bar chart (changes by user)."},{"i":"6.4.5","n":"Large File Transfer Detection","c":"high","f":"intermediate","v":"Unusually large file copies may indicate data exfiltration. Detection supports data loss prevention and insider threat programs.","t":"`Splunk_TA_windows`, network flow data","d":"Windows file audit logs, SMB session logs","q":"index=wineventlog sourcetype=\"WinEventLog:Security\" EventCode=4663 AccessMask=\"0x1\"\n| stats sum(Size) as total_bytes, dc(ObjectName) as file_count by Account_Name, src_ip\n| eval total_gb=round(total_bytes/1024/1024/1024,2)\n| where total_gb > 1\n| sort -total_gb","m":"Monitor file read events and correlate with SMB session data for volume estimates. Baseline normal transfer patterns per user. Alert when transfers exceed threshold (e.g., >1GB in single session). Correlate with HR/departure lists.","z":"Table (users with large transfers), Bar chart (transfer volume by user), Line chart (daily transfer volume trend)."}]}]},{"i":7,"n":"Database & Data Platforms","s":[{"i":"7.1","n":"Relational Databases","u":[{"i":"7.1.1","n":"Slow Query Detection","c":"critical","f":"intermediate","v":"Slow queries degrade application performance and user experience. Identifying them enables targeted optimization.","t":"DB Connect, Splunk_TA_microsoft-sqlserver, MySQL slow query log","d":"Slow query logs, SQL Server DMVs (`sys.dm_exec_query_stats`), PostgreSQL `pg_stat_statements`","q":"index=database sourcetype=\"mysql:slowquery\"\n| rex field=_raw \"Query_time:\\s+(?<query_time>[\\d.]+)\"\n| where query_time > 5\n| stats count, avg(query_time) as avg_time by db, user\n| sort -avg_time","m":"Enable MySQL slow query log (long_query_time=5). For SQL Server, poll DMVs via DB Connect. For PostgreSQL, enable `pg_stat_statements`. Ingest and alert on queries exceeding thresholds. Report top offenders weekly.","z":"Table (slow queries with details), Bar chart (top slow queries by avg duration), Line chart (slow query count trend)."},{"i":"7.1.2","n":"Deadlock Monitoring","c":"critical","f":"beginner","v":"Deadlocks cause transaction failures and application errors. Rapid detection and root cause analysis minimizes impact.","t":"Splunk_TA_microsoft-sqlserver, database error logs","d":"SQL Server error log (deadlock graph), PostgreSQL `log_lock_waits`, Oracle alert log","q":"index=database sourcetype=\"mssql:errorlog\"\n| search \"deadlock\" OR \"Deadlock\"\n| stats count by _time, database_name\n| timechart span=1h sum(count) as deadlocks","m":"Enable trace flag 1222 for SQL Server deadlock graphs. For PostgreSQL, set `log_lock_waits=on` and `deadlock_timeout=1s`. Ingest error logs. Alert on any deadlock occurrence. Parse deadlock graphs for involved queries/objects.","z":"Line chart (deadlocks over time), Table (deadlock details), Single value (deadlocks today)."},{"i":"7.1.3","n":"Connection Pool Exhaustion","c":"critical","f":"beginner","v":"Exhausted connection pools cause application failures. Monitoring prevents outages and guides pool sizing decisions.","t":"DB Connect, performance counters","d":"SQL Server DMVs (`sys.dm_exec_connections`), PostgreSQL `pg_stat_activity`, app server connection pool metrics","q":"index=database sourcetype=\"dbconnect:mssql_connections\"\n| timechart span=5m max(active_connections) as active, max(max_connections) as max_limit\n| eval pct_used=round(active/max_limit*100,1)\n| where pct_used > 80","m":"Poll connection counts via DB Connect every 5 minutes. Compare against configured maximum. Alert at 80% and 95% thresholds. Track by application/user to identify connection leaks.","z":"Gauge (% connections used), Line chart (connections over time), Table (connections by application)."},{"i":"7.1.4","n":"Replication Lag Monitoring","c":"critical","f":"intermediate","v":"Replication lag affects data consistency and failover readiness. Monitoring ensures HA/DR objectives are met.","t":"DB Connect, vendor-specific monitoring","d":"SQL Server AG DMVs (`sys.dm_hadr_database_replica_states`), MySQL `SHOW SLAVE STATUS`, PostgreSQL replication slots","q":"index=database sourcetype=\"dbconnect:replication_status\"\n| eval lag_seconds=coalesce(seconds_behind_master, replication_lag_sec)\n| timechart span=5m max(lag_seconds) as max_lag by replica_name\n| where max_lag > 60","m":"Poll replication status via DB Connect at 5-minute intervals. Alert when lag exceeds RPO (e.g., >60 seconds). Track lag trend over time. Correlate spikes with batch jobs or network events.","z":"Line chart (lag over time by replica), Single value (current max lag), Table (replicas with lag status)."},{"i":"7.1.5","n":"Tablespace / Data File Growth","c":"high","f":"intermediate","v":"Uncontrolled database growth leads to disk space exhaustion and outages. Trending enables proactive storage provisioning.","t":"DB Connect","d":"`sys.database_files` (SQL Server), `dba_tablespaces` (Oracle), `pg_database_size()` (PostgreSQL)","q":"index=database sourcetype=\"dbconnect:db_size\"\n| timechart span=1d latest(size_gb) as db_size by database_name\n| predict db_size as predicted future_timespan=30","m":"Poll database size metrics via DB Connect daily. Track growth rate per database. Use `predict` command for 30-day forecast. Alert when projected size exceeds available disk. Report top growing databases.","z":"Line chart (size trend with prediction), Table (databases with growth rate), Bar chart (top databases by size)."},{"i":"7.1.6","n":"Backup Success Verification","c":"critical","f":"intermediate","v":"Database backups are the last line of defense. Verifying success prevents discovering backup failures during a crisis.","t":"DB Connect, Splunk_TA_microsoft-sqlserver","d":"`msdb.dbo.backupset` (SQL Server), `v$rman_backup_job_details` (Oracle), PostgreSQL `pg_basebackup` logs","q":"index=database sourcetype=\"dbconnect:backup_history\"\n| stats latest(backup_finish_date) as last_backup, latest(type) as backup_type by database_name, server_name\n| eval hours_since=round((now()-strptime(last_backup,\"%Y-%m-%d %H:%M:%S\"))/3600,1)\n| where hours_since > 24\n| table server_name, database_name, last_backup, backup_type, hours_since","m":"Query backup history tables via DB Connect daily. Alert on any database without a successful backup in the expected window. Cross-reference with CMDB for backup classification (full/diff/log) requirements.","z":"Table (databases with backup status), Single value (databases missing backup), Status grid (database \u00d7 backup type)."},{"i":"7.1.7","n":"Login Failure Monitoring","c":"high","f":"intermediate","v":"Repeated login failures may indicate brute-force attacks or misconfigured applications. Detection supports security posture.","t":"Splunk_TA_microsoft-sqlserver, database error logs","d":"SQL Server error log (login failed events), PostgreSQL `log_connections`, Oracle audit trail","q":"index=database sourcetype=\"mssql:errorlog\"\n| search \"Login failed\"\n| rex \"Login failed for user '(?<user>[^']+)'\"\n| stats count by user, src_ip\n| where count > 10\n| sort -count","m":"Ensure failed login auditing is enabled (SQL Server: \"Both failed and successful logins\"). Forward error logs to Splunk. Alert on >10 failures per user per hour. Correlate with AD lockout events.","z":"Table (users with failed logins), Bar chart (failures by user), Line chart (failure rate over time)."},{"i":"7.1.8","n":"Long-Running Transaction Detection","c":"high","f":"intermediate","v":"Long transactions hold locks, causing blocking chains that degrade application performance for many users.","t":"DB Connect","d":"`sys.dm_exec_requests` (SQL Server), `pg_stat_activity` (PostgreSQL), Oracle `v$transaction`","q":"index=database sourcetype=\"dbconnect:active_transactions\"\n| where transaction_duration_sec > 300\n| table _time, server, database_name, user, transaction_duration_sec, sql_text\n| sort -transaction_duration_sec","m":"Poll active transactions via DB Connect every 5 minutes. Alert when any transaction exceeds 5 minutes. Include SQL text and blocking information. Escalate transactions blocking other sessions.","z":"Table (active long transactions), Single value (longest active transaction), Timeline (long transaction events)."},{"i":"7.1.9","n":"Index Fragmentation","c":"medium","f":"beginner","v":"Highly fragmented indexes cause excessive I/O and slow query performance. Monitoring guides maintenance scheduling.","t":"DB Connect","d":"`sys.dm_db_index_physical_stats` (SQL Server), `pg_stat_user_indexes` (PostgreSQL)","q":"index=database sourcetype=\"dbconnect:index_stats\"\n| where avg_fragmentation_pct > 30\n| table server, database_name, table_name, index_name, avg_fragmentation_pct, page_count\n| sort -avg_fragmentation_pct","m":"Poll index fragmentation stats via DB Connect weekly (resource-intensive query \u2014 schedule during off-hours). Alert when critical indexes exceed 30% fragmentation. Track fragmentation trend to optimize rebuild schedules.","z":"Table (fragmented indexes), Bar chart (fragmentation by database), Heatmap (table \u00d7 index fragmentation)."},{"i":"7.1.10","n":"TempDB Contention (SQL Server)","c":"high","f":"beginner","v":"TempDB contention is a common SQL Server bottleneck. Detection enables configuration tuning (multiple data files, trace flags).","t":"DB Connect, Splunk_TA_microsoft-sqlserver","d":"`sys.dm_os_wait_stats` (PAGELATCH waits), `sys.dm_exec_query_stats`","q":"index=database sourcetype=\"dbconnect:wait_stats\"\n| where wait_type LIKE \"PAGELATCH%\" AND resource_description LIKE \"2:%\"\n| stats sum(wait_time_ms) as total_wait by wait_type","m":"Poll wait statistics via DB Connect. Filter for PAGELATCH waits on TempDB (database_id 2). Alert when TempDB waits exceed baseline. Recommend adding TempDB data files equal to number of CPU cores (up to 8).","z":"Bar chart (wait types), Line chart (TempDB wait trend), Single value (current TempDB wait ms)."},{"i":"7.1.11","n":"Buffer Cache Hit Ratio","c":"medium","f":"beginner","v":"Low buffer cache hit ratio means excessive disk I/O. Monitoring guides memory allocation decisions.","t":"DB Connect, performance counters","d":"SQL Server performance counters, PostgreSQL `pg_stat_bgwriter`","q":"index=database sourcetype=\"dbconnect:perf_counters\"\n| where counter_name=\"Buffer cache hit ratio\"\n| timechart span=15m avg(cntr_value) as hit_ratio by instance_name\n| where hit_ratio < 95","m":"Poll buffer cache performance counters via DB Connect every 15 minutes. Alert when hit ratio drops below 95% for sustained periods. Correlate with memory pressure and query workload changes.","z":"Gauge (buffer cache hit ratio), Line chart (hit ratio over time), Single value (current hit ratio %)."},{"i":"7.1.12","n":"Database Availability Group Health","c":"critical","f":"beginner","v":"AG/RAC cluster health is essential for HA. Detecting unhealthy replicas prevents unplanned failover failures.","t":"DB Connect, Splunk_TA_microsoft-sqlserver","d":"`sys.dm_hadr_availability_replica_states` (SQL Server), Oracle CRS logs","q":"index=database sourcetype=\"dbconnect:ag_status\"\n| where synchronization_health_desc!=\"HEALTHY\" OR connected_state_desc!=\"CONNECTED\"\n| table _time, ag_name, replica_server_name, role_desc, synchronization_health_desc","m":"Poll AG replica state DMVs every 5 minutes. Alert on any non-HEALTHY or non-CONNECTED state. Track failover events from SQL Server error log. Create dashboard showing full AG topology and health.","z":"Status grid (replica \u00d7 health state), Table (unhealthy replicas), Timeline (failover events)."},{"i":"7.1.13","n":"Schema Change Detection","c":"high","f":"intermediate","v":"Unauthorized DDL changes to production databases can break applications. Detection ensures change control compliance.","t":"DB Connect, SQL Server audit","d":"SQL Server DDL triggers, audit logs, PostgreSQL `log_statement='ddl'`","q":"index=database sourcetype=\"mssql:audit\" action_id IN (\"CR\",\"AL\",\"DR\")\n| table _time, server_principal_name, database_name, object_name, statement\n| sort -_time","m":"Enable SQL Server audit for DDL events (CREATE, ALTER, DROP). For PostgreSQL, set `log_statement='ddl'`. Forward audit logs to Splunk. Alert on any DDL outside maintenance windows. Correlate with change tickets.","z":"Table (DDL events with details), Timeline (schema changes), Bar chart (changes by user)."},{"i":"7.1.14","n":"Query Plan Regression","c":"high","f":"advanced","v":"Query plan changes can cause sudden performance degradation. Detection enables rapid intervention (plan forcing, hint application).","t":"DB Connect","d":"SQL Server Query Store, `sys.dm_exec_query_plan`, PostgreSQL `pg_stat_statements`","q":"index=database sourcetype=\"dbconnect:query_store\"\n| stats avg(avg_duration) as current_avg by query_id, plan_id\n| join query_id [| inputlookup query_baselines.csv]\n| eval regression_pct=round((current_avg-baseline_avg)/baseline_avg*100,1)\n| where regression_pct > 50","m":"Enable Query Store on SQL Server databases. Poll query performance metrics via DB Connect. Maintain baseline lookup of normal query durations. Alert when queries regress >50% from baseline. Enable automatic plan correction if available.","z":"Table (regressed queries), Bar chart (regression % by query), Line chart (query duration trend)."},{"i":"7.1.15","n":"Privilege Escalation Audit","c":"critical","f":"beginner","v":"Unauthorized privilege changes can enable data theft or sabotage. Audit trail is required for compliance.","t":"DB Connect, SQL Server audit","d":"Database audit logs (GRANT/REVOKE events), security event logs","q":"index=database sourcetype=\"mssql:audit\"\n| search action_id IN (\"G\",\"R\",\"GWG\") statement=\"*GRANT*\" OR statement=\"*REVOKE*\"\n| table _time, server_principal_name, database_name, statement, target_server_principal_name","m":"Enable database audit for security events (GRANT, REVOKE, ALTER ROLE). Forward to Splunk. Alert on any privilege change in production. Correlate with change management tickets and access review cycles.","z":"Table (privilege change events), Timeline (changes), Bar chart (changes by granting user)."}]},{"i":"7.2","n":"NoSQL Databases","u":[{"i":"7.2.1","n":"Cluster Membership Changes","c":"critical","f":"beginner","v":"Node additions/removals affect data distribution and availability. Unexpected membership changes may indicate failures.","t":"Custom scripted input, database event logs","d":"MongoDB replica set events, Cassandra `system.log`, Elasticsearch cluster state","q":"index=database sourcetype=\"mongodb:log\"\n| search \"replSet\" (\"added\" OR \"removed\" OR \"changed state\" OR \"election\")\n| table _time, host, message\n| sort -_time","m":"Forward database logs to Splunk. Parse membership change events. Alert on unexpected node departures. For Elasticsearch, poll `_cluster/health` API and alert on node count changes.","z":"Timeline (membership events), Single value (current node count), Table (recent cluster changes)."},{"i":"7.2.2","n":"Replication Lag / Consistency","c":"critical","f":"intermediate","v":"Replication lag causes stale reads and eventual consistency violations. Monitoring ensures data freshness SLAs are met.","t":"Custom scripted input (rs.status(), nodetool)","d":"MongoDB `rs.status()`, Cassandra `nodetool status`, Redis `INFO replication`","q":"index=database sourcetype=\"mongodb:rs_status\"\n| eval lag_sec=optime_primary-optime_secondary\n| where lag_sec > 10\n| table _time, replica_set, member, state, lag_sec","m":"Run scripted input polling replica set status every minute. Parse member states and optime differences. Alert when lag exceeds threshold (e.g., >10 seconds). Track trend for capacity planning.","z":"Line chart (replication lag over time), Table (replicas with lag), Single value (max current lag)."},{"i":"7.2.3","n":"Read/Write Latency Trending","c":"high","f":"advanced","v":"Latency trending detects performance degradation before it impacts users. Enables proactive tuning and scaling decisions.","t":"Custom metrics input, database stats API","d":"MongoDB `serverStatus()`, Cassandra JMX, Elasticsearch `_nodes/stats`","q":"index=database sourcetype=\"mongodb:server_status\"\n| timechart span=5m avg(opcounters.query) as reads, avg(opcounters.insert) as writes, avg(opLatencies.reads.latency) as read_lat","m":"Poll database metrics every 5 minutes via scripted input or API. Track read/write latency percentiles (p50, p95, p99). Baseline normal patterns and alert on sustained deviation. Correlate with workload changes.","z":"Line chart (latency percentiles over time), Dual-axis chart (latency + throughput), Table (current latency by operation)."},{"i":"7.2.4","n":"Shard Imbalance Detection","c":"high","f":"intermediate","v":"Uneven shard distribution causes hot spots and performance inconsistency. Rebalancing prevents overloaded nodes.","t":"Custom scripted input","d":"MongoDB `sh.status()`, Elasticsearch `_cat/shards`","q":"index=database sourcetype=\"mongodb:shard_status\"\n| stats sum(count) as doc_count, sum(size) as data_size by shard\n| eventstats avg(doc_count) as avg_count\n| eval imbalance_pct=round(abs(doc_count-avg_count)/avg_count*100,1)\n| where imbalance_pct > 20","m":"Poll shard statistics periodically. Calculate per-shard deviation from average. Alert when any shard deviates >20% from mean size. For Elasticsearch, track unassigned shards as a separate critical alert.","z":"Bar chart (data size per shard), Table (shards with imbalance), Single value (max imbalance %)."},{"i":"7.2.5","n":"Compaction Monitoring","c":"medium","f":"intermediate","v":"Pending compactions consume I/O and can cause write amplification. Monitoring ensures compaction keeps pace with writes.","t":"JMX input (Cassandra), database logs","d":"Cassandra `nodetool compactionstats`, MongoDB WiredTiger stats, Elasticsearch merge stats","q":"index=database sourcetype=\"cassandra:compaction\"\n| timechart span=15m avg(pending_tasks) as pending, sum(bytes_compacted) as compacted\n| where pending > 50","m":"Poll compaction stats via JMX (Cassandra) or scripted input. Track pending compaction tasks and throughput. Alert when pending tasks grow consistently, indicating compaction cannot keep up with write volume.","z":"Line chart (pending compactions over time), Dual-axis (pending + throughput), Single value (current pending)."},{"i":"7.2.6","n":"GC Pause Detection","c":"critical","f":"intermediate","v":"Long GC pauses in Java-based databases (Cassandra, Elasticsearch) cause request timeouts and can trigger node eviction from the cluster.","t":"GC log parsing, JMX","d":"JVM GC logs (`gc.log`), JMX GC metrics","q":"index=database sourcetype=\"jvm:gc\"\n| where gc_pause_ms > 500\n| stats count, avg(gc_pause_ms) as avg_pause, max(gc_pause_ms) as max_pause by host, gc_type\n| where max_pause > 1000","m":"Configure JVM GC logging on all Java-based database nodes. Forward GC logs to Splunk with proper field extraction. Alert on pauses >500ms. Track GC frequency and total pause time per hour. Recommend heap tuning when pauses are chronic.","z":"Line chart (GC pause duration over time), Histogram (pause distribution), Table (hosts with excessive GC)."},{"i":"7.2.7","n":"Connection Count Monitoring","c":"high","f":"beginner","v":"Approaching connection limits causes client rejections. Monitoring enables proactive limit adjustment or connection pooling.","t":"Custom scripted input","d":"MongoDB `serverStatus().connections`, Redis `INFO clients`, Elasticsearch `_nodes/stats/transport`","q":"index=database sourcetype=\"mongodb:server_status\"\n| eval pct_used=round(connections.current/connections.available*100,1)\n| timechart span=5m max(pct_used) as connection_pct by host\n| where connection_pct > 80","m":"Poll connection metrics every 5 minutes. Calculate percentage of max connections used. Alert at 80% and 95%. Track by client application to identify connection leaks.","z":"Gauge (% connections used per node), Line chart (connection count over time), Table (nodes approaching limit)."},{"i":"7.2.8","n":"Index Build Monitoring","c":"medium","f":"beginner","v":"Index builds consume significant resources and can impact production performance. Tracking ensures builds complete within maintenance windows.","t":"Database log parsing","d":"MongoDB log (`INDEX` messages), Elasticsearch `_tasks` API","q":"index=database sourcetype=\"mongodb:log\"\n| search \"index build\"\n| rex \"building index on (?<collection>\\S+)\"\n| table _time, host, collection, message","m":"Parse database logs for index build events (start, progress, completion). Alert on index builds in production during business hours. Track build duration for capacity planning.","z":"Table (active/recent index builds), Timeline (build events), Single value (builds in progress)."},{"i":"7.2.9","n":"Memory Utilization","c":"high","f":"beginner","v":"NoSQL databases are memory-intensive. Evictions indicate undersized cache, causing disk reads and performance degradation.","t":"Custom scripted input, JMX","d":"Redis `INFO memory`, MongoDB WiredTiger cache stats, Cassandra JMX heap metrics","q":"index=database sourcetype=\"redis:info\"\n| eval mem_pct=round(used_memory/maxmemory*100,1)\n| timechart span=5m max(mem_pct) as memory_pct, sum(evicted_keys) as evictions by host\n| where memory_pct > 85","m":"Poll memory metrics every 5 minutes. Track used vs max memory, eviction rate, and cache hit ratio. Alert when memory exceeds 85% or eviction rate spikes. Recommend sizing adjustments based on trends.","z":"Gauge (memory % per node), Line chart (memory + evictions), Table (nodes with high utilization)."},{"i":"7.2.10","n":"Elasticsearch Cluster Health","c":"critical","f":"intermediate","v":"Elasticsearch cluster status directly indicates data availability. Yellow/red status requires immediate attention to prevent data loss.","t":"Custom REST API input","d":"Elasticsearch `_cluster/health` API","q":"index=database sourcetype=\"elasticsearch:cluster_health\"\n| eval status_num=case(status=\"green\",0, status=\"yellow\",1, status=\"red\",2)\n| timechart span=5m latest(status_num) as health, latest(unassigned_shards) as unassigned by cluster_name\n| where health > 0","m":"Poll `_cluster/health` endpoint every minute. Alert on yellow status (warning) and red status (critical). Track unassigned shard count and node count. Correlate with JVM metrics and disk space to identify root cause.","z":"Status indicator (green/yellow/red), Single value (unassigned shards), Line chart (cluster health timeline), Table (cluster details)."}]},{"i":"7.3","n":"Cloud-Managed Databases","u":[{"i":"7.3.1","n":"RDS/Aurora Performance Insights","c":"high","f":"beginner","v":"Performance Insights identifies top SQL and wait events without agent installation. Enables rapid diagnosis of managed database bottlenecks.","t":"`Splunk_TA_aws` (CloudWatch)","d":"RDS Performance Insights API, CloudWatch Enhanced Monitoring","q":"index=aws sourcetype=\"aws:cloudwatch\" namespace=\"AWS/RDS\"\n| where metric_name IN (\"CPUUtilization\",\"DatabaseConnections\",\"ReadLatency\",\"WriteLatency\")\n| timechart span=5m avg(Average) by metric_name, DBInstanceIdentifier","m":"Enable Enhanced Monitoring and Performance Insights on RDS instances. Ingest CloudWatch metrics via Splunk Add-on for AWS. Enable RDS log exports (slow query, error, general) to CloudWatch Logs for deeper analysis.","z":"Multi-line chart (CPU, connections, latency), Table (top wait events), Single value (current active sessions)."},{"i":"7.3.2","n":"Automated Failover Events","c":"critical","f":"beginner","v":"Managed database failovers cause brief outages. Detection enables impact analysis and root cause investigation.","t":"`Splunk_TA_aws` (CloudTrail/EventBridge), Azure Activity Log","d":"RDS events, Azure SQL activity log, Cloud SQL admin activity","q":"index=aws sourcetype=\"aws:cloudwatch:events\"\n| search detail.EventCategories=\"failover\"\n| table _time, detail.SourceIdentifier, detail.Message","m":"Ingest RDS event subscriptions via SNS \u2192 SQS \u2192 Splunk. Filter for failover events. Alert immediately with PagerDuty/ServiceNow integration. Correlate with application error spikes to measure impact duration.","z":"Timeline (failover events), Table (failover details), Single value (days since last failover)."},{"i":"7.3.3","n":"Read Replica Lag","c":"high","f":"beginner","v":"Replica lag affects read consistency for applications using read replicas. Monitoring prevents stale data serving.","t":"Cloud provider TAs (CloudWatch, Azure Monitor)","d":"CloudWatch `ReplicaLag` metric, Azure SQL `replication_lag`","q":"index=aws sourcetype=\"aws:cloudwatch\" namespace=\"AWS/RDS\" metric_name=\"ReplicaLag\"\n| timechart span=5m max(Maximum) as replica_lag_sec by DBInstanceIdentifier\n| where replica_lag_sec > 30","m":"Ingest CloudWatch RDS metrics. Alert when ReplicaLag exceeds application tolerance (e.g., >30 seconds). Track trend and correlate with write workload spikes. Alert on replica lag growing consistently.","z":"Line chart (replica lag over time), Single value (current max lag), Table (replicas with lag)."},{"i":"7.3.4","n":"Storage Auto-Scaling Events","c":"medium","f":"beginner","v":"Tracks storage auto-scaling events for cost awareness and identifies databases with rapid growth needing attention.","t":"Cloud provider TAs","d":"CloudTrail (ModifyDBInstance), Azure Activity Log","q":"index=aws sourcetype=\"aws:cloudtrail\" eventName=\"ModifyDBInstance\"\n| spath output=allocated requestParameters.allocatedStorage\n| where isnotnull(allocated)\n| table _time, requestParameters.dBInstanceIdentifier, allocated, userIdentity.principalId","m":"Ingest CloudTrail events. Filter for storage modification events. Track growth frequency per database. Alert when auto-scaling occurs more than twice per week, indicating rapid growth needing review.","z":"Timeline (scaling events), Table (databases with scaling history), Bar chart (scaling frequency by database)."},{"i":"7.3.5","n":"Maintenance Window Tracking","c":"medium","f":"beginner","v":"Awareness of upcoming and completed maintenance ensures teams are prepared for potential service impact.","t":"Cloud provider TAs","d":"RDS event subscriptions, Azure Service Health, GCP maintenance notifications","q":"index=aws sourcetype=\"aws:cloudwatch:events\"\n| search detail.EventCategories=\"maintenance\"\n| table _time, detail.SourceIdentifier, detail.Message, detail.Date\n| sort detail.Date","m":"Subscribe to RDS maintenance events via SNS. Ingest into Splunk. Create calendar view of upcoming maintenance. Alert 72 hours before scheduled maintenance. Log actual impact duration after completion.","z":"Table (upcoming/recent maintenance), Calendar view, Timeline (maintenance history)."}]},{"i":"7.4","n":"Data Warehouses & Analytics Platforms","u":[{"i":"7.4.1","n":"Query Performance Trending","c":"high","f":"intermediate","v":"Identifies expensive and slow queries impacting warehouse performance and cost. Enables query optimization and cost reduction.","t":"Custom API input (Snowflake ACCOUNT_USAGE), DB Connect","d":"Snowflake `QUERY_HISTORY`, BigQuery `INFORMATION_SCHEMA.JOBS`, Redshift `STL_QUERY`","q":"index=datawarehouse sourcetype=\"snowflake:query_history\"\n| where EXECUTION_STATUS=\"SUCCESS\" AND TOTAL_ELAPSED_TIME > 60000\n| stats avg(TOTAL_ELAPSED_TIME) as avg_ms, sum(CREDITS_USED_CLOUD_SERVICES) as credits by USER_NAME, WAREHOUSE_NAME\n| sort -credits","m":"Poll query history views via REST API or DB Connect daily. Track query duration, queue time, and cost. Identify top resource consumers. Create weekly optimization report for data engineering teams.","z":"Table (expensive queries), Bar chart (cost/duration by warehouse), Line chart (query performance trend)."},{"i":"7.4.2","n":"Cluster Scaling Events","c":"medium","f":"beginner","v":"Tracks auto-scaling decisions for cost optimization. Identifies whether current scaling policies match workload patterns.","t":"Custom API input, cloud provider TAs","d":"Snowflake `WAREHOUSE_EVENTS_HISTORY`, Redshift resize events, BigQuery slot utilization","q":"index=datawarehouse sourcetype=\"snowflake:warehouse_events\"\n| search event_name IN (\"RESIZE_CLUSTER\",\"SUSPEND_CLUSTER\",\"RESUME_CLUSTER\")\n| timechart span=1h count by event_name, warehouse_name","m":"Poll warehouse event history. Track resume/suspend/scaling frequency. Correlate with query concurrency to validate scaling policies. Alert on unexpected scaling events outside business hours.","z":"Timeline (scaling events), Stacked bar (events by type per day), Table (warehouse scaling summary)."},{"i":"7.4.3","n":"Data Pipeline Health","c":"critical","f":"intermediate","v":"Failed or delayed ETL/ELT pipelines cause stale data for reporting and analytics. Early detection prevents downstream impact.","t":"Custom API input, orchestrator integration (Airflow, dbt)","d":"Airflow task logs, dbt run results, Snowflake TASK_HISTORY, pipeline orchestrator APIs","q":"index=datawarehouse sourcetype=\"airflow:task_instance\"\n| stats count(eval(state=\"failed\")) as failed, count(eval(state=\"success\")) as success, count as total by dag_id, task_id\n| eval fail_rate=round(failed/total*100,1)\n| where fail_rate > 0\n| sort -fail_rate","m":"Ingest pipeline orchestrator logs (Airflow, dbt, custom). Track job outcomes, durations, and data freshness. Alert on any pipeline failure. Create data freshness SLA dashboard showing when each table was last updated.","z":"Status grid (pipeline \u00d7 status), Table (failed pipelines), Line chart (pipeline duration trend), Single value (overall success rate)."},{"i":"7.4.4","n":"Credit / Cost per Query","c":"high","f":"beginner","v":"Directly ties compute cost to individual queries, enabling chargeback and cost optimization. Identifies runaway queries consuming excessive resources.","t":"Custom API input (Snowflake ACCOUNT_USAGE)","d":"Snowflake `QUERY_HISTORY` (CREDITS_USED), BigQuery `INFORMATION_SCHEMA.JOBS` (total_bytes_billed)","q":"index=datawarehouse sourcetype=\"snowflake:query_history\"\n| eval cost=CREDITS_USED_CLOUD_SERVICES * 3\n| stats sum(cost) as total_cost, count as query_count by USER_NAME, WAREHOUSE_NAME\n| eval cost_per_query=round(total_cost/query_count,2)\n| sort -total_cost","m":"Poll query history with cost metrics daily. Calculate cost per query, per user, and per team (using role mapping). Create weekly cost report. Alert on individual queries exceeding cost threshold. Set up warehouse-level budgets.","z":"Bar chart (cost by user/warehouse), Table (most expensive queries), Line chart (daily cost trend), Pie chart (cost by team)."},{"i":"7.4.5","n":"Warehouse Utilization","c":"medium","f":"beginner","v":"Right-sizing warehouses reduces cost while maintaining performance. Utilization data drives scaling policy decisions.","t":"Custom API input","d":"Snowflake `WAREHOUSE_LOAD_HISTORY`, Redshift `WLM_QUEUE_STATE`, BigQuery reservation utilization","q":"index=datawarehouse sourcetype=\"snowflake:warehouse_load\"\n| timechart span=15m avg(AVG_RUNNING) as avg_queries, avg(AVG_QUEUED_LOAD) as avg_queued by WAREHOUSE_NAME\n| where avg_queued > 1","m":"Poll warehouse utilization metrics every 15 minutes. Track running vs queued queries. Alert when queuing occurs consistently (indicates undersized warehouse). Identify idle warehouses for auto-suspend policy adjustment.","z":"Line chart (running vs queued queries), Heatmap (warehouse \u00d7 hour utilization), Table (underutilized warehouses), Bar chart (utilization by warehouse)."}]}]},{"i":8,"n":"Application Infrastructure","s":[{"i":"8.1","n":"Web Servers & Reverse Proxies","u":[{"i":"8.1.1","n":"HTTP Error Rate Monitoring","c":"critical","f":"beginner","v":"Rising error rates signal application issues, backend failures, or attacks. Rapid detection reduces user impact and MTTR.","t":"`Splunk_TA_apache`, `TA-nginx`, IIS via Windows TA","d":"Web server access logs (Apache combined, NGINX combined, IIS W3C)","q":"index=web sourcetype=\"access_combined\"\n| eval error=if(status>=400,1,0)\n| timechart span=5m sum(error) as errors, count as total\n| eval error_rate=round(errors/total*100,2)\n| where error_rate > 5","m":"Install appropriate web server TA. Forward access logs via UF. Enable response time logging in web server config. Create tiered alerts: >5% error rate (warning), >10% (critical). Split 4xx from 5xx for different response.","z":"Line chart (error rate over time), Stacked bar (4xx vs 5xx), Single value (current error rate %), Table (top error URIs)."},{"i":"8.1.2","n":"Response Time Trending","c":"high","f":"beginner","v":"Increasing response times degrade user experience before complete failures occur. Trending enables proactive optimization.","t":"`Splunk_TA_apache`, `TA-nginx`","d":"Access logs with `%D` (Apache) or `$request_time` (NGINX)","q":"index=web sourcetype=\"access_combined\"\n| timechart span=5m perc95(response_time) as p95, avg(response_time) as avg_rt by host\n| where p95 > 2000","m":"Enable response time logging in web server config (Apache: `%D` in LogFormat, NGINX: `$request_time`). Track p50/p95/p99 percentiles. Alert on p95 exceeding SLA threshold. Correlate with backend service health.","z":"Line chart (p50/p95/p99 over time), Histogram (response time distribution), Table (slowest endpoints)."},{"i":"8.1.3","n":"Request Rate Trending","c":"medium","f":"intermediate","v":"Traffic trending supports capacity planning and identifies unexpected traffic patterns (bot attacks, viral events, traffic drops).","t":"`Splunk_TA_apache`, `TA-nginx`","d":"Access logs","q":"index=web sourcetype=\"access_combined\"\n| timechart span=1m count as requests_per_min by host\n| predict requests_per_min as predicted","m":"Ingest access logs. Track requests per second/minute. Baseline normal traffic patterns using `predict`. Alert on sudden drops (possible outage) or spikes (possible attack). Break down by URI for endpoint-level trending.","z":"Line chart (request rate with prediction band), Area chart (traffic over time), Bar chart (requests by host)."},{"i":"8.1.4","n":"Top Error URIs","c":"medium","f":"beginner","v":"Identifies the most problematic endpoints for targeted developer attention. Reduces noise by focusing on high-impact errors.","t":"`Splunk_TA_apache`, `TA-nginx`","d":"Access logs","q":"index=web sourcetype=\"access_combined\" status>=400\n| stats count by uri_path, status\n| sort -count\n| head 20","m":"Parse URI from access logs (ensure proper field extraction). Group by URI and status code. Create daily/weekly report of top error endpoints. Track error trends per URI over time to detect regressions.","z":"Table (URI, status, count), Bar chart (top 20 error URIs), Treemap (errors by URI path)."},{"i":"8.1.5","n":"SSL Certificate Monitoring","c":"critical","f":"intermediate","v":"Expired SSL certificates cause complete service outage and browser security warnings. Proactive monitoring prevents this entirely avoidable failure.","t":"Scripted input (openssl s_client), custom certificate check","d":"Certificate check scripted input, web server config parsing","q":"index=certificates sourcetype=\"cert_check\"\n| eval days_until_expiry=round((cert_expiry_epoch-now())/86400)\n| where days_until_expiry < 30\n| table host, port, cn, issuer, days_until_expiry\n| sort days_until_expiry","m":"Deploy scripted input that runs `openssl s_client` against all HTTPS endpoints daily. Parse certificate details (CN, SAN, expiry, issuer). Alert at 30, 14, and 7 days before expiry. Maintain endpoint inventory via lookup.","z":"Table (certificates with expiry dates), Single value (certs expiring within 30d), Status grid (endpoint \u00d7 cert status)."},{"i":"8.1.6","n":"Upstream Backend Health","c":"critical","f":"intermediate","v":"Backend server failures behind reverse proxies cause partial service degradation. Detection enables rapid failover response.","t":"`TA-nginx` (error logs), HAProxy stats","d":"NGINX error logs (upstream errors), HAProxy stats socket, F5 pool member logs","q":"index=web sourcetype=\"nginx:error\"\n| search \"upstream\" (\"connect() failed\" OR \"no live upstreams\" OR \"timed out\")\n| stats count by upstream_addr, server_name\n| sort -count","m":"Forward NGINX error logs. Parse upstream failure messages. For HAProxy, enable stats socket and poll via scripted input. Alert on backend server failures. Track backend health state over time.","z":"Status grid (backend \u00d7 health), Table (failed backends), Timeline (backend failure events)."},{"i":"8.1.7","n":"Bot and Crawler Detection","c":"medium","f":"intermediate","v":"Bot traffic inflates metrics and consumes resources. Identification enables accurate capacity planning and bot management policies.","t":"`Splunk_TA_apache`, `TA-nginx`","d":"Access logs (User-Agent field)","q":"index=web sourcetype=\"access_combined\"\n| rex field=useragent \"(?<bot_name>Googlebot|Bingbot|baiduspider|bot|crawler|spider)\"\n| eval is_bot=if(isnotnull(bot_name),\"bot\",\"human\")\n| stats count by is_bot\n| eval pct=round(count/sum(count)*100,1)","m":"Parse User-Agent from access logs. Maintain a lookup of known bot signatures. Classify traffic as bot vs human. Track bot traffic percentage over time. Alert on unknown bots or suspicious crawling patterns.","z":"Pie chart (bot vs human traffic), Bar chart (top bots by request count), Line chart (bot traffic trend)."},{"i":"8.1.8","n":"Connection Pool Saturation","c":"high","f":"advanced","v":"Saturated worker threads/processes cause request queuing and timeouts. Monitoring enables proactive scaling.","t":"Scripted input (Apache `server-status`, NGINX `stub_status`)","d":"Apache mod_status, NGINX stub_status, IIS performance counters","q":"index=web sourcetype=\"apache:server_status\"\n| eval pct_busy=round(BusyWorkers/(BusyWorkers+IdleWorkers)*100,1)\n| timechart span=5m avg(pct_busy) as worker_pct by host\n| where worker_pct > 80","m":"Enable Apache `mod_status` or NGINX `stub_status` module. Poll via scripted input every minute. Alert when busy workers exceed 80% of total. Correlate with request rate to distinguish capacity limits from slow backends.","z":"Gauge (% workers busy), Line chart (worker utilization over time), Table (hosts at capacity)."},{"i":"8.1.9","n":"Slow POST Detection","c":"medium","f":"intermediate","v":"Slow POST requests often indicate application-level performance issues (large form submissions, file uploads, database writes) distinct from slow GETs.","t":"`Splunk_TA_apache`, `TA-nginx`","d":"Access logs with response time","q":"index=web sourcetype=\"access_combined\" method=POST\n| where response_time > 5000\n| stats count, avg(response_time) as avg_rt by uri_path\n| sort -avg_rt","m":"Filter access logs for POST requests with high response times. Track by endpoint to identify specific bottlenecks. Correlate with backend database/API latency. Report top slow POST endpoints weekly.","z":"Table (slow POST endpoints), Bar chart (avg response time by URI), Line chart (slow POST count trend)."},{"i":"8.1.10","n":"Configuration Reload Tracking","c":"medium","f":"beginner","v":"Configuration changes are a common cause of outages. Tracking reloads enables rapid correlation with incidents.","t":"`Splunk_TA_apache`, `TA-nginx`, process monitoring","d":"Web server error/event logs","q":"index=web sourcetype=\"nginx:error\" OR sourcetype=\"apache:error\"\n| search \"signal\" OR \"reload\" OR \"restarting\" OR \"resuming normal operations\"\n| table _time, host, message","m":"Forward error/event logs from web servers. Parse reload/restart messages. Correlate with deployment events and change management tickets. Alert on unexpected restarts outside maintenance windows.","z":"Timeline (reload events), Table (reload history with correlation), Single value (reloads this week)."}]},{"i":"8.2","n":"Application Servers & Runtimes","u":[{"i":"8.2.1","n":"JVM Heap Utilization","c":"critical","f":"beginner","v":"JVM heap exhaustion causes OutOfMemoryError, crashing the application. Monitoring enables tuning before failures occur.","t":"`TA-jmx`, OpenTelemetry","d":"JMX MBeans (`java.lang:type=Memory`), Prometheus JMX exporter","q":"index=jmx sourcetype=\"jmx:memory\"\n| eval heap_pct=round(HeapMemoryUsage.used/HeapMemoryUsage.max*100,1)\n| timechart span=5m avg(heap_pct) as heap_usage by host\n| where heap_usage > 85","m":"Deploy JMX TA on a heavy forwarder. Configure JMX connection to each app server. Poll memory MBeans every minute. Alert at 85% heap usage. Track heap growth pattern to detect memory leaks (sawtooth with increasing floor).","z":"Line chart (heap usage over time), Gauge (current heap %), Area chart (heap used vs max)."},{"i":"8.2.2","n":"Garbage Collection Impact","c":"high","f":"beginner","v":"Frequent or long GC pauses cause application latency spikes and request timeouts. Monitoring guides JVM tuning.","t":"GC log parsing, `TA-jmx`","d":"JVM GC logs, JMX GarbageCollector MBeans","q":"index=jvm sourcetype=\"jvm:gc\"\n| where gc_pause_ms > 200\n| timechart span=15m count as gc_events, sum(gc_pause_ms) as total_pause_ms by host\n| eval pause_pct=round(total_pause_ms/900000*100,2)","m":"Enable GC logging on all JVM-based app servers (`-Xlog:gc*` for Java 11+). Forward logs via UF. Parse pause duration, type, and cause. Alert on pauses >200ms or total pause time >5% of wall clock time.","z":"Line chart (GC pause duration), Histogram (pause distribution), Single value (total pause time per hour)."},{"i":"8.2.3","n":"Thread Pool Exhaustion","c":"critical","f":"intermediate","v":"Exhausted thread pools cause request rejection and application unresponsiveness. Detection prevents complete service failure.","t":"`TA-jmx`, application metrics","d":"JMX thread MBeans, Tomcat Connector metrics, application metrics endpoints","q":"index=jmx sourcetype=\"jmx:threading\"\n| eval pct_used=round(currentThreadsBusy/maxThreads*100,1)\n| timechart span=5m max(pct_used) as thread_pct by host\n| where thread_pct > 80","m":"Poll thread pool metrics via JMX (Tomcat: Connector MBeans, WildFly: undertow subsystem). Alert at 80% thread pool utilization. Correlate with request rate and response time to distinguish traffic spikes from slow backends.","z":"Gauge (% threads busy), Line chart (thread utilization over time), Table (servers approaching capacity)."},{"i":"8.2.4","n":"Application Error Rate","c":"critical","f":"intermediate","v":"Application exceptions indicate bugs, integration failures, or environmental issues. Tracking error rate by type guides debugging priority.","t":"Custom log input, application framework logging","d":"Application log files (log4j, logback, NLog, Serilog)","q":"index=application sourcetype=\"log4j\" log_level=ERROR\n| timechart span=5m count as error_count by host\n| predict error_count as predicted","m":"Forward application logs via UF. Ensure structured logging (JSON preferred) for reliable field extraction. Classify errors by type/exception. Alert on error rate spikes above baseline. Create error type breakdown for developer triage.","z":"Line chart (error rate with baseline), Table (top error types), Bar chart (errors by component)."},{"i":"8.2.5","n":"Deployment Tracking","c":"high","f":"beginner","v":"Correlating deployments with performance changes is the fastest way to identify deployment-caused regressions. Essential for change management.","t":"Webhook input, CI/CD integration","d":"Deployment tool webhooks (Jenkins, GitHub Actions, ArgoCD), application version endpoints","q":"index=deployments sourcetype=\"deployment_event\"\n| table _time, application, version, environment, deployer, status\n| sort -_time","m":"Configure CI/CD pipeline to send deployment events to Splunk HEC (JSON payload with app, version, environment, deployer). Annotate timecharts with deployment markers. Correlate deployment times with error rate and latency changes.","z":"Timeline (deployment events overlaid on performance charts), Table (recent deployments), Annotation layer on dashboards."},{"i":"8.2.6","n":"Connection Pool Monitoring","c":"high","f":"intermediate","v":"Exhausted JDBC/database connection pools cause application errors and cascading failures. Monitoring prevents connection starvation.","t":"`TA-jmx`, application metrics","d":"JMX DataSource MBeans, HikariCP metrics, application framework metrics","q":"index=jmx sourcetype=\"jmx:datasource\"\n| eval pct_used=round(numActive/maxTotal*100,1)\n| timechart span=5m max(pct_used) as pool_pct by host, pool_name\n| where pool_pct > 80","m":"Poll JDBC connection pool MBeans via JMX. Track active, idle, and waiting connections. Alert at 80% pool utilization. Monitor connection wait time \u2014 high wait times indicate pool exhaustion even before 100%. Correlate with database latency.","z":"Gauge (% pool used), Line chart (pool utilization over time), Table (pools approaching limits)."},{"i":"8.2.7","n":"Session Count Trending","c":"medium","f":"intermediate","v":"Active session counts indicate concurrent user load. Trending supports capacity planning and license management.","t":"`TA-jmx`, application metrics","d":"JMX session MBeans, application metrics endpoints","q":"index=jmx sourcetype=\"jmx:manager\"\n| timechart span=15m max(activeSessions) as sessions by host\n| predict sessions as predicted future_timespan=7","m":"Poll session manager MBeans via JMX. Track active sessions per server. Correlate with user authentication events for validation. Use `predict` for capacity forecasting.","z":"Line chart (session count with prediction), Single value (current active sessions), Area chart (sessions over time)."},{"i":"8.2.8","n":".NET CLR Performance","c":"high","f":"intermediate","v":"CLR performance issues (high GC, exceptions, thread starvation) directly impact .NET application performance. Monitoring guides runtime tuning.","t":"`Splunk_TA_windows` (Perfmon), custom .NET metrics","d":"Windows Performance Counters (.NET CLR Memory, Exceptions, Threading)","q":"index=perfmon sourcetype=\"Perfmon:CLR_Memory\"\n| timechart span=5m avg(Pct_Time_in_GC) as gc_pct, avg(Gen_2_Collections) as gen2_gc by instance\n| where gc_pct > 10","m":"Configure Perfmon inputs for .NET CLR counters in `inputs.conf`. Monitor % Time in GC, Gen 2 collections, exception throw rate, and thread contention rate. Alert when GC time exceeds 10% or exception rate spikes.","z":"Line chart (GC % over time), Multi-metric chart (CLR counters), Table (instances with high GC)."},{"i":"8.2.9","n":"Node.js Event Loop Lag","c":"high","f":"beginner","v":"Event loop lag indicates blocking operations that prevent Node.js from handling requests. Detection enables code-level investigation.","t":"Custom metrics input, OpenTelemetry","d":"Node.js process metrics (event loop lag, heap usage), Prometheus client metrics","q":"index=application sourcetype=\"nodejs:metrics\"\n| timechart span=1m avg(event_loop_lag_ms) as el_lag, avg(heap_used_mb) as heap by host\n| where el_lag > 100","m":"Instrument Node.js apps with `prom-client` or OpenTelemetry SDK. Export event loop lag, heap stats, and active handles/requests. Forward to Splunk via HEC or Prometheus remote write. Alert when lag exceeds 100ms.","z":"Line chart (event loop lag), Dual-axis (lag + heap usage), Single value (current lag ms)."},{"i":"8.2.10","n":"Class Loading Issues","c":"medium","f":"beginner","v":"ClassNotFoundException and NoClassDefFoundError indicate deployment or dependency issues that may cause intermittent failures.","t":"Application log parsing","d":"Application error logs (Java stack traces)","q":"index=application sourcetype=\"log4j\" log_level=ERROR\n| search \"ClassNotFoundException\" OR \"NoClassDefFoundError\" OR \"ClassCastException\"\n| rex \"(?<exception_class>ClassNotFoundException|NoClassDefFoundError|ClassCastException):\\s+(?<missing_class>\\S+)\"\n| stats count by host, exception_class, missing_class","m":"Parse Java stack traces from application logs. Extract exception type and missing class name. Alert on new class loading errors (not seen before). Track frequency to distinguish transient from persistent issues.","z":"Table (class loading errors with details), Bar chart (errors by type), Timeline (error occurrences)."}]},{"i":"8.3","n":"Message Queues & Event Streaming","u":[{"i":"8.3.1","n":"Consumer Lag Monitoring","c":"critical","f":"beginner","v":"Growing consumer lag means messages aren't being processed fast enough, leading to data staleness and eventual message loss if retention is exceeded.","t":"`TA-kafka`, Burrow integration, JMX","d":"Kafka consumer group offsets (JMX, Burrow, `kafka-consumer-groups.sh`)","q":"index=kafka sourcetype=\"kafka:consumer_lag\"\n| timechart span=5m max(lag) as consumer_lag by consumer_group, topic\n| where consumer_lag > 10000","m":"Deploy Kafka consumer lag monitoring via Burrow or JMX. Poll lag per consumer group/topic/partition every minute. Alert when lag exceeds threshold (e.g., >10K messages or >5 minutes equivalent). Track lag trend for capacity planning.","z":"Line chart (lag per consumer group), Heatmap (topic \u00d7 partition lag), Single value (max lag), Table (lagging consumers)."},{"i":"8.3.2","n":"Queue Depth Trending","c":"high","f":"advanced","v":"Growing queue depths indicate consumers can't keep up or are down. Trending prevents message loss and processing delays.","t":"RabbitMQ management API, ActiveMQ JMX","d":"RabbitMQ management API (`/api/queues`), ActiveMQ JMX","q":"index=messaging sourcetype=\"rabbitmq:queue\"\n| timechart span=5m max(messages) as depth by queue_name, vhost\n| where depth > 1000","m":"Poll RabbitMQ management API every minute via scripted input. Track message count, publish/deliver rates per queue. Alert when depth exceeds threshold or grows consistently. Correlate with consumer status.","z":"Line chart (queue depth over time), Bar chart (top queues by depth), Table (queues exceeding threshold)."},{"i":"8.3.3","n":"Broker Health Monitoring","c":"critical","f":"beginner","v":"Broker failures cause message loss and application disruption. Health monitoring ensures cluster stability.","t":"JMX, broker metrics","d":"Kafka JMX (broker metrics), RabbitMQ management API (`/api/nodes`)","q":"index=kafka sourcetype=\"kafka:broker\"\n| stats latest(UnderReplicatedPartitions) as under_replicated, latest(ActiveControllerCount) as controllers by broker_id\n| where under_replicated > 0 OR controllers != 1","m":"Poll broker health metrics via JMX every minute. Track disk usage, CPU, memory, network I/O. Alert on broker offline, under-replicated partitions, or controller election. Monitor ISR (In-Sync Replica) shrink rate.","z":"Status grid (broker \u00d7 health), Single value (under-replicated partitions), Table (broker metrics), Line chart (broker resource usage)."},{"i":"8.3.4","n":"Under-Replicated Partitions","c":"critical","f":"intermediate","v":"Under-replicated partitions mean data is at risk of loss if additional brokers fail. Immediate remediation is required.","t":"`TA-kafka`, JMX","d":"Kafka JMX (`UnderReplicatedPartitions`, `UnderMinIsrPartitionCount`)","q":"index=kafka sourcetype=\"kafka:broker\"\n| where UnderReplicatedPartitions > 0\n| stats sum(UnderReplicatedPartitions) as total_under_replicated by _time\n| timechart span=5m max(total_under_replicated) as under_replicated","m":"Poll Kafka broker JMX metrics. Alert immediately on any under-replicated partitions. Track duration of under-replication. Correlate with broker disk usage and network metrics to identify root cause.","z":"Single value (under-replicated count \u2014 target: 0), Line chart (under-replicated over time), Table (affected topics/partitions)."},{"i":"8.3.5","n":"Dead Letter Queue Monitoring","c":"high","f":"beginner","v":"Messages in DLQ represent processing failures that need investigation. They may indicate bugs, schema changes, or downstream failures.","t":"Queue management API, custom input","d":"RabbitMQ DLQ queues, AWS SQS DLQ, Kafka DLT topics","q":"index=messaging sourcetype=\"rabbitmq:queue\"\n| search queue_name=\"*dead*

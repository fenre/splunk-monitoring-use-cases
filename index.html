<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Splunk Infrastructure Monitoring — Use Case Repository</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

:root {
  --glass-bg: rgba(255,255,255,0.05);
  --glass-border: rgba(255,255,255,0.10);
  --glass-highlight: rgba(255,255,255,0.15);
  --glass-shadow: rgba(0,0,0,0.4);
  --accent: #65A637;
  --accent2: #4EC9B0;
  --accent3: #ED7872;
  --bg-start: #111215;
  --bg-mid: #171D21;
  --bg-end: #0D0F11;
  --text: #DCE1E6;
  --text-dim: #D0D6DC;
  --text-bright: #FAFBFC;
  --crit-critical: #D94F57;
  --crit-high: #EC9960;
  --crit-medium: #F8C869;
  --crit-low: #65A637;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Inter', -apple-system, sans-serif;
  background: var(--bg-start);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* Clean background — matches Getting Started style */
.bg-gradient {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: -1;
  background: #111215;
}

.bg-orbs { display: none; }

/* Glass card base */
.glass {
  background: var(--glass-bg);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--glass-border);
  border-radius: 16px;
  box-shadow: 0 8px 32px var(--glass-shadow), inset 0 1px 0 var(--glass-highlight);
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}
.glass:hover {
  background: rgba(255,255,255,0.12);
  border-color: rgba(255,255,255,0.25);
  box-shadow: 0 12px 48px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.3);
  transform: translateY(-2px);
}

/* Header */
header {
  padding: 14px 32px;
  position: sticky; top: 0; z-index: 100;
  background: rgba(17,18,21,0.92);
  backdrop-filter: blur(30px);
  -webkit-backdrop-filter: blur(30px);
  border-bottom: 1px solid var(--glass-border);
}
.header-inner {
  max-width: 1600px; margin: 0 auto;
  display: flex; align-items: center; gap: 24px; flex-wrap: wrap;
}
.logo {
  display: flex; align-items: center; gap: 12px; flex-shrink: 0;
}
.logo-icon {
  width: 34px; height: 34px; border-radius: 10px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; font-weight: 700; color: #fff;
  box-shadow: 0 2px 10px rgba(101,166,55,0.25);
}
.logo h1 {
  font-size: 15px; font-weight: 600; color: var(--text-bright);
  letter-spacing: -0.3px;
}
.logo .subtitle { font-size: 11px; color: var(--text-dim); font-weight: 400; }

/* Search */
.search-wrap {
  flex: 1; min-width: 280px; max-width: 520px; position: relative;
}
.search-wrap input {
  width: 100%; padding: 10px 16px 10px 42px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 12px; color: var(--text-bright);
  font-size: 14px; font-family: inherit;
  transition: all 0.3s ease;
  outline: none;
}
.search-wrap input:focus {
  background: rgba(255,255,255,0.1);
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(101,166,55,0.20);
}
.search-wrap input::placeholder { color: var(--text-dim); }
.search-icon {
  position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
  color: var(--text-dim); font-size: 16px;
}

/* Header stat */
.header-stat {
  font-size: 13px; color: var(--text-dim); font-weight: 500;
  display: flex; align-items: center; gap: 4px; flex-shrink: 0;
}
.header-stat .num { font-weight: 700; color: var(--accent); font-size: 15px; }

/* Layout */
.app-layout {
  max-width: 1600px; margin: 0 auto; padding: 24px;
  display: flex; gap: 24px; min-height: calc(100vh - 100px);
}

/* Sidebar */
.sidebar {
  width: 300px; flex-shrink: 0; position: sticky; top: 100px;
  max-height: calc(100vh - 124px); overflow-y: auto;
  padding: 16px; scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.1) transparent;
}
.sidebar::-webkit-scrollbar { width: 4px; }
.sidebar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 4px; }

.cat-item {
  padding: 10px 14px; border-radius: 10px; cursor: pointer;
  margin-bottom: 2px; transition: all 0.2s ease;
  display: flex; align-items: center; gap: 10px;
  font-size: 13px; font-weight: 400; color: var(--text-dim);
}
.cat-item:hover { background: rgba(255,255,255,0.06); color: var(--text); }
.cat-item.active {
  background: linear-gradient(135deg, rgba(101,166,55,0.15), rgba(78,201,176,0.08));
  color: var(--text-bright); font-weight: 500;
  border: 1px solid rgba(101,166,55,0.25);
}
.cat-num {
  width: 28px; height: 28px; border-radius: 8px;
  background: rgba(255,255,255,0.06);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 600; flex-shrink: 0;
  color: var(--accent);
}
.cat-item.active .cat-num {
  background: rgba(101,166,55,0.25);
}
.cat-count {
  margin-left: auto; font-size: 11px; opacity: 0.5;
  background: rgba(255,255,255,0.06); padding: 2px 7px;
  border-radius: 8px;
}
.cat-chevron {
  margin-left: 4px; font-size: 10px; opacity: 0.4; transition: transform 0.2s ease;
  flex-shrink: 0;
}
.cat-item.active .cat-chevron { transform: rotate(90deg); opacity: 0.7; }
.subcat-list {
  max-height: 0; overflow: hidden; transition: max-height 0.3s ease;
  margin-left: 24px; border-left: 1px solid rgba(255,255,255,0.06);
}
.subcat-list.open { max-height: 2000px; }
.subcat-item {
  padding: 6px 12px; border-radius: 8px; cursor: pointer;
  margin: 1px 0; font-size: 12px; color: var(--text-dim);
  transition: all 0.15s ease; display: flex; align-items: center; gap: 6px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.subcat-item:hover { background: rgba(255,255,255,0.06); color: var(--text); }
.subcat-item.active {
  background: rgba(101,166,55,0.12); color: var(--accent);
}
.subcat-item .sc-count {
  margin-left: auto; font-size: 10px; opacity: 0.4;
  flex-shrink: 0;
}

/* Main content */
.main-content { flex: 1; min-width: 0; }

/* Category header */
.cat-header {
  padding: 24px 28px; margin-bottom: 20px;
  background: linear-gradient(135deg, rgba(101,166,55,0.08), rgba(78,201,176,0.05));
  position: relative; overflow: hidden;
}
.cat-header::before {
  content: ''; position: absolute; top: -50%; right: -10%; width: 300px; height: 300px;
  background: radial-gradient(circle, rgba(101,166,55,0.08) 0%, transparent 70%);
  border-radius: 50%;
}
.cat-header h2 {
  font-size: 24px; font-weight: 700; color: var(--text-bright);
  margin-bottom: 8px; position: relative;
}
.cat-header .cat-meta {
  font-size: 13px; color: var(--text-dim); position: relative;
  display: flex; gap: 16px;
}

/* Filter bar */
.filter-bar {
  display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; padding: 0 4px;
}
.filter-btn {
  padding: 7px 14px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1);
  background: rgba(255,255,255,0.04); color: var(--text-dim);
  font-size: 12px; font-weight: 500; cursor: pointer;
  transition: all 0.2s ease; font-family: inherit;
}
.filter-btn:hover { background: rgba(255,255,255,0.08); color: var(--text); }
.filter-btn.active {
  background: rgba(101,166,55,0.15); border-color: rgba(101,166,55,0.3);
  color: var(--accent);
}
.filter-btn.crit { border-color: rgba(255,71,87,0.3); }
.filter-btn.crit.active { background: rgba(255,71,87,0.15); color: var(--crit-critical); }
.filter-btn.high { border-color: rgba(255,140,66,0.3); }
.filter-btn.high.active { background: rgba(255,140,66,0.15); color: var(--crit-high); }
.filter-btn.med { border-color: rgba(255,217,61,0.3); }
.filter-btn.med.active { background: rgba(255,217,61,0.15); color: var(--crit-medium); }
.filter-btn.low2 { border-color: rgba(107,203,119,0.3); }
.filter-btn.low2.active { background: rgba(107,203,119,0.15); color: var(--crit-low); }

/* Difficulty filter buttons */
.filter-sep { width: 1px; height: 24px; background: rgba(255,255,255,0.12); margin: 0 4px; align-self: center; }
.filter-btn.beg { border-color: rgba(101,166,55,0.3); }
.filter-btn.beg.active { background: rgba(101,166,55,0.15); color: #65A637; }
.filter-btn.inter { border-color: rgba(91,155,213,0.3); }
.filter-btn.inter.active { background: rgba(91,155,213,0.15); color: #5B9BD5; }
.filter-btn.advf { border-color: rgba(236,153,96,0.3); }
.filter-btn.advf.active { background: rgba(236,153,96,0.15); color: #EC9960; }
.filter-btn.expf { border-color: rgba(217,79,87,0.3); }
.filter-btn.expf.active { background: rgba(217,79,87,0.15); color: #D94F57; }

/* Difficulty badge on card */
.uc-diff-badge {
  font-size: 10px; padding: 2px 7px; border-radius: 5px;
  font-weight: 600; flex-shrink: 0; margin-left: auto;
}
.uc-diff-badge.beginner { background: rgba(101,166,55,0.12); color: #65A637; }
.uc-diff-badge.intermediate { background: rgba(91,155,213,0.12); color: #5B9BD5; }
.uc-diff-badge.advanced { background: rgba(236,153,96,0.12); color: #EC9960; }
.uc-diff-badge.expert { background: rgba(217,79,87,0.12); color: #D94F57; }

/* Subcategory section */
.subcat-section { margin-bottom: 24px; }
.subcat-header {
  font-size: 15px; font-weight: 600; color: var(--accent);
  padding: 8px 4px; margin-bottom: 12px;
  border-bottom: 1px solid rgba(101,166,55,0.20);
  display: flex; align-items: center; gap: 8px;
}
.subcat-count { font-size: 11px; color: var(--text-dim); font-weight: 400; }

/* Use case cards */
.uc-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 14px;
}
.uc-card {
  padding: 18px 20px; cursor: pointer;
  position: relative; overflow: hidden;
}
.uc-card::before {
  content: ''; position: absolute; top: 0; left: 0; width: 3px; height: 100%;
  border-radius: 3px 0 0 3px;
}
.uc-card.critical::before { background: var(--crit-critical); }
.uc-card.high::before { background: var(--crit-high); }
.uc-card.medium::before { background: var(--crit-medium); }
.uc-card.low::before { background: var(--crit-low); }

.uc-card-head {
  display: flex; align-items: flex-start; gap: 10px; margin-bottom: 8px;
}
.uc-id {
  font-size: 11px; font-weight: 600; font-family: 'JetBrains Mono', monospace;
  color: var(--text-dim); padding: 2px 8px; border-radius: 6px;
  background: rgba(255,255,255,0.06); flex-shrink: 0;
}
.uc-name {
  font-size: 14px; font-weight: 600; color: var(--text-bright);
  line-height: 1.3;
}
.uc-crit-dot {
  width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 5px;
}
.uc-crit-dot.critical { background: var(--crit-critical); box-shadow: 0 0 8px var(--crit-critical); }
.uc-crit-dot.high { background: var(--crit-high); box-shadow: 0 0 8px var(--crit-high); }
.uc-crit-dot.medium { background: var(--crit-medium); box-shadow: 0 0 8px var(--crit-medium); }
.uc-crit-dot.low { background: var(--crit-low); box-shadow: 0 0 8px var(--crit-low); }

.uc-value {
  font-size: 12px; color: var(--text-dim); line-height: 1.5;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  overflow: hidden;
}
.uc-tags {
  display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px;
}
.uc-tag {
  font-size: 10px; padding: 3px 8px; border-radius: 6px;
  background: rgba(78,201,176,0.10); color: #4EC9B0;
  border: 1px solid rgba(78,201,176,0.15);
  font-family: 'JetBrains Mono', monospace;
  max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}

/* Detail modal */
.modal-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.7); backdrop-filter: blur(8px);
  z-index: 1000; display: none; justify-content: center; align-items: flex-start;
  padding: 60px 24px; overflow-y: auto;
}
.modal-overlay.show { display: flex; }
.modal {
  width: 100%; max-width: 800px;
  background: rgba(20,23,27,0.96);
  backdrop-filter: blur(40px);
  border: 1px solid var(--glass-border);
  border-radius: 20px;
  box-shadow: 0 24px 80px rgba(0,0,0,0.6), inset 0 1px 0 var(--glass-highlight);
  padding: 32px;
  animation: modalIn 0.3s cubic-bezier(0.16, 1, 0.3, 1);
}
@keyframes modalIn {
  from { opacity: 0; transform: translateY(20px) scale(0.97); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}
.modal-close {
  position: absolute; top: 16px; right: 20px; width: 36px; height: 36px;
  border-radius: 8px; border: 1px solid rgba(255,255,255,0.1);
  background: rgba(255,255,255,0.06); color: var(--text-dim);
  font-size: 18px; cursor: pointer; display: flex; align-items: center;
  justify-content: center; transition: all 0.2s; z-index: 10;
}
.modal-close:hover { background: rgba(255,71,87,0.2); color: var(--crit-critical); border-color: rgba(255,71,87,0.3); }

.modal-head {
  display: flex; align-items: flex-start; gap: 16px; margin-bottom: 24px;
  padding-right: 44px;
}
.modal-crit-badge {
  padding: 4px 12px; border-radius: 8px; font-size: 12px; font-weight: 600;
  flex-shrink: 0;
}
.modal-crit-badge.critical { background: rgba(255,71,87,0.15); color: var(--crit-critical); border: 1px solid rgba(255,71,87,0.3); }
.modal-crit-badge.high { background: rgba(255,140,66,0.15); color: var(--crit-high); border: 1px solid rgba(255,140,66,0.3); }
.modal-crit-badge.medium { background: rgba(255,217,61,0.15); color: var(--crit-medium); border: 1px solid rgba(255,217,61,0.3); }
.modal-crit-badge.low { background: rgba(107,203,119,0.15); color: var(--crit-low); border: 1px solid rgba(107,203,119,0.3); }
.modal-crit-badge.beginner { background: rgba(101,166,55,0.15); color: #65A637; border: 1px solid rgba(101,166,55,0.3); }
.modal-crit-badge.intermediate { background: rgba(91,155,213,0.15); color: #5B9BD5; border: 1px solid rgba(91,155,213,0.3); }
.modal-crit-badge.advanced { background: rgba(236,153,96,0.15); color: #EC9960; border: 1px solid rgba(236,153,96,0.3); }
.modal-crit-badge.expert { background: rgba(217,79,87,0.15); color: #D94F57; border: 1px solid rgba(217,79,87,0.3); }

.modal h2 {
  font-size: 22px; font-weight: 700; color: var(--text-bright);
  line-height: 1.3;
}
.modal-id {
  font-size: 13px; font-family: 'JetBrains Mono', monospace;
  color: var(--text-dim); margin-top: 4px;
}
.modal-section {
  margin-bottom: 20px;
}
.modal-section h3 {
  font-size: 11px; text-transform: uppercase; letter-spacing: 1px;
  color: var(--accent); margin-bottom: 8px; font-weight: 600;
}
.modal-section p, .modal-section div {
  font-size: 14px; line-height: 1.6; color: var(--text);
}
.spl-block {
  background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.08);
  border-radius: 12px; padding: 16px; overflow-x: auto;
  font-family: 'JetBrains Mono', monospace; font-size: 13px;
  line-height: 1.6; color: #c8d0e0; white-space: pre-wrap; word-break: break-all;
  position: relative;
}
.spl-block .copy-btn {
  position: absolute; top: 8px; right: 8px;
  padding: 4px 10px; border-radius: 6px;
  background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1);
  color: var(--text-dim); font-size: 11px; cursor: pointer;
  font-family: inherit; transition: all 0.2s;
}
.spl-block .copy-btn:hover { background: rgba(101,166,55,0.2); color: var(--accent); }
.modal-meta-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
}
.meta-item {
  padding: 12px 16px; border-radius: 10px;
  background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.06);
}
.meta-item h4 {
  font-size: 10px; text-transform: uppercase; letter-spacing: 0.8px;
  color: var(--text-dim); margin-bottom: 4px;
}
.meta-item p { font-size: 13px; color: var(--text); margin: 0; }

/* Nav arrows */
.modal-nav {
  display: flex; justify-content: space-between; margin-top: 24px;
  padding-top: 16px; border-top: 1px solid rgba(255,255,255,0.06);
}
.nav-btn {
  padding: 8px 16px; border-radius: 10px;
  background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
  color: var(--text-dim); font-size: 13px; cursor: pointer;
  font-family: inherit; transition: all 0.2s;
}
.nav-btn:hover { background: rgba(0,212,170,0.15); color: var(--accent); border-color: rgba(0,212,170,0.3); }
.nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }

/* No results */
.no-results {
  text-align: center; padding: 60px 20px; color: var(--text-dim);
}
.no-results .big { font-size: 48px; margin-bottom: 12px; }
.no-results p { font-size: 15px; }

/* Overview hero */
.ov-hero {
  padding: 40px 28px 36px;
  background: linear-gradient(135deg, rgba(101,166,55,0.08) 0%, rgba(78,201,176,0.04) 100%);
  position: relative; overflow: hidden; margin-bottom: 24px;
}
.ov-hero::before {
  content: ''; position: absolute; top: -40%; right: -10%; width: 500px; height: 500px;
  background: radial-gradient(circle, rgba(101,166,55,0.08) 0%, transparent 60%); border-radius: 50%;
}
.ov-hero-badge {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 5px 12px; border-radius: 16px;
  background: rgba(101,166,55,0.15); border: 1px solid rgba(101,166,55,0.25);
  font-size: 11px; font-weight: 600; color: var(--accent); margin-bottom: 16px;
}
.ov-hero h2 {
  font-size: 32px; font-weight: 800; color: var(--text-bright);
  letter-spacing: -0.5px; margin-bottom: 12px; line-height: 1.2; position: relative;
}
.ov-hero h2 span { color: var(--accent); }
.ov-hero p {
  font-size: 15px; color: var(--text-dim); max-width: 660px; line-height: 1.7; position: relative;
}
.ov-stats {
  display: flex; gap: 28px; margin-top: 24px; flex-wrap: wrap; position: relative;
}
.ov-stat-num { font-size: 30px; font-weight: 800; color: var(--accent); line-height: 1; }
.ov-stat-label { font-size: 11px; color: var(--text-dim); margin-top: 3px; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 500; }

/* Roadmap */
.ov-roadmap { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 14px; margin-bottom: 28px; }
.ov-phase {
  background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
  border-radius: 14px; padding: 22px 18px;
}
.ov-phase-num {
  font-size: 10px; font-weight: 700; color: var(--accent); text-transform: uppercase;
  letter-spacing: 1px; margin-bottom: 6px;
}
.ov-phase h3 { font-size: 15px; font-weight: 600; color: var(--text-bright); margin-bottom: 6px; }
.ov-phase p { font-size: 12px; color: var(--text-dim); line-height: 1.5; margin-bottom: 10px; }
.ov-phase-items { list-style: none; }
.ov-phase-items li {
  font-size: 11px; color: var(--text); padding: 3px 0 3px 14px; position: relative;
}
.ov-phase-items li::before { content: '▸'; position: absolute; left: 0; color: var(--accent); }

/* Difficulty legend */
.ov-diff-legend {
  display: flex; gap: 14px; flex-wrap: wrap; margin: 16px 0 20px; padding: 14px 18px;
  background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 10px;
}
.ov-diff-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text-dim); }
.ov-diff-dot { width: 9px; height: 9px; border-radius: 3px; }
.ov-diff-dot.beginner { background: #65A637; }
.ov-diff-dot.intermediate { background: #5B9BD5; }
.ov-diff-dot.advanced { background: #EC9960; }
.ov-diff-dot.expert { background: #D94F57; }

/* Category group filter chips */
.ov-filter-wrap { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
.ov-filter-chip {
  padding: 6px 13px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.08);
  background: rgba(255,255,255,0.04); color: var(--text-dim);
  font-size: 12px; font-weight: 500; cursor: pointer; transition: all 0.2s; font-family: inherit;
}
.ov-filter-chip:hover { background: rgba(255,255,255,0.07); color: var(--text); }
.ov-filter-chip.active {
  background: rgba(101,166,55,0.15); border-color: rgba(101,166,55,0.3); color: var(--accent);
}

/* Overview category cards */
.ov-cat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 14px; }
.ov-cat-card {
  background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
  border-radius: 14px; padding: 18px; cursor: pointer; transition: all 0.25s; overflow: hidden;
}
.ov-cat-card:hover {
  background: rgba(255,255,255,0.07); border-color: rgba(255,255,255,0.14);
  transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.3);
}
.ov-cat-card.expanded {
  grid-column: 1 / -1;
  background: rgba(255,255,255,0.07); border-color: rgba(101,166,55,0.25);
}
.ov-cat-head { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 8px; }
.ov-cat-icon {
  font-size: 26px; flex-shrink: 0; width: 42px; height: 42px;
  display: flex; align-items: center; justify-content: center;
  background: rgba(255,255,255,0.07); border-radius: 10px;
}
.ov-cat-head h3 { font-size: 14px; font-weight: 600; color: var(--text-bright); line-height: 1.3; }
.ov-cat-head .ov-cat-num {
  font-size: 10px; color: var(--accent); font-weight: 600; font-family: 'JetBrains Mono', monospace;
}
.ov-cat-head .ov-cat-count {
  margin-left: auto; font-size: 11px; color: var(--text-dim);
  background: rgba(255,255,255,0.06); padding: 3px 8px; border-radius: 6px; flex-shrink: 0;
}
.ov-expand-arrow {
  display: inline-block; font-size: 10px; transition: transform 0.2s;
  color: var(--text-dim); margin-left: 4px;
}
.ov-cat-card.expanded .ov-expand-arrow { transform: rotate(90deg); }
.ov-cat-desc { font-size: 12px; color: var(--text-dim); line-height: 1.5; margin-bottom: 10px; }
.ov-cat-quick {
  font-size: 11px; color: #4EC9B0; padding: 7px 11px;
  background: rgba(78,201,176,0.12); border-radius: 8px;
  border: 1px solid rgba(78,201,176,0.15); line-height: 1.4;
}
.ov-cat-quick strong { color: #4EC9B0; font-weight: 600; }

/* Starter UCs in overview cards */
.ov-starter-list { margin-top: 14px; display: none; }
.ov-cat-card.expanded .ov-starter-list { display: block; }
.ov-starter-uc {
  padding: 12px 14px; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.08);
  border-radius: 10px; margin-bottom: 7px; transition: all 0.2s;
}
.ov-starter-uc:hover { background: rgba(0,0,0,0.3); border-color: rgba(255,255,255,0.14); }
.ov-starter-head { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; flex-wrap: wrap; }
.ov-starter-name { font-size: 13px; font-weight: 600; color: var(--text-bright); }
.ov-starter-id {
  font-size: 10px; color: var(--text-dim); font-family: 'JetBrains Mono', monospace;
  background: rgba(255,255,255,0.06); padding: 2px 6px; border-radius: 4px;
}
.ov-badge {
  font-size: 9px; padding: 2px 6px; border-radius: 4px; font-weight: 600;
}
.ov-badge.critical { background: rgba(217,79,87,0.15); color: #D94F57; }
.ov-badge.high { background: rgba(236,153,96,0.15); color: #EC9960; }
.ov-badge.beginner { background: rgba(101,166,55,0.12); color: #65A637; }
.ov-badge.intermediate { background: rgba(91,155,213,0.12); color: #5B9BD5; }
.ov-starter-value { font-size: 11px; color: var(--text-dim); line-height: 1.4; margin-bottom: 6px; }
.ov-starter-ta { font-size: 10px; color: #4EC9B0; font-family: 'JetBrains Mono', monospace; }
.ov-spl-toggle {
  font-size: 11px; color: var(--accent); cursor: pointer; font-weight: 500;
  margin-top: 5px; user-select: none;
}
.ov-spl-toggle:hover { color: var(--text-bright); }
.ov-spl-block {
  display: none; margin-top: 7px; padding: 10px; background: rgba(0,0,0,0.4);
  border: 1px solid rgba(255,255,255,0.06); border-radius: 8px;
  font-family: 'JetBrains Mono', monospace; font-size: 11px;
  line-height: 1.5; color: #dde2e8; white-space: pre-wrap; word-break: break-all;
}
.ov-spl-block.show { display: block; }
.ov-spl-block .copy-btn {
  display: block; margin-left: auto; margin-top: 8px; padding: 4px 12px;
  border-radius: 6px; background: rgba(101,166,55,0.15); border: 1px solid rgba(101,166,55,0.3);
  color: var(--accent); font-size: 11px; cursor: pointer; font-family: inherit; font-weight: 500;
  transition: all 0.2s;
}
.ov-spl-block .copy-btn:hover { background: rgba(101,166,55,0.3); color: #fff; }

/* Section titles in overview */
.ov-section-title { font-size: 20px; font-weight: 700; color: var(--text-bright); margin-bottom: 6px; }
.ov-section-title.ov-collapsible {
  cursor: pointer; user-select: none; display: inline-flex; align-items: center; gap: 4px;
  padding: 6px 10px; border-radius: 8px; transition: background 0.2s;
}
.ov-section-title.ov-collapsible:hover { background: rgba(255,255,255,0.06); }
.ov-collapse-arrow {
  display: inline-block; font-size: 12px; transition: transform 0.25s ease; color: var(--accent);
}
.ov-collapse-arrow.open { transform: rotate(90deg); }
.ov-collapsible-body { overflow: hidden; }
.ov-section-sub { font-size: 13px; color: var(--text-dim); margin-bottom: 24px; }

/* Responsive */
@media (max-width: 900px) {
  .app-layout { flex-direction: column; }
  .sidebar { width: 100%; position: relative; top: 0; max-height: none; display: flex; flex-wrap: wrap; gap: 4px; padding: 12px; }
  .cat-item { padding: 8px 10px; font-size: 12px; }
  .uc-grid { grid-template-columns: 1fr; }
  .modal-meta-grid { grid-template-columns: 1fr; }
  .header-inner { gap: 12px; }
}

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }
</style>
</head>

<script>
const DATA = [{"i":1,"n":"Server & Compute","s":[{"i":"1.1","n":"Linux Servers","u":[{"i":"1.1.1","n":"CPU Utilization Trending","c":"high","f":"intermediate","v":"Detects overloaded hosts before they cause application degradation. Enables capacity planning and right-sizing.","t":"`Splunk_TA_nix`","d":"`sourcetype=cpu` (from `cpu.sh` scripted input)","q":"index=os sourcetype=cpu host=*\n| eval cpu_used = 100 - pctIdle\n| timechart span=1h avg(cpu_used) as avg_cpu by host\n| where avg_cpu > 90","m":"Install Splunk_TA_nix on Universal Forwarders. Enable the `cpu` scripted input in `inputs.conf` (`[script://./bin/cpu.sh]`, interval=60). The cpu sourcetype provides fields: `pctUser`, `pctSystem`, `pctIowait`, `pctIdle`, etc. Create an alert for sustained >90% over 15 minutes using a rolling window.","z":"Line chart (timechart by host), Single value panels for current/peak CPU, Table of hosts exceeding threshold."},{"i":"1.1.2","n":"Memory Pressure Detection","c":"high","f":"intermediate","v":"Prevents OOM kills, application crashes, and unresponsive systems by detecting memory exhaustion early.","t":"`Splunk_TA_nix`","d":"`sourcetype=vmstat`","q":"index=os sourcetype=vmstat host=*\n| timechart span=5m avg(memUsedPct) as memory_pct, avg(swapUsedPct) as swap_pct by host","m":"Enable `vmstat` scripted input in Splunk_TA_nix (interval=60). Key fields: `memTotalMB`, `memFreeMB`, `memUsedMB`, `memUsedPct` (memory), `swapUsedPct` (swap percentage), `loadAvg1mi` (1-min load avg). Set alert when swapUsedPct exceeds 20% or memUsedPct exceeds 95% sustained for 10 minutes.","z":"Area chart (memory + swap stacked), Single value panels showing current utilization, Gauge widget for threshold display."},{"i":"1.1.3","n":"Disk Capacity Forecasting","c":"critical","f":"advanced","v":"Prevents outages caused by full filesystems. A full /var or / can bring down services, databases, and logging. Enables proactive storage procurement.","t":"`Splunk_TA_nix`","d":"`sourcetype=df`","q":"index=os sourcetype=df host=*\n| stats latest(UsePct) as current_pct by host, Filesystem, MountedOn\n| where current_pct > 85\n| sort -current_pct\n\n| `` Forecasting version: ``\nindex=os sourcetype=df host=myserver Filesystem=\"/dev/sda1\"\n| timechart span=1d avg(UsePct) as disk_pct\n| predict disk_pct as predicted future_timespan=30","m":"Enable `df` scripted input (interval=300). Create a saved search that runs daily, identifying filesystems above 85%. Use `predict` command for 30-day forecasting. Set tiered alerts at 85% (warning), 90% (high), 95% (critical).","z":"Line chart with predict trendline, Table sorted by usage descending, Gauge per critical mount point."},{"i":"1.1.4","n":"Disk I/O Saturation","c":"high","f":"intermediate","v":"High I/O wait degrades application performance even when CPU and memory look healthy. Catches storage bottlenecks before users complain.","t":"`Splunk_TA_nix`","d":"`sourcetype=iostat`","q":"index=os sourcetype=iostat host=*\n| timechart span=5m avg(avgWaitMillis) as avg_wait, avg(avgSvcMillis) as avg_svc by host\n| where avg_wait > 20","m":"Enable `iostat` scripted input (interval=60). Key fields: `avgWaitMillis` (await \u2014 avg wait in ms), `avgSvcMillis` (svctm \u2014 avg service time in ms), `bandwUtilPct` (disk utilization %), `rReq_PS`/`wReq_PS` (read/write IOPS). Alert when avgWaitMillis >20ms sustained over 10 minutes. Correlate with application latency metrics for root cause.","z":"Line chart (latency over time by host), Heatmap of I/O wait across hosts."},{"i":"1.1.5","n":"System Load Anomalies","c":"medium","f":"advanced","v":"Load average exceeding CPU core count indicates process queuing. Useful as an early warning for runaway processes or unexpected workloads.","t":"`Splunk_TA_nix`","d":"`sourcetype=vmstat` (includes `loadAvg1mi`) or custom `uptime` scripted input","q":"index=os sourcetype=vmstat host=*\n| stats latest(loadAvg1mi) as load1 by host\n| lookup server_inventory host OUTPUT cpu_count\n| eval load_ratio = round(load1 / cpu_count, 2)\n| where load_ratio > 1.5\n| sort -load_ratio\n| table host load1 cpu_count load_ratio","m":"The `vmstat` sourcetype provides `loadAvg1mi` (1-minute load average). For CPU core count, use either the `hardware` sourcetype (`CPU_COUNT` field) or a server inventory lookup. Alternatively, create a custom `uptime` scripted input parsing all three load averages. Alert when load ratio exceeds 1.5 for 15+ minutes.","z":"Line chart (load1/5/15 over time), Table of high-load hosts with core count context."},{"i":"1.1.6","n":"Process Crash Detection","c":"high","f":"intermediate","v":"Immediate awareness of unexpected process terminations. Critical for services that don't auto-restart or have no watchdog.","t":"`Splunk_TA_nix`, Splunk Add-on for Syslog","d":"`sourcetype=syslog`, `/var/log/messages`, `/var/log/syslog`","q":"index=os sourcetype=syslog (\"segfault\" OR \"killed process\" OR \"core dumped\" OR \"terminated\" OR \"SIGABRT\" OR \"SIGSEGV\")\n| rex \"(?<process_name>\\w+)\\[\\d+\\]\"\n| stats count by host, process_name, _time\n| sort -count","m":"Forward `/var/log/messages` and `/var/log/syslog` via UF inputs.conf. Create an alert on keywords: `segfault`, `killed process`, `core dumped`. Enrich with service/owner lookup.","z":"Events list (timeline view), Stats table grouped by host and process, Bar chart of crash counts by process."},{"i":"1.1.7","n":"OOM Killer Events","c":"critical","f":"intermediate","v":"OOM killer invocations mean the system ran out of memory and Linux chose to kill a process to survive. This often takes out critical services silently.","t":"`Splunk_TA_nix`, Syslog","d":"`sourcetype=syslog`, `dmesg`","q":"index=os sourcetype=syslog \"Out of memory\" OR \"oom-killer\" OR \"Killed process\"\n| rex \"Killed process (?<killed_pid>\\d+) \\((?<killed_process>[^)]+)\\)\"\n| rex \"total-vm:(?<total_vm>\\d+)kB\"\n| table _time host killed_process killed_pid total_vm\n| sort -_time","m":"Forward syslog and dmesg output. Create a real-time alert on `oom-killer` or `Out of memory` keywords. Consider setting up a triggered action to also capture current process list via scripted input when OOM occurs.","z":"Events timeline, Single value panel (count of OOM events last 24h), Table with affected hosts and processes."},{"i":"1.1.8","n":"SSH Brute-Force Detection","c":"high","f":"intermediate","v":"Detects active password-guessing attacks against SSH services. Can be early indicator of compromised credentials or targeted intrusion attempts.","t":"`Splunk_TA_nix`, Syslog","d":"`sourcetype=linux_secure` (`/var/log/auth.log` or `/var/log/secure`)","q":"index=os sourcetype=linux_secure \"Failed password\"\n| rex \"from (?<src_ip>\\d+\\.\\d+\\.\\d+\\.\\d+)\"\n| stats count as attempts, dc(user) as users_targeted, values(user) as usernames by src_ip, host\n| where attempts > 10\n| sort -attempts\n| iplocation src_ip","m":"Forward `/var/log/auth.log` (Debian/Ubuntu) or `/var/log/secure` (RHEL/CentOS). Create alert for >10 failed attempts from a single IP in 5 minutes. Consider integrating with a GeoIP lookup for geographic context.","z":"Table of source IPs with attempt counts, Choropleth map (GeoIP), Timechart of brute-force events."},{"i":"1.1.9","n":"Unauthorized Sudo Usage","c":"high","f":"beginner","v":"Monitors privilege escalation attempts. Failed sudo attempts may indicate an attacker exploring what a compromised account can do.","t":"`Splunk_TA_nix`, Syslog","d":"`sourcetype=linux_secure`","q":"index=os sourcetype=linux_secure \"sudo:\" (\"NOT in sudoers\" OR \"authentication failure\" OR \"incorrect password\")\n| rex \"user (?<sudo_user>\\w+)\"\n| rex \"COMMAND=(?<command>.+)\"\n| stats count by host, sudo_user, command\n| sort -count","m":"Forward auth logs. Alert immediately on `NOT in sudoers` events. For successful sudo, create audit dashboard showing who ran what with root privileges.","z":"Table (user, host, command, count), Bar chart of sudo failures by user, Events list for investigation."},{"i":"1.1.10","n":"Cron Job Failure Monitoring","c":"medium","f":"intermediate","v":"Failed cron jobs can silently break batch processing, backups, log rotation, and maintenance tasks. Catching failures early prevents cascading issues.","t":"`Splunk_TA_nix`, Syslog","d":"`sourcetype=cron` or `sourcetype=syslog` source=\"/var/log/cron\"","q":"index=os (sourcetype=cron OR source=\"/var/log/cron\") (\"error\" OR \"failed\" OR \"EXIT STATUS\" OR \"ORPHAN\")\n| rex \"CMD \\((?<cron_cmd>[^)]+)\\)\"\n| rex \"CROND\\[(?<pid>\\d+)\\]\"\n| stats count by host, cron_cmd, _time\n| sort -_time","m":"Forward `/var/log/cron`. For critical cron jobs, create a \"heartbeat\" approach: expect a success message within a window, alert on absence. Use `| inputlookup expected_crons | join` pattern for missing run detection.","z":"Table of failed cron jobs, Single value panel (failures last 24h), Missing job detection table."},{"i":"1.1.11","n":"Kernel Panic Detection","c":"critical","f":"advanced","v":"Kernel panics cause immediate system crashes and potential data corruption. Often indicates hardware failure, driver issues, or memory corruption.","t":"`Splunk_TA_nix`, Syslog","d":"`sourcetype=syslog`, `dmesg`","q":"index=os sourcetype=syslog (\"kernel panic\" OR \"Kernel panic\" OR \"BUG:\" OR \"Oops:\" OR \"Call Trace:\")\n| table _time host _raw\n| sort -_time","m":"Forward syslog and enable dmesg scripted input. Create critical alert on `kernel panic` or `Oops:` keywords. Correlate with hardware health data (IPMI) for root cause.","z":"Events timeline, Count by host, Alert panel (critical)."},{"i":"1.1.12","n":"NTP Time Sync Drift","c":"medium","f":"intermediate","v":"Clock drift causes authentication failures (Kerberos), log correlation issues, transaction ordering problems, and certificate validation failures.","t":"`Splunk_TA_nix`","d":"`sourcetype=ntp` (scripted input via `ntpq -p` or `chronyc tracking`)","q":"index=os sourcetype=ntp host=*\n| eval offset_ms = abs(offset)\n| stats latest(offset_ms) as drift_ms, latest(stratum) as stratum by host\n| where drift_ms > 100 OR stratum > 5\n| sort -drift_ms","m":"Enable the `ntp` scripted input in Splunk_TA_nix (interval=300). It runs `ntpq -pn` and outputs peer data. The `offset` field is in milliseconds. Alert when offset exceeds 100ms or stratum exceeds 5.","z":"Line chart (drift over time by host), Table of hosts with excessive drift."},{"i":"1.1.13","n":"Zombie Process Accumulation","c":"medium","f":"intermediate","v":"Zombie processes indicate parent processes not properly reaping children. Accumulation can exhaust PID space and indicates application bugs.","t":"`Splunk_TA_nix`","d":"`sourcetype=ps` (process listing from Splunk_TA_nix)","q":"index=os sourcetype=ps host=*\n| search S=\"Z\"\n| stats count as zombie_count, values(COMMAND) as zombie_processes by host\n| where zombie_count > 5\n| sort -zombie_count\n| table host zombie_count zombie_processes","m":"Enable `ps` scripted input (interval=300). The `ps` sourcetype includes a `S` (state) field where `Z` = zombie. This is more reliable than parsing the `top` header. Alert when zombie count exceeds 5. Investigate parent PIDs with `PPID` field to identify the root cause process.","z":"Single value panel, Table of hosts with zombie counts."},{"i":"1.1.14","n":"File Descriptor Exhaustion","c":"high","f":"intermediate","v":"File descriptor exhaustion causes \"too many open files\" errors, breaking network connections, log writing, and inter-process communication. Common in Java apps and databases.","t":"`Splunk_TA_nix`, custom scripted input","d":"`sourcetype=openfiles` (custom) or `/proc/sys/fs/file-nr`","q":"index=os sourcetype=openfiles host=*\n| eval usage_pct = round(open_fds / max_fds * 100, 1)\n| where usage_pct > 80\n| sort -usage_pct\n| table host process open_fds max_fds usage_pct","m":"Create scripted input: `cat /proc/sys/fs/file-nr` (system-wide) or `ls /proc/<pid>/fd | wc -l` for per-process tracking. Alert at 80% of system or per-process limit.","z":"Gauge (system-wide), Table per process, Line chart trend."},{"i":"1.1.15","n":"Network Interface Errors","c":"medium","f":"intermediate","v":"Interface errors (CRC, drops, overruns) indicate bad cables, failing NICs, or duplex mismatches. Catching early prevents intermittent application failures.","t":"`Splunk_TA_nix`","d":"`sourcetype=interfaces`","q":"index=os sourcetype=interfaces host=*\n| stats latest(RXerrors) as rx_errors, latest(TXerrors) as tx_errors, latest(Collisions) as collisions by host, Name\n| where rx_errors > 0 OR tx_errors > 0\n| sort -rx_errors","m":"Enable `interfaces` scripted input (interval=300). Use `| delta` or `| streamstats` to track error rate deltas. Alert on increasing error counts.","z":"Table (interface, error type, count), Line chart of error rate over time."},{"i":"1.1.16","n":"Package Vulnerability Tracking","c":"medium","f":"expert","v":"Maintains visibility into known vulnerable packages across the fleet, supporting vulnerability management and compliance programs.","t":"`Splunk_TA_nix`, custom scripted input","d":"`sourcetype=package` (Splunk_TA_nix), vulnerability scanner output","q":"index=os sourcetype=package host=*\n| stats values(VERSION) as version by host, NAME\n| join NAME [| inputlookup known_cves.csv]\n| table host NAME version cve_id severity\n| sort -severity","m":"Enable `package` scripted input in Splunk_TA_nix (daily interval). Cross-reference with a CVE lookup table updated from vulnerability scan exports. Alternatively, ingest Qualys/Tenable scan results directly.","z":"Table (host, package, CVE, severity), Stats panel of critical/high vuln counts, Bar chart by severity."},{"i":"1.1.17","n":"Service Availability Monitoring","c":"critical","f":"intermediate","v":"Detects stopped services before users notice. Essential for any SLA-bound service where uptime matters.","t":"`Splunk_TA_nix`, custom scripted input","d":"Custom scripted input (`systemctl is-active <service>`)","q":"index=os sourcetype=service_status host=*\n| stats latest(status) as status by host, service_name\n| where status != \"active\"\n| table host service_name status","m":"Create a scripted input that checks key service statuses: `systemctl is-active httpd sshd mysqld | paste - - -`. Run every 60 seconds. Alert immediately when critical services stop. Maintain a lookup of expected services per host role.","z":"Status indicator panels (green/red per service), Table of down services, Icon grid."},{"i":"1.1.18","n":"User Account Changes","c":"high","f":"beginner","v":"Detects unauthorized user creation or modification. Key for security auditing and compliance (SOX, PCI, HIPAA).","t":"`Splunk_TA_nix`, Syslog","d":"`sourcetype=linux_secure`, `sourcetype=linux_audit`","q":"index=os sourcetype=linux_secure (\"useradd\" OR \"userdel\" OR \"usermod\" OR \"groupadd\" OR \"passwd\")\n| rex \"by (?<admin_user>\\w+)\"\n| table _time host admin_user _raw\n| sort -_time","m":"Forward auth logs. Enable auditd rules for user management commands. Alert on any user creation/deletion events. Consider correlating with change management tickets.","z":"Events timeline, Table of account changes with who/what/when."},{"i":"1.1.19","n":"Filesystem Read-Only Detection","c":"critical","f":"intermediate","v":"A filesystem remounting as read-only indicates disk failure, corruption, or mount issues. Applications will fail silently when they can't write.","t":"`Splunk_TA_nix`, Syslog","d":"`sourcetype=syslog`, `dmesg`","q":"index=os sourcetype=syslog (\"Remounting filesystem read-only\" OR \"EXT4-fs error\" OR \"I/O error\" OR \"read-only file system\")\n| table _time host _raw\n| sort -_time","m":"Forward syslog and dmesg. Create critical alert on read-only remount messages. Also add a scripted input: `mount | grep \"ro,\"` to periodically verify all expected read-write mounts.","z":"Alert panel (critical), Events list, Host status table."},{"i":"1.1.20","n":"Reboot Detection","c":"high","f":"advanced","v":"Unexpected reboots may indicate kernel panics, hardware failure, or unauthorized changes. Distinguishing planned vs. unplanned reboots is key.","t":"`Splunk_TA_nix`, Syslog","d":"`sourcetype=syslog`, `sourcetype=who` (wtmp)","q":"index=os sourcetype=syslog (\"Initializing cgroup subsys\" OR \"Linux version\" OR \"Command line:\" OR \"systemd.*Started\" OR \"Booting Linux\")\n| stats latest(_time) as last_boot by host\n| eval hours_since_boot = round((now() - last_boot) / 3600, 1)\n| sort hours_since_boot\n\n| `` Cross-reference with maintenance windows: ``\n| join host [| inputlookup maintenance_windows.csv | where status=\"approved\"]","m":"Forward syslog. Detect boot-up log patterns. Cross-reference boot times with maintenance window lookups to flag unplanned reboots. Alert on any reboot outside approved windows.","z":"Table (host, last boot, planned/unplanned), Timeline of reboots, Single value panel (unexpected reboots last 7d)."},{"i":"1.1.21","n":"Kernel Module Loading Tracking","c":"high","f":"intermediate","v":"Detects unauthorized kernel module insertions which can indicate rootkits or malware persistence.","t":"`Splunk_TA_nix, custom scripted input`","d":"`sourcetype=linux_audit, auditctl syscall logs`","q":"index=os sourcetype=linux_audit action=* syscall=init_module OR syscall=finit_module\n| stats count by host, name, exe\n| where count > 0","m":"Configure auditctl rules to monitor syscalls for module loading (init_module, finit_module). Create a search that alerts on any unexpected module loads outside maintenance windows. Correlate against a whitelist of approved modules per host.","z":"Table, Alert"},{"i":"1.1.22","n":"Sysctl Parameter Changes Detection","c":"high","f":"intermediate","v":"Identifies modifications to kernel parameters that affect system behavior, security posture, or performance tuning.","t":"`Splunk_TA_nix, custom scripted input`","d":"`sourcetype=linux_audit, /proc/sys monitoring`","q":"index=os sourcetype=linux_audit action=modified path=/proc/sys/*\n| stats count by host, path, exe, auid\n| where count > 0","m":"Set up auditctl rules to monitor changes to /proc/sys and /etc/sysctl.conf. Create alerts for unexpected sysctl modifications, especially those affecting network (ip_forward, tcp_syncookies) or IPC parameters.","z":"Table, Timeline"},{"i":"1.1.23","n":"Kernel Core Dump Generation","c":"critical","f":"beginner","v":"Core dumps indicate process crashes at kernel level, enabling root cause analysis of system stability issues.","t":"`Splunk_TA_nix, custom scripted input`","d":"`sourcetype=syslog, /var/log/kern.log`","q":"index=os sourcetype=syslog \"segfault at\" OR \"general protection fault\" OR \"double fault\"\n| stats count by host, message, user\n| eval severity=\"high\"","m":"Monitor kernel logs for segmentation fault messages and core dump notifications. Configure systemd-coredump or standard core dump handling. Alert on any core dumps in production systems immediately.","z":"Alert, Stats Table"},{"i":"1.1.24","n":"Kernel Ring Buffer Error Rate","c":"high","f":"intermediate","v":"Ring buffer errors signal kernel-level problems including driver issues, hardware failures, or module conflicts.","t":"`Splunk_TA_nix, custom scripted input`","d":"`sourcetype=syslog, dmesg output`","q":"index=os sourcetype=syslog \"kernel:\" \"error\" OR \"warning\" OR \"BUG\"\n| timechart count by host\n| where count > 5","m":"Create a scripted input that periodically parses dmesg output and forwards errors to Splunk. Build a dashboard that shows error trends over time. Set thresholds for alerting on sustained error rates.","z":"Timechart, Line Chart"},{"i":"1.1.25","n":"NUMA Imbalance Detection","c":"medium","f":"intermediate","v":"NUMA imbalance causes memory locality issues and performance degradation on multi-socket systems.","t":"`Splunk_TA_nix, custom scripted input`","d":"`sourcetype=custom:numa_stats`","q":"index=os sourcetype=custom:numa_stats\n| stats avg(numa_hit) as avg_hits, avg(numa_miss) as avg_misses by host\n| eval miss_pct=(avg_misses/(avg_hits+avg_misses))*100\n| where miss_pct > 10","m":"Create a custom script that reads /proc/zoneinfo or numactl output and monitors NUMA hit/miss ratios. Alert when local NUMA hits drop below 90% on systems with multiple sockets, indicating memory is being accessed remotely.","z":"Single Value, Gauge"},{"i":"1.1.26","n":"CPU Frequency Scaling Events","c":"medium","f":"beginner","v":"Frequency scaling changes indicate thermal throttling or power management adjustments affecting workload performance.","t":"`Splunk_TA_nix, custom scripted input`","d":"`sourcetype=linux_audit OR custom:cpufreq`","q":"index=os sourcetype=linux_audit path=\"/sys/devices/system/cpu/cpu*/cpufreq/*\" action=modified\n| stats count by host, path\n| where count > 10","m":"Monitor /sys/devices/system/cpu/cpu*/cpufreq/scaling_cur_freq for rapid changes. Create alerts when frequency scaling events occur frequently, indicating thermal or power issues.","z":"Table, Timeline"},{"i":"1.1.27","n":"CPU Steal Time Elevation (Virtual Machines)","c":"high","f":"intermediate","v":"High steal time indicates VM is contending with host resources, affecting application performance.","t":"`Splunk_TA_nix`","d":"`sourcetype=vmstat`","q":"index=os sourcetype=vmstat host=*\n| stats avg(st) as avg_steal_time by host\n| where avg_steal_time > 5","m":"Use Splunk_TA_nix vmstat input which automatically extracts steal time percentage. Create alerts for hosts where average steal time exceeds 5% over a 10-minute window, indicating overcommitment on hypervisor.","z":"Timechart, Gauge"},{"i":"1.1.28","n":"IRQ Imbalance Across CPU Cores","c":"medium","f":"intermediate","v":"Imbalanced IRQ handling causes uneven CPU utilization and can bottleneck network or storage throughput.","t":"`Splunk_TA_nix, custom scripted input`","d":"`sourcetype=custom:irq_stats, /proc/interrupts`","q":"index=os sourcetype=custom:irq_stats\n| stats avg(count) as avg_irq, stdev(count) as stddev_irq by host, irq_type\n| eval cv=stddev_irq/avg_irq\n| where cv > 0.5","m":"Create a scripted input that parses /proc/interrupts and calculates the coefficient of variation (stdev/mean) of IRQ distribution across CPUs. Alert when imbalance is detected; use irqbalance daemon or kernel parameters to correct.","z":"Heatmap, Table"},{"i":"1.1.29","n":"Context Switch Rate Anomaly Detection","c":"medium","f":"intermediate","v":"Excessive context switching reduces CPU cache effectiveness and indicates scheduler overload or contention.","t":"`Splunk_TA_nix`","d":"`sourcetype=vmstat`","q":"index=os sourcetype=vmstat host=*\n| stats avg(cs) as avg_ctx_switch by host\n| streamstats avg(avg_ctx_switch) as baseline, stdev(avg_ctx_switch) as stddev\n| eval upper_bound=baseline+(2*stddev)\n| where avg_ctx_switch > upper_bound","m":"Monitor vmstat context switch counter (cs field). Use baseline and anomaly detection to alert on sustained context switch rates that exceed 2 standard deviations above normal, indicating scheduler pressure.","z":"Timechart, Anomaly Detector"},{"i":"1.1.30","n":"Scheduler Latency and Run Queue Depth","c":"high","f":"intermediate","v":"High run queue depth with elevated scheduling latency causes visible application performance degradation.","t":"`Splunk_TA_nix, custom scripted input`","d":"`sourcetype=vmstat, top, custom:sched_latency`","q":"index=os sourcetype=vmstat host=*\n| eval runq_to_cpu=r/procs_cpu\n| stats avg(runq_to_cpu) as avg_ratio by host\n| where avg_ratio > 2","m":"Monitor run queue (r) field from vmstat and correlate with process count. When run queue exceeds 2x CPU count, alert on scheduler saturation. Create SPL to identify top CPU-consuming processes during high latency periods.","z":"Timechart, Multi-series Line Chart"},{"i":"1.1.31","n":"Hugepage Allocation and Usage","c":"medium","f":"intermediate","v":"Hugepage contention or allocation failures impact database and large memory workload performance.","t":"`Splunk_TA_nix, custom scripted input`","d":"`sourcetype=custom:hugepages, /proc/meminfo`","q":"index=os sourcetype=custom:hugepages host=*\n| stats avg(HugePages_Total) as total, avg(HugePages_Free) as free by host\n| eval usage_pct=(total-free)/total*100\n| where usage_pct > 90","m":"Create a scripted input parsing /proc/meminfo for hugepage metrics. Track HugePages_Total, HugePages_Free, HugePages_Rsvd, and HugePages_Surp. Alert when free hugepages fall below 10% or when failed allocations occur.","z":"Gauge, Single Value"},{"i":"1.1.32","n":"Transparent Hugepage Compaction Stalls","c":"high","f":"intermediate","v":"THP compaction stalls indicate severe memory fragmentation affecting latency-sensitive workloads.","t":"`Splunk_TA_nix, custom scripted input`","d":"`sourcetype=syslog, /sys/kernel/debug/thp_collapse_alloc`","q":"index=os sourcetype=syslog \"compact_stall\" OR \"collapses_alloc_failed\"\n| stats count by host\n| where count > 0","m":"Monitor kernel logs for THP compaction failures. Enable debug logging on /sys/kernel/debug/thp* paths via custom input. Alert when compaction stalls occur during peak application hours, indicating need to tune THP settings.","z":"Alert, Stats Table"},{"i":"1.1.33","n":"Inode Exhaustion Detection","c":"critical","f":"intermediate","v":"Inode exhaustion causes file creation failures even when disk space remains available, stopping applications.","t":"`Splunk_TA_nix`","d":"`sourcetype=df`","q":"index=os sourcetype=df host=*\n| stats latest(inode_usage) as inode_pct by host, mount_point\n| where inode_pct > 85","m":"Use Splunk_TA_nix df input which includes inode usage percentages. Create alerts for filesystems exceeding 85% inode usage. Add search to identify which directories consuming excessive inodes to guide cleanup.","z":"Table, Gauge"},{"i":"1.1.34","n":"RAID Array Degradation Detection","c":"critical","f":"advanced","v":"Degraded RAID arrays mean data loss risk and potential performance impact during rebuild.","t":"`Splunk_TA_nix, custom scripted input`","d":"`sourcetype=custom:raid, /proc/mdstat`","q":"index=os sourcetype=custom:raid host=*\n| regex _raw=\"^\\[.*_.*\\]\"\n| stats count by host, device, status\n| where status=degraded","m":"Create a scripted input that parses /proc/mdstat and reports RAID device status. Alert immediately on any degradation detected. Track rebuild progress and time to completion.","z":"Alert, Table"},{"i":"1.1.35","n":"LVM Thin Pool Capacity Monitoring","c":"high","f":"intermediate","v":"Thin pool exhaustion causes I/O errors on all logical volumes in the pool, causing application failures.","t":"`Splunk_TA_nix, custom scripted input`","d":"`sourcetype=custom:lvm_thin, lvs output`","q":"index=os sourcetype=custom:lvm_thin host=*\n| stats latest(data_percent) as pool_usage by host, pool_name\n| where pool_usage > 80","m":"Create a scripted input running 'lvs' to extract thin pool metrics. Monitor Data% and Metadata% separately. Alert at 80% capacity and again at 95%, with escalation at 99%.","z":"Gauge, Single Value"},{"i":"1.1.36","n":"Multipath I/O Failover Events","c":"critical","f":"beginner","v":"Multipath failovers indicate storage path degradation requiring immediate investigation to prevent I/O loss.","t":"`Splunk_TA_nix, custom scripted input`","d":"`sourcetype=syslog, multipathd logs`","q":"index=os sourcetype=syslog \"multipathd\" \"failover\" OR \"path failed\" OR \"path recovered\"\n| stats count by host, device\n| timechart count by host","m":"Configure multipathd logging to syslog. Create alerts on any failover event. Include search to show path status before/after failover to help storage team troubleshoot.","z":"Timechart, Alert"},{"i":"1.1.37","n":"NFS Mount Stale Handle Detection","c":"critical","f":"intermediate","v":"Stale NFS handles cause application hangs and I/O failures that severely impact users.","t":"`Splunk_TA_nix, custom scripted input`","d":"`sourcetype=syslog, kernel NFS logs`","q":"index=os sourcetype=syslog \"nfs\" (\"stale\" OR \"stale NFS file handle\" OR \"Stale NFS\")\n| stats count by host, nfs_server\n| where count > 0","m":"Monitor kernel logs and NFS client logs for stale handle errors. Create immediate alerts with escalation to storage team. Add search to identify affected processes and suggest remount or NFS server recovery.","z":"Alert, Table"},{"i":"1.1.38","n":"Filesystem Journal Errors","c":"high","f":"beginner","v":"Filesystem journal errors indicate potential corruption risk and can lead to data loss or recovery timeouts.","t":"`Splunk_TA_nix, custom scripted input`","d":"`sourcetype=syslog, kernel logs`","q":"index=os sourcetype=syslog (\"ext4\" OR \"xfs\" OR \"jbd2\") (\"error\" OR \"EIO\" OR \"metadata error\")\n| stats count by host, filesystem_type\n| where count > 0","m":"Configure kernel logging to capture filesystem journal messages. Create alerts for any journal errors. Include fsck recommendations in alert description and track error rates over time.","z":"Alert, Timechart"},{"i":"1.1.39","n":"Ext4 Filesystem Errors and Recovery","c":"high","f":"intermediate","v":"Ext4 errors may indicate filesystem corruption or hardware issues requiring immediate diagnostic action.","t":"`Splunk_TA_nix, custom scripted input`","d":"`sourcetype=syslog, dmesg`","q":"index=os sourcetype=syslog host=* (\"ext4\" AND (\"error\" OR \"abort\" OR \"FS-error\"))\n| stats count by host, mount_point\n| eval severity=\"high\"","m":"Monitor for ext4-specific error messages in kernel logs. Create a baseline of expected errors and alert on increases. Correlate with disk smart data and I/O error rates to identify hardware vs. filesystem issues.","z":"Table, Timechart"},{"i":"1.1.40","n":"XFS Filesystem Errors and Recovery","c":"high","f":"beginner","v":"XFS errors indicate potential corruption in high-performance storage systems commonly used in enterprise environments.","t":"`Splunk_TA_nix, custom scripted input`","d":"`sourcetype=syslog, kernel logs`","q":"index=os sourcetype=syslog host=* (\"XFS\" OR \"xfs_*\" AND (\"error\" OR \"IO Error\" OR \"shutdown\"))\n| stats count by host, mount_point\n| where count > 0","m":"Monitor XFS-specific kernel messages. Create alerts for any XFS I/O errors or shutdown messages. Include xfs_repair suggestions and track patterns across storage arrays.","z":"Alert, Table"},{"i":"1.1.41","n":"Disk SMART Health Monitoring","c":"critical","f":"intermediate","v":"SMART errors predict disk failure, enabling proactive replacement before data loss occurs.","t":"`Splunk_TA_nix, custom scripted input`","d":"`sourcetype=custom:smartctl, smartmontools output`","q":"index=os sourcetype=custom:smartctl host=*\n| stats latest(smart_health) as health, latest(reallocated_sectors) as realloc by host, device\n| where health!=\"PASSED\" OR realloc > 100","m":"Create a scripted input running 'smartctl' on all disks and parsing output. Monitor SMART attributes including reallocated sectors, pending sectors, and CRC errors. Alert on any non-PASSED status immediately.","z":"Alert, Table"},{"i":"1.1.42","n":"SSD Wear Leveling and Health","c":"high","f":"intermediate","v":"SSD wear metrics indicate remaining lifespan, enabling proactive replacement planning.","t":"`Splunk_TA_nix, custom scripted input`","d":"`sourcetype=custom:nvme, nvme-cli output`","q":"index=os sourcetype=custom:nvme host=*\n| stats latest(percentage_used) as wear_pct, latest(available_spare) as spare by host, device\n| where wear_pct > 80 OR spare < 5","m":"Create a scripted input running 'nvme smart-log' for NVMe drives. Track percentage_used, available_spare, and media_errors. Alert when wear exceeds 80% or spare drops below 5%.","z":"Gauge, Single Value"},{"i":"1.1.43","n":"Fstrim and TRIM Command Monitoring","c":"medium","f":"beginner","v":"Fstrim failures indicate potential SSD performance degradation from lack of proper space reclamation.","t":"`Splunk_TA_nix, custom scripted input`","d":"`sourcetype=syslog, custom:fstrim_status`","q":"index=os sourcetype=custom:fstrim_status host=*\n| stats latest(status) as trim_status, latest(bytes_discarded) as discarded by host, mount_point\n| where trim_status!=\"success\"","m":"Create a cron job that runs fstrim -v and logs output to syslog. Create alerts for any failures. Track bytes discarded over time to ensure TRIM operations are completing successfully.","z":"Table, Timechart"},{"i":"1.1.44","n":"Memory Leak Detection Per Process","c":"high","f":"intermediate","v":"Process memory leaks cause gradual performance degradation and eventual OOM situations.","t":"`Splunk_TA_nix, custom scripted input`","d":"`sourcetype=top, custom:proc_rss_tracking`","q":"index=os sourcetype=top host=*\n| stats latest(rss) as latest_rss, earliest(rss) as earliest_rss by host, process\n| eval rss_growth=(latest_rss-earliest_rss)/earliest_rss*100\n| where rss_growth > 20\n| stats latest(latest_rss), max(rss_growth) by process, host","m":"Use Splunk_TA_nix top input to track RSS memory per process. Calculate linear regression or growth trends over 1-week windows. Alert on processes with sustained >20% RSS growth in a week, indicating memory leaks.","z":"Table, Scatter Chart"},{"i":"1.1.45","n":"Swap Thrashing Detection","c":"critical","f":"intermediate","v":"Swap thrashing causes severe performance degradation and can make systems unresponsive.","t":"`Splunk_TA_nix`","d":"`sourcetype=vmstat`","q":"index=os sourcetype=vmstat host=*\n| where si > 100 AND so > 100\n| stats count by host\n| eval swap_thrash=\"YES\"\n| where count > 10","m":"Monitor vmstat si (swap in) and so (swap out) rates. Alert when both exceed 100 pages/sec simultaneously for 10+ consecutive samples. Include memory pressure metrics and process identification in alert context.","z":"Alert, Timechart"},{"i":"1.1.46","n":"Slab Cache Growth Monitoring","c":"high","f":"advanced","v":"Unbounded slab cache growth consumes memory that could be used for page cache or application memory.","t":"`Splunk_TA_nix, custom scripted input`","d":"`sourcetype=custom:slabinfo, /proc/slabinfo`","q":"index=os sourcetype=custom:slabinfo host=*\n| stats sum(slab_size) as total_slab by host\n| streamstats avg(total_slab) as baseline, stdev(total_slab) as stddev\n| eval upper=baseline+(2*stddev)\n| where total_slab > upper","m":"Create a scripted input that parses /proc/slabinfo monthly and tracks total slab size. Use anomaly detection to alert when slab grows beyond 2 standard deviations, indicating slab leak.","z":"Timechart, Anomaly Chart"},{"i":"1.1.47","n":"Page Cache Pressure and Reclaim Activity","c":"medium","f":"intermediate","v":"High page cache reclaim activity indicates memory pressure affecting application performance.","t":"`Splunk_TA_nix, custom scripted input`","d":"`sourcetype=custom:meminfo_delta, /proc/vmstat`","q":"index=os sourcetype=custom:meminfo_delta host=*\n| stats avg(pgscan_direct) as scan_avg, avg(pgsteal_direct) as steal_avg by host\n| eval steal_ratio=steal_avg/scan_avg\n| where steal_ratio > 0.7","m":"Create a scripted input that parses /proc/vmstat delta between samples. Track pgscan_direct and pgsteal_direct rates. Alert when steal ratio exceeds 0.7, indicating aggressive memory reclaim.","z":"Timechart, Single Value"},{"i":"1.1.48","n":"NUMA Memory Imbalance Per Node","c":"medium","f":"intermediate","v":"NUMA memory imbalance causes remote memory access latency affecting NUMA-aware applications.","t":"`Splunk_TA_nix, custom scripted input`","d":"`sourcetype=custom:numa_meminfo`","q":"index=os sourcetype=custom:numa_meminfo host=*\n| stats avg(node_free) as avg_free by host, numa_node\n| stats max(avg_free) as max_free, min(avg_free) as min_free by host\n| eval imbalance_ratio=max_free/min_free\n| where imbalance_ratio > 1.5","m":"Create a scripted input parsing /sys/devices/system/node/node*/meminfo. Calculate free memory per NUMA node monthly. Alert when free memory distribution becomes imbalanced, indicating suboptimal memory allocation.","z":"Gauge, Heatmap"},{"i":"1.1.49","n":"Memory Cgroup Limit Enforcement","c":"high","f":"intermediate","v":"Cgroup limits prevent runaway processes but enforcement indicates containers at memory limits need scaling.","t":"`Splunk_TA_nix, custom scripted input`","d":"`sourcetype=syslog, custom:cgroup_memory`","q":"index=os sourcetype=syslog \"memory.max_usage_in_bytes\" OR \"Out of memory\" AND cgroup\n| stats count by host, cgroup_id\n| where count > 0","m":"Create a scripted input that tracks /sys/fs/cgroup/memory/* metrics. Monitor max_usage_in_bytes vs. limit_in_bytes ratio. Alert when usage exceeds 90% of limit, indicating need for more memory allocation or right-sizing.","z":"Table, Gauge"},{"i":"1.1.50","n":"Transparent Hugepage Defragmentation Stalls","c":"high","f":"beginner","v":"THP defrag stalls cause application latency spikes affecting real-time and interactive workloads.","t":"`Splunk_TA_nix, custom scripted input`","d":"`sourcetype=syslog, THP metrics`","q":"index=os sourcetype=syslog (\"thp_defrags\" OR \"khugepaged\" OR \"thp_collapse\")\n| stats count by host\n| where count > 5","m":"Enable THP statistics logging via /sys/kernel/debug/thp*. Create alerts when defrag stalls occur during peak application hours. Recommend adjusting THP settings to madvise mode for latency-sensitive workloads.","z":"Alert, Table"},{"i":"1.1.51","n":"TCP Retransmission Rate Elevation","c":"high","f":"advanced","v":"High retransmission rates indicate network congestion, packet loss, or application issues affecting throughput.","t":"`Splunk_TA_nix, custom scripted input`","d":"`sourcetype=custom:tcp_stats, /proc/net/tcp`","q":"index=os sourcetype=custom:tcp_stats host=*\n| stats avg(TcpRetransSegs) as avg_retrans by host\n| streamstats avg(avg_retrans) as baseline, stdev(avg_retrans) as stddev\n| eval upper=baseline+(3*stddev)\n| where avg_retrans > upper","m":"Create a scripted input that parses /proc/net/snmp for TCP retransmission metrics. Track TcpRetransSegs and TcpOutSegs to calculate retransmission percentage. Alert when above 2% or 3x baseline.","z":"Timechart, Anomaly Chart"},{"i":"1.1.52","n":"Connection Tracking Table Exhaustion","c":"critical","f":"intermediate","v":"Conntrack table full prevents new network connections, causing application failures.","t":"`Splunk_TA_nix, custom scripted input`","d":"`sourcetype=custom:conntrack, /proc/net/nf_conntrack`","q":"index=os sourcetype=custom:conntrack host=*\n| stats latest(current_count) as current, latest(max_size) as maximum by host\n| eval usage_pct=(current/maximum)*100\n| where usage_pct > 80","m":"Create a scripted input that parses /proc/net/nf_conntrack_count and /proc/sys/net/netfilter/nf_conntrack_max. Alert when usage exceeds 80%, with escalation at 95%. Include recommendations to increase nf_conntrack_max.","z":"Gauge, Alert"},{"i":"1.1.53","n":"Socket Buffer Overflow Detection","c":"high","f":"advanced","v":"Socket buffer overflows cause packet drops and connection resets, indicating network saturation or misconfiguration.","t":"`Splunk_TA_nix, custom scripted input`","d":"`sourcetype=custom:socket_stats, /proc/net/sockstat`","q":"index=os sourcetype=custom:socket_stats host=*\n| stats avg(TCPBacklogDrop) as avg_drop by host\n| where avg_drop > 0","m":"Create a scripted input parsing /proc/net/sockstat and monitor TCP_alloc, sockets_inuse, and TCP backlog. Also track netstat LISTEN state queue counts. Alert on backlog drops indicating insufficient buffer space.","z":"Table, Timechart"},{"i":"1.1.54","n":"Network Namespace Monitoring","c":"medium","f":"advanced","v":"Network namespace monitoring detects container escape attempts and validates network isolation in containerized environments.","t":"`Splunk_TA_nix, custom scripted input`","d":"`sourcetype=custom:netns, /var/run/netns/`","q":"index=os sourcetype=custom:netns host=*\n| stats count by host, netns_name\n| where count > expected_netns_count","m":"Create a scripted input that enumerates /var/run/netns/ and tracks namespace creation/deletion. Baseline expected namespaces per host. Alert on unexpected new namespaces which may indicate container escape or compromise.","z":"Table, Alert"},{"i":"1.1.55","n":"DNS Resolution Failure Rate","c":"high","f":"intermediate","v":"DNS failures impact application availability and user experience, requiring immediate investigation.","t":"`Splunk_TA_nix, custom scripted input`","d":"`sourcetype=syslog, systemd-resolved logs`","q":"index=os sourcetype=syslog \"systemd-resolved\" (\"SERVFAIL\" OR \"NXDOMAIN\" OR \"TIMEOUT\")\n| stats count as failures by host, query_name\n| eval failure_rate=count\n| where failure_rate > 10","m":"Monitor systemd-resolved or BIND logs for DNS query failures. Track NXDOMAIN, SERVFAIL, and TIMEOUT responses. Alert on failure rate spikes with correlation to specific nameservers or query types.","z":"Table, Timechart"},{"i":"1.1.56","n":"Firewall Rule Hit Tracking (iptables/nftables)","c":"medium","f":"beginner","v":"Firewall rule tracking identifies blocked traffic patterns, helping optimize rules and detect attack attempts.","t":"`Splunk_TA_nix, custom scripted input`","d":"`sourcetype=syslog, kernel ufw/firewall logs`","q":"index=os sourcetype=syslog \"ufw\" (\"DENY\" OR \"REJECT\" OR \"DROP\")\n| stats count by host, src_ip, dst_port, protocol\n| where count > 100","m":"Enable firewall logging in iptables/nftables. Configure kernel logging for denied traffic. Create alerts for spike in dropped packets to specific ports, and trending reports on top blocked IPs.","z":"Table, Bar Chart"},{"i":"1.1.57","n":"ARP Table Overflow Detection","c":"high","f":"advanced","v":"ARP table overflow causes network connectivity issues and may indicate ARP spoofing attacks or network misconfiguration.","t":"`Splunk_TA_nix, custom scripted input`","d":"`sourcetype=custom:arp, /proc/net/arp`","q":"index=os sourcetype=custom:arp host=*\n| stats count as arp_entry_count by host\n| eval max_entries=ntohs_limit\n| where arp_entry_count > (max_entries * 0.8)","m":"Create a scripted input that counts /proc/net/arp entries and monitors /proc/sys/net/ipv4/neigh/*/gc_thresh* limits. Alert when ARP table approaches limits. Correlate with network scans or spoofing indicators.","z":"Gauge, Alert"},{"i":"1.1.58","n":"Network Bond Failover Events","c":"critical","f":"beginner","v":"Network bond failovers indicate NIC or port failures requiring immediate remediation to prevent connectivity loss.","t":"`Splunk_TA_nix, custom scripted input`","d":"`sourcetype=syslog, bonding driver logs`","q":"index=os sourcetype=syslog \"bonding:\" (\"slave\" OR \"primary\") (\"failed\" OR \"recovering\" OR \"detected\")\n| stats count by host, bond_interface, slave_interface\n| timechart count by host","m":"Configure kernel bonding driver logging to syslog. Create immediate alerts on slave link failures. Include search to show bond status and recommend manual failover tests post-recovery.","z":"Alert, Timechart"},{"i":"1.1.59","n":"Network Team Failover Detection","c":"critical","f":"intermediate","v":"Teamed interface failovers indicate critical network path failures affecting server connectivity.","t":"`Splunk_TA_nix, custom scripted input`","d":"`sourcetype=syslog, teamd logs`","q":"index=os sourcetype=syslog \"teamd\" (\"port\" OR \"link\") (\"down\" OR \"up\" OR \"enabled\" OR \"disabled\")\n| stats count by host, team_interface\n| where count > 0","m":"Monitor teamd daemon logs for port state changes. Create alerts on any port disable/enable events. Correlate with physical switch logs to validate network-side issues.","z":"Alert, Table"},{"i":"1.1.60","n":"MTU Mismatch Detection","c":"medium","f":"advanced","v":"MTU mismatches cause fragmentation and performance issues, especially with jumbo frame configurations.","t":"`Splunk_TA_nix, custom scripted input`","d":"`sourcetype=custom:mtu, ip link show output`","q":"index=os sourcetype=custom:mtu host=*\n| stats latest(mtu) as interface_mtu by host, interface\n| stats values(interface_mtu) as mtus by host\n| where mvcount(mtus) > 1","m":"Create a scripted input that runs 'ip link show' and parses MTU values per interface. Alert when mixed MTUs are detected on a host, indicating potential mismatch with switch/network.","z":"Table, Alert"},{"i":"1.1.61","n":"TCP TIME_WAIT Accumulation","c":"medium","f":"intermediate","v":"Excessive TIME_WAIT sockets can exhaust ephemeral port space, causing connection failures under load.","t":"`Splunk_TA_nix, custom scripted input`","d":"`sourcetype=custom:netstat, netstat output`","q":"index=os sourcetype=custom:netstat host=*\n| stats count(status) as time_wait_count by host where status=\"TIME_WAIT\"\n| eval warning_level=32000\n| where time_wait_count > warning_level","m":"Create a scripted input that runs 'netstat -tan | grep TIME_WAIT | wc -l'. Alert when TIME_WAIT count exceeds 32K. Include recommendations to tune tcp_tw_reuse or tcp_tw_recycle on load-generation hosts.","z":"Gauge, Single Value"},{"i":"1.1.62","n":"Network Bandwidth Utilization by Interface","c":"medium","f":"intermediate","v":"High bandwidth utilization indicates potential capacity constraints or unexpected traffic patterns.","t":"`Splunk_TA_nix`","d":"`sourcetype=interfaces`","q":"index=os sourcetype=interfaces host=*\n| stats latest(bytes_in) as latest_in, earliest(bytes_in) as earliest_in by host, interface\n| eval bytes_transferred=(latest_in-earliest_in)\n| stats sum(bytes_transferred) as total_bytes by host\n| eval bandwidth_util_pct=(total_bytes/interface_capacity_bits)*100","m":"Use Splunk_TA_nix interfaces input to track bytes in/out. Calculate bandwidth percentage based on interface speed. Create alerts for sustained utilization above 70% or unexpected spikes.","z":"Timechart, Heatmap"},{"i":"1.1.63","n":"Dropped Packets by Network Interface","c":"high","f":"intermediate","v":"Dropped packets indicate network issues, buffer overflow, or driver problems affecting reliability.","t":"`Splunk_TA_nix`","d":"`sourcetype=interfaces`","q":"index=os sourcetype=interfaces host=*\n| stats latest(dropped_in) as dropped_in, latest(dropped_out) as dropped_out by host, interface\n| eval total_dropped=dropped_in+dropped_out\n| where total_dropped > 0\n| timechart sum(total_dropped) by host, interface","m":"Monitor interface drop counters from /proc/net/dev or ethtool. Alert on any dropped packets, which should be zero in healthy networks. Correlate with driver errors and ring buffer exhaustion.","z":"Timechart, Alert"},{"i":"1.1.64","n":"Network Latency Monitoring (Ping RTT)","c":"medium","f":"advanced","v":"Elevated latency to critical services impacts application performance and user experience.","t":"`Splunk_TA_nix, custom scripted input`","d":"`sourcetype=custom:ping_rtt`","q":"index=os sourcetype=custom:ping_rtt host=*\n| stats avg(rtt_ms) as avg_latency, max(rtt_ms) as max_latency, stdev(rtt_ms) as stddev by host, target\n| eval upper_bound=avg_latency+(2*stddev)\n| where avg_latency > baseline OR max_latency > upper_bound","m":"Create a scripted input that pings critical infrastructure hosts and captures RTT. Baseline normal latencies per target. Alert when average exceeds baseline or max exceeds 2x standard deviation.","z":"Timechart, Gauge"},{"i":"1.1.65","n":"Auditd Rule Violation Detection","c":"critical","f":"intermediate","v":"Auditd violations provide forensic evidence of security incidents and unauthorized system access.","t":"`Splunk_TA_nix`","d":"`sourcetype=linux_audit`","q":"index=os sourcetype=linux_audit type=AVC\n| stats count by host, avc_type, comm\n| where count > threshold","m":"Configure comprehensive auditd rules covering file access, syscalls, and privilege escalation. Monitor AVC (Access Vector Cache) denials. Create alerts on violation patterns indicating potential compromise.","z":"Table, Alert"},{"i":"1.1.66","n":"SELinux Denial Monitoring","c":"high","f":"beginner","v":"SELinux denials indicate policy violations that may require tuning or signal legitimate attack attempts.","t":"`Splunk_TA_nix, custom scripted input`","d":"`sourcetype=syslog, /var/log/audit/audit.log`","q":"index=os sourcetype=syslog \"SELinux\" \"denied\"\n| stats count by host, source_context, target_context, action\n| where count > 5","m":"Enable SELinux audit logging. Monitor /var/log/audit/audit.log for denial messages. Create alerts for denial spikes indicating possible policy misconfigurations or attacks. Include context in alerts to help debugging.","z":"Table, Timechart"},{"i":"1.1.67","n":"AppArmor Profile Violation Detection","c":"high","f":"intermediate","v":"AppArmor violations indicate policy breaches that may reflect policy misconfigurations or attack attempts.","t":"`Splunk_TA_nix, custom scripted input`","d":"`sourcetype=syslog, AppArmor audit logs`","q":"index=os sourcetype=syslog \"apparmor\" (\"DENIED\" OR \"ALLOWED\" AND \"mode=enforce\")\n| stats count by host, profile, operation\n| where count > baseline","m":"Enable AppArmor audit mode logging to syslog. Monitor for DENIED operations in enforce mode. Create alerts for violation spikes by profile. Include operation context to guide policy tuning.","z":"Table, Alert"},{"i":"1.1.68","n":"Rootkit Detection via File Integrity","c":"critical","f":"intermediate","v":"File integrity changes indicate potential rootkit installation or unauthorized system modification.","t":"`Splunk_TA_nix, custom scripted input`","d":"`sourcetype=custom:aide, AIDE database changes`","q":"index=os sourcetype=custom:aide host=*\n| stats count by host, file_path, change_type\n| where change_type IN (\"added\", \"changed\", \"removed\") AND count > 0","m":"Deploy AIDE (Advanced Intrusion Detection Environment) with daily scans. Create alerts for unexpected file changes in /bin, /sbin, /lib directories. Include baseline scans on system initialization.","z":"Alert, Table"},{"i":"1.1.69","n":"SUID/SGID Binary Changes","c":"critical","f":"beginner","v":"Unauthorized SUID/SGID binary modifications enable privilege escalation attacks.","t":"`Splunk_TA_nix, custom scripted input`","d":"`sourcetype=linux_audit`","q":"index=os sourcetype=linux_audit type=EXECVE \"suid\" OR \"sgid\"\n| stats count by host, name, comm\n| where count > 0","m":"Monitor /proc/fs/pstore or auditctl for SUID/SGID attribute changes. Create alerts on any changes to SUID/SGID binaries. Maintain a whitelist of expected SUID/SGID files for comparison.","z":"Alert, Table"},{"i":"1.1.70","n":"/etc/passwd Modifications","c":"critical","f":"beginner","v":"/etc/passwd changes indicate user account creation/modification requiring immediate investigation for unauthorized access.","t":"`Splunk_TA_nix, custom scripted input`","d":"`sourcetype=linux_audit`","q":"index=os sourcetype=linux_audit path=\"/etc/passwd\" action=modified\n| stats count by host, auid, exe\n| where count > 0","m":"Configure auditctl rules to monitor /etc/passwd for all modifications. Create immediate alerts with escalation to security team. Include user context showing who made the change.","z":"Alert, Table"},{"i":"1.1.71","n":"/etc/shadow Modifications","c":"critical","f":"beginner","v":"/etc/shadow changes indicate password hash tampering or unauthorized privilege escalation attempts.","t":"`Splunk_TA_nix, custom scripted input`","d":"`sourcetype=linux_audit`","q":"index=os sourcetype=linux_audit path=\"/etc/shadow\" action=modified\n| stats count by host, auid, exe\n| where count > 0","m":"Configure auditctl rules to monitor /etc/shadow modifications. Create immediate critical alerts. Include process context showing which application attempted the change.","z":"Alert, Table"},{"i":"1.1.72","n":"SSH Public Key Changes","c":"critical","f":"beginner","v":"SSH key modifications enable persistent unauthorized access, indicating potential account compromise.","t":"`Splunk_TA_nix, custom scripted input`","d":"`sourcetype=linux_audit`","q":"index=os sourcetype=linux_audit path~=\"\\.ssh/authorized_keys\" action=modified\n| stats count by host, auid, user\n| where count > 0","m":"Monitor ~/.ssh/authorized_keys files for all users via auditctl. Create alerts on any modifications. Include user and source process information to determine if change was authorized.","z":"Alert, Table"},{"i":"1.1.73","n":"PAM Authentication Failure Tracking","c":"high","f":"beginner","v":"PAM failures indicate authentication issues or brute-force attack attempts against user accounts.","t":"`Splunk_TA_nix, custom scripted input`","d":"`sourcetype=linux_secure`","q":"index=os sourcetype=linux_secure pam \"authentication failure\"\n| stats count as failures by host, user, src_ip\n| where failures > 5","m":"Monitor PAM logs for authentication failures. Track failures per user and source IP. Create alerts for multiple failures from single IP within short timeframe indicating brute force.","z":"Table, Timechart"},{"i":"1.1.74","n":"Login from Unusual Source IPs","c":"high","f":"intermediate","v":"Logins from unusual source IPs may indicate account compromise or unauthorized access.","t":"`Splunk_TA_nix, custom scripted input`","d":"`sourcetype=linux_secure`","q":"index=os sourcetype=linux_secure \"Accepted publickey\" OR \"Accepted password\"\n| stats dc(src_ip) as unique_ips by host, user\n| eventstats avg(unique_ips) as baseline_ips by user\n| where unique_ips > baseline_ips + 3","m":"Baseline normal login source IPs per user. Alert when login occurs from new IP addresses outside expected pattern. Include geolocation data for context on alert.","z":"Table, Scatter Plot"},{"i":"1.1.75","n":"Failed su Attempts","c":"high","f":"beginner","v":"Failed su attempts indicate potential privilege escalation attempts or credential compromise.","t":"`Splunk_TA_nix, custom scripted input`","d":"`sourcetype=linux_secure`","q":"index=os sourcetype=linux_secure \"su:\" \"FAILED\" OR \"su:\" \"authentication failure\"\n| stats count as failures by host, user\n| where failures > 3","m":"Monitor /var/log/auth.log for su command failures. Create alerts for multiple failures by same user in short window.

 Include target user context showing privilege escalation target.","z":"Table, Alert"},{"i":"1.1.76","n":"Privilege Escalation Detection","c":"critical","f":"intermediate","v":"Privilege escalation indicates successful security breach enabling attacker to gain administrative access.","t":"`Splunk_TA_nix, custom scripted input`","d":"`sourcetype=linux_secure`","q":"index=os sourcetype=linux_secure \"sudo:\" AND \"command=\"\n| stats count by host, user, command\n| where user!=\"root\"","m":"Monitor sudo logs for privilege escalation attempts. Create alerts for unexpected sudo usage by specific users. Correlate with auditctl syscall logs showing actual command execution after privilege gain.","z":"Alert, Table"},{"i":"1.1.77","n":"Unauthorized Cron Job Additions","c":"critical","f":"beginner","v":"Unauthorized cron jobs enable persistent malware execution and data exfiltration.","t":"`Splunk_TA_nix, custom scripted input`","d":"`sourcetype=linux_audit`","q":"index=os sourcetype=linux_audit path~=\"/var/spool/cron/crontabs/*\" action=modified\n| stats count by host, auid, file_name\n| where count > 0","m":"Monitor /var/spool/cron/crontabs/ and /etc/cron.d/ for modifications via auditctl. Create alerts on any new cron job additions. Compare against known application cron jobs from baseline.","z":"Alert, Table"},{"i":"1.1.78","n":"Open Port Changes","c":"critical","f":"intermediate","v":"New listening ports indicate service configuration changes or malware opening backdoors.","t":"`Splunk_TA_nix`","d":"`sourcetype=openPorts`","q":"index=os sourcetype=openPorts host=*\n| stats latest(port_list) as current_ports by host\n| eval new_ports=port_list - previous_ports\n| where isnotnull(new_ports)","m":"Use Splunk_TA_nix openPorts input to track listening ports per host. Baseline expected ports. Create alerts on new listening ports with escalation to change management. Include process information showing which service opened port.","z":"Alert, Table"},{"i":"1.1.79","n":"Setcap Binary Monitoring","c":"critical","f":"beginner","v":"Setcap binary modifications enable privilege escalation bypassing traditional privilege boundary enforcement.","t":"`Splunk_TA_nix, custom scripted input`","d":"`sourcetype=linux_audit`","q":"index=os sourcetype=linux_audit type=CAPABILITY_CHANGE\n| stats count by host, name, cap_changes\n| where count > 0","m":"Monitor setcap changes via auditctl CAPABILITY_CHANGE events. Create alerts on any setcap modifications. Maintain whitelist of expected capability assignments by application.","z":"Alert, Table"},{"i":"1.1.80","n":"Systemd Unit Failures","c":"high","f":"beginner","v":"Service unit failures indicate application issues or configuration problems requiring immediate remediation.","t":"`Splunk_TA_nix, custom scripted input`","d":"`sourcetype=syslog`","q":"index=os sourcetype=syslog \"systemd\" AND (\"Failed\" OR \"ERROR\" OR \"not-found\")\n| stats count by host, unit\n| where count > 0","m":"Monitor systemd logs via journalctl. Create alerts for service failures. Include restart policy status and recent unit logs to help troubleshooting. Correlate with dependency failures.","z":"Alert, Table"},{"i":"1.1.81","n":"Systemd Timer Missed Triggers","c":"medium","f":"beginner","v":"Missed systemd timers indicate scheduling issues or system overload preventing scheduled tasks.","t":"`Splunk_TA_nix, custom scripted input`","d":"`sourcetype=syslog`","q":"index=os sourcetype=syslog \"systemd\" \"timer\" (\"cannot run\" OR \"Skipping\")\n| stats count by host, timer_unit\n| where count > 0","m":"Monitor systemd timer logs for \"cannot run\" or skipped trigger messages. Create alerts when timers miss scheduled runs. Include impact assessment based on timer purpose.","z":"Alert, Table"},{"i":"1.1.82","n":"D-State (Uninterruptible Sleep) Process Detection","c":"critical","f":"intermediate","v":"D-state processes indicate hanging I/O operations or kernel deadlocks requiring immediate investigation.","t":"`Splunk_TA_nix`","d":"`sourcetype=ps`","q":"index=os sourcetype=ps host=* state=\"D\"\n| stats count as dstate_count by host\n| where dstate_count > 0","m":"Monitor ps output for D-state (uninterruptible sleep) processes. Create alerts when any D-state processes exist for >5 minutes. Include wchan (wait channel) showing what I/O operation is blocking.","z":"Alert, Table"},{"i":"1.1.83","n":"Process CPU Affinity Changes","c":"medium","f":"beginner","v":"CPU affinity changes can indicate attempted performance optimization or malicious CPU isolation attempts.","t":"`Splunk_TA_nix, custom scripted input`","d":"`sourcetype=linux_audit`","q":"index=os sourcetype=linux_audit type=SCHED_SETAFFINITY\n| stats count by host, pid, comm\n| where count > 0","m":"Monitor sched_setaffinity syscalls via auditctl. Create alerts on unexpected CPU affinity changes. Correlate with application deployment or configuration management changes.","z":"Table, Alert"},{"i":"1.1.84","n":"Runaway Process Detection (CPU Hog)","c":"high","f":"intermediate","v":"Runaway processes consuming excessive CPU degrade performance for all workloads on the host.","t":"`Splunk_TA_nix`","d":"`sourcetype=top`","q":"index=os sourcetype=top host=*\n| stats avg(cpu_pct) as avg_cpu by host, process\n| where avg_cpu > 80","m":"Use Splunk_TA_nix top input to track per-process CPU usage. Create alerts for processes consistently exceeding 80% CPU. Include user, parent process, and command line context. Suggest kill or scaling actions.","z":"Table, Timechart"},{"i":"1.1.85","n":"Memory Hog Detection","c":"high","f":"intermediate","v":"Memory-consuming processes can cause OOM conditions affecting all applications on the host.","t":"`Splunk_TA_nix`","d":"`sourcetype=top`","q":"index=os sourcetype=top host=*\n| stats avg(mem_pct) as avg_mem by host, process\n| where avg_mem > 40","m":"Monitor per-process memory percentage from top input. Create alerts for processes consistently exceeding 40% of system memory. Include growth trend and suggest right-sizing or memory limit enforcement.","z":"Table, Gauge"},{"i":"1.1.86","n":"Fork Bomb Detection","c":"critical","f":"intermediate","v":"Fork bombs exhaust PID space and system resources, making systems unusable.","t":"`Splunk_TA_nix, custom scripted input`","d":"`sourcetype=custom:process_count`","q":"index=os sourcetype=custom:process_count host=*\n| stats avg(process_count) as avg_procs, stdev(process_count) as stddev by host\n| where process_count > (avg_procs + 4*stddev)","m":"Track /proc process count or 'ps aux | wc -l'. Create alerts when process count spikes suddenly. Include threshold based on baseline plus 4x standard deviation to detect sudden fork activity.","z":"Alert, Anomaly Chart"},{"i":"1.1.87","n":"Process Namespace Breakout Detection","c":"critical","f":"intermediate","v":"Process namespace breakout indicates container escape or privilege escalation enabling access to host.","t":"`Splunk_TA_nix, custom scripted input`","d":"`sourcetype=linux_audit`","q":"index=os sourcetype=linux_audit type=CONTAINER_ESCAPE OR syscall=setns\n| stats count by host, pid, comm\n| where count > 0","m":"Monitor setns syscalls via auditctl. Create alerts on namespace escape attempts. Correlate with process name and user to identify unauthorized actors.","z":"Alert, Table"},{"i":"1.1.88","n":"Container Escape Attempt Detection","c":"critical","f":"intermediate","v":"Container escape attempts are critical security events indicating sophisticated attack against containerized infrastructure.","t":"`Splunk_TA_nix, custom scripted input`","d":"`sourcetype=syslog, AppArmor/SELinux denials`","q":"index=os sourcetype=syslog (AppArmor OR SELinux) \"container\" \"denied\"\n| stats count by host, container_id\n| where count > threshold","m":"Monitor container runtime logs and SELinux/AppArmor denials for escape signatures. Create immediate critical alerts. Correlate with process syscalls and capability usage anomalies.","z":"Alert, Table"},{"i":"1.1.89","n":"Syslog Flood Detection","c":"high","f":"intermediate","v":"Syslog floods can overwhelm log infrastructure and mask real security events in log noise.","t":"`Splunk_TA_nix`","d":"`sourcetype=syslog`","q":"index=os sourcetype=syslog host=*\n| timechart count by host\n| where count > 10000 in 5 minute window","m":"Monitor syslog event rate per host. Create alerts for rate spikes indicating syslog flood. Include source identification and recommend investigation of root cause or log source throttling.","z":"Timechart, Alert"},{"i":"1.1.90","n":"Journal Disk Usage Monitoring","c":"medium","f":"intermediate","v":"Journal disk usage growth can consume valuable storage space, potentially filling disks.","t":"`Splunk_TA_nix, custom scripted input`","d":"`sourcetype=custom:journalctl_usage`","q":"index=os sourcetype=custom:journalctl_usage host=*\n| stats latest(disk_usage_mb) as journal_size by host\n| where journal_size > 1000","m":"Create a scripted input running 'journalctl --disk-usage' monthly. Alert when journal size exceeds 1GB. Include recommendations to prune old journal entries using journalctl --vacuum-time or --vacuum-size.","z":"Gauge, Single Value"},{"i":"1.1.91","n":"Log Rotation Failures","c":"medium","f":"beginner","v":"Log rotation failures can cause log files to grow unbounded, consuming disk space and impacting log analysis.","t":"`Splunk_TA_nix, custom scripted input`","d":"`sourcetype=syslog, logrotate output`","q":"index=os sourcetype=syslog \"logrotate\" (\"error\" OR \"failed\" OR \"ERROR\")\n| stats count by host, log_file\n| where count > 0","m":"Monitor logrotate errors via syslog. Create alerts for rotation failures. Include recommended actions to fix permissions or free disk space blocking rotation.","z":"Alert, Table"},{"i":"1.1.92","n":"Auditd Daemon Health","c":"high","f":"beginner","v":"Auditd daemon failure results in loss of security audit trail, creating compliance and forensic gaps.","t":"`Splunk_TA_nix, custom scripted input`","d":"`sourcetype=syslog, linux_audit`","q":"index=os sourcetype=linux_audit host=*\n| stats count as audit_events, max(_time) as last_event by host\n| where audit_events == 0 OR (now() - last_event) > 300","m":"Monitor auditd process status and audit event flow. Create alerts when no audit events are received for 5+ minutes. Include daemon status checks and restart recommendations.","z":"Alert, Single Value"},{"i":"1.1.93","n":"Rsyslog Queue Backlog Monitoring","c":"medium","f":"beginner","v":"Rsyslog queue backlog indicates log forwarding issues or overload of remote syslog infrastructure.","t":"`Splunk_TA_nix, custom scripted input`","d":"`sourcetype=custom:rsyslog_stats`","q":"index=os sourcetype=custom:rsyslog_stats host=*\n| stats latest(queue_size) as backlog by host\n| where backlog > 100","m":"Enable rsyslog statistics logging via $ActionFileDefaultTemplate and stats modules. Monitor queue_size metric. Alert when backlog accumulates indicating destination unavailability.","z":"Gauge, Table"},{"i":"1.1.94","n":"Failed Log Forwarding","c":"high","f":"beginner","v":"Failed log forwarding creates data loss in centralized logging infrastructure, creating gaps in monitoring and compliance.","t":"`Splunk_TA_nix, custom scripted input`","d":"`sourcetype=syslog, rsyslog/syslog-ng error logs`","q":"index=os sourcetype=syslog (\"rsyslog\" OR \"syslog-ng\") (\"error\" OR \"connection refused\" OR \"name resolution failed\")\n| stats count by host, remote_host\n| where count > 0","m":"Monitor rsyslog/syslog-ng logs for forwarding failures. Create alerts on connection or name resolution errors. Include impact assessment showing how many events are being dropped.","z":"Alert, Table"},{"i":"1.1.95","n":"TCP Connection Establishment Rate","c":"medium","f":"intermediate","v":"High connection establishment rate may indicate application behavior changes or DDoS attack preparation.","t":"`Splunk_TA_nix, custom scripted input`","d":"`sourcetype=custom:netstat_stats, /proc/net/snmp`","q":"index=os sourcetype=custom:netstat_stats host=*\n| stats avg(TcpActiveOpens) as avg_active by host\n| streamstats avg(avg_active) as baseline, stdev(avg_active) as stddev\n| where avg_active > baseline + 3*stddev","m":"Monitor TcpActiveOpens from /proc/net/snmp. Track baseline and detect anomalies. Create alerts for sustained elevation in connection rate indicating potential DDoS or application issues.","z":"Timechart, Anomaly Chart"},{"i":"1.1.96","n":"NUMA Hit/Miss Ratio Tracking","c":"medium","f":"beginner","v":"Tracking NUMA hit/miss ratio identifies opportunities for workload optimization on NUMA systems.","t":"`Splunk_TA_nix, custom scripted input`","d":"`sourcetype=custom:numa_zone`","q":"index=os sourcetype=custom:numa_zone host=*\n| stats sum(numa_hit) as hits, sum(numa_miss) as misses by host\n| eval hit_ratio=hits/(hits+misses)\n| where hit_ratio < 0.9","m":"Parse /proc/zoneinfo for NUMA statistics per zone. Calculate hit ratio monthly. Alert when ratio drops below 90%, suggesting memory allocation pattern misalignment with NUMA topology.","z":"Gauge, Timechart"},{"i":"1.1.97","n":"CPU C-State Residency Monitoring","c":"medium","f":"intermediate","v":"CPU C-state residency tracking optimizes power consumption and identifies power management issues.","t":"`Splunk_TA_nix, custom scripted input`","d":"`sourcetype=custom:cpuidle, /sys/devices/system/cpu/cpu*/cpuidle/state*/`","q":"index=os sourcetype=custom:cpuidle host=*\n| stats avg(c_state_time) as avg_time by host, c_state\n| eval idle_pct=avg_time/total_time*100","m":"Create a scripted input reading CPU idle state residency times. Track time spent in each C-state. Alert when C-state distribution changes unexpectedly, indicating power management changes.","z":"Pie Chart, Heatmap"},{"i":"1.1.98","n":"TLB Shootdown Rate Monitoring","c":"medium","f":"beginner","v":"High TLB shootdown rates indicate excessive cross-CPU cache invalidations affecting performance on multi-CPU systems.","t":"`Splunk_TA_nix, custom scripted input`","d":"`sourcetype=custom:tlb_stats, /proc/interrupts`","q":"index=os sourcetype=custom:tlb_stats host=*\n| stats avg(tlb_shootdown_rate) as avg_rate by host\n| where avg_rate > threshold","m":"Monitor TLB shootdown interrupts from /proc/interrupts. Create alerts when shootdown rate exceeds baseline. Recommend application profiling and memory access pattern optimization.","z":"Timechart, Alert"},{"i":"1.1.99","n":"Kernel Lock Contention Detection","c":"medium","f":"intermediate","v":"Kernel lock contention degrades multi-core scalability and application throughput.","t":"`Splunk_TA_nix, custom scripted input`","d":"`sourcetype=custom:lock_stats, /proc/lock_stat`","q":"index=os sourcetype=custom:lock_stats host=*\n| stats avg(contentions) as avg_contention by host, lock_name\n| where avg_contention > threshold","m":"Enable kernel lock statistics via /proc/lock_stat or perf tools. Monitor lock contention per lock. Create alerts for high-contention locks with recommendations for kernel/application tuning.","z":"Table, Bar Chart"},{"i":"1.1.100","n":"Softirq Rate Monitoring","c":"medium","f":"beginner","v":"High softirq rates indicate kernel workload distribution issues or network stack pressure.","t":"`Splunk_TA_nix`","d":"`sourcetype=vmstat`","q":"index=os sourcetype=vmstat host=*\n| stats avg(si) as avg_softirq by host\n| where avg_softirq > 1000","m":"Monitor softirq field from vmstat. Create alerts when softirq rate exceeds 1000 per second. Correlate with network packet rate to identify if networking-driven or other kernel subsystem.","z":"Timechart, Alert"},{"i":"1.1.101","n":"Context Switch Anomalies Detection","c":"medium","f":"intermediate","v":"Context switch anomalies indicate scheduler issues or unexpected process workload changes.","t":"`Splunk_TA_nix`","d":"`sourcetype=vmstat`","q":"index=os sourcetype=vmstat host=*\n| stats avg(cs) as baseline\n| eventstats stdev(cs) as stddev\n| where cs > baseline + 3*stddev","m":"Use vmstat context switch field with statistical anomaly detection. Alert on 3-sigma deviations from baseline. Include process state analysis to identify cause.","z":"Timechart, Anomaly Detector"},{"i":"1.1.102","n":"EDAC Memory Error Tracking","c":"critical","f":"beginner","v":"EDAC memory errors indicate hardware failures predicting imminent memory or system failure.","t":"`Splunk_TA_nix, custom scripted input`","d":"`sourcetype=syslog, EDAC kernel driver logs`","q":"index=os sourcetype=syslog \"EDAC\" OR \"MCE\" (\"error\" OR \"correctable\" OR \"uncorrectable\")\n| stats count by host, error_type\n| where count > 0","m":"Monitor EDAC (Error Detection and Correction) and MCE (Machine Check Exception) logs. Create immediate alerts on memory errors with escalation to hardware team for memory replacement.","z":"Alert, Table"},{"i":"1.1.103","n":"IPMI Sensor Threshold Violations","c":"critical","f":"intermediate","v":"IPMI sensor violations indicate hardware conditions (thermal, voltage, power) requiring immediate remediation.","t":"`Splunk_TA_nix, custom scripted input`","d":"`sourcetype=custom:ipmi, ipmitool sensor output`","q":"index=os sourcetype=custom:ipmi host=*\n| stats latest(sensor_status) as status by host, sensor_name\n| where status IN (\"CRITICAL\", \"WARNING\")","m":"Create a scripted input running ipmitool sensor list and parsing status. Alert on CRITICAL or WARNING status. Include sensor readings and recommended actions per sensor type.","z":"Alert, Table"},{"i":"1.1.104","n":"Thermal Throttling Detection","c":"critical","f":"intermediate","v":"Thermal throttling reduces CPU performance to prevent overheating, indicating cooling system issues.","t":"`Splunk_TA_nix, custom scripted input`","d":"`sourcetype=syslog, kernel thermal logs`","q":"index=os sourcetype=syslog \"thermal\" OR \"CPU\" AND \"throttling\"\n| stats count by host\n| where count > 0","m":"Monitor kernel thermal throttling messages. Create alerts on any throttling events. Include thermal zone temperatures and recommendations for cooling investigation.","z":"Alert, Table"},{"i":"1.1.105","n":"Fan Speed Anomalies","c":"critical","f":"beginner","v":"Fan speed anomalies indicate cooling system degradation potentially leading to thermal overload.","t":"`Splunk_TA_nix, custom scripted input`","d":"`sourcetype=custom:ipmi, ipmitool reading`","q":"index=os sourcetype=custom:ipmi host=* sensor_type=fan\n| stats latest(reading_pct) as fan_speed by host, fan_name\n| where fan_speed < 20 AND fan_speed > 0","m":"Monitor fan speed readings via IPMI. Alert on anomalously low fan speeds (< 20%) even when speed is non-zero. Correlate with temperature readings to assess thermal risk.","z":"Gauge, Table"},{"i":"1.1.106","n":"Power Supply State Changes","c":"critical","f":"beginner","v":"Power supply state changes indicate hardware failures requiring immediate physical intervention.","t":"`Splunk_TA_nix, custom scripted input`","d":"`sourcetype=syslog, IPMI power events`","q":"index=os sourcetype=syslog (\"PSU\" OR \"power supply\") (\"failed\" OR \"degraded\" OR \"offline\")\n| stats count by host\n| where count > 0","m":"Monitor power supply status via IPMI. Create immediate alerts on any PSU status changes. Include redundancy status and escalation to datacenter ops for physical inspection.","z":"Alert, Table"},{"i":"1.1.107","n":"Hardware Clock Drift Detection","c":"high","f":"intermediate","v":"Hardware clock drift affects system time accuracy impacting application consistency and audit trails.","t":"`Splunk_TA_nix`","d":"`sourcetype=time`","q":"index=os sourcetype=time host=*\n| stats latest(time_offset_ms) as offset by host\n| where abs(offset) > 100","m":"Use Splunk_TA_nix time input to track system time vs. reference. Monitor offset from NTP server. Alert when offset exceeds 100ms. Recommend NTP service investigation or hardware RTC replacement.","z":"Gauge, Timechart"},{"i":"1.1.108","n":"Password Policy Violation Detection","c":"medium","f":"intermediate","v":"Password policy violations indicate accounts with weak credentials vulnerable to compromise.","t":"`Splunk_TA_nix, custom scripted input`","d":"`sourcetype=linux_audit, /etc/shadow audit`","q":"index=os sourcetype=linux_audit path=\"/etc/shadow\"\n| stats count by host, user\n| eval policy_violation=\"yes\"","m":"Periodically scan /etc/shadow for passwords that violate policy (too simple, too old, etc.) via custom scripts. Create alerts for violations. Include remediation instructions.","z":"Table, Alert"},{"i":"1.1.109","n":"Account Expiry Monitoring","c":"medium","f":"intermediate","v":"Account expiry tracking ensures user accounts remain valid and prevents access with expired credentials.","t":"`Splunk_TA_nix, custom scripted input`","d":"`sourcetype=custom:account_expiry`","q":"index=os sourcetype=custom:account_expiry host=*\n| where days_until_expiry <= 30\n| stats by host, user, days_until_expiry","m":"Create a scripted input that parses /etc/shadow and calculates days until account expiry. Alert 30 days before expiry with reminders. Track expired accounts on production systems.","z":"Table, Alert"},{"i":"1.1.110","n":"Inactive User Detection","c":"medium","f":"intermediate","v":"Inactive users with enabled accounts represent security risk and should be disabled to reduce attack surface.","t":"`Splunk_TA_nix, custom scripted input`","d":"`sourcetype=linux_secure`","q":"index=os sourcetype=linux_secure \"Accepted\"\n| stats max(_time) as last_login by user, host\n| eval days_inactive=(now()-last_login)/86400\n| where days_inactive > 90","m":"Track user login activity from /var/log/auth.log. Calculate days since last login. Alert on users inactive >90 days. Include list of inactive accounts for review and disabling.","z":"Table, Alert"},{"i":"1.1.111","n":"World-Writable File Detection","c":"high","f":"advanced","v":"World-writable files can be modified by any user enabling privilege escalation or system compromise.","t":"`Splunk_TA_nix, custom scripted input`","d":"`sourcetype=custom:file_perms`","q":"index=os sourcetype=custom:file_perms host=*\n| where permissions=\"777\" OR permissions=\"666\"\n| stats count by host, directory\n| where count > 0","m":"Create a scripted input that finds world-writable files via 'find / -perm /002'. Exclude expected world-writable locations like /tmp. Alert on unexpected world-writable files in sensitive directories.","z":"Table, Alert"},{"i":"1.1.112","n":"Unowned File Detection","c":"high","f":"advanced","v":"Unowned files indicate potential file system corruption or security issue requiring investigation.","t":"`Splunk_TA_nix, custom scripted input`","d":"`sourcetype=custom:unowned_files`","q":"index=os sourcetype=custom:unowned_files host=*\n| stats count by host, directory\n| where count > 0","m":"Create a scripted input running 'find / -nouser -o -nogroup' to identify unowned files. Alert on any findings. Include recommendations to investigate origin and correct ownership.","z":"Table, Alert"},{"i":"1.1.113","n":"SETUID Audit and Tracking","c":"critical","f":"beginner","v":"SETUID binary execution enables privilege escalation requiring tracking for security monitoring.","t":"`Splunk_TA_nix, custom scripted input`","d":"`sourcetype=linux_audit`","q":"index=os sourcetype=linux_audit type=EXECVE exe=\"*\" AND suid\n| stats count by host, exe, user\n| where count > threshold","m":"Configure auditctl rules monitoring EXECVE syscalls with setuid. Create alerts on SETUID binary execution by unexpected users. Baseline expected SETUID usage per host.","z":"Table, Alert"},{"i":"1.1.114","n":"Open File Handle Per-Process Monitoring","c":"medium","f":"intermediate","v":"High open file handle counts per process can exhaust system limits causing application failures.","t":"`Splunk_TA_nix`","d":"`sourcetype=lsof`","q":"index=os sourcetype=lsof host=*\n| stats count as open_files by host, process, pid\n| where open_files > 1000","m":"Use Splunk_TA_nix lsof input to track open files per process. Create alerts for processes approaching system limit. Include breakdown of file types (sockets, regular files, pipes).","z":"Table, Gauge"},{"i":"1.1.115","n":"Listening Port Compliance","c":"high","f":"intermediate","v":"Port compliance ensures only authorized services are listening, reducing attack surface.","t":"`Splunk_TA_nix`","d":"`sourcetype=openPorts, netstat`","q":"index=os sourcetype=openPorts host=*\n| where NOT (port IN (approved_port_list))\n| stats count by host, port\n| where count > 0","m":"Use Splunk_TA_nix openPorts input with baseline of expected listening ports per host. Create alerts for unexpected listening ports. Include service identification and change management correlation.","z":"Table, Alert"},{"i":"1.1.116","n":"Installed Package Drift Detection","c":"medium","f":"intermediate","v":"Package drift indicates unauthorized software installation or configuration management failures.","t":"`Splunk_TA_nix`","d":"`sourcetype=package`","q":"index=os sourcetype=package host=*\n| stats dc(package) as installed_count by host\n| stats avg(installed_count) as baseline\n| where installed_count > baseline + threshold","m":"Use Splunk_TA_nix package input to track installed software. Baseline expected packages per host. Alert on unexpected new packages with name and version details.","z":"Table, Alert"},{"i":"1.1.117","n":"Configuration File Change Tracking (/etc)","c":"critical","f":"beginner","v":"Configuration file changes can indicate system compromise or unauthorized configuration modifications.","t":"`Splunk_TA_nix, custom scripted input`","d":"`sourcetype=linux_audit`","q":"index=os sourcetype=linux_audit path=\"/etc/*\" action=modified\n| stats count by host, path, auid\n| where count > 0","m":"Configure auditctl rules to monitor all /etc/ modifications. Create alerts on unexpected config changes. Include before/after comparison using file integrity tools.","z":"Alert, Table"},{"i":"1.1.118","n":"System Reboot Frequency Anomaly","c":"medium","f":"intermediate","v":"Unexpected reboot frequency indicates system instability, crashes, or possible security incident response.","t":"`Splunk_TA_nix, custom scripted input`","d":"`sourcetype=syslog`","q":"index=os sourcetype=syslog \"Kernel panic\" OR \"reboot\" OR \"system shutdown\"\n| stats count as reboot_count by host\n| where reboot_count > 2 in 7 days","m":"Monitor system boot/reboot messages in syslog. Create alerts when reboot frequency exceeds normal baseline. Include reboot cause analysis and incident correlation.","z":"Timechart, Alert"},{"i":"1.1.119","n":"Defunct (Zombie) Process Accumulation","c":"medium","f":"beginner","v":"Accumulating zombie processes indicate application resource leaks causing process table exhaustion risk.","t":"`Splunk_TA_nix`","d":"`sourcetype=ps`","q":"index=os sourcetype=ps host=* state=\"Z\"\n| stats count as zombie_count by host\n| where zombie_count > 10","m":"Monitor ps output for Z (zombie) state processes. Create alerts when zombie count exceeds 10. Include parent process information to identify resource leak culprit.","z":"Gauge, Table"},{"i":"1.1.120","n":"Symbolic Link Chain Depth Monitoring","c":"medium","f":"intermediate","v":"Excessive symbolic link chains can cause performance issues and may indicate directory traversal vulnerabilities.","t":"`Splunk_TA_nix, custom scripted input`","d":"`sourcetype=custom:symlink_scan`","q":"index=os sourcetype=custom:symlink_scan host=*\n| stats max(chain_depth) as max_depth by host, directory\n| where max_depth > 10","m":"Create a scripted input that recursively follows symbolic links counting chain depth. Alert when exceeding 10 levels. Include directory path for investigation of circular or excessive chains.","z":"Table, Alert"},{"i":"1.1.121","n":"Bootloader Configuration Changes","c":"critical","f":"beginner","v":"Bootloader changes can enable persistence mechanisms or bypass security controls at boot time.","t":"`Splunk_TA_nix, custom scripted input`","d":"`sourcetype=linux_audit`","q":"index=os sourcetype=linux_audit path~=\"/boot/(grub|efi)\" action=modified\n| stats count by host, path, auid\n| where count > 0","m":"Monitor /boot/grub/ and UEFI boot directories via auditctl. Create immediate critical alerts on any bootloader modifications. Include file hash comparison to detect tampering.","z":"Alert, Table"}]},{"i":"1.2","n":"Windows Servers","u":[{"i":"1.2.1","n":"CPU Utilization Trending","c":"high","f":"intermediate","v":"Sustained high CPU causes application timeouts and service degradation. Trending enables capacity planning and helps identify runaway processes.","t":"`Splunk_TA_windows`","d":"`sourcetype=Perfmon:CPU` (Perfmon input: `Processor`)","q":"index=perfmon sourcetype=\"Perfmon:CPU\" counter=\"% Processor Time\" instance=\"_Total\"\n| timechart span=1h avg(Value) as avg_cpu by host\n| where avg_cpu > 90","m":"Configure Perfmon inputs in `inputs.conf` on the UF: `[perfmon://CPU]`, object=Processor, counters=% Processor Time, instances=_Total, interval=60. Alert on sustained >90% for 15+ minutes.","z":"Line chart (timechart), Single value (current), Heatmap across hosts."},{"i":"1.2.2","n":"Memory Utilization & Paging","c":"high","f":"intermediate","v":"High memory and excessive paging degrade performance. Page file usage indicates the system is under memory pressure.","t":"`Splunk_TA_windows`","d":"`sourcetype=Perfmon:Memory`","q":"index=perfmon sourcetype=\"Perfmon:Memory\" (counter=\"% Committed Bytes In Use\" OR counter=\"Pages/sec\")\n| timechart span=5m avg(Value) by counter, host","m":"Configure Perfmon input for Memory object: counters = `% Committed Bytes In Use`, `Available MBytes`, `Pages/sec`. Alert when committed bytes >90% or pages/sec sustained >1000.","z":"Dual-axis line chart (memory % + pages/sec), Gauge widget."},{"i":"1.2.3","n":"Disk Space Monitoring","c":"critical","f":"intermediate","v":"Full disks crash applications, stop logging, and corrupt databases. Windows can become unbootable if the system drive fills.","t":"`Splunk_TA_windows`","d":"`sourcetype=Perfmon:LogicalDisk`","q":"index=perfmon sourcetype=\"Perfmon:LogicalDisk\" counter=\"% Free Space\" instance!=\"_Total\"\n| stats latest(Value) as free_pct by host, instance\n| eval used_pct = 100 - free_pct\n| where used_pct > 85\n| sort -used_pct","m":"Perfmon input: LogicalDisk, counters = `% Free Space`, `Free Megabytes`. Alert at 85%/90%/95% thresholds. Use `predict` for forecasting.","z":"Table sorted by usage, Gauge per drive, Line chart trend per volume."},{"i":"1.2.4","n":"Windows Service Failures","c":"critical","f":"beginner","v":"Stopped critical services directly impact application availability. Auto-restart doesn't always work, and some services can't auto-restart.","t":"`Splunk_TA_windows`","d":"`sourcetype=WinEventLog:System`, Event IDs 7034 (crash), 7036 (state change), 7031 (unexpected termination)","q":"index=wineventlog sourcetype=\"WinEventLog:System\" (EventCode=7034 OR EventCode=7031 OR EventCode=7036)\n| eval status=case(EventCode=7034, \"Crashed\", EventCode=7031, \"Terminated Unexpectedly\", EventCode=7036 AND Message LIKE \"%stopped%\", \"Stopped\", 1=1, \"Changed\")\n| stats count by host, EventCode, status, Message\n| sort -count","m":"Enable Windows Event Log collection for the System log. Create alerts on EventCode 7034 and 7031. Maintain a lookup of critical services per server role to filter noise.","z":"Status panel (red/green per service), Table of recent events, Timeline."},{"i":"1.2.5","n":"Event Log Flood Detection","c":"medium","f":"intermediate","v":"Abnormal event log volumes often indicate error loops, misconfiguration, or an active attack. Also protects Splunk license from unexpected spikes.","t":"`Splunk_TA_windows`","d":"`sourcetype=WinEventLog:*`","q":"index=wineventlog sourcetype=\"WinEventLog:*\"\n| timechart span=1h count by host\n| eventstats avg(count) as avg_count, stdev(count) as stdev_count by host\n| eval threshold = avg_count + (3 * stdev_count)\n| where count > threshold","m":"Use `timechart` + standard deviation to baseline normal volumes. Alert when volume exceeds 3 standard deviations. Investigate the top EventCode contributing to the spike.","z":"Line chart with dynamic threshold overlay, Table of spike events."},{"i":"1.2.6","n":"Failed Login Monitoring","c":"high","f":"intermediate","v":"Detects credential stuffing, brute-force attacks, and compromised account usage. Key for security monitoring and compliance.","t":"`Splunk_TA_windows`","d":"`sourcetype=WinEventLog:Security`, EventCode=4625","q":"index=wineventlog sourcetype=\"WinEventLog:Security\" EventCode=4625\n| eval src_ip=coalesce(src_ip, IpAddress)\n| stats count as failures, dc(TargetUserName) as accounts_targeted, values(TargetUserName) as usernames by src_ip, host\n| where failures > 10\n| sort -failures\n| iplocation src_ip","m":"Enable Security Event Log collection (already default in most deployments). Create alert for >10 failures from single source in 5 minutes. Correlate with successful logins (4624) from same source.","z":"Table (source, failures, targets), Map (GeoIP), Timechart of failure trends."},{"i":"1.2.7","n":"Account Lockout Tracking","c":"high","f":"beginner","v":"Lockouts frustrate users and can indicate active attacks. Identifying the source computer of the lockout dramatically speeds resolution.","t":"`Splunk_TA_windows`","d":"`sourcetype=WinEventLog:Security`, EventCode=4740","q":"index=wineventlog sourcetype=\"WinEventLog:Security\" EventCode=4740\n| table _time TargetUserName TargetDomainName CallerComputerName\n| sort -_time","m":"Collect Security logs from domain controllers (critical). The CallerComputerName field identifies which machine caused the lockout. Create alert per lockout and an aggregate alert for mass lockouts.","z":"Table (user, source computer, time), Single value (lockouts last 24h), Bar chart by user."},{"i":"1.2.8","n":"Privileged Group Changes","c":"critical","f":"intermediate","v":"Additions to Domain Admins, Enterprise Admins, or Schema Admins grant extreme privilege. Unauthorized changes could mean full domain compromise.","t":"`Splunk_TA_windows`","d":"`sourcetype=WinEventLog:Security`, EventCodes 4728, 4732, 4756 (member added); 4729, 4733, 4757 (member removed)","q":"index=wineventlog sourcetype=\"WinEventLog:Security\" (EventCode=4728 OR EventCode=4732 OR EventCode=4756 OR EventCode=4729 OR EventCode=4733 OR EventCode=4757)\n| eval action=case(EventCode IN (4728,4732,4756), \"Added\", EventCode IN (4729,4733,4757), \"Removed\")\n| table _time action TargetUserName MemberName Group_Name SubjectUserName host\n| sort -_time","m":"Collect Security logs from all domain controllers. Create a real-time alert on these event codes filtered to privileged groups (Domain Admins, Enterprise Admins, Schema Admins, Administrators). Require correlation with change ticket.","z":"Events timeline, Table with action details, Alert panel (critical)."},{"i":"1.2.9","n":"Windows Update Compliance","c":"medium","f":"advanced","v":"Unpatched systems are primary attack vectors. Tracking patch compliance across the fleet supports vulnerability management and regulatory requirements.","t":"`Splunk_TA_windows`, custom scripted input","d":"`sourcetype=WinEventLog:System` (Event ID 19/20/43), WSUS logs, or scripted input","q":"index=wineventlog sourcetype=\"WinEventLog:System\" EventCode=19\n| rex \"(?<kb_article>KB\\d+)\"\n| stats latest(_time) as last_update, count as updates_installed by host\n| eval days_since_update = round((now() - last_update) / 86400, 0)\n| where days_since_update > 30\n| sort -days_since_update","m":"Forward System event logs. EventCode 19 = successful update install. Create scripted input running `Get-HotFix` for comprehensive view. Dashboard showing days since last patch per host, flagging >30 days.","z":"Table (host, last update, days since), Bar chart (compliance %), Heatmap by team/location."},{"i":"1.2.10","n":"Scheduled Task Failures","c":"medium","f":"beginner","v":"Failed scheduled tasks break batch jobs, cleanup scripts, and automated processes. Often goes unnoticed until downstream effects appear.","t":"`Splunk_TA_windows`","d":"`sourcetype=WinEventLog:Microsoft-Windows-TaskScheduler/Operational`, EventCode=201","q":"index=wineventlog sourcetype=\"WinEventLog:Microsoft-Windows-TaskScheduler/Operational\" EventCode=201\n| where ActionName!=\"0\" AND ResultCode!=\"0\"\n| table _time host TaskName ResultCode ActionName\n| sort -_time","m":"Enable Task Scheduler operational log collection. Alert on non-zero ResultCode values. Maintain a lookup of critical tasks per server role.","z":"Table of failures, Single value (failures last 24h), Bar chart by task name."},{"i":"1.2.11","n":"Blue Screen of Death (BSOD)","c":"critical","f":"beginner","v":"BSODs indicate severe system instability \u2014 driver bugs, hardware failure, or memory corruption. Repeated BSODs on the same host demand immediate attention.","t":"`Splunk_TA_windows`","d":"`sourcetype=WinEventLog:System`, EventCode=1001 (BugCheck)","q":"index=wineventlog sourcetype=\"WinEventLog:System\" EventCode=1001 SourceName=\"BugCheck\"\n| rex \"(?<bugcheck_code>0x[0-9a-fA-F]+)\"\n| table _time host bugcheck_code Message\n| sort -_time","m":"Enable System event log collection. Alert on EventCode 1001 from BugCheck source. Correlate bugcheck codes with known issues. Track frequency per host to identify chronic instability.","z":"Events timeline, Table per host, Single value (BSOD count last 30d)."},{"i":"1.2.12","n":"RDP Session Monitoring","c":"high","f":"beginner","v":"Tracks who connected via Remote Desktop, from where, and when. Essential for compliance auditing and detecting lateral movement.","t":"`Splunk_TA_windows`","d":"`sourcetype=WinEventLog:Security` (EventCode 4624, LogonType=10), `sourcetype=WinEventLog:Microsoft-Windows-TerminalServices-LocalSessionManager/Operational`","q":"index=wineventlog sourcetype=\"WinEventLog:Security\" EventCode=4624 LogonType=10\n| table _time TargetUserName IpAddress host\n| sort -_time\n\n| `` Also check TerminalServices for session duration: ``\nindex=wineventlog source=\"WinEventLog:Microsoft-Windows-TerminalServices-LocalSessionManager/Operational\" (EventCode=21 OR EventCode=23 OR EventCode=24 OR EventCode=25)\n| table _time host User EventCode","m":"Enable Security log + TerminalServices operational log. Alert on RDP sessions to servers from unexpected sources. Create session audit report correlating logon/logoff events.","z":"Table (user, source IP, host, time), Choropleth map for source IPs, Session timeline."},{"i":"1.2.13","n":"PowerShell Script Execution","c":"high","f":"beginner","v":"PowerShell is the most common tool in modern Windows attacks (Cobalt Strike, Empire, fileless malware). Script block logging captures the actual code executed.","t":"`Splunk_TA_windows`","d":"`sourcetype=WinEventLog:Microsoft-Windows-PowerShell/Operational`, EventCode=4104","q":"index=wineventlog sourcetype=\"WinEventLog:Microsoft-Windows-PowerShell/Operational\" EventCode=4104\n| search ScriptBlockText=\"*EncodedCommand*\" OR ScriptBlockText=\"*Invoke-Mimikatz*\" OR ScriptBlockText=\"*Net.WebClient*\" OR ScriptBlockText=\"*-nop -w hidden*\"\n| table _time host ScriptBlockText\n| sort -_time","m":"Enable PowerShell Script Block Logging via GPO: `Administrative Templates > Windows Components > Windows PowerShell > Turn on PowerShell Script Block Logging`. Forward the PowerShell Operational log. Create alerts on suspicious keywords (encoded commands, invoke-expression, web client downloads).","z":"Events list (full script block text), Table of suspicious commands, Volume timechart."},{"i":"1.2.14","n":"IIS Web Server Monitoring","c":"high","f":"intermediate","v":"IIS access logs provide visibility into web application health \u2014 error rates, response times, and request volumes. Critical for web-facing services.","t":"`Splunk_TA_windows`, Splunk Add-on for Microsoft IIS","d":"`sourcetype=ms:iis:auto` or `sourcetype=iis`","q":"index=web sourcetype=\"ms:iis:auto\"\n| timechart span=5m count by sc_status\n| eval error_rate = round((sc_status_500 + sc_status_502 + sc_status_503) / (sc_status_200 + sc_status_500 + sc_status_502 + sc_status_503) * 100, 2)","m":"Configure IIS to use W3C Extended Log Format with time-taken field. Forward IIS logs from `%SystemDrive%\\inetpub\\logs\\LogFiles`. Use the Microsoft IIS TA for field extraction. Create alerts on 5xx error rate >5%.","z":"Line chart (requests by status code), Single value (error rate %), Table of top error URIs."},{"i":"1.2.15","n":"DNS Server Health","c":"high","f":"beginner","v":"DNS is foundational infrastructure \u2014 when DNS is slow or failing, everything fails. Monitoring query rates and failures ensures resolution reliability.","t":"`Splunk_TA_windows`, Microsoft DNS Analytical logs","d":"`sourcetype=WinEventLog:DNS Server`, DNS debug/analytical logs","q":"index=wineventlog sourcetype=\"WinEventLog:DNS Server\"\n| stats count by EventCode\n| sort -count\n\n| `` Query volume trending: ``\nindex=dns sourcetype=\"MSAD:NT6:DNS\"\n| timechart span=5m count as query_count by QTYPE","m":"Enable DNS analytical logging via Event Viewer (disabled by default for performance). Alternatively use DNS debug logging to a file and forward it. Monitor query volume, SERVFAIL rate, and zone transfer events.","z":"Line chart (query rate), Pie chart (query types), Single value (SERVFAIL count)."},{"i":"1.2.16","n":"DHCP Scope Exhaustion","c":"high","f":"intermediate","v":"When DHCP scopes run out of addresses, new devices can't get network access. Often manifests as \"network down\" complaints.","t":"`Splunk_TA_windows`","d":"`sourcetype=DhcpSrvLog`, DHCP audit logs","q":"index=dhcp sourcetype=\"DhcpSrvLog\"\n| where EventID=13 OR EventID=14\n| stats count by Description","m":"Forward DHCP server audit logs from `%windir%\\System32\\Dhcp`. Create scripted input running `Get-DhcpServerv4ScopeStatistics` to get scope utilization. Alert when any scope exceeds 90% utilization.","z":"Gauge per scope, Table (scope, used, available, % full), Trend line."},{"i":"1.2.17","n":"Certificate Expiration","c":"high","f":"advanced","v":"Expired certificates cause TLS failures, broken websites, authentication failures, and service outages. Among the most preventable outage causes.","t":"`Splunk_TA_windows`, custom scripted input","d":"Custom scripted input (`certutil` or PowerShell `Get-ChildItem Cert:\\`)","q":"index=os sourcetype=certificate_inventory host=*\n| eval days_until_expiry = round((expiry_epoch - now()) / 86400, 0)\n| where days_until_expiry < 90\n| sort days_until_expiry\n| table host cert_subject issuer days_until_expiry expiry_date","m":"Create a PowerShell scripted input: `Get-ChildItem -Path Cert:\\LocalMachine -Recurse | Select Subject, NotAfter, Issuer`. Run daily. Alert at 90/60/30/7 day thresholds.","z":"Table sorted by days to expiry, Single value (certs expiring within 30d), Status indicator (red/yellow/green)."},{"i":"1.2.18","n":"Active Directory Replication","c":"critical","f":"intermediate","v":"AD replication failures cause authentication inconsistencies \u2014 users locked out in one site but not another, stale GPOs, and split-brain scenarios.","t":"`Splunk_TA_windows`","d":"`sourcetype=WinEventLog:Directory Service`, custom scripted input (`repadmin /replsummary`)","q":"index=wineventlog sourcetype=\"WinEventLog:Directory Service\" (EventCode=1864 OR EventCode=1865 OR EventCode=2042 OR EventCode=1388 OR EventCode=1988)\n| table _time host EventCode Message\n| sort -_time\n\n| `` Replication health from scripted input: ``\nindex=ad sourcetype=repadmin_replsummary\n| where failures > 0\n| table source_dc dest_dc failures last_failure last_success","m":"Collect Directory Service event log from all DCs. Create scripted input running `repadmin /replsummary /csv` daily. Alert on any replication failure events. Critical alert on EventCode 2042 (tombstone lifetime exceeded).","z":"Table of replication partners with status, Events timeline, Network diagram of DC replication."},{"i":"1.2.19","n":"Group Policy Processing Failures","c":"medium","f":"beginner","v":"GPO failures mean security policies, drive mappings, software deployments, and configurations aren't being applied. Systems may be running with stale or missing policies.","t":"`Splunk_TA_windows`","d":"`sourcetype=WinEventLog:Microsoft-Windows-GroupPolicy/Operational`, EventCodes 1085, 1096","q":"index=wineventlog sourcetype=\"WinEventLog:Microsoft-Windows-GroupPolicy/Operational\" (EventCode=1085 OR EventCode=1096 OR EventCode=7016 OR EventCode=7320)\n| stats count by host, EventCode, ErrorDescription\n| sort -count","m":"Enable Group Policy operational log forwarding. Alert on persistent GPO failures per host. Correlate with network connectivity (DC reachability) and DNS resolution issues.","z":"Table (host, error, count), Bar chart by error type."},{"i":"1.2.20","n":"Print Spooler Issues","c":"low","f":"beginner","v":"Print spooler crashes affect print services and have historically been attack vectors (PrintNightmare). Monitoring catches both operational and security issues.","t":"`Splunk_TA_windows`","d":"`sourcetype=WinEventLog:Microsoft-Windows-PrintService/Operational`","q":"index=wineventlog source=\"WinEventLog:Microsoft-Windows-PrintService/Operational\" (EventCode=372 OR EventCode=805 OR EventCode=842)\n| stats count by host, EventCode\n| sort -count","m":"Enable PrintService operational log on print servers. Alert on spooler crash (EventCode 372) and driver installation events (security relevance). Consider disabling the print spooler on servers that don't need it (attack surface reduction).","z":"Table, Events timeline."},{"i":"1.2.21","n":"Disk I/O Queue Length","c":"high","f":"intermediate","v":"Sustained high disk queue lengths indicate storage bottlenecks invisible to CPU/memory monitoring. Causes application hangs and timeout errors.","t":"`Splunk_TA_windows`","d":"`sourcetype=Perfmon:LogicalDisk` (counter: Current Disk Queue Length)","q":"index=perfmon sourcetype=\"Perfmon:LogicalDisk\" counter=\"Current Disk Queue Length\" instance!=\"_Total\"\n| timechart span=5m avg(Value) as avg_queue by host, instance\n| where avg_queue > 2","m":"Add `Current Disk Queue Length` and `Avg. Disk sec/Transfer` to Perfmon LogicalDisk inputs (interval=30). A sustained queue >2 per spindle indicates saturation. Correlate with application latency. For SSDs, thresholds differ \u2014 focus on `Avg. Disk sec/Transfer` >20ms.","z":"Line chart (queue by drive), Heatmap (hosts \u00d7 drives), Single value (worst queue)."},{"i":"1.2.22","n":"Process Handle Leak Detection","c":"high","f":"advanced","v":"Handle leaks cause resource exhaustion and eventual application crashes or system instability. Detecting the leak early prevents unplanned outages.","t":"`Splunk_TA_windows`","d":"`sourcetype=Perfmon:Process` (counter: Handle Count)","q":"index=perfmon sourcetype=\"Perfmon:Process\" counter=\"Handle Count\" instance!=\"_Total\" instance!=\"Idle\"\n| timechart span=1h max(Value) as handles by host, instance\n| streamstats window=24 current=f avg(handles) as avg_handles by host, instance\n| eval pct_increase = round((handles - avg_handles) / avg_handles * 100, 1)\n| where pct_increase > 50 AND handles > 5000","m":"Configure Perfmon Process inputs with `Handle Count` counter, all instances, interval=300. Alert when a process shows sustained handle growth >50% over 24-hour baseline. Common leakers: w3wp.exe, svchost.exe, custom .NET apps. Correlate with application restarts.","z":"Line chart (handle trend per process), Table (top handle consumers), Alert on sustained growth."},{"i":"1.2.23","n":"Non-Paged Pool Exhaustion","c":"critical","f":"intermediate","v":"Non-paged pool memory is limited kernel memory. Exhaustion causes BSOD (DRIVER_IRQL_NOT_LESS_OR_EQUAL). Often caused by driver leaks.","t":"`Splunk_TA_windows`","d":"`sourcetype=Perfmon:Memory` (counter: Pool Nonpaged Bytes)","q":"index=perfmon sourcetype=\"Perfmon:Memory\" counter=\"Pool Nonpaged Bytes\"\n| eval pool_MB = Value / 1048576\n| timechart span=15m avg(pool_MB) as nonpaged_pool_MB by host\n| where nonpaged_pool_MB > 256","m":"Add `Pool Nonpaged Bytes` and `Pool Nonpaged Allocs` to Memory Perfmon inputs (interval=60). Default limit is ~75% of RAM or registry-defined. Alert at 256MB+ or when growth is sustained over hours. Use `poolmon.exe` or `xperf` to identify the leaking driver tag on affected hosts.","z":"Line chart (pool growth over time), Single value (current pool size), Alert threshold marker."},{"i":"1.2.24","n":"Network Interface Utilization","c":"high","f":"intermediate","v":"Saturated network interfaces cause packet drops, retransmissions, and application timeouts. Often missed when only CPU/memory are monitored.","t":"`Splunk_TA_windows`","d":"`sourcetype=Perfmon:Network_Interface`","q":"index=perfmon sourcetype=\"Perfmon:Network_Interface\" counter=\"Bytes Total/sec\"\n| eval bandwidth_Mbps = (Value * 8) / 1000000\n| timechart span=5m avg(bandwidth_Mbps) as avg_Mbps by host, instance\n| where avg_Mbps > 800","m":"Configure Perfmon Network Interface inputs: counters `Bytes Total/sec`, `Packets Outbound Errors`, `Output Queue Length` (interval=60). For 1Gbps NICs, alert at 80% (~800Mbps). Also monitor `Output Queue Length >2` for congestion even below bandwidth saturation. Exclude loopback and virtual adapters from monitoring.","z":"Line chart (bandwidth by interface), Dual-axis (bandwidth + errors), Table (top talkers)."},{"i":"1.2.25","n":"Processor Queue Length","c":"medium","f":"intermediate","v":"Processor queue length >2 per core indicates threads waiting for CPU time. Detects CPU contention even when average utilization looks normal due to burst patterns.","t":"`Splunk_TA_windows`","d":"`sourcetype=Perfmon:System` (counter: Processor Queue Length)","q":"index=perfmon sourcetype=\"Perfmon:System\" counter=\"Processor Queue Length\"\n| timechart span=5m avg(Value) as queue_len by host\n| where queue_len > 4","m":"Add `Processor Queue Length` to Perfmon System object inputs (interval=30). A sustained queue >2\u00d7 number of cores indicates saturation. Correlate with `Context Switches/sec` from the same object to distinguish CPU-bound workloads from excessive threading.","z":"Line chart (queue trend), Heatmap (hosts \u00d7 time), Single value (current queue)."},{"i":"1.2.26","n":"Security Log Cleared","c":"critical","f":"beginner","v":"Clearing the Security event log is a classic attacker technique to cover tracks. Legitimate clears are rare and should always be investigated.","t":"`Splunk_TA_windows`","d":"`sourcetype=WinEventLog:Security` (EventCode 1102), `sourcetype=WinEventLog:System` (EventCode 104)","q":"index=wineventlog (sourcetype=\"WinEventLog:Security\" EventCode=1102) OR (sourcetype=\"WinEventLog:System\" EventCode=104)\n| table _time, host, sourcetype, EventCode, SubjectUserName, SubjectDomainName\n| sort -_time","m":"EventCode 1102 fires when the Security log is cleared; EventCode 104 when any event log is cleared. These should never occur in production outside controlled maintenance windows. Set a real-time alert with critical priority. Enrich with user identity to track who performed the action.","z":"Timeline (clear events), Table (who cleared what), Single value (count \u2014 target: 0)."},{"i":"1.2.27","n":"New Service Installation","c":"high","f":"beginner","v":"Attackers install malicious services for persistence. Unexpected service installations outside change windows indicate compromise or unauthorized software.","t":"`Splunk_TA_windows`","d":"`sourcetype=WinEventLog:System` (EventCode 7045)","q":"index=wineventlog sourcetype=\"WinEventLog:System\" EventCode=7045\n| table _time, host, ServiceName, ImagePath, ServiceType, AccountName\n| regex ImagePath!=\"(?i)(C:\\\\\\\\Windows\\\\\\\\|C:\\\\\\\\Program Files)\"\n| sort -_time","m":"EventCode 7045 logs every new service installation. Filter out known/expected services via a lookup of approved service names. Alert on services with binaries outside standard paths (C:\\Windows, C:\\Program Files). Pay special attention to services running as SYSTEM with binaries in temp directories.","z":"Table (new services with paths), Timeline, Alert on non-standard paths."},{"i":"1.2.28","n":"Windows Firewall Rule Changes","c":"high","f":"beginner","v":"Unauthorized firewall rule changes can open attack vectors. Malware often disables the firewall or adds allow rules for C2 communication.","t":"`Splunk_TA_windows`","d":"`sourcetype=WinEventLog:Microsoft-Windows-Windows Firewall With Advanced Security/Firewall` (EventCode 2004, 2005, 2006, 2033)","q":"index=wineventlog source=\"WinEventLog:Microsoft-Windows-Windows Firewall With Advanced Security/Firewall\"\n  EventCode IN (2004, 2005, 2006, 2033)\n| eval action=case(EventCode=2004,\"Rule Added\",EventCode=2005,\"Rule Modified\",EventCode=2006,\"Rule Deleted\",EventCode=2033,\"Firewall Disabled\")\n| table _time, host, action, RuleName, ApplicationPath, Direction, Protocol\n| sort -_time","m":"Enable the Windows Firewall audit log. EventCode 2004=rule added, 2005=modified, 2006=deleted, 2033=firewall disabled. Alert immediately on firewall disabled events. Track rule changes against change management records. Focus on inbound allow rules added for non-standard ports.","z":"Table (rule changes), Timeline, Single value (firewall disabled count \u2014 target: 0)."},{"i":"1.2.29","n":"Registry Run Key Modification (Persistence)","c":"critical","f":"intermediate","v":"Run/RunOnce registry keys are the most common malware persistence mechanism. Monitoring these keys catches many threats early.","t":"`Splunk_TA_windows`, Sysmon recommended","d":"`sourcetype=WinEventLog:Microsoft-Windows-Sysmon/Operational` (EventCode 13) or `sourcetype=WinEventLog:Security` (EventCode 4657)","q":"index=wineventlog sourcetype=\"WinEventLog:Microsoft-Windows-Sysmon/Operational\" EventCode=13\n  TargetObject=\"*\\\\CurrentVersion\\\\Run*\"\n| table _time, host, Image, TargetObject, Details, User\n| sort -_time","m":"Deploy Sysmon with registry monitoring rules targeting HKLM\\SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\Run, RunOnce, and HKCU equivalents. Alternatively, enable Object Access auditing (EventCode 4657) with SACLs on Run keys. Alert on any modification outside approved deployment tools (SCCM, GPO). Cross-reference with threat intel.","z":"Table (registry changes with process context), Timeline, Alert on non-GPO modifications."},{"i":"1.2.30","n":"LSASS Memory Access (Credential Dumping)","c":"critical","f":"intermediate","v":"Accessing LSASS process memory is the primary technique for credential theft (Mimikatz, ProcDump). Detection is critical to stopping lateral movement.","t":"`Splunk_TA_windows`, Sysmon required","d":"`sourcetype=WinEventLog:Microsoft-Windows-Sysmon/Operational` (EventCode 10)","q":"index=wineventlog sourcetype=\"WinEventLog:Microsoft-Windows-Sysmon/Operational\" EventCode=10\n  TargetImage=\"*\\\\lsass.exe\"\n  GrantedAccess IN (\"0x1010\",\"0x1410\",\"0x1438\",\"0x143a\",\"0x1fffff\")\n| where NOT match(SourceImage, \"(?i)(MsMpEng|csrss|wininit|svchost|mrt\\.exe)\")\n| table _time, host, SourceImage, GrantedAccess, SourceUser\n| sort -_time","m":"Deploy Sysmon with ProcessAccess (EventCode 10) monitoring. Filter out legitimate LSASS accessors (AV engines, csrss, wininit). The GrantedAccess mask 0x1010 (PROCESS_VM_READ + PROCESS_QUERY_LIMITED_INFORMATION) is the Mimikatz signature. Alert immediately with critical priority. Enable Credential Guard (Windows 10+) as a complementary defense.","z":"Table (LSASS access events), Single value (count \u2014 target: 0), Alert with MITRE ATT&CK T1003 reference."},{"i":"1.2.31","n":"Kerberos Authentication Failures","c":"high","f":"intermediate","v":"Kerberos failures (EventCode 4771) reveal password spraying, expired accounts, clock skew, and misconfigured SPNs. Distinct from NTLM failures and requires separate monitoring.","t":"`Splunk_TA_windows`","d":"`sourcetype=WinEventLog:Security` (EventCode 4771)","q":"index=wineventlog sourcetype=\"WinEventLog:Security\" EventCode=4771\n| eval failure=case(Status=\"0x6\",\"Unknown username\",Status=\"0x12\",\"Account disabled/expired/locked\",Status=\"0x17\",\"Password expired\",Status=\"0x18\",\"Bad password\",Status=\"0x25\",\"Clock skew\",1=1,Status)\n| stats count by TargetUserName, IpAddress, failure, host\n| where count > 5\n| sort -count","m":"Collect Security event logs from all domain controllers. EventCode 4771 is Kerberos pre-auth failure. Status codes: 0x18=wrong password (most common attack indicator), 0x12=disabled/locked, 0x25=clock skew (infrastructure issue). Alert on >10 failures per user in 5 minutes (spray detection). Correlate IpAddress with known endpoints.","z":"Table (failures by user and reason), Bar chart (top failing accounts), Timechart (failure rate trending)."},{"i":"1.2.32","n":"WMI Event Subscription Persistence","c":"critical","f":"intermediate","v":"WMI event subscriptions are a stealthy persistence mechanism that survives reboots. Used by APT groups and fileless malware.","t":"`Splunk_TA_windows`, Sysmon required","d":"`sourcetype=WinEventLog:Microsoft-Windows-Sysmon/Operational` (EventCode 19, 20, 21)","q":"index=wineventlog sourcetype=\"WinEventLog:Microsoft-Windows-Sysmon/Operational\"\n  EventCode IN (19, 20, 21)\n| eval wmi_type=case(EventCode=19,\"Filter Created\",EventCode=20,\"Consumer Created\",EventCode=21,\"Binding Created\")\n| table _time, host, wmi_type, User, Name, Destination, Query\n| sort -_time","m":"Deploy Sysmon v10+ which logs WMI event filter (19), consumer (20), and binding (21) creation. Any new WMI subscription outside management tools (SCCM, monitoring agents) is suspicious. Alert on all new subscriptions. Legitimate ones are rare and well-known (e.g., SCCM client). Correlate consumer CommandLineTemplate with known malware signatures.","z":"Table (WMI subscriptions created), Timeline, Single value (new subscriptions \u2014 target: 0 outside SCCM)."},{"i":"1.2.33","n":"Audit Policy Changes","c":"critical","f":"beginner","v":"Attackers modify audit policies to disable logging and hide their activities. Any unauthorized audit policy change must be investigated immediately.","t":"`Splunk_TA_windows`","d":"`sourcetype=WinEventLog:Security` (EventCode 4719)","q":"index=wineventlog sourcetype=\"WinEventLog:Security\" EventCode=4719\n| table _time, host, SubjectUserName, SubjectDomainName, CategoryId, SubcategoryGuid, AuditPolicyChanges\n| sort -_time","m":"EventCode 4719 fires when an audit policy is changed via `auditpol.exe` or Group Policy. Any change outside planned GPO updates is suspicious. Alert with critical priority. Pay special attention to \"Success removed\" or \"Failure removed\" changes that reduce auditing coverage. Correlate with GPO change events.","z":"Table (policy changes with user context), Timeline, Single value (count \u2014 target: 0 outside maintenance)."},{"i":"1.2.34","n":"AppLocker / WDAC Policy Violations","c":"high","f":"intermediate","v":"AppLocker/WDAC blocks track unauthorized application execution attempts. High violation rates indicate persistent threats or misconfigured policies.","t":"`Splunk_TA_windows`","d":"`sourcetype=WinEventLog:Microsoft-Windows-AppLocker/EXE and DLL` (EventCode 8004, 8007)","q":"index=wineventlog source=\"WinEventLog:Microsoft-Windows-AppLocker*\" EventCode IN (8004, 8007)\n| eval block_type=case(EventCode=8004,\"EXE blocked\",EventCode=8007,\"Script blocked\")\n| stats count by host, block_type, RuleNameOrId, FilePath, UserName\n| sort -count","m":"Enable AppLocker EXE, DLL, and Script rules in enforcement or audit mode. EventCode 8003/8006=allowed, 8004/8007=blocked. In audit mode (EventCode 8003), use data to build baseline before enforcement. Track blocked attempts per host \u2014 spikes indicate attack attempts or policy gaps. Correlate FilePath with threat intel.","z":"Bar chart (top blocked apps), Table (blocks by host), Timechart (block rate over time)."},{"i":"1.2.35","n":"Windows Defender Threat Detections","c":"critical","f":"intermediate","v":"Real-time visibility into endpoint AV detections across the fleet. Delayed response to malware detections increases blast radius.","t":"`Splunk_TA_windows`","d":"`sourcetype=WinEventLog:Microsoft-Windows-Windows Defender/Operational` (EventCode 1006, 1007, 1116, 1117)","q":"index=wineventlog source=\"WinEventLog:Microsoft-Windows-Windows Defender/Operational\"\n  EventCode IN (1006, 1007, 1116, 1117)\n| eval action=case(EventCode=1006,\"Detected\",EventCode=1007,\"Action taken\",EventCode=1116,\"Detected\",EventCode=1117,\"Action taken\")\n| table _time, host, action, \"Threat Name\", \"Severity ID\", Path, \"Detection User\"\n| sort -_time","m":"Forward Windows Defender Operational log from all endpoints. EventCode 1116=threat detected, 1117=action taken, 1006/1007=malware detected/acted on. Alert immediately on detections with Severity \"Severe\" or \"High\". Track remediation success (1117 following 1116). Monitor for EventCode 5001 (real-time protection disabled) as a separate critical alert.","z":"Table (recent detections), Bar chart (threat categories), Single value (unresolved threats), Map (affected hosts)."},{"i":"1.2.36","n":"DCSync Attack Detection","c":"critical","f":"intermediate","v":"DCSync uses Directory Replication Service permissions to extract password hashes remotely. Detecting non-DC replication requests catches this attack before credential theft completes.","t":"`Splunk_TA_windows`","d":"`sourcetype=WinEventLog:Security` (EventCode 4662)","q":"index=wineventlog sourcetype=\"WinEventLog:Security\" EventCode=4662\n  AccessMask=\"0x100\"\n  (Properties=\"*1131f6aa*\" OR Properties=\"*1131f6ad*\" OR Properties=\"*89e95b76*\")\n| where NOT match(SubjectUserName, \"(?i)(\\\\$$)\")\n| table _time, host, SubjectUserName, SubjectDomainName, ObjectName\n| sort -_time","m":"Enable Directory Service Access auditing on domain controllers. EventCode 4662 with GUID 1131f6aa (DS-Replication-Get-Changes) or 1131f6ad (DS-Replication-Get-Changes-All) from a non-machine account (not ending in $) is a DCSync indicator. Alert immediately with critical priority. Legitimate replication only occurs between DCs (machine accounts). MITRE ATT&CK T1003.006.","z":"Table (replication requests from non-DCs), Single value (count \u2014 target: 0), Alert with analyst playbook."},{"i":"1.2.37","n":"Kerberoasting Detection (SPN Ticket Requests)","c":"critical","f":"intermediate","v":"Kerberoasting requests TGS tickets for service accounts with SPNs, then cracks them offline. Detecting anomalous TGS requests catches this before passwords are compromised.","t":"`Splunk_TA_windows`","d":"`sourcetype=WinEventLog:Security` (EventCode 4769)","q":"index=wineventlog sourcetype=\"WinEventLog:Security\" EventCode=4769\n  TicketEncryptionType=0x17\n  ServiceName!=\"krbtgt\" ServiceName!=\"*$\"\n| stats count dc(ServiceName) as unique_spns by TargetUserName, IpAddress\n| where unique_spns > 3\n| sort -unique_spns","m":"Collect Security logs from all DCs. EventCode 4769 = TGS ticket request. Encryption type 0x17 (RC4) is the Kerberoasting indicator \u2014 modern environments should use AES (0x12). Alert when a single user requests RC4 tickets for multiple service SPNs. Exclude machine accounts ($) and krbtgt. Remediation: enforce AES-only on service accounts and use Group Managed Service Accounts (gMSAs).","z":"Table (suspicious requestors), Bar chart (TGS requests by encryption type), Timeline."},{"i":"1.2.38","n":"AD Object Deletion Monitoring","c":"critical","f":"beginner","v":"Accidental or malicious deletion of AD objects (OUs, users, groups, computer accounts) can cause widespread service disruption. AD Recycle Bin has a limited window.","t":"`Splunk_TA_windows`","d":"`sourcetype=WinEventLog:Security` (EventCode 4726, 4730, 4743, 5141)","q":"index=wineventlog sourcetype=\"WinEventLog:Security\"\n  EventCode IN (4726, 4730, 4743, 5141)\n| eval object_type=case(EventCode=4726,\"User deleted\",EventCode=4730,\"Group deleted\",EventCode=4743,\"Computer deleted\",EventCode=5141,\"AD object deleted\")\n| table _time, host, object_type, SubjectUserName, TargetUserName, ObjectDN\n| sort -_time","m":"Enable DS Object Access auditing on domain controllers. EventCode 5141 catches all AD object deletions including OUs. 4726/4730/4743 catch specific account/group/computer deletions. Alert on OU deletions immediately (mass impact). Track deletion volume per admin \u2014 spikes indicate accidental bulk operations or insider threats. Ensure AD Recycle Bin is enabled.","z":"Table (deleted objects), Timeline, Bar chart (deletions by admin), Single value (OU deletions \u2014 target: 0)."},{"i":"1.2.39","n":"Domain Trust Changes","c":"critical","f":"beginner","v":"Unauthorized trust relationships can grant external domains access to internal resources. Trust modifications are rare and high-impact.","t":"`Splunk_TA_windows`","d":"`sourcetype=WinEventLog:Security` (EventCode 4706, 4707, 4716)","q":"index=wineventlog sourcetype=\"WinEventLog:Security\" EventCode IN (4706, 4707, 4716)\n| eval action=case(EventCode=4706,\"Trust created\",EventCode=4707,\"Trust removed\",EventCode=4716,\"Trust modified\")\n| table _time, host, action, SubjectUserName, TrustDirection, TrustType, TrustedDomain\n| sort -_time","m":"EventCode 4706=new trust, 4707=trust removed, 4716=trust modified. These events are extremely rare in stable environments. Alert on all trust changes with critical priority. Verify against approved change requests. Pay attention to trust direction (inbound trusts grant access TO your domain) and trust type (external vs. forest trusts).","z":"Table (trust changes), Single value (count \u2014 target: 0 outside planned changes), Alert."},{"i":"1.2.40","n":"WHEA Hardware Error Reporting","c":"high","f":"intermediate","v":"Windows Hardware Error Architecture (WHEA) reports CPU, memory, and PCIe hardware errors before they cause crashes. Enables proactive hardware replacement.","t":"`Splunk_TA_windows`","d":"`sourcetype=WinEventLog:System` (Source=Microsoft-Windows-WHEA-Logger, EventCode 17, 18, 19, 20, 47)","q":"index=wineventlog sourcetype=\"WinEventLog:System\" Source=\"Microsoft-Windows-WHEA-Logger\"\n| eval severity=case(EventCode=18,\"Fatal\",EventCode=19,\"Corrected\",EventCode=20,\"Informational\",1=1,\"Other\")\n| stats count by host, severity, ErrorSource, ErrorType\n| sort -count","m":"WHEA events are logged automatically by Windows on hardware error. EventCode 18=fatal (machine check, NMI), 19=corrected (ECC memory correction, CPU thermal), 47=informational. Track corrected error rates \u2014 rising counts predict imminent failure. Correlate with specific hardware component (CPU, memory DIMM, PCIe device) from ErrorSource field. Alert on any fatal errors and on corrected error rate >10/hour.","z":"Table (errors by host and component), Line chart (corrected error trend), Single value (fatal errors \u2014 target: 0)."},{"i":"1.2.41","n":"Volume Shadow Copy Failures","c":"high","f":"intermediate","v":"VSS failures break backup chains, System Restore, and SQL/Exchange application-consistent snapshots. Often silent until a restore is attempted.","t":"`Splunk_TA_windows`","d":"`sourcetype=WinEventLog:Application` (Source=VSS, EventCode 12289, 12298, 8193, 8194)","q":"index=wineventlog sourcetype=\"WinEventLog:Application\" Source=\"VSS\" EventCode IN (12289, 12298, 8193, 8194)\n| eval issue=case(EventCode=12289,\"VSS writer failed\",EventCode=12298,\"VSS copy failed\",EventCode=8193,\"VSS error\",EventCode=8194,\"VSS error\")\n| stats count by host, issue, EventCode\n| sort -count","m":"VSS events appear in the Application log. EventCode 12289=writer failure (often SQL, Exchange, or Hyper-V writers), 12298=shadow copy creation failure. Common causes: low disk space, I/O timeouts, conflicting backup agents. Alert on any VSS failure \u2014 they directly impact RPO. Correlate with backup job logs to identify which backup product is affected.","z":"Table (VSS errors by host), Timeline, Bar chart (failure types)."},{"i":"1.2.42","n":".NET CLR Performance Monitoring","c":"medium","f":"intermediate","v":".NET garbage collection pauses and high exception rates cause application latency and instability. CLR monitoring reveals issues invisible to external health checks.","t":"`Splunk_TA_windows`","d":"`sourcetype=Perfmon:dotNET_CLR_Memory` (counters: % Time in GC, Gen 2 Collections)","q":"index=perfmon sourcetype=\"Perfmon:dotNET_CLR_Memory\" counter=\"% Time in GC\" instance!=\"_Global_\"\n| timechart span=5m avg(Value) as pct_gc by host, instance\n| where pct_gc > 20","m":"Configure Perfmon inputs for `.NET CLR Memory` object: `% Time in GC`, `# Gen 2 Collections`, `Large Object Heap size`. Also monitor `.NET CLR Exceptions` \u2192 `# of Exceps Thrown / sec`. >20% time in GC indicates memory pressure in .NET apps. Frequent Gen 2 collections signal large object allocation issues. Target specific app pool instances (w3wp) for IIS applications.","z":"Line chart (GC time %), Bar chart (Gen 2 collections by app), Dual-axis (GC time + exceptions)."},{"i":"1.2.43","n":"Failover Cluster Event Monitoring","c":"critical","f":"beginner","v":"Cluster failovers indicate node failures or network partitions affecting high-availability services. Each failover risks brief downtime and potential data loss.","t":"`Splunk_TA_windows`","d":"`sourcetype=WinEventLog:Microsoft-Windows-FailoverClustering/Operational` (EventCode 1069, 1177, 1205, 1254)","q":"index=wineventlog source=\"WinEventLog:Microsoft-Windows-FailoverClustering/Operational\"\n  EventCode IN (1069, 1177, 1205, 1254)\n| eval event=case(EventCode=1069,\"Resource failed\",EventCode=1177,\"Quorum lost\",EventCode=1205,\"Cluster service stopped\",EventCode=1254,\"Node removed\")\n| table _time, host, event, EventCode, ResourceName, NodeName\n| sort -_time","m":"Enable FailoverClustering Operational log on all cluster nodes. EventCode 1069=cluster resource failure (triggers failover), 1177=quorum loss (cluster at risk), 1205=cluster service stopped. Alert on quorum loss and resource failures immediately. Track failover frequency \u2014 frequent failovers indicate underlying instability. Monitor cluster network health via EventCode 1123 (network disconnected).","z":"Timeline (failover events), Table (affected resources), Single value (failovers today), Status panel (cluster health)."},{"i":"1.2.44","n":"SMB Share Access Anomalies","c":"high","f":"intermediate","v":"Anomalous SMB share access patterns indicate lateral movement, data exfiltration, or ransomware file encryption across network shares.","t":"`Splunk_TA_windows`","d":"`sourcetype=WinEventLog:Security` (EventCode 5140, 5145)","q":"index=wineventlog sourcetype=\"WinEventLog:Security\" EventCode=5140\n| stats dc(ShareName) as unique_shares count by SubjectUserName, IpAddress\n| where unique_shares > 10 OR count > 1000\n| sort -unique_shares","m":"Enable \"Audit File Share\" and \"Audit Detailed File Share\" in Advanced Audit Policy. EventCode 5140=share accessed, 5145=detailed file access with access check results. Alert when a single user accesses many shares rapidly (lateral movement) or when write volume spikes (ransomware indicator). Baseline normal access patterns per user/role. Note: generates high volume \u2014 filter to sensitive shares or use summary indexing.","z":"Table (top share accessors), Timechart (access rate), Bar chart (shares accessed per user)."},{"i":"1.2.45","n":"Windows Time Service (W32Time) Issues","c":"high","f":"beginner","v":"Time synchronization failures break Kerberos authentication (5-minute tolerance), cause log correlation issues, and invalidate audit trails.","t":"`Splunk_TA_windows`","d":"`sourcetype=WinEventLog:System` (Source=Microsoft-Windows-Time-Service, EventCode 129, 134, 142, 36)","q":"index=wineventlog sourcetype=\"WinEventLog:System\" Source=\"Microsoft-Windows-Time-Service\"\n  EventCode IN (129, 134, 142, 36)\n| eval issue=case(EventCode=129,\"NTP unreachable\",EventCode=134,\"Time difference too large\",EventCode=142,\"Time service stopped\",EventCode=36,\"Time not synced for 24h\")\n| table _time, host, issue, EventCode\n| sort -_time","m":"W32Time events log automatically. EventCode 129=NTP server unreachable, 134=time difference >5 seconds (Kerberos risk), 142=time service stopped, 36=not synced in 24 hours. Domain-joined machines sync to DC; DCs sync to PDC emulator; PDC syncs to external NTP. Alert on any DC time sync failures (Kerberos impact). Monitor non-DC servers for EventCode 36.","z":"Table (time sync issues), Status grid (host \u00d7 sync status), Single value (unsynced hosts)."},{"i":"1.2.46","n":"DFS-R Replication Backlog","c":"high","f":"intermediate","v":"DFS-R replication backlogs mean file servers are out of sync. Users may access stale data, and a prolonged backlog can trigger an initial sync (full re-replication).","t":"`Splunk_TA_windows`","d":"`sourcetype=WinEventLog:DFS Replication` (EventCode 4012, 4302, 4304, 5002, 5008)","q":"index=wineventlog source=\"WinEventLog:DFS Replication\" EventCode IN (4012, 4302, 4304, 5002, 5008)\n| eval issue=case(EventCode=4012,\"Auto-recovery started\",EventCode=4302,\"Staging quota exceeded\",EventCode=4304,\"Backlog exceeded limit\",EventCode=5002,\"Initial sync unexpected\",EventCode=5008,\"Connection failed\")\n| table _time, host, issue, ReplicationGroupName, PartnerName\n| sort -_time","m":"Forward DFS Replication event logs from all DFS members. EventCode 4304=backlog exceeds threshold (default 100 files), 5008=connection failure between partners. Alert on backlog thresholds and connection failures. Monitor EventCode 4012 (auto-recovery) \u2014 frequent occurrences indicate unstable replication. Use `dfsrdiag backlog` via scripted input for precise backlog counts.","z":"Table (replication issues), Line chart (backlog trend), Status grid (partner \u00d7 status)."},{"i":"1.2.47","n":"Application Crash (WER) Trending","c":"medium","f":"intermediate","v":"Windows Error Reporting captures crash details for all applications. Trending reveals systemic instability, bad patches, or problematic application versions.","t":"`Splunk_TA_windows`","d":"`sourcetype=WinEventLog:Application` (EventCode 1000, 1001, 1002)","q":"index=wineventlog sourcetype=\"WinEventLog:Application\" EventCode IN (1000, 1002)\n| eval crash_app=coalesce(Application, param1)\n| stats count by host, crash_app, EventCode\n| where count > 3\n| sort -count","m":"EventCode 1000=application crash with fault details (module, exception code, offset), 1002=application hang detected. Aggregate by faulting application and module across the fleet. Spikes after patch deployment indicate regression. Alert on critical applications (e.g., w3wp.exe, sqlservr.exe, lsass.exe). Use EventCode 1001 (WER bucket data) for deduplication.","z":"Bar chart (top crashing apps), Timechart (crash rate over time), Table (crash details by module)."},{"i":"1.2.48","n":"PowerShell Script Block Logging","c":"high","f":"intermediate","v":"Script Block Logging captures the full text of every PowerShell script executed, including deobfuscated code. Essential for detecting fileless attacks and encoded commands.","t":"`Splunk_TA_windows`","d":"`sourcetype=WinEventLog:Microsoft-Windows-PowerShell/Operational` (EventCode 4104)","q":"index=wineventlog sourcetype=\"WinEventLog:Microsoft-Windows-PowerShell/Operational\" EventCode=4104\n| search ScriptBlockText IN (\"*Invoke-Mimikatz*\",\"*Net.WebClient*\",\"*DownloadString*\",\"*IEX*\",\"*-enc*\",\"*FromBase64*\",\"*Invoke-Expression*\")\n| table _time, host, Path, ScriptBlockText, UserName\n| sort -_time","m":"Enable Script Block Logging via GPO: Computer Configuration \u2192 Administrative Templates \u2192 Windows PowerShell \u2192 Turn on PowerShell Script Block Logging. EventCode 4104 logs the full script text, including auto-deobfuscation. Search for suspicious keywords: `Invoke-Expression`, `Net.WebClient`, `DownloadString`, `FromBase64String`, `Invoke-Mimikatz`. High volume \u2014 consider targeted alerting and summary indexing. Complements EventCode 4688 (process creation with command line).","z":"Table (suspicious scripts), Timeline, Bar chart (script execution by host), Search interface for threat hunting."},{"i":"1.2.49","n":"Lateral Movement via Explicit Credentials","c":"critical","f":"advanced","v":"Logon type 9 (NewCredentials / RunAs /netonly) and type 10 (RDP) from unexpected sources reveal credential abuse and lateral movement between systems.","t":"`Splunk_TA_windows`","d":"`sourcetype=WinEventLog:Security` (EventCode 4624, Logon Type 3, 9, 10)","q":"index=wineventlog sourcetype=\"WinEventLog:Security\" EventCode=4624 LogonType IN (9, 10)\n| stats count values(LogonType) as types by TargetUserName, IpAddress, host\n| where count > 5\n| lookup admin_accounts.csv user as TargetUserName OUTPUT is_admin\n| where is_admin=\"true\"\n| sort -count","m":"Collect Security logs from all servers. Logon type 9=NewCredentials (runas /netonly \u2014 commonly used with stolen hashes), type 10=RemoteInteractive (RDP). Focus on admin accounts authenticating to servers they don't normally access. Build a baseline of normal admin\u2192server mappings. Alert when an admin authenticates to >3 new hosts in an hour. Correlate with process creation (4688) on the destination.","z":"Network graph (source\u2192destination), Table (unusual logons), Timechart (logon rate by type)."},{"i":"1.2.50","n":"DNS Debug Query Logging","c":"medium","f":"intermediate","v":"DNS query logging reveals C2 communication via DNS tunneling, DGA domains, and unauthorized DNS resolution. Essential for security visibility.","t":"`Splunk_TA_windows`","d":"`sourcetype=WinEventLog:Microsoft-Windows-DNS-Server/Analytical` or DNS debug log file","q":"index=dns sourcetype=\"MSAD:NT6:DNS\" query_type IN (TXT, NULL, CNAME)\n| stats count avg(query_length) as avg_len by query, client_ip\n| where avg_len > 50 OR count > 100\n| sort -avg_len","m":"Enable DNS Analytical logging on Windows DNS servers or DNS debug logging to file (dnscmd /config /logfilepath). Forward via Splunk_TA_windows or Splunk Add-on for Microsoft DNS. Long TXT queries (>50 chars) and high-frequency CNAME lookups indicate DNS tunneling. Queries to recently registered domains or high-entropy names suggest DGA malware. Baseline normal query patterns, then alert on anomalies.","z":"Table (suspicious queries), Bar chart (query types), Timechart (query volume), Top domains."},{"i":"1.2.51","n":"Process Creation with Command Line Auditing","c":"high","f":"intermediate","v":"Full command-line visibility on process creation is the foundation of threat detection. Reveals encoded PowerShell, LOLBin abuse, and suspicious child processes.","t":"`Splunk_TA_windows`","d":"`sourcetype=WinEventLog:Security` (EventCode 4688)","q":"index=wineventlog sourcetype=\"WinEventLog:Security\" EventCode=4688\n| where match(CommandLine, \"(?i)(certutil.*-urlcache|bitsadmin.*\\/transfer|mshta.*http|regsvr32.*\\/s.*\\/n.*\\/u|rundll32.*javascript)\")\n| table _time, host, SubjectUserName, NewProcessName, CommandLine, ParentProcessName\n| sort -_time","m":"Enable \"Audit Process Creation\" and \"Include command line in process creation events\" via GPO (Computer Configuration \u2192 Administrative Templates \u2192 System \u2192 Audit Process Creation). EventCode 4688 then includes full CommandLine. Search for known LOLBins (Living Off the Land Binaries): certutil, bitsadmin, mshta, regsvr32, rundll32 with suspicious parameters. High volume \u2014 use summary indexing or data model acceleration.","z":"Table (suspicious processes), Timeline, Search interface for hunting."},{"i":"1.2.52","n":"NIC Teaming / LBFO Failover","c":"high","f":"beginner","v":"NIC team member failures reduce re

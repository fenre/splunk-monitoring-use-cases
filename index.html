\" OR queue_name=\"*dlq*\" OR queue_name=\"*error*\"\n| where messages > 0\n| table _time, vhost, queue_name, messages, message_stats.publish_details.rate","m":"Monitor DLQ/DLT queues specifically. Alert when any DLQ has messages (should normally be 0). Track DLQ ingestion rate to detect ongoing issues. Sample DLQ messages for root cause analysis.","z":"Single value (total DLQ messages), Table (DLQs with counts), Line chart (DLQ growth over time)."},{"i":"8.3.6","n":"Message Throughput Trending","c":"medium","f":"beginner","v":"Throughput trending identifies capacity limits and validates scaling decisions. Unexpected drops indicate producer or broker issues.","t":"JMX, broker management APIs","d":"Kafka broker metrics (MessagesInPerSec), RabbitMQ message rates","q":"index=kafka sourcetype=\"kafka:broker\"\n| timechart span=5m sum(MessagesInPerSec) as msgs_in, sum(BytesInPerSec) as bytes_in","m":"Poll broker throughput metrics via JMX. Track messages and bytes in/out per broker and per topic. Baseline normal patterns. Alert on sudden throughput drops (possible producer failure).","z":"Line chart (throughput over time), Stacked area (throughput by topic), Dual-axis (messages + bytes)."},{"i":"8.3.7","n":"Topic/Queue Creation Audit","c":"medium","f":"beginner","v":"Uncontrolled topic/queue creation can lead to resource sprawl. Audit trail supports governance and cleanup.","t":"Broker audit logs, Kafka authorizer logs","d":"Kafka authorizer logs, RabbitMQ audit log, broker event logs","q":"index=kafka sourcetype=\"kafka:authorizer\"\n| search operation=\"Create\" resource_type=\"Topic\"\n| table _time, principal, resource_name, allowed","m":"Enable Kafka authorizer logging or audit log. Forward broker logs to Splunk. Parse topic/queue creation events. Alert on creation of topics matching naming convention violations. Report on topic inventory growth.","z":"Table (created topics with details), Timeline (creation events), Bar chart (topics created per week)."},{"i":"8.3.8","n":"Consumer Group Rebalancing","c":"high","f":"intermediate","v":"Frequent rebalances cause processing pauses and duplicate message delivery. Detection identifies unstable consumers.","t":"Kafka broker logs, JMX","d":"Kafka GroupCoordinator logs, consumer group state","q":"index=kafka sourcetype=\"kafka:server\"\n| search \"Preparing to rebalance group\" OR \"Stabilized group\"\n| rex \"group (?<consumer_group>\\S+)\"\n| stats count by consumer_group\n| where count > 5","m":"Parse Kafka broker logs for rebalance events. Track rebalance frequency per consumer group. Alert when rebalances occur more than 5 times per hour. Correlate with consumer heartbeat timeouts and session timeouts.","z":"Bar chart (rebalances per consumer group), Timeline (rebalance events), Line chart (rebalance frequency trend)."},{"i":"8.3.9","n":"Partition Leader Elections","c":"high","f":"beginner","v":"Frequent leader elections indicate broker instability, causing temporary unavailability for affected partitions.","t":"JMX, Kafka controller logs","d":"Kafka JMX (`LeaderElectionRateAndTimeMs`), controller logs","q":"index=kafka sourcetype=\"kafka:controller\"\n| search \"leader\" \"election\"\n| timechart span=15m count as elections\n| where elections > 10","m":"Monitor Kafka controller logs and JMX metrics. Track leader election rate and duration. Alert on elevated election rates. Correlate with broker restarts, network events, and ZooKeeper/KRaft issues.","z":"Line chart (elections over time), Single value (elections per hour), Table (affected topics/partitions)."},{"i":"8.3.10","n":"Message Age Monitoring","c":"high","f":"intermediate","v":"Old messages in queues indicate processing delays that may violate SLAs. Age tracking provides a business-relevant metric beyond raw queue depth.","t":"Queue management API","d":"RabbitMQ management API (message age), custom consumer timestamp comparison","q":"index=messaging sourcetype=\"rabbitmq:queue\"\n| eval message_age_sec=now()-oldest_message_timestamp\n| where message_age_sec > 300\n| table queue_name, vhost, messages, message_age_sec\n| sort -message_age_sec","m":"Poll message age metrics from queue management APIs. For Kafka, compare consumer offset timestamp with current time. Alert when message age exceeds SLA (e.g., >5 minutes for real-time queues). Differentiate by queue priority.","z":"Table (queues with old messages), Bar chart (message age by queue), Single value (max message age)."}]},{"i":"8.4","n":"API Gateways & Service Mesh","u":[{"i":"8.4.1","n":"API Error Rate by Endpoint","c":"critical","f":"intermediate","v":"Per-endpoint error rates pinpoint failing services, enabling targeted debugging rather than broad investigation.","t":"Custom log input, gateway access logs","d":"API gateway access logs (Kong, Apigee, AWS API Gateway)","q":"index=api sourcetype=\"kong:access\"\n| eval is_error=if(status>=400,1,0)\n| stats count, sum(is_error) as errors by request_uri, upstream_service\n| eval error_rate=round(errors/count*100,2)\n| where error_rate > 5\n| sort -error_rate","m":"Forward API gateway access logs to Splunk. Parse endpoint, status code, latency, and consumer identity. Calculate error rates per endpoint. Alert when any endpoint exceeds error threshold. Break down by 4xx vs 5xx.","z":"Table (endpoints with error rates), Bar chart (error rate by endpoint), Line chart (error rate trend per endpoint)."},{"i":"8.4.2","n":"API Latency Percentiles","c":"high","f":"beginner","v":"P95/P99 latency reveals the experience of the slowest users. Averages hide tail latency problems.","t":"Custom log input, gateway metrics","d":"API gateway access logs with latency fields","q":"index=api sourcetype=\"kong:access\"\n| stats perc50(latency) as p50, perc95(latency) as p95, perc99(latency) as p99 by request_uri\n| where p95 > 1000\n| sort -p99","m":"Ensure gateway logs include request and upstream latency. Calculate p50/p95/p99 per endpoint. Alert when p95 exceeds SLA target. Track percentile trends to detect gradual degradation before it becomes critical.","z":"Line chart (p50/p95/p99 over time), Table (endpoints with high latency), Histogram (latency distribution)."},{"i":"8.4.3","n":"Rate Limiting Events","c":"medium","f":"beginner","v":"Rate limiting indicates consumers exceeding their quotas. May signal API abuse, misconfigured clients, or quota adjustments needed.","t":"Gateway logs","d":"API gateway rate limit logs (429 responses)","q":"index=api sourcetype=\"kong:access\" status=429\n| stats count by consumer_id, request_uri\n| sort -count","m":"Track 429 responses from API gateway. Identify rate-limited consumers and endpoints. Alert on sustained rate limiting for critical consumers. Review quota configuration if legitimate traffic is being limited.","z":"Bar chart (rate-limited consumers), Line chart (429 rate over time), Table (rate limit events)."},{"i":"8.4.4","n":"Authentication Failures","c":"high","f":"intermediate","v":"Authentication failures may indicate credential compromise, API key rotation issues, or brute-force attacks.","t":"Gateway auth logs","d":"API gateway authentication logs (401/403 responses), OAuth error logs","q":"index=api sourcetype=\"kong:access\" status IN (401, 403)\n| stats count by consumer_id, src_ip, request_uri\n| where count > 50\n| sort -count","m":"Track 401/403 responses with source IP and consumer identity. Alert on high failure rates from single sources (potential brute force). Correlate with successful authentications to detect account compromise patterns.","z":"Table (auth failures by consumer/IP), Line chart (failure rate over time), Geo map (failures by source location)."},{"i":"8.4.5","n":"Service-to-Service Call Failures","c":"critical","f":"intermediate","v":"Inter-service communication failures in microservices architectures cascade quickly. Detection enables rapid isolation of failing services.","t":"Istio/Envoy access logs, Linkerd tap","d":"Envoy access logs (upstream_cluster, response_code), Istio telemetry","q":"index=mesh sourcetype=\"envoy:access\"\n| where response_code >= 500\n| stats count by upstream_cluster, downstream_cluster, response_code\n| sort -count","m":"Configure Envoy/Istio to export access logs to Splunk. Parse source service, destination service, status code, and latency. Build service dependency map. Alert on inter-service error rate spikes. Track per-service error budgets.","z":"Service dependency map (with error highlighting), Table (failing service pairs), Heatmap (service \u00d7 service error rate)."},{"i":"8.4.6","n":"Circuit Breaker Activations","c":"critical","f":"intermediate","v":"Circuit breaker trips indicate a downstream service is failing. Quick detection enables proactive communication and remediation.","t":"Service mesh metrics, Envoy stats","d":"Envoy cluster stats (circuit breaker metrics), Istio DestinationRule events","q":"index=mesh sourcetype=\"envoy:stats\"\n| search \"circuit_breaker\" \"cx_open\" OR \"rq_open\"\n| stats count by upstream_cluster\n| where count > 0","m":"Monitor Envoy circuit breaker metrics. Alert on any circuit breaker opening. Track circuit breaker state transitions. Correlate with upstream service health to validate circuit breaker configuration thresholds.","z":"Status grid (service \u00d7 circuit breaker state), Timeline (circuit breaker events), Table (active circuit breakers)."},{"i":"8.4.7","n":"API Consumer Usage Tracking","c":"medium","f":"intermediate","v":"Usage tracking per API consumer enables billing, quota management, and partner relationship management.","t":"Gateway access logs","d":"API gateway logs with consumer identification (API key, OAuth client ID)","q":"index=api sourcetype=\"kong:access\"\n| stats count, sum(request_size) as total_bytes, avg(latency) as avg_latency by consumer_id\n| sort -count","m":"Ensure API gateway logs include consumer identity. Aggregate usage by consumer, endpoint, and time period. Create monthly usage reports for billing/chargeback. Track usage trends per consumer for capacity planning.","z":"Table (consumer usage summary), Bar chart (top consumers), Line chart (usage trends per consumer), Pie chart (traffic by consumer)."},{"i":"8.4.8","n":"mTLS Certificate Expiration","c":"critical","f":"intermediate","v":"Expired mTLS certificates break service-to-service communication, causing complete mesh failures. Proactive monitoring is essential.","t":"Service mesh metrics, scripted input","d":"Istio/Linkerd certificate metadata, `istioctl proxy-config` output","q":"index=mesh sourcetype=\"istio:cert_status\"\n| eval days_until_expiry=round((cert_expiry_epoch-now())/86400)\n| where days_until_expiry < 7\n| table service, namespace, days_until_expiry, issuer\n| sort days_until_expiry","m":"Monitor Istio/Linkerd certificate lifetimes. For auto-rotated certs, verify rotation is working by tracking cert age. Alert when certs approach expiry or rotation fails. Monitor CA health (Citadel, cert-manager).","z":"Table (certs with expiry), Single value (certs expiring within 7d), Timeline (cert rotation events)."}]},{"i":"8.5","n":"Caching Layers","u":[{"i":"8.5.1","n":"Cache Hit/Miss Ratio","c":"high","f":"advanced","v":"Cache hit ratio directly measures cache effectiveness. Declining ratio means more backend load and higher latency.","t":"Custom scripted input (`redis-cli INFO`)","d":"Redis INFO stats, Memcached stats, Varnish stats","q":"index=cache sourcetype=\"redis:info\"\n| eval hit_ratio=round(keyspace_hits/(keyspace_hits+keyspace_misses)*100,2)\n| timechart span=5m avg(hit_ratio) as cache_hit_pct by host\n| where cache_hit_pct < 90","m":"Run `redis-cli INFO` via scripted input every minute. Parse keyspace_hits and keyspace_misses. Calculate hit ratio. Alert when ratio drops below 90%. Correlate with application deployment events (new code may change access patterns).","z":"Gauge (hit ratio %), Line chart (hit ratio over time), Single value (current hit ratio)."},{"i":"8.5.2","n":"Memory Utilization","c":"high","f":"beginner","v":"Cache memory exhaustion triggers evictions, degrading performance. Monitoring enables timely scaling.","t":"Custom scripted input","d":"Redis INFO memory, Memcached stats","q":"index=cache sourcetype=\"redis:info\"\n| eval mem_pct=round(used_memory/maxmemory*100,1)\n| timechart span=5m max(mem_pct) as memory_pct by host\n| where memory_pct > 85","m":"Poll memory metrics every minute. Track used vs max memory and RSS vs used ratio (fragmentation). Alert at 85% memory usage. Monitor memory fragmentation ratio \u2014 values >1.5 indicate excessive fragmentation.","z":"Gauge (% memory used), Line chart (memory usage over time), Table (instances approaching limit)."},{"i":"8.5.3","n":"Eviction Rate Trending","c":"high","f":"beginner","v":"High eviction rates mean the cache is too small, causing frequent backend roundtrips. Tracking guides capacity decisions.","t":"Custom scripted input","d":"Redis INFO stats (evicted_keys), Memcached stats (evictions)","q":"index=cache sourcetype=\"redis:info\"\n| timechart span=5m per_second(evicted_keys) as eviction_rate by host\n| where eviction_rate > 10","m":"Track evicted_keys counter over time. Calculate eviction rate per second. Alert when eviction rate exceeds threshold. Correlate with memory usage \u2014 evictions with memory below max indicates maxmemory-policy is active.","z":"Line chart (eviction rate over time), Single value (current eviction rate), Dual-axis (evictions + memory usage)."},{"i":"8.5.4","n":"Connection Count Monitoring","c":"medium","f":"beginner","v":"Approaching connection limits causes client rejections. Monitoring enables proactive limit adjustment.","t":"Custom scripted input","d":"Redis INFO clients, Memcached stats","q":"index=cache sourcetype=\"redis:info\"\n| timechart span=5m max(connected_clients) as clients, max(maxclients) as limit by host\n| eval pct=round(clients/limit*100,1)\n| where pct > 80","m":"Poll connection metrics every minute. Track connected clients vs maxclients setting. Alert at 80% threshold. Monitor rejected connections counter for actual connection refusals.","z":"Line chart (connections over time), Gauge (% of max), Single value (current connections)."},{"i":"8.5.5","n":"Replication Lag (Redis)","c":"high","f":"beginner","v":"Redis replication lag affects read consistency for apps reading from replicas. Monitoring ensures data freshness.","t":"Custom scripted input","d":"Redis INFO replication (`master_repl_offset`, `slave_repl_offset`)","q":"index=cache sourcetype=\"redis:info\" role=\"slave\"\n| eval lag_bytes=master_repl_offset-slave_repl_offset\n| timechart span=1m max(lag_bytes) as repl_lag by host\n| where repl_lag > 1000000","m":"Poll Redis INFO replication from replicas every minute. Calculate byte offset lag. Alert when lag exceeds threshold (e.g., >1MB or growing). Monitor replication link status (master_link_status).","z":"Line chart (replication lag over time), Single value (current lag), Table (replica status)."},{"i":"8.5.6","n":"Slow Command Detection","c":"high","f":"advanced","v":"Slow Redis commands block the single-threaded event loop, impacting all clients. Detection enables command optimization.","t":"Custom scripted input (`SLOWLOG GET`)","d":"Redis SLOWLOG","q":"index=cache sourcetype=\"redis:slowlog\"\n| table _time, host, duration_ms, command, key\n| where duration_ms > 10\n| sort -duration_ms","m":"Run `redis-cli SLOWLOG GET 100` via scripted input every minute. Parse command, duration, and key pattern. Alert on commands exceeding 10ms. Identify O(N) commands (KEYS, SMEMBERS on large sets) for optimization.","z":"Table (slow commands with details), Bar chart (slow commands by type), Line chart (slow command frequency)."},{"i":"8.5.7","n":"Key Expiration Trending","c":"medium","f":"beginner","v":"Monitoring TTL patterns ensures cache freshness strategy is working. Unusual patterns may indicate application bugs.","t":"Custom scripted input","d":"Redis INFO keyspace (expires, expired_keys)","q":"index=cache sourcetype=\"redis:info\"\n| eval expire_pct=round(expires/keys*100,1)\n| timechart span=15m avg(expire_pct) as pct_with_ttl, per_second(expired_keys) as expire_rate by host","m":"Track keys with TTL vs total keys. Monitor expiration rate. Alert if expire_pct drops significantly (new code not setting TTL on keys). Track expired_stale_perc for lazy expiration health.","z":"Line chart (expiration rate), Dual-axis (keys with TTL % + expiration rate), Single value (% keys with TTL)."}]}]},{"i":9,"n":"Identity & Access Management","s":[{"i":"9.1","n":"Active Directory / Entra ID","u":[{"i":"9.1.1","n":"Brute-Force Login Detection","c":"critical","f":"intermediate","v":"Brute-force attacks are a primary credential compromise vector. Early detection prevents account takeover.","t":"`Splunk_TA_windows`","d":"Windows Security Event Log (Event ID 4625 \u2014 failed logon)","q":"index=wineventlog sourcetype=\"WinEventLog:Security\" EventCode=4625\n| stats count by Account_Name, Source_Network_Address\n| where count > 10\n| sort -count","m":"Forward Security logs from DCs via UF. Enable \"Audit Logon Events\" via GPO. Alert on >10 failures per account per 15 minutes. Correlate with lockout events (4740). Whitelist known service accounts with expected failures.","z":"Table (accounts with failure counts), Line chart (failure rate over time), Geo map (source IPs)."},{"i":"9.1.2","n":"Account Lockout Monitoring","c":"high","f":"beginner","v":"Lockouts cause user productivity loss and help desk load. Source identification enables rapid resolution.","t":"`Splunk_TA_windows`","d":"Security Event Log (Event ID 4740 \u2014 account locked out)","q":"index=wineventlog sourcetype=\"WinEventLog:Security\" EventCode=4740\n| table _time, Account_Name, CallerComputerName\n| sort -_time","m":"Forward DC Security logs. Alert on each lockout with source workstation included. Create report of recurring lockouts for proactive investigation. Correlate with 4625 events to find the failing source.","z":"Table (lockouts with source), Bar chart (top locked accounts), Line chart (lockout trend)."},{"i":"9.1.3","n":"Privileged Group Membership Changes","c":"critical","f":"beginner","v":"Unauthorized privilege escalation is a primary attack technique. Immediate detection is essential for security.","t":"`Splunk_TA_windows`","d":"Security Event Log (4728 \u2014 member added to security-enabled global group, 4732 \u2014 local group, 4756 \u2014 universal group)","q":"index=wineventlog sourcetype=\"WinEventLog:Security\" EventCode IN (4728,4732,4756)\n| search TargetUserName IN (\"Domain Admins\",\"Enterprise Admins\",\"Schema Admins\",\"Administrators\")\n| table _time, MemberName, TargetUserName, SubjectUserName","m":"Forward DC Security logs. Create alert for any membership change to privileged groups (Domain Admins, Enterprise Admins, Schema Admins, Backup Operators). Integrate with change management for validation.","z":"Table (membership changes), Timeline (change events), Single value (changes this week)."},{"i":"9.1.4","n":"Service Account Anomalies","c":"critical","f":"intermediate","v":"Service accounts used interactively or from unexpected hosts indicate compromise. Detection prevents lateral movement.","t":"`Splunk_TA_windows`","d":"Security Event Log (4624 \u2014 successful logon, Logon Type field)","q":"index=wineventlog sourcetype=\"WinEventLog:Security\" EventCode=4624\n| lookup service_accounts.csv Account_Name OUTPUT expected_hosts, account_type\n| where account_type=\"service\" AND (Logon_Type=2 OR Logon_Type=10 OR NOT match(src_host, expected_hosts))\n| table _time, Account_Name, Logon_Type, src_host","m":"Maintain lookup of service accounts with expected Logon Types and source hosts. Alert on interactive logon (Type 2, 10) or unexpected source. Regularly audit service account inventory with AD queries.","z":"Table (anomalous service account usage), Timeline (events), Bar chart (anomalies by account)."},{"i":"9.1.5","n":"Kerberos Ticket Anomalies","c":"critical","f":"beginner","v":"Detects Kerberoasting and Golden Ticket attacks, which are advanced AD compromise techniques. Essential for security monitoring.","t":"`Splunk_TA_windows`","d":"Security Event Log (4768 \u2014 TGT request, 4769 \u2014 TGS request)","q":"index=wineventlog sourcetype=\"WinEventLog:Security\" EventCode=4769 Ticket_Encryption_Type=0x17\n| stats count by Account_Name, Service_Name\n| where count > 5\n| sort -count","m":"Forward 4768/4769 events from DCs. Detect Kerberoasting by filtering for RC4 encryption (0x17) on TGS requests. Detect Golden Ticket by looking for TGT requests with unusual encryption types or from non-DC sources.","z":"Table (suspicious Kerberos requests), Bar chart (requests by encryption type), Timeline (anomalous events)."},{"i":"9.1.6","n":"Password Policy Violations","c":"medium","f":"beginner","v":"Failed password changes indicate users struggling with policy or potential social engineering. Monitoring supports security awareness.","t":"`Splunk_TA_windows`","d":"Security Event Log (4723 \u2014 password change attempt, 4724 \u2014 password reset attempt)","q":"index=wineventlog sourcetype=\"WinEventLog:Security\" EventCode IN (4723, 4724)\n| stats count(eval(Keywords=\"Audit Failure\")) as failures, count(eval(Keywords=\"Audit Success\")) as successes by Account_Name\n| where failures > 3","m":"Forward DC Security logs. Track password change success/failure rates. Alert on excessive failures per user. Monitor 4724 (admin resets) separately as these bypass self-service and may indicate social engineering.","z":"Table (users with failures), Bar chart (failure rate by user), Pie chart (change vs reset)."},{"i":"9.1.7","n":"GPO Modification Detection","c":"critical","f":"beginner","v":"GPO changes affect all domain-joined machines. Unauthorized modifications can disable security controls across the organization.","t":"`Splunk_TA_windows`","d":"Security Event Log (5136 \u2014 directory service object modified)","q":"index=wineventlog sourcetype=\"WinEventLog:Security\" EventCode=5136\n| search ObjectClass=\"groupPolicyContainer\"\n| table _time, SubjectUserName, ObjectDN, AttributeLDAPDisplayName, AttributeValue","m":"Enable \"Audit Directory Service Changes\" via GPO. Forward DC Security logs. Alert on any GPO modification. Correlate with change management tickets. Track which GPOs are modified most frequently.","z":"Table (GPO changes with details), Timeline (modification events), Bar chart (changes by admin)."},{"i":"9.1.8","n":"AD Replication Monitoring","c":"high","f":"intermediate","v":"Replication failures cause authentication issues, stale group memberships, and inconsistent policy application across sites.","t":"`Splunk_TA_windows`, `repadmin` scripted input","d":"Directory Service event log, `repadmin /showrepl` output","q":"index=wineventlog sourcetype=\"WinEventLog:Directory Service\" EventCode IN (1864,1865,2042,2087)\n| table _time, ComputerName, EventCode, Message\n| sort -_time","m":"Forward Directory Service event logs from DCs. Run `repadmin /showrepl` via scripted input daily. Alert on replication failures (Event IDs 1864, 2042, 2087). Track replication latency between sites.","z":"Table (replication status by DC pair), Status grid (DC \u00d7 replication health), Timeline (failure events)."},{"i":"9.1.9","n":"LDAP Query Performance","c":"medium","f":"beginner","v":"Expensive LDAP queries degrade DC performance affecting authentication for all users. Detection enables query optimization.","t":"`Splunk_TA_windows`, Directory Service diagnostics","d":"Directory Service event log (Event ID 1644 \u2014 expensive search), Field Engineering diagnostics","q":"index=wineventlog sourcetype=\"WinEventLog:Directory Service\" EventCode=1644\n| rex \"Entries Visited\\s+:\\s+(?<entries_visited>\\d+)\"\n| where entries_visited > 10000\n| table _time, ComputerName, entries_visited, Message","m":"Enable LDAP search diagnostics (registry key: \"15 Field Engineering\" value \"Expensive Search Results Threshold\" = 10000). Forward Directory Service logs. Alert on queries visiting >10K entries. Identify and optimize expensive applications.","z":"Table (expensive queries), Bar chart (queries by source application), Line chart (expensive query frequency)."},{"i":"9.1.10","n":"Stale Account Detection","c":"medium","f":"intermediate","v":"Stale accounts are an attack surface \u2014 unused accounts may be compromised without detection. Regular cleanup reduces risk.","t":"Scripted input (PowerShell AD query)","d":"AD attributes (lastLogonTimestamp, pwdLastSet) via scripted input","q":"index=ad sourcetype=\"ad:accounts\"\n| eval days_inactive=round((now()-lastLogon)/86400)\n| where days_inactive > 90 AND enabled=\"True\"\n| table samAccountName, displayName, days_inactive, ou, lastLogon\n| sort -days_inactive","m":"Run PowerShell script querying AD for lastLogonTimestamp weekly. Export to CSV/JSON and ingest. Flag accounts inactive >90 days. Cross-reference with HR systems for departed employees. Report for access review.","z":"Table (stale accounts), Bar chart (stale accounts by OU), Single value (total stale accounts), Pie chart (by account type)."},{"i":"9.1.11","n":"Entra ID Risky Sign-Ins","c":"critical","f":"intermediate","v":"Entra ID Identity Protection detects risky sign-ins using Microsoft's threat intelligence. Ingesting into Splunk enables correlation with on-prem events.","t":"`Splunk_TA_microsoft-cloudservices`","d":"Entra ID sign-in logs, risk detection events (via Graph API)","q":"index=azure sourcetype=\"azure:aad:signin\"\n| where riskLevelDuringSignIn IN (\"high\",\"medium\")\n| table _time, userPrincipalName, ipAddress, location, riskLevelDuringSignIn, riskDetail\n| sort -_time","m":"Configure Splunk Add-on for Microsoft Cloud Services to ingest Entra ID sign-in logs via Graph API. Filter for medium/high risk detections. Alert on high-risk sign-ins. Correlate with on-prem AD events for hybrid investigations.","z":"Table (risky sign-ins), Geo map (sign-in locations), Line chart (risk events over time), Bar chart (risk types)."},{"i":"9.1.12","n":"Conditional Access Policy Failures","c":"high","f":"beginner","v":"Conditional Access blocks indicate non-compliant devices or policy misconfigurations. Monitoring ensures security policies work without excessive user friction.","t":"`Splunk_TA_microsoft-cloudservices`","d":"Entra ID sign-in logs (conditionalAccessStatus field)","q":"index=azure sourcetype=\"azure:aad:signin\" conditionalAccessStatus=\"failure\"\n| stats count by userPrincipalName, appDisplayName, conditionalAccessPolicies{}.displayName\n| sort -count","m":"Ingest Entra ID sign-in logs. Filter for Conditional Access failures. Track failure rates per policy and per user. Alert on sudden spikes indicating policy misconfiguration. Report on most-blocked policies and applications.","z":"Bar chart (failures by policy), Table (blocked users), Line chart (failure rate trend), Pie chart (failures by application)."}]},{"i":"9.2","n":"LDAP Directories","u":[{"i":"9.2.1","n":"Bind Failure Monitoring","c":"high","f":"intermediate","v":"LDAP bind failures indicate authentication issues, misconfigured applications, or brute-force attempts against directory services.","t":"Syslog, LDAP server logs","d":"OpenLDAP syslog, 389 Directory access log","q":"index=ldap sourcetype=\"syslog\" \"BIND\" \"err=49\"\n| stats count by src_ip, bind_dn\n| where count > 10\n| sort -count","m":"Forward LDAP server syslog to Splunk. Parse bind operations and result codes (err=49 = invalid credentials). Alert on >10 failures per source per 15 minutes. Correlate with application health monitoring.","z":"Table (bind failures by source/DN), Line chart (failure rate), Bar chart (top failing sources)."},{"i":"9.2.2","n":"Search Performance Degradation","c":"medium","f":"beginner","v":"Slow LDAP searches impact all applications relying on directory services for authentication and authorization.","t":"LDAP access log parsing","d":"OpenLDAP access log (search duration), 389 Directory access log","q":"index=ldap sourcetype=\"openldap:access\" operation=\"SEARCH\"\n| where elapsed_ms > 1000\n| stats count, avg(elapsed_ms) as avg_ms by base_dn, filter\n| sort -avg_ms","m":"Enable LDAP access logging with timing information. Parse search operations with duration. Alert on searches exceeding 1 second. Identify expensive filters (unindexed attributes, broad base DN). Recommend index creation.","z":"Table (slow searches), Bar chart (avg duration by filter), Line chart (search latency trend)."},{"i":"9.2.3","n":"Schema Modification Audit","c":"critical","f":"beginner","v":"Schema changes to directory services can break applications and are rarely expected. Detection ensures change control compliance.","t":"LDAP audit log","d":"LDAP server audit log (schema modification events)","q":"index=ldap sourcetype=\"openldap:audit\"\n| search \"cn=schema\" (\"add:\" OR \"delete:\" OR \"replace:\")\n| table _time, modifier_dn, changetype, modification","m":"Enable LDAP audit logging (overlay in OpenLDAP, audit log in 389 DS). Forward to Splunk. Alert on any schema modification. These should be extremely rare and always correlated with change tickets.","z":"Timeline (schema changes), Table (change details), Single value (schema changes this month)."},{"i":"9.2.4","n":"Replication Health Monitoring","c":"high","f":"intermediate","v":"LDAP replication failures cause authentication inconsistencies and stale directory data across sites.","t":"Scripted input, LDAP server logs","d":"LDAP replication logs, `ldapsearch` monitoring attributes (contextCSN)","q":"index=ldap sourcetype=\"openldap:syncrepl\"\n| search \"syncrepl\" (\"ERROR\" OR \"RETRY\" OR \"failed\")\n| stats count by host, provider\n| where count > 0","m":"Monitor LDAP replication status via scripted input querying contextCSN or replication agreements. Forward syncrepl logs. Alert on replication failures or increasing lag between providers and consumers.","z":"Status grid (provider \u00d7 consumer health), Table (replication status), Timeline (failure events)."}]},{"i":"9.3","n":"Identity Providers (IdP) & SSO","u":[{"i":"9.3.1","n":"MFA Challenge Failure Rate","c":"high","f":"intermediate","v":"High MFA failure rates indicate user friction, potential phishing, or MFA fatigue attacks. Monitoring supports both security and user experience.","t":"`Splunk_TA_okta`, Splunk_TA_duo","d":"Okta system log, Duo authentication log","q":"index=okta sourcetype=\"OktaIM2:log\" eventType=\"user.authentication.auth_via_mfa\"\n| stats count(eval(outcome.result=\"FAILURE\")) as failures, count(eval(outcome.result=\"SUCCESS\")) as successes by actor.displayName\n| eval fail_rate=round(failures/(failures+successes)*100,1)\n| where fail_rate > 20","m":"Ingest IdP logs via API. Track MFA success/failure rates per user and per factor type. Alert on high failure rates (>20% per user). Detect MFA fatigue patterns (rapid repeated pushes). Report on factor type distribution.","z":"Bar chart (failure rate by user), Pie chart (factor type distribution), Line chart (MFA success rate trend)."},{"i":"9.3.2","n":"Impossible Travel Detection","c":"critical","f":"intermediate","v":"Authentication from two geographically distant locations within an impossibly short timeframe strongly indicates credential compromise.","t":"`Splunk_TA_okta`, custom correlation","d":"IdP sign-in logs with IP geolocation","q":"index=okta sourcetype=\"OktaIM2:log\" eventType=\"user.session.start\"\n| iplocation client.ipAddress\n| sort actor.alternateId, _time\n| streamstats window=2 earliest(_time) as prev_time, earliest(lat) as prev_lat, earliest(lon) as prev_lon by actor.alternateId\n| eval distance_km=... , time_diff_hr=((_time-prev_time)/3600)\n| where distance_km > 500 AND time_diff_hr < 2","m":"Ingest IdP sign-in logs. Enrich with GeoIP. Calculate distance and time between consecutive logins per user. Alert when distance/time ratio is impossible (>500km in <2 hours). Whitelist VPN exit IPs and known travel patterns.","z":"Geo map (sign-in locations with lines), Table (impossible travel events), Timeline (flagged events)."},{"i":"9.3.3","n":"Token Anomaly Detection","c":"critical","f":"intermediate","v":"Token replay attacks bypass authentication entirely. Detection prevents persistent unauthorized access.","t":"`Splunk_TA_okta`, IdP audit logs","d":"IdP token issuance logs, application token validation logs","q":"index=okta sourcetype=\"OktaIM2:log\" eventType=\"app.oauth2.token.grant\"\n| stats count, dc(client.ipAddress) as unique_ips by actor.alternateId, target{}.displayName\n| where unique_ips > 3","m":"Monitor token issuance and usage patterns. Alert on tokens used from multiple IPs (potential replay). Track token lifetime and refresh patterns. Detect anomalous token requests outside normal application patterns.","z":"Table (anomalous token usage), Timeline (suspicious events), Bar chart (tokens by application)."},{"i":"9.3.4","n":"Application Access Patterns","c":"medium","f":"beginner","v":"Monitors which applications users access for license optimization and detects anomalous access indicating potential compromise.","t":"`Splunk_TA_okta`","d":"IdP application access logs","q":"index=okta sourcetype=\"OktaIM2:log\" eventType=\"user.authentication.sso\"\n| stats dc(actor.alternateId) as unique_users, count as total_access by target{}.displayName\n| sort -unique_users","m":"Track SSO events per application. Build user-application access matrix. Detect users accessing applications outside their normal pattern. Report on application usage for license optimization and access reviews.","z":"Bar chart (top applications by user count), Table (application usage summary), Heatmap (user \u00d7 application access)."},{"i":"9.3.5","n":"IdP Availability Monitoring","c":"critical","f":"beginner","v":"IdP outage blocks all SSO authentication across the organization. Rapid detection enables failover and communication.","t":"Scripted input (HTTP check), `Splunk_TA_okta`","d":"IdP status API, synthetic monitoring, Okta system health","q":"index=synthetic sourcetype=\"http_check\" target=\"*.okta.com\"\n| timechart span=1m avg(response_time_ms) as rt, count(eval(status_code>=500)) as errors\n| where rt > 5000 OR errors > 0","m":"Set up synthetic HTTP checks against IdP login endpoints every minute. Track response time and availability. Alert on response time >5 seconds or any 5xx errors. Subscribe to vendor status page updates as secondary source.","z":"Single value (IdP uptime %), Line chart (response time), Status indicator (available/degraded/down)."},{"i":"9.3.6","n":"Phishing-Resistant MFA Adoption","c":"medium","f":"intermediate","v":"Tracks migration from phishable factors (SMS, phone) to phishing-resistant factors (FIDO2, WebAuthn). Supports zero-trust maturity goals.","t":"`Splunk_TA_okta`, IdP MFA enrollment data","d":"IdP MFA enrollment logs, factor type metadata","q":"index=okta sourcetype=\"OktaIM2:log\" eventType=\"user.authentication.auth_via_mfa\"\n| stats count by debugContext.debugData.factor\n| eval factor_type=case(match(factor,\"FIDO\"),\"phishing_resistant\", match(factor,\"push\"),\"medium\", 1=1,\"phishable\")\n| stats sum(count) as total by factor_type","m":"Track MFA factor types used in authentication events. Classify as phishing-resistant (FIDO2, WebAuthn) vs phishable (SMS, voice, email). Report adoption percentages. Set organizational targets for phishing-resistant adoption.","z":"Pie chart (factor type distribution), Line chart (phishing-resistant adoption trend), Table (users still on SMS)."},{"i":"9.3.7","n":"Session Hijacking Detection","c":"critical","f":"intermediate","v":"Sessions used from multiple locations simultaneously indicate session token theft. Detection prevents ongoing unauthorized access.","t":"`Splunk_TA_okta`, IdP session logs","d":"IdP session activity logs, application session logs","q":"index=okta sourcetype=\"OktaIM2:log\"\n| stats dc(client.ipAddress) as unique_ips, values(client.ipAddress) as ips by authenticationContext.externalSessionId, actor.alternateId\n| where unique_ips > 2\n| table actor.alternateId, authenticationContext.externalSessionId, unique_ips, ips","m":"Track session IDs across events. Alert when a single session is used from multiple IP addresses simultaneously (excluding known VPN/proxy IPs). Correlate with user agent changes for additional confidence.","z":"Table (hijacked sessions), Timeline (suspicious session events), Bar chart (users with multi-IP sessions)."}]},{"i":"9.4","n":"Privileged Access Management (PAM)","u":[{"i":"9.4.1","n":"Privileged Session Audit","c":"critical","f":"beginner","v":"Complete audit trail of privileged sessions is required for compliance (SOX, PCI, HIPAA) and security investigation.","t":"Splunk_TA_cyberark, BeyondTrust TA for Splunk","d":"PAM session logs (session start/end, target system, user, protocol)","q":"index=pam sourcetype=\"cyberark:session\"\n| table _time, user, target_host, target_account, protocol, duration_min, session_id\n| sort -_time","m":"Install vendor PAM TA. Forward PAM vault/session logs to Splunk. Track all privileged sessions with full metadata. Alert on sessions outside business hours or to unexpected targets. Retain logs per compliance requirements.","z":"Table (session history), Bar chart (sessions by user), Timeline (privileged access events), Heatmap (user \u00d7 time of day)."},{"i":"9.4.2","n":"Password Checkout Tracking","c":"high","f":"intermediate","v":"Unusual checkout patterns may indicate misuse. Tracking ensures accountability and supports investigations.","t":"Splunk_TA_cyberark","d":"PAM vault logs (password retrieve/checkin events)","q":"index=pam sourcetype=\"cyberark:vault\"\n| search action=\"Retrieve\" OR action=\"Checkin\"\n| transaction user, account maxspan=8h\n| eval checkout_duration_hr=duration/3600\n| where checkout_duration_hr > 4\n| table user, account, target, checkout_duration_hr","m":"Track password checkout and checkin events. Calculate checkout duration. Alert on checkouts exceeding policy limits (e.g., >4 hours). Flag accounts checked out but never checked in (hoarding). Report on checkout frequency per user.","z":"Table (active checkouts), Bar chart (checkout duration by user), Line chart (checkout frequency trend)."},{"i":"9.4.3","n":"Break-Glass Account Usage","c":"critical","f":"beginner","v":"Break-glass accounts provide emergency access and should rarely be used. Any usage requires immediate investigation and documentation.","t":"Splunk_TA_cyberark, custom alert","d":"PAM vault events for break-glass accounts","q":"index=pam sourcetype=\"cyberark:vault\"\n| search account_type=\"break_glass\" OR account IN (\"emergency_admin\",\"firecall_*\")\n| table _time, user, account, target, action\n| sort -_time","m":"Tag break-glass accounts in PAM. Create critical alert for any break-glass access. Require documented reason within 24 hours. Send notifications to security team and management. Track usage frequency for trend reporting.","z":"Single value (break-glass uses this month \u2014 target: 0), Table (usage history), Timeline (break-glass events)."},{"i":"9.4.4","n":"Credential Rotation Compliance","c":"high","f":"intermediate","v":"Overdue password rotations increase exposure window if credentials are compromised. Compliance tracking ensures policy adherence.","t":"PAM TA, scripted input","d":"PAM vault credential metadata (last rotation date, policy)","q":"index=pam sourcetype=\"cyberark:account_inventory\"\n| eval days_since_rotation=round((now()-last_rotation_epoch)/86400)\n| eval overdue=if(days_since_rotation > rotation_policy_days, \"Yes\", \"No\")\n| where overdue=\"Yes\"\n| table account, target, days_since_rotation, rotation_policy_days\n| sort -days_since_rotation","m":"Export credential inventory from PAM periodically. Calculate days since last rotation vs policy requirement. Alert on overdue rotations. Track compliance percentage over time. Report to management monthly.","z":"Table (overdue credentials), Single value (compliance %), Gauge (% compliant), Bar chart (overdue by platform)."},{"i":"9.4.5","n":"Suspicious Session Commands","c":"critical","f":"beginner","v":"Detecting dangerous commands during privileged sessions enables real-time intervention before damage occurs.","t":"CyberArk PSM, BeyondTrust session monitoring","d":"PAM session recordings/keystroke logs","q":"index=pam sourcetype=\"cyberark:psm_transcript\"\n| search command IN (\"rm -rf\",\"format\",\"del /s\",\"DROP DATABASE\",\"shutdown\",\"halt\",\"init 0\")\n| table _time, user, target_host, command, session_id","m":"Enable PAM session recording and command logging. Parse keystroke transcripts. Alert immediately on high-risk commands (rm -rf, format, DROP DATABASE, etc.). Integrate with SOAR for automated session termination on critical detections.","z":"Table (suspicious commands), Timeline (command events), Single value (high-risk commands today)."},{"i":"9.4.6","n":"Vault Health Monitoring","c":"critical","f":"beginner","v":"PAM vault downtime prevents all privileged access, blocking critical operations. Health monitoring ensures continuous availability.","t":"PAM infrastructure monitoring, SNMP","d":"PAM vault system logs, component health APIs","q":"index=pam sourcetype=\"cyberark:vault_health\"\n| stats latest(status) as status, latest(replication_lag) as lag by vault_server, component\n| where status!=\"Running\" OR lag > 300","m":"Monitor PAM vault components (vault server, PVWA, PSM, CPM). Track service availability, replication between primary/DR vault, and component health. Alert on any component failure or replication lag >5 minutes.","z":"Status grid (component \u00d7 health), Single value (vault uptime %), Table (unhealthy components), Line chart (replication lag)."}]}]},{"i":10,"n":"Security Infrastructure","s":[{"i":"10.1","n":"Next-Gen Firewalls (Security-Focused)","u":[{"i":"10.1.1","n":"Threat Prevention Event Trending","c":"critical","f":"intermediate","v":"Trending threat detections reveals attack campaigns, persistent threats, and the effectiveness of security controls.","t":"`Splunk_TA_paloalto`, Splunk_TA_cisco-firepower","d":"Threat logs (IPS, AV, anti-spyware detections)","q":"index=pan sourcetype=\"pan:threat\" severity IN (\"critical\",\"high\")\n| timechart span=1h count by subtype","m":"Forward NGFW threat logs to Splunk via syslog or API. Parse severity, threat name, source/destination, and action. Track by severity and type over time. Alert on critical severity detections. Correlate with endpoint data.","z":"Line chart (threat events by severity), Bar chart (top threats), Table (critical events), Stacked area (threat types over time)."},{"i":"10.1.2","n":"Wildfire / Sandbox Verdicts","c":"critical","f":"beginner","v":"Tracks zero-day and unknown malware detection effectiveness. Malicious verdicts require immediate investigation of affected hosts.","t":"`Splunk_TA_paloalto`","d":"Wildfire submission logs, sandbox analysis results","q":"index=pan sourcetype=\"pan:wildfire\"\n| stats count by verdict, filetype\n| eval verdict_label=case(verdict=0,\"benign\", verdict=1,\"malware\", verdict=2,\"grayware\", verdict=4,\"phishing\")","m":"Enable Wildfire logging on NGFW. Forward submission results to Splunk. Alert immediately on malware verdicts. Track affected users/hosts for investigation. Report on submission volumes and malicious file types.","z":"Pie chart (verdict distribution), Table (malware verdicts with details), Line chart (submissions over time), Bar chart (by file type)."},{"i":"10.1.3","n":"C2 Communication Detection","c":"critical","f":"intermediate","v":"Command-and-control communication indicates active compromise. Detection enables containment before data exfiltration or lateral movement.","t":"`Splunk_TA_paloalto`, threat intel feeds","d":"Threat logs (C2 signatures), URL filtering (malware/C2 categories), DNS logs","q":"index=pan sourcetype=\"pan:threat\" category=\"command-and-control\"\n| stats count, values(dest_ip) as c2_servers by src_ip, src_user\n| sort -count","m":"Enable URL filtering and threat prevention with C2 categories. Forward to Splunk. Alert immediately on any C2 detection. Integrate with threat intel feeds for IP/domain enrichment. Trigger automated containment via SOAR.","z":"Table (C2 detections with source/dest), Geo map (C2 server locations), Timeline (C2 events), Network diagram."},{"i":"10.1.4","n":"DNS Sinkhole Hits","c":"critical","f":"beginner","v":"DNS sinkhole hits confirm infected endpoints attempting to reach malicious domains. Each hit is a confirmed compromise indicator.","t":"`Splunk_TA_paloalto`","d":"DNS proxy logs (sinkhole action), threat logs","q":"index=pan sourcetype=\"pan:threat\" action=\"sinkhole\"\n| stats count by src_ip, domain, threat_name\n| sort -count","m":"Configure DNS sinkhole on NGFW. Forward threat logs with sinkhole actions to Splunk. Alert on each unique source IP hitting sinkhole. Trigger automated endpoint investigation. Track resolution status.","z":"Table (sinkholed hosts with domains), Single value (compromised hosts count), Bar chart (top sinkholed domains)."},{"i":"10.1.5","n":"SSL Decryption Coverage","c":"high","f":"beginner","v":"Encrypted traffic that isn't inspected creates a blind spot. Measuring decryption coverage ensures security visibility.","t":"`Splunk_TA_paloalto`","d":"Decryption statistics, traffic logs (encrypted vs decrypted flags)","q":"index=pan sourcetype=\"pan:traffic\"\n| eval decrypted=if(flags LIKE \"%decrypt%\",1,0)\n| stats sum(decrypted) as decrypted_sessions, count as total_sessions\n| eval coverage_pct=round(decrypted_sessions/total_sessions*100,1)","m":"Enable decryption logging on NGFW. Track percentage of HTTPS traffic being decrypted. Identify exempted destinations and evaluate risk. Report coverage to security leadership. Target >80% coverage.","z":"Single value (decryption coverage %), Pie chart (decrypted vs bypassed), Bar chart (top bypassed destinations)."}]},{"i":"10.2","n":"Intrusion Detection/Prevention (IDS/IPS)","u":[{"i":"10.2.1","n":"Alert Severity Trending","c":"high","f":"beginner","v":"Trending IDS alerts reveals attack patterns, campaign surges, and tuning opportunities. Supports SOC workload planning.","t":"TA-suricata, Splunk_TA_cisco-firepower","d":"IDS/IPS alert logs","q":"index=ids sourcetype=\"snort:alert\"\n| timechart span=1h count by priority","m":"Forward IDS alerts to Splunk via syslog. Normalize severity/priority fields. Track alert volume by severity over time. Identify noisy signatures for tuning. Alert on sudden spikes in high-severity events.","z":"Stacked area (alerts by severity), Line chart (alert volume trend), Table (top alerts today)."},{"i":"10.2.2","n":"Top Targeted Hosts","c":"high","f":"beginner","v":"Identifies the most-attacked internal hosts, prioritizing vulnerability remediation and incident investigation.","t":"IDS/IPS TA","d":"IDS/IPS alert logs (destination host)","q":"index=ids sourcetype=\"snort:alert\" priority<=2\n| stats count, dc(signature) as unique_sigs by dest_ip\n| sort -count\n| head 20","m":"Parse destination IP from IDS alerts. Aggregate by target host. Enrich with CMDB data (asset owner, criticality). Alert when a single host receives multiple high-severity alerts. Trigger vulnerability scan for top targets.","z":"Table (top targeted hosts), Bar chart (alerts by host), Geo map (source attackers)."},{"i":"10.2.3","n":"Signature Coverage Gaps","c":"medium","f":"advanced","v":"Identifying network segments without IDS coverage ensures comprehensive threat detection across the infrastructure.","t":"IDS sensor health monitoring","d":"Sensor health reports, network segment inventory","q":"| inputlookup network_segments.csv\n| join type=left segment_name\n    [search index=ids sourcetype=\"snort:alert\" earliest=-7d\n     | stats count by sensor, segment_name]\n| where isnull(count) OR count=0\n| table segment_name, expected_sensor, count","m":"Maintain network segment inventory with expected IDS sensor mapping. Compare against actual alert data. Alert when a segment has no IDS events for >7 days (sensor may be down or misconfigured).","z":"Table (uncovered segments), Status grid (segment \u00d7 coverage), Single value (coverage %)."},{"i":"10.2.4","n":"False Positive Tracking","c":"medium","f":"advanced","v":"High false positive rates waste analyst time and cause alert fatigue. Systematic tracking drives tuning improvements.","t":"IDS TA + analyst workflow","d":"IDS alerts + analyst disposition data (true/false positive)","q":"index=ids sourcetype=\"snort:alert\"\n| join signature [| inputlookup signature_dispositions.csv]\n| stats count(eval(disposition=\"false_positive\")) as fp, count as total by signature\n| eval fp_rate=round(fp/total*100,1)\n| where fp_rate > 50\n| sort -fp_rate","m":"Track analyst dispositions for IDS alerts (true positive, false positive, benign). Calculate false positive rate per signature. Flag signatures with >50% FP rate for tuning. Report on overall alert quality metrics.","z":"Bar chart (FP rate by signature), Line chart (FP rate trend), Table (signatures needing tuning)."},{"i":"10.2.5","n":"Lateral Movement Detection","c":"critical","f":"intermediate","v":"IDS detections on internal network segments indicate an attacker has breached the perimeter and is moving laterally.","t":"IDS TA (internal sensors)","d":"IDS alerts from internal/east-west sensors","q":"index=ids sourcetype=\"snort:alert\" sensor_zone=\"internal\"\n| search category IN (\"attempted-admin\",\"trojan-activity\",\"policy-violation\",\"misc-attack\")\n| stats count by src_ip, dest_ip, signature\n| sort -count","m":"Deploy IDS sensors on internal network segments (not just perimeter). Forward alerts to Splunk. Alert on any high-severity internal detections. Correlate with AD authentication events and endpoint data for full attack chain visibility.","z":"Network diagram (lateral movement paths), Table (internal IDS alerts), Timeline (attack progression)."}]},{"i":"10.3","n":"Endpoint Detection & Response (EDR)","u":[{"i":"10.3.1","n":"Malware Detection Trending","c":"critical","f":"intermediate","v":"Detection trends reveal campaign targeting, endpoint hygiene, and control effectiveness. Spikes indicate active incidents.","t":"TA-crowdstrike-falcon-event-streams, TA-microsoft-defender","d":"EDR detection events","q":"index=edr sourcetype=\"crowdstrike:detection\"\n| timechart span=1d count by severity","m":"Ingest EDR detection events via TA or API. Normalize detection severity. Track daily detection rates by severity, type, and business unit. Alert on spikes exceeding 2\u00d7 daily baseline. Report on detection-to-response times.","z":"Line chart (detections over time), Bar chart (detections by type), Pie chart (severity distribution)."},{"i":"10.3.2","n":"Quarantine Action Monitoring","c":"high","f":"beginner","v":"Failed quarantine means malware remains active on the endpoint. Monitoring ensures automated remediation is working.","t":"EDR TA","d":"EDR remediation/action logs","q":"index=edr sourcetype=\"crowdstrike:detection\"\n| stats count(eval(action=\"quarantined\")) as quarantined, count(eval(action=\"allowed\")) as allowed by severity\n| eval quarantine_rate=round(quarantined/(quarantined+allowed)*100,1)","m":"Track EDR remediation actions (quarantine, kill process, isolate). Calculate quarantine success rate. Alert on failed quarantine actions. Follow up on \"allowed\" malware detections to ensure analyst review.","z":"Pie chart (action distribution), Single value (quarantine success %), Table (failed quarantine events)."},{"i":"10.3.3","n":"Agent Health Monitoring","c":"high","f":"intermediate","v":"Endpoints without healthy EDR agents are blind spots. Gap detection ensures comprehensive coverage.","t":"EDR TA, scripted input","d":"EDR agent status API, last check-in timestamps","q":"index=edr sourcetype=\"crowdstrike:sensor_health\"\n| eval hours_since_checkin=round((now()-last_seen_epoch)/3600,1)\n| where hours_since_checkin > 24 OR sensor_version < \"6.50\"\n| table hostname, os, sensor_version, hours_since_checkin, status","m":"Poll EDR agent status API daily. Identify agents offline >24 hours, outdated versions, or degraded status. Cross-reference with CMDB for full coverage analysis. Alert on critical servers with unhealthy agents.","z":"Table (unhealthy agents), Single value (% healthy), Pie chart (agent version distribution), Bar chart (offline by OS)."},{"i":"10.3.4","n":"Behavioral Detection Alerts","c":"critical","f":"intermediate","v":"Behavioral detections catch attacks that bypass signatures (fileless malware, LOLBins, living-off-the-land). These are high-fidelity signals.","t":"EDR TA","d":"EDR behavioral/heuristic alerts","q":"index=edr sourcetype=\"crowdstrike:detection\" technique_id=\"T*\"\n| stats count by technique_id, tactic, hostname\n| sort -count","m":"Ingest behavioral detection data. Map to MITRE ATT&CK framework (technique_id, tactic). Alert on high-confidence behavioral detections. Track most common techniques for threat intelligence and red team exercises.","z":"MITRE ATT&CK heatmap, Table (behavioral detections), Bar chart (top techniques)."},{"i":"10.3.5","n":"Endpoint Isolation Events","c":"critical","f":"beginner","v":"Isolation events indicate active incident response. Tracking ensures isolation is maintained and properly lifted when resolved.","t":"EDR TA","d":"EDR containment/isolation logs","q":"index=edr sourcetype=\"crowdstrike:containment\"\n| table _time, hostname, action, initiated_by, reason\n| sort -_time","m":"Track all isolation events (isolate, un-isolate). Alert on isolation events for awareness. Track isolation duration. Alert when endpoints remain isolated >24 hours without resolution. Maintain isolation audit trail.","z":"Table (isolated endpoints), Timeline (isolation events), Single value (currently isolated count)."},{"i":"10.3.6","n":"Threat Hunting Indicators","c":"high","f":"beginner","v":"Proactive threat hunting using EDR telemetry detects stealthy threats that evade automated detection.","t":"EDR TA (telemetry data)","d":"EDR process telemetry, file events, network connections","q":"index=edr sourcetype=\"crowdstrike:events\"\n| search (process_name=\"powershell.exe\" AND command_line=\"*-enc*\")\n    OR (process_name=\"rundll32.exe\" AND parent_process_name!=\"explorer.exe\")\n    OR (process_name=\"certutil.exe\" AND command_line=\"*-urlcache*\")\n| table _time, hostname, user, process_name, command_line, parent_process_name","m":"Ingest EDR telemetry (process creation, network connections, file writes). Create hunting queries for LOLBin usage, encoded PowerShell, suspicious parent-child process relationships. Schedule as recurring searches for continuous hunting.","z":"Table (suspicious indicators), Timeline (hunting hits), Bar chart (indicators by technique)."},{"i":"10.3.7","n":"EDR Coverage Gaps","c":"high","f":"advanced","v":"Identifies endpoints without EDR protection, closing blind spots that attackers exploit.","t":"EDR API + CMDB lookup","d":"EDR agent inventory, CMDB/asset inventory","q":"| inputlookup cmdb_endpoints.csv WHERE os_type IN (\"Windows\",\"Linux\",\"macOS\")\n| join type=left hostname [search index=edr sourcetype=\"crowdstrike:sensor_health\" | stats latest(status) as edr_status by hostname]\n| where isnull(edr_status) OR edr_status!=\"active\"\n| table hostname, os_type, department, edr_status","m":"Export EDR agent inventory and cross-reference with CMDB/AD computer accounts. Identify systems without agents. Report coverage percentage. Alert when coverage drops below target (e.g., <98%). Prioritize critical servers.","z":"Single value (coverage %), Table (uncovered endpoints), Pie chart (covered vs uncovered), Bar chart (gaps by department)."},{"i":"10.3.8","n":"Ransomware Canary Detection","c":"critical","f":"intermediate","v":"EDR-detected mass file encryption patterns provide earliest possible ransomware detection, enabling automated containment.","t":"EDR TA","d":"EDR behavioral detection (mass file modification patterns)","q":"index=edr sourcetype=\"crowdstrike:detection\"\n| search tactic=\"impact\" technique_id=\"T1486\"\n| table _time, hostname, user, process_name, severity, description","m":"Ensure EDR has behavioral ransomware detection enabled. Alert at critical priority on any ransomware behavioral detection. Integrate with SOAR for automated endpoint isolation. Track affected file scope from EDR telemetry.","z":"Single value (ransomware detections \u2014 target: 0), Table (detection details), Timeline (ransomware events)."}]},{"i":"10.4","n":"Email Security","u":[{"i":"10.4.1","n":"Phishing Detection Rate","c":"critical","f":"intermediate","v":"Measures email security effectiveness. Increasing phishing volumes or declining detection rates indicate evolving threats.","t":"Splunk_TA_MS_O365, TA-proofpoint","d":"Email security gateway logs, EOP message trace","q":"index=email sourcetype=\"ms:o365:messageTrace\"\n| eval is_phish=if(match(FilteringResult,\"Phish\") OR match(FilteringResult,\"Spoof\"),1,0)\n| stats sum(is_phish) as phishing_caught, count as total_messages\n| eval phish_rate=round(phishing_caught/total_messages*100,4)","m":"Ingest email security logs (EOP message trace, gateway logs). Track phishing detections over time. Calculate detection rate vs total messages. Alert on spikes in phishing volume. Report on phishing types and targeted users.","z":"Line chart (phishing volume trend), Single value (phishing rate %), Bar chart (phishing by type), Table (top targeted users)."},{"i":"10.4.2","n":"Malicious Attachment Tracking","c":"critical","f":"beginner","v":"Attachment-based threats bypass URL filtering. Tracking by file type reveals attack vectors and informs policy decisions.","t":"Email security TA","d":"Email gateway attachment scanning logs, safe attachments logs","q":"index=email sourcetype=\"ms:o365:messageTrace\"\n| search FilteringResult=\"*malware*\" OR FilteringResult=\"*SafeAttachment*\"\n| stats count by SenderAddress, Subject, FilteringResult\n| sort -count","m":"Enable attachment scanning in email gateway. Ingest scanning results. Track detections by file type, sender domain, and verdict. Alert on malicious attachments reaching users (detection after delivery). Report on blocked attachment statistics.","z":"Bar chart (detections by file type), Table (malicious attachments), Line chart (detection trend), Pie chart (verdict distribution)."},{"i":"10.4.3","n":"URL Click Tracking","c":"critical","f":"beginner","v":"Tracks which users click malicious URLs in emails \u2014 the moment a phishing email becomes an active incident.","t":"Splunk_TA_MS_O365 (Safe Links), Proofpoint URL Defense","d":"URL rewrite/protection logs, click tracking events","q":"index=email sourcetype=\"ms:o365:dlp\" OR sourcetype=\"proofpoint:click\"\n| search verdict=\"malicious\" AND action=\"allowed\"\n| table _time, userPrincipalName, url, verdict, action","m":"Enable Safe Links (M365) or URL Defense (Proofpoint). Ingest click tracking data. Alert immediately when a user clicks a malicious URL. Trigger automated password reset and endpoint scan. Track click-through rates for security awareness metrics.","z":"Table (malicious URL clicks), Bar chart (clicks by user), Timeline (click events), Single value (clicks on malicious URLs today)."},{"i":"10.4.4","n":"DLP Policy Violations","c":"high","f":"beginner","v":"Email DLP violations indicate potential data exfiltration or policy non-compliance. Monitoring supports regulatory compliance.","t":"Splunk_TA_MS_O365","d":"M365 DLP logs, email gateway DLP events","q":"index=email sourcetype=\"ms:o365:dlp\"\n| stats count by PolicyName, UserPrincipalName, SensitiveInformationType\n| sort -count","m":"Configure M365 DLP policies for sensitive data types (SSN, credit card, etc.). Ingest DLP violation events. Alert on high-severity violations. Track violation trends per policy and user for compliance reporting.","z":"Bar chart (violations by policy), Table (top violators), Line chart (violation trend), Pie chart (by data type)."},{"i":"10.4.5","n":"Spoofed Email Detection","c":"high","f":"intermediate","v":"DMARC/SPF/DKIM failures indicate email spoofing attempts. Monitoring validates email authentication configuration.","t":"Email security TA","d":"DMARC aggregate reports, email authentication logs","q":"index=email sourcetype=\"dmarc:aggregate\"\n| where dkim_result!=\"pass\" OR spf_result!=\"pass\"\n| stats count by source_ip, header_from, dkim_result, spf_result, disposition\n| sort -count","m":"Configure DMARC reporting (aggregate to a designated mailbox). Ingest DMARC XML reports. Track authentication failures by sending domain. Alert on spoofing of your own domains. Move toward DMARC p=reject for full protection.","z":"Table (authentication failures), Bar chart (failures by domain), Pie chart (pass vs fail), Line chart (spoofing trend)."},{"i":"10.4.6","n":"Email Volume Anomalies","c":"high","f":"intermediate","v":"Unusual outbound email volumes may indicate compromised accounts used for spam/phishing or mass data exfiltration via email.","t":"Splunk_TA_MS_O365, Splunk_TA_microsoft-exchange","d":"Email message tracking logs (outbound)","q":"index=email sourcetype=\"ms:o365:messageTrace\" Direction=\"Outbound\"\n| stats count by SenderAddress\n| eventstats avg(count) as avg_sent, stdev(count) as stdev_sent\n| where count > avg_sent + 3*stdev_sent\n| table SenderAddress, count, avg_sent","m":"Track outbound email volume per sender. Baseline normal patterns. Alert when any sender exceeds 3\u00d7 standard deviation. Correlate with sign-in events to detect compromised accounts. Report on top senders for capacity planning.","z":"Bar chart (top senders), Line chart (outbound volume trend), Table (anomalous senders)."},{"i":"10.4.7","n":"Quarantine Management","c":"medium","f":"beginner","v":"Tracks quarantine effectiveness and user release requests to balance security with user productivity.","t":"Splunk_TA_MS_O365, email gateway TA","d":"Email quarantine logs, release request logs","q":"index=email sourcetype=\"ms:o365:messageTrace\"\n| search FilteringResult=\"*Quarantine*\"\n| stats count by FilteringResult, SenderAddress\n| sort -count","m":"Track quarantine volumes, reasons, and user release requests. Alert on unusual quarantine rates (may indicate new phishing campaign). Monitor false positive rate (legitimate emails quarantined) for policy tuning.","z":"Bar chart (quarantine reasons), Line chart (quarantine volume trend), Table (release requests), Single value (quarantine rate %)."}]},{"i":"10.5","n":"Web Security / Secure Web Gateway","u":[{"i":"10.5.1","n":"Blocked Category Trending","c":"medium","f":"beginner","v":"Trending blocked categories reveals user behavior patterns and informs acceptable use policy. Spikes may indicate infections.","t":"Splunk Add-on for Cisco Umbrella, TA-zscaler","d":"SWG/proxy logs (URL category, action)","q":"index=proxy sourcetype=\"cisco:umbrella\" action=\"Blocked\"\n| top limit=20 categories","m":"Forward SWG logs to Splunk. Track blocked requests by category over time. Identify trending categories. Alert on spikes in malware/phishing categories. Report on policy effectiveness.","z":"Bar chart (top blocked categories), Line chart (blocks over time), Pie chart (block distribution)."},{"i":"10.5.2","n":"Shadow IT Detection","c":"high","f":"intermediate","v":"Unapproved SaaS usage creates data security risks and compliance gaps. Discovery enables governance and risk assessment.","t":"SWG/CASB TA","d":"SWG logs (application identification), CASB logs","q":"index=proxy sourcetype=\"cisco:umbrella\"\n| stats dc(src_ip) as unique_users, sum(bytes) as total_bytes by app_name\n| lookup approved_apps.csv app_name OUTPUT approved\n| where isnull(approved) OR approved=\"No\"\n| sort -unique_users","m":"Enable application identification in SWG. Maintain lookup of approved SaaS applications. Identify unapproved apps by user count and data volume. Report to IT governance for risk assessment. Track adoption of approved alternatives.","z":"Table (unapproved apps with user counts), Bar chart (top shadow IT apps), Pie chart (approved vs unapproved traffic)."},{"i":"10.5.3","n":"Malware Download Blocks","c":"critical","f":"beginner","v":"Each blocked malware download represents a prevented infection. Tracking reveals targeted users and attack vectors.","t":"SWG TA","d":"SWG threat logs (malware blocks)","q":"index=proxy sourcetype=\"zscaler:web\" action=\"Blocked\" threat_category=\"Malware\"\n| stats count by src_user, url, threat_name\n| sort -count","m":"Enable threat scanning in SWG. Forward threat events to Splunk. Alert on malware download blocks for user awareness. Track targeted users for phishing correlation. Report on malware types and delivery methods.","z":"Bar chart (malware blocks by type), Table (blocked downloads), Line chart (block rate trend), Single value (blocks today)."},{"i":"10.5.4","n":"DLP over Web Traffic","c":"high","f":"beginner","v":"Web DLP events indicate sensitive data being uploaded to unauthorized destinations. Critical for compliance.","t":"SWG/CASB TA","d":"SWG DLP logs (file uploads, paste detection)","q":"index=proxy sourcetype=\"netskope:events\" alert_type=\"DLP\"\n| stats count by user, app, policy_name, file_type\n| sort -count","m":"Configure DLP policies in SWG/CASB for sensitive data patterns. Ingest DLP violation events. Alert on high-severity violations. Track by user, destination app, and data type. Report for compliance audits.","z":"Table (DLP violations), Bar chart (violations by policy), Line chart (violation trend), Pie chart (by data type)."},{"i":"10.5.5","n":"DNS Security Events","c":"critical","f":"intermediate","v":"Blocked DNS queries to malicious domains indicate infection attempts or active compromise. Each block is a security win.","t":"Splunk Add-on for Cisco Umbrella","d":"Umbrella/DNS security logs","q":"index=dns_security sourcetype=\"cisco:umbrella\" action=\"Blocked\"\n| stats count by internalIp, domain, categories\n| where match(categories,\"Malware|Command and Control|Phishing\")\n| sort -count","m":"Deploy DNS security (Umbrella, Zscaler). Forward blocked query logs to Splunk. Alert on blocks in malware/C2/phishing categories. Track affected internal IPs for investigation. Report on DNS security effectiveness.","z":"Table (blocked domains with sources), Bar chart (blocks by category), Single value (unique blocked domains today)."},{"i":"10.5.6","n":"Bandwidth Abuse Detection","c":"medium","f":"intermediate","v":"Excessive bandwidth on non-business sites impacts network performance and productivity. Detection supports acceptable use enforcement.","t":"SWG TA","d":"SWG traffic logs (bytes transferred, URL category)","q":"index=proxy sourcetype=\"cisco:umbrella\"\n| stats sum(bytes) as total_bytes by src_user, categories\n| where match(categories,\"Streaming|Gaming|Social\") AND total_bytes > 1073741824\n| eval gb=round(total_bytes/1073741824,2)\n| table src_user, categories, gb","m":"Track bandwidth usage per user by URL category. Alert when individual users exceed thresholds on non-business categories (>1GB/day on streaming). Report top bandwidth consumers for management review.","z":"Bar chart (bandwidth by user/category), Table (top consumers), Pie chart (bandwidth by category)."},{"i":"10.5.7","n":"Unencrypted Traffic Detection","c":"medium","f":"intermediate","v":"Sensitive data transmitted over HTTP is vulnerable to interception. Detection ensures encryption compliance.","t":"SWG TA","d":"SWG traffic logs (protocol, URL)","q":"index=proxy sourcetype=\"cisco:umbrella\" protocol=\"HTTP\"\n| search NOT url=\"http://ocsp.*\" NOT url=\"http://crl.*\"\n| stats count by src_user, domain\n| sort -count","m":"Monitor HTTP (non-HTTPS) traffic in SWG logs. Filter out legitimate HTTP uses (OCSP, CRL). Alert when sensitive applications are accessed over HTTP. Report unencrypted traffic percentage as a security metric.","z":"Table (HTTP traffic by destination), Pie chart (HTTP vs HTTPS), Line chart (unencrypted traffic trend)."}]},{"i":"10.6","n":"Vulnerability Management","u":[{"i":"10.6.1","n":"Critical Vulnerability Trending","c":"critical","f":"beginner","v":"Tracking critical vulnerabilities over time measures security posture improvement and identifies remediation stalls.","t":"TA-tenable, TA-QualysCloudPlatform","d":"Vulnerability scan results (severity, CVE, affected asset)","q":"index=vulnerability sourcetype=\"tenable:vuln\"\n| where severity IN (\"Critical\",\"High\")\n| timechart span=1d dc(cve_id) as unique_vulns by severity","m":"Ingest scan results from vulnerability management platform. Track unique vulnerabilities by severity over time. Alert when critical count exceeds threshold or increases. Report on remediation progress weekly.","z":"Line chart (vuln count trend by severity), Single value (critical vuln count), Bar chart (top CVEs), Table (critical vulnerabilities)."},{"i":"10.6.2","n":"Mean Time to Remediation","c":"high","f":"beginner","v":"MTTR measures remediation efficiency. Long MTTR indicates process bottlenecks or resource constraints requiring management attention.","t":"Vuln management TA","d":"Scan results with first_seen and last_seen dates","q":"index=vulnerability sourcetype=\"tenable:vuln\" state=\"Fixed\"\n| eval mttr_days=round((fixed_date-first_seen)/86400)\n| stats avg(mttr_days) as avg_mttr, median(mttr_days) as median_mttr by severity","m":"Track first_seen and fixed_date for each vulnerability. Calculate MTTR by severity. Report against SLA targets (Critical: 7d, High: 30d, Medium: 90d). Identify teams with consistently high MTTR for process improvement.","z":"Bar chart (MTTR by severity), Line chart (MTTR trend), Table (SLA compliance by team)."},{"i":"10.6.3","n":"Scan Coverage Monitoring","c":"high","f":"advanced","v":"Assets not scanned are unknown risks. Coverage monitoring ensures comprehensive vulnerability assessment.","t":"Vuln management TA + CMDB","d":"Scan activity, asset inventory","q":"| inputlookup cmdb_assets.csv\n| join type=left hostname [search index=vulnerability sourcetype=\"tenable:vuln\" | stats latest(_time) as last_scan by hostname]\n| eval days_since_scan=round((now()-last_scan)/86400)\n| where isnull(last_scan) OR days_since_scan > 30\n| table hostname, os, department, last_scan, days_since_scan","m":"Cross-reference scan targets with CMDB. Identify assets not scanned in 30 days. Alert on scan failures. Track coverage percentage as a KPI. Report on uncovered assets for remediation.","z":"Single value (scan coverage %), Table (unscanned assets), Pie chart (scanned vs unscanned), Bar chart (gaps by department)."},{"i":"10.6.4","n":"Patch Compliance by Team/BU","c":"high","f":"beginner","v":"Per-team compliance views drive accountability and enable targeted remediation efforts where they're most needed.","t":"Vuln management TA + CMDB","d":"Scan results enriched with CMDB ownership data","q":"index=vulnerability sourcetype=\"tenable:vuln\" severity IN (\"Critical\",\"High\")\n| lookup cmdb_assets.csv hostname OUTPUT department, owner\n| stats dc(cve_id) as open_vulns, dc(hostname) as affected_hosts by department\n| sort -open_vulns","m":"Enrich vulnerability data with asset ownership from CMDB. Aggregate by team/business unit. Create weekly compliance scorecard. Share with leadership for accountability. Track improvement trends per team.","z":"Bar chart (vulns by team), Table (team compliance scorecard), Line chart (compliance trend by team)."},{"i":"10.6.5","n":"Exploitable Vulnerability Prioritization","c":"critical","f":"intermediate","v":"Not all vulnerabilities are equal \u2014 those with known exploits pose immediate risk. Prioritization focuses remediation on the highest-risk items.","t":"Vuln management TA + threat intel","d":"Scan results + CISA KEV catalog + EPSS scores","q":"index=vulnerability sourcetype=\"tenable:vuln\" severity=\"Critical\"\n| lookup cisa_kev.csv cve_id OUTPUT known_exploited, ransomware_associated\n| lookup epss_scores.csv cve_id OUTPUT epss_score\n| where known_exploited=\"Yes\" OR epss_score > 0.5\n| table hostname, cve_id, severity, epss_score, known_exploited, ransomware_associated\n| sort -epss_score","m":"Maintain CISA KEV and EPSS lookup tables (update weekly). Enrich vulnerability data with exploit intelligence. Prioritize vulnerabilities with known exploits and high EPSS scores. Alert immediately on new KEV vulnerabilities found in environment.","z":"Table (exploitable vulns prioritized), Single value (KEV vulns in environment), Bar chart (EPSS distribution), Scatter plot (severity \u00d7 EPSS)."},{"i":"10.6.6","n":"Vulnerability SLA Compliance","c":"high","f":"beginner","v":"SLA tracking ensures vulnerabilities are remediated within policy timeframes. Non-compliance creates audit findings.","t":"Vuln management TA","d":"Scan results with detection timestamps, SLA policy lookup","q":"index=vulnerability sourcetype=\"tenable:vuln\" state=\"Active\"\n| eval age_days=round((now()-first_seen)/86400)\n| eval sla_days=case(severity=\"Critical\",7, severity=\"High\",30, severity=\"Medium\",90, 1=1,180)\n| eval sla_status=if(age_days>sla_days,\"Overdue\",\"Compliant\")\n| stats count by severity, sla_status","m":"Define SLA targets per severity. Calculate vulnerability age against SLA. Track compliance percentage. Alert when critical/high vulns approach SLA deadline. Produce compliance reports for audit evidence.","z":"Gauge (SLA compliance %), Table (overdue vulnerabilities), Bar chart (compliance by severity), Line chart (compliance trend)."},{"i":"10.6.7","n":"New Vulnerability Detection","c":"critical","f":"intermediate","v":"Newly discovered critical vulnerabilities require immediate triage. Alerting ensures rapid response to emerging risks.","t":"Vuln management TA","d":"Scan results (first_seen within last scan window)","q":"index=vulnerability sourcetype=\"tenable:vuln\" severity=\"Critical\"\n| where first_seen > relative_time(now(), \"-24h\")\n| table hostname, cve_id, plugin_name, severity, first_seen\n| sort -first_seen","m":"After each scan, identify new critical/high vulnerabilities (first_seen within scan window). Alert immediately on new critical findings. Include CVE details and affected hosts. Integrate with ticketing for automated remediation tracking.","z":"Table (new vulnerabilities), Single value (new criticals today), Timeline (discovery events)."}]},{"i":"10.7","n":"SIEM & SOAR","u":[{"i":"10.7.1","n":"Alert Volume Trending","c":"high","f":"intermediate","v":"Alert volume trends reveal SOC workload, detection rule effectiveness, and potential alert fatigue risks.","t":"Splunk Enterprise Security","d":"ES notable events (`notable` index)","q":"index=notable\n| timechart span=1d count by source\n| sort -count","m":"Track notable event volume from ES over time. Break down by source (correlation search). Identify noisy rules for tuning. Alert when daily volume exceeds analyst capacity thresholds. Report on volume trends.","z":"Stacked area (alerts by source), Line chart (total alert volume), Bar chart (top alerting rules)."},{"i":"10.7.2","n":"Analyst Workload Distribution","c":"medium","f":"beginner","v":"Uneven workload distribution leads to analyst burnout and inconsistent response times. Monitoring enables fair distribution.","t":"Splunk ES","d":"ES investigation/ownership logs, notable event audit","q":"index=notable\n| stats count, avg(time_to_close) as avg_close_time by owner\n| sort -count","m":"Track alert assignment and closure by analyst. Calculate workload distribution and average handling time. Report to SOC management. Identify training needs based on handling time variations.","z":"Bar chart (alerts per analyst), Table (workload summary), Pie chart (distribution)."},{"i":"10.7.3","n":"MTTD and MTTR Tracking","c":"critical","f":"intermediate","v":"MTTD and MTTR are the primary metrics for SOC effectiveness. Tracking drives process improvement and justifies investment.","t":"Splunk ES","d":"ES notable events (detection time, response time, closure time)","q":"index=notable status=\"Closed\"\n| eval mttd_hours=round((detection_time-event_time)/3600,1)\n| eval mttr_hours=round((closure_time-detection_time)/3600,1)\n| stats avg(mttd_hours) as avg_mttd, avg(mttr_hours) as avg_mttr, perc95(mttr_hours) as p95_mttr","m":"Ensure ES workflows capture detection, triage, and resolution timestamps. Calculate MTTD (event to detection) and MTTR (detection to resolution). Track by severity, type, and analyst. Report weekly/monthly to leadership.","z":"Single value (avg MTTD/MTTR), Line chart (MTTD/MTTR trends), Bar chart (by incident type), Gauge (vs target)."},{"i":"10.7.4","n":"Playbook Execution Monitoring","c":"high","f":"beginner","v":"SOAR playbook failures leave incidents unhandled. Monitoring ensures automation reliability and identifies integration issues.","t":"Splunk SOAR","d":"SOAR execution logs, playbook run results","q":"index=soar sourcetype=\"phantom:playbook_run\"\n| stats count(eval(status=\"success\")) as success, count(eval(status=\"failed\")) as failed by playbook_name\n| eval success_rate=round(success/(success+failed)*100,1)\n| where success_rate < 95","m":"Ingest SOAR execution logs into Splunk. Track playbook success/failure rates. Alert on failures for critical playbooks. Identify failing action steps for debugging. Report on automation coverage and time savings.","z":"Table (playbook success rates), Bar chart (failure rate by playbook), Line chart (execution trend), Single value (overall success %)."},{"i":"10.7.5","n":"Correlation Search Performance","c":"medium","f":"intermediate","v":"Slow or resource-intensive correlation searches degrade ES performance and may miss detections if they timeout.","t":"Splunk internal metrics","d":"`_internal` scheduler logs","q":"index=_internal sourcetype=scheduler savedsearch_name=\"*Correlation*\"\n| stats avg(run_time) as avg_runtime, max(run_time) as max_runtime by savedsearch_name\n| where avg_runtime > 60\n| sort -avg_runtime","m":"Monitor ES correlation search run times from `_internal`. Alert when searches exceed their schedule interval (running longer than they should). Identify skipped searches. Optimize SPL for slow searches.","z":"Table (search performance), Bar chart (avg runtime by search), Line chart (runtime trend), Single value (skipped searches)."},{"i":"10.7.6","n":"False Positive Rate Tracking","c":"high","f":"intermediate","v":"High false positive rates cause alert fatigue, leading analysts to miss real threats. Tracking drives detection rule optimization.","t":"Splunk ES","d":"ES notable events with analyst disposition","q":"index=notable status=\"Closed\"\n| stats count(eval(disposition=\"True Positive\")) as tp, count(eval(disposition=\"False Positive\")) as fp by source\n| eval fp_rate=round(fp/(tp+fp)*100,1)\n| where fp_rate > 30\n| sort -fp_rate","m":"Ensure analysts set dispositions when closing notables (TP, FP, Benign). Calculate FP rate per detection rule. Flag rules with >30% FP rate for tuning. Track overall FP rate as a SOC quality metric. Target <20% FP rate.","z":"Bar chart (FP rate by rule), Line chart (overall FP trend), Table (rules needing tuning), Gauge (overall FP rate)."}]},{"i":"10.8","n":"Certificate & PKI Management","u":[{"i":"10.8.1","n":"Certificate Expiry Monitoring","c":"critical","f":"intermediate","v":"Expired certificates cause service outages, authentication failures, and security warnings. Proactive monitoring is the simplest prevention.","t":"Custom scripted input","d":"Certificate inventory scans (openssl, certutil, CT logs)","q":"index=certificates sourcetype=\"cert_inventory\"\n| eval days_to_expiry=round((cert_not_after_epoch-now())/86400)\n| where days_to_expiry < 90\n| table cn, san, issuer, days_to_expiry, host, port\n| so

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Splunk Infrastructure Monitoring — Use Case Repository</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

:root {
  --glass-bg: rgba(255,255,255,0.05);
  --glass-border: rgba(255,255,255,0.10);
  --glass-highlight: rgba(255,255,255,0.15);
  --glass-shadow: rgba(0,0,0,0.4);
  --accent: #65A637;
  --accent2: #4EC9B0;
  --accent3: #ED7872;
  --bg-start: #111215;
  --bg-mid: #171D21;
  --bg-end: #0D0F11;
  --text: #DCE1E6;
  --text-dim: #D0D6DC;
  --text-bright: #FAFBFC;
  --crit-critical: #D94F57;
  --crit-high: #EC9960;
  --crit-medium: #F8C869;
  --crit-low: #65A637;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Inter', -apple-system, sans-serif;
  background: var(--bg-start);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* Clean background — matches Getting Started style */
.bg-gradient {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: -1;
  background: #111215;
}

.bg-orbs { display: none; }

/* Glass card base */
.glass {
  background: var(--glass-bg);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--glass-border);
  border-radius: 16px;
  box-shadow: 0 8px 32px var(--glass-shadow), inset 0 1px 0 var(--glass-highlight);
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}
.glass:hover {
  background: rgba(255,255,255,0.12);
  border-color: rgba(255,255,255,0.25);
  box-shadow: 0 12px 48px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.3);
  transform: translateY(-2px);
}

/* Header */
header {
  padding: 14px 32px;
  position: sticky; top: 0; z-index: 100;
  background: rgba(17,18,21,0.92);
  backdrop-filter: blur(30px);
  -webkit-backdrop-filter: blur(30px);
  border-bottom: 1px solid var(--glass-border);
}
.header-inner {
  max-width: 1600px; margin: 0 auto;
  display: flex; align-items: center; gap: 24px; flex-wrap: wrap;
}
.logo {
  display: flex; align-items: center; gap: 12px; flex-shrink: 0;
}
.logo-icon {
  width: 34px; height: 34px; border-radius: 10px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; font-weight: 700; color: #fff;
  box-shadow: 0 2px 10px rgba(101,166,55,0.25);
}
.logo h1 {
  font-size: 15px; font-weight: 600; color: var(--text-bright);
  letter-spacing: -0.3px;
}
.logo .subtitle { font-size: 11px; color: var(--text-dim); font-weight: 400; }

/* Search */
.search-wrap {
  flex: 1; min-width: 280px; max-width: 520px; position: relative;
}
.search-wrap input {
  width: 100%; padding: 10px 16px 10px 42px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 12px; color: var(--text-bright);
  font-size: 14px; font-family: inherit;
  transition: all 0.3s ease;
  outline: none;
}
.search-wrap input:focus {
  background: rgba(255,255,255,0.1);
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(101,166,55,0.20);
}
.search-wrap input::placeholder { color: var(--text-dim); }
.search-icon {
  position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
  color: var(--text-dim); font-size: 16px;
}

/* Header stat */
.header-stat {
  font-size: 13px; color: var(--text-dim); font-weight: 500;
  display: flex; align-items: center; gap: 4px; flex-shrink: 0;
}
.header-stat .num { font-weight: 700; color: var(--accent); font-size: 15px; }

/* Layout */
.app-layout {
  max-width: 1600px; margin: 0 auto; padding: 24px;
  display: flex; gap: 24px; min-height: calc(100vh - 100px);
}

/* Sidebar */
.sidebar {
  width: 300px; flex-shrink: 0; position: sticky; top: 100px;
  max-height: calc(100vh - 124px); overflow-y: auto;
  padding: 16px; scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.1) transparent;
}
.sidebar::-webkit-scrollbar { width: 4px; }
.sidebar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 4px; }

.cat-item {
  padding: 10px 14px; border-radius: 10px; cursor: pointer;
  margin-bottom: 2px; transition: all 0.2s ease;
  display: flex; align-items: center; gap: 10px;
  font-size: 13px; font-weight: 400; color: var(--text-dim);
}
.cat-item:hover { background: rgba(255,255,255,0.06); color: var(--text); }
.cat-item.active {
  background: linear-gradient(135deg, rgba(101,166,55,0.15), rgba(78,201,176,0.08));
  color: var(--text-bright); font-weight: 500;
  border: 1px solid rgba(101,166,55,0.25);
}
.cat-num {
  width: 28px; height: 28px; border-radius: 8px;
  background: rgba(255,255,255,0.06);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 600; flex-shrink: 0;
  color: var(--accent);
}
.cat-item.active .cat-num {
  background: rgba(101,166,55,0.25);
}
.cat-count {
  margin-left: auto; font-size: 11px; opacity: 0.5;
  background: rgba(255,255,255,0.06); padding: 2px 7px;
  border-radius: 8px;
}
.cat-chevron {
  margin-left: 4px; font-size: 10px; opacity: 0.4; transition: transform 0.2s ease;
  flex-shrink: 0;
}
.cat-item.active .cat-chevron { transform: rotate(90deg); opacity: 0.7; }
.subcat-list {
  max-height: 0; overflow: hidden; transition: max-height 0.3s ease;
  margin-left: 24px; border-left: 1px solid rgba(255,255,255,0.06);
}
.subcat-list.open { max-height: 2000px; }
.subcat-item {
  padding: 6px 12px; border-radius: 8px; cursor: pointer;
  margin: 1px 0; font-size: 12px; color: var(--text-dim);
  transition: all 0.15s ease; display: flex; align-items: center; gap: 6px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.subcat-item:hover { background: rgba(255,255,255,0.06); color: var(--text); }
.subcat-item.active {
  background: rgba(101,166,55,0.12); color: var(--accent);
}
.subcat-item .sc-count {
  margin-left: auto; font-size: 10px; opacity: 0.4;
  flex-shrink: 0;
}

/* Main content */
.main-content { flex: 1; min-width: 0; }

/* Category header */
.cat-header {
  padding: 24px 28px; margin-bottom: 20px;
  background: linear-gradient(135deg, rgba(101,166,55,0.08), rgba(78,201,176,0.05));
  position: relative; overflow: hidden;
}
.cat-header::before {
  content: ''; position: absolute; top: -50%; right: -10%; width: 300px; height: 300px;
  background: radial-gradient(circle, rgba(101,166,55,0.08) 0%, transparent 70%);
  border-radius: 50%;
}
.cat-header h2 {
  font-size: 24px; font-weight: 700; color: var(--text-bright);
  margin-bottom: 8px; position: relative;
}
.cat-header .cat-meta {
  font-size: 13px; color: var(--text-dim); position: relative;
  display: flex; gap: 16px;
}

/* Filter bar */
.filter-bar {
  display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; padding: 0 4px;
}
.filter-btn {
  padding: 7px 14px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1);
  background: rgba(255,255,255,0.04); color: var(--text-dim);
  font-size: 12px; font-weight: 500; cursor: pointer;
  transition: all 0.2s ease; font-family: inherit;
}
.filter-btn:hover { background: rgba(255,255,255,0.08); color: var(--text); }
.filter-btn.active {
  background: rgba(101,166,55,0.15); border-color: rgba(101,166,55,0.3);
  color: var(--accent);
}
.filter-btn.crit { border-color: rgba(255,71,87,0.3); }
.filter-btn.crit.active { background: rgba(255,71,87,0.15); color: var(--crit-critical); }
.filter-btn.high { border-color: rgba(255,140,66,0.3); }
.filter-btn.high.active { background: rgba(255,140,66,0.15); color: var(--crit-high); }
.filter-btn.med { border-color: rgba(255,217,61,0.3); }
.filter-btn.med.active { background: rgba(255,217,61,0.15); color: var(--crit-medium); }
.filter-btn.low2 { border-color: rgba(107,203,119,0.3); }
.filter-btn.low2.active { background: rgba(107,203,119,0.15); color: var(--crit-low); }

/* Difficulty filter buttons */
.filter-sep { width: 1px; height: 24px; background: rgba(255,255,255,0.12); margin: 0 4px; align-self: center; }
.filter-btn.beg { border-color: rgba(101,166,55,0.3); }
.filter-btn.beg.active { background: rgba(101,166,55,0.15); color: #65A637; }
.filter-btn.inter { border-color: rgba(91,155,213,0.3); }
.filter-btn.inter.active { background: rgba(91,155,213,0.15); color: #5B9BD5; }
.filter-btn.advf { border-color: rgba(236,153,96,0.3); }
.filter-btn.advf.active { background: rgba(236,153,96,0.15); color: #EC9960; }
.filter-btn.expf { border-color: rgba(217,79,87,0.3); }
.filter-btn.expf.active { background: rgba(217,79,87,0.15); color: #D94F57; }

/* Difficulty badge on card */
.uc-diff-badge {
  font-size: 10px; padding: 2px 7px; border-radius: 5px;
  font-weight: 600; flex-shrink: 0; margin-left: auto;
}
.uc-diff-badge.beginner { background: rgba(101,166,55,0.12); color: #65A637; }
.uc-diff-badge.intermediate { background: rgba(91,155,213,0.12); color: #5B9BD5; }
.uc-diff-badge.advanced { background: rgba(236,153,96,0.12); color: #EC9960; }
.uc-diff-badge.expert { background: rgba(217,79,87,0.12); color: #D94F57; }

/* Subcategory section */
.subcat-section { margin-bottom: 24px; }
.subcat-header {
  font-size: 15px; font-weight: 600; color: var(--accent);
  padding: 8px 4px; margin-bottom: 12px;
  border-bottom: 1px solid rgba(101,166,55,0.20);
  display: flex; align-items: center; gap: 8px;
}
.subcat-count { font-size: 11px; color: var(--text-dim); font-weight: 400; }

/* Use case cards */
.uc-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 14px;
}
.uc-card {
  padding: 18px 20px; cursor: pointer;
  position: relative; overflow: hidden;
}
.uc-card::before {
  content: ''; position: absolute; top: 0; left: 0; width: 3px; height: 100%;
  border-radius: 3px 0 0 3px;
}
.uc-card.critical::before { background: var(--crit-critical); }
.uc-card.high::before { background: var(--crit-high); }
.uc-card.medium::before { background: var(--crit-medium); }
.uc-card.low::before { background: var(--crit-low); }

.uc-card-head {
  display: flex; align-items: flex-start; gap: 10px; margin-bottom: 8px;
}
.uc-id {
  font-size: 11px; font-weight: 600; font-family: 'JetBrains Mono', monospace;
  color: var(--text-dim); padding: 2px 8px; border-radius: 6px;
  background: rgba(255,255,255,0.06); flex-shrink: 0;
}
.uc-name {
  font-size: 14px; font-weight: 600; color: var(--text-bright);
  line-height: 1.3;
}
.uc-crit-dot {
  width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 5px;
}
.uc-crit-dot.critical { background: var(--crit-critical); box-shadow: 0 0 8px var(--crit-critical); }
.uc-crit-dot.high { background: var(--crit-high); box-shadow: 0 0 8px var(--crit-high); }
.uc-crit-dot.medium { background: var(--crit-medium); box-shadow: 0 0 8px var(--crit-medium); }
.uc-crit-dot.low { background: var(--crit-low); box-shadow: 0 0 8px var(--crit-low); }

.uc-value {
  font-size: 12px; color: var(--text-dim); line-height: 1.5;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.uc-tags {
  display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px;
}
.uc-tag {
  font-size: 10px; padding: 3px 8px; border-radius: 6px;
  background: rgba(78,201,176,0.10); color: #4EC9B0;
  border: 1px solid rgba(78,201,176,0.15);
  font-family: 'JetBrains Mono', monospace;
  max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.uc-cim-tag {
  font-size: 10px; padding: 3px 8px; border-radius: 6px;
  background: rgba(101,166,55,0.10); color: var(--accent);
  border: 1px solid rgba(101,166,55,0.25);
  font-family: 'JetBrains Mono', monospace;
  white-space: nowrap;
}
.uc-mtype-tag {
  font-size: 10px; padding: 3px 8px; border-radius: 6px;
  background: rgba(120,150,220,0.12); color: #7B9CD4;
  border: 1px solid rgba(120,150,220,0.25);
  white-space: nowrap;
}

/* Monitoring type filter row (Network category) */
.mtype-filter-wrap {
  display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  margin-bottom: 16px; padding: 10px 0;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}
.mtype-filter-wrap .mtype-label {
  font-size: 12px; font-weight: 600; color: var(--text-dim);
  flex-shrink: 0;
}
.mtype-filter-chip {
  font-size: 12px; padding: 6px 12px; border-radius: 8px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  color: var(--text-dim); cursor: pointer;
  transition: all 0.2s ease;
}
.mtype-filter-chip:hover {
  background: rgba(255,255,255,0.08); color: var(--text);
}
.mtype-filter-chip.active {
  background: rgba(120,150,220,0.15);
  border-color: rgba(120,150,220,0.35);
  color: #7B9CD4;
}

/* Detail modal */
.modal-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.7); backdrop-filter: blur(8px);
  z-index: 1000; display: none; justify-content: center; align-items: flex-start;
  padding: 60px 24px; overflow-y: auto;
}
.modal-overlay.show { display: flex; }
.modal {
  width: 100%; max-width: 800px;
  background: rgba(20,23,27,0.96);
  backdrop-filter: blur(40px);
  border: 1px solid var(--glass-border);
  border-radius: 20px;
  box-shadow: 0 24px 80px rgba(0,0,0,0.6), inset 0 1px 0 var(--glass-highlight);
  padding: 32px;
  animation: modalIn 0.3s cubic-bezier(0.16, 1, 0.3, 1);
}
@keyframes modalIn {
  from { opacity: 0; transform: translateY(20px) scale(0.97); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}
.modal-close {
  position: absolute; top: 16px; right: 20px; width: 36px; height: 36px;
  border-radius: 8px; border: 1px solid rgba(255,255,255,0.1);
  background: rgba(255,255,255,0.06); color: var(--text-dim);
  font-size: 18px; cursor: pointer; display: flex; align-items: center;
  justify-content: center; transition: all 0.2s; z-index: 10;
}
.modal-close:hover { background: rgba(255,71,87,0.2); color: var(--crit-critical); border-color: rgba(255,71,87,0.3); }

.modal-head {
  display: flex; align-items: flex-start; gap: 16px; margin-bottom: 24px;
  padding-right: 44px;
}
.modal-crit-badge {
  padding: 4px 12px; border-radius: 8px; font-size: 12px; font-weight: 600;
  flex-shrink: 0;
}
.modal-crit-badge.critical { background: rgba(255,71,87,0.15); color: var(--crit-critical); border: 1px solid rgba(255,71,87,0.3); }
.modal-crit-badge.high { background: rgba(255,140,66,0.15); color: var(--crit-high); border: 1px solid rgba(255,140,66,0.3); }
.modal-crit-badge.medium { background: rgba(255,217,61,0.15); color: var(--crit-medium); border: 1px solid rgba(255,217,61,0.3); }
.modal-crit-badge.low { background: rgba(107,203,119,0.15); color: var(--crit-low); border: 1px solid rgba(107,203,119,0.3); }
.modal-crit-badge.beginner { background: rgba(101,166,55,0.15); color: #65A637; border: 1px solid rgba(101,166,55,0.3); }
.modal-crit-badge.intermediate { background: rgba(91,155,213,0.15); color: #5B9BD5; border: 1px solid rgba(91,155,213,0.3); }
.modal-crit-badge.advanced { background: rgba(236,153,96,0.15); color: #EC9960; border: 1px solid rgba(236,153,96,0.3); }
.modal-crit-badge.expert { background: rgba(217,79,87,0.15); color: #D94F57; border: 1px solid rgba(217,79,87,0.3); }

.modal h2 {
  font-size: 22px; font-weight: 700; color: var(--text-bright);
  line-height: 1.3;
}
.modal-id {
  font-size: 13px; font-family: 'JetBrains Mono', monospace;
  color: var(--text-dim); margin-top: 4px;
}
.modal-section {
  margin-bottom: 20px;
}
.modal-section h3 {
  font-size: 11px; text-transform: uppercase; letter-spacing: 1px;
  color: var(--accent); margin-bottom: 8px; font-weight: 600;
}
.modal-section p, .modal-section div {
  font-size: 14px; line-height: 1.6; color: var(--text);
}
.spl-block {
  background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.08);
  border-radius: 12px; padding: 16px; overflow-x: auto;
  font-family: 'JetBrains Mono', monospace; font-size: 13px;
  line-height: 1.6; color: #c8d0e0; white-space: pre-wrap; word-break: break-all;
  position: relative;
}
.spl-block .copy-btn {
  position: absolute; top: 8px; right: 8px;
  padding: 4px 10px; border-radius: 6px;
  background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1);
  color: var(--text-dim); font-size: 11px; cursor: pointer;
  font-family: inherit; transition: all 0.2s;
}
.spl-block .copy-btn:hover { background: rgba(101,166,55,0.2); color: var(--accent); }
.modal-meta-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
}
.meta-item {
  padding: 12px 16px; border-radius: 10px;
  background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.06);
}
.meta-item h4 {
  font-size: 10px; text-transform: uppercase; letter-spacing: 0.8px;
  color: var(--text-dim); margin-bottom: 4px;
}
.meta-item p { font-size: 13px; color: var(--text); margin: 0; }

/* Nav arrows */
.modal-nav {
  display: flex; justify-content: space-between; margin-top: 24px;
  padding-top: 16px; border-top: 1px solid rgba(255,255,255,0.06);
}
.nav-btn {
  padding: 8px 16px; border-radius: 10px;
  background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
  color: var(--text-dim); font-size: 13px; cursor: pointer;
  font-family: inherit; transition: all 0.2s;
}
.nav-btn:hover { background: rgba(0,212,170,0.15); color: var(--accent); border-color: rgba(0,212,170,0.3); }
.nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }

/* No results */
.no-results {
  text-align: center; padding: 60px 20px; color: var(--text-dim);
}
.no-results .big { font-size: 48px; margin-bottom: 12px; }
.no-results p { font-size: 15px; }

/* Overview hero */
.ov-hero {
  padding: 40px 28px 36px;
  background: linear-gradient(135deg, rgba(101,166,55,0.08) 0%, rgba(78,201,176,0.04) 100%);
  position: relative; overflow: hidden; margin-bottom: 24px;
}
.ov-hero::before {
  content: ''; position: absolute; top: -40%; right: -10%; width: 500px; height: 500px;
  background: radial-gradient(circle, rgba(101,166,55,0.08) 0%, transparent 60%); border-radius: 50%;
}
.ov-hero-badge {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 5px 12px; border-radius: 16px;
  background: rgba(101,166,55,0.15); border: 1px solid rgba(101,166,55,0.25);
  font-size: 11px; font-weight: 600; color: var(--accent); margin-bottom: 16px;
}
.ov-hero h2 {
  font-size: 32px; font-weight: 800; color: var(--text-bright);
  letter-spacing: -0.5px; margin-bottom: 12px; line-height: 1.2; position: relative;
}
.ov-hero h2 span { color: var(--accent); }
.ov-hero p {
  font-size: 15px; color: var(--text-dim); max-width: 660px; line-height: 1.7; position: relative;
}
.ov-stats {
  display: flex; gap: 28px; margin-top: 24px; flex-wrap: wrap; position: relative;
}
.ov-stat-num { font-size: 30px; font-weight: 800; color: var(--accent); line-height: 1; }
.ov-stat-label { font-size: 11px; color: var(--text-dim); margin-top: 3px; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 500; }

/* Roadmap */
.ov-roadmap { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 14px; margin-bottom: 28px; }
.ov-phase {
  background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
  border-radius: 14px; padding: 22px 18px;
}
.ov-phase-num {
  font-size: 10px; font-weight: 700; color: var(--accent); text-transform: uppercase;
  letter-spacing: 1px; margin-bottom: 6px;
}
.ov-phase h3 { font-size: 15px; font-weight: 600; color: var(--text-bright); margin-bottom: 6px; }
.ov-phase p { font-size: 12px; color: var(--text-dim); line-height: 1.5; margin-bottom: 10px; }
.ov-phase-items { list-style: none; }
.ov-phase-items li {
  font-size: 11px; color: var(--text); padding: 3px 0 3px 14px; position: relative;
}
.ov-phase-items li::before { content: '▸'; position: absolute; left: 0; color: var(--accent); }

/* Difficulty legend */
.ov-diff-legend {
  display: flex; gap: 14px; flex-wrap: wrap; margin: 16px 0 20px; padding: 14px 18px;
  background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 10px;
}
.ov-diff-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text-dim); }
.ov-diff-dot { width: 9px; height: 9px; border-radius: 3px; }
.ov-diff-dot.beginner { background: #65A637; }
.ov-diff-dot.intermediate { background: #5B9BD5; }
.ov-diff-dot.advanced { background: #EC9960; }
.ov-diff-dot.expert { background: #D94F57; }

/* Category group filter chips */
.ov-filter-wrap { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
.ov-filter-chip {
  padding: 6px 13px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.08);
  background: rgba(255,255,255,0.04); color: var(--text-dim);
  font-size: 12px; font-weight: 500; cursor: pointer; transition: all 0.2s; font-family: inherit;
}
.ov-filter-chip:hover { background: rgba(255,255,255,0.07); color: var(--text); }
.ov-filter-chip.active {
  background: rgba(101,166,55,0.15); border-color: rgba(101,166,55,0.3); color: var(--accent);
}

/* Overview category cards */
.ov-cat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 14px; }
.ov-cat-card {
  background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
  border-radius: 14px; padding: 18px; cursor: pointer; transition: all 0.25s; overflow: hidden;
}
.ov-cat-card:hover {
  background: rgba(255,255,255,0.07); border-color: rgba(255,255,255,0.14);
  transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.3);
}
.ov-cat-card.expanded {
  grid-column: 1 / -1;
  background: rgba(255,255,255,0.07); border-color: rgba(101,166,55,0.25);
}
.ov-cat-head { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 8px; }
.ov-cat-icon {
  font-size: 26px; flex-shrink: 0; width: 42px; height: 42px;
  display: flex; align-items: center; justify-content: center;
  background: rgba(255,255,255,0.07); border-radius: 10px;
}
.ov-cat-head h3 { font-size: 14px; font-weight: 600; color: var(--text-bright); line-height: 1.3; }
.ov-cat-head .ov-cat-num {
  font-size: 10px; color: var(--accent); font-weight: 600; font-family: 'JetBrains Mono', monospace;
}
.ov-cat-head .ov-cat-count {
  margin-left: auto; font-size: 11px; color: var(--text-dim);
  background: rgba(255,255,255,0.06); padding: 3px 8px; border-radius: 6px; flex-shrink: 0;
}
.ov-expand-arrow {
  display: inline-block; font-size: 10px; transition: transform 0.2s;
  color: var(--text-dim); margin-left: 4px;
}
.ov-cat-card.expanded .ov-expand-arrow { transform: rotate(90deg); }
.ov-cat-desc { font-size: 12px; color: var(--text-dim); line-height: 1.5; margin-bottom: 10px; }
.ov-cat-quick {
  font-size: 11px; color: #4EC9B0; padding: 7px 11px;
  background: rgba(78,201,176,0.12); border-radius: 8px;
  border: 1px solid rgba(78,201,176,0.15); line-height: 1.4;
}
.ov-cat-quick strong { color: #4EC9B0; font-weight: 600; }

/* Starter UCs in overview cards */
.ov-starter-list { margin-top: 14px; display: none; }
.ov-cat-card.expanded .ov-starter-list { display: block; }
.ov-starter-uc {
  padding: 12px 14px; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.08);
  border-radius: 10px; margin-bottom: 7px; transition: all 0.2s; cursor: pointer;
}
.ov-starter-uc:hover { background: rgba(0,0,0,0.3); border-color: rgba(255,255,255,0.14); }
.ov-starter-head { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; flex-wrap: wrap; }
.ov-starter-name { font-size: 13px; font-weight: 600; color: var(--text-bright); }
.ov-starter-id {
  font-size: 10px; color: var(--text-dim); font-family: 'JetBrains Mono', monospace;
  background: rgba(255,255,255,0.06); padding: 2px 6px; border-radius: 4px;
}
.ov-badge {
  font-size: 9px; padding: 2px 6px; border-radius: 4px; font-weight: 600;
}
.ov-badge.critical { background: rgba(217,79,87,0.15); color: #D94F57; }
.ov-badge.high { background: rgba(236,153,96,0.15); color: #EC9960; }
.ov-badge.beginner { background: rgba(101,166,55,0.12); color: #65A637; }
.ov-badge.intermediate { background: rgba(91,155,213,0.12); color: #5B9BD5; }
.ov-starter-value { font-size: 11px; color: var(--text-dim); line-height: 1.4; margin-bottom: 6px; }
.ov-starter-ta { font-size: 10px; color: #4EC9B0; font-family: 'JetBrains Mono', monospace; }
.ov-spl-toggle {
  font-size: 11px; color: var(--accent); cursor: pointer; font-weight: 500;
  margin-top: 5px; user-select: none;
}
.ov-spl-toggle:hover { color: var(--text-bright); }
.ov-spl-block {
  display: none; margin-top: 7px; padding: 10px; background: rgba(0,0,0,0.4);
  border: 1px solid rgba(255,255,255,0.06); border-radius: 8px;
  font-family: 'JetBrains Mono', monospace; font-size: 11px;
  line-height: 1.5; color: #dde2e8; white-space: pre-wrap; word-break: break-all;
}
.ov-spl-block.show { display: block; }
.ov-spl-block .copy-btn {
  display: block; margin-left: auto; margin-top: 8px; padding: 4px 12px;
  border-radius: 6px; background: rgba(101,166,55,0.15); border: 1px solid rgba(101,166,55,0.3);
  color: var(--accent); font-size: 11px; cursor: pointer; font-family: inherit; font-weight: 500;
  transition: all 0.2s;
}
.ov-spl-block .copy-btn:hover { background: rgba(101,166,55,0.3); color: #fff; }

/* Section titles in overview */
.ov-section-title { font-size: 20px; font-weight: 700; color: var(--text-bright); margin-bottom: 6px; }
.ov-section-title.ov-collapsible {
  cursor: pointer; user-select: none; display: inline-flex; align-items: center; gap: 4px;
  padding: 6px 10px; border-radius: 8px; transition: background 0.2s;
}
.ov-section-title.ov-collapsible:hover { background: rgba(255,255,255,0.06); }
.ov-collapse-arrow {
  display: inline-block; font-size: 12px; transition: transform 0.25s ease; color: var(--accent);
}
.ov-collapse-arrow.open { transform: rotate(90deg); }
.ov-collapsible-body { overflow: hidden; }
.ov-section-sub { font-size: 13px; color: var(--text-dim); margin-bottom: 24px; }

/* Sidebar toggle button (hidden on desktop) */
.sidebar-toggle {
  display: none;
  align-items: center; justify-content: center;
  width: 40px; height: 40px; flex-shrink: 0;
  background: rgba(255,255,255,0.07);
  border: 1px solid var(--glass-border);
  border-radius: 10px; color: var(--text);
  font-size: 18px; cursor: pointer;
  transition: background 0.2s;
}
.sidebar-toggle:hover { background: rgba(255,255,255,0.12); }

/* Responsive — tablet */
@media (max-width: 900px) {
  .app-layout { flex-direction: column; padding: 16px; }
  .sidebar { width: 100%; position: relative; top: 0; max-height: none; display: flex; flex-wrap: wrap; gap: 4px; padding: 12px; }
  .cat-item { padding: 8px 10px; font-size: 12px; }
  .uc-grid { grid-template-columns: 1fr; }
  .modal-meta-grid { grid-template-columns: 1fr; }
  .header-inner { gap: 12px; }
  .ov-roadmap { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); }
}

/* Responsive — phone */
@media (max-width: 600px) {
  /* Header */
  header { padding: 10px 14px; }
  .header-inner { gap: 8px; flex-wrap: nowrap; }
  .logo .subtitle { display: none; }
  .logo h1 { font-size: 13px; }
  .search-wrap { order: 3; flex-basis: 100%; min-width: 0; max-width: 100%; }
  .header-inner { flex-wrap: wrap; }
  .header-stat { display: none; }
  .sidebar-toggle { display: flex; }

  /* Sidebar — hidden by default, toggled open */
  .sidebar { display: none; flex-direction: column; flex-wrap: nowrap; }
  .sidebar.open { display: flex; }

  /* Layout */
  .app-layout { padding: 12px; gap: 12px; }

  /* Category header */
  .cat-header { padding: 20px 16px 12px; }
  .cat-header h2 { font-size: 18px; }
  .cat-header .cat-meta { font-size: 12px; gap: 10px; flex-wrap: wrap; }

  /* Filter bar */
  .filter-bar { gap: 6px; }
  .filter-btn { padding: 6px 12px; font-size: 12px; }

  /* Cards */
  .uc-grid { gap: 10px; }
  .uc-card { padding: 14px 16px; }

  /* Modal — slides up from bottom */
  .modal-overlay { padding: 0; align-items: flex-end; }
  .modal {
    max-width: 100%; width: 100%;
    border-radius: 20px 20px 0 0;
    max-height: 92vh; overflow-y: auto;
  }
  .modal-close { top: 12px; right: 14px; }
  .modal-head { flex-wrap: wrap; gap: 10px; padding-right: 48px; }
  .modal h2 { font-size: 17px; }
  .modal-meta-grid { grid-template-columns: 1fr; }
  .spl-block { font-size: 11px; padding: 12px; }

  /* Overview */
  .ov-hero { padding: 24px 16px 20px; }
  .ov-hero h2 { font-size: 20px; }
  .ov-stat-num { font-size: 24px; }
  .ov-stats { gap: 16px; }
  .ov-roadmap { grid-template-columns: 1fr; }
  .ov-spl-block { font-size: 11px; }

  /* Touch targets */
  .cat-item { min-height: 44px; }
  .subcat-item { min-height: 40px; }
  .filter-btn { min-height: 36px; }
}

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }
</style>

<body>
<div class="bg-gradient"></div>
<div class="bg-orbs"><div class="orb"></div><div class="orb"></div><div class="orb"></div></div>

<header>
  <div class="header-inner">
    <button class="sidebar-toggle" id="sidebar-toggle" aria-label="Toggle categories">&#9776;</button>
    <div class="logo">
      <div class="logo-icon">&gt;</div>
      <div>
        <h1>Infrastructure Monitoring</h1>
        <div class="subtitle">Use Case Repository</div>
      </div>
    </div>
    <div class="search-wrap">
      <span class="search-icon">&#128269;</span>
      <input type="text" id="search" placeholder="Search use cases, SPL, TAs..." autocomplete="off">
    </div>
    <div class="header-stat"><span class="num" id="total-count">0</span> use cases</div>
  </div>
</header>

<div class="app-layout">
  <aside class="sidebar glass" id="sidebar"></aside>
  <main class="main-content" id="main"></main>
</div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal"></div>
</div>

<script src="data.js"></script>
<script src="custom-text.js"></script>
<script>

// Site text: merge defaults with custom-text.js (user edits custom-text.js only)
var SITE = Object.assign({
  heroBadge: "> Splunk Solutions Engineering",
  heroTitle: "Infrastructure Monitoring",
  heroTitleSpan: "Getting Started Guide",
  heroIntro: "A curated path through {useCases} use cases across {categories} infrastructure domains. Start with the highest-impact, easiest-to-implement use cases and expand from there.",
  statUseCases: "Use Cases",
  statCategories: "Categories",
  statSubcategories: "Subcategories",
  statQuickWins: "Quick Wins",
  roadmapTitle: "Implementation Roadmap",
  roadmapSub: "A phased approach to building comprehensive infrastructure monitoring",
  phase1Title: "Phase 1 · Week 1–2",
  phase1Heading: "Foundation",
  phase1Desc: "Deploy forwarders and start collecting data for immediate visibility.",
  phase2Title: "Phase 2 · Week 3–4",
  phase2Heading: "Core Monitoring",
  phase2Desc: "Expand data collection and build dashboards for critical infrastructure.",
  phase3Title: "Phase 3 · Month 2",
  phase3Heading: "Expand Coverage",
  phase3Desc: "Bring in cloud, application, and database monitoring for full-stack visibility.",
  phase4Title: "Phase 4 · Month 3+",
  phase4Heading: "Optimize & Automate",
  phase4Desc: "Add ML-driven anomaly detection, automated remediation, and executive reporting.",
  categoriesTitle: "Use Case Categories",
  categoriesSub: "Click any category to see the top quick-win use cases with ready-to-use SPL queries",
  starterListLabel: "Top Quick-Win Use Cases — ready to implement",
  noStartersMessage: "No quick-win starters — click category in sidebar to explore all use cases",
  filterAll: "All Categories",
  filterInfra: "Core Infrastructure",
  filterSecurity: "Security",
  filterCloud: "Cloud & Containers",
  filterApp: "Applications"
}, window.SITE_CUSTOM || {});

// Flatten all UCs for quick search
let allUCs = [];
let ucIndex = {}; // id -> {cat, subcat, uc, flatIdx}
DATA.forEach(cat => {
  cat.s.forEach(sc => {
    sc.u.forEach(uc => {
      const entry = {cat, sc, uc, flatIdx: allUCs.length};
      allUCs.push(entry);
      ucIndex[uc.i] = entry;
    });
  });
});

let currentCat = null;
let currentFilter = 'all';
let currentDiffFilter = 'all';
let currentMtypeFilter = 'all';
let currentSearch = '';
let currentUCIdx = -1;

// Init stats
document.getElementById('total-count').textContent = allUCs.length;

// Build sidebar
let currentSubcat = null;

function buildSidebar() {
  const sb = document.getElementById('sidebar');
  let html = '<div class="cat-item' + (!currentCat ? ' active' : '') + '" onclick="selectCat(null)">';
  html += '<div class="cat-num">&#9733;</div><span>Overview</span>';
  html += '<span class="cat-count">' + allUCs.length + '</span></div>';

  DATA.forEach(cat => {
    const count = cat.s.reduce((a,s) => a + s.u.length, 0);
    const active = currentCat === cat.i ? ' active' : '';
    html += '<div class="cat-item' + active + '" onclick="selectCat(' + cat.i + ')">';
    html += '<div class="cat-num">' + cat.i + '</div>';
    html += '<span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + cat.n + '</span>';
    html += '<span class="cat-count">' + count + '</span>';
    html += '<span class="cat-chevron">&#9654;</span>';
    html += '</div>';
    // Subcategory list (expanded when active)
    html += '<div class="subcat-list' + (currentCat === cat.i ? ' open' : '') + '">';
    cat.s.forEach(sc => {
      const scActive = currentSubcat === sc.i ? ' active' : '';
      html += '<div class="subcat-item' + scActive + '" onclick="event.stopPropagation(); scrollToSubcat(\'' + sc.i + '\')">';
      html += '<span style="overflow:hidden;text-overflow:ellipsis">' + sc.i + ' ' + sc.n + '</span>';
      html += '<span class="sc-count">' + sc.u.length + '</span>';
      html += '</div>';
    });
    html += '</div>';
  });
  sb.innerHTML = html;
}

function scrollToSubcat(scId) {
  currentSubcat = scId;
  buildSidebar();
  const el = document.getElementById('sc-' + scId.replace('.','_'));
  if (el) el.scrollIntoView({behavior: 'smooth', block: 'start'});
}

// Derive top quick-win starters per category from DATA
const CRIT_ORDER = {critical:0, high:1, medium:2, low:3};
const DIFF_ORDER = {beginner:0, intermediate:1, advanced:2, expert:3};
function getStarters(cat, n) {
  const ucs = [];
  cat.s.forEach(sc => sc.u.forEach(uc => {
    if ((uc.c==='critical'||uc.c==='high') && (uc.f==='beginner'||uc.f==='intermediate'))
      ucs.push({uc, sc: sc.n});
  }));
  ucs.sort((a,b) => (CRIT_ORDER[a.uc.c]||9) - (CRIT_ORDER[b.uc.c]||9)
    || (DIFF_ORDER[a.uc.f]||9) - (DIFF_ORDER[b.uc.f]||9));
  return ucs.slice(0, n||5);
}

// Render overview — rich Getting Started view
let ovGroupFilter = 'all';

function renderOverview() {
  const totalSubs = DATA.reduce((a,c) => a + c.s.length, 0);
  const quickWins = allUCs.filter(e => (e.uc.f==='beginner'||e.uc.f==='intermediate') && (e.uc.c==='critical'||e.uc.c==='high')).length;

  const intro = (SITE.heroIntro || '').replace('{useCases}', allUCs.length).replace('{categories}', DATA.length);
  let html = '<div class="ov-hero glass">';
  html += '<div class="ov-hero-badge">' + escHtml(SITE.heroBadge || '') + '</div>';
  html += '<h2>' + escHtml(SITE.heroTitle || '') + '<br><span>' + escHtml(SITE.heroTitleSpan || '') + '</span></h2>';
  html += '<p>' + escHtml(intro || ('A curated path through ' + allUCs.length + ' use cases across ' + DATA.length + ' infrastructure domains.')) + '</p>';
  html += '<div class="ov-stats">';
  html += '<div><div class="ov-stat-num">' + allUCs.length + '</div><div class="ov-stat-label">' + escHtml(SITE.statUseCases || 'Use Cases') + '</div></div>';
  html += '<div><div class="ov-stat-num">' + DATA.length + '</div><div class="ov-stat-label">' + escHtml(SITE.statCategories || 'Categories') + '</div></div>';
  html += '<div><div class="ov-stat-num">' + totalSubs + '</div><div class="ov-stat-label">' + escHtml(SITE.statSubcategories || 'Subcategories') + '</div></div>';
  html += '<div><div class="ov-stat-num">' + quickWins + '</div><div class="ov-stat-label">' + escHtml(SITE.statQuickWins || 'Quick Wins') + '</div></div>';
  html += '</div></div>';

  // Roadmap (collapsible)
  html += '<div class="ov-section-title ov-collapsible" onclick="toggleOvSection(this)"><span class="ov-collapse-arrow">&#9654;</span> ' + escHtml(SITE.roadmapTitle || 'Implementation Roadmap') + '</div>';
  html += '<div class="ov-collapsible-body" style="display:none">';
  html += '<div class="ov-section-sub">' + escHtml(SITE.roadmapSub || '') + '</div>';
  html += '<div class="ov-roadmap">';
  html += '<div class="ov-phase"><div class="ov-phase-num">' + escHtml(SITE.phase1Title || 'Phase 1 · Week 1–2') + '</div><h3>' + escHtml(SITE.phase1Heading || 'Foundation') + '</h3>';
  html += '<p>' + escHtml(SITE.phase1Desc || '') + '</p>';
  html += '<ul class="ov-phase-items"><li>Deploy Universal Forwarders to key servers</li><li>Install Splunk_TA_nix and Splunk_TA_windows</li>';
  html += '<li>Configure syslog from network devices</li><li>Set up index structure (os, network, security)</li><li>Build first 5–10 Beginner use cases</li></ul></div>';
  html += '<div class="ov-phase"><div class="ov-phase-num">' + escHtml(SITE.phase2Title || 'Phase 2 · Week 3–4') + '</div><h3>' + escHtml(SITE.phase2Heading || 'Core Monitoring') + '</h3>';
  html += '<p>' + escHtml(SITE.phase2Desc || '') + '</p>';
  html += '<ul class="ov-phase-items"><li>Add virtualization monitoring (vSphere TA)</li><li>Onboard Active Directory security events</li>';
  html += '<li>Configure firewall and IDS/IPS log collection</li><li>Build Intermediate use cases with alerts</li><li>Create role-based dashboards</li></ul></div>';
  html += '<div class="ov-phase"><div class="ov-phase-num">' + escHtml(SITE.phase3Title || 'Phase 3 · Month 2') + '</div><h3>' + escHtml(SITE.phase3Heading || 'Expand Coverage') + '</h3>';
  html += '<p>' + escHtml(SITE.phase3Desc || '') + '</p>';
  html += '<ul class="ov-phase-items"><li>Integrate cloud providers (AWS/Azure/GCP)</li><li>Add database and application server monitoring</li>';
  html += '<li>Deploy container monitoring (SCK)</li><li>Build cross-domain correlation searches</li><li>Implement Advanced use cases</li></ul></div>';
  html += '<div class="ov-phase"><div class="ov-phase-num">' + escHtml(SITE.phase4Title || 'Phase 4 · Month 3+') + '</div><h3>' + escHtml(SITE.phase4Heading || 'Optimize & Automate') + '</h3>';
  html += '<p>' + escHtml(SITE.phase4Desc || '') + '</p>';
  html += '<ul class="ov-phase-items"><li>Deploy ITSI for service-level monitoring</li><li>Configure adaptive thresholds and ML</li>';
  html += '<li>Build Glass Tables for NOC/SOC</li><li>Integrate ITSM for automated ticketing</li><li>Implement Expert-level threat detection</li></ul></div>';
  html += '</div></div>';

  // Difficulty legend
  html += '<div class="ov-section-title" style="margin-top:28px">' + escHtml(SITE.categoriesTitle || 'Use Case Categories') + '</div>';
  html += '<div class="ov-section-sub">' + escHtml(SITE.categoriesSub || '') + '</div>';
  html += '<div class="ov-diff-legend">';
  html += '<div class="ov-diff-item"><div class="ov-diff-dot beginner"></div> <strong>Beginner</strong> — simple SPL, single data source</div>';
  html += '<div class="ov-diff-item"><div class="ov-diff-dot intermediate"></div> <strong>Intermediate</strong> — multi-command SPL, some tuning</div>';
  html += '<div class="ov-diff-item"><div class="ov-diff-dot advanced"></div> <strong>Advanced</strong> — complex queries, custom scripts</div>';
  html += '<div class="ov-diff-item"><div class="ov-diff-dot expert"></div> <strong>Expert</strong> — ML, multi-system correlation</div>';
  html += '</div>';

  // Group filter chips
  html += '<div class="ov-filter-wrap">';
  ['all','infra','security','cloud','app'].forEach(g => {
    const labels = {all: SITE.filterAll, infra: SITE.filterInfra, security: SITE.filterSecurity, cloud: SITE.filterCloud, app: SITE.filterApp};
    html += '<button class="ov-filter-chip' + (ovGroupFilter===g?' active':'') + '" onclick="filterOvGroup(\'' + g + '\')">' + escHtml(labels[g] || g) + '</button>';
  });
  html += '</div>';

  // Category cards
  html += '<div class="ov-cat-grid" id="ovCatGrid">';
  DATA.forEach(cat => {
    const meta = CAT_META[cat.i] || {icon:'📋',desc:'',quick:''};
    const count = cat.s.reduce((a,s) => a + s.u.length, 0);
    const starters = getStarters(cat, 5);
    let grps = [];
    Object.entries(CAT_GROUPS).forEach(([g,ids]) => { if (ids.includes(cat.i)) grps.push(g); });
    const grpStr = grps.length ? grps.join(' ') : 'infra';
    const visible = ovGroupFilter === 'all' || grpStr.includes(ovGroupFilter);

    html += '<div class="ov-cat-card" data-groups="' + grpStr + '" id="ovcat-' + cat.i + '"' + (!visible?' style="display:none"':'') + ' onclick="toggleOvCat(this,' + cat.i + ')">';
    html += '<div class="ov-cat-head"><div class="ov-cat-icon">' + meta.icon + '</div>';
    html += '<div><div class="ov-cat-num">Category ' + cat.i + '</div><h3>' + cat.n + '</h3></div>';
    html += '<span class="ov-cat-count">' + count + ' use cases</span>';
    html += '<span class="ov-expand-arrow">&#9654;</span></div>';
    html += '<div class="ov-cat-desc">' + meta.desc + '</div>';
    if (meta.quick) html += '<div class="ov-cat-quick"><strong>Quick start:</strong> ' + meta.quick + '</div>';

    // Starter UCs — derived from DATA (top critical/high + beginner/intermediate)
    html += '<div class="ov-starter-list">';
    html += '<div style="font-size:11px;color:var(--text-dim);margin-bottom:8px;font-weight:500">' + escHtml(SITE.starterListLabel || 'Top Quick-Win Use Cases — ready to implement') + '</div>';
    starters.forEach(s => {
      const uc = s.uc;
      const splId = 'ovspl_' + uc.i.replace(/\./g,'_');
      html += '<div class="ov-starter-uc" onclick="event.stopPropagation(); openUC(\'' + uc.i + '\')">';
      html += '<div class="ov-starter-head"><span class="ov-starter-id">UC-' + uc.i + '</span>';
      html += '<span class="ov-starter-name">' + uc.n + '</span>';
      html += '<span class="ov-badge ' + uc.c + '">' + uc.c.charAt(0).toUpperCase()+uc.c.slice(1) + '</span>';
      html += '<span class="ov-badge ' + uc.f + '">' + uc.f.charAt(0).toUpperCase()+uc.f.slice(1) + '</span></div>';
      html += '<div class="ov-starter-value">' + escHtml(uc.v) + '</div>';
      html += '<div class="ov-starter-ta">TA: ' + uc.t + '</div>';
      html += '<div class="ov-spl-toggle" onclick="event.stopPropagation(); toggleOvSPL(\'' + splId + '\',this)">&#9654; Show SPL Query</div>';
      html += '<div class="ov-spl-block" id="' + splId + '" onclick="event.stopPropagation()">' + escHtml(uc.q) + '<button class="copy-btn" onclick="event.stopPropagation();copySPL(this)">Copy SPL</button></div>';
      html += '</div>';
    });
    if (starters.length === 0) {
      html += '<div style="font-size:11px;color:var(--text-dim);padding:8px">' + escHtml(SITE.noStartersMessage || 'No quick-win starters — click category in sidebar to explore all use cases') + '</div>';
    }
    html += '</div></div>';
  });
  html += '</div>';

  document.getElementById('main').innerHTML = html;
}

function toggleOvSection(titleEl) {
  const arrow = titleEl.querySelector('.ov-collapse-arrow');
  const body = titleEl.nextElementSibling;
  if (body.style.display === 'none') {
    body.style.display = '';
    arrow.classList.add('open');
  } else {
    body.style.display = 'none';
    arrow.classList.remove('open');
  }
}

function toggleOvCat(card, catId) {
  const wasExpanded = card.classList.contains('expanded');
  document.querySelectorAll('.ov-cat-card.expanded').forEach(c => c.classList.remove('expanded'));
  if (!wasExpanded) card.classList.add('expanded');
}

function toggleOvSPL(id, toggle) {
  const el = document.getElementById(id);
  if (el.classList.contains('show')) {
    el.classList.remove('show');
    toggle.innerHTML = '&#9654; Show SPL Query';
  } else {
    el.classList.add('show');
    toggle.innerHTML = '&#9660; Hide SPL Query';
  }
}

function filterOvGroup(group) {
  ovGroupFilter = group;
  document.querySelectorAll('.ov-filter-chip').forEach(c => c.classList.remove('active'));
  event.target.classList.add('active');
  document.querySelectorAll('.ov-cat-card').forEach(card => {
    if (group === 'all') { card.style.display = ''; }
    else { card.style.display = (card.dataset.groups||'').includes(group) ? '' : 'none'; }
    card.classList.remove('expanded');
  });
}

function filterBtns() {
  let html = [
    {id:'all',label:'All',cls:''},
    {id:'critical',label:'Critical',cls:' crit'},
    {id:'high',label:'High',cls:' high'},
    {id:'medium',label:'Medium',cls:' med'},
    {id:'low',label:'Low',cls:' low2'}
  ].map(f =>
    '<button class="filter-btn' + f.cls + (currentFilter===f.id?' active':'') +
    '" onclick="setFilter(\'' + f.id + '\')">' + f.label + '</button>'
  ).join('');
  html += '<div class="filter-sep"></div>';
  html += [
    {id:'all',label:'All Levels',cls:''},
    {id:'beginner',label:'Beginner',cls:' beg'},
    {id:'intermediate',label:'Intermediate',cls:' inter'},
    {id:'advanced',label:'Advanced',cls:' advf'},
    {id:'expert',label:'Expert',cls:' expf'}
  ].map(f =>
    '<button class="filter-btn' + f.cls + (currentDiffFilter===f.id?' active':'') +
    '" onclick="setDiffFilter(\'' + f.id + '\')">' + f.label + '</button>'
  ).join('');
  return html;
}

function getMtypeFilterBtns(catId, resultsForTypes) {
  const types = new Set();
  if (resultsForTypes && resultsForTypes.length) {
    resultsForTypes.forEach(e => {
      const uc = e.uc || e;
      if (Array.isArray(uc.mtype)) uc.mtype.forEach(t => types.add(t));
    });
  } else if (catId != null) {
    const cat = DATA.find(c => c.i === catId);
    if (cat) cat.s.forEach(sc => sc.u.forEach(uc => {
      if (Array.isArray(uc.mtype)) uc.mtype.forEach(t => types.add(t));
    }));
  }
  if (types.size === 0) return '';
  const order = ['Availability','Performance','Security','Configuration','Capacity','Fault','Anomaly','Compliance'];
  const sorted = [...types].sort((a,b) => {
    const ia = order.indexOf(a); const ib = order.indexOf(b);
    if (ia >= 0 && ib >= 0) return ia - ib;
    if (ia >= 0) return -1; if (ib >= 0) return 1;
    return a.localeCompare(b);
  });
  let html = '<div class="mtype-filter-wrap"><span class="mtype-label">Monitoring type:</span>';
  html += '<button class="mtype-filter-chip' + (currentMtypeFilter==='all'?' active':'') + '" data-mtype="all" onclick="setMtypeFilter(this.dataset.mtype)">All</button>';
  sorted.forEach(t => {
    html += '<button class="mtype-filter-chip' + (currentMtypeFilter===t?' active':'') + '" data-mtype="' + escHtml(t) + '" onclick="setMtypeFilter(this.dataset.mtype)">' + escHtml(t) + '</button>';
  });
  html += '</div>';
  return html;
}

function setMtypeFilter(mtype) {
  currentMtypeFilter = mtype;
  if (currentSearch) renderSearchResults();
  else if (currentCat !== null) renderCategory(currentCat);
}

// Render category
function renderCategory(catId) {
  const cat = DATA.find(c => c.i === catId);
  if (!cat) return;

  let html = '<div class="cat-header glass">';
  html += '<h2>' + cat.i + '. ' + cat.n + '</h2>';
  const count = cat.s.reduce((a,s) => a + s.u.length, 0);
  html += '<div class="cat-meta"><span>' + cat.s.length + ' subcategories</span>';
  html += '<span>' + count + ' use cases</span></div></div>';

  html += '<div class="filter-bar">' + filterBtns() + '</div>';
  html += getMtypeFilterBtns(catId);

  cat.s.forEach(sc => {
    let ucs = sc.u;
    if (currentFilter !== 'all') ucs = ucs.filter(u => u.c === currentFilter);
    if (currentDiffFilter !== 'all') ucs = ucs.filter(u => u.f === currentDiffFilter);
    if (currentMtypeFilter !== 'all') ucs = ucs.filter(u => Array.isArray(u.mtype) && u.mtype.includes(currentMtypeFilter));
    if (currentSearch) {
      const q = currentSearch.toLowerCase();
      ucs = ucs.filter(u =>
        u.n.toLowerCase().includes(q) || u.i.includes(q) ||
        u.v.toLowerCase().includes(q) || u.q.toLowerCase().includes(q) ||
        u.t.toLowerCase().includes(q) || u.d.toLowerCase().includes(q) ||
        u.m.toLowerCase().includes(q)
      );
    }
    if (ucs.length === 0) return;

    html += '<div class="subcat-section" id="sc-' + sc.i.replace('.','_') + '">';
    html += '<div class="subcat-header">' + sc.i + ' ' + sc.n;
    html += '<span class="subcat-count">(' + ucs.length + ')</span></div>';
    html += '<div class="uc-grid">';
    ucs.forEach(uc => {
      html += renderUCCard(uc);
    });
    html += '</div></div>';
  });

  document.getElementById('main').innerHTML = html;
}

function renderUCCard(uc) {
  const ta = uc.t.replace(/`/g, '');
  const diffLabel = {beginner:'Beginner',intermediate:'Intermediate',advanced:'Advanced',expert:'Expert'}[uc.f]||'';
  let html = '<div class="glass uc-card ' + uc.c + '" onclick="openUC(\'' + uc.i + '\')">';
  html += '<div class="uc-card-head">';
  html += '<div class="uc-crit-dot ' + uc.c + '"></div>';
  html += '<div style="flex:1"><div class="uc-name">' + escHtml(uc.n) + '</div>';
  html += '<div class="uc-id">UC-' + uc.i + '</div></div>';
  if (diffLabel) html += '<span class="uc-diff-badge ' + uc.f + '">' + diffLabel + '</span>';
  html += '</div>';
  html += '<div class="uc-value">' + escHtml(uc.v) + '</div>';
  const cimModels = Array.isArray(uc.a) ? uc.a : null;
  const mtypes = Array.isArray(uc.mtype) ? uc.mtype : null;
  if (ta || cimModels || mtypes) {
    html += '<div class="uc-tags">';
    if (ta) html += '<span class="uc-tag">' + escHtml(ta.substring(0,40)) + '</span>';
    if (cimModels) html += '<span class="uc-cim-tag">⚡ ' + cimModels.join(', ') + '</span>';
    if (mtypes) mtypes.forEach(t => { html += '<span class="uc-mtype-tag">' + escHtml(t) + '</span>'; });
    html += '</div>';
  }
  html += '</div>';
  return html;
}

// Search across all
function renderSearchResults() {
  const q = currentSearch.toLowerCase();
  let results = allUCs.filter(e => {
    const u = e.uc;
    return u.n.toLowerCase().includes(q) || u.i.includes(q) ||
      u.v.toLowerCase().includes(q) || u.q.toLowerCase().includes(q) ||
      u.t.toLowerCase().includes(q) || u.d.toLowerCase().includes(q) ||
      u.m.toLowerCase().includes(q) || e.cat.n.toLowerCase().includes(q) ||
      e.sc.n.toLowerCase().includes(q) ||
      (Array.isArray(u.a) && u.a.join(' ').toLowerCase().includes(q)) ||
      (Array.isArray(u.mtype) && u.mtype.join(' ').toLowerCase().includes(q));
  });
  if (currentFilter !== 'all') results = results.filter(e => e.uc.c === currentFilter);
  if (currentDiffFilter !== 'all') results = results.filter(e => e.uc.f === currentDiffFilter);
  const resultsBeforeMtype = results.slice();
  if (currentMtypeFilter !== 'all') results = results.filter(e => Array.isArray(e.uc.mtype) && e.uc.mtype.includes(currentMtypeFilter));

  let html = '<div class="cat-header glass"><h2>Search: "' + escHtml(currentSearch) + '"</h2>';
  html += '<div class="cat-meta"><span>' + results.length + ' results</span></div></div>';
  html += '<div class="filter-bar">' + filterBtns() + '</div>';
  html += getMtypeFilterBtns(null, resultsBeforeMtype);

  if (results.length === 0) {
    html += '<div class="no-results"><div class="big">&#128270;</div><p>No use cases match your search</p></div>';
  } else {
    // Group by category
    const grouped = {};
    results.forEach(e => {
      const key = e.cat.i;
      if (!grouped[key]) grouped[key] = {cat: e.cat, ucs: []};
      grouped[key].ucs.push(e.uc);
    });
    Object.values(grouped).forEach(g => {
      html += '<div class="subcat-section">';
      html += '<div class="subcat-header">' + g.cat.i + '. ' + g.cat.n;
      html += '<span class="subcat-count">(' + g.ucs.length + ')</span></div>';
      html += '<div class="uc-grid">';
      g.ucs.forEach(uc => { html += renderUCCard(uc); });
      html += '</div></div>';
    });
  }
  document.getElementById('main').innerHTML = html;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Open use case detail
function openUC(id) {
  const entry = ucIndex[id];
  if (!entry) return;
  currentUCIdx = entry.flatIdx;
  renderModal(entry);
  document.getElementById('modal-overlay').classList.add('show');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('show');
  document.body.style.overflow = '';
}

function renderModal(entry) {
  const uc = entry.uc;
  const cat = entry.cat;
  const sc = entry.sc;
  const critLabel = {critical:'Critical',high:'High',medium:'Medium',low:'Low'}[uc.c]||'';
  const diffLabel = {beginner:'Beginner',intermediate:'Intermediate',advanced:'Advanced',expert:'Expert'}[uc.f]||'';

  let html = '<div style="position:relative">';
  html += '<button class="modal-close" onclick="closeModal()">&#10005;</button>';
  html += '<div class="modal-head">';
  html += '<div class="modal-crit-badge ' + uc.c + '">' + critLabel + '</div>';
  if (diffLabel) html += '<div class="modal-crit-badge ' + uc.f + '">' + diffLabel + '</div>';
  html += '<div><h2>' + escHtml(uc.n) + '</h2>';
  html += '<div class="modal-id">UC-' + uc.i + ' &nbsp;|&nbsp; ' + escHtml(cat.n) + ' &rarr; ' + escHtml(sc.n) + '</div>';
  html += '</div></div>';

  html += '<div class="modal-section"><h3>Value</h3><p>' + escHtml(uc.v) + '</p></div>';

  html += '<div class="modal-meta-grid">';
  html += '<div class="meta-item"><h4>App / TA</h4><p>' + escHtml(uc.t||'—') + '</p></div>';
  html += '<div class="meta-item"><h4>Data Sources</h4><p>' + escHtml(uc.d||'—') + '</p></div>';
  const cimVal = Array.isArray(uc.a) ? uc.a.join(', ') : (uc.a || 'N/A');
  html += '<div class="meta-item"><h4>CIM Data Model</h4><p>' + (cimVal === 'N/A' ? '<span style="color:var(--text-dim)">N/A</span>' : '<span style="color:var(--accent);font-family:JetBrains Mono,monospace;font-size:12px">⚡ ' + escHtml(cimVal) + '</span>') + '</p></div>';
  if (Array.isArray(uc.mtype) && uc.mtype.length) {
    html += '<div class="meta-item"><h4>Monitoring type</h4><p>' + uc.mtype.map(t => '<span class="uc-mtype-tag" style="margin-right:4px">' + escHtml(t) + '</span>').join('') + '</p></div>';
  }
  html += '</div>';

  if (uc.q) {
    html += '<div class="modal-section" style="margin-top:16px"><h3>SPL Query</h3>';
    html += '<div class="spl-block"><button class="copy-btn" onclick="copySPL(this)">Copy</button>';
    html += escHtml(uc.q) + '</div></div>';
  }

  if (uc.qs) {
    html += '<div class="modal-section" style="margin-top:16px"><h3>tstats Query <span style="font-size:11px;font-weight:400;color:var(--text-dim);margin-left:8px">(Accelerated — requires DMA enabled)</span></h3>';
    html += '<div class="spl-block" style="border-color:rgba(101,166,55,0.3);background:rgba(101,166,55,0.05)"><button class="copy-btn" onclick="copySPL(this)">Copy</button>';
    html += escHtml(uc.qs) + '</div></div>';
  }

  if (uc.m) {
    html += '<div class="modal-section"><h3>Implementation</h3><p>' + escHtml(uc.m) + '</p></div>';
  }
  if (uc.z) {
    html += '<div class="modal-section"><h3>Visualization</h3><p>' + escHtml(uc.z) + '</p></div>';
  }

  // Nav
  html += '<div class="modal-nav">';
  html += '<button class="nav-btn" onclick="navUC(-1)"' + (currentUCIdx<=0?' disabled':'') + '>&larr; Previous</button>';
  html += '<span style="font-size:12px;color:var(--text-dim)">' + (currentUCIdx+1) + ' / ' + allUCs.length + '</span>';
  html += '<button class="nav-btn" onclick="navUC(1)"' + (currentUCIdx>=allUCs.length-1?' disabled':'') + '>Next &rarr;</button>';
  html += '</div></div>';

  document.getElementById('modal').innerHTML = html;
}

function navUC(dir) {
  const newIdx = currentUCIdx + dir;
  if (newIdx < 0 || newIdx >= allUCs.length) return;
  currentUCIdx = newIdx;
  renderModal(allUCs[newIdx]);
  document.getElementById('modal').scrollTop = 0;
}

function copySPL(btn) {
  const raw = btn.parentElement.textContent;
  const text = raw.replace(/^(Copy|Copied!)\s*/i, '').trim();
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = 'Copied!';
    setTimeout(() => { btn.textContent = 'Copy'; }, 1500);
  });
}

// State management
function selectCat(id) {
  currentCat = id;
  currentSubcat = null;
  currentSearch = '';
  currentMtypeFilter = 'all';
  document.getElementById('search').value = '';
  buildSidebar();
  if (id === null) renderOverview();
  else renderCategory(id);
  closeSidebarOnMobile();
}

function setFilter(f) {
  currentFilter = f;
  if (currentSearch) renderSearchResults();
  else if (currentCat !== null) renderCategory(currentCat);
  else renderOverview();
}

function setDiffFilter(f) {
  currentDiffFilter = f;
  if (currentSearch) renderSearchResults();
  else if (currentCat !== null) renderCategory(currentCat);
  else renderOverview();
}

// Search handler
let searchTimeout;
document.getElementById('search').addEventListener('input', function(e) {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(() => {
    currentSearch = e.target.value.trim();
    if (currentSearch) {
      currentCat = null;
      buildSidebar();
      renderSearchResults();
    } else {
      selectCat(null);
    }
  }, 200);
});

// Keyboard
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeModal();
  if (document.getElementById('modal-overlay').classList.contains('show')) {
    if (e.key === 'ArrowLeft') navUC(-1);
    if (e.key === 'ArrowRight') navUC(1);
  }
  if (e.key === '/' && !e.ctrlKey && !e.metaKey && document.activeElement.tagName !== 'INPUT') {
    e.preventDefault();
    document.getElementById('search').focus();
  }
});

document.getElementById('modal-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// Mobile sidebar toggle
document.getElementById('sidebar-toggle').addEventListener('click', function() {
  var sidebar = document.getElementById('sidebar');
  sidebar.classList.toggle('open');
  this.setAttribute('aria-expanded', sidebar.classList.contains('open'));
});

// Close sidebar when a category is selected on mobile
function closeSidebarOnMobile() {
  if (window.innerWidth <= 600) {
    document.getElementById('sidebar').classList.remove('open');
  }
}

// Init
buildSidebar();
renderOverview();
</script>
</body>

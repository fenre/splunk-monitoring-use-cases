9","n":"Registry Run Key Persistence Monitoring","c":"critical","f":"advanced","v":"Registry Run keys are the most common persistence mechanism for malware. Monitoring autostart registry locations detects new malware installations.","t":"`Splunk_TA_windows`","d":"`sourcetype=WinEventLog:Microsoft-Windows-Sysmon/Operational` (EventCode 13)","q":"index=wineventlog EventCode=13\n| where match(TargetObject, \"(?i)(CurrentVersion\\\\\\\\Run|CurrentVersion\\\\\\\\RunOnce|Winlogon\\\\\\\\Shell|Winlogon\\\\\\\\Userinit|Explorer\\\\\\\\Shell Folders)\")\n| where NOT match(Details, \"(?i)(program files|windows\\\\\\\\system32|syswow64)\")\n| table _time, host, User, Image, TargetObject, Details\n| sort -_time","m":"Sysmon EventCode 13 (RegistryValueSet) monitors registry modifications. Track all autostart locations: Run, RunOnce, RunServices, Winlogon Shell/Userinit, Explorer Shell Folders, and AppInit_DLLs. Filter known-legitimate entries (Program Files, System32). Alert on entries pointing to temp directories, AppData, user profiles, or encoded/obfuscated paths. Monitor both HKLM (system-wide) and HKCU (per-user). MITRE ATT&CK T1547.001.","z":"Table (new Run key entries), Alert on suspicious paths, Timeline."},{"i":"1.2.120","n":"BitLocker Recovery & Compliance Monitoring","c":"high","f":"advanced","v":"BitLocker protects data at rest. Monitoring recovery events detects unauthorized hardware changes, and compliance tracking ensures all endpoints are encrypted.","t":"`Splunk_TA_windows`","d":"`sourcetype=WinEventLog:Microsoft-Windows-BitLocker/BitLocker Management` (EventCode 770, 771, 773, 774, 775)","q":"index=wineventlog source=\"*BitLocker*\" EventCode IN (770, 771, 773, 774, 775, 776, 778)\n| eval Status=case(EventCode=770,\"Protection_Off\", EventCode=771,\"Protection_Resumed\", EventCode=773,\"Volume_Recovery\", EventCode=774,\"Key_Rotated\", EventCode=775,\"Auto_Unlock_Enabled\", EventCode=776,\"Recovery_Password_Backup\", EventCode=778,\"TPM_Error\", 1=1,\"Other\")\n| stats count by host, Status, VolumeName\n| sort -count","m":"Monitor BitLocker Management log for encryption status changes. Protection off (770) may indicate maintenance or attack \u2014 correlate with change tickets. Volume recovery (773) means the recovery key was needed \u2014 investigate hardware changes or TPM issues. Track recovery password backup to AD (776) for compliance. Run a scripted input querying `manage-bde -status` for real-time encryption state across all volumes. Alert on any protection suspension on servers.","z":"Dashboard (encryption compliance %), Table (events), Alert on protection suspension."},{"i":"1.2.121","n":"DNS Client Query Anomalies","c":"medium","f":"intermediate","v":"Monitoring DNS queries from Windows clients reveals C2 beacons, DNS tunneling, and DGA-based malware communicating with attacker infrastructure.","t":"`Splunk_TA_windows`","d":"`sourcetype=WinEventLog:Microsoft-Windows-Sysmon/Operational` (EventCode 22), `sourcetype=WinEventLog:Microsoft-Windows-DNS-Client/Operational`","q":"index=wineventlog EventCode=22\n| eval domain=lower(QueryName)\n| eval domain_len=len(domain)\n| eval label_count=mvcount(split(domain, \".\"))\n| where domain_len>50 OR label_count>5\n| stats count dc(QueryName) as UniqueDomains by host, Image\n| where UniqueDomains>100 OR count>500\n| sort -UniqueDomains","m":"Sysmon EventCode 22 logs DNS queries with the originating process. Detect DNS tunneling via long domain names (>50 chars), high label counts, and high-entropy subdomains. Identify DGA patterns: many unique NXDomain responses from a single process. Alert on processes making unusual DNS query volumes. Baseline per-process DNS behavior and alert on deviations.","z":"Timechart (query volume by process), Table (anomalous queries), Alert on tunneling indicators."},{"i":"1.2.122","n":"Local Account Creation & Modification","c":"critical","f":"intermediate","v":"Creating local accounts is a persistence technique. On domain-joined systems, local account creation is rare and suspicious.","t":"`Splunk_TA_windows`","d":"`sourcetype=WinEventLog:Security` (EventCode 4720, 4722, 4724, 4738)","q":"index=wineventlog EventCode IN (4720, 4722, 4724, 4738) NOT TargetDomainName IN (\"NT AUTHORITY\", \"NT-AUTORIT\u00c4T\")\n| eval Action=case(EventCode=4720,\"Account_Created\", EventCode=4722,\"Account_Enabled\", EventCode=4724,\"Password_Reset\", EventCode=4738,\"Account_Changed\", 1=1,\"Other\")\n| table _time, host, Action, TargetUserName, TargetDomainName, SubjectUserName\n| sort -_time","m":"Track local account creation (4720), enabling (4722), password reset (4724), and modification (4738). On domain-joined servers, local account creation is almost always suspicious. Alert on any local account creation, especially when performed by non-admin processes or via net.exe/net1.exe. Filter out managed service accounts and known automation. MITRE ATT&CK T1136.001.","z":"Table (account events), Alert on creation, Timeline."},{"i":"1.2.123","n":"Token Manipulation / Privilege Escalation","c":"critical","f":"intermediate","v":"Token manipulation (impersonation, token duplication) allows attackers to escalate privileges. Detecting abuse of SeImpersonatePrivilege catches potato-style attacks.","t":"`Splunk_TA_windows`","d":"`sourcetype=WinEventLog:Security` (EventCode 4673, 4674)","q":"index=wineventlog EventCode IN (4673, 4674) PrivilegeList IN (\"SeImpersonatePrivilege\", \"SeAssignPrimaryTokenPrivilege\", \"SeTcbPrivilege\", \"SeDebugPrivilege\")\n| where NOT match(ProcessName, \"(?i)(lsass|services|svchost|csrss|wininit|smss)\")\n| stats count by host, SubjectUserName, ProcessName, PrivilegeList\n| sort -count","m":"Enable Audit Sensitive Privilege Use. Monitor 4673 (sensitive privilege used) and 4674 (privilege operation on privileged object). Focus on SeImpersonatePrivilege (potato attacks), SeDebugPrivilege (process injection), SeTcbPrivilege (token creation), and SeAssignPrimaryTokenPrivilege. Filter OS processes. Alert on privilege use by service accounts running web apps or databases (common potato attack targets). MITRE ATT&CK T1134.","z":"Table (privilege use events), Alert on suspicious processes, Bar chart."},{"i":"1.2.124","n":"Process Injection Detection (Sysmon)","c":"critical","f":"expert","v":"Process injection hides malicious code inside legitimate processes. Detecting injection techniques (CreateRemoteThread, APC, process hollowing) catches advanced malware.","t":"`Splunk_TA_windows`","d":"`sourcetype=WinEventLog:Microsoft-Windows-Sysmon/Operational` (EventCode 8, 10)","q":"index=wineventlog EventCode=8\n| where NOT match(SourceImage, \"(?i)(csrss|MsMpEng|SentinelAgent|CrowdStrike)\")\n| eval InjectionTarget=TargetImage\n| table _time, host, SourceImage, InjectionTarget, SourceUser, StartModule, StartFunction\n| append [search index=wineventlog EventCode=10 GrantedAccess IN (\"0x1FFFFF\",\"0x801\",\"0x1FFB\") | where NOT match(SourceImage, \"(?i)(csrss|MsMpEng|lsass)\") | table _time, host, SourceImage, TargetImage, SourceUser, GrantedAccess]\n| sort -_time","m":"Sysmon EventCode 8 (CreateRemoteThread) detects thread injection into remote processes. Filter legitimate EDR/AV injections. EventCode 10 (ProcessAccess) with specific access masks (0x1FFFFF=ALL_ACCESS, 0x801=VM_WRITE+QUERY) detects memory writes for process hollowing. Alert on any remote thread creation targeting system processes (explorer.exe, svchost.exe, services.exe). Correlate with EventCode 1 for full process chain. MITRE ATT&CK T1055.","z":"Table (injection events), Network diagram (source\u2192target), Alert on detection."},{"i":"1.2.125","n":"Cluster Shared Volume (CSV) Health","c":"high","f":"intermediate","v":"Cluster Shared Volumes underpin Hyper-V and SQL Server failover clusters. CSV failures cause VM/database unavailability across the cluster.","t":"`Splunk_TA_windows`","d":"`sourcetype=WinEventLog:Microsoft-Windows-FailoverClustering/Operational`","q":"index=wineventlog source=\"WinEventLog:Microsoft-Windows-FailoverClustering/Operational\" EventCode IN (5120, 5121, 5140, 5142, 5143)\n| eval Status=case(EventCode=5120,\"CSV_Online\", EventCode=5121,\"CSV_Offline\", EventCode=5140,\"CSV_Redirected\", EventCode=5142,\"CSV_IO_Paused\", EventCode=5143,\"CSV_IO_Resumed\", 1=1,\"Other\")\n| stats count latest(_time) as LastEvent by host, VolumeName, Status\n| where Status IN (\"CSV_Offline\", \"CSV_Redirected\", \"CSV_IO_Paused\")\n| sort -LastEvent","m":"Monitor Failover Clustering Operational log for CSV state changes. CSV Offline (5121) is critical \u2014 VMs will fail. CSV Redirected (5140) means I/O is going through another node (degraded performance). CSV I/O Paused (5142) freezes all VMs on that volume. Alert immediately on offline and paused states. Monitor CSV latency via Perfmon: Cluster CSV File System counters. Track cluster node membership changes (1069/1070/1135).","z":"Status dashboard (CSV states), Timechart (state changes), Alert on failures."},{"i":"1.2.126","n":"DCOM Activation Failures","c":"medium","f":"intermediate","v":"DCOM failures break distributed applications, WMI remote management, and SCCM client operations. Monitoring identifies misconfigured permissions and network issues.","t":"`Splunk_TA_windows`","d":"`sourcetype=WinEventLog:System` (EventCode 10016)","q":"index=wineventlog source=\"WinEventLog:System\" EventCode=10016\n| rex field=Message \"CLSID\\s+(?<CLSID>\\{[^}]+\\}).*APPID\\s+(?<APPID>\\{[^}]+\\})\"\n| stats count by host, CLSID, APPID\n| where count>10\n| sort -count","m":"DCOM activation errors (10016) are common but mostly benign. Focus on recurring errors that affect application functionality. Map CLSIDs to application names to identify impacted services. Filter known-benign CLSIDs (RuntimeBroker, PerAppRuntimeBroker, ShellServiceHost). Alert on DCOM errors affecting SCCM ({4991D34B}), WMI ({76A64158}), or custom line-of-business applications. Track error count trends \u2014 sudden spikes indicate configuration changes.","z":"Bar chart (top CLSIDs), Timechart (error trend), Table (details)."},{"i":"1.2.127","n":"Automatic Windows Update Compliance","c":"high","f":"advanced","v":"Unpatched systems are the primary attack surface. Tracking Windows Update status across all systems ensures timely patching and compliance reporting.","t":"`Splunk_TA_windows`","d":"`sourcetype=WinEventLog:Microsoft-Windows-WindowsUpdateClient/Operational`","q":"index=wineventlog source=\"WinEventLog:Microsoft-Windows-WindowsUpdateClient/Operational\" EventCode IN (19, 20, 25, 31, 35)\n| eval Status=case(EventCode=19,\"Install_Success\", EventCode=20,\"Install_Failed\", EventCode=25,\"Restart_Required\", EventCode=31,\"Download_Failed\", EventCode=35,\"Download_Success\", 1=1,\"Other\")\n| stats latest(_time) as LastUpdate latest(Status) as LastStatus count(eval(Status=\"Install_Failed\")) as FailCount by host\n| eval DaysSinceUpdate=round((now()-LastUpdate)/86400, 0)\n| where DaysSinceUpdate>30 OR FailCount>0\n| sort -DaysSinceUpdate","m":"Monitor Windows Update Client Operational log. Track successful installs (19), failed installs (20), restart required (25), download failures (31). Calculate days since last successful update for each host. Alert on: systems not updated in 30+ days, repeated installation failures, and systems stuck in \"restart required\" state. Supplement with `wmic qfe list` scripted input for installed KB inventory. Essential for vulnerability management and audit compliance.","z":"Table (compliance status), Single value (% compliant), Bar chart (days since update)."},{"i":"1.2.128","n":"Service Account Logon Anomalies","c":"critical","f":"intermediate","v":"Compromised service accounts grant persistent access and often have elevated privileges. Detecting anomalous service account behavior catches credential theft early.","t":"`Splunk_TA_windows`","d":"`sourcetype=WinEventLog:Security` (EventCode 4624, 4625)","q":"index=wineventlog EventCode=4624 Logon_Type IN (2, 10, 11)\n| lookup service_accounts TargetUserName OUTPUT is_service_account\n| where is_service_account=\"yes\"\n| eval src=coalesce(Source_Network_Address, IpAddress)\n| stats count dc(host) as TargetHosts values(Logon_Type) as LogonTypes by TargetUserName, src\n| where LogonTypes!=5 AND LogonTypes!=3\n| sort -count","m":"Define a lookup of known service accounts. Service accounts should only log on with Type 5 (Service) or Type 3 (Network) from expected sources. Alert on interactive logons (Type 2/10/11) by service accounts \u2014 this indicates credential compromise and human use. Track source IPs and target hosts \u2014 service accounts should access a consistent set of systems. Alert on new source IPs or target hosts for any service account.","z":"Table (anomalous logons), Alert on interactive service account logon, Network diagram."},{"i":"1.2.129","n":"Sysmon Driver/Image Load Monitoring","c":"high","f":"advanced","v":"Monitoring driver and DLL loads catches rootkits, vulnerable drivers, and DLL side-loading attacks that evade process-level monitoring.","t":"`Splunk_TA_windows`","d":"`sourcetype=WinEventLog:Microsoft-Windows-Sysmon/Operational` (EventCode 6, 7)","q":"index=wineventlog EventCode=6 Signed=\"false\"\n| table _time, host, ImageLoaded, Hashes, Signature, SignatureStatus\n| sort -_time\n| append [search index=wineventlog EventCode=7 Signed=\"false\" | where NOT match(ImageLoaded, \"(?i)(windows\\\\\\\\system32|program files)\") | table _time, host, Image, ImageLoaded, Hashes, SignatureStatus]","m":"Sysmon EventCode 6 (DriverLoad) monitors kernel driver loads. Alert on unsigned drivers \u2014 all legitimate drivers should be signed. EventCode 7 (ImageLoad) monitors DLL loads (high volume \u2014 use targeted config). Focus on unsigned DLLs loaded from unusual paths. Track BYOVD (Bring Your Own Vulnerable Driver) attacks by maintaining a list of known-vulnerable driver hashes. MITRE ATT&CK T1068, T1574.002.","z":"Table (unsigned loads), Alert on unsigned kernel drivers, Timechart."},{"i":"1.2.130","n":"Scheduled Task Modification for Persistence","c":"critical","f":"advanced","v":"Modifying existing scheduled tasks is stealthier than creating new ones. Attackers replace legitimate task actions to achieve persistence without new artifacts.","t":"`Splunk_TA_windows`","d":"`sourcetype=WinEventLog:Microsoft-Windows-TaskScheduler/Operational` (EventCode 140, 141, 142)","q":"index=wineventlog source=\"WinEventLog:Microsoft-Windows-TaskScheduler/Operational\" EventCode IN (140, 141, 142)\n| eval Action=case(EventCode=140,\"Task_Updated\", EventCode=141,\"Task_Deleted\", EventCode=142,\"Task_Disabled\", 1=1,\"Other\")\n| table _time, host, TaskName, Action, UserContext\n| where NOT match(TaskName, \"(?i)(\\\\\\\\Microsoft\\\\\\\\Windows\\\\\\\\)\")\n| sort -_time","m":"Monitor Task Scheduler Operational log for task modifications (140), deletions (141), and disabling (142). Focus on non-Microsoft tasks being modified. Correlate with Sysmon process creation (EventCode 1) to identify what tool made the change. Alert on modifications to security-related tasks (AV scans, backup tasks). Track task action changes \u2014 replacing a legitimate executable with malware. Maintain baseline of critical task configurations.","z":"Table (task changes), Alert on modification of critical tasks, Timeline."}]},{"i":"1.3","n":"macOS Endpoints","u":[{"i":"1.3.1","n":"System Resource Monitoring","c":"medium","f":"intermediate","v":"Endpoint performance visibility helps IT support triage user complaints and identify machines needing replacement or upgrades.","t":"Splunk UF for macOS, custom scripted inputs","d":"Custom scripted inputs (`top -l 1`, `vm_stat`, `df`)","q":"index=os sourcetype=macos_top host=*\n| stats latest(cpu_pct) as cpu, latest(mem_pct) as memory by host\n| where cpu > 80 OR memory > 90","m":"Install Splunk UF on macOS endpoints. Create scripted inputs for `top -l 1 -s 0`, `vm_stat`, and `df -h`. Run every 60-300 seconds. Parse key metrics.","z":"Table of endpoints, Gauge panels, Line chart trending."},{"i":"1.3.2","n":"FileVault Encryption Status","c":"high","f":"intermediate","v":"Unencrypted endpoints are a data breach risk if lost or stolen. Compliance requirement for most security frameworks (SOC2, ISO27001, PCI).","t":"Splunk UF, custom scripted input","d":"Custom scripted input (`fdesetup status`)","q":"index=os sourcetype=macos_filevault host=*\n| stats latest(status) as fv_status by host\n| where fv_status!=\"FileVault is On.\"","m":"Create a scripted input: `fdesetup status`. Run daily. Alert on any endpoint where FileVault is not enabled. Feed into compliance dashboard.","z":"Pie chart (encrypted vs. not), Table of non-compliant hosts, Single value (compliance %)."},{"i":"1.3.3","n":"Gatekeeper and SIP Status","c":"medium","f":"intermediate","v":"Disabled Gatekeeper or System Integrity Protection weakens macOS security posture. May indicate developer override or tampering.","t":"Splunk UF, custom scripted input","d":"Custom scripted inputs (`spctl --status`, `csrutil status`)","q":"index=os sourcetype=macos_security host=*\n| stats latest(gatekeeper) as gk, latest(sip) as sip by host\n| where gk!=\"enabled\" OR sip!=\"enabled\"","m":"Scripted inputs for `spctl --status` and `csrutil status`. Run daily. Dashboard showing fleet-wide compliance.","z":"Pie chart (compliant vs. not), Table of non-compliant endpoints."},{"i":"1.3.4","n":"Software Update Compliance","c":"medium","f":"intermediate","v":"Unpatched macOS endpoints are vulnerable. Tracking update levels across the fleet supports vulnerability management.","t":"Splunk UF, custom scripted input","d":"Custom scripted input (`softwareupdate -l`, `sw_vers`)","q":"index=os sourcetype=macos_sw_vers host=*\n| stats latest(ProductVersion) as os_version by host\n| eval is_current = if(os_version >= \"14.3\", \"Yes\", \"No\")\n| stats count by is_current","m":"Scripted input for `sw_vers` (weekly) and `softwareupdate -l` (daily). Track OS versions and pending updates. Alert when critical security updates are pending >7 days.","z":"Table (host, OS version, pending updates), Pie chart (version distribution)."},{"i":"1.3.5","n":"Application Crash Monitoring","c":"low","f":"intermediate","v":"Frequent application crashes degrade user experience and may indicate malware, resource issues, or incompatible software.","t":"Splunk UF","d":"`/Library/Logs/DiagnosticReports/*.crash`","q":"index=os sourcetype=macos_crash host=*\n| rex \"Process:\\s+(?<process>\\S+)\"\n| stats count by host, process\n| sort -count","m":"Forward `~/Library/Logs/DiagnosticReports/` and `/Library/Logs/DiagnosticReports/`. Use `monitor` input in inputs.conf. Parse process name and exception type from crash reports.","z":"Table (process, host, count), Bar chart of top crashing apps."}]},{"i":"1.4","n":"Bare-Metal / Hardware","u":[{"i":"1.4.1","n":"Hardware Sensor Monitoring","c":"high","f":"intermediate","v":"Temperature, voltage, and fan speed anomalies predict impending hardware failures before they cause unplanned downtime.","t":"Custom scripted input (`ipmitool`), SNMP","d":"IPMI sensor data via scripted input, `sourcetype=ipmi:sensor` (custom)","q":"index=hardware sourcetype=ipmi:sensor\n| eval is_critical = if(status=\"Critical\" OR status=\"Non-Recoverable\", 1, 0)\n| where is_critical=1\n| table _time host sensor_name reading unit status\n| sort -_time","m":"Install `ipmitool` on hosts. Create scripted input: `ipmitool sensor list` (interval=300). Parse sensor name, reading, unit, and status. Alert on Critical/Non-Recoverable status. Alternatively, use SNMP to poll vendor-specific MIBs (Dell iDRAC, HP iLO, Lenovo IMM).","z":"Table of critical sensors, Gauge per sensor type, Heatmap across hosts."},{"i":"1.4.2","n":"RAID Degradation Alerts","c":"critical","f":"intermediate","v":"A degraded RAID has lost redundancy \u2014 another disk failure means data loss. Requires immediate attention.","t":"Custom scripted input (`megacli`, `storcli`, `ssacli`)","d":"Custom sourcetype (RAID controller output)","q":"index=hardware sourcetype=raid_status\n| where state!=\"Optimal\" AND state!=\"Online\"\n| table _time host vd_name state disks_failed\n| sort -_time","m":"Create scripted input for the RAID controller CLI tool: `storcli /c0/v0 show` or `megacli -LDInfo -Lall -aAll`. Run every 300 seconds. Alert immediately on any non-Optimal state.","z":"Status indicator per array, Table, Alert panel (critical)."},{"i":"1.4.3","n":"Power Supply Failure","c":"critical","f":"beginner","v":"Lost power supply redundancy means a single PSU failure away from an unplanned outage. Replacement needs to happen before the remaining PSU fails.","t":"Custom scripted input (`ipmitool`), SNMP, vendor management syslog (iLO/iDRAC)","d":"IPMI SEL (System Event Log) via scripted input, syslog from BMC","q":"index=hardware sourcetype=ipmi:sel (\"Power Supply\" OR \"PS\" OR \"power_supply\") (\"Failure\" OR \"Absent\" OR \"fault\" OR \"lost\")\n| table _time host sensor event_description\n| sort -_time","m":"Forward IPMI System Event Log data. Enable syslog forwarding from iLO/iDRAC to Splunk. Alert immediately on PSU failure events.","z":"Events timeline, Status indicator per host, Alert panel."},{"i":"1.4.4","n":"Predictive Disk Failure","c":"high","f":"intermediate","v":"SMART attributes can predict disk failure days or weeks in advance, enabling proactive replacement during maintenance windows.","t":"Custom scripted input (`smartctl`)","d":"Custom sourcetype (SMART data)","q":"index=hardware sourcetype=smart_data\n| where Reallocated_Sector_Ct > 0 OR Current_Pending_Sector > 0 OR Offline_Uncorrectable > 0\n| table _time host device Reallocated_Sector_Ct Current_Pending_Sector Temperature_Celsius\n| sort -Reallocated_Sector_Ct","m":"Install `smartmontools`. Scripted input: `smartctl -A /dev/sd[a-z]`. Run every 3600 seconds. Track key attributes: Reallocated Sector Count, Current Pending Sector, Offline Uncorrectable. Alert on any non-zero values.","z":"Table per disk, Trend line for sector counts, Heatmap of disk health."},{"i":"1.4.5","n":"Firmware Version Compliance","c":"medium","f":"advanced","v":"Outdated firmware may have security vulnerabilities or known bugs. Fleet-wide firmware tracking supports patch management.","t":"Custom scripted input (`ipmitool`, `dmidecode`), vendor APIs","d":"BMC/BIOS version data via scripted input","q":"index=hardware sourcetype=firmware_inventory\n| stats latest(bios_version) as bios, latest(bmc_version) as bmc by host, model\n| lookup current_firmware model OUTPUT expected_bios, expected_bmc\n| eval bios_current = if(bios=expected_bios, \"Yes\", \"No\")\n| where bios_current=\"No\"","m":"Create scripted input: `ipmitool mc info` or `dmidecode -t bios`. Run daily. Maintain a lookup table of expected firmware versions per server model. Dashboard showing compliance.","z":"Table (host, model, current vs. expected), Pie chart (compliant %), Bar chart by model."},{"i":"1.4.6","n":"Memory ECC Error Trending","c":"high","f":"intermediate","v":"Correctable ECC errors that increase over time strongly predict impending DIMM failure. Proactive replacement avoids unrecoverable memory errors and system crashes.","t":"Custom scripted input (`edac-util`, IPMI SEL)","d":"`edac-util`, `/sys/devices/system/edac/mc/`, IPMI SEL","q":"index=hardware sourcetype=ecc_errors\n| timechart span=1d sum(correctable_errors) as ecc_errors by host\n| where ecc_errors > 0\n| streamstats window=7 sum(ecc_errors) as weekly_errors by host\n| where weekly_errors > 10","m":"Create scripted input: `edac-util -s` or parse `/sys/devices/system/edac/mc/mc*/ce_count`. Run hourly. Alert when correctable errors increase by >10/week. Track per-DIMM slot for targeted replacement.","z":"Line chart (errors over time by host), Table (host, DIMM, error count), Trend chart."}]}]},{"i":2,"n":"Virtualization","s":[{"i":"2.1","n":"VMware vSphere","u":[{"i":"2.1.1","n":"ESXi Host CPU Contention","c":"high","f":"intermediate","v":"CPU ready time measures how long a VM waits for physical CPU. High values (>5%) mean the host is overcommitted and VMs are starved for compute.","t":"`TA-vmware`","d":"`sourcetype=vmware:perf:cpu`, vCenter performance metrics","q":"index=vmware sourcetype=\"vmware:perf:cpu\" counter=\"cpu.ready.summation\"\n| eval ready_pct = round(Value / 20000 * 100, 2)\n| stats avg(ready_pct) as avg_ready by host, vm_name\n| where avg_ready > 5\n| sort -avg_ready","m":"Install TA-vmware on a heavy forwarder or search head. Configure a vCenter service account with read-only permissions. Set up the VMware data collection in the TA (vCenter IP, credentials, collection interval). The TA pulls performance data via the vSphere API. Alert when CPU ready exceeds 5% per VM.","z":"Heatmap (VMs vs. hosts, colored by ready %), Bar chart (top VMs by ready time), Line chart (trending)."},{"i":"2.1.2","n":"ESXi Host Memory Ballooning","c":"high","f":"intermediate","v":"Memory ballooning means the hypervisor is reclaiming memory from VMs. Swapping at the hypervisor level is worse \u2014 causes severe VM performance degradation invisible to the guest OS.","t":"`TA-vmware`","d":"`sourcetype=vmware:perf:mem`, vCenter performance metrics","q":"index=vmware sourcetype=\"vmware:perf:mem\" (counter=\"mem.vmmemctl.average\" OR counter=\"mem.swapped.average\")\n| eval metric=case(counter=\"mem.vmmemctl.average\", \"Balloon_KB\", counter=\"mem.swapped.average\", \"Swap_KB\")\n| stats avg(Value) as avg_value by host, vm_name, metric\n| where avg_value > 0\n| sort -avg_value","m":"Collected automatically by TA-vmware via vCenter API. Alert when balloon or swap values are >0 for extended periods. Investigate by comparing total VM memory allocation vs. host physical memory.","z":"Table (VM, host, balloon KB, swap KB), Line chart over time, Stacked bar chart per host."},{"i":"2.1.3","n":"Datastore Capacity Trending","c":"critical","f":"intermediate","v":"A full datastore prevents VM disk writes, causing crashes and corruption. Datastores fill gradually from VM growth, snapshots, and log accumulation.","t":"`TA-vmware`","d":"`sourcetype=vmware:perf:datastore` or `sourcetype=vmware:inv:datastore`","q":"index=vmware sourcetype=\"vmware:inv:datastore\"\n| eval used_pct = round((capacity - freeSpace) / capacity * 100, 1)\n| stats latest(used_pct) as used_pct, latest(freeSpace) as free_GB by name\n| eval free_GB = round(free_GB / 1073741824, 1)\n| where used_pct > 80\n| sort -used_pct","m":"TA-vmware collects datastore inventory automatically. Set alerts at 80% (warning), 90% (high), 95% (critical). Use `predict` command for 30-day forecasting. Include snapshot size in the analysis.","z":"Gauge per datastore, Table (name, capacity, free, % used), Line chart with predict trendline."},{"i":"2.1.4","n":"Datastore Latency Spikes","c":"high","f":"intermediate","v":"Storage latency >20ms significantly impacts VM performance. Detects SAN issues, datastore contention, or storage path problems before applications are affected.","t":"`TA-vmware`","d":"`sourcetype=vmware:perf:datastore`","q":"index=vmware sourcetype=\"vmware:perf:datastore\" (counter=\"datastore.totalReadLatency.average\" OR counter=\"datastore.totalWriteLatency.average\")\n| eval latency_ms = Value\n| stats avg(latency_ms) as avg_latency, max(latency_ms) as peak_latency by host, datastore, counter\n| where avg_latency > 20\n| sort -avg_latency","m":"Collected via TA-vmware. Alert when average read/write latency exceeds 20ms over 10 minutes. Correlate with IOPS and throughput counters for full picture.","z":"Line chart (latency over time), Heatmap (datastores vs. hosts), Table with avg/peak."},{"i":"2.1.5","n":"VM Snapshot Sprawl","c":"high","f":"intermediate","v":"Old snapshots consume datastore space exponentially, degrade VM I/O performance, and complicate backups. Snapshots >72 hours old are generally a problem.","t":"`TA-vmware`","d":"`sourcetype=vmware:inv:vm` (inventory data)","q":"index=vmware sourcetype=\"vmware:inv:vm\" snapshot_name=*\n| eval snapshot_age_days = round((now() - strptime(snapshot_createTime, \"%Y-%m-%dT%H:%M:%S\")) / 86400, 0)\n| where snapshot_age_days > 3\n| table vm_name, host, snapshot_name, snapshot_age_days, snapshot_sizeBytes\n| eval snapshot_size_GB = round(snapshot_sizeBytes / 1073741824, 2)\n| sort -snapshot_age_days","m":"TA-vmware collects VM inventory including snapshots. Run daily report identifying snapshots >72 hours old. Escalate snapshots >7 days to VM owners. Include snapshot size to show storage impact.","z":"Table (VM, snapshot name, age, size), Bar chart (top VMs by snapshot size), Single value (total snapshots >3d)."},{"i":"2.1.6","n":"vMotion Tracking","c":"low","f":"beginner","v":"Tracks VM migrations for troubleshooting and change management. Excessive vMotion can indicate DRS instability or resource contention.","t":"`TA-vmware`","d":"`sourcetype=vmware:events`, vCenter event data","q":"index=vmware sourcetype=\"vmware:events\" event_type=\"VmMigratedEvent\" OR event_type=\"DrsVmMigratedEvent\"\n| table _time vm_name source_host dest_host user event_type\n| sort -_time","m":"TA-vmware collects vCenter events. Create a report for audit/change tracking. Alert on excessive vMotion frequency (>10 migrations per host per hour may indicate DRS instability).","z":"Table (timeline), Sankey diagram (source to destination host), Count by host/hour."},{"i":"2.1.7","n":"HA Failover Events","c":"critical","f":"beginner","v":"HA failover means a host failed and VMs were restarted on surviving hosts. Indicates hardware failure and potential capacity risk on remaining hosts.","t":"`TA-vmware`","d":"`sourcetype=vmware:events`","q":"index=vmware sourcetype=\"vmware:events\" (event_type=\"DasVmPoweredOnEvent\" OR event_type=\"DasHostFailedEvent\" OR event_type=\"ClusterFailoverActionTriggered\")\n| table _time event_type host vm_name message\n| sort -_time","m":"Collect vCenter events via TA-vmware. Create critical real-time alert on HA failover events. Correlate with host hardware health and ESXi syslog for root cause.","z":"Events timeline (critical alert), Table of affected VMs, Host status panel."},{"i":"2.1.8","n":"DRS Imbalance Detection","c":"medium","f":"intermediate","v":"DRS should keep clusters balanced. Frequent or failed DRS recommendations indicate resource constraints, affinity rule conflicts, or misconfiguration.","t":"`TA-vmware`","d":"`sourcetype=vmware:events`","q":"index=vmware sourcetype=\"vmware:events\" event_type=\"DrsVmMigratedEvent\"\n| timechart span=1h count by cluster\n| where count > 20","m":"Monitor DRS migration frequency. High migration counts suggest oscillation. Also check for unapplied DRS recommendations (DRS set to manual mode). Correlate with CPU/memory utilization per host.","z":"Line chart (migrations per hour), Table of DRS events, Cluster balance comparison chart."},{"i":"2.1.9","n":"VM Sprawl Detection","c":"medium","f":"intermediate","v":"Orphaned, powered-off, or idle VMs waste storage, IP addresses, backup capacity, and licenses. Regular cleanup frees significant resources.","t":"`TA-vmware`","d":"`sourcetype=vmware:inv:vm`","q":"index=vmware sourcetype=\"vmware:inv:vm\"\n| where power_state=\"poweredOff\"\n| eval days_off = round((now() - strptime(lastPowerOffTime, \"%Y-%m-%dT%H:%M:%S\")) / 86400, 0)\n| where days_off > 30\n| table vm_name, host, days_off, numCpu, memoryMB, storage_committed\n| sort -days_off","m":"Run weekly report on powered-off VMs >30 days. Also identify idle VMs: powered on but CPU usage <5% and network <1Kbps consistently. Send reports to VM owners for review.","z":"Table (VM, state, days, resources), Pie chart (powered on vs. off), Bar chart (resource waste by team)."},{"i":"2.1.10","n":"vSAN Health Monitoring","c":"high","f":"beginner","v":"vSAN is the storage fabric for many VMware clusters. Degraded vSAN health can cause VM data loss and cluster-wide outages.","t":"`TA-vmware`, vSAN health service","d":"`sourcetype=vmware:perf:vsan`, vSAN health checks","q":"index=vmware sourcetype=\"vmware:perf:vsan\"\n| stats latest(health_status) as health by cluster, disk_group\n| where health!=\"green\"\n| table cluster disk_group health","m":"TA-vmware collects vSAN metrics. Also enable vSAN health checks in vCenter. Monitor disk group health, resync progress, and capacity. Alert on any non-green health status.","z":"Status indicator per cluster, Table of health issues, Gauge (capacity)."},{"i":"2.1.11","n":"ESXi Host Hardware Alerts","c":"high","f":"beginner","v":"CIM-based hardware health detects physical component failures (fans, PSU, temperature) at the hypervisor level before they cause host failure.","t":"`TA-vmware`","d":"`sourcetype=vmware:events` (vCenter alarms)","q":"index=vmware sourcetype=\"vmware:events\" (event_type=\"AlarmStatusChangedEvent\") alarm_name=\"Host hardware*\"\n| table _time host alarm_name old_status new_status\n| where new_status=\"red\" OR new_status=\"yellow\"\n| sort -_time","m":"vCenter triggers hardware alarms via CIM providers on ESXi hosts. TA-vmware collects these alarm events. Alert on red/yellow hardware alarms. Ensure CIM providers are installed on ESXi (vendor-specific VIBs).","z":"Host health grid (red/yellow/green), Events table, Alert panel."},{"i":"2.1.12","n":"VM Resource Over-Allocation","c":"medium","f":"advanced","v":"VMs consistently using <20% of allocated CPU/memory waste resources that other VMs could use. Right-sizing saves money and improves cluster capacity.","t":"`TA-vmware`","d":"`sourcetype=vmware:perf:cpu`, `sourcetype=vmware:perf:mem`, `sourcetype=vmware:inv:vm`","q":"index=vmware sourcetype=\"vmware:perf:cpu\" counter=\"cpu.usage.average\"\n| stats avg(Value) as avg_cpu by vm_name\n| join vm_name [search index=vmware sourcetype=\"vmware:inv:vm\" | table vm_name numCpu memoryMB]\n| where avg_cpu < 20\n| sort avg_cpu\n| table vm_name numCpu memoryMB avg_cpu","m":"Analyze 30-day average CPU and memory utilization vs. allocated resources. Generate monthly right-sizing report. Include peak utilization to avoid right-sizing below burst needs.","z":"Scatter plot (allocated vs. used), Table with recommendations, Bar chart of waste by team."},{"i":"2.1.13","n":"vCenter Alarm Correlation","c":"medium","f":"beginner","v":"Centralizing all vCenter alarms in Splunk enables correlation with other infrastructure data, historical trending, and unified alerting.","t":"`TA-vmware`","d":"`sourcetype=vmware:events`","q":"index=vmware sourcetype=\"vmware:events\" event_type=\"AlarmStatusChangedEvent\"\n| stats count by alarm_name, new_status\n| sort -count","m":"TA-vmware automatically collects vCenter events including alarm state changes. Create a dashboard showing all active alarms. Correlate with time of changes, DRS events, and host health.","z":"Table of active alarms, Bar chart by alarm type, Timeline."},{"i":"2.1.14","n":"ESXi Patch Compliance","c":"medium","f":"intermediate","v":"Unpatched ESXi hosts have known vulnerabilities. Fleet-wide version tracking ensures consistent patching and audit compliance.","t":"`TA-vmware`","d":"`sourcetype=vmware:inv:hostsystem`","q":"index=vmware sourcetype=\"vmware:inv:hostsystem\"\n| stats latest(version) as esxi_version, latest(build) as build by host\n| eval is_current = if(build=\"24585291\", \"Yes\", \"No\")\n| sort esxi_version\n| table host esxi_version build is_current","m":"TA-vmware collects host inventory including ESXi version and build number. Maintain a lookup of current expected builds. Dashboard showing compliance percentage and hosts needing updates.","z":"Table (host, version, build, compliant), Pie chart (compliant %), Bar chart by version."},{"i":"2.1.15","n":"VM Creation/Deletion Audit","c":"medium","f":"intermediate","v":"Tracks VM lifecycle for change management compliance and resource governance. Detects unauthorized VM creation or suspicious deletions.","t":"`TA-vmware`","d":"`sourcetype=vmware:events`","q":"index=vmware sourcetype=\"vmware:events\" (event_type=\"VmCreatedEvent\" OR event_type=\"VmRemovedEvent\" OR event_type=\"VmClonedEvent\")\n| eval action=case(event_type=\"VmCreatedEvent\",\"Created\", event_type=\"VmRemovedEvent\",\"Deleted\", event_type=\"VmClonedEvent\",\"Cloned\")\n| table _time action vm_name user host datacenter\n| sort -_time","m":"Collected automatically via TA-vmware vCenter events. Create daily report. Correlate with change management tickets. Alert on deletions of production VMs.","z":"Table (timeline), Bar chart (create/delete by user), Line chart (VM count trending)."}]},{"i":"2.2","n":"Microsoft Hyper-V","u":[{"i":"2.2.1","n":"VM Performance Monitoring","c":"high","f":"intermediate","v":"Per-VM CPU, memory, and disk metrics identify resource contention and performance bottlenecks within the Hyper-V environment.","t":"`Splunk_TA_windows` (Perfmon inputs for Hyper-V counters)","d":"`sourcetype=Perfmon:HyperV` (Hyper-V Virtual Machine Health Summary, Hyper-V Hypervisor Logical Processor)","q":"index=perfmon sourcetype=\"Perfmon:HyperV\" object=\"Hyper-V Hypervisor Virtual Processor\" counter=\"% Guest Run Time\"\n| stats avg(Value) as avg_cpu by instance, host\n| sort -avg_cpu","m":"Configure Perfmon inputs on Hyper-V hosts for Hyper-V specific objects: `Hyper-V Hypervisor Virtual Processor`, `Hyper-V Dynamic Memory - VM`, `Hyper-V Virtual Storage Device`. Set interval=60.","z":"Table (VM, CPU%, Memory%), Line chart per VM, Heatmap."},{"i":"2.2.2","n":"Hyper-V Replication Health","c":"high","f":"intermediate","v":"Replication lag means your DR site is behind. If replication breaks, you lose your recovery point objective (RPO).","t":"`Splunk_TA_windows`","d":"`sourcetype=WinEventLog:Microsoft-Windows-Hyper-V-VMMS-Admin`","q":"index=wineventlog sourcetype=\"WinEventLog:Microsoft-Windows-Hyper-V-VMMS-Admin\" (\"replication\" AND (\"error\" OR \"warning\" OR \"critical\" OR \"failed\"))\n| stats count by host, EventCode, Message\n| sort -count","m":"Enable Hyper-V VMMS event log collection. Also create a PowerShell scripted input: `Get-VMReplication | Select VMName, State, Health, LastReplicationTime`. Alert on replication state != Normal or health != Normal.","z":"Table (VM, replication state, health, last sync), Status indicators, Events list."},{"i":"2.2.3","n":"Cluster Shared Volume Health","c":"critical","f":"beginner","v":"CSV issues can cause VM storage access failures across the entire cluster. Redirected I/O mode significantly degrades performance.","t":"`Splunk_TA_windows`","d":"`sourcetype=WinEventLog:Microsoft-Windows-FailoverClustering/Operational`","q":"index=wineventlog sourcetype=\"WinEventLog:Microsoft-Windows-FailoverClustering/Operational\" (\"CSV\" OR \"Cluster Shared Volume\") (\"error\" OR \"redirected\" OR \"failed\")\n| table _time host Message\n| sort -_time","m":"Enable Failover Clustering operational log. Alert on CSV ownership changes, redirected I/O mode, and disk health issues. Monitor Perfmon counters for CSV latency.","z":"Status panel per CSV, Events timeline, Table."},{"i":"2.2.4","n":"Live Migration Tracking","c":"low","f":"beginner","v":"Audit trail for VM mobility. Excessive live migrations may indicate cluster imbalance or storage issues.","t":"`Splunk_TA_windows`","d":"`sourcetype=WinEventLog:Microsoft-Windows-Hyper-V-VMMS-Admin`","q":"index=wineventlog sourcetype=\"WinEventLog:Microsoft-Windows-Hyper-V-VMMS-Admin\" \"migration\" (\"completed\" OR \"started\")\n| rex \"Virtual machine '(?<vm_name>[^']+)'\"\n| table _time host vm_name Message\n| sort -_time","m":"Collected via standard Hyper-V event log monitoring. Create an audit report. Alert on migration failures or excessive frequency.","z":"Table (timeline), Count by host/day."},{"i":"2.2.5","n":"Integration Services Version","c":"low","f":"intermediate","v":"Outdated integration services cause performance issues and prevent features like time sync, heartbeat, and data exchange from working correctly.","t":"`Splunk_TA_windows`, custom scripted input","d":"PowerShell scripted input (`Get-VMIntegrationService`)","q":"index=hyperv sourcetype=integration_services\n| stats latest(version) as ic_version by vm_name, host\n| where ic_version != expected_version","m":"Create a PowerShell scripted input on Hyper-V hosts: `Get-VM | Get-VMIntegrationService | Select VMName, Name, Enabled, PrimaryOperationalStatus`. Run daily.","z":"Table (VM, version, status), Pie chart (current vs. outdated)."}]},{"i":"2.3","n":"KVM / Proxmox / oVirt","u":[{"i":"2.3.1","n":"Guest VM Resource Monitoring","c":"medium","f":"intermediate","v":"Per-VM resource tracking for capacity planning and performance troubleshooting in KVM environments.","t":"Custom scripted input (`virsh domstats`)","d":"Custom sourcetype from `virsh domstats` or `virt-top`","q":"index=virtualization sourcetype=virsh_stats\n| stats latest(cpu_pct) as cpu, latest(mem_used_mb) as memory by vm_name, host\n| sort -cpu","m":"Create scripted input: `virsh domstats --cpu-total --balloon --interface --block`. Run every 60 seconds. Parse per-VM CPU time, balloon current, block read/write, and net rx/tx.","z":"Table, Line chart per VM, Heatmap."},{"i":"2.3.2","n":"Host Overcommit Detection","c":"high","f":"advanced","v":"Overcommitted KVM hosts cause all VMs to compete for resources. Unlike VMware, KVM doesn't have sophisticated DRS \u2014 manual balancing is needed.","t":"Custom scripted input","d":"Custom sourcetype (`virsh nodeinfo` + `virsh list --all`)","q":"index=virtualization sourcetype=kvm_capacity\n| stats sum(vm_vcpus) as total_vcpus, sum(vm_memory_mb) as total_vm_mem, latest(host_cpus) as host_cpus, latest(host_memory_mb) as host_mem by host\n| eval cpu_overcommit = round(total_vcpus / host_cpus, 2)\n| eval mem_overcommit = round(total_vm_mem / host_mem, 2)\n| where cpu_overcommit > 3 OR mem_overcommit > 1.2","m":"Create scripted input combining `virsh nodeinfo` (host resources) with `virsh dominfo <vm>` for each VM. Calculate aggregate allocation vs. physical capacity. Alert when memory overcommit >1.2x or CPU >4x.","z":"Table (host, allocated vs. physical), Gauge per host."},{"i":"2.3.3","n":"VM Lifecycle Events","c":"medium","f":"beginner","v":"Audit trail for VM start, stop, migrate, and crash events. Essential for troubleshooting and change management in open-source virtualization.","t":"Syslog, libvirt logs","d":"`/var/log/libvirt/`, syslog","q":"index=virtualization sourcetype=syslog source=\"/var/log/libvirt/*\"\n| search \"shutting down\" OR \"starting up\" OR \"migrating\" OR \"crashed\"\n| rex \"domain (?<vm_name>\\S+)\"\n| table _time host vm_name _raw\n| sort -_time","m":"Forward `/var/log/libvirt/qemu/*.log` and libvirt system logs. Parse VM name and event type. Alert on unexpected VM shutdowns or crashes.","z":"Events timeline, Table (VM, event, time)."}]}]},{"i":3,"n":"Containers & Orchestration","s":[{"i":"3.1","n":"Docker","u":[{"i":"3.1.1","n":"Container Crash Loops","c":"critical","f":"intermediate","v":"Containers restarting repeatedly indicate application bugs, misconfiguration, or dependency failures. Crash loops consume resources and never reach healthy state.","t":"Splunk Connect for Docker, Docker events via syslog","d":"`sourcetype=docker:events`, Docker daemon logs","q":"index=containers sourcetype=\"docker:events\" action=\"die\"\n| eval exit_code=exitCode\n| where exit_code != \"0\"\n| stats count as crashes by container_name, image, exit_code\n| where crashes > 3\n| sort -crashes","m":"Install Splunk Connect for Docker or configure Docker logging driver to forward to Splunk HEC. Collect Docker events via `docker events --format '{{json .}}'`. Alert when a container restarts >3 times in 15 minutes.","z":"Table (container, image, crashes, exit code), Bar chart by container, Timeline."},{"i":"3.1.2","n":"Container OOM Kills","c":"critical","f":"intermediate","v":"OOM kills mean the container exceeded its memory limit. The application is either leaking memory or undersized. Data loss is likely.","t":"Splunk Connect for Docker, host syslog","d":"`sourcetype=docker:events`, host `dmesg`/syslog","q":"index=containers sourcetype=\"docker:events\" action=\"oom\"\n| table _time container_name image host\n| sort -_time\n\n| `` Also check host syslog for cgroup OOM: ``\nindex=os sourcetype=syslog \"Memory cgroup out of memory\" OR \"oom-kill\"\n| rex \"task (?<process>\\S+)\"\n| table _time host process _raw","m":"Collect Docker events and forward host syslog. Alert immediately on any OOM event. Include container memory limit in the alert context to aid right-sizing decisions.","z":"Events timeline, Single value (OOM count last 24h), Table with container details."},{"i":"3.1.3","n":"Container CPU Throttling","c":"high","f":"intermediate","v":"CPU throttling means the container is hitting its CPU limit and being artificially slowed. Causes latency spikes invisible to standard CPU utilization metrics.","t":"Custom scripted input (cgroup stats), Splunk OpenTelemetry Collector","d":"`sourcetype=docker:stats`, cgroup `cpu.stat`","q":"index=containers sourcetype=\"docker:stats\"\n| eval throttle_pct = round(throttled_periods / nr_periods * 100, 1)\n| where throttle_pct > 25\n| stats avg(throttle_pct) as avg_throttle by container_name\n| sort -avg_throttle","m":"Collect Docker stats via `docker stats --format '{{json .}}'` or read cgroup files directly (`/sys/fs/cgroup/cpu/docker/<id>/cpu.stat`). Monitor `throttled_time` and `nr_throttled`. Alert when >25% of periods are throttled.","z":"Line chart (throttle % over time), Table (container, throttle %, CPU limit), Bar chart."},{"i":"3.1.4","n":"Container Memory Utilization","c":"high","f":"intermediate","v":"Tracking memory usage relative to limits catches containers approaching OOM before they're killed. Enables proactive limit adjustments.","t":"Splunk Connect for Docker, custom scripted input","d":"`sourcetype=docker:stats`","q":"index=containers sourcetype=\"docker:stats\"\n| eval mem_pct = round(mem_usage / mem_limit * 100, 1)\n| stats latest(mem_pct) as mem_pct by container_name\n| where mem_pct > 80\n| sort -mem_pct","m":"Collect `docker stats` output at regular intervals. Alert when memory usage exceeds 80% of limit. Trend over time to catch gradual memory leaks.","z":"Gauge per container, Table with limit context, Line chart (trending)."},{"i":"3.1.5","n":"Image Vulnerability Scanning","c":"medium","f":"intermediate","v":"Container images with known CVEs are deployed directly into production. Scanning and tracking vulnerabilities prevents running exploitable workloads.","t":"Custom input (Trivy, Snyk, Grype JSON output)","d":"JSON scan results from vulnerability scanners","q":"index=containers sourcetype=\"trivy:scan\"\n| stats count by image, Severity\n| xyseries image Severity count\n| sort -CRITICAL -HIGH","m":"Run vulnerability scans in CI/CD pipeline (Trivy, Grype, or Snyk). Forward JSON results to Splunk via HEC. Create dashboard showing vulnerability counts per image by severity. Alert on CRITICAL vulnerabilities in production-tagged images.","z":"Table (image, critical, high, medium, low), Stacked bar chart by image, Trend line."},{"i":"3.1.6","n":"Privileged Container Detection","c":"high","f":"advanced","v":"Privileged containers have full host access \u2014 a container escape gives root on the host. Should be flagged and justified in production.","t":"Docker events, custom audit input","d":"`docker inspect` output, Kubernetes pod security","q":"index=containers sourcetype=\"docker:inspect\"\n| where Privileged=\"true\"\n| table container_name image host Privileged","m":"Create scripted input: `docker inspect --format '{{.Name}} {{.HostConfig.Privileged}}' $(docker ps -q)`. Run every 300 seconds. Alert on any privileged container in production. Maintain an allowlist for justified exceptions.","z":"Table (container, image, host), Single value (count of privileged), Status indicator."},{"i":"3.1.7","n":"Container Sprawl","c":"low","f":"advanced","v":"Stopped containers and dangling images waste disk space. In development environments, sprawl can consume all available storage.","t":"Custom scripted input","d":"`docker ps -a`, `docker images`","q":"index=containers sourcetype=\"docker:ps\"\n| where status=\"exited\"\n| eval days_stopped = round((now() - strptime(finished_at, \"%Y-%m-%dT%H:%M:%S\")) / 86400, 0)\n| where days_stopped > 7\n| stats count by host","m":"Scripted input: `docker ps -a --format '{{json .}}'` and `docker system df`. Run daily. Report on stopped containers >7 days and total disk reclamation possible.","z":"Table, Single value (reclaimable space), Bar chart by host."},{"i":"3.1.8","n":"Docker Daemon Errors","c":"high","f":"beginner","v":"Docker daemon errors affect all containers on the host. Network, storage driver, and containerd errors can cause widespread container failures.","t":"Syslog, Docker daemon log forwarding","d":"`/var/log/docker.log` or `journalctl -u docker`","q":"index=containers sourcetype=\"docker:daemon\" level=\"error\" OR level=\"fatal\"\n| stats count by host, msg\n| sort -count","m":"Forward Docker daemon logs (usually via journald or `/var/log/docker.log`). Alert on fatal errors. Track error patterns by host.","z":"Table (host, error, count), Timeline, Bar chart by error type."}]},{"i":"3.2","n":"Kubernetes","u":[{"i":"3.2.1","n":"Pod Restart Rate","c":"critical","f":"intermediate","v":"High restart counts indicate application instability. Pods may appear \"Running\" but are constantly crashing and restarting, degrading service quality.","t":"Splunk OpenTelemetry Collector for K8s","d":"`sourcetype=kube:container:meta`, kube-state-metrics","q":"index=k8s sourcetype=\"kube:container:meta\"\n| stats max(restartCount) as restarts by namespace, pod_name, container_name\n| where restarts > 5\n| sort -restarts","m":"Deploy Splunk OTel Collector as a DaemonSet. It collects container metadata including restart counts. Alert when any pod exceeds 5 restarts in 1 hour. Include the pod's last termination reason.","z":"Table (namespace, pod, container, restarts), Bar chart by namespace, Trending line."},{"i":"3.2.2","n":"Pod Scheduling Failures","c":"high","f":"beginner","v":"Pods stuck in Pending can't serve traffic. Usually caused by insufficient CPU/memory, node affinity rules, or persistent volume claim issues.","t":"Splunk OTel Collector, Kubernetes event forwarding","d":"`sourcetype=kube:events`","q":"index=k8s sourcetype=\"kube:events\" reason=\"FailedScheduling\"\n| stats count by namespace, involvedObject.name, message\n| sort -count","m":"Forward Kubernetes events to Splunk. Alert on FailedScheduling events persisting >5 minutes. Parse the event message for the specific cause (Insufficient cpu, node affinity, PVC not bound, etc.).","z":"Table (pod, namespace, reason), Single value (pending pods), Timeline."},{"i":"3.2.3","n":"Node NotReady Detection","c":"critical","f":"intermediate","v":"A NotReady node can't run pods. Existing pods are evicted after the toleration timeout (default 5 min). Causes service disruption if no replacement capacity.","t":"Splunk OTel Collector, kube-state-metrics","d":"`sourcetype=kube:node:meta`, Kubernetes events","q":"index=k8s sourcetype=\"kube:events\" reason=\"NodeNotReady\"\n| table _time node message\n| sort -_time\n\n| `` Or from node conditions: ``\nindex=k8s sourcetype=\"kube:node:meta\"\n| where condition_ready=\"False\"\n| table _time node condition_ready","m":"OTel Collector monitors node conditions. Alert immediately on any node transitioning to NotReady. Correlate with kubelet logs on the affected node for root cause (disk pressure, memory pressure, PID pressure, network).","z":"Node status grid (green/red), Events timeline, Table."},{"i":"3.2.4","n":"Resource Quota Exhaustion","c":"high","f":"beginner","v":"When namespace quotas are exhausted, new pods can't be created. Impacts deployments, autoscaling, and job scheduling within the namespace.","t":"Splunk OTel Collector, kube-state-metrics","d":"`sourcetype=kube:resourcequota:meta`","q":"index=k8s sourcetype=\"kube:resourcequota:meta\"\n| eval used_pct = round(used / hard * 100, 1)\n| where used_pct > 80\n| table namespace resource used hard used_pct\n| sort -used_pct","m":"kube-state-metrics exposes resource quota data. Collect via OTel Collector. Alert when any resource (cpu, memory, pods, services) exceeds 80% of quota.","z":"Gauge per namespace/resource, Table, Bar chart by namespace."},{"i":"3.2.5","n":"Persistent Volume Claims","c":"high","f":"intermediate","v":"Unbound PVCs prevent stateful workloads (databases, message queues) from starting. Often caused by storage class misconfiguration or capacity.","t":"Splunk OTel Collector, Kubernetes events","d":"`sourcetype=kube:events`, `sourcetype=kube:pvc:meta`","q":"index=k8s sourcetype=\"kube:events\" reason=\"ProvisioningFailed\" OR reason=\"FailedBinding\"\n| stats count by namespace, involvedObject.name, message\n| sort -count","m":"Forward Kubernetes events and PVC metadata. Alert on PVCs in Pending phase >5 minutes. Include storage class and requested size in alert context.","z":"Table (PVC, namespace, status, storage class), Status indicators."},{"i":"3.2.6","n":"Deployment Rollout Failures","c":"critical","f":"intermediate","v":"A failed rollout means new code isn't deploying successfully. Pods may be crash-looping, image pulls failing, or health checks not passing.","t":"Splunk OTel Collector, Kubernetes events","d":"`sourcetype=kube:events`","q":"index=k8s sourcetype=\"kube:events\" involvedObject.kind=\"Deployment\" (reason=\"ProgressDeadlineExceeded\" OR reason=\"ReplicaSetUpdated\" OR reason=\"FailedCreate\")\n| table _time namespace involvedObject.name reason message\n| sort -_time","m":"Monitor deployment events. Alert on `ProgressDeadlineExceeded` which means the deployment failed to complete within its configured deadline. Correlate with pod events for root cause.","z":"Table (deployment, namespace, reason), Timeline, Status panel."},{"i":"3.2.7","n":"Control Plane Health","c":"critical","f":"beginner","v":"The control plane (API server, etcd, scheduler, controller-manager) is the brain of Kubernetes. Degradation affects all cluster operations.","t":"Splunk OTel Collector, control plane component metrics","d":"API server metrics, etcd metrics, scheduler/controller-manager logs","q":"index=k8s sourcetype=\"kube:apiserver\"\n| timechart span=5m avg(apiserver_request_duration_seconds) as avg_latency by verb\n| where avg_latency > 1","m":"Configure OTel Collector to scrape control plane metrics endpoints (/metrics on each component). Monitor API server request latency, etcd request duration, scheduler binding latency. Alert on P99 latency >1s or error rates >1%.","z":"Line chart (latency by verb), Single value (error rate), Multi-panel dashboard per component."},{"i":"3.2.8","n":"etcd Cluster Health","c":"critical","f":"beginner","v":"etcd stores all Kubernetes state. etcd problems (leader elections, compaction failures, high latency) cascade into cluster-wide failures.","t":"Splunk OTel Collector, etcd metrics","d":"etcd Prometheus metrics (scraped by OTel)","q":"index=k8s sourcetype=\"kube:etcd\"\n| timechart span=5m avg(etcd_disk_wal_fsync_duration_seconds) as fsync_latency, sum(etcd_server_leader_changes_seen_total) as leader_changes\n| where fsync_latency > 0.01 OR leader_changes > 0","m":"Scrape etcd metrics via OTel Collector. Monitor disk fsync latency (<10ms healthy), database size, leader changes, and proposal failures. Alert on leader changes (indicates instability) and high fsync latency.","z":"Line chart (fsync latency, db size), Single value (leader changes), Gauge (db size)."},{"i":"3.2.9","n":"Ingress Error Rates","c":"high","f":"intermediate","v":"Ingress controllers are the front door to your services. High error rates mean users are getting errors. Catches backend failures and misconfigurations.","t":"Ingress controller log forwarding (NGINX, Traefik, etc.)","d":"`sourcetype=kube:ingress:nginx` or similar","q":"index=k8s sourcetype=\"kube:ingress:nginx\"\n| eval is_error = if(status >= 500, 1, 0)\n| timechart span=5m sum(is_error) as errors, count as total\n| eval error_rate = round(errors / total * 100, 2)\n| where error_rate > 5","m":"Forward ingress controller access logs. Parse status code, upstream response time, and backend server. Alert when 5xx error rate exceeds 5% over 5 minutes.","z":"Line chart (error rate over time), Table (top error paths), Single value (current error rate)."},{"i":"3.2.10","n":"CrashLoopBackOff Detection","c":"critical","f":"intermediate","v":"CrashLoopBackOff is the most common Kubernetes failure mode. The pod is crashing, restarting, and crashing again with exponential backoff. Service is down.","t":"Splunk OTel Collector, kube-state-metrics","d":"`sourcetype=kube:container:meta`, Kubernetes events","q":"index=k8s sourcetype=\"kube:events\" reason=\"BackOff\"\n| stats count by namespace, involvedObject.name, message\n| where count > 3\n| sort -count","m":"Monitor Kubernetes events for `BackOff` reason. Also check container status for `waiting.reason=CrashLoopBackOff`. Alert immediately. Include container logs in alert for diagnostic context.","z":"Table (pod, namespace, count, message), Status panel, Single value (CrashLoop pods count)."},{"i":"3.2.11","n":"HPA Scaling Events","c":"medium","f":"beginner","v":"HPA scaling events show when applications are hitting capacity. Repeated max-scale events indicate undersized limits or unexpected traffic.","t":"Splunk OTel Collector, Kubernetes events","d":"`sourcetype=kube:events`","q":"index=k8s sourcetype=\"kube:events\" involvedObject.kind=\"HorizontalPodAutoscaler\"\n| stats count by namespace, involvedObject.name, reason, message\n| sort -count","m":"Forward Kubernetes events. Track scaling decisions and current vs. desired replicas. Alert when HPA reaches maxReplicas (application may be under-provisioned).","z":"Line chart (replica count over time), Table of scaling events, Area chart."},{"i":"3.2.12","n":"RBAC Audit","c":"high","f":"beginner","v":"RBAC misconfigurations grant excessive permissions. Unauthorized access attempts indicate potential compromise or misconfigured service accounts.","t":"Kubernetes audit log forwarding","d":"`sourcetype=kube:audit`","q":"index=k8s sourcetype=\"kube:audit\" responseStatus.code>=403\n| stats count by user.username, verb, objectRef.resource, objectRef.namespace\n| sort -count","m":"Enable Kubernetes audit logging (audit policy file). Forward audit logs to Splunk. Alert on 403 Forbidden responses, especially from service accounts. Track RBAC changes (ClusterRole, ClusterRoleBinding modifications).","z":"Table (user, resource, verb, denials), Bar chart by user, Timeline."},{"i":"3.2.13","n":"Certificate Expiration","c":"high","f":"advanced","v":"Kubernetes uses TLS certificates extensively (API server, kubelet, etcd). Expired certs cause cluster communication failures and outages.","t":"cert-manager metrics, custom scripted input","d":"cert-manager events, `kubeadm certs check-expiration` output","q":"index=k8s sourcetype=\"kube:events\" involvedObject.kind=\"Certificate\" reason=\"Issuing\" OR reason=\"Expired\"\n| table _time namespace involvedObject.name reason message\n| sort -_time\n\n| `` Or from cert-manager metrics: ``\nindex=k8s sourcetype=\"certmanager:metrics\"\n| eval days_left = round((certmanager_certificate_expiration_timestamp_seconds - now()) / 86400, 0)\n| where days_left < 30","m":"Deploy cert-manager and scrape its metrics. Monitor certificate expiration timestamps. Alert at 30/14/7 day thresholds. For kubeadm clusters, scripted input running `kubeadm certs check-expiration`.","z":"Table (cert, namespace, days remaining), Single value (certs expiring soon), Status indicator."},{"i":"3.2.14","n":"Container Image Pull Failures","c":"high","f":"intermediate","v":"ImagePullBackOff prevents pods from starting. Caused by wrong image tags, registry auth failures, or network issues. Blocks deployments.","t":"Splunk OTel Collector, Kubernetes events","d":"`sourcetype=kube:events`","q":"index=k8s sourcetype=\"kube:events\" (reason=\"ErrImagePull\" OR reason=\"ImagePullBackOff\" OR reason=\"Failed\" message=\"*pulling image*\")\n| stats count by namespace, involvedObject.name, message\n| sort -count","m":"Forward Kubernetes events. Alert on ImagePullBackOff events. Parse the image name and registry to identify whether it's an auth issue, missing tag, or network issue.","z":"Table (pod, image, error), Single value (pull failures last hour), Bar chart by namespace."},{"i":"3.2.15","n":"DaemonSet Completeness","c":"medium","f":"beginner","v":"DaemonSets (monitoring agents, log forwarders, network plugins) must run on every eligible node. Missing instances create monitoring or networking gaps.","t":"Splunk OTel Collector, kube-state-metrics","d":"`sourcetype=kube:daemonset:meta`","q":"index=k8s sourcetype=\"kube:daemonset:meta\"\n| eval missing = desiredNumberScheduled - numberReady\n| where missing > 0\n| table namespace daemonset_name desiredNumberScheduled numberReady missing","m":"kube-state-metrics reports DaemonSet status. Alert when `numberReady < desiredNumberScheduled` for >5 minutes. Critical for infrastructure DaemonSets (CNI plugins, OTel Collector, kube-proxy).","z":"Table (DaemonSet, desired, ready, missing), Status indicator, Single value."}]},{"i":"3.3","n":"OpenShift","u":[{"i":"3.3.1","n":"Cluster Version & Upgrade Status","c":"medium","f":"intermediate","v":"OpenShift upgrades can stall. Tracking upgrade progress and version across clusters ensures consistency and support compliance.","t":"Custom API input (ClusterVersion API)","d":"ClusterVersion resource, OpenShift events","q":"index=openshift sourcetype=\"openshift:clusterversion\"\n| stats latest(version) as version, latest(progressing) as upgrading, latest(available) as available by cluster\n| table cluster version upgrading available","m":"Create scripted input querying `oc get clusterversion -o json`. Run hourly. Alert when upgrade is progressing but stalled (>2 hours without progress).","z":"Table (cluster, version, status), Status indicator."},{"i":"3.3.2","n":"Operator Degraded Detection","c":"high","f":"advanced","v":"Cluster operators manage core OpenShift components (networking, ingress, monitoring, authentication). Degraded operators mean partial cluster functionality loss.","t":"Custom API input","d":"ClusterOperator resources","q":"index=openshift sourcetype=\"openshift:clusteroperator\"\n| where degraded=\"True\" OR available=\"False\"\n| table _time cluster operator degraded available message\n| sort -_time","m":"Scripted input: `oc get clusteroperators -o json`. Run every 300 seconds. Alert when any operator reports `Degraded=True` or `Available=False`.","z":"Operator status grid (green/yellow/red), Table with details, Timeline."},{"i":"3.3.3","n":"Build Failure Monitoring","c":"medium","f":"beginner","v":"OpenShift Source-to-Image (S2I) build failures block application deployments. Trend analysis reveals systemic build infrastructure issues.","t":"OpenShift event forwarding","d":"`sourcetype=kube:events` (Build events)","q":"index=openshift sourcetype=\"kube:events\" involvedObject.kind=\"Build\" reason=\"BuildFailed\"\n| stats count by namespace, involvedObject.name, message\n| sort -count","m":"Forward OpenShift events. Alert on BuildFailed events. Track build success/failure rate per namespace over time. Investigate common failure reasons (image pull, compile errors, push failures).","z":"Table (build, namespace, reason), Line chart (success rate %), Bar chart by failure type."},{"i":"3.3.4","n":"SCC Violation Detection","c":"high","f":"beginner","v":"Security Context Constraint violations mean pods are attempting to run with permissions beyond their allowed scope. Could indicate misconfiguration or an attack.","t":"OpenShift audit log forwarding","d":"`sourcetype=openshift:audit`","q":"index=openshift sourcetype=\"openshift:audit\" responseStatus.code=403 objectRef.resource=\"pods\"\n| search \"unable to validate against any security context constraint\"\n| stats count by user.username, objectRef.namespace, objectRef.name\n| sort -count","m":"Enable and forward OpenShift audit logs. Alert on SCC-related 403 errors. Track which SCCs are most commonly requested and denied.","z":"Table (user, namespace, pod, SCC requested), Bar chart by SCC, Timeline."}]},{"i":"3.4","n":"Container Registries","u":[{"i":"3.4.1","n":"Image Push/Pull Audit","c":"medium","f":"beginner","v":"Audit trail for who pushed or pulled what images. Detects unauthorized access, supply chain concerns, and usage patterns.","t":"Registry webhook to Splunk HEC, API polling","d":"Registry audit/webhook events","q":"index=containers sourcetype=\"registry:audit\"\n| stats count by action, repository, tag, user\n| sort -count","m":"Configure registry webhooks (Harbor, ACR, ECR) to send events to Splunk HEC. Alternatively, poll registry API for audit logs. Track push events (new deployments) and pull events (consumption).","z":"Table (user, image, action, time), Bar chart by repository, Timeline."},{"i":"3.4.2","n":"Vulnerability Scan Results","c":"high","f":"intermediate","v":"Registry-level scanning catches vulnerabilities before images are deployed. Trending shows whether security posture is improving or degrading.","t":"Custom input (Harbor, ACR, ECR scan APIs)","d":"Scan result JSON from registry API","q":"index=containers sourcetype=\"registry:scan\"\n| stats sum(critical) as critical, sum(high) as high, sum(medium) as medium by repository, tag\n| where critical > 0\n| sort -critical","m":"Poll registry scan APIs for results or configure webhook notifications on scan completion. Forward to Splunk via HEC. Alert on critical vulnerabilities in images tagged for production.","z":"Stacked bar chart (vulns by severity per image), Table, Trend line (vulns over time)."},{"i":"3.4.3","n":"Storage Quota Monitoring","c":"low","f":"intermediate","v":"Registry storage exhaustion prevents image pushes, blocking CI/CD pipelines. Monitoring enables proactive cleanup policy tuning.","t":"Custom API input","d":"Registry storage API metrics","q":"index=containers sourcetype=\"registry:metrics\"\n| stats latest(storage_used_bytes) as used, latest(storage_quota_bytes) as quota by registry\n| eval used_pct = round(used / quota * 100, 1)\n| where used_pct > 80","m":"Poll registry API for storage metrics. Alert when usage exceeds 80%. Review and tune image retention/garbage collection policies.","z":"Gauge (storage usage), Line chart (growth trend), Table."}]}]},{"i":4,"n":"Cloud Infrastructure","s":[{"i":"4.1","n":"Amazon Web Services (AWS)","u":[{"i":"4.1.1","n":"Unauthorized API Calls","c":"high","f":"intermediate","v":"AccessDenied errors reveal reconnaissance activity, compromised credentials with insufficient permissions, or misconfigurations. Early indicator of attack or drift.","t":"`Splunk_TA_aws`","d":"`sourcetype=aws:cloudtrail`, CloudTrail logs","q":"index=aws sourcetype=\"aws:cloudtrail\" errorCode=\"AccessDenied\" OR errorCode=\"UnauthorizedAccess\" OR errorCode=\"Client.UnauthorizedAccess\"\n| stats count by userIdentity.arn, eventName, sourceIPAddress, errorCode\n| where count > 5\n| sort -count","m":"Configure CloudTrail to send logs to an S3 bucket. Set up the Splunk_TA_aws with an SQS-based S3 input for CloudTrail. Alert when a single principal gets >5 access denied errors in 10 minutes.","z":"Table (principal, API call, source IP, count), Bar chart by principal, Map (source IP GeoIP)."},{"i":"4.1.2","n":"Root Account Usage","c":"critical","f":"beginner","v":"The AWS root account has unrestricted access and should never be used for daily operations. Any root activity is a critical security event.","t":"`Splunk_TA_aws`","d":"`sourcetype=aws:cloudtrail`","q":"index=aws sourcetype=\"aws:cloudtrail\" userIdentity.type=\"Root\"\n| table _time eventName sourceIPAddress userAgent errorCode\n| sort -_time","m":"CloudTrail must be enabled in all regions. Create a critical real-time alert on any event where `userIdentity.type=Root`. Exclude expected events (e.g., automated billing).","z":"Events list (critical alert), Single value (root events last 30d), Timeline."},{"i":"4.1.3","n":"Security Group Changes","c":"high","f":"beginner","v":"Security group changes can expose services to the internet. Unauthorized modifications are a primary attack vector and compliance violation.","t":"`Splunk_TA_aws`","d":"`sourcetype=aws:cloudtrail`","q":"index=aws sourcetype=\"aws:cloudtrail\" eventName=\"AuthorizeSecurityGroupIngress\" OR eventName=\"AuthorizeSecurityGroupEgress\" OR eventName=\"RevokeSecurityGroup*\"\n| spath output=rules path=requestParameters.ipPermissions.items{}\n| table _time userIdentity.arn eventName requestParameters.groupId rules sourceIPAddress\n| sort -_time","m":"Alert on any security group modification. Extra-critical alert when `0.0.0.0/0` is added as a source (exposes to internet). Correlate with change tickets.","z":"Table (who, what, when), Timeline, Single value (changes last 24h)."},{"i":"4.1.4","n":"IAM Policy Changes","c":"high","f":"beginner","v":"IAM policy changes affect who can do what across the entire AWS account. Unauthorized policy attachments can grant admin access.","t":"`Splunk_TA_aws`","d":"`sourcetype=aws:cloudtrail`","q":"index=aws sourcetype=\"aws:cloudtrail\" (eventName=\"CreatePolicy\" OR eventName=\"AttachUserPolicy\" OR eventName=\"AttachRolePolicy\" OR eventName=\"PutUserPolicy\" OR eventName=\"PutRolePolicy\" OR eventName=\"CreateRole\")\n| table _time userIdentity.arn eventName requestParameters.policyArn requestParameters.roleName\n| sort -_time","m":"Alert on all IAM policy modifications. Critical alert when AdministratorAccess or PowerUserAccess policies are attached. Track with change management.","z":"Table, Timeline, Bar chart by event type."},{"i":"4.1.5","n":"Console Login Without MFA","c":"high","f":"beginner","v":"Console access without MFA is a security risk \u2014 compromised passwords alone can grant full account access. Most compliance frameworks require MFA.","t":"`Splunk_TA_aws`","d":"`sourcetype=aws:cloudtrail`","q":"index=aws sourcetype=\"aws:cloudtrail\" eventName=\"ConsoleLogin\" responseElements.ConsoleLogin=\"Success\"\n| eval mfa_used = if(additionalEventData.MFAUsed=\"Yes\", \"Yes\", \"No\")\n| where mfa_used=\"No\"\n| table _time userIdentity.arn sourceIPAddress mfa_used\n| sort -_time","m":"Monitor ConsoleLogin events. Alert on successful console logins where MFA is not used. Exclude service accounts that authenticate via SSO (which has its own MFA).","z":"Table (user, source IP, MFA status), Pie chart (MFA vs. no-MFA), Single value."},{"i":"4.1.6","n":"EC2 Instance State Changes","c":"medium","f":"beginner","v":"Tracks instance lifecycle for audit and change management. Unexpected terminations indicate accidents, auto-scaling issues, or attacks.","t":"`Splunk_TA_aws`","d":"`sourcetype=aws:cloudtrail`","q":"index=aws sourcetype=\"aws:cloudtrail\" (eventName=\"RunInstances\" OR eventName=\"TerminateInstances\" OR eventName=\"StopInstances\" OR eventName=\"StartInstances\")\n| table _time userIdentity.arn eventName requestParameters.instancesSet.items{}.instanceId responseElements.instancesSet.items{}.currentState.name\n| sort -_time","m":"Forward CloudTrail events. Create daily audit report of EC2 lifecycle events. Alert on terminations of tagged production instances.","z":"Table (timeline), Bar chart (events by type per day), Line chart (instance count trending)."},{"i":"4.1.7","n":"S3 Bucket Policy Changes","c":"critical","f":"beginner","v":"S3 bucket policy changes can expose sensitive data to the public internet. One of the most common cloud security incidents.","t":"`Splunk_TA_aws`","d":"`sourcetype=aws:cloudtrail`","q":"index=aws sourcetype=\"aws:cloudtrail\" (eventName=\"PutBucketPolicy\" OR eventName=\"PutBucketAcl\" OR eventName=\"PutBucketPublicAccessBlock\" OR eventName=\"DeleteBucketPolicy\")\n| table _time userIdentity.arn eventName requestParameters.bucketName\n| sort -_time","m":"Critical alert on any bucket policy change. Extra-critical when `PutBucketPublicAccessBlock` is disabled or when ACLs grant public access. Integrate with AWS Config for continuous compliance.","z":"Events list (critical), Table, Single value (policy changes last 7d)."},{"i":"4.1.8","n":"GuardDuty Finding Ingestion","c":"critical","f":"beginner","v":"GuardDuty provides ML-powered threat detection for AWS accounts. Centralizing findings in Splunk enables correlation with other security data.","t":"`Splunk_TA_aws`","d":"`sourcetype=aws:cloudwatch:guardduty`","q":"index=aws sourcetype=\"aws:cloudwatch:guardduty\"\n| spath output=severity path=detail.severity\n| spath output=finding_type path=detail.type\n| where severity >= 7\n| table _time finding_type severity detail.title detail.description\n| sort -severity","m":"Enable GuardDuty in all regions. Configure CloudWatch Events rule to forward findings to an SNS topic or S3. Ingest via Splunk_TA_aws. Alert on High/Critical findings (severity \u22657).","z":"Table by severity, Bar chart (finding types), Trend line (findings over time), Single value."},{"i":"4.1.9","n":"VPC Flow Log Analysis","c":"high","f":"beginner","v":"VPC Flow Logs provide network-level visibility into all traffic. Detects rejected traffic, data exfiltration, lateral movement, and network anomalies.","t":"`Splunk_TA_aws`","d":"`sourcetype=aws:cloudwatchlogs:vpcflow`","q":"index=aws sourcetype=\"aws:cloudwatchlogs:vpcflow\" action=\"REJECT\"\n| stats count by src_ip, dest_ip, dest_port, protocol\n| sort -count\n| head 20","m":"Enable VPC Flow Logs on all VPCs (send to S3 or CloudWatch Logs). Ingest via Splunk_TA_aws. Create dashboards for rejected traffic, top talkers, and unusual port activity.","z":"Table (top rejected flows), Sankey diagram (source to destination), Timechart, Map."},{"i":"4.1.10","n":"EC2 Performance Monitoring","c":"medium","f":"beginner","v":"CloudWatch metrics provide host-level performance data without agents. Baseline trending for capacity planning and anomaly detection.","t":"`Splunk_TA_aws`","d":"`sourcetype=aws:cloudwatch` (EC2 namespace)","q":"index=aws sourcetype=\"aws:cloudwatch\" metric_name=\"CPUUtilization\" namespace=\"AWS/EC2\"\n| timechart span=1h avg(Average) as avg_cpu by metric_dimensions\n| where avg_cpu > 80","m":"Configure CloudWatch metric collection in Splunk_TA_aws for EC2 namespace. Collect CPUUtilization, NetworkIn/Out, DiskReadOps, DiskWriteOps. Set polling interval (300s minimum).","z":"Line chart per instance, Heatmap across fleet, Gauge."},{"i":"4.1.11","n":"RDS Performance Insights","c":"high","f":"beginner","v":"Database performance issues directly impact application experience. Monitoring connections, CPU, IOPS, and replica lag catches problems before users notice.","t":"`Splunk_TA_aws`","d":"`sourcetype=aws:cloudwatch` (RDS namespace), RDS logs","q":"index=aws sourcetype=\"aws:cloudwatch\" namespace=\"AWS/RDS\" (metric_name=\"CPUUtilization\" OR metric_name=\"DatabaseConnections\" OR metric_name=\"ReadLatency\" OR metric_name=\"ReplicaLag\")\n| timechart span=5m avg(Average) by metric_name, DBInstanceIdentifier","m":"Enable CloudWatch metric collection for RDS namespace. Also forward RDS logs (slow query, error, general) to Splunk via CloudWatch Logs. Alert on ReplicaLag >30s, CPU >80%, or connection count nearing max.","z":"Multi-metric line chart, Gauge (connections vs. max), Table."},{"i":"4.1.12","n":"Lambda Error Rate Monitoring","c":"medium","f":"beginner","v":"Lambda errors affect serverless application reliability. Timeouts indicate functions need more memory/time. Throttling means concurrency limits are hit.","t":"`Splunk_TA_aws`","d":"`sourcetype=aws:cloudwatch` (Lambda namespace), Lambda logs","q":"index=aws sourcetype=\"aws:cloudwatch\" namespace=\"AWS/Lambda\" (metric_name=\"Errors\" OR metric_name=\"Throttles\" OR metric_name=\"Duration\")\n| timechart span=5m sum(Sum) by metric_name, FunctionName","m":"Collect CloudWatch metrics for Lambda namespace. Forward Lambda function logs via CloudWatch Logs. Alert on error rate >5% or any throttling events.","z":"Line chart (errors/invocations over time), Bar chart (top error functions), Single value (error rate %)."},{"i":"4.1.13","n":"EKS/ECS Cluster Health","c":"high","f":"beginner","v":"Managed container orchestration health ensures application workloads are running correctly across the AWS compute fabric.","t":"`Splunk_TA_aws`, Splunk OTel Collector","d":"CloudWatch EKS/ECS metrics, container insights","q":"index=aws sourcetype=\"aws:cloudwatch\" namespace=\"AWS/ECS\" metric_name=\"CPUUtilization\"\n| timechart span=5m avg(Average) by ClusterName, ServiceName","m":"Enable Container Insights for EKS/ECS. Collect metrics via CloudWatch. For deeper Kubernetes visibility in EKS, deploy Splunk OTel Collector as described in Category 3.2.","z":"Line chart per service, Cluster status panel, Table."},{"i":"4.1.14","n":"Cost Anomaly Detection","c":"medium","f":"advanced","v":"Unexpected spend spikes indicate runaway resources, cryptomining attacks, or misconfigured services. Catching anomalies early saves money.","t":"`Splunk_TA_aws`, AWS Cost and Usage Report (CUR)","d":"`sourcetype=aws:billing` or CUR data","q":"index=aws sourcetype=\"aws:billing\"\n| timechart span=1d sum(BlendedCost) as daily_cost by ProductName\n| eventstats avg(daily_cost) as avg_cost, stdev(daily_cost) as stdev_cost by ProductName\n| eval threshold = avg_cost + (2 * stdev_cost)\n| where daily_cost > threshold","m":"Enable CUR reports to S3. Ingest via Splunk_TA_aws (billing input). Calculate daily baselines per service. Alert when daily spend exceeds 2 standard deviations from the 30-day average.","z":"Line chart (daily spend with threshold), Table (anomalous services), Stacked area (spend by service)."},{"i":"4.1.15","n":"Config Compliance Monitoring","c":"medium","f":"beginner","v":"AWS Config rules continuously evaluate resource compliance against security best practices. Non-compliant resources are attack surface.","t":"`Splunk_TA_aws`","d":"`sourcetype=aws:config:notification`","q":"index=aws sourcetype=\"aws:config:notification\" configRuleList{}.complianceType=\"NON_COMPLIANT\"\n| stats count by resourceType, resourceId, configRuleList{}.configRuleName\n| sort -count","m":"Enable AWS Config with rules (e.g., CIS Benchmark). Forward Config notifications to SNS/S3 and ingest in Splunk. Dashboard showing compliance score per rule. Alert on newly non-compliant critical resources.","z":"Table (resource, rule, status), Pie chart (compliant %), Bar chart by rule."},{"i":"4.1.16","n":"KMS Key Usage Audit","c":"medium","f":"beginner","v":"Encryption key usage audit ensures data protection compliance. Unusual key access patterns may indicate unauthorized data decryption.","t":"`Splunk_TA_aws`","d":"`sourcetype=aws:cloudtrail`","q":"index=aws sourcetype=\"aws:cloudtrail\" (eventName=\"Decrypt\" OR eventName=\"Encrypt\" OR eventName=\"GenerateDataKey\") eventSource=\"kms.amazonaws.com\"\n| stats count by userIdentity.arn, requestParameters.keyId, eventName\n| sort -count","m":"CloudTrail captures all KMS API calls. Monitor for unusual Decrypt call volumes or access from unexpected principals. Track key rotation compliance.","z":"Table (principal, key, action, count), Trend line, Bar chart."},{"i":"4.1.17","n":"Elastic IP Association","c":"low","f":"beginner","v":"Unassociated Elastic IPs cost money. Tracking associations supports inventory accuracy and cost management.","t":"`Splunk_TA_aws`","d":"`sourcetype=aws:cloudtrail`","q":"index=aws sourcetype=\"aws:cloudtrail\" (eventName=\"AllocateAddress\" OR eventName=\"AssociateAddress\" OR eventName=\"DisassociateAddress\" OR eventName=\"ReleaseAddress\")\n| table _time userIdentity.arn eventName requestParameters.publicIp\n| sort -_time","m":"Forwa

rd CloudTrail. Create weekly report of EIP allocations vs. associations. Flag unassociated EIPs for cleanup.","z":"Table, Single value (unassociated EIPs), Bar chart."},{"i":"4.1.18","n":"CloudFormation Stack Drift","c":"medium","f":"beginner","v":"Drift means infrastructure no longer matches its declared template \u2014 manual changes have been made. This breaks IaC and causes inconsistencies.","t":"`Splunk_TA_aws`","d":"`sourcetype=aws:cloudtrail` (DetectStackDrift events)","q":"index=aws sourcetype=\"aws:cloudtrail\" eventName=\"DetectStackDrift\" OR eventName=\"DetectStackResourceDrift\"\n| spath output=drift_status path=responseElements.stackDriftStatus\n| where drift_status=\"DRIFTED\"\n| table _time requestParameters.stackName drift_status","m":"Schedule periodic drift detection via CloudFormation API or AWS Config rule. Forward detection results to Splunk. Alert on stacks in DRIFTED state.","z":"Table (stack, drift status), Pie chart (drifted vs. in-sync), Status indicator."},{"i":"4.1.19","n":"WAF Blocked Request Analysis","c":"medium","f":"beginner","v":"WAF blocks reveal attack patterns targeting your applications. Analysis helps tune rules and understand the threat landscape.","t":"`Splunk_TA_aws`","d":"`sourcetype=aws:waf` (WAF logs via S3 or Kinesis)","q":"index=aws sourcetype=\"aws:waf\" action=\"BLOCK\"\n| stats count by terminatingRuleId, httpRequest.clientIp, httpRequest.uri\n| sort -count\n| head 20","m":"Enable WAF logging to S3 or Kinesis Firehose. Ingest via Splunk_TA_aws. Analyze blocked requests by rule, source IP, URI, and user agent to identify attack patterns and false positives.","z":"Table (rule, source, URI, count), Bar chart by rule, Map (source IPs), Timeline."},{"i":"4.1.20","n":"Reserved Instance Utilization","c":"low","f":"beginner","v":"Underutilized RIs waste money. Tracking RI coverage and utilization helps optimize commit spending vs. on-demand costs.","t":"`Splunk_TA_aws`, CUR data","d":"`sourcetype=aws:billing` (CUR)","q":"index=aws sourcetype=\"aws:billing\" lineItem_LineItemType=\"DiscountedUsage\" OR lineItem_LineItemType=\"RIFee\"\n| stats sum(lineItem_UsageAmount) as ri_hours, sum(lineItem_UnblendedCost) as ri_cost by reservation_ReservationARN, product_instanceType\n| eval utilization_pct = round(ri_hours / expected_hours * 100, 1)","m":"Ingest CUR data. Calculate RI utilization by comparing reserved hours against actual usage. Dashboard showing RI coverage percentage and waste. Review monthly.","z":"Table (RI, type, utilization %), Gauge (overall utilization), Bar chart by instance type."}]},{"i":"4.2","n":"Microsoft Azure","u":[{"i":"4.2.1","n":"Azure Activity Log Monitoring","c":"medium","f":"intermediate","v":"Activity Log captures all control plane operations across Azure subscriptions. Essential audit trail for resource management and compliance.","t":"`Splunk_TA_microsoft-cloudservices`","d":"`sourcetype=mscs:azure:audit`, Azure Activity Log via Event Hub","q":"index=azure sourcetype=\"mscs:azure:audit\" operationName.value=\"*delete*\" OR operationName.value=\"*write*\"\n| stats count by caller, operationName.value, resourceGroupName, status.value\n| sort -count","m":"Configure Azure Event Hub to receive Activity Log events. Set up Splunk_TA_microsoft-cloudservices with Event Hub input (connection string, consumer group). Alert on critical operations (resource deletions, policy changes).","z":"Table (caller, operation, resource, status), Timeline, Bar chart by operation."},{"i":"4.2.2","n":"Entra ID Sign-In Anomalies","c":"critical","f":"intermediate","v":"Risky sign-ins include impossible travel, unfamiliar locations, and anonymous IP usage. Primary detection layer for account compromise.","t":"`Splunk_TA_microsoft-cloudservices`","d":"`sourcetype=mscs:azure:signinlog`, Entra ID sign-in logs","q":"index=azure sourcetype=\"mscs:azure:signinlog\" riskLevelDuringSignIn!=\"none\"\n| table _time userPrincipalName riskLevelDuringSignIn riskState ipAddress location.city location.countryOrRegion\n| sort -_time","m":"Forward Entra ID sign-in logs via Event Hub or direct API. Alert on riskLevelDuringSignIn = high or medium. Correlate with conditional access policy results.","z":"Table (user, risk level, location, IP), Map (sign-in locations), Timeline, Bar chart by risk type."},{"i":"4.2.3","n":"Entra ID Privilege Escalation","c":"critical","f":"intermediate","v":"Privileged role assignments (Global Admin, Privileged Role Admin) grant extreme power. Unauthorized assignments mean full tenant compromise.","t":"`Splunk_TA_microsoft-cloudservices`","d":"`sourcetype=mscs:azure:auditlog`, Entra ID audit logs","q":"index=azure sourcetype=\"mscs:azure:auditlog\" activityDisplayName=\"Add member to role\"\n| spath output=role path=targetResources{}.modifiedProperties{}.newValue\n| table _time initiatedBy.user.userPrincipalName targetResources{}.userPrincipalName role\n| sort -_time","m":"Forward Entra ID audit logs. Create critical alerts on role assignments for Global Administrator, Privileged Role Administrator, and Exchange Administrator. Correlate with PIM activation events.","z":"Events list (critical), Table (who assigned what to whom), Timeline."},{"i":"4.2.4","n":"NSG Flow Log Analysis","c":"high","f":"beginner","v":"NSG Flow Logs provide Azure network-level visibility. Detects blocked traffic, anomalous patterns, and lateral movement within VNets.","t":"`Splunk_TA_microsoft-cloudservices`","d":"`sourcetype=mscs:azure:nsgflowlog`","q":"index=azure sourcetype=\"mscs:azure:nsgflowlog\" flowState=\"D\"\n| stats count by src_ip, dest_ip, dest_port, protocol\n| sort -count | head 20","m":"Enable NSG Flow Logs (Version 2) on all NSGs. Send to a storage account. Ingest via Splunk_TA_microsoft-cloudservices. Create dashboards for denied traffic and top talkers.","z":"Table (top denied flows), Sankey diagram, Timechart, Map."},{"i":"4.2.5","n":"Azure VM Performance","c":"medium","f":"beginner","v":"Azure Monitor metrics provide VM performance data without agents. Essential for capacity planning and correlating with application issues.","t":"`Splunk_TA_microsoft-cloudservices`","d":"`sourcetype=mscs:azure:metrics`","q":"index=azure sourcetype=\"mscs:azure:metrics\" metricName=\"Percentage CPU\"\n| timechart span=1h avg(average) as avg_cpu by resourceId\n| where avg_cpu > 80","m":"Configure Azure Monitor metrics collection in the Splunk TA. Collect CPU, memory, disk, and network metrics. Alert on sustained high utilization.","z":"Line chart per VM, Heatmap, Gauge."},{"i":"4.2.6","n":"Azure SQL Performance","c":"high","f":"beginner","v":"DTU/vCore exhaustion causes query throttling. Deadlocks and long-running queries impact application performance directly.","t":"`Splunk_TA_microsoft-cloudservices`","d":"`sourcetype=mscs:azure:diagnostics` (SQL diagnostics)","q":"index=azure sourcetype=\"mscs:azure:diagnostics\" Category=\"SQLInsights\" OR Category=\"Deadlocks\"\n| stats count by database_name, Category\n| sort -count","m":"Enable Azure SQL diagnostic logging to Event Hub. Collect SQL Insights, Deadlocks, and QueryStoreRuntimeStatistics categories. Alert on DTU >90%, deadlock events, and query duration outliers.","z":"Line chart (DTU usage), Table (deadlocks), Bar chart (top slow queries)."},{"i":"4.2.7","n":"AKS Cluster Health","c":"high","f":"intermediate","v":"AKS cluster health monitoring ensures Kubernetes workloads are running reliably on Azure's managed platform.","t":"`Splunk_TA_microsoft-cloudservices`, Splunk OTel Collector","d":"AKS diagnostics, kube-state-metrics","q":"index=azure sourcetype=\"mscs:azure:diagnostics\" Category=\"kube-apiserver\" level=\"Error\"\n| stats count by host, message\n| sort -count","m":"Enable AKS diagnostic logging to Event Hub (kube-apiserver, kube-controller-manager, kube-scheduler, kube-audit). Deploy OTel Collector in the AKS cluster for deeper K8s-level monitoring (see Category 3.2).","z":"Status panel, Error timeline, Table."},{"i":"4.2.8","n":"Azure Key Vault Access Audit","c":"high","f":"beginner","v":"Key Vault stores secrets, keys, and certificates. Unauthorized or anomalous access could indicate credential theft or data breach preparation.","t":"`Splunk_TA_microsoft-cloudservices`","d":"`sourcetype=mscs:azure:diagnostics` (Key Vault diagnostics)","q":"index=azure sourcetype=\"mscs:azure:diagnostics\" Category=\"AuditEvent\" ResourceType=\"VAULTS\"\n| stats count by identity.claim.upn, operationName, ResultType\n| where ResultType!=\"Success\"\n| sort -count","m":"Enable Key Vault diagnostic logging. Monitor all access operations. Alert on failed access attempts and unusual access patterns (new principals accessing secrets).","z":"Table (user, operation, result), Timeline, Bar chart by operation."},{"i":"4.2.9","n":"Defender for Cloud Alerts","c":"critical","f":"beginner","v":"Microsoft Defender provides threat detection across Azure resources. Centralizing in Splunk enables cross-platform security correlation.","t":"`Splunk_TA_microsoft-cloudservices`","d":"Defender alerts via Event Hub","q":"index=azure sourcetype=\"mscs:azure:defender\" severity=\"High\" OR severity=\"Critical\"\n| table _time alertDisplayName severity resourceIdentifiers{} description\n| sort -_time","m":"Configure Defender for Cloud to export alerts to Event Hub. Ingest via Splunk TA. Alert on High and Critical severity findings.","z":"Table by severity, Bar chart (alert types), Timeline, Single value (critical count)."},{"i":"4.2.10","n":"Storage Account Access Anomalies","c":"medium","f":"intermediate","v":"Unusual storage access patterns may indicate data exfiltration or compromised service principals accessing sensitive data.","t":"`Splunk_TA_microsoft-cloudservices`","d":"Storage analytics logs via Event Hub","q":"index=azure sourcetype=\"mscs:azure:diagnostics\" Category=\"StorageRead\" OR Category=\"StorageWrite\"\n| stats count by callerIpAddress, accountName, operationName\n| eventstats avg(count) as avg_ops, stdev(count) as stdev_ops\n| where count > avg_ops + (2 * stdev_ops)","m":"Enable storage diagnostic logging. Baseline normal access patterns. Alert on volumetric anomalies (unusual number of reads/writes) or new source IPs.","z":"Table (IP, account, operations), Line chart (access over time), Map."},{"i":"4.2.11","n":"Resource Health Events","c":"high","f":"intermediate","v":"Azure service health impacts your resources directly. Knowing when Azure itself is having problems prevents wasted troubleshooting time.","t":"`Splunk_TA_microsoft-cloudservices`","d":"Azure Resource Health via Activity Log","q":"index=azure sourcetype=\"mscs:azure:audit\" category.value=\"ResourceHealth\"\n| table _time resourceGroupName resourceType status.value properties.cause properties.currentHealthStatus\n| sort -_time","m":"Resource Health events flow through the Activity Log. Monitor for Unavailable and Degraded statuses. Correlate with your application health metrics to distinguish Azure platform issues from your own problems.","z":"Status panel per resource type, Table, Timeline."},{"i":"4.2.12","n":"Cost Management Alerts","c":"low","f":"intermediate","v":"Azure cost monitoring prevents budget overruns. Tracking spend by resource group/team enables chargeback and anomaly detection.","t":"`Splunk_TA_microsoft-cloudservices`, Azure Cost Management export","d":"Azure Cost Management data (exported to storage)","q":"index=azure sourcetype=\"azure:costmanagement\"\n| timechart span=1d sum(CostInBillingCurrency) as daily_cost by ResourceGroup\n| eventstats avg(daily_cost) as avg_cost by ResourceGroup\n| where daily_cost > avg_cost * 1.5","m":"Configure Azure Cost Management to export daily usage data to a storage account. Ingest in Splunk. Create budget alerts when spending approaches thresholds.","z":"Stacked area chart (spend by RG), Line chart with budget overlay, Table."}]},{"i":"4.3","n":"Google Cloud Platform (GCP)","u":[{"i":"4.3.1","n":"Audit Log Monitoring","c":"high","f":"intermediate","v":"GCP audit logs capture all admin activity and data access. Foundational for security monitoring and compliance in GCP environments.","t":"`Splunk_TA_google-cloudplatform`","d":"`sourcetype=google:gcp:pubsub:message` (via Pub/Sub)","q":"index=gcp sourcetype=\"google:gcp:pubsub:message\" logName=\"*activity\"\n| spath output=method path=protoPayload.methodName\n| spath output=principal path=protoPayload.authenticationInfo.principalEmail\n| stats count by principal, method\n| sort -count","m":"Create a Pub/Sub topic and subscription. Configure a log sink to route audit logs to Pub/Sub. Set up Splunk_TA_google-cloudplatform with a Pub/Sub input. Alert on destructive operations (delete, setIamPolicy).","z":"Table (principal, method, count), Bar chart, Timeline."},{"i":"4.3.2","n":"IAM Policy Changes","c":"critical","f":"beginner","v":"IAM binding changes control who can access what in GCP. Unauthorized changes to bindings on projects, folders, or organizations are critical security events.","t":"`Splunk_TA_google-cloudplatform`","d":"`sourcetype=google:gcp:pubsub:message`","q":"index=gcp sourcetype=\"google:gcp:pubsub:message\" protoPayload.methodName=\"SetIamPolicy\"\n| spath output=resource path=resource.labels\n| spath output=principal path=protoPayload.authenticationInfo.principalEmail\n| table _time principal resource protoPayload.serviceData.policyDelta.bindingDeltas{}\n| sort -_time","m":"Forward admin activity logs via Pub/Sub. Alert on `SetIamPolicy` events, especially those granting `roles/owner` or `roles/editor`. Track with change management.","z":"Events list (critical), Table (who changed what), Timeline."},{"i":"4.3.3","n":"VPC Flow Log Analysis","c":"high","f":"beginner","v":"GCP VPC Flow Logs provide network traffic visibility. Same use case as AWS/Azure \u2014 detect rejected traffic, anomalies, exfiltration.","t":"`Splunk_TA_google-cloudplatform`","d":"VPC Flow Logs via Pub/Sub","q":"index=gcp sourcetype=\"google:gcp:pubsub:message\" logName=\"*vpc_flows\"\n| spath\n| stats sum(bytes_sent) as total_bytes by connection.src_ip, connection.dest_ip, connection.dest_port\n| sort -total_bytes | head 20","m":"Enable VPC Flow Logs on subnets. Sink to Pub/Sub and ingest in Splunk. Analyze for top talkers, rejected flows, and anomalous destinations.","z":"Table, Sankey diagram, Timechart, Map."},{"i":"4.3.4","n":"GKE Cluster Health","c":"high","f":"beginner","v":"GKE cluster health monitoring for managed Kubernetes in GCP. Node pools, upgrade status, and workload health.","t":"`Splunk_TA_google-cloudplatform`, Splunk OTel Collector","d":"GKE logs via Pub/Sub, Cloud Monitoring metrics","q":"index=gcp sourcetype=\"google:gcp:pubsub:message\" resource.type=\"k8s_cluster\"\n| spath output=severity path=severity\n| where severity=\"ERROR\"\n| stats count by resource.labels.cluster_name, textPayload\n| sort -count","m":"GKE logs flow through Cloud Logging. Sink to Pub/Sub for Splunk ingestion. Deploy OTel Collector in GKE for K8s-native monitoring (see Category 3.2).","z":"Status panel, Error table, Timeline."},{"i":"4.3.5","n":"Security Command Center","c":"critical","f":"beginner","v":"SCC provides vulnerability findings and threat detections across GCP. Centralizing in Splunk enables multi-cloud security correlation.","t":"`Splunk_TA_google-cloudplatform`","d":"SCC findings via Pub/Sub notification","q":"index=gcp sourcetype=\"google:gcp:pubsub:message\" resource.type=\"scc_finding\"\n| spath output=severity path=finding.severity\n| spath output=category path=finding.category\n| where severity=\"CRITICAL\" OR severity=\"HIGH\"\n| table _time category severity finding.resourceName finding.description\n| sort -_time","m":"Configure SCC to publish findings to Pub/Sub. Ingest via Splunk TA. Alert on CRITICAL and HIGH severity findings.","z":"Table by severity, Bar chart (finding categories), Trend line."},{"i":"4.3.6","n":"GCE Instance Monitoring","c":"medium","f":"beginner","v":"Compute Engine VM performance monitoring for capacity planning and baseline trending without guest-level agents.","t":"`Splunk_TA_google-cloudplatform`","d":"Cloud Monitoring metrics via API","q":"index=gcp sourcetype=\"google:gcp:monitoring\" metric.type=\"compute.googleapis.com/instance/cpu/utilization\"\n| timechart span=1h avg(value) by resource.labels.instance_id","m":"Configure Cloud Monitoring metric collection in the Splunk TA. Collect CPU utilization, disk I/O, and network metrics. Alert on sustained high utilization.","z":"Line chart, Heatmap, Gauge."},{"i":"4.3.7","n":"BigQuery Audit and Cost","c":"medium","f":"intermediate","v":"BigQuery can generate massive costs from poorly optimized queries. Audit and cost tracking prevents bill shock and identifies optimization opportunities.","t":"`Splunk_TA_google-cloudplatform`","d":"BigQuery audit logs via Pub/Sub","q":"index=gcp sourcetype=\"google:gcp:pubsub:message\" protoPayload.serviceName=\"bigquery.googleapis.com\" protoPayload.methodName=\"jobservice.jobcompleted\"\n| spath output=bytes_billed path=protoPayload.serviceData.jobCompletedEvent.job.jobStatistics.totalBilledBytes\n| spath output=user path=protoPayload.authenticationInfo.principalEmail\n| eval cost_usd = round(bytes_billed / 1099511627776 * 5, 4)\n| stats sum(cost_usd) as total_cost, count as queries by user\n| sort -total_cost","m":"Forward BigQuery audit logs via Pub/Sub. Calculate cost from billed bytes ($5/TB). Create dashboard showing cost per user, top expensive queries, and slot utilization.","z":"Table (user, queries, cost), Bar chart (top costly queries), Trend line (daily cost)."},{"i":"4.3.8","n":"Cloud Run/Functions Errors","c":"medium","f":"beginner","v":"Serverless function errors and cold starts impact application reliability and user experience.","t":"`Splunk_TA_google-cloudplatform`","d":"Cloud Run/Functions logs via Cloud Logging","q":"index=gcp sourcetype=\"google:gcp:pubsub:message\" resource.type=\"cloud_function\" severity=\"ERROR\"\n| spath output=function path=resource.labels.function_name\n| stats count by function, textPayload\n| sort -count","m":"Forward Cloud Run/Functions logs via Pub/Sub. Monitor error rates, execution duration, and cold start frequency. Alert on error rate >5%.","z":"Line chart (errors over time), Bar chart (top error functions), Single value."}]},{"i":"4.4","n":"Multi-Cloud & Cloud Management","u":[{"i":"4.4.1","n":"Terraform Drift Detection","c":"medium","f":"intermediate","v":"Infrastructure drift from declared IaC state means manual changes broke the single source of truth. Causes unpredictable behavior and deployment failures.","t":"Custom input (Terraform CLI output, CI/CD integration)","d":"`terraform plan` output, CI/CD pipeline logs","q":"index=devops sourcetype=\"terraform:plan\"\n| where changes_detected=\"true\"\n| stats count as drifted_resources by workspace, resource_type\n| sort -drifted_resources","m":"Run `terraform plan -detailed-exitcode` on schedule in CI/CD. Forward plan output to Splunk via HEC. Exit code 2 = changes detected (drift). Alert on any drift in production workspaces.","z":"Table (workspace, resource, drift), Single value (drifted resources), Bar chart."},{"i":"4.4.2","n":"Cross-Cloud Identity Correlation","c":"medium","f":"intermediate","v":"Users often have identities across AWS/Azure/GCP. Correlating activity provides unified view for security investigation and insider threat detection.","t":"Combined cloud TAs + lookup tables","d":"All cloud audit logs","q":"index=aws OR index=azure OR index=gcp\n| eval cloud=case(index=\"aws\",\"AWS\", index=\"azure\",\"Azure\", index=\"gcp\",\"GCP\")\n| eval user=coalesce(userIdentity.arn, userPrincipalName, protoPayload.authenticationInfo.principalEmail)\n| lookup cloud_identity_map user OUTPUT normalized_user\n| stats count, dc(cloud) as clouds_active, values(cloud) as clouds by normalized_user\n| where clouds_active > 1\n| sort -count","m":"Create a lookup table mapping cloud identities to a normalized user (e.g., email). Combine audit logs from all three providers. Dashboard showing cross-cloud activity per user.","z":"Table (user, clouds, activity count), Sankey diagram (user to cloud to action)."},{"i":"4.4.3","n":"Multi-Cloud Cost Dashboard","c":"medium","f":"beginner","v":"Unified cost visibility across cloud providers enables budgeting, chargeback, and optimization decisions from a single pane of glass.","t":"Combined cloud TAs, billing data","d":"AWS CUR, Azure Cost Management, GCP Billing export","q":"index=aws sourcetype=\"aws:billing\" OR index=azure sourcetype=\"azure:costmanagement\" OR index=gcp sourcetype=\"gcp:billing\"\n| eval cloud=case(index=\"aws\",\"AWS\", index=\"azure\",\"Azure\", index=\"gcp\",\"GCP\")\n| eval cost=coalesce(BlendedCost, CostInBillingCurrency, cost)\n| timechart span=1d sum(cost) by cloud","m":"Ingest billing data from each provider. Normalize cost fields. Create a unified dashboard with consistent time-grain (daily). Break down by team using tagging from each provider.","z":"Stacked area chart (daily cost by cloud), Table (cost by service), Pie chart (cost distribution)."},{"i":"4.4.4","n":"Cloud Resource Tagging Compliance","c":"low","f":"intermediate","v":"Untagged resources can't be tracked for cost allocation, compliance, or ownership. Tagging compliance is foundational for cloud governance.","t":"Cloud provider TAs, Config rules","d":"Cloud resource inventories, Config/Policy compliance","q":"index=aws sourcetype=\"aws:config:notification\" resourceType=\"AWS::EC2::Instance\"\n| spath output=tags path=configuration.tags{}\n| eval has_owner = if(match(tags, \"Owner\"), \"Yes\", \"No\")\n| eval has_env = if(match(tags, \"Environment\"), \"Yes\", \"No\")\n| where has_owner=\"No\" OR has_env=\"No\"\n| table resourceId has_owner has_env","m":"Use AWS Config rules (required-tags), Azure Policy, or GCP org policies to evaluate tagging. Ingest compliance results. Dashboard showing tagging compliance by tag and resource type.","z":"Table (resource, missing tags), Pie chart (compliant %), Bar chart by tag."}]}]},{"i":5,"n":"Network Infrastructure","s":[{"i":"5.1","n":"Routers & Switches","u":[{"i":"5.1.1","n":"Interface Up/Down Events","c":"critical","f":"beginner","v":"Link state changes directly impact connectivity. Flapping interfaces cause intermittent outages.","t":"`Splunk_TA_cisco-ios`, syslog","d":"`sourcetype=cisco:ios`","q":"index=network sourcetype=\"cisco:ios\" \"%LINEPROTO-5-UPDOWN\" OR \"%LINK-3-UPDOWN\"\n| rex \"Interface (?<interface>\\S+), changed state to (?<state>\\w+)\"\n| stats count by host, interface, state | where count > 3 | sort -count","m":"Configure syslog forwarding on all network devices (UDP/TCP 514). Install TA for field extraction. Alert on down events for uplinks/trunks. Track flapping (>3 transitions in 10 min).","z":"Status grid (green/red per interface), Table, Timeline."},{"i":"5.1.2","n":"Interface Error Rates","c":"high","f":"intermediate","v":"CRC errors, drops indicate cabling, transceiver, or duplex issues.","t":"SNMP Modular Input, IF-MIB","d":"`sourcetype=snmp:interface`","q":"index=network sourcetype=\"snmp:interface\"\n| streamstats current=f last(ifInErrors) as prev by host, ifDescr\n| eval delta = ifInErrors - prev | where delta > 0\n| table _time host ifDescr delta","m":"Poll IF-MIB (ifInErrors, ifOutErrors, ifInDiscards) at 300s. Use `streamstats` for delta. Alert on increasing counts.","z":"Line chart (error rate), Table, Heatmap across devices."},{"i":"5.1.3","n":"Interface Utilization","c":"high","f":"beginner","v":"Saturated links cause drops and congestion. Trending enables proactive upgrades.","t":"SNMP Modular Input","d":"SNMP IF-MIB (ifHCInOctets, ifHCOutOctets, ifSpeed)","q":"index=network sourcetype=\"snmp:interface\"\n| streamstats current=f last(ifHCInOctets) as prev_in, last(_time) as prev_time by host, ifDescr\n| eval in_bps=((ifHCInOctets-prev_in)*8)/(_time-prev_time)\n| eval util_pct=round(in_bps/ifSpeed*100,1) | where util_pct>80","m":"Poll 64-bit counters every 300s. Alert at 80% sustained. Use `predict` for capacity planning.","z":"Line chart, Gauge per critical link, Table sorted by utilization."},{"i":"5.1.4","n":"BGP Peer State Changes","c":"critical","f":"beginner","v":"BGP session drops cause routing convergence, potentially making networks unreachable.","t":"`Splunk_TA_cisco-ios`, syslog","d":"`sourcetype=cisco:ios`","q":"index=network sourcetype=\"cisco:ios\" \"%BGP-5-ADJCHANGE\" OR \"%BGP-3-NOTIFICATION\"\n| rex \"neighbor (?<neighbor_ip>\\S+)\" | table _time host neighbor_ip _raw | sort -_time","m":"Forward syslog from all BGP speakers. Critical alert on adjacency down. Include neighbor IP and AS number.","z":"Events timeline (critical), Status panel per BGP session, Table."},{"i":"5.1.5","n":"OSPF Neighbor Adjacency","c":"critical","f":"beginner","v":"OSPF neighbor loss triggers SPF recalculation, disrupting traffic.","t":"`Splunk_TA_cisco-ios`, syslog","d":"`sourcetype=cisco:ios`","q":"index=network sourcetype=\"cisco:ios\" \"%OSPF-5-ADJCHG\"\n| rex \"Nbr (?<neighbor_ip>\\S+) on (?<interface>\\S+) from (?<from_state>\\S+) to (?<to_state>\\S+)\"\n| table _time host neighbor_ip interface from_state to_state","m":"Forward syslog from all OSPF routers. Alert on adjacency changes to/from FULL. Track frequency for instability.","z":"Events timeline, Table (router, neighbor, states)."},{"i":"5.1.6","n":"Spanning Tree Topology Change","c":"high","f":"beginner","v":"STP topology changes cause brief disruption and MAC flushing. Root bridge changes are critical.","t":"`Splunk_TA_cisco-ios`, syslog","d":"`sourcetype=cisco:ios`","q":"index=network sourcetype=\"cisco:ios\" \"%SPANTREE-5-TOPOTCHANGE\" OR \"%SPANTREE-2-ROOTCHANGE\"\n| stats count by host | where count > 5 | sort -count","m":"Forward syslog. Alert on root bridge changes (critical). Track topology change frequency per VLAN.","z":"Table, Timeline, Bar chart by VLAN."},{"i":"5.1.7","n":"Configuration Change Detection","c":"high","f":"intermediate","v":"Unauthorized config changes are a top cause of outages. Essential for compliance.","t":"`Splunk_TA_cisco-ios`, syslog","d":"`sourcetype=cisco:ios`","q":"index=network sourcetype=\"cisco:ios\" \"%SYS-5-CONFIG_I\"\n| rex \"Configured from (?<config_source>\\S+) by (?<user>\\S+)\"\n| table _time host user config_source","m":"Forward syslog. Enable archive logging. Alert on any config change. Correlate with change tickets.","z":"Table (device, user, time), Timeline, Single value (changes last 24h)."},{"i":"5.1.8","n":"Device CPU/Memory Utilization","c":"high","f":"beginner","v":"CPU exhaustion causes packet drops, routing failures, management unresponsiveness.","t":"SNMP, CISCO-PROCESS-MIB","d":"`sourcetype=snmp:cpu`","q":"index=network sourcetype=\"snmp:cpu\"\n| timechart span=5m avg(cpmCPUTotal5minRev) as cpu_pct by host | where cpu_pct > 80","m":"Poll CISCO-PROCESS-MIB and CISCO-MEMORY-POOL-MIB every 300s. Alert CPU >80% or memory >85%.","z":"Line chart, Gauge, Table of high-utilization devices."},{"i":"5.1.9","n":"Device Uptime / Reload Tracking","c":"medium","f":"beginner","v":"Unexpected reboots indicate hardware failure or unauthorized reload.","t":"SNMP, syslog","d":"SNMP sysUpTime, `sourcetype=cisco:ios`","q":"index=network sourcetype=\"cisco:ios\" \"%SYS-5-RESTART\" OR \"%SYS-5-RELOAD\"\n| table _time host _raw | sort -_time","m":"Poll SNMP sysUpTime. Forward syslog reload messages. Alert when uptime drops. Cross-reference with maintenance windows.","z":"Table (device, uptime), Timeline, Single value (unexpected reboots)."},{"i":"5.1.10","n":"VLAN Configuration Changes","c":"medium","f":"beginner","v":"VLAN changes affect segmentation. Unauthorized changes can bypass security controls.","t":"`Splunk_TA_cisco-ios`, syslog","d":"`sourcetype=cisco:ios`","q":"index=network sourcetype=\"cisco:ios\" \"%VLAN_MANAGER-6-VLAN_CREATE\" OR \"%VLAN_MANAGER-6-VLAN_DELETE\"\n| table _time host _raw | sort -_time","m":"Forward syslog. Alert on VLAN creation/deletion. Correlate with change tickets.","z":"Table, Timeline."},{"i":"5.1.11","n":"Power Supply / Fan Failures","c":"critical","f":"beginner","v":"Hardware failures reduce redundancy. A second failure causes outage.","t":"`Splunk_TA_cisco-ios`, SNMP CISCO-ENVMON-MIB","d":"`sourcetype=cisco:ios`","q":"index=network sourcetype=\"cisco:ios\" \"%FAN-3-FAN_FAILED\" OR \"%PLATFORM_ENV-1-PSU\" OR \"%ENVIRONMENTAL-1-ALERT\"\n| table _time host _raw | sort -_time","m":"Forward syslog. Poll ENVMON-MIB. Alert immediately on hardware failure. Include device location for dispatch.","z":"Status indicator per device, Events list (critical)."},{"i":"5.1.12","n":"ARP/MAC Table Anomalies","c":"medium","f":"beginner","v":"MAC flapping indicates loops, misconfigurations, or layer-2 attacks.","t":"`Splunk_TA_cisco-ios`, syslog","d":"`sourcetype=cisco:ios`","q":"index=network sourcetype=\"cisco:ios\" \"%SW_MATM-4-MACFLAP_NOTIF\"\n| rex \"(?<mac>[0-9a-fA-F]{4}\\.[0-9a-fA-F]{4}\\.[0-9a-fA-F]{4})\"\n| stats count by host, mac | sort -count","m":"Forward syslog. Alert on MACFLAP events. Investigate the MAC to find the device.","z":"Table, Timeline, Bar chart."},{"i":"5.1.13","n":"ACL Deny Logging","c":"medium","f":"beginner","v":"ACL deny hits show blocked traffic. High volumes may indicate attacks or misconfigured apps.","t":"`Splunk_TA_cisco-ios`, syslog","d":"`sourcetype=cisco:ios`","q":"index=network sourcetype=\"cisco:ios\" \"%SEC-6-IPACCESSLOGP\"\n| rex \"list (?<acl>\\S+) denied (?<proto>\\w+) (?<src_ip>\\d+\\.\\d+\\.\\d+\\.\\d+)\"\n| stats count by host, acl, src_ip, proto | sort -count","m":"Enable ACL logging (`log` keyword). Forward syslog. Dashboard showing top denied sources and trends.","z":"Table, Bar chart by source IP, Timechart."},{"i":"5.1.14","n":"SNMP Authentication Failures","c":"medium","f":"beginner","v":"Failed SNMP auth indicates unauthorized polling or reconnaissance.","t":"`Splunk_TA_cisco-ios`, syslog","d":"`sourcetype=cisco:ios`","q":"index=network sourcetype=\"cisco:ios\" \"%SNMP-3-AUTHFAIL\"\n| rex \"from (?<src_ip>\\S+)\" | stats count by host, src_ip | sort -count","m":"Forward syslog. Alert on repeated failures from unknown sources.","z":"Table, Map, Timeline."},{"i":"5.1.15","n":"Environmental Monitoring","c":"high","f":"beginner","v":"Temperature alerts catch cooling failures before they cause device outages.","t":"SNMP, CISCO-ENVMON-MIB","d":"`sourcetype=snmp:environment`","q":"index=network sourcetype=\"snmp:environment\"\n| stats latest(ciscoEnvMonTemperatureValue) as temp_c by host | where temp_c > 45","m":"Poll ENVMON-MIB temperature sensors every 300s. Alert when >45\u00b0C.","z":"Gauge per device, Line chart (trending), Table."},{"i":"5.1.16","n":"Route Table Flapping","c":"critical","f":"intermediate","v":"Unstable routes cause packet loss and reachability failures. Detecting flapping routes prevents cascading network outages across your infrastructure.","t":"`Splunk_TA_cisco-ios`, syslog","d":"`sourcetype=cisco:ios`","q":"index=network sourcetype=\"cisco:ios\" \"ROUTING\" OR \"RT_ENTRY\" OR \"%DUAL-5-NBRCHANGE\" OR \"%BGP-5-ADJCHANGE\" OR \"%OSPF-5-ADJCHG\"\n| rex \"(?<protocol>BGP|OSPF|EIGRP).*?(?<prefix>\\d+\\.\\d+\\.\\d+\\.\\d+/?\\d*)\"\n| bin _time span=10m | stats count as changes by _time, host, protocol, prefix\n| where changes > 5 | sort -changes","m":"Collect syslog from all routers. Alert on >5 route changes for the same prefix in 10 minutes. Correlate with interface flaps. Use `streamstats` to detect patterns.","z":"Timeline (flapping events), Table (prefix, host, count), Line chart (change frequency)."},{"i":"5.1.17","n":"Duplex Mismatch Detection","c":"high","f":"intermediate","v":"Duplex mismatches degrade link performance silently. They cause late collisions, CRC errors, and reduced throughput that are hard to diagnose.","t":"SNMP Modular Input, IF-MIB, `Splunk_TA_cisco-ios`","d":"`sourcetype=cisco:ios`, `sourcetype=snmp:interface`","q":"index=network sourcetype=\"cisco:ios\" \"%CDP-4-DUPLEX_MISMATCH\"\n| rex \"duplex mismatch discovered on (?<local_intf>\\S+).*with (?<remote_device>\\S+) (?<remote_intf>\\S+)\"\n| stats count latest(_time) as last_seen by host, local_intf, remote_device, remote_intf\n| sort -last_seen","m":"Enable CDP/LLDP on all interfaces. Monitor syslog for duplex mismatch messages. Cross-reference with SNMP interface counters showing late collisions.","z":"Table (local device/interface \u2192 remote device/interface), Alert list."},{"i":"5.1.18","n":"CDP/LLDP Neighbor Changes","c":"medium","f":"advanced","v":"Unexpected neighbor changes indicate cabling modifications, device replacements, or unauthorized devices connecting to the network.","t":"SNMP Modular Input, CISCO-CDP-MIB, LLDP-MIB","d":"`sourcetype=snmp:cdp`, `sourcetype=cisco:ios`","q":"index=network sourcetype=\"snmp:cdp\"\n| stats latest(cdpCacheDeviceId) as neighbor, latest(cdpCachePlatform) as platform by host, cdpCacheIfIndex\n| appendpipe [| inputlookup cdp_baseline.csv]\n| eventstats latest(neighbor) as current, first(neighbor) as baseline by host, cdpCacheIfIndex\n| where current!=baseline | table host, cdpCacheIfIndex, baseline, current, platform","m":"Poll CDP-MIB/LLDP-MIB at 600s intervals. Create a baseline lookup via `outputlookup`. Compare current neighbors against baseline. Alert on new/removed neighbors.","z":"Table (host, interface, old neighbor, new neighbor), Change log timeline."},{"i":"5.1.19","n":"PoE Power Budget Monitoring","c":"high","f":"intermediate","v":"PoE budget exhaustion causes powered devices (IP phones, APs, cameras) to lose power. Proactive monitoring prevents unplanned device outages.","t":"SNMP Modular Input, POWER-ETHERNET-MIB","d":"`sourcetype=snmp:poe`","q":"index=network sourcetype=\"snmp:poe\"\n| stats latest(pethMainPseOperStatus) as status, latest(pethMainPsePower) as total_watts, latest(pethMainPseConsumptionPower) as used_watts by host\n| eval utilization_pct=round(used_watts/total_watts*100,1)\n| where utilization_pct > 80 | sort -utilization_pct","m":"Poll POWER-ETHERNET-MIB every 300s. Track per-switch PoE budget utilization. Alert at 80% utilization. Trend over time to plan for additional PoE capacity.","z":"Gauge (per switch), Line chart (utilization trending), Table (switch, budget, used, remaining)."},{"i":"5.1.20","n":"EIGRP Neighbor Flapping","c":"critical","f":"intermediate","v":"EIGRP neighbor instability causes route recalculation, increased CPU load, and traffic blackholing during convergence.","t":"`Splunk_TA_cisco-ios`, syslog","d":"`sourcetype=cisco:ios`","q":"index=network sourcetype=\"cisco:ios\" \"%DUAL-5-NBRCHANGE\"\n| rex \"EIGRP-(?<protocol>IPv4|IPv6) (?<as_number>\\d+).*Neighbor (?<neighbor_ip>\\S+) \\((?<interface>\\S+)\\) is (?<state>up|down)\"\n| bin _time span=15m | stats count(eval(state=\"down\")) as downs, count(eval(state=\"up\")) as ups by _time, host, neighbor_ip, interface\n| where downs > 2","m":"Collect syslog from Cisco routers. Alert on >2 EIGRP neighbor down events in 15 minutes. Correlate with interface flaps and CPU utilization.","z":"Timeline (up/down events), Table (neighbor, interface, flap count), Status grid."},{"i":"5.1.21","n":"CRC Error Trending","c":"high","f":"intermediate","v":"Increasing CRC errors indicate failing cables, SFPs, or electromagnetic interference. Early detection prevents link failures.","t":"SNMP Modular Input, IF-MIB","d":"`sourcetype=snmp:interface`","q":"index=network sourcetype=\"snmp:interface\"\n| streamstats current=f last(ifInErrors) as prev_errors, last(_time) as prev_time by host, ifDescr\n| eval error_rate=(ifInErrors-prev_errors)/(_time-prev_time)\n| where error_rate > 0\n| timechart span=1h avg(error_rate) by host limit=20","m":"Poll IF-MIB counters every 300s. Use `streamstats` to compute deltas. Trend over days to detect worsening interfaces. Cross-reference with interface utilization.","z":"Line chart (error rate over time per interface), Heatmap (device \u00d7 interface), Table."},{"i":"5.1.22","n":"Syslog Source Health","c":"high","f":"expert","v":"Silence from a device means either it's healthy or its syslog forwarding broke. Detecting missing syslog sources ensures continuous visibility.","t":"Splunk core (metadata search)","d":"`sourcetype=cisco:ios`, `sourcetype=syslog`","q":"| tstats count where index=network sourcetype=\"cisco:ios\" by host\n| append [| inputlookup network_device_inventory.csv | rename device as host | fields host]\n| stats sum(count) as event_count by host | where event_count=0 OR isnull(event_count)\n| table host | rename host as \"Silent Devices\"","m":"Maintain a device inventory lookup. Schedule a search comparing active syslog sources against inventory. Alert on devices missing for >1 hour.","z":"Table (silent devices), Single value (count of silent devices), Status grid (all devices)."},{"i":"5.1.23","n":"HSRP/VRRP State Changes","c":"critical","f":"intermediate","v":"Gateway redundancy state changes impact all hosts on a subnet. Detecting unexpected failovers prevents prolonged outages.","t":"`Splunk_TA_cisco-ios`, syslog","d":"`sourcetype=cisco:ios`","q":"index=network sourcetype=\"cisco:ios\" \"%HSRP-5-STATECHANGE\" OR \"%VRRP-6-STATECHANGE\"\n| rex \"Grp (?<group>\\d+) state (?<old_state>\\w+) -> (?<new_state>\\w+)\"\n| where new_state=\"Active\" OR new_state=\"Master\"\n| stats count by host, group, old_state, new_state | sort -_time","m":"Enable HSRP/VRRP syslog notifications. Alert on Active/Master transitions. Correlate with interface or device failures to validate failover cause.","z":"Timeline (state changes), Table (group, host, transition), Alert panel."}]},{"i":"5.2","n":"Firewalls","u":[{"i":"5.2.1","n":"Top Denied Traffic Sources","c":"medium","f":"intermediate","v":"Identifies top blocked traffic sources \u2014 useful for rule tuning, detecting scanning, and misconfigured apps.","t":"Vendor-specific firewall TA","d":"`sourcetype=pan:traffic`, `sourcetype=fgt_traffic`, `sourcetype=cisco:firepower:syslog`","q":"index=firewall action=\"denied\" OR action=\"drop\"\n| stats count as denials, dc(dest_ip) as unique_dests by src_ip\n| sort -denials | head 20 | lookup geoip ip as src_ip OUTPUT Country","m":"Forward firewall traffic logs via syslog. Install vendor TA for CIM-compliant fields. Create top-N dashboard.","z":"Table (source, denials, dests), Map (GeoIP), Bar chart."},{"i":"5.2.2","n":"Policy Change Audit","c":"critical","f":"beginner","v":"Firewall rule changes can expose the network. Compliance must-have (PCI, SOX, HIPAA).","t":"Vendor-specific firewall TA","d":"`sourcetype=pan:config`, firewall system/config logs","q":"index=firewall sourcetype=\"pan:config\" cmd=\"set\" OR cmd=\"edit\" OR cmd=\"delete\"\n| table _time host admin cmd path | sort -_time","m":"Forward configuration change logs. Alert on any rule modification. Require change ticket correlation. Keep 1-year retention.","z":"Table (who, what, when), Timeline, Single value (changes last 24h)."},{"i":"5.2.3","n":"Threat Detection Events","c":"critical","f":"intermediate","v":"IPS/IDS events indicate active attacks. Correlation with traffic context enables rapid response.","t":"Vendor-specific firewall TA","d":"`sourcetype=pan:threat`, `sourcetype=cisco:firepower:alert`","q":"index=firewall sourcetype=\"pan:threat\" severity=\"critical\" OR severity=\"high\"\n| stats count by src_ip, dest_ip, threat_name, severity, action | sort -count","m":"Forward threat logs. Alert immediately on critical severity. Correlate source IPs with auth logs.","z":"Table (source, dest, threat, action), Bar chart by threat type, Map."},{"i":"5.2.4","n":"VPN Tunnel Status","c":"high","f":"intermediate","v":"VPN failures isolate remote sites or users. Proactive monitoring prevents \"the VPN is down\" calls.","t":"Vendor-specific firewall TA","d":"Firewall VPN/system logs","q":"index=firewall (\"tunnel\" OR \"IPSec\" OR \"IKE\") (\"down\" OR \"failed\" OR \"established\")\n| rex \"(?<tunnel_peer>\\d+\\.\\d+\\.\\d+\\.\\d+)\"\n| eval status=if(match(_raw,\"established|up\"),\"Up\",\"Down\")\n| stats latest(status) as state by host, tunnel_peer | where state=\"Down\"","m":"Forward VPN logs. Alert on tunnel down events. Track flapping. Dashboard showing all tunnels.","z":"Status grid (green/red per tunnel), Table, Timeline."},{"i":"5.2.5","n":"High-Risk Port Exposure","c":"high","f":"intermediate","v":"Allowed traffic to RDP/SMB/Telnet from untrusted zones indicates policy gaps.","t":"Vendor-specific firewall TA","d":"Firewall traffic logs","q":"index=firewall action=\"allowed\" (dest_port=3389 OR dest_port=445 OR dest_port=23)\n| where NOT cidrmatch(\"10.0.0.0/8\", src_ip)\n| stats count by src_ip, dest_ip, dest_port | sort -count","m":"Monitor allow rules for external traffic to high-risk ports. Alert on any matches. Review and tighten rules.","z":"Table (source, dest, port), Bar chart by port, Map."},{"i":"5.2.6","n":"Geo-IP Anomaly Detection","c":"high","f":"intermediate","v":"Traffic to/from sanctioned or unexpected countries flags exfiltration, C2, or compromised hosts.","t":"Vendor-specific TA + GeoIP lookup","d":"Firewall traffic logs","q":"index=firewall action=\"allowed\" direction=\"outbound\"\n| lookup geoip ip as dest_ip OUTPUT Country\n| search Country IN (\"Russia\",\"China\",\"North Korea\",\"Iran\")\n| stats count, sum(bytes_out) as data_sent by src_ip, Country | sort -data_sent","m":"Install GeoIP lookup (MaxMind). Enrich traffic logs. Alert on sanctioned country traffic and volume anomalies.","z":"Choropleth map, Table, Bar chart by country."},{"i":"5.2.7","n":"Connection Rate Anomalies","c":"high","f":"intermediate","v":"Sudden connection spikes indicate DDoS, scanning, or worm propagation.","t":"Vendor-specific firewall TA","d":"Firewall traffic logs","q":"index=firewall | timechart span=5m count as connections by src_ip\n| eventstats avg(connections) as avg_c, stdev(connections) as std_c by src_ip\n| where connections > (avg_c + 3*std_c) | sort -connections","m":"Baseline connection rates over 7 days. Alert when rate exceeds 3 standard deviations.","z":"Line chart with threshold overlay, Table, Timechart."},{"i":"5.2.8","n":"Certificate Inspection Failures","c":"medium","f":"beginner","v":"SSL decryption failures mean traffic passes uninspected \u2014 could be legitimate cert pinning or SSL evasion.","t":"Vendor-specific firewall TA","d":"Firewall decryption logs","q":"index=firewall sourcetype=\"pan:decryption\" action=\"ssl-error\"\n| stats count by dest_ip, dest_port, reason | sort -count","m":"Enable decryption logging. Track failure rates by destination. Tune exclusion lists.","z":"Table, Pie chart (reasons), Trend line."},{"i":"5.2.9","n":"URL Filtering Blocks","c":"medium","f":"beginner","v":"Shows what categories users are trying to access. Reveals policy effectiveness and shadow IT.","t":"Vendor-specific firewall TA","d":"`sourcetype=pan:url`","q":"index=firewall sourcetype=\"pan:url\" action=\"block-url\"\n| stats count by url_category, src_ip | sort -count","m":"Forward URL filtering logs. Dashboard showing blocks by category and user.","z":"Bar chart (by category), Table, Pie chart."},{"i":"5.2.10","n":"Admin Access Audit","c":"high","f":"intermediate","v":"Firewall admin access is highly privileged. Audit trail is a compliance must-have.","t":"Vendor-specific firewall TA","d":"Firewall system/auth logs","q":"index=firewall sourcetype=\"pan:system\" (\"login\" OR \"logout\" OR \"auth\")\n| eval status=case(match(_raw,\"success\"),\"Success\", match(_raw,\"fail\"),\"Failed\", 1=1,\"Other\")\n| stats count by admin_user, src_ip, status | sort -count","m":"Forward system/auth logs. Alert on failed admin logins. Track all successful logins. Alert on unexpected source IPs.","z":"Table (admin, source, status), Timeline, Bar chart."},{"i":"5.2.11","n":"Firewall Resource Utilization","c":"high","f":"beginner","v":"Session table exhaustion blocks new connections. CPU saturation degrades throughput.","t":"Vendor-specific TA, SNMP","d":"Firewall system resource logs","q":"index=firewall (\"session\" AND \"utilization\") OR (\"cpu\" AND \"dataplane\")\n| timechart span=5m avg(session_utilization) as session_pct by host | where session_pct > 80","m":"Monitor via SNMP (vendor-specific MIB) or system logs. Alert on session table >80%, dataplane CPU >80%.","z":"Gauge (session/CPU/memory), Line chart, Table."},{"i":"5.2.12","n":"NAT Pool Exhaustion","c":"high","f":"beginner","v":"NAT exhaustion prevents outbound connections. Users lose internet access.","t":"Vendor-specific TA, syslog","d":"Firewall NAT/system logs","q":"index=firewall (\"NAT\" OR \"nat\") (\"exhausted\" OR \"allocation failed\" OR \"out of\")\n| stats count by host, nat_pool | sort -count","m":"Forward firewall logs. Monitor NAT table usage. Alert on exhaustion messages or >80% utilization.","z":"Gauge per pool, Table, Events timeline."},{"i":"5.2.13","n":"Session Table Exhaustion","c":"critical","f":"advanced","v":"When session tables fill, new connections are dropped. This causes service outages that are difficult to diagnose without firewall telemetry.","t":"`Splunk_TA_paloalto`, Splunk_TA_fortinet_fortigate, SNMP","d":"`sourcetype=pan:system`, `sourcetype=fgt_event`, SNMP","q":"index=network sourcetype=\"pan:system\" \"session table\"\n| append [search index=network sourcetype=\"pan:traffic\" | stats dc(session_id) as active_sessions by dvc | eval max_sessions=coalesce(max_sessions,500000)]\n| stats latest(active_sessions) as sessions, latest(max_sessions) as max by dvc\n| eval utilization=round(sessions/max*100,1) | where utilization > 80","m":"Monitor session counts via SNMP or firewall system logs. Know your platform's session limit. Alert at 80% utilization. Investigate top session consumers by source/destination.","z":"Gauge (per firewall), Line chart (session count trending), Table (top consumers)."},{"i":"5.2.14","n":"Firewall HA Failover Events","c":"critical","f":"intermediate","v":"HA failovers cause brief traffic disruption and can indicate underlying hardware or link failures. Tracking failover frequency detects instability.","t":"`Splunk_TA_paloalto`, Splunk_TA_fortinet_fortigate","d":"`sourcetype=pan:system`, `sourcetype=fgt_event`","q":"index=network (sourcetype=\"pan:system\" \"HA state change\") OR (sourcetype=\"fgt_event\" subtype=\"ha\")\n| rex \"state change.*from (?<old_state>\\w+) to (?<new_state>\\w+)\"\n| table _time, dvc, old_state, new_state | sort -_time","m":"Forward firewall system logs to Splunk. Alert on any active/passive transition. Correlate with link down events. Track failover frequency \u2014 more than 1 per week indicates instability.","z":"Timeline (failover events), Single value (failovers this month), Table (history)."},{"i":"5.2.15","n":"Botnet/C2 Traffic Detection","c":"critical","f":"intermediate","v":"Detecting outbound connections to known C2 infrastructure identifies compromised internal hosts before data exfiltration occurs.","t":"`Splunk_TA_paloalto`, Threat intelligence feeds","d":"`sourcetype=pan:threat`, `sourcetype=pan:traffic`","q":"index=network sourcetype=\"pan:threat\" category=\"command-and-control\" OR category=\"spyware\"\n| stats count values(dest_ip) as c2_targets dc(dest_ip) as unique_c2 by src_ip\n| sort -count\n| lookup dnslookup clientip as src_ip OUTPUT clienthost as src_hostname","m":"Enable threat prevention and URL filtering on the firewall. Ingest threat logs. Cross-reference with external threat intelligence (STIX/TAXII feeds). Alert immediately on any C2 match.","z":"Table (compromised hosts, C2 targets), Sankey diagram (source \u2192 C2), Single value (count)."},{"i":"5.2.16","n":"SSL/TLS Decryption Failures","c":"high","f":"beginner","v":"Decryption failures create blind spots in security inspection. Tracking failures by destination reveals certificate pinning, protocol mismatches, or policy gaps.","t":"`Splunk_TA_paloalto`","d":"`sourcetype=pan:decryption`","q":"index=network sourcetype=\"pan:decryption\" action=\"decrypt-error\" OR action=\"no-decrypt\"\n| stats count by reason, dest_ip, dest_port\n| sort -count\n| head 50","m":"Enable decryption logging. Group failures by reason (unsupported cipher, certificate pinning, policy exclude). Review and update decryption policy based on findings.","z":"Bar chart (failure reasons), Table (top undecrypted destinations), Pie chart (by reason)."},{"i":"5.2.17","n":"Firewall Rule Hit Count Analysis","c":"medium","f":"intermediate","v":"Unused firewall rules increase attack surface and complexity. Identifying zero-hit rules enables rule base cleanup and reduces risk.","t":"`Splunk_TA_paloalto`, Splunk_TA_fortinet_fortigate","d":"`sourcetype=pan:traffic`, `sourcetype=fgt_traffic`","q":"index=network sourcetype=\"pan:traffic\"\n| stats count as hit_count dc(src_ip) as unique_sources dc(dest_ip) as unique_dests by rule\n| sort hit_count\n| eval status=if(hit_count=0,\"UNUSED\",if(hit_count<10,\"RARELY_USED\",\"ACTIVE\"))","m":"Collect traffic logs with rule names. Run weekly reports to identify unused rules. Review rules with zero hits over 90 days for removal. Document cleanup actions.","z":"Table (rule, hit count, status), Bar chart (hit count distribution), Single value (unused rule count)."},{"i":"5.2.18","n":"Threat Prevention Signature Coverage","c":"high","f":"intermediate","v":"Outdated threat signatures leave the firewall blind to new attacks. Monitoring signature versions ensures security posture is current.","t":"`Splunk_TA_paloalto`, Splunk_TA_fortinet_fortigate","d":"`sourcetype=pan:system`, `sourcetype=fgt_event`","q":"index=network sourcetype=\"pan:system\" \"threat version\" OR \"content update\"\n| rex \"installed (?<content_type>threats|antivirus|wildfire) version (?<version>\\S+)\"\n| stats latest(version) as current_version, latest(_time) as last_update by dvc, content_type\n| eval days_since_update=round((now()-last_update)/86400,0)\n| where days_since_update > 7","m":"Forward system logs. Alert when signature updates are >7 days old. Compare across firewalls to detect update failures. Schedule weekly compliance reports.","z":"Table (firewall, content type, version, days since update), Single value (outdated count)."}]},{"i":"5.3","n":"Load Balancers & ADCs","u":[{"i":"5.3.1","n":"Pool Member Health Status","c":"critical","f":"beginner","v":"Offline pool members reduce capacity. All members down = complete service outage.","t":"`Splunk_TA_f5-bigip`, syslog","d":"`sourcetype=f5:bigip:syslog`","q":"index=network sourcetype=\"f5:bigip:syslog\" (\"pool member\" AND (\"down\" OR \"up\" OR \"offline\"))\n| rex \"Pool (?<pool>\\S+) member (?<member>\\S+) monitor status (?<status>\\w+)\"\n| table _time host pool member status | sort -_time","m":"Forward F5 syslog (LTM log level). Install TA. Alert when pool members go down. Critical alert when all members in a pool offline.","z":"Status grid (green/red per member), Table, Timeline."},{"i":"5.3.2","n":"Virtual Server Availability","c":"critical","f":"beginner","v":"VIP down = application unreachable. Direct service impact.","t":"`Splunk_TA_f5-bigip`, SNMP","d":"`sourcetype=f5:bigip:syslog`, iControl REST","q":"index=network sourcetype=\"f5:bigip:syslog\" \"virtual\" (\"disabled\" OR \"offline\" OR \"unavailable\")\n| table _time host virtual_server status | sort -_time","m":"Forward syslog. Monitor VIP status via SNMP or iControl REST. Alert on any state change away from \"available\".","z":"Status indicator per VIP, Events timeline (critical)."},{"i":"5.3.3","n":"Connection and Throughput Trending","c":"medium","f":"beginner","v":"Reveals application demand patterns. Useful for capacity planning and DDoS detection.","t":"`Splunk_TA_f5-bigip`, SNMP","d":"SNMP F5-BIGIP-LTM-MIB","q":"index=network sourcetype=\"snmp:f5\"\n| timechart span=5m sum(clientside_curConns) as connections by virtual_server","m":"Poll F5 via SNMP or iControl REST for VIP statistics. Baseline patterns and alert on anomalies.","z":"Line chart per VIP, Area chart (throughput), Table."},{"i":"5.3.4","n":"SSL Certificate Expiry","c":"high","f":"intermediate","v":"Expired certificates on load balancers cause browser warnings or connection failures. Most preventable outage.","t":"`Splunk_TA_f5-bigip`, custom scripted input","d":"iControl REST API (`/mgmt/tm/sys/crypto/cert`)","q":"index=network sourcetype=\"f5:certificate_inventory\"\n| eval days_left=round((expiry_epoch-now())/86400,0) | where days_left<90\n| sort days_left | table host cert_name days_left expiry_date","m":"Scripted input querying iControl REST for certs. Run daily. Alert at 90/60/30/7 day thresholds.","z":"Table sorted by days to expiry, Single value (expiring <30d), Status indicator."},{"i":"5.3.5","n":"HTTP Error Rate by VIP","c":"high","f":"intermediate","v":"Backend 5xx errors indicate application issues. Per-VIP tracking isolates degraded services.","t":"`Splunk_TA_f5-bigip`, request logging","d":"F5 request logging profile","q":"index=network sourcetype=\"f5:bigip:ltm:http\"\n| eval is_error=if(response_code>=500,1,0)\n| timechart span=5m sum(is_error) as errors, count as total by virtual_server\n| eval error_rate=round(errors/total*100,2) | where error_rate>5","m":"Enable F5 request logging profile on VIPs. Alert when 5xx rate >5% over 5 minutes.","z":"Line chart (error rate), Table (VIP, error rate), Single value."},{"i":"5.3.6","n":"Response Time Degradation","c":"high","f":"beginner","v":"Increasing response times indicate backend bottlenecks before they become outages.","t":"`Splunk_TA_f5-bigip`","d":"F5 request logging (server_latency)","q":"index=network sourcetype=\"f5:bigip:ltm:http\"\n| timechart span=5m perc95(server_latency) as p95 by virtual_server | where p95>2000","m":"Enable request logging with server-side timing. Track P95 latency per VIP. Alert when exceeding SLA threshold.","z":"Line chart (P50/P95/P99), Table, Single value."},{"i":"5.3.7","n":"Session Persistence Issues","c":"medium","f":"intermediate","v":"Broken persistence causes lost sessions, shopping carts, or random logouts.","t":"`Splunk_TA_f5-bigip`","d":"F5 LTM logs, request logs","q":"index=network sourcetype=\"f5:bigip:syslog\" \"persistence\" (\"failed\" OR \"expired\")\n| stats count by virtual_server, persistence_type | sort -count","m":"Monitor persistence failures. Track same client hitting different backends from request logs.","z":"Table, Line chart, Bar chart."},{"i":"5.3.8","n":"WAF Policy Violations","c":"high","f":"beginner","v":"WAF violations indicate attacks \u2014 SQL injection, XSS, command injection. Trending reveals campaigns.","t":"`Splunk_TA_f5-bigip` (ASM)","d":"`sourcetype=f5:bigip:asm:syslog`","q":"index=network sourcetype=\"f5:bigip:asm:syslog\"\n| stats count by violation_name, src_ip, request_uri, severity | sort -count","m":"Enable F5 ASM logging. Dashboard showing top violations, attack sources, and targeted URIs.","z":"Table, Bar chart by violation, Map (source IPs), Timeline."},{"i":"5.3.9","n":"Connection Queue Depth","c":"critical","f":"intermediate","v":"Growing connection queues indicate backend saturation. Users experience timeouts before the server actually fails.","t":"F5 TA (`Splunk_TA_f5-bigip`), Splunk_TA_citrix-netscaler","d":"`sourcetype=f5:bigip:ltm`, SNMP","q":"index=network sourcetype=\"f5:bigip:ltm\"\n| stats latest(curConns) as connections, latest(connqDepth) as queue_depth by virtual_server\n| where queue_depth > 0 | sort -queue_depth","m":"Monitor LTM connection queue statistics via iControl REST or SNMP. Alert when queue depth exceeds 0 persistently (>5 min). Correlate with backend pool member health.","z":"Line chart (queue depth over time), Table (virtual server, connections, queue), Gauge."},{"i":"5.3.10","n":"Backend Server Error Code Distribution","c":"high","f":"beginner","v":"Understanding which backends return 5xx errors helps isolate faulty application instances vs. systemic issues.","t":"F5 TA (`Splunk_TA_f5-bigip`), NGINX TA","d":"`sourcetype=f5:bigip:ltm:http`, `sourcetype=nginx:plus:api`","q":"index=network sourcetype=\"f5:bigip:ltm:http\"\n| where response_code >= 500\n| stats count by pool_member, response_code, virtual_server\n| sort -count","m":"Enable HTTP response logging on the LB. Track 5xx rates per backend member. Alert when a single member's error rate exceeds the pool average by 3x. Auto-disable unhealthy members.","z":"Bar chart (errors by backend), Table (member, error code, count), Timechart."},{"i":"5.3.11","n":"Rate Limiting and DDoS Mitigation Events","c":"critical","f":"beginner","v":"Tracking rate limiting events reveals ongoing attacks and validates that DDoS protections are actively working.","t":"F5 TA (`Splunk_TA_f5-bigip`), Splunk_TA_citrix-netscaler","d":"`sourcetype=f5:bigip:asm`, `sourcetype=f5:bigip:ltm`","q":"index=network sourcetype=\"f5:bigip:asm\" attack_type=\"*dos*\" OR violation=\"Rate Limiting\"\n| stats count values(src_ip) as source_ips dc(src_ip) as unique_sources by virtual_server, attack_type\n| sort -count","m":"Enable ASM/WAF logging. Configure rate limiting policies per virtual server. Alert on sustained rate limiting events. Track source IP patterns for blocklisting.","z":"Timechart (events over time), Table (source IPs, attack types), Single value (blocked requests)."},{"i":"5.3.12","n":"iRule/Policy Errors","c":"high","f":"beginner","v":"iRule failures cause unexpected traffic handling \u2014 potentially bypassing security or routing traffic incorrectly.","t":"F5 TA (`Splunk_TA_f5-bigip`)","d":"`sourcetype=f5:bigip:ltm`","q":"index=network sourcetype=\"f5:bigip:ltm\" \"TCL error\" OR \"rule error\" OR \"aborted\"\n| rex \"Rule (?<rule_name>/\\S+)\"\n| stats count by rule_name, host | sort -count","m":"Enable iRule logging (sparingly \u2014 high volume). Monitor for TCL runtime errors. Alert on any iRule abort events. Review and test iRules in staging before production.","z":"Table (rule name, error count, host), Timechart (errors over time)."}]},{"i":"5.4","n":"Wireless Infrastructure","u":[{"i":"5.4.1","n":"AP Offline Detection","c":"critical","f":"intermediate","v":"Offline APs create coverage dead zones. Users lose connectivity in affected areas.","t":"`Splunk_TA_cisco_meraki` (API), `TA-meraki` (syslog), WLC syslog","d":"`sourcetype=meraki, WLC events","q":"index=network sourcetype=\"meraki\" type=\"access point\" (\"went offline\" OR \"unreachable\")\n| table _time host ap_name network status | sort -_time","m":"For Meraki: configure syslog in Dashboard, or use Meraki API TA. For WLC: forward syslog. Alert when APs go offline. Maintain AP inventory lookup for location context.","z":"Map (AP locations with status), Table, Status grid, Single value (APs offline)."},{"i":"5.4.2","n":"Client Association Failures","c":"medium","f":"beginner","v":"Failed associations frustrate users and indicate RADIUS/auth issues, RF problems, or AP overload.","t":"WLC syslog, Meraki TA","d":"WLC/AP syslog, RADIUS logs","q":"index=network sourcetype=\"cisco:wlc\" (\"association\" OR \"authentication\") AND (\"fail\" OR \"reject\" OR \"denied\")\n| stats count by ap_name, ssid, reason | sort -count","m":"Forward WLC/AP syslog. Correlate with RADIUS logs (ISE). Alert on spike in failures per SSID or AP.","z":"Table (AP, SSID, reason, count), Bar chart by reason, Timechart."},{"i":"5.4.3","n":"Channel Utilization","c":"medium","f":"intermediate","v":"High channel utilization degrades wireless performance. Identifies congested APs needing channel changes or additional coverage.","t":"Meraki API, WLC SNMP","d":"Meraki API, SNMP (CISCO-DOT11-IF-MIB)","q":"index=network sourcetype=\"meraki:api\"\n| stats avg(channel_utilization) as util_pct by ap_name, channel, band\n| where util_pct > 60 | sort -util_pct","m":"Poll Meraki RF statistics API or WLC SNMP. Track per-AP channel utilization. Alert when >60% (2.4GHz) or >50% (5GHz).","z":"Heatmap (APs by utilization), Table, Line chart (trending)."},{"i":"5.4.4","n":"Rogue AP Detection","c":"high","f":"beginner","v":"Rogue APs are unauthorized and can be used for man-in-the-middle attacks or network bridging.","t":"WLC syslog, Meraki TA","d":"WLC/Meraki security events","q":"index=network sourcetype=\"cisco:wlc\" \"rogue\" (\"detected\" OR \"alert\" OR \"contained\")\n| stats count by rogue_mac, detecting_ap, channel | sort -count","m":"Forward WLC rogue detection events. Enable rogue detection policies. Alert on rogue APs, especially those broadcasting your corporate SSID.","z":"Table (rogue MAC, detecting AP, channel), Map, Single value."},{"i":"5.4.5","n":"Client Count Trending","c":"low","f":"beginner","v":"Client count trending informs capacity planning and AP density decisions.","t":"Meraki API, WLC SNMP","d":"WLC/Meraki client data","q":"index=network sourcetype=\"meraki:api\"\n| timechart span=1h dc(client_mac) as client_count by ap_name","m":"Poll client counts via API or SNMP. Track per AP, per SSID, and per building over time.","z":"Line chart (clients over time), Table (AP, count), Heatmap."},{"i":"5.4.6","n":"RF Interference Events","c":"medium","f":"beginner","v":"Radar (DFS), non-WiFi interference, and channel changes degrade wireless quality.","t":"WLC syslog, Meraki TA","d":"WLC/AP syslog","q":"index=network sourcetype=\"cisco:wlc\" (\"radar\" OR \"DFS\" OR \"interference\" OR \"channel change\")\n| stats count by ap_name, channel | sort -count","m":"Forward AP/WLC syslog. Alert on DFS radar events. Track channel change frequency per AP.","z":"Table (AP, event type, count), Timeline, Bar chart."},{"i":"5.4.7","n":"Wireless Authentication Trends","c":"medium","f":"intermediate","v":"802.1X success/failure rates indicate RADIUS health, certificate issues, or expired credentials.","t":"WLC syslog, RADIUS/ISE logs","d":"RADIUS logs, WLC auth events","q":"index=network sourcetype=\"cisco:ise:syslog\" (\"Passed\" OR \"Failed\") AND \"Wireless\"\n| eval status=if(match(_raw,\"Passed\"),\"Success\",\"Failed\")\n| timechart span=1h count by status","m":"Forward ISE/RADIUS authentication logs. Track success/failure ratio over time. Alert on sustained failure rate increase.","z":"Stacked bar chart (success vs. failure), Line chart, Single value (failure rate %)."},{"i":"5.4.8","n":"RADIUS Authentication Failures","c":"critical","f":"intermediate","v":"Mass RADIUS failures prevent wireless users from connecting. Distinguishing between user errors and server issues drives faster resolution.","t":"Cisco WLC syslog, Splunk_TA_cisco-ise, `Splunk_TA_cisco-ise`","d":"`sourcetype=cisco:wlc`, `sourcetype=cisco:ise:syslog`","q":"index=network sourcetype=\"cisco:ise:syslog\" \"Authentication failed\"\n| rex \"UserName=(?<username>\\S+).*?FailureReason=(?<reason>[^;]+)\"\n| stats count by reason, username | sort -count\n| head 20","m":"Forward ISE/RADIUS logs to Splunk. Alert when failure rate exceeds 20% of attempts. Distinguish between bad credentials, expired certificates, and server timeouts.","z":"Bar chart (failure reasons), Table (username, reason, count), Timechart (failure rate)."},{"i":"5.4.9","n":"Client Roaming Analysis","c":"medium","f":"intermediate","v":"Poor roaming causes dropped calls, video freezes, and application timeouts. Analyzing roaming patterns identifies coverage gaps.","t":"Cisco WLC syslog, Meraki API","d":"`sourcetype=cisco:wlc`, `sourcetype=meraki:api","q":"index=network sourcetype=\"cisco:wlc\" \"roam\" OR \"reassociation\"\n| transaction client_mac maxspan=1h\n| eval roam_count=eventcount-1\n| stats avg(roam_count) as avg_roams, max(roam_count) as max_roams by client_mac, ssid\n| where avg_roams > 10","m":"Enable client roaming event logging on the WLC. Track roaming frequency per client. Investigate clients with >10 roams/hour \u2014 indicates poor RF design or sticky client behavior.","z":"Table (client, SSID, roam count), Heatmap (AP-to-AP roaming), Choropleth (floor plan)."},{"i":"5.4.10","n":"Wireless IDS/IPS Events","c":"critical","f":"intermediate","v":"Wireless attacks (deauth floods, evil twin, KRACK) compromise network security. Early detection prevents credential theft and MitM attacks.","t":"Cisco WLC syslog, Meraki API","d":"`sourcetype=cisco:wlc`, `sourcetype=meraki:ids`","q":"index=network sourcetype=\"cisco:wlc\" \"IDS Signature\" OR \"wIPS\"\n| rex \"Signature (?<sig_id>\\d+).*?(?<sig_name>[^,]+).*?MAC (?<attacker_mac>[0-9a-f:]+)\"\n| stats count by sig_name, attacker_mac | sort -count","m":"Enable wireless IDS on the WLC/AP. Forward alerts to Splunk. Alert on deauth floods, rogue AP impersonation, and client spoofing events. Correlate with rogue AP detection.","z":"Table (signature, attacker MAC, count), Timeline, Single value (alerts today)."},{"i":"5.4.11","n":"Band Steering Effectiveness","c":"low","f":"intermediate","v":"Band steering moves capable clients to 5 GHz, reducing congestion on 2.4 GHz. Measuring effectiveness validates RF policy.","t":"Cisco WLC syslog, Meraki API","d":"`sourcetype=cisco:wlc`, `sourcetype=meraki:api","q":"index=network sourcetype=\"cisco:wlc\" \"associated\"\n| eval band=if(match(channel,\"^(1|6|11)$\"),\"2.4GHz\",\"5GHz\")\n| stats count by band, ssid\n| eventstats sum(count) as total by ssid\n| eval pct=round(count/total*100,1)","m":"Collect client association events with channel info. Calculate the ratio of 5 GHz vs 2.4 GHz clients per SSID. Target >70% on 5 GHz for dual-band capable clients.","z":"Pie chart (band distribution), Bar chart (by SSID), Timechart (trending)."}]},{"i":"5.5","n":"SD-WAN","u":[{"i":"5.5.1","n":"Tunnel Health Monitoring","c":"critical","f":"beginner","v":"Tunnel loss/latency/jitter directly impacts application experience over WAN.","t":"ta-cisco-sdwan, vManage API","d":"vManage BFD metrics","q":"index=sdwan sourcetype=\"cisco:sdwan:bfd\"\n| stats avg(loss_percentage) as loss, avg(latency) as latency, avg(jitter) as jitter by site, tunnel_name\n| where loss > 1 OR latency > 100 OR jitter > 30","m":"Poll vManage API for BFD session statistics. Collect loss, latency, jitter per tunnel. Alert when SLA thresholds exceeded.","z":"Line chart (loss/latency/jitter per tunnel), Table, Status grid per site."},{"i":"5.5.2","n":"Site Availability","c":"critical","f":"beginner","v":"Edge device offline = remote site disconnected from the network.","t":"ta-cisco-sdwan, vManage API","d":"vManage device status","q":"index=sdwan sourcetype=\"cisco:sdwan:device\"\n| where reachability!=\"reachable\"\n| table _time site_id hostname system_ip reachability | sort -_time","m":"Poll vManage device inventory API. Alert when any edge device becomes unreachable. Include site name and location.","z":"Map (site locations with status), Table, Status grid."},{"i":"5.5.3","n":"Application SLA Violations","c":"high","f":"beginner","v":"Detects when business-critical applications aren't meeting performance requirements over the WAN.","t":"ta-cisco-sdwan","d":"vManage app-aware routing metrics","q":"index=sdwan sourcetype=\"cisco:sdwan:approute\"\n| where sla_violation=\"true\"\n| stats count by site, app_name, sla_class | sort -count","m":"Collect app-aware routing statistics from vManage. Alert when critical applications violate their SLA class.","z":"Table (site, app, violations), Bar chart by app, Timechart."},{"i":"5.5.4","n":"Path Failover Events","c":"medium","f":"beginner","v":"Tracks when traffic switches between WAN transports. Frequent failovers indicate unstable links.","t":"ta-cisco-sdwan","d":"vManage events","q":"index=sdwan sourcetype=\"cisco:sdwan:events\" (\"failover\" OR \"path-change\" OR \"transport-switch\")\n| stats count by site, from_transport, to_transport | sort -count","m":"Collect vManage alarm/event data. Track path changes and failover frequency. Alert on frequent failovers.","z":"Table, Sankey diagram (from/to transport), Timeline."},{"i":"5.5.5","n":"Control Plane Health","c":"high","f":"beginner","v":"vSmart/vManage connectivity issues affect policy distribution and overlay routing.","t":"ta-cisco-sdwan","d":"vManage control connection logs","q":"index=sdwan sourcetype=\"cisco:sdwan:control\"\n| where state!=\"up\"\n| table _time hostname peer_type peer_system_ip state | sort -_time","m":"Monitor control connections to vSmart and vManage. Alert on any control connection down.","z":"Status panel, Table, Timeline."},{"i":"5.5.6","n":"Certificate Expiration","c":"medium","f":"beginner","v":"SD-WAN device certificates must be valid for overlay connectivity.","t":"ta-cisco-sdwan, vManage API","d":"vManage certificate inventory","q":"index=sdwan sourcetype=\"cisco:sdwan:certificate\"\n| eval days_left=round((expiry_epoch-now())/86400,0) | where days_left<60\n| table hostname system_ip days_left | sort days_left","m":"Poll vManage for certificate status. Alert at 60/30/7 day thresholds.","z":"Table, Single value, Status indicator."},{"i":"5.5.7","n":"Bandwidth Utilization per Site","c":"medium","f":"beginner","v":"WAN bandwidth consumption per site enables capacity planning and cost optimization.","t":"ta-cisco-sdwan","d":"vManage interface metrics","q":"index=sdwan sourcetype=\"cisco:sdwan:interface\"\n| timechart span=1h sum(tx_octets) as bytes_out, sum(rx_octets) as bytes_in by site\n| eval out_mbps=round(bytes_out*8/3600/1000000,1)","m":"Collect interface statistics from vManage. Track per-site, per-transport utilization. Use for upgrade decisions.","z":"Line chart per site, Table, Stacked area."},{"i":"5.5.8","n":"Jitter and Latency per Tunnel","c":"high","f":"intermediate","v":"Real-time jitter and latency metrics reveal WAN quality degradation before users complain. Critical for voice/video SLAs.","t":"ta-cisco-sdwan, Cisco vManage API","d":"`sourcetype=cisco:sdwan:bfd`, `sourcetype=cisco:sdwan:approute`","q":"index=network sourcetype=\"cisco:sdwan:approute\"\n| stats avg(latency) as avg_latency, avg(jitter) as avg_jitter, avg(loss_percentage) as avg_loss by local_system_ip, remote_system_ip, local_color\n| where avg_latency > 100 OR avg_jitter > 30 OR avg_loss > 1\n| sort -avg_latency","m":"Ingest BFD and app-route statistics from vManage API. Monitor per-tunnel quality metrics. Alert when latency >100ms, jitter >30ms, or loss >1% for business-critical SLAs.","z":"Line chart (latency/jitter over time), Table (tunnel, metrics), Gauge (SLA compliance)."},{"i":"5.5.9","n":"Application Routing Decisions","c":"medium","f":"intermediate","v":"Validates that SD-WAN policies are steering traffic correctly. Detects policy misconfigurations that route real-time traffic over suboptimal paths.","t":"ta-cisco-sdwan, Cisco vManage API","d":"`sourcetype=cisco:sdwan:approute`, `sourcetype=cisco:sdwan:flow`","q":"index=network sourcetype=\"cisco:sdwan:flow\"\n| stats sum(octets) as bytes by app_name, local_color, remote_system_ip\n| eval MB=round(bytes/1048576,1)\n| sort -MB\n| head 50","m":"Collect flow and app-route data from vManage. Verify voice/video uses MPLS, web traffic uses Internet. Alert when critical apps route over non-preferred transports.","z":"Sankey diagram (app \u2192 transport), Table (app, path, volume), Pie chart."},{"i":"5.5.10","n":"WAN Link Utilization per Transport","c":"high","f":"intermediate","v":"Unbalanced link utilization wastes expensive MPLS bandwidth while underusing broadband circuits. Enables cost-effective traffic engineering.","t":"ta-cisco-sdwan, SNMP","d":"`sourcetype=cisco:sdwan:interface`, SNMP IF-MIB","q":"index=network sourcetype=\"cisco:sdwan:interface\"\n| eval util_pct=round(tx_octets*8/speed*100,1)\n| stats avg(util_pct) as avg_util, max(util_pct) as peak_util by system_ip, color, interface_name\n| where avg_util > 70 | sort -avg_util","m":"Collect interface stats per WAN transport type (MPLS, Internet, LTE). Compare utilization across links. Alert on >70% sustained utilization. Use for capacity planning.","z":"Line chart (utilization per transport), Stacked bar (site comparison), Table."}]},{"i":"5.6","n":"DNS & DHCP","u":[{"i":"5.6.1","n":"DNS Query Volume Trending","c":"medium","f":"beginner","v":"DNS query volume trending supports capacity planning and reveals traffic pattern changes.","t":"Splunk_TA_infoblox, Splunk_TA_windows (DNS logs), Pi-hole syslog","d":"`sourcetype=infoblox:dns`, `sourcetype=MSAD:NT6:DNS`","q":"index=dns sourcetype=\"infoblox:dns\" OR sourcetype=\"MSAD:NT6:DNS\"\n| timechart span=5m count as qps","m":"Forward DNS query logs. For Windows DNS: enable analytical logging. For Infoblox: configure syslog output. Track queries per second over time.","z":"Line chart (QPS over time), Single value (current QPS), Table."},{"i":"5.6.2","n":"NXDOMAIN Spike Detection","c":"high","f":"intermediate","v":"NXDOMAIN spikes indicate DGA malware (generating random domain lookups), misconfiguration, or DNS infrastructure issues.","t":"DNS TAs","d":"DNS query logs","q":"index=dns reply_code=\"NXDOMAIN\" OR rcode=\"3\"\n| timechart span=5m count as nxdomain_count\n| eventstats avg(nxdomain_count) as avg_nx, stdev(nxdomain_count) as std_nx\n| where nxdomain_count > (avg_nx + 3*std_nx)","m":"Monitor DNS response codes. Baseline NXDOMAIN rates. Alert when exceeding 3 standard deviations. Investigate the querying clients and domain patterns.","z":"Line chart with threshold, Table (top NXDOMAIN clients), Bar chart (top queried NX domains)."},{"i":"5.6.3","n":"SERVFAIL Rate Monitoring","c":"high","f":"beginner","v":"SERVFAIL increases indicate upstream DNS failures, DNSSEC validation issues, or resolver problems.","t":"DNS TAs","d":"DNS query logs","q":"index=dns reply_code=\"SERVFAIL\" OR rcode=\"2\"\n| timechart span=5m count as servfail | where servfail > 10","m":"Track SERVFAIL response codes. Alert on increases. Investigate which domains are failing and which resolvers are affected.","z":"Line chart, Table (failing domains), Single value."},{"i":"5.6.4","n":"DNS Tunneling Detection","c":"high","f":"intermediate","v":"DNS tunneling uses DNS queries to exfiltrate data or establish C2 channels, bypassing traditional security controls.","t":"DNS TAs","d":"DNS query logs","q":"index=dns\n| eval query_len=len(query)\n| stats avg(query_len) as avg_len, count as queries, dc(query) as unique_queries by src_ip, domain\n| where avg_len > 50 OR queries > 1000\n| sort -avg_len","m":"Monitor for anomalously long DNS queries (>50 chars), high query volumes to single domains, and TXT record queries. Baseline normal DNS patterns.","z":"Table (client, domain, query length, volume), Scatter plot, Bar chart."},{"i":"5.6.5","n":"DHCP Scope Exhaustion","c":"high","f":"advanced","v":"Empty DHCP scopes prevent new devices from getting network access.","t":"Splunk_TA_windows (DHCP logs), Splunk_TA_infoblox","d":"DHCP server logs, API metrics","q":"index=dhcp sourcetype=\"DhcpSrvLog\" OR sourcetype=\"infoblox:dhcp\"\n| stats dc(assigned_ip) as used by scope_name, scope_range\n| eval total = scope_end - scope_start\n| eval used_pct=round(used/total*100,1) | where used_pct > 90","m":"For Windows: forward DHCP audit logs + scripted input for scope stats. For Infoblox: use API or syslog. Alert when >90% utilized.","z":"Gauge per scope, Table, Bar chart."},{"i":"5.6.6","n":"DHCP Rogue Server Detection","c":"high","f":"beginner","v":"Rogue DHCP servers assign wrong IPs/gateways, causing network disruption and potential MitM attacks.","t":"Network syslog, DHCP snooping logs","d":"DHCP conflict events, switch DHCP snooping","q":"index=network \"DHCP\" AND (\"rogue\" OR \"conflict\" OR \"unauthorized\" OR \"snooping violation\")\n| table _time host src_ip _raw | sort -_time","m":"Enable DHCP snooping on switches. Forward syslog. Alert on any rogue DHCP server detection events.","z":"Events list (critical), Table, Map."},{"i":"5.6.7","n":"DNS Record Change Audit","c":"medium","f":"beginner","v":"Unauthorized DNS changes can redirect traffic to attacker infrastructure (DNS hijacking).","t":"Splunk_TA_infoblox, DNS update logs","d":"Infoblox audit log, DNS dynamic update logs","q":"index=dns sourcetype=\"infoblox:audit\" (\"Added\" OR \"Deleted\" OR \"Modified\") AND (\"record\" OR \"zone\")\n| table _time admin record_type record_name record_data action | sort -_time","m":"Forward DNS server audit logs. Alert on changes to critical domains. Correlate with change tickets.","z":"Table (record, action, who, when), Timeline, Single value."},{"i":"5.6.8","n":"DNS Latency Monitoring","c":"medium","f":"intermediate","v":"DNS latency directly adds to every network connection. Slow DNS = slow everything.","t":"Custom scripted input, DNS diagnostic logs","d":"DNS recursive query timing","q":"index=dns sourcetype=\"dns:latency\"\n| timechart span=5m avg(response_time_ms) as avg_latency by dns_server\n| where avg_latency > 50","m":"Use scripted input running `dig` queries against DNS servers measuring response time. Or enable DNS analytical logging with timing. Alert when average latency >50ms.","z":"Line chart per server, Gauge, Table."},{"i":"5.6.9","n":"DNS Cache Hit Ratio","c":"medium","f":"intermediate","v":"Low cache hit ratios indicate either a surge of new queries, cache poisoning attempts, or misconfigured TTLs \u2014 all increasing latency and upstream load.","t":"Splunk_TA_infoblox, BIND/Unbound logs","d":"`sourcetype=infoblox:dns`, `sourcetype=named`","q":"index=network sourcetype=\"infoblox:dns\"\n| eval cache_hit=if(match(message,\"cache hit\"),1,0), total=1\n| timechart span=1h sum(cache_hit) as hits, sum(total) as total\n| eval hit_ratio=round(hits/total*100,1) | where hit_ratio < 70","m":"Enable query logging on DNS resolvers. Track cache hit vs. miss ratio. Alert when hit ratio drops below 70%. Investigate top domains causing misses.","z":"Line chart (hit ratio over time), Single value (current ratio), Table (top miss domains)."},{"i":"5.6.10","n":"DNSSEC Validation Failures","c":"high","f":"intermediate","v":"DNSSEC failures can indicate DNS spoofing attempts or misconfigured zones. Monitoring prevents users from being directed to malicious sites.","t":"Splunk_TA_infoblox, BIND logs","d":"`sourcetype=infoblox:dns`, `sourcetype=named`","q":"index=network sourcetype=\"named\" \"DNSSEC\" (\"validation failure\" OR \"SERVFAIL\" OR \"no valid signature\")\n| rex \"(?<query_domain>[a-zA-Z0-9.-]+\\.)/(?<query_type>\\w+)\"\n| stats count by query_domain, query_type | sort -count","m":"Enable DNSSEC validation logging. Monitor for validation failures by domain. Cross-reference with known domain registrations. Alert on spikes in DNSSEC failures.","z":"Table (domain, failure count), Timechart (failure rate), Bar chart."},{"i":"5.6.11","n":"DHCP Lease Duration Analysis","c":"low","f":"intermediate","v":"Short lease durations increase DHCP traffic and scope churn. Long leases waste addresses. Optimizing lease times improves IP management.","t":"Splunk_TA_infoblox, Windows DHCP logs","d":"`sourcetype=infoblox:dhcp`, `sourcetype=DhcpSrvLog`","q":"index=network sourcetype=\"infoblox:dhcp\" \"DHCPACK\"\n| rex \"lease (?<lease_ip>\\d+\\.\\d+\\.\\d+\\.\\d+).*?(?<lease_duration>\\d+)\"\n| stats avg(lease_duration) as avg_lease, count as renewals by subnet\n| eval avg_hours=round(avg_lease/3600,1) | sort -renewals","m":"Collect DHCP server logs. Analyze lease durations per scope. Identify scopes with unusually short leases (frequent renewals) or extremely long leases. Adjust based on network type (guest vs. corporate).","z":"Table (scope, avg lease, renewal count), Bar chart (renewals by scope)."},{"i":"5.6.12","n":"DNS Query Type Distribution","c":"medium","f":"intermediate","v":"Unusual query type distribution (spikes in TXT, MX, or ANY) can indicate DNS tunneling, reconnaissance, or abuse.","t":"Splunk_TA_infoblox, Splunk Stream","d":"`sourcetype=infoblox:dns`, `sourcetype=stream:dns`","q":"index=network sourcetype=\"stream:dns\"\n| stats count by query_type\n| eventstats sum(count) as total\n| eval pct=round(count/total*100,2) | sort -count\n| head 20","m":"Capture DNS query types via Splunk Stream or DNS server logs. Baseline normal distribution (typically >80% A/AAAA). Alert on abnormal increases in TXT, NULL, or ANY queries.","z":"Pie chart (query type distribution), Timechart (by type), Table."

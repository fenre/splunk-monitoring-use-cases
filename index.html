dundancy silently. A second failure causes full network loss. Detecting the first failure enables proactive repair.","t":"`Splunk_TA_windows`","d":"`sourcetype=WinEventLog:Microsoft-Windows-NlbFo/Operational` (EventCode 101, 105, 106, 115)","q":"index=wineventlog source=\"WinEventLog:Microsoft-Windows-NlbFo/Operational\"\n  EventCode IN (101, 105, 106, 115)\n| eval event=case(EventCode=101,\"Team degraded\",EventCode=105,\"Member disconnected\",EventCode=106,\"Member reconnected\",EventCode=115,\"Standby activated\")\n| table _time, host, event, TeamName, MemberName\n| sort -_time","m":"NIC Teaming (LBFO) events log automatically. EventCode 101=team degraded (member lost), 105=member disconnected, 106=reconnected, 115=standby activated. Alert immediately when team degrades \u2014 the remaining NIC is now a single point of failure. Track flapping (repeated 105\u2192106 cycles) which indicates cable, switch port, or driver issues.","z":"Status grid (team \u00d7 member status), Timeline (failover events), Single value (degraded teams)."},{"i":"1.2.53","n":"BitLocker Recovery Events","c":"high","f":"beginner","v":"BitLocker recovery mode triggers indicate TPM issues, boot configuration changes, or potential tampering with the boot chain. Each event requires investigation.","t":"`Splunk_TA_windows`","d":"`sourcetype=WinEventLog:Microsoft-Windows-BitLocker/BitLocker Management` (EventCode 768, 770, 775, 846)","q":"index=wineventlog source=\"WinEventLog:Microsoft-Windows-BitLocker*\"\n  EventCode IN (768, 770, 775, 846)\n| eval issue=case(EventCode=768,\"Recovery mode entered\",EventCode=770,\"Protection suspended\",EventCode=775,\"Recovery key used\",EventCode=846,\"Encryption failed\")\n| table _time, host, issue, VolumeName, RecoveryReason\n| sort -_time","m":"Forward BitLocker Management and Operational logs. EventCode 768/775=recovery mode (TPM unsealing failed, boot integrity compromised). Common benign triggers: BIOS updates, boot order changes. Alert on recovery events \u2014 each one should be correlated with approved change windows. Track EventCode 770 (protection suspended) \u2014 ensure it's re-enabled within 24 hours.","z":"Table (recovery events), Timeline, Single value (unresolved recoveries)."},{"i":"1.2.54","n":"Windows Event Forwarding (WEF) Health","c":"high","f":"advanced","v":"WEF collects events from thousands of endpoints to central collectors. Forwarding failures create visibility gaps across the security monitoring pipeline.","t":"`Splunk_TA_windows`","d":"`sourcetype=WinEventLog:Microsoft-Windows-Forwarding/Operational` (EventCode 100, 102, 103, 105, 111)","q":"index=wineventlog source=\"WinEventLog:Microsoft-Windows-Forwarding/Operational\"\n  EventCode IN (102, 103, 105, 111)\n| eval issue=case(EventCode=102,\"Subscription connected\",EventCode=103,\"Subscription error\",EventCode=105,\"Access denied\",EventCode=111,\"Collector unreachable\")\n| stats count by host, issue, SubscriptionName\n| where issue!=\"Subscription connected\"\n| sort -count","m":"Enable Forwarding/Operational log on WEF collectors and clients. EventCode 103=subscription-level error, 105=access denied (Kerberos/permission issue), 111=cannot reach collector. Monitor for expected forwarders going silent \u2014 compare against CMDB endpoint list. Alert when error rate exceeds 5% of clients. Use `wecutil gr <subscription>` via scripted input for precise subscription health.","z":"Status grid (subscription \u00d7 host), Pie chart (healthy vs. error), Table (error details), Single value (connected clients)."},{"i":"1.2.55","n":"Suspicious Token Manipulation","c":"critical","f":"intermediate","v":"Token impersonation and privilege escalation via token manipulation (SeImpersonatePrivilege abuse) is a common post-exploitation technique.","t":"`Splunk_TA_windows`","d":"`sourcetype=WinEventLog:Security` (EventCode 4673, 4674)","q":"index=wineventlog sourcetype=\"WinEventLog:Security\" EventCode IN (4673, 4674)\n  Privileges IN (\"SeImpersonatePrivilege\", \"SeAssignPrimaryTokenPrivilege\", \"SeTcbPrivilege\", \"SeDebugPrivilege\")\n| where NOT match(ProcessName, \"(?i)(lsass|svchost|services|mssql|w3wp)\")\n| stats count by SubjectUserName, ProcessName, Privileges, host\n| sort -count","m":"Enable \"Audit Sensitive Privilege Use\" in Advanced Audit Policy. EventCode 4673=sensitive privilege used, 4674=operation on privileged object. Focus on SeImpersonatePrivilege (Potato attacks), SeDebugPrivilege (memory injection), SeTcbPrivilege (token creation). Filter known legitimate users (service accounts, SQL Server, IIS). Alert on non-standard processes using these privileges.","z":"Table (privilege usage by process), Bar chart (privilege types), Timeline, Alert on unusual callers."},{"i":"1.2.56","n":"Sysmon Network Connection Monitoring","c":"high","f":"intermediate","v":"Sysmon EventCode 3 logs every outbound TCP/UDP connection with the originating process. Reveals C2 callbacks, data exfiltration, and unauthorized network access.","t":"`Splunk_TA_windows`, Sysmon required","d":"`sourcetype=WinEventLog:Microsoft-Windows-Sysmon/Operational` (EventCode 3)","q":"index=wineventlog sourcetype=\"WinEventLog:Microsoft-Windows-Sysmon/Operational\" EventCode=3\n  Initiated=\"true\"\n| where NOT cidrmatch(\"10.0.0.0/8\", DestinationIp) AND NOT cidrmatch(\"172.16.0.0/12\", DestinationIp) AND NOT cidrmatch(\"192.168.0.0/16\", DestinationIp)\n| stats count dc(DestinationIp) as unique_ips by Image, host, User\n| where unique_ips > 50 OR count > 500\n| sort -unique_ips","m":"Deploy Sysmon with network connection logging (EventCode 3, Initiated=true for outbound). Filter RFC1918 addresses to focus on external connections. High unique destination IPs from a single process suggest scanning or C2 beaconing. Alert on processes making external connections that normally shouldn't (e.g., winword.exe, excel.exe connecting outbound). Combine with DNS logs for full picture.","z":"Table (outbound connections by process), Network graph, Timechart (connection rate)."},{"i":"1.2.57","n":"Thread Count Exhaustion","c":"high","f":"intermediate","v":"Thread leaks or excessive thread creation cause pool exhaustion and application hangs. Windows has a system-wide limit of ~65K threads that affects all processes.","t":"`Splunk_TA_windows`","d":"`sourcetype=Perfmon:Process` (counter: Thread Count), `sourcetype=Perfmon:System` (counter: Threads)","q":"index=perfmon sourcetype=\"Perfmon:Process\" counter=\"Thread Count\" instance!=\"_Total\" instance!=\"Idle\"\n| stats max(Value) as threads by host, instance\n| where threads > 500\n| sort -threads","m":"Configure Perfmon Process inputs with `Thread Count` counter (interval=300). Also monitor system-wide threads via Perfmon System \u2192 Threads. Alert when any single process exceeds 500 threads or system total exceeds 50K. Common offenders: IIS application pools (w3wp.exe), Java applications, .NET services with async leaks. Correlate with application response times.","z":"Bar chart (top thread consumers), Line chart (thread growth trend), Single value (system total)."},{"i":"1.2.58","n":"Storage Spaces Health Monitoring","c":"critical","f":"advanced","v":"Storage Spaces pools degrade silently when physical disks fail. Detection before a second disk fails prevents data loss in mirrored/parity configurations.","t":"`Splunk_TA_windows`","d":"`sourcetype=WinEventLog:Microsoft-Windows-StorageSpaces-Driver/Operational` (EventCode 1, 2, 3, 207)","q":"index=wineventlog source=\"WinEventLog:Microsoft-Windows-StorageSpaces*\" EventCode IN (1, 2, 3, 207)\n| eval status=case(EventCode=1,\"Pool degraded\",EventCode=2,\"Disk failed\",EventCode=3,\"IO error\",EventCode=207,\"Repair started\")\n| table _time, host, status, PhysicalDiskId, PoolName\n| sort -_time","m":"Storage Spaces driver events log automatically. Monitor for pool degradation (lost redundancy) and disk failures. Alert at critical priority on any degradation \u2014 the pool is now running without full redundancy. Track repair progress (EventCode 207). Also poll via PowerShell scripted input: `Get-StoragePool | Get-PhysicalDisk | Where OperationalStatus -ne 'OK'` for proactive monitoring beyond event-based detection.","z":"Status grid (pool \u00d7 disk health), Timeline (degradation events), Single value (degraded pools \u2014 target: 0)."},{"i":"1.2.59","n":"DCOM / COM+ Application Errors","c":"medium","f":"beginner","v":"DCOM errors affect distributed applications, WMI remote management, and MMC snap-ins. Persistent errors indicate permission issues or component registration corruption.","t":"`Splunk_TA_windows`","d":"`sourcetype=WinEventLog:System` (EventCode 10016, 10028, 10010)","q":"index=wineventlog sourcetype=\"WinEventLog:System\" Source=\"DCOM\" EventCode IN (10016, 10028, 10010)\n| stats count by host, EventCode, param1, param2\n| where count > 10\n| sort -count","m":"EventCode 10016=permission error (most common \u2014 often benign for built-in COM objects), 10028=DCOM connection timed out, 10010=server did not register within timeout. Filter known benign 10016 errors (Windows built-in CLSIDs). Alert on 10028/10010 as these indicate application-impacting failures. Persistent 10010 errors for specific CLSIDs indicate broken COM registrations.","z":"Table (DCOM errors by CLSID), Bar chart (error types), Timechart (error frequency)."},{"i":"1.2.60","n":"Code Integrity / Driver Signing Violations","c":"critical","f":"intermediate","v":"Unsigned or tampered drivers loading into the kernel are a rootkit indicator. Code Integrity violations detect bypass attempts and driver-level threats.","t":"`Splunk_TA_windows`","d":"`sourcetype=WinEventLog:Microsoft-Windows-CodeIntegrity/Operational` (EventCode 3001, 3002, 3003, 3004, 3033)","q":"index=wineventlog source=\"WinEventLog:Microsoft-Windows-CodeIntegrity/Operational\"\n  EventCode IN (3001, 3002, 3003, 3004, 3033)\n| eval issue=case(EventCode=3001,\"Unsigned driver blocked\",EventCode=3002,\"Unable to verify\",EventCode=3003,\"Unsigned policy\",EventCode=3004,\"File hash not found\",EventCode=3033,\"Unsigned image loaded\")\n| table _time, host, issue, FileNameBuffer, ProcessNameBuffer\n| sort -_time","m":"Code Integrity events log automatically on systems with Secure Boot, HVCI, or WDAC. EventCode 3033=unsigned image loaded (audit mode), 3001=unsigned driver blocked (enforcement). Alert on all blocked events in enforcement mode. In audit mode, use data to build a driver whitelist before enabling enforcement. Cross-reference drivers with known-good hashes from Microsoft catalog.","z":"Table (integrity violations), Timeline, Bar chart (top unsigned files), Single value (blocked loads)."},{"i":"1.2.61","n":"Data Deduplication Health","c":"medium","f":"beginner","v":"Windows Data Deduplication saves significant storage on file servers. Job failures or savings degradation indicate volume corruption or configuration issues.","t":"`Splunk_TA_windows`","d":"`sourcetype=WinEventLog:Microsoft-Windows-Deduplication/Operational` (EventCode 6153, 6155, 12800, 12802)","q":"index=wineventlog source=\"WinEventLog:Microsoft-Windows-Deduplication*\"\n  EventCode IN (6153, 6155, 12800, 12802)\n| eval status=case(EventCode=6153,\"Optimization completed\",EventCode=6155,\"Optimization failed\",EventCode=12800,\"Scrubbing completed\",EventCode=12802,\"Corruption detected\")\n| table _time, host, status, VolumeName, SavingsRate, CorruptionCount\n| sort -_time","m":"Enable Deduplication Operational log on file servers with dedup enabled. EventCode 6155=optimization job failure, 12802=data corruption detected. Monitor savings rate trending \u2014 declining rates suggest changing data patterns or dedup overhead. Alert on any corruption detection (12802) immediately. Track optimization duration \u2014 increasing times indicate volume growth outpacing dedup capacity.","z":"Line chart (savings rate over time), Table (job results), Single value (current savings %), Alert on corruption."},{"i":"1.2.62","n":"TCP Connection State Monitoring","c":"medium","f":"intermediate","v":"Excessive TIME_WAIT, CLOSE_WAIT, or ESTABLISHED connections indicate connection leaks, exhausted ephemeral ports, or application hanging. Causes service unavailability.","t":"`Splunk_TA_windows`","d":"`sourcetype=Perfmon:TCPv4` (counters: Connections Established, Connection Failures)","q":"index=perfmon sourcetype=\"Perfmon:TCPv4\" counter IN (\"Connections Established\",\"Connection Failures\",\"Connections Reset\")\n| timechart span=5m avg(Value) as value by counter, host\n| where value > 10000","m":"Configure Perfmon inputs for TCPv4 object: `Connections Established`, `Connection Failures`, `Connections Reset`, `Segments Retransmitted/sec` (interval=60). Also deploy a scripted input running `netstat -an | find /c \"TIME_WAIT\"` for state-level counts. Alert when established connections exceed application baseline by 2x or TIME_WAIT exceeds 5000 (ephemeral port exhaustion risk). Default ephemeral port range: 49152-65535 (16K ports).","z":"Line chart (connection states over time), Gauge (established connections), Single value (TIME_WAIT count)."},{"i":"1.2.63","n":"Windows Installer Failures","c":"medium","f":"intermediate","v":"MSI installation failures affect patching, software deployment, and SCCM/Intune compliance. Repeated failures indicate corrupted Windows Installer service or disk issues.","t":"`Splunk_TA_windows`","d":"`sourcetype=WinEventLog:Application` (Source=MsiInstaller, EventCode 11708, 11724)","q":"index=wineventlog sourcetype=\"WinEventLog:Application\" Source=\"MsiInstaller\" EventCode IN (11708, 11724)\n| table _time, host, EventCode, ProductName, ProductVersion, Message\n| stats count by host, ProductName\n| where count > 2\n| sort -count","m":"EventCode 11708=installation failed, 11724=removal completed (track uninstalls). Track installation failures per host \u2014 repeated failures for the same product indicate systematic issues. Correlate with SCCM/Intune deployment status. Common causes: pending reboots, insufficient disk space, corrupted Windows Installer cache. Alert when critical patches fail to install across >5% of fleet.","z":"Table (failed installs), Bar chart (top failing products), Timechart (failure rate)."},{"i":"1.2.64","n":"Event Log Channel Size / Overflow","c":"high","f":"advanced","v":"When event logs reach maximum size with overwrite-oldest policy, critical security events are lost. With do-not-overwrite policy, the log stops recording entirely.","t":"`Splunk_TA_windows`, custom scripted input","d":"`sourcetype=WinEventLog:System` (EventCode 6005) + custom scripted input (`wevtutil gl Security`)","q":"index=wineventlog sourcetype=\"WinEventLog:System\" EventCode=1101\n| table _time, host, Channel\n| stats count by host, Channel\n| sort -count\n\n| `` Alternatively via scripted input: ``\nindex=os sourcetype=windows:eventlog:size\n| where used_pct > 90\n| table _time, host, log_name, current_size_MB, max_size_MB, used_pct","m":"Deploy a scripted input that runs `wevtutil gl Security` (and other critical channels) every 15 minutes, parsing current size vs. max size. Default Security log is 20MB \u2014 often insufficient on DCs and servers with detailed auditing. Alert when any critical log exceeds 90% capacity. Alternatively, monitor EventCode 1101 (audit log full) in the System log. Recommended: increase Security log to 1GB+ on DCs.","z":"Gauge (log fill percentage), Table (logs near capacity), Bar chart (log sizes by channel)."},{"i":"1.2.65","n":"Pass-the-Hash / NTLM Relay Detection","c":"critical","f":"intermediate","v":"Pass-the-hash attacks use stolen NTLM hashes to authenticate without knowing the password. Detecting NTLM logons from unusual sources catches this common lateral movement technique.","t":"`Splunk_TA_windows`","d":"`sourcetype=WinEventLog:Security` (EventCode 4624, LogonType 3, AuthenticationPackageName=NTLM)","q":"index=wineventlog sourcetype=\"WinEventLog:Security\" EventCode=4624 LogonType=3\n  AuthenticationPackageName=\"NTLM\" TargetUserName!=\"ANONYMOUS LOGON\"\n| stats count dc(host) as target_hosts values(host) as targets by TargetUserName, IpAddress\n| where target_hosts > 3\n| sort -target_hosts","m":"NTLM type 3 (network) logons from non-standard sources indicate pass-the-hash. In environments enforcing Kerberos, any NTLM logon to a server is suspicious. Focus on admin accounts using NTLM to access multiple hosts. EventCode 4776 on the DC shows the NTLM validation. Remediation: enable \"Restrict NTLM\" GPO settings, enforce Kerberos, deploy Credential Guard. MITRE ATT&CK T1550.002.","z":"Table (NTLM logons from suspicious sources), Network graph (source\u2192targets), Timeline, Single value (NTLM vs Kerberos ratio)."},{"i":"1.2.66","n":"Sysmon File Creation in Suspicious Paths","c":"high","f":"intermediate","v":"Files created in temp directories, startup folders, and system paths by unexpected processes indicate malware dropping payloads or establishing persistence.","t":"`Splunk_TA_windows`, Sysmon required","d":"`sourcetype=WinEventLog:Microsoft-Windows-Sysmon/Operational` (EventCode 11)","q":"index=wineventlog sourcetype=\"WinEventLog:Microsoft-Windows-Sysmon/Operational\" EventCode=11\n| where match(TargetFilename, \"(?i)(\\\\\\\\Temp\\\\\\\\.*\\\\.exe|\\\\\\\\Startup\\\\\\\\|\\\\\\\\Tasks\\\\\\\\|\\\\\\\\ProgramData\\\\\\\\.*\\\\.exe|\\\\\\\\AppData\\\\\\\\.*\\\\.bat|\\\\\\\\AppData\\\\\\\\.*\\\\.ps1)\")\n| table _time, host, Image, TargetFilename, User\n| sort -_time","m":"Deploy Sysmon with FileCreate (EventCode 11) monitoring, filtered to suspicious target paths: Temp, Startup, ProgramData, AppData. Executables (.exe, .dll, .bat, .ps1, .vbs) created in these paths by non-installer processes are suspicious. Exclude known deployment tools (SCCM client, Intune agent). Cross-reference with process creation events to build full attack chain.","z":"Table (suspicious file creations), Bar chart (top dropping processes), Timeline."},{"i":"1.2.67","n":"Golden Ticket Detection (TGT Anomalies)","c":"critical","f":"intermediate","v":"Golden tickets are forged Kerberos TGTs that grant domain-wide access. Detecting anomalous TGT properties catches this catastrophic compromise.","t":"`Splunk_TA_windows`","d":"`sourcetype=WinEventLog:Security` (EventCode 4768, 4769)","q":"index=wineventlog sourcetype=\"WinEventLog:Security\" EventCode=4769\n| eval ticket_age = _time - TicketIssueTime\n| where TicketEncryptionType=\"0x17\" AND ticket_age > 36000\n| table _time, host, TargetUserName, ServiceName, IpAddress, TicketEncryptionType\n| sort -_time\n\n| `` Also detect TGT requests with RC4 from non-standard IPs: ``\nindex=wineventlog sourcetype=\"WinEventLog:Security\" EventCode=4768 TicketEncryptionType=0x17\n| stats count by TargetUserName, IpAddress","m":"Golden tickets typically use RC4 encryption (0x17) with abnormally long lifetimes (default Kerberos max is 10 hours). EventCode 4768=TGT request, 4769=TGS request. Detect TGS requests referencing TGTs older than 10 hours, or TGT requests with RC4 in environments that enforce AES. Also monitor for EventCode 4769 with services accessed that the user normally doesn't touch. Requires KRBTGT password rotation as remediation.","z":"Table (anomalous ticket requests), Timeline, Single value (RC4 TGT count), Alert."},{"i":"1.2.68","n":"NTFS Corruption and Self-Healing","c":"critical","f":"intermediate","v":"NTFS corruption can cause data loss, application failures, and boot issues. Self-healing events indicate disk degradation that will worsen.","t":"`Splunk_TA_windows`","d":"`sourcetype=WinEventLog:System` (Source=Ntfs, EventCode 55, 98, 137, 140)","q":"index=wineventlog sourcetype=\"WinEventLog:System\" Source=\"Ntfs\" EventCode IN (55, 98, 137, 140)\n| eval issue=case(EventCode=55,\"NTFS corruption detected\",EventCode=98,\"Volume dirty flag set\",EventCode=137,\"Self-healing started\",EventCode=140,\"Self-healing completed\")\n| table _time, host, issue, DriveName, CorruptionType\n| sort -_time","m":"NTFS events log automatically. EventCode 55=structure corruption on volume (critical), 98=volume marked dirty (chkdsk needed at boot), 137/140=self-healing activity. Any EventCode 55 requires immediate attention \u2014 indicates metadata corruption that may spread. Correlate with WHEA (hardware) and SMART events to determine if underlying disk is failing. Schedule chkdsk offline and plan disk replacement.","z":"Table (corruption events), Timeline, Single value (affected volumes \u2014 target: 0)."},{"i":"1.2.69","n":"Page File Usage & Exhaustion","c":"high","f":"intermediate","v":"Page file exhaustion prevents new process creation and causes \"out of virtual memory\" errors. System-managed page files can grow to fill the disk.","t":"`Splunk_TA_windows`","d":"`sourcetype=Perfmon:Paging_File` (counter: % Usage, % Usage Peak)","q":"index=perfmon sourcetype=\"Perfmon:Paging_File\" counter=\"% Usage\" instance=\"_Total\"\n| timechart span=15m avg(Value) as pf_pct by host\n| where pf_pct > 70","m":"Configure Perfmon inputs for Paging File object: `% Usage`, `% Usage Peak` (interval=300). Alert when usage exceeds 70% sustained (indicates memory pressure requiring page file). Track peak usage \u2014 if it regularly exceeds 80%, the system needs more RAM or has a memory leak. Also monitor EventCode 2004 in System log (page file too small) as a reactive indicator.","z":"Line chart (page file usage over time), Gauge (current usage), Table (hosts with high usage)."},{"i":"1.2.70","n":"Context Switch Rate Anomalies","c":"medium","f":"advanced","v":"Abnormally high context switch rates indicate excessive threading, poor application design, or kernel-mode driver issues. Degrades overall system performance.","t":"`Splunk_TA_windows`","d":"`sourcetype=Perfmon:System` (counter: Context Switches/sec)","q":"index=perfmon sourcetype=\"Perfmon:System\" counter=\"Context Switches/sec\"\n| timechart span=5m avg(Value) as ctx_switches by host\n| streamstats window=48 avg(ctx_switches) as baseline by host\n| eval deviation = (ctx_switches - baseline) / baseline * 100\n| where deviation > 100","m":"Add `Context Switches/sec` to Perfmon System inputs (interval=60). Normal range varies by workload \u2014 establish per-host baselines. >15,000/sec per CPU core is generally concerning. Alert when rate exceeds 2x the rolling baseline. Correlate with `Processor Queue Length` and `% Interrupt Time` to distinguish user-mode threading issues from driver/hardware interrupt storms.","z":"Line chart (context switch rate with baseline), Heatmap (hosts \u00d7 rate), Single value (anomalous hosts)."},{"i":"1.2.71","n":"Scheduled Task Creation (Persistence)","c":"high","f":"expert","v":"Scheduled tasks are a common persistence mechanism for malware. New tasks created outside change management warrant investigation.","t":"`Splunk_TA_windows`","d":"`sourcetype=WinEventLog:Security` (EventCode 4698), `sourcetype=WinEventLog:Microsoft-Windows-TaskScheduler/Operational` (EventCode 106)","q":"index=wineventlog sourcetype=\"WinEventLog:Security\" EventCode=4698\n| rex field=TaskContent \"<Command>(?<command>[^<]+)</Command>\"\n| rex field=TaskContent \"<Arguments>(?<arguments>[^<]+)</Arguments>\"\n| table _time, host, SubjectUserName, TaskName, command, arguments\n| where NOT match(SubjectUserName, \"(?i)(SYSTEM|sccm|intune)\")\n| sort -_time","m":"Enable \"Audit Other Object Access Events\" for EventCode 4698 (task created). The TaskContent XML field contains the full task definition including command, arguments, and triggers. Alert on tasks created by non-SYSTEM/non-admin accounts, tasks with commands in temp/user directories, or tasks executing encoded PowerShell. Cross-reference with Sysmon process creation for execution context.","z":"Table (new tasks with commands), Timeline, Bar chart (tasks created by user)."},{"i":"1.2.72","n":"WinRM / Remote PowerShell Connections","c":"high","f":"intermediate","v":"WinRM enables remote command execution via PowerShell Remoting. Monitoring inbound WinRM sessions detects lateral movement and unauthorized remote management.","t":"`Splunk_TA_windows`","d":"`sourcetype=WinEventLog:Microsoft-Windows-WinRM/Operational` (EventCode 6, 91, 161)","q":"index=wineventlog source=\"WinEventLog:Microsoft-Windows-WinRM/Operational\"\n  EventCode IN (6, 91, 161)\n| eval action=case(EventCode=6,\"Session created\",EventCode=91,\"Session created (user)\",EventCode=161,\"Auth failed\")\n| stats count by host, action, User, IpAddress\n| sort -count","m":"Enable WinRM Operational log on all servers. EventCode 6/91=new WinRM session established, 161=authentication failure. Baseline expected WinRM sources (jump servers, SCCM, monitoring tools). Alert on WinRM sessions from non-authorized IPs or workstations. In restricted environments, consider disabling WinRM on servers that don't require it. Correlate with PowerShell Script Block Logging for full command visibility.","z":"Table (WinRM sessions by source), Network graph (source\u2192dest), Timeline, Bar chart (sessions per host)."},{"i":"1.2.73","n":"LDAP Query Performance (DC Health)","c":"high","f":"intermediate","v":"Slow LDAP queries on domain controllers degrade authentication, group policy processing, and application lookups across the entire domain.","t":"`Splunk_TA_windows`","d":"`sourcetype=Perfmon:NTDS` (counters: LDAP Searches/sec, LDAP Successful Binds/sec, LDAP Search Time)","q":"index=perfmon sourcetype=\"Perfmon:NTDS\" counter IN (\"LDAP Searches/sec\",\"LDAP Successful Binds/sec\",\"LDAP Client Sessions\")\n| timechart span=5m avg(Value) as value by counter, host","m":"Configure Perfmon inputs on domain controllers for NTDS object: `LDAP Searches/sec`, `LDAP Successful Binds/sec`, `LDAP Client Sessions`, `LDAP Active Threads` (interval=60). Also enable \"Expensive/Inefficient LDAP searches\" logging via registry (15 Field Engineering diagnostics). Alert when LDAP search rate drops suddenly (DC issues) or when client sessions exceed baseline by 2x (possible LDAP enumeration attack).","z":"Line chart (LDAP operations/sec), Dual-axis (searches + bind rate), Table (DCs by load), Gauge (active sessions)."},{"i":"1.2.74","n":"Hyper-V VM State Changes","c":"high","f":"intermediate","v":"Unexpected VM power state changes (shutdowns, paused, critical saves) indicate host issues, resource contention, or unauthorized administrative actions.","t":"`Splunk_TA_windows`","d":"`sourcetype=WinEventLog:Microsoft-Windows-Hyper-V-VMMS-Admin` (EventCode 12320, 12322, 12324, 18304)","q":"index=wineventlog source=\"WinEventLog:Microsoft-Windows-Hyper-V-VMMS*\"\n  EventCode IN (12320, 12322, 12324, 18304, 18310, 18312)\n| eval action=case(EventCode=12320,\"VM started\",EventCode=12322,\"VM stopped\",EventCode=12324,\"VM saved\",EventCode=18304,\"VM critical\",EventCode=18310,\"VM paused\",EventCode=18312,\"VM resumed\")\n| table _time, host, action, VmName, VmId\n| sort -_time","m":"Forward Hyper-V VMMS Admin logs from all Hyper-V hosts. EventCode 18304=VM entered critical state (memory pressure, lost storage), 18310=VM paused (out of disk, integration services failure). Alert on any critical state transitions. Track unexpected shutdowns (12322 without preceding 12320 by admin). Correlate with host-level resource monitoring to identify the root cause.","z":"Timeline (VM state changes), Status grid (VM \u00d7 state), Table (critical events), Single value (VMs in critical state)."},{"i":"1.2.75","n":"AD Certificate Services (ADCS) Anomalies","c":"critical","f":"intermediate","v":"ADCS misconfigurations enable privilege escalation (ESC1-ESC8 attacks). Monitoring certificate requests catches unauthorized certificate enrollment for domain admin impersonation.","t":"`Splunk_TA_windows`","d":"`sourcetype=WinEventLog:Security` (EventCode 4886, 4887, 4888)","q":"index=wineventlog sourcetype=\"WinEventLog:Security\" EventCode IN (4886, 4887, 4888)\n| eval action=case(EventCode=4886,\"Request received\",EventCode=4887,\"Certificate issued\",EventCode=4888,\"Certificate denied\")\n| stats count by Requester, CertificateTemplate, SubjectName, action\n| where CertificateTemplate IN (\"User\",\"SmartcardLogon\",\"Machine\") AND NOT match(Requester, \"(?i)(SYSTEM|machine\\\\$)\")\n| sort -count","m":"Enable Certificate Services auditing on CA servers. EventCode 4887=certificate issued \u2014 track who requested which template. Alert on certificates with Subject Alternative Names (SANs) containing admin usernames (ESC1 attack). Monitor for certificate requests from non-standard templates. Track enrollment agent certificates (ESC3). Audit CA configuration for overly permissive templates with `certutil -v -template`.","z":"Table (certificate issuances), Bar chart (requests by template), Timeline, Alert on SAN mismatches."},{"i":"1.2.76","n":"AdminSDHolder Modification","c":"critical","f":"beginner","v":"The AdminSDHolder container controls ACLs on all privileged AD groups. Modifying it grants persistent hidden admin access that survives permission resets.","t":"`Splunk_TA_windows`","d":"`sourcetype=WinEventLog:Security` (EventCode 5136)","q":"index=wineventlog sourcetype=\"WinEventLog:Security\" EventCode=5136\n  ObjectDN=\"*AdminSDHolder*\"\n| table _time, host, SubjectUserName, AttributeLDAPDisplayName, AttributeValue, OperationType\n| sort -_time","m":"Enable \"Audit Directory Service Changes\" on domain controllers. EventCode 5136=directory object modified. Filter for ObjectDN containing \"AdminSDHolder\". Any modification to this container is highly suspicious \u2014 it should only change via approved security hardening. The SDProp process propagates AdminSDHolder ACLs to all protected groups every 60 minutes. Alert immediately with critical priority.","z":"Table (modifications), Single value (count \u2014 target: 0), Alert with SOC escalation."},{"i":"1.2.77","n":"SPN Modification (Targeted Kerberoasting)","c":"critical","f":"intermediate","v":"Attackers add SPNs to admin accounts to make them Kerberoastable. Monitoring SPN changes on sensitive accounts catches this setup before the actual attack.","t":"`Splunk_TA_windows`","d":"`sourcetype=WinEventLog:Security` (EventCode 5136, attribute servicePrincipalName)","q":"index=wineventlog sourcetype=\"WinEventLog:Security\" EventCode=5136\n  AttributeLDAPDisplayName=\"servicePrincipalName\"\n| table _time, host, SubjectUserName, ObjectDN, AttributeValue, OperationType\n| where OperationType=\"%%14674\"\n| sort -_time","m":"EventCode 5136 with AttributeLDAPDisplayName=servicePrincipalName tracks SPN additions (OperationType %%14674=value added) and removals. Alert on any SPN added to user accounts in privileged groups (Domain Admins, Enterprise Admins, Schema Admins). Legitimate SPN changes are rare and tied to service deployments. Cross-reference with Kerberoasting detection (UC-1.2.37).","z":"Table (SPN changes), Single value (changes to admin accounts \u2014 target: 0), Timeline."},{"i":"1.2.78","n":"DSRM Account Usage","c":"critical","f":"beginner","v":"The Directory Services Restore Mode (DSRM) account is a local admin on every DC with a rarely-changed password. Its use outside restores indicates compromise.","t":"`Splunk_TA_windows`","d":"`sourcetype=WinEventLog:Security` (EventCode 4794, 4624 with DSRM)","q":"index=wineventlog sourcetype=\"WinEventLog:Security\"\n  (EventCode=4794 OR (EventCode=4624 TargetUserName=\"Administrator\" LogonType=10 AuthenticationPackageName=\"Negotiate\"))\n| eval alert_type=case(EventCode=4794,\"DSRM password changed\",EventCode=4624,\"Possible DSRM logon\")\n| table _time, host, alert_type, SubjectUserName, IpAddress\n| sort -_time","m":"EventCode 4794=DSRM password change (should only happen during planned maintenance). DSRM logons appear as local \"Administrator\" logons on the DC. Since Windows Server 2008 R2, registry key DsrmAdminLogonBehavior allows DSRM logon while AD is running (value=2). Alert on any DSRM password change and any local admin logon to a DC. Set DsrmAdminLogonBehavior=0 (default, deny DSRM logon while AD running).","z":"Table (DSRM events), Single value (count \u2014 target: 0 outside restore operations), Alert."},{"i":"1.2.79","n":"Sysmon DNS Query Logging","c":"medium","f":"intermediate","v":"Per-process DNS query logging reveals which applications communicate with which domains. Detects DGA, C2 callbacks, and data exfiltration at the endpoint level.","t":"`Splunk_TA_windows`, Sysmon required","d":"`sourcetype=WinEventLog:Microsoft-Windows-Sysmon/Operational` (EventCode 22)","q":"index=wineventlog sourcetype=\"WinEventLog:Microsoft-Windows-Sysmon/Operational\" EventCode=22\n| where NOT match(QueryName, \"(?i)(microsoft\\.com|windowsupdate\\.com|office\\.com|bing\\.com|msftconnecttest)\")\n| stats count dc(QueryName) as unique_domains by Image, host\n| where unique_domains > 100\n| sort -unique_domains","m":"Deploy Sysmon v10+ with DNS query logging (EventCode 22). Each event records the process that made the DNS query and the resolved domain. Filter out known-good domains. Alert on processes with high unique domain counts (DGA indicator), processes that normally don't make DNS queries (LOLBin abuse), or queries to known-bad domains (threat intel lookup). Lower volume than network-level DNS logging since it's per-endpoint.","z":"Table (queries by process), Bar chart (top resolving processes), Sankey diagram (process\u2192domain)."},{"i":"1.2.80","n":"Windows Backup Job Monitoring","c":"high","f":"beginner","v":"Windows Server Backup failures mean the server has no recovery point. Silent failures create a false sense of protection.","t":"`Splunk_TA_windows`","d":"`sourcetype=WinEventLog:Microsoft-Windows-Backup` (EventCode 4, 5, 8, 9, 14, 17, 22)","q":"index=wineventlog source=\"WinEventLog:Microsoft-Windows-Backup\"\n  EventCode IN (4, 5, 8, 9, 14)\n| eval status=case(EventCode=4,\"Backup completed\",EventCode=5,\"Backup failed\",EventCode=8,\"Backup failed (VSS)\",EventCode=9,\"Warning\",EventCode=14,\"Backup completed with warnings\")\n| table _time, host, status, EventCode, BackupTarget\n| sort -_time","m":"Forward Windows Backup event logs. EventCode 4=success, 5=failure, 8=VSS failure. Alert on any backup failure (EventCode 5, 8). Also monitor for missing backups \u2014 if a server stops reporting EventCode 4, the backup job may have been disabled or deleted. Compare actual backup frequency against RTO/RPO requirements. Escalate servers with no successful backup in 48+ hours.","z":"Status grid (host \u00d7 backup status), Table (failures), Line chart (backup success rate over time), Single value (hours since last backup)."},{"i":"1.2.81","n":"SMBv1 Usage Detection","c":"high","f":"intermediate","v":"SMBv1 is vulnerable to EternalBlue and WannaCry. Detecting remaining SMBv1 traffic identifies systems that need upgrading or have SMBv1 re-enabled.","t":"`Splunk_TA_windows`","d":"`sourcetype=WinEventLog:Microsoft-Windows-SMBServer/Audit` (EventCode 3000)","q":"index=wineventlog source=\"WinEventLog:Microsoft-Windows-SMBServer/Audit\" EventCode=3000\n| stats count values(ClientName) as clients dc(ClientName) as client_count by host\n| sort -client_count","m":"Enable SMB1 audit logging via `Set-SmbServerConfiguration -AuditSmb1Access $true`. EventCode 3000 logs each SMBv1 connection with the client name. Identify all clients still using SMBv1, then upgrade or remediate before disabling SMBv1 entirely. Alert on any new SMBv1 access after remediation is complete. MS17-010 (EternalBlue) affects unpatched SMBv1 systems.","z":"Table (SMBv1 clients), Bar chart (clients per server), Single value (total SMBv1 connections \u2014 target: 0)."},{"i":"1.2.82","n":"Credential Guard Status Monitoring","c":"high","f":"intermediate","v":"Credential Guard protects NTLM hashes and Kerberos tickets in an isolated container. Monitoring ensures it remains enabled and isn't bypassed.","t":"`Splunk_TA_windows`","d":"`sourcetype=WinEventLog:Microsoft-Windows-DeviceGuard/Operational` (EventCode 13, 14, 15)","q":"index=wineventlog source=\"WinEventLog:Microsoft-Windows-DeviceGuard*\"\n| stats latest(EventCode) as status by host\n| eval cg_status=case(status=13,\"Running\",status=14,\"Stopped\",status=15,\"Not configured\",1=1,\"Unknown\")\n| table host, cg_status\n| where cg_status!=\"Running\"","m":"Device Guard/Credential Guard Operational log reports VBS (Virtualization Based Security) status. EventCode 13=VBS running with Credential Guard, 14=stopped, 15=not configured. All domain-joined Windows 10/11 and Server 2016+ should have Credential Guard enabled. Alert when any previously-enabled host reports stopped or not configured. Requires UEFI Secure Boot, TPM 2.0, and compatible hardware.","z":"Pie chart (fleet CG status), Table (non-compliant hosts), Single value (% compliant)."},{"i":"1.2.83","n":"Boot Configuration Changes (BCDEdit)","c":"critical","f":"intermediate","v":"Boot configuration changes can disable Secure Boot, enable test signing (rootkit loading), or modify boot chain integrity. Used by advanced threats.","t":"`Splunk_TA_windows`","d":"`sourcetype=WinEventLog:Security` (EventCode 4688, CommandLine containing bcdedit)","q":"index=wineventlog sourcetype=\"WinEventLog:Security\" EventCode=4688\n  CommandLine=\"*bcdedit*\"\n| where match(CommandLine, \"(?i)(testsigning|nointegritychecks|safeboot|debug|disableelamdrivers)\")\n| table _time, host, SubjectUserName, CommandLine, ParentProcessName\n| sort -_time","m":"Requires process creation with command line auditing (EventCode 4688). Alert on any bcdedit execution that modifies security settings: `testsigning on` (allows unsigned drivers), `nointegritychecks` (disables code integrity), `debug on` (enables kernel debugging), `disableelamdrivers` (disables early launch anti-malware). All of these weaken the boot chain. Legitimate uses are rare and limited to development environments.","z":"Table (bcdedit commands), Single value (security-affecting changes \u2014 target: 0), Alert."},{"i":"1.2.84","n":"Sysmon Named Pipe Monitoring","c":"high","f":"intermediate","v":"Named pipes are used for inter-process communication and by tools like Cobalt Strike, Mimikatz, and PsExec. Detecting unusual named pipes reveals C2 and lateral movement.","t":"`Splunk_TA_windows`, Sysmon required","d":"`sourcetype=WinEventLog:Microsoft-Windows-Sysmon/Operational` (EventCode 17, 18)","q":"index=wineventlog sourcetype=\"WinEventLog:Microsoft-Windows-Sysmon/Operational\"\n  EventCode IN (17, 18)\n| where match(PipeName, \"(?i)(MSSE-|msagent_|postex_|status_|mojo\\.|cobaltstrike|beacon)\")\n| table _time, host, EventCode, PipeName, Image, User\n| sort -_time","m":"Deploy Sysmon with PipeCreated (17) and PipeConnected (18) monitoring. Known malicious pipe names: `MSSE-*` (Metasploit), `msagent_*` (Cobalt Strike), `postex_*` (Cobalt Strike post-exploitation), `status_*` (default Cobalt Strike). Also detect PsExec pipes (`PSEXESVC`). Baseline normal pipes per application role, then alert on anomalies.","z":"Table (pipe events), Bar chart (top pipe names), Timeline, Alert on known-bad patterns."},{"i":"1.2.85","n":"IIS Application Pool Crashes & Recycling","c":"high","f":"intermediate","v":"Application pool crashes cause HTTP 503 errors and service outages. Frequent recycling indicates memory leaks or configuration issues in web applications.","t":"`Splunk_TA_windows`, Splunk Add-on for Microsoft IIS","d":"`sourcetype=WinEventLog:System` (Source=WAS, EventCode 5002, 5010, 5011, 5012, 5013)","q":"index=wineventlog sourcetype=\"WinEventLog:System\" Source=\"WAS\"\n  EventCode IN (5002, 5010, 5011, 5012, 5013)\n| eval event=case(EventCode=5002,\"AppPool crashed\",EventCode=5010,\"Process termination timeout\",EventCode=5011,\"AppPool auto-disabled\",EventCode=5012,\"AppPool rapid failures\",EventCode=5013,\"AppPool timeout\")\n| table _time, host, event, AppPoolName\n| sort -_time","m":"WAS (Windows Activation Service) events log automatically on IIS servers. EventCode 5002=worker process crashed, 5011=pool auto-disabled due to rapid failures (5 in 5 minutes default), 5012=rapid failure protection triggered. Alert on any 5011 event (pool disabled = site down). Track recycling frequency per pool. Correlate with WER EventCode 1000 for crash details including the faulting module.","z":"Table (app pool events), Timechart (recycling frequency), Status grid (pool \u00d7 health), Single value (disabled pools \u2014 target: 0)."},{"i":"1.2.86","n":"NTLM Audit and Restriction Monitoring","c":"medium","f":"beginner","v":"NTLM is a legacy authentication protocol vulnerable to relay attacks. Auditing NTLM usage identifies applications and systems that need migration to Kerberos.","t":"`Splunk_TA_windows`","d":"`sourcetype=WinEventLog:Security` (EventCode 4776), `sourcetype=WinEventLog:Microsoft-Windows-NTLM/Operational` (EventCode 8001, 8003, 8004)","q":"index=wineventlog source=\"WinEventLog:Microsoft-Windows-NTLM/Operational\"\n  EventCode IN (8001, 8003, 8004)\n| stats count by TargetName, DomainName, WorkstationName\n| sort -count","m":"Enable NTLM auditing via GPO: Network Security \u2192 Restrict NTLM \u2192 Audit incoming/outgoing NTLM traffic. EventCode 8001=outgoing NTLM, 8003=incoming NTLM to server, 8004=NTLM blocked. Start in audit mode to identify all NTLM-dependent applications before enabling blocking. Goal: reduce NTLM usage to zero where possible, using Kerberos for all domain authentication.","z":"Bar chart (top NTLM sources/destinations), Timechart (NTLM vs Kerberos ratio), Table (NTLM-dependent applications)."},{"i":"1.2.87","n":"DPAPI Credential Backup (DC)","c":"critical","f":"intermediate","v":"Data Protection API master key backup to domain controllers enables credential theft. Abnormal DPAPI backup activity from unexpected accounts indicates compromise.","t":"`Splunk_TA_windows`","d":"`sourcetype=WinEventLog:Security` (EventCode 4692, 4693)","q":"index=wineventlog sourcetype=\"WinEventLog:Security\" EventCode IN (4692, 4693)\n| eval action=case(EventCode=4692,\"DPAPI backup attempted\",EventCode=4693,\"DPAPI recovery attempted\")\n| table _time, host, action, SubjectUserName, SubjectDomainName, MasterKeyId\n| sort -_time","m":"EventCode 4692=DPAPI master key backup, 4693=recovery. Normal during user password changes. Alert on mass backup attempts (many keys in short time) or recovery from unexpected admin accounts \u2014 indicates SharpDPAPI/Mimikatz DPAPI module usage. Correlate with DCSync events (4662) as attackers often combine both techniques.","z":"Table (DPAPI events), Single value (recovery count), Timeline, Alert on mass operations."},{"i":"1.2.88","n":"Windows Search Indexer Issues","c":"low","f":"beginner","v":"Search Indexer crashes and high resource usage affect file server performance and SharePoint crawling. Index corruption requires full rebuild.","t":"`Splunk_TA_windows`","d":"`sourcetype=WinEventLog:Application` (Source=Windows Search Service, EventCode 3028, 3036, 7010, 7040, 7042)","q":"index=wineventlog sourcetype=\"WinEventLog:Application\" Source=\"Windows Search Service\"\n  EventCode IN (3028, 3036, 7010, 7040, 7042)\n| eval issue=case(EventCode=3028,\"Index corrupted\",EventCode=3036,\"Indexer failed\",EventCode=7040,\"Catalog corrupted\",EventCode=7042,\"Index rebuild started\")\n| table _time, host, issue, CatalogName\n| sort -_time","m":"Monitor on file servers and SharePoint servers where search indexing is critical. EventCode 3028/7040=index corruption (requires rebuild), 3036=indexer service failure. Also monitor Perfmon `Windows Search Indexer` object for `Items in Progress` and `Index Size`. A stuck \"Items in Progress\" >0 for extended periods indicates a hung indexer.","z":"Table (indexer events), Single value (index health status), Line chart (index size over time)."},{"i":"1.2.89","n":"System Uptime & Unexpected Restarts","c":"medium","f":"beginner","v":"Unexpected restarts indicate BSOD, power loss, forced reboots, or patch installations. Tracking uptime reveals instability patterns and unauthorized maintenance.","t":"`Splunk_TA_windows`","d":"`sourcetype=WinEventLog:System` (EventCode 6005, 6006, 6008, 6009, 1074)","q":"index=wineventlog sourcetype=\"WinEventLog:System\" EventCode IN (6005, 6006, 6008, 1074)\n| eval event=case(EventCode=6005,\"Event log started (boot)\",EventCode=6006,\"Event log stopped (clean shutdown)\",EventCode=6008,\"Unexpected shutdown\",EventCode=1074,\"User-initiated shutdown/restart\")\n| table _time, host, event, User, Reason, Comment\n| sort -_time","m":"EventCode 6008=unexpected shutdown (BSOD, power loss, hard reset) \u2014 always investigate. EventCode 1074=planned shutdown with user and reason. Calculate uptime by measuring time between 6005 events. Alert on any EventCode 6008 (unexpected) and on restarts outside maintenance windows. Track monthly uptime percentage per server for SLA reporting.","z":"Table (shutdown events), Line chart (uptime per host), Single value (hosts with unexpected restarts), Calendar view."},{"i":"1.2.90","n":"Shadow Copy Deletion (Ransomware Indicator)","c":"critical","f":"intermediate","v":"Ransomware deletes volume shadow copies to prevent file recovery. Detecting vssadmin/wmic shadow deletion commands is a high-confidence ransomware indicator.","t":"`Splunk_TA_windows`","d":"`sourcetype=WinEventLog:Security` (EventCode 4688), `sourcetype=WinEventLog:Microsoft-Windows-Sysmon/Operational` (EventCode 1)","q":"index=wineventlog EventCode IN (4688, 1)\n| where match(CommandLine, \"(?i)(vssadmin.*delete.*shadows|wmic.*shadowcopy.*delete|bcdedit.*recoveryenabled.*no|wbadmin.*delete.*catalog)\")\n| table _time, host, User, CommandLine, ParentProcessName, Image\n| sort -_time","m":"Monitor process creation (EventCode 4688 or Sysmon 1) for commands: `vssadmin delete shadows`, `wmic shadowcopy delete`, `bcdedit /set {default} recoveryenabled no`, `wbadmin delete catalog`. Any of these commands executed outside backup maintenance is a near-certain indicator of ransomware or destructive attack. Alert with critical priority and trigger automated response (network isolation). MITRE ATT&CK T1490.","z":"Single value (count \u2014 target: 0), Table (events), Alert with automated containment trigger."},{"i":"1.2.91","n":"USB / Removable Device Auditing","c":"medium","f":"intermediate","v":"Removable storage devices are a data exfiltration vector. Auditing device connections enables DLP and compliance enforcement.","t":"`Splunk_TA_windows`","d":"`sourcetype=WinEventLog:Security` (EventCode 6416), `sourcetype=WinEventLog:Microsoft-Windows-DriverFrameworks-UserMode/Operational`","q":"index=wineventlog EventCode=6416\n| eval DeviceClass=coalesce(ClassName, \"Unknown\")\n| where DeviceClass=\"DiskDrive\" OR DeviceClass=\"WPD\" OR DeviceClass=\"USB\"\n| stats count by host, DeviceId, DeviceDescription, DeviceClass, SubjectUserName, _time\n| sort -_time","m":"Enable Audit PnP Activity (EventCode 6416) via Advanced Audit Policy. Track USB mass storage, MTP devices, and portable drives. Correlate with file access events for full data movement picture. Alert on USB connections to servers or high-security workstations. Consider blocking USB storage via Group Policy on sensitive systems.","z":"Timeline (device connections over time), Table (device details), Alert on server USB connections."},{"i":"1.2.92","n":"Remote Desktop Gateway Session Monitoring","c":"medium","f":"intermediate","v":"RD Gateway is the entry point for remote workers. Monitoring session lifecycle detects unauthorized access, session hijacking, and resource abuse.","t":"`Splunk_TA_windows`","d":"`sourcetype=WinEventLog:Microsoft-Windows-TerminalServices-Gateway/Operational`","q":"index=wineventlog source=\"WinEventLog:Microsoft-Windows-TerminalServices-Gateway/Operational\"\n| eval EventAction=case(EventCode=300,\"Connected\", EventCode=302,\"Disconnected\", EventCode=303,\"AuthFailed\", EventCode=304,\"AuthZ_Failed\", 1=1,\"Other\")\n| stats count by host, UserName, ClientIP, ResourceName, EventAction\n| where EventAction=\"AuthFailed\" OR EventAction=\"AuthZ_Failed\"","m":"Collect RD Gateway Operational logs. Track connection (300), disconnect (302), authentication failures (303), and authorization failures (304). Alert on brute-force patterns (multiple 303s from same IP), connections from unusual geolocations, and access to unauthorized resources. Monitor session duration for anomalies.","z":"Geo map (client IPs), Table (session details), Timechart (connections by hour)."},{"i":"1.2.93","n":"Group Policy Object (GPO) Modification Auditing","c":"critical","f":"intermediate","v":"GPO changes affect all domain-joined systems. Unauthorized GPO modifications can deploy malware, weaken security, or exfiltrate credentials at scale.","t":"`Splunk_TA_windows`","d":"`sourcetype=WinEventLog:Security` (EventCode 5136, 5137)","q":"index=wineventlog EventCode IN (5136, 5137) ObjectClass=\"groupPolicyContainer\"\n| eval Action=case(EventCode=5136,\"Modified\", EventCode=5137,\"Created\", 1=1,\"Other\")\n| table _time, host, SubjectUserName, Action, ObjectDN, AttributeLDAPDisplayName, AttributeValue\n| sort -_time","m":"Enable Audit Directory Service Changes. Track GPO creation (5137) and modification (5136) on domain controllers. Alert on GPO changes outside change windows, by non-admin accounts, or modifications to security-sensitive GPOs (password policy, audit policy, software restriction). Correlate with change management tickets.","z":"Timeline (GPO changes), Table (modification details), Alert on unauthorized changes."},{"i":"1.2.94","n":"Windows Subsystem for Linux (WSL) Activity","c":"medium","f":"intermediate","v":"WSL can be abused to run Linux-based attack tools while evading Windows-focused security tooling. Monitoring WSL activity closes this visibility gap.","t":"`Splunk_TA_windows`","d":"`sourcetype=WinEventLog:Microsoft-Windows-Sysmon/Operational` (EventCode 1), `sourcetype=WinEventLog:Security` (EventCode 4688)","q":"index=wineventlog (EventCode=1 OR EventCode=4688)\n| where match(Image, \"(?i)(wsl\\.exe|wslhost\\.exe|bash\\.exe.*windows)\") OR match(ParentImage, \"(?i)wsl\")\n| table _time, host, User, Image, CommandLine, ParentImage, ParentCommandLine\n| sort -_time","m":"Monitor for WSL process execution (wsl.exe, wslhost.exe, bash.exe from WindowsApps). Track what commands are executed inside WSL via Sysmon process creation. On servers, WSL should not be installed \u2014 alert on any WSL activity. On workstations, baseline normal usage and alert on anomalies like network tools (nmap, netcat) or credential access tools.","z":"Table (WSL commands), Timechart (usage patterns), Alert on server WSL usage."},{"i":"1.2.95","n":"Windows Container Health Monitoring","c":"medium","f":"expert","v":"Windows containers running on Server 2019+ need monitoring for resource limits, failures, and networking issues to ensure application availability.","t":"`Splunk_TA_windows`","d":"`sourcetype=WinEventLog:Microsoft-Windows-Hyper-V-Compute-Operational`, `sourcetype=Perfmon:Container`","q":"index=wineventlog source=\"WinEventLog:Microsoft-Windows-Hyper-V-Compute-Operational\"\n| eval Status=case(EventCode=13001,\"Created\", EventCode=13003,\"Started\", EventCode=13005,\"Stopped\", EventCode=13007,\"Terminated\", 1=1,\"Other\")\n| stats count by host, ContainerName, Status\n| append [search index=perfmon source=\"Perfmon:Container\" counter=\"% Processor Time\"\n  | stats avg(Value) as AvgCPU max(Value) as MaxCPU by host, instance]","m":"Enable Hyper-V Compute Operational log for container lifecycle events. Configure Perfmon inputs for container-specific counters (CPU, memory, network). Track container crashes (unexpected stops), OOM kills, and resource exhaustion. Alert on container restart loops and CPU throttling. Integrate with Docker/containerd logs for application-level visibility.","z":"Table (container status), Timechart (resource usage), Alert on crash loops."},{"i":"1.2.96","n":"DNS Server Zone Transfer Monitoring","c":"critical","f":"intermediate","v":"Zone transfers expose the entire DNS namespace to attackers. Unauthorized zone transfers enable reconnaissance and must be detected immediately.","t":"`Splunk_TA_windows`","d":"`sourcetype=WinEventLog:DNS Server` (EventID 6001, 6002), `sourcetype=MSAD:NT6:DNS`","q":"index=wineventlog source=\"WinEventLog:DNS Server\" EventCode IN (6001, 6002)\n| eval TransferType=case(EventCode=6001,\"AXFR_Sent\", EventCode=6002,\"IXFR_Sent\", 1=1,\"Other\")\n| table _time, host, Source_Network_Address, Zone, TransferType\n| lookup dns_authorized_transfer_partners Source_Network_Address OUTPUT authorized\n| where NOT authorized=\"yes\"","m":"Enable DNS Server Analytical logging. Track zone transfer events (AXFR/IXFR) and correlate with authorized secondary DNS servers via lookup table. Alert on zone transfers to unauthorized IP addresses. Monitor for AXFR queries from non-DNS-server IPs. This is a high-confidence indicator of DNS reconnaissance.","z":"Table (transfer details), Alert on unauthorized transfers, Geo map (requester IPs)."},{"i":"1.2.97","n":"Print Spooler Vulnerability Monitoring (PrintNightmare)","c":"critical","f":"intermediate","v":"Print Spooler vulnerabilities (CVE-2021-34527, CVE-2021-1675) enable remote code execution and privilege escalation. Continuous monitoring ensures patches hold and exploitation attempts are caught.","t":"`Splunk_TA_windows`","d":"`sourcetype=WinEventLog:Microsoft-Windows-PrintService/Operational`, `sourcetype=WinEventLog:Microsoft-Windows-Sysmon/Operational`","q":"index=wineventlog ((source=\"WinEventLog:Microsoft-Windows-PrintService/Operational\" EventCode IN (316, 808, 811))\n  OR (EventCode=11 TargetFilename=\"*\\\\spool\\\\drivers\\\\*\"))\n| eval Indicator=case(EventCode=316,\"Driver_Install\", EventCode=808,\"RestrictDriverInstallation\", EventCode=11,\"Driver_File_Drop\", 1=1,\"Other\")\n| table _time, host, Indicator, UserName, DriverName, TargetFilename\n| sort -_time","m":"Audit Print Service Operational log for driver installations (316), and Sysmon for DLL drops into spool\\drivers directory (EventCode 11). On non-print servers, the Print Spooler service should be disabled \u2014 alert if running. On print servers, monitor for unsigned driver installations and remote driver additions. Alert on any spoolsv.exe spawning cmd.exe or powershell.exe.","z":"Table (events), Single value (spooler running on non-print servers), Alert on exploitation indicators."},{"i":"1.2.98","n":"NPS / RADIUS Authentication Monitoring","c":"medium","f":"intermediate","v":"Network Policy Server handles VPN, Wi-Fi, and 802.1X authentication. Monitoring NPS detects brute-force attacks, misconfigured policies, and unauthorized network access.","t":"`Splunk_TA_windows`","d":"`sourcetype=WinEventLog:Security` (EventCode 6272, 6273, 6274, 6278)","q":"index=wineventlog EventCode IN (6272, 6273, 6274)\n| eval Result=case(EventCode=6272,\"Access_Granted\", EventCode=6273,\"Access_Denied\", EventCode=6274,\"Discarded\", 1=1,\"Other\")\n| stats count by Result, UserName, CallingStationID, NASIPAddress, AuthenticationProvider\n| where Result=\"Access_Denied\"\n| sort -count","m":"NPS logs authentication events to the Security log. Track granted (6272), denied (6273), and discarded (6274) requests. Alert on high denial rates from specific users (brute-force) or NAS devices (misconfiguration). Monitor for authentication attempts using disabled accounts or from unknown calling station IDs. Correlate with VPN gateway logs.","z":"Pie chart (grant vs deny ratio), Table (denied requests), Timechart (auth attempts by hour)."},{"i":"1.2.99","n":"MSMQ Queue Depth Monitoring","c":"high","f":"intermediate","v":"Message queue buildup indicates application processing failures. Monitoring queue depth prevents message loss and detects downstream system outages.","t":"`Splunk_TA_windows`","d":"`sourcetype=Perfmon:MSMQ`","q":"index=perfmon source=\"Perfmon:MSMQ Service\" counter=\"Total Messages in all Queues\"\n| timechart span=5m avg(Value) as AvgQueueDepth by host\n| foreach * [eval <<FIELD>>=round('<<FIELD>>', 0)]","m":"Configure Perfmon input for MSMQ Service counters: Total Messages in all Queues, Total Bytes in all Queues, Sessions. Also monitor individual queue counters via `MSMQ Queue` object. Alert when queue depth exceeds baseline (messages accumulating). Monitor journal queue size for message delivery confirmations. Track dead-letter queue growth for undeliverable messages.","z":"Timechart (queue depth trend), Single value (current depth), Alert on queue growth exceeding threshold."},{"i":"1.2.100","n":"PKI / Certificate Authority Health","c":"critical","f":"intermediate","v":"An enterprise CA issues certificates for authentication, encryption, and code signing. CA failures break SSO, VPN, Wi-Fi, and TLS across the organization.","t":"`Splunk_TA_windows`","d":"`sourcetype=WinEventLog:Security` (EventCode 4886, 4887, 4888), `sourcetype=WinEventLog:Application`","q":"index=wineventlog EventCode IN (4886, 4887, 4888, 4890, 4891, 4893)\n| eval Action=case(EventCode=4886,\"CertRequest_Received\", EventCode=4887,\"CertRequest_Approved\", EventCode=4888,\"CertRequest_Denied\", EventCode=4890,\"CA_Settings_Changed\", EventCode=4891,\"CA_Config_Changed\", EventCode=4893,\"CA_Archived_Key\", 1=1,\"Other\")\n| stats count by Action, host, SubjectUserName, RequesterName\n| sort -count","m":"Enable CA-specific audit events via certsrv MMC. Monitor certificate request lifecycle: received (4886), approved (4887), denied (4888). Alert on CA configuration changes (4890/4891) and key archival (4893). Track CRL publishing failures in Application log. Monitor CA certificate expiration (alert 90/60/30 days before). Detect ESC1-ESC8 ADCS attack patterns (misconfigurations in certificate templates).","z":"Timechart (cert requests), Table (CA changes), Alert on config changes and template modifications."},{"i":"1.2.101","n":"File Share Access Auditing (SMB)","c":"medium","f":"intermediate","v":"File share access auditing detects unauthorized data access, lateral movement via mapped drives, and ransomware encrypting network shares.","t":"`Splunk_TA_windows`","d":"`sourcetype=WinEventLog:Security` (EventCode 5140, 5145)","q":"index=wineventlog EventCode IN (5140, 5145)\n| eval AccessType=case(EventCode=5140,\"Share_Access\", EventCode=5145,\"File_Access\", 1=1,\"Other\")\n| stats count dc(RelativeTargetName) as UniqueFiles by SubjectUserName, IpAddress, ShareName, AccessType\n| where count>100 OR UniqueFiles>50\n| sort -count","m":"Enable Audit File Share and Audit Detailed File Share via Advanced Audit Policy. EventCode 5140 logs share-level access; 5145 logs individual file access (high volume \u2014 use targeted auditing). Alert on mass file access patterns (ransomware indicator), access from unusual IPs, and access to sensitive shares outside business hours. Use SACL on sensitive folders for granular auditing.","z":"Timechart (access volume), Table (top users/shares), Alert on mass access patterns."},{"i":"1.2.102","n":"Software Restriction / AppLocker Bypass Detection","c":"critical","f":"intermediate","v":"Application whitelisting is a primary defense against malware. Detecting bypass attempts reveals both sophisticated attackers and policy gaps.","t":"`Splunk_TA_windows`","d":"`sourcetype=WinEventLog:Microsoft-Windows-AppLocker/EXE and DLL`, `sourcetype=WinEventLog:Microsoft-Windows-AppLocker/MSI and Script`","q":"index=wineventlog source=\"WinEventLog:Microsoft-Windows-AppLocker*\" EventCode IN (8004, 8007, 8022, 8025)\n| eval BlockType=case(EventCode=8004,\"EXE_Blocked\", EventCode=8007,\"Script_Blocked\", EventCode=8022,\"MSI_Blocked\", EventCode=8025,\"DLL_Blocked\", 1=1,\"Other\")\n| stats count by host, UserName, BlockType, RuleName, FilePath\n| sort -count","m":"Collect all four AppLocker log channels (EXE/DLL, MSI/Script, Packaged app, Script). Track blocked executions (8004/8007/8022/8025) and audit-mode warnings (8003/8006). Alert on repeated blocks from same user (attempted bypass), blocks in admin paths, and execution of known LOLBins that bypass default rules (mshta.exe, regsvr32.exe, msbuild.exe). Correlate with Sysmon for parent process context.","z":"Bar chart (blocks by type), Table (blocked files), Timechart (block trends)."},{"i":"1.2.103","n":"Terminal Services / RDP Session Tracking","c":"medium","f":"intermediate","v":"RDP is a primary lateral movement vector. Complete session tracking from logon to logoff enables detection of compromised credentials and unauthorized access.","t":"`Splunk_TA_windows`","d":"`sourcetype=WinEventLog:Microsoft-Windows-TerminalServices-LocalSessionManager/Operational`, `sourcetype=WinEventLog:Security`","q":"index=wineventlog source=\"WinEventLog:Microsoft-Windows-TerminalServices-LocalSessionManager/Operational\" EventCode IN (21, 23, 24, 25)\n| eval Action=case(EventCode=21,\"Logon\", EventCode=23,\"Logoff\", EventCode=24,\"Disconnect\", EventCode=25,\"Reconnect\", 1=1,\"Other\")\n| eval src_ip=if(isnotnull(Address), Address, \"local\")\n| stats earliest(_time) as SessionStart latest(_time) as SessionEnd values(Action) as Actions by host, User, SessionID, src_ip\n| eval Duration=round((SessionEnd-SessionStart)/60,1)","m":"Collect TerminalServices-LocalSessionManager/Operational log for session lifecycle events. Track logon (21), logoff (23), disconnect (24), reconnect (25). Correlate with Security log 4624 Type 10 for source IP. Alert on RDP to servers from non-admin workstations, sessions during off-hours, and multiple concurrent sessions from different IPs for same user.","z":"Timeline (sessions), Table (session details), Alert on anomalous patterns."},{"i":"1.2.104","n":"Disk Latency and I/O Performance","c":"high","f":"intermediate","v":"High disk latency directly impacts application performance and user experience. Proactive monitoring prevents performance degradation and identifies failing storage.","t":"`Splunk_TA_windows`","d":"`sourcetype=Perfmon:LogicalDisk`","q":"index=perfmon source=\"Perfmon:LogicalDisk\" counter IN (\"Avg. Disk sec/Read\", \"Avg. Disk sec/Write\", \"Current Disk Queue Length\")\n| eval latency_ms=round(Value*1000, 2)\n| stats avg(latency_ms) as AvgLatency max(latency_ms) as MaxLatency by host, instance, counter\n| where AvgLatency>20 OR MaxLatency>100\n| sort -MaxLatency","m":"Configure Perfmon inputs for LogicalDisk counters: Avg. Disk sec/Read, Avg. Disk sec/Write, Current Disk Queue Length, Disk Transfers/sec. Thresholds: <10ms normal, 10-20ms degraded, >20ms poor, >50ms critical. Alert on sustained latency above 20ms. Correlate with application response times and IOPS counters. Track latency trends for capacity planning and storage migration decisions.","z":"Timechart (latency trend), Gauge (current latency), Table (high-latency volumes)."},{"i":"1.2.105","n":"Windows Defender Exclusion Monitoring","c":"critical","f":"intermediate","v":"Attackers add Defender exclusions to hide malware. Monitoring exclusion changes detects evasion techniques and ensures antivirus coverage remains complete.","t":"`Splunk_TA_windows`","d":"`sourcetype=WinEventLog:Microsoft-Windows-Windows Defender/Operational` (EventID 5007)","q":"index=wineventlog source=\"WinEventLog:Microsoft-Windows-Windows Defender/Operational\" EventCode=5007\n| where match(New_Value, \"(?i)exclusions\")\n| rex field=New_Value \"Exclusions\\\\\\\\(?<ExclusionType>[^\\\\\\\\]+)\\\\\\\\(?<ExclusionValue>.+)\"\n| table _time, host, ExclusionType, ExclusionValue, Old_Value, New_Value\n| sort -_time","m":"Monitor Defender configuration changes (EventID 5007) and filter for exclusion modifications. Track path, extension, and process exclusions. Alert on any exclusion added outside of change management, especially for temp directories, user profiles, or common malware paths. Maintain a whitelist of approved exclusions and alert on deviations. Critical for detecting MITRE ATT&CK T1562.001 (Impair Defenses).","z":"Table (exclusion changes), Alert on unauthorized exclusions, Trend chart."},{"i":"1.2.106","n":"Local Administrator Group Membership Changes","c":"critical","f":"intermediate","v":"Local admin privileges enable credential theft, persistence, and lateral movement. Monitoring local admin group changes detects privilege escalation attacks.","t":"`Splunk_TA_windows`","d":"`sourcetype=WinEventLog:Security` (EventCode 4732, 4733)","q":"index=wineventlog EventCode IN (4732, 4733) TargetUserName=\"Administrators\"\n| eval Action=case(EventCode=4732,\"Member_Added\", EventCode=4733,\"Member_Removed\", 1=1,\"Other\")\n| table _time, host, Action, MemberName, MemberSid, SubjectUserName, SubjectDomainName\n| sort -_time","m":"Enable Audit Security Group Management. Track additions (4732) and removals (4733) from the local Administrators group. Alert on any additions, especially by non-domain-admin accounts. Monitor for patterns: add user \u2192 perform action \u2192 remove user (cleanup). Correlate with LAPS password rotations and PAM solutions. On servers, local admin changes should be extremely rare.","z":"Table (membership changes), Alert on all additions, Trend chart."},{"i":"1.2.107","n":"DFS Replication Health Monitoring","c":"high","f":"advanced","v":"DFS-R synchronizes SYSVOL and shared folders across domain controllers and file servers. Replication failures cause inconsistent GPOs and stale data.","t":"`Splunk_TA_windows`","d":"`sourcetype=WinEventLog:DFS Replication`","q":"index=wineventlog source=\"WinEventLog:DFS Replication\" EventCode IN (4012, 4302, 4304, 5002, 5008, 5014)\n| eval Severity=case(EventCode=4012,\"DFSR_Stopped\", EventCode=4302,\"Staging_Quota_Exceeded\", EventCode=4304,\"Staging_Cleanup_Failed\", EventCode=5002,\"Unexpected_Shutdown\", EventCode=5008,\"Auto_Recovery_Failed\", EventCode=5014,\"USN_Journal_Wrap\", 1=1,\"Warning\")\n| stats count by host, Severity, EventCode\n| sort -count","m":"Monitor DFS Replication event log for critical events. EventCode 4012 (DFSR stopped) and 5014 (USN journal wrap) require immediate attention \u2014 USN journal wrap can cause full resync. Track staging quota events (4302) to prevent replication stalls. Monitor SYSVOL replication specifically on domain controllers. Alert on replication backlog exceeding threshold via WMI/PowerShell scripted input collecting DFSR WMI counters.","z":"Table (replication errors), Timechart (error trend), Alert on critical events."},{"i":"1.2.108","n":"Kerberos Constrained Delegation Abuse","c":"critical","f":"advanced","v":"Kerberos delegation allows services to impersonate users. Misconfigured or compromised delegation targets enable privilege escalation to domain admin.","t":"`Splunk_TA_windows`","d":"`sourcetype=WinEventLog:Security` (EventCode 4769, 5136)","q":"index=wineventlog EventCode=4769 TransitionedServices!=\"\"\n| eval is_suspicious=if(match(ServiceName, \"(?i)(krbtgt|ldap/)\"), \"High_Risk\", \"Normal\")\n| stats count by ServiceName, TargetUserName, IpAddress, TransitionedServices, is_suspicious\n| where is_suspicious=\"High_Risk\" OR count>50\n| sort -count","m":"Monitor TGS requests (4769) where TransitionedServices is populated (indicates S4U2Proxy delegation). Alert on delegation to sensitive services (krbtgt, LDAP, CIFS on DCs). Track AD object modifications (5136) that change msDS-AllowedToDelegateTo attribute \u2014 indicates delegation configuration changes. Detect resource-based constrained delegation attacks by monitoring msDS-AllowedToActOnBehalfOfOtherIdentity attribute changes. MITRE ATT&CK T1550.003.","z":"Table (delegation events), Alert on sensitive service delegation, Network diagram (delegation paths)."},{"i":"1.2.109","n":"Windows Time Service (W32Time) Drift","c":"high","f":"advanced","v":"Kerberos authentication fails when clock skew exceeds 5 minutes. Time drift breaks authentication, log correlation, and forensic timelines.","t":"`Splunk_TA_windows`","d":"`sourcetype=WinEventLog:System` (Source=Microsoft-Windows-Time-Service)","q":"index=wineventlog source=\"WinEventLog:System\" SourceName=\"Microsoft-Windows-Time-Service\" EventCode IN (134, 142, 129)\n| eval Issue=case(EventCode=134,\"Time_Provider_Error\", EventCode=142,\"Time_Skew_Too_Large\", EventCode=129,\"NTP_Unreachable\", 1=1,\"Warning\")\n| stats count latest(_time) as LastSeen by host, Issue, EventCode\n| sort -count","m":"Monitor W32Time events for time provider errors (134), skew warnings (142), and NTP unreachable (129). On DCs, the PDC Emulator must sync to an external NTP source \u2014 all other DCs sync to the domain hierarchy. Alert on any DC time skew >2 minutes. Monitor w32tm /query /status output via scripted input for continuous drift tracking. Time-critical for Kerberos (5-min max skew) and forensic log correlation.","z":"Timechart (time offset), Table (time errors), Alert on >2min drift."},{"i":"1.2.110","n":"PowerShell Constrained Language Mode Bypass","c":"critical","f":"advanced","v":"Constrained Language Mode limits PowerShell attack surface. Detecting bypasses reveals attackers escalating from restricted to full-language mode for malware execution.","t":"`Splunk_TA_windows`","d":"`sourcetype=WinEventLog:Microsoft-Windows-PowerShell/Operational` (EventCode 4104), `sourcetype=WinEventLog:Windows PowerShell`","q":"index=wineventlog EventCode=4104\n| where match(ScriptBlockText, \"(?i)(FullLanguage|LanguageMode|Add-Type.*DllImport|System\\.Management\\.Automation\\.LanguageMode)\")\n| table _time, host, UserName, ScriptBlockText, Path\n| sort -_time","m":"Enable PowerShell Script Block Logging (EventCode 4104) and Module Logging. Search for scripts that attempt to change LanguageMode, use reflection to bypass CLM, or reference FullLanguage mode. Alert on Add-Type with DllImport (P/Invoke) in constrained environments \u2014 this is a common CLM bypass. Correlate with AppLocker and WDAC logs for defense-in-depth monitoring.","z":"Table (bypass attempts), Alert on detection, Single value (count)."},{"i":"1.2.111","n":"Windows Firewall Rule Tampering","c":"critical","f":"intermediate","v":"Attackers disable or modify firewall rules to enable lateral movement, C2 communication, and data exfiltration. Rule changes outside maintenance windows indicate compromise.","t":"`Splunk_TA_windows`","d":"`sourcetype=WinEventLog:Microsoft-Windows-Windows Firewall With Advanced Security/Firewall` (EventCode 2004, 2005, 2006, 2033)","q":"index=wineventlog source=\"WinEventLog:Microsoft-Windows-Windows Firewall With Advanced Security/Firewall\" EventCode IN (2004, 2005, 2006, 2033)\n| eval Action=case(EventCode=2004,\"Rule_Added\", EventCode=2005,\"Rule_Modified\", EventCode=2006,\"Rule_Deleted\", EventCode=2033,\"All_Rules_Deleted\", 1=1,\"Other\")\n| table _time, host, Action, RuleName, ApplicationPath, Direction, Protocol, LocalPort, RemotePort, ModifyingUser\n| sort -_time","m":"Collect Windows Firewall With Advanced Security log. Track rule additions (2004), modifications (2005), deletions (2006), and bulk deletion (2033 \u2014 extremely suspicious). Alert on: allow-inbound rules for unusual ports, rules permitting all traffic, rules created by non-admin processes, and any rule changes on servers outside change windows. Correlate with process creation to identify the modifying application.","z":"Table (rule changes), Timeline (change frequency), Alert on suspicious modifications."},{"i":"1.2.112","n":"BITS Transfer Abuse Detection","c":"high","f":"intermediate","v":"Background Intelligent Transfer Service (BITS) is abused by malware for stealthy downloads and persistence. Monitoring BITS jobs detects LOLBin-based attacks.","t":"`Splunk_TA_windows`","d":"`sourcetype=WinEventLog:Microsoft-Windows-Bits-Client/Operational`","q":"index=wineventlog source=\"WinEventLog:Microsoft-Windows-Bits-Client/Operational\" EventCode IN (3, 4, 59, 60, 61)\n| eval Status=case(EventCode=3,\"Transfer_Complete\", EventCode=4,\"Transfer_Cancelled\", EventCode=59,\"Job_Created\", EventCode=60,\"Job_Modified\", EventCode=61,\"Job_Transferred\", 1=1,\"Other\")\n| table _time, host, User, jobTitle, url, fileList, Status, bytesTransferred\n| where NOT match(url, \"(?i)(windowsupdate|microsoft\\.com|msedge)\")\n| sort -_time","m":"Enable BITS Client Operational logging. Track job creation (59), modification (60), and completion (3/61). Filter out legitimate BITS usage (Windows Update, Edge updates). Alert on BITS jobs downloading from unusual URLs, jobs created by unexpected processes (not svchost or system), and BITS persistence via /SetNotifyCmdLine. MITRE ATT&CK T1197.","z":"Table (BITS jobs), Timechart (transfer volume), Alert on non-standard URLs."},{"i":"1.2.113","n":"COM Object Hijacking Detection","c":"high","f":"advanced","v":"COM hijacking replaces legitimate COM objects with malicious ones for persistence and privilege escalation. It's a stealthy technique that survives reboots.","t":"`Splunk_TA_windows`","d":"`sourcetype=WinEventLog:Microsoft-Windows-Sysmon/Operational` (EventCode 13)","q":"index=wineventlog EventCode=13 TargetObject=\"*\\\\Classes\\\\CLSID\\\\*\\\\InprocServer32*\"\n| where NOT match(Image, \"(?i)(msiexec|svchost|TiWorker|TrustedInstaller|DismHost)\")\n| table _time, host, User, Image, TargetObject, Details\n| rex field=TargetObject \"CLSID\\\\\\\\(?<CLSID>[^\\\\\\\\]+)\"\n| sort -_time","m":"Monitor Sysmon registry value set events (EventCode 13) targeting CLSID InprocServer32 and LocalServer32 keys in HKCU and HKLM. Filter out legitimate installers (msiexec, TrustedInstaller). Alert on modifications pointing to unusual DLL paths (temp directories, user profiles, AppData). Maintain baseline of known-good CLSID registrations. MITRE ATT&CK T1546.015.","z":"Table (registry changes), Alert on suspicious CLSID modifications."},{"i":"1.2.114","n":"LSASS Memory Protection Monitoring","c":"critical","f":"advanced","v":"LSASS contains credentials in memory. Monitoring LSASS access attempts and protection status detects credential dumping tools like Mimikatz.","t":"`Splunk_TA_windows`","d":"`sourcetype=WinEventLog:Microsoft-Windows-Sysmon/Operational` (EventCode 10), `sourcetype=WinEventLog:Security`","q":"index=wineventlog EventCode=10 TargetImage=\"*\\\\lsass.exe\"\n| where NOT match(SourceImage, \"(?i)(csrss|services|svchost|wininit|MsMpEng|MsSense|CrowdStrike|SentinelAgent)\")\n| eval GrantedAccess_hex=GrantedAccess\n| table _time, host, SourceImage, SourceUser, GrantedAccess_hex, CallTrace\n| where match(GrantedAccess_hex, \"0x1010|0x1FFFFF|0x143A\")\n| sort -_time","m":"Sysmon EventCode 10 (ProcessAccess) targeting lsass.exe. Filter legitimate AV/EDR processes. Focus on suspicious access masks: 0x1010 (PROCESS_QUERY_LIMITED_INFORMATION + PROCESS_VM_READ), 0x1FFFFF (PROCESS_ALL_ACCESS), 0x143A (used by Mimikatz sekurlsa). Enable RunAsPPL for LSASS protection and monitor for its status. Alert on any non-whitelisted LSASS access. MITRE ATT&CK T1003.001.","z":"Table (access events), Alert on suspicious access masks, Single value (LSASS PPL status)."},{"i":"1.2.115","n":"Logon Session Anomalies (Type 3 / Network Logon)","c":"high","f":"intermediate","v":"Network logons (Type 3) from unexpected sources indicate lateral movement with stolen credentials. Baselining normal patterns reveals compromised accounts.","t":"`Splunk_TA_windows`","d":"`sourcetype=WinEventLog:Security` (EventCode 4624)","q":"index=wineventlog EventCode=4624 Logon_Type=3\n| eval src=coalesce(Source_Network_Address, IpAddress, \"unknown\")\n| stats dc(host) as TargetCount values(host) as Targets count by TargetUserName, src\n| where TargetCount>5\n| sort -TargetCount","m":"Monitor Type 3 (Network) logons across all systems. Build baseline of normal logon patterns: which accounts log into which systems from where. Alert on accounts that suddenly access many more systems than usual (lateral movement), network logons from unusual subnets, and logons using service accounts from non-service IPs. Exclude machine accounts (ending in $) for noise reduction. Combine with EventCode 4648 (explicit credentials).","z":"Network diagram (account-to-host), Timechart (logon volume), Alert on anomalous spread."},{"i":"1.2.116","n":"WMI Persistence Detection","c":"critical","f":"advanced","v":"WMI event subscriptions provide fileless persistence that survives reboots. Detecting WMI persistence reveals advanced persistent threats.","t":"`Splunk_TA_windows`","d":"`sourcetype=WinEventLog:Microsoft-Windows-Sysmon/Operational` (EventCode 19, 20, 21)","q":"index=wineventlog EventCode IN (19, 20, 21)\n| eval WMIType=case(EventCode=19,\"FilterCreated\", EventCode=20,\"ConsumerCreated\", EventCode=21,\"BindingCreated\", 1=1,\"Other\")\n| table _time, host, User, WMIType, EventNamespace, Name, Query, Destination, Consumer\n| where NOT match(Name, \"(?i)(BVTFilter|TSLogonFilter|SCM Event)\")\n| sort -_time","m":"Sysmon EventCodes 19/20/21 track WMI event filter, consumer, and binding creation. Any new WMI subscription (especially CommandLineEventConsumer or ActiveScriptEventConsumer) is suspicious. Filter out known-good subscriptions (BVTFilter, TSLogonFilter). Alert on all new subscriptions and investigate the consumer action. Correlate EventCode 21 (binding) \u2014 a complete subscription requires filter + consumer + binding. MITRE ATT&CK T1546.003.","z":"Table (WMI subscriptions), Alert on creation, Timeline (events)."},{"i":"1.2.117","n":"NIC Teaming & Network Adapter Failures","c":"high","f":"advanced","v":"NIC teaming provides network redundancy for servers. Adapter failures reduce redundancy and can cause outages if the remaining NIC also fails.","t":"`Splunk_TA_windows`","d":"`sourcetype=WinEventLog:Microsoft-Windows-NlbMgr/Operational`, `sourcetype=WinEventLog:System`","q":"index=wineventlog source=\"WinEventLog:System\" SourceName IN (\"Microsoft-Windows-NDIS\", \"e1cexpress\", \"mlx4_bus\", \"vmxnet3ndis6\", \"Tcpip\")\n| eval Issue=case(match(Message, \"(?i)disconnect\"), \"Link_Down\", match(Message, \"(?i)reset\"), \"Adapter_Reset\", match(Message, \"(?i)error\"), \"Adapter_Error\", 1=1, \"Other\")\n| stats count latest(_time) as LastEvent by host, SourceName, Issue\n| sort -LastEvent","m":"Monitor System event log for network adapter events from NIC drivers (e1cexpress for Intel, mlx4_bus for Mellanox, vmxnet3ndis6 for VMware). Track link-down events, adapter resets, and errors. For NIC teams, monitor Microsoft-Windows-MsLbfoProvider events. Alert on: team degradation (standby adapter now active), both adapters down, and frequent adapter resets (hardware failure). Include Perfmon Network Interface counters for bandwidth and error monitoring.","z":"Table (adapter events), Status dashboard (team health), Alert on degradation."},{"i":"1.2.118","n":"ASR (Attack Surface Reduction) Rule Monitoring","c":"critical","f":"intermediate","v":"ASR rules block common attack techniques (Office macro code, credential theft, ransomware). Monitoring ASR ensures rules are enforced and detects blocked attacks.","t":"`Splunk_TA_windows`","d":"`sourcetype=WinEventLog:Microsoft-Windows-Windows Defender/Operational` (EventID 1121, 1122)","q":"index=wineventlog source=\"WinEventLog:Microsoft-Windows-Windows Defender/Operational\" EventCode IN (1121, 1122)\n| eval Mode=case(EventCode=1121,\"Blocked\", EventCode=1122,\"Audit\", 1=1,\"Other\")\n| lookup asr_rule_names ID as RuleId OUTPUT RuleName\n| stats count by host, RuleName, Mode, Path, ProcessName\n| sort -count","m":"Enable ASR rules in Block or Audit mode. EventCode 1121 (blocked) and 1122 (audit) log ASR triggers. Map rule GUIDs to names via lookup table (e.g., 75668C1F = \"Block Office from creating executable content\"). Track most-triggered rules for tuning. Alert on: high block counts (active attack), blocks suddenly stopping (rules disabled), and audit-mode triggers on sensitive rules that should be in block mode.","z":"Bar chart (blocks by rule), Timechart (block trends), Table (event details)."},{"i":"1.2.11

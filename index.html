rt days_to_expiry","m":"Deploy scripted input scanning all known endpoints (HTTPS, LDAPS, SMTPS, etc.) daily. Parse certificate metadata. Alert at 90/60/30/7 day thresholds with escalating severity. Maintain endpoint inventory for comprehensive coverage.","z":"Table (certs with expiry countdown), Single value (certs expiring within 30d), Status grid (cert \u00d7 expiry status), Bar chart (certs by expiry bucket)."},{"i":"10.8.2","n":"Certificate Issuance Audit","c":"high","f":"beginner","v":"Unauthorized certificate issuance from internal CAs can enable man-in-the-middle attacks. Audit trail supports compliance.","t":"CA server log forwarding","d":"CA audit logs (Microsoft AD CS, EJBCA, HashiCorp Vault PKI)","q":"index=pki sourcetype=\"adcs:audit\"\n| search EventCode=4887\n| table _time, RequesterName, CertificateTemplate, SerialNumber, SubjectCN\n| sort -_time","m":"Forward CA server audit logs to Splunk (Event ID 4887 for AD CS). Track all certificate issuance events. Alert on issuance from non-standard templates or by unauthorized requesters. Report on issuance volume and template usage.","z":"Table (issued certificates), Timeline (issuance events), Bar chart (by template), Line chart (issuance volume trend)."},{"i":"10.8.3","n":"Weak Cipher / Key Detection","c":"high","f":"beginner","v":"Certificates using weak algorithms (SHA-1, RSA <2048-bit) are vulnerable to attack. Detection ensures cryptographic standards compliance.","t":"Custom scripted input","d":"Certificate scan results","q":"index=certificates sourcetype=\"cert_inventory\"\n| where key_size < 2048 OR signature_algorithm LIKE \"%sha1%\" OR signature_algorithm LIKE \"%md5%\"\n| table cn, host, port, key_size, signature_algorithm, issuer","m":"Include key size and signature algorithm in certificate scans. Flag certificates using SHA-1, MD5, or RSA <2048-bit. Alert on new weak certificates. Track remediation progress as a compliance metric.","z":"Table (weak certificates), Pie chart (algorithm distribution), Single value (weak cert count), Bar chart (by weakness type)."},{"i":"10.8.4","n":"Certificate Revocation Tracking","c":"medium","f":"beginner","v":"Revocation activity indicates compromised or misused certificates. Tracking ensures revocations are processed and CRLs distributed.","t":"CA server logs","d":"CA audit logs (revocation events), CRL distribution point monitoring","q":"index=pki sourcetype=\"adcs:audit\" EventCode=4889\n| table _time, RequesterName, SerialNumber, RevokeReason, SubjectCN\n| sort -_time","m":"Forward CA revocation events (Event ID 4889). Monitor CRL publication and OCSP responder health. Alert on revocations for investigation. Track revocation reasons for security program improvement.","z":"Table (revoked certificates), Timeline (revocation events), Bar chart (revocation reasons)."},{"i":"10.8.5","n":"CT Log Monitoring","c":"high","f":"beginner","v":"Certificate Transparency logs reveal all publicly-issued certificates for your domains. Detects unauthorized issuance by rogue or compromised CAs.","t":"Custom API input (crt.sh, CT log APIs)","d":"Certificate Transparency log API","q":"index=certificates sourcetype=\"ct_log\"\n| search NOT issuer IN (\"DigiCert*\",\"Let's Encrypt*\",\"Sectigo*\")\n| table _time, cn, issuer, serial, not_before, not_after\n| sort -_time","m":"Poll CT log aggregators (crt.sh) for your domains daily. Maintain whitelist of approved issuers. Alert on certificates from unexpected CAs. Track issuance patterns for certificate lifecycle management.","z":"Table (CT log entries), Timeline (issuance events), Bar chart (certs by issuer), Single value (unauthorized issuances)."}]}]},{"i":11,"n":"Email & Collaboration","s":[{"i":"11.1","n":"Microsoft 365 / Exchange","u":[{"i":"11.1.1","n":"Mail Flow Health Monitoring","c":"critical","f":"intermediate","v":"Email is business-critical. Mail flow issues (queuing, NDRs) directly impact productivity and customer communication.","t":"`Splunk_TA_MS_O365`, Exchange message tracking","d":"Exchange message tracking logs, O365 message trace","q":"index=o365 sourcetype=\"ms:o365:messageTrace\"\n| timechart span=1h count by Status","m":"Ingest Exchange message tracking logs or O365 message trace via Management Activity API. Track delivery rates, queue lengths, and NDR volumes. Alert on delivery failures exceeding baseline. Monitor mail flow latency.","z":"Line chart (message volume by status), Single value (delivery success rate), Bar chart (top NDR reasons)."},{"i":"11.1.2","n":"Mailbox Audit Logging","c":"high","f":"beginner","v":"Tracks who accesses what mailboxes, including delegate and admin access. Essential for insider threat detection and compliance.","t":"`Splunk_TA_MS_O365`","d":"O365 unified audit log (ExchangeItem events)","q":"index=o365 sourcetype=\"ms:o365:management\" Workload=\"Exchange\" Operation IN (\"MailItemsAccessed\",\"Send\",\"SendAs\")\n| stats count by UserId, Operation, MailboxOwnerUPN\n| where UserId!=MailboxOwnerUPN","m":"Enable mailbox audit logging in Exchange Online. Ingest via O365 Management Activity API. Alert on non-owner access to sensitive mailboxes. Track delegate activity. Monitor SendAs events for potential impersonation.","z":"Table (non-owner mailbox access), Bar chart (access by user), Timeline (audit events)."},{"i":"11.1.3","n":"Exchange Online Protection Events","c":"high","f":"intermediate","v":"EOP filtering metrics show email threat landscape and security control effectiveness.","t":"`Splunk_TA_MS_O365`","d":"EOP message trace, threat protection status","q":"index=o365 sourcetype=\"ms:o365:messageTrace\"\n| eval threat_type=case(match(FilteringResult,\"Spam\"),\"Spam\", match(FilteringResult,\"Phish\"),\"Phishing\", match(FilteringResult,\"Malware\"),\"Malware\", 1=1,\"Clean\")\n| stats count by threat_type","m":"Ingest O365 message trace data. Classify messages by EOP verdict. Track filtering rates over time. Report on threat types and volumes. Alert on phishing/malware volume spikes.","z":"Pie chart (message classification), Line chart (threat volume trend), Bar chart (top blocked senders)."},{"i":"11.1.4","n":"Teams Usage Analytics","c":"medium","f":"beginner","v":"Teams adoption and quality metrics inform collaboration strategy and help identify user experience issues.","t":"`Splunk_TA_MS_O365`","d":"M365 Teams activity reports, Teams call quality data","q":"index=o365 sourcetype=\"ms:o365:management\" Workload=\"MicrosoftTeams\"\n| stats count by Operation\n| sort -count","m":"Ingest Teams activity reports via Graph API. Track meetings, messages, calls, and file sharing volumes. Monitor call quality metrics (jitter, packet loss). Report on adoption trends per department.","z":"Line chart (Teams activity trend), Bar chart (activity by type), Table (call quality issues)."},{"i":"11.1.5","n":"SharePoint/OneDrive Sharing Audit","c":"high","f":"beginner","v":"External sharing can expose sensitive data. Audit trail ensures data protection and compliance.","t":"`Splunk_TA_MS_O365`","d":"O365 audit log (SharingSet, AnonymousLinkCreated)","q":"index=o365 sourcetype=\"ms:o365:management\" Workload=\"SharePoint\" Operation IN (\"SharingSet\",\"AnonymousLinkCreated\",\"CompanyLinkCreated\")\n| where TargetUserOrGroupType=\"Guest\" OR Operation=\"AnonymousLinkCreated\"\n| table _time, UserId, Operation, ObjectId, TargetUserOrGroupName","m":"Ingest SharePoint/OneDrive audit events. Alert on external sharing (guest users, anonymous links). Track sharing activity per user. Flag sharing of sensitive files or sites. Report for data governance reviews.","z":"Table (external sharing events), Bar chart (sharing by user), Line chart (sharing trend), Pie chart (sharing type distribution)."},{"i":"11.1.6","n":"DLP Policy Events","c":"high","f":"beginner","v":"M365 DLP policy matches across email, Teams, SharePoint identify sensitive data exposure. Centralized tracking supports compliance.","t":"`Splunk_TA_MS_O365`","d":"O365 DLP logs","q":"index=o365 sourcetype=\"ms:o365:management\" Workload=\"Dlp\"\n| stats count by PolicyName, UserPrincipalName, SensitiveInfoType\n| sort -count","m":"Configure M365 DLP policies. Ingest DLP events. Track violations by policy, user, and data type. Alert on high-severity matches. Produce compliance reports for regulated data (PII, PCI, HIPAA).","z":"Bar chart (violations by policy), Table (top violators), Line chart (violation trend)."},{"i":"11.1.7","n":"Admin Activity Audit","c":"high","f":"beginner","v":"M365 admin actions (user creation, license changes, policy modifications) need audit trails for compliance and security.","t":"`Splunk_TA_MS_O365`","d":"O365 audit log (admin operations)","q":"index=o365 sourcetype=\"ms:o365:management\" RecordType=1\n| table _time, UserId, Operation, ObjectId, ResultStatus\n| sort -_time","m":"Ingest O365 admin audit log. Track admin operations by administrator. Alert on sensitive operations (user creation, role changes, policy modifications). Correlate with change management tickets.","z":"Table (admin activities), Timeline (admin events), Bar chart (actions by admin)."},{"i":"11.1.8","n":"Inbox Rule Monitoring","c":"critical","f":"beginner","v":"Malicious inbox rules (auto-forward to external, auto-delete) are a key post-compromise technique for data exfiltration.","t":"`Splunk_TA_MS_O365`","d":"O365 audit log (New-InboxRule, Set-InboxRule)","q":"index=o365 sourcetype=\"ms:o365:management\" Operation IN (\"New-InboxRule\",\"Set-InboxRule\")\n| spath output=forward Parameters{}.Value\n| search forward=\"*@*\" NOT forward=\"*@yourdomain.com\"\n| table _time, UserId, Operation, forward","m":"Monitor inbox rule creation events. Alert on rules that forward to external addresses, delete messages, or move to uncommon folders. These are high-confidence indicators of account compromise. Trigger immediate investigation.","z":"Table (suspicious inbox rules), Single value (external forwarding rules \u2014 target: 0), Timeline (rule creation events)."},{"i":"11.1.9","n":"Service Health Monitoring","c":"high","f":"intermediate","v":"M365 service incidents affect all users. Early awareness from API enables proactive communication and workaround planning.","t":"Custom API input (M365 Service Health API)","d":"M365 Service Health API","q":"index=m365 sourcetype=\"m365:servicehealth\"\n| where status!=\"ServiceOperational\"\n| table _time, service, status, title, classification","m":"Poll M365 Service Health API every 5 minutes. Alert on service degradations and incidents. Track incident duration and frequency. Correlate with internal ticket volumes to measure user impact.","z":"Status grid (service \u00d7 health), Table (active incidents), Timeline (incident history)."},{"i":"11.1.10","n":"License Utilization","c":"medium","f":"intermediate","v":"M365 license costs are significant. Tracking utilization identifies unused licenses for reallocation and cost savings.","t":"Custom API input (M365 Reports API)","d":"M365 license assignment and usage reports","q":"index=m365 sourcetype=\"m365:licenses\"\n| stats sum(assigned) as assigned, sum(consumed) as consumed by sku_name\n| eval utilization_pct=round(consumed/assigned*100,1)\n| table sku_name, assigned, consumed, utilization_pct","m":"Poll M365 license reports via Graph API weekly. Track assigned vs consumed licenses per SKU. Identify inactive users (no activity in 90 days with assigned license). Report on cost optimization opportunities.","z":"Table (license utilization), Gauge (% utilized per SKU), Bar chart (unused licenses by SKU)."}]},{"i":"11.2","n":"Google Workspace","u":[{"i":"11.2.1","n":"Admin Console Audit","c":"high","f":"beginner","v":"Admin actions in Google Workspace affect all users. Audit trail supports compliance and detects unauthorized changes.","t":"`Splunk_TA_GoogleWorkspace`","d":"Google Workspace Admin audit log","q":"index=gws sourcetype=\"gws:admin\" event_name IN (\"CREATE_USER\",\"DELETE_USER\",\"CHANGE_ADMIN_ROLE\")\n| table _time, actor.email, event_name, target_user","m":"Configure Google Workspace TA to ingest admin audit logs via Reports API. Track user management, policy changes, and configuration modifications. Alert on sensitive operations (role changes, 2FA disablement).","z":"Table (admin events), Timeline (admin activity), Bar chart (events by admin)."},{"i":"11.2.2","n":"Gmail Message Flow","c":"high","f":"beginner","v":"Email delivery monitoring and DLP enforcement protects sensitive data and ensures business communication reliability.","t":"`Splunk_TA_GoogleWorkspace`","d":"Gmail logs via BigQuery export or Reports API","q":"index=gws sourcetype=\"gws:gmail\"\n| stats count by message_info.disposition\n| eval pct=round(count/sum(count)*100,1)","m":"Ingest Gmail logs. Track message delivery rates, spam filtering effectiveness, and DLP triggers. Alert on delivery failures or increased spam rates. Report on email security posture.","z":"Pie chart (message disposition), Line chart (message volume), Table (DLP triggers)."},{"i":"11.2.3","n":"Drive Sharing Anomalies","c":"high","f":"beginner","v":"Unusual file sharing patterns may indicate data exfiltration or accidental exposure of sensitive documents.","t":"`Splunk_TA_GoogleWorkspace`","d":"Google Drive audit log","q":"index=gws sourcetype=\"gws:drive\" event_name=\"change_user_access\"\n| where new_value=\"people_with_link\" OR target_user_email NOT LIKE \"%@yourdomain.com%\"\n| table _time, actor.email, doc_title, target_user_email, new_value","m":"Ingest Drive audit logs. Alert on external sharing, \"anyone with link\" sharing, and bulk sharing events. Track sharing patterns per user. Flag sharing of sensitive folders or documents.","z":"Table (sharing events), Bar chart (external sharing by user), Line chart (sharing activity trend)."},{"i":"11.2.4","n":"Login Anomaly Detection","c":"critical","f":"intermediate","v":"Suspicious login activity (new device, unusual location, failed MFA) indicates potential account compromise.","t":"`Splunk_TA_GoogleWorkspace`","d":"Google Workspace login audit log","q":"index=gws sourcetype=\"gws:login\" event_name=\"login_failure\"\n| stats count by actor.email, ip_address\n| where count > 5","m":"Ingest login audit logs. Track failed logins, new device registrations, and unusual locations. Alert on multiple failures, suspicious activity events, and login from new countries. Correlate with Google's built-in risk signals.","z":"Table (suspicious logins), Geo map (login locations), Line chart (failure rate), Bar chart (failures by user)."},{"i":"11.2.5","n":"Meet Quality Monitoring","c":"medium","f":"beginner","v":"Poor meeting quality impacts productivity and user satisfaction. Monitoring enables network/infrastructure optimization.","t":"`Splunk_TA_GoogleWorkspace`","d":"Google Meet quality logs","q":"index=gws sourcetype=\"gws:meet\"\n| where video_recv_jitter_ms > 30 OR audio_recv_jitter_ms > 30\n| stats count, avg(video_recv_jitter_ms) as avg_jitter by organizer_email, meeting_code","m":"Ingest Meet quality data. Track jitter, latency, and packet loss per meeting. Alert on recurring poor quality for specific users or locations. Correlate with network performance data.","z":"Table (poor quality meetings), Line chart (quality metrics trend), Bar chart (issues by location)."},{"i":"11.2.6","n":"Third-Party App Access","c":"high","f":"beginner","v":"OAuth app grants to third-party applications create data access risks. Monitoring enables governance and risk assessment.","t":"`Splunk_TA_GoogleWorkspace`","d":"Google Workspace token audit log","q":"index=gws sourcetype=\"gws:token\" event_name=\"authorize\"\n| stats dc(actor.email) as unique_users by app_name, scope\n| sort -unique_users","m":"Ingest token audit logs. Track OAuth grants by application and scope. Identify high-risk scopes (full Drive access, Gmail read). Alert on new third-party apps accessing sensitive scopes. Report for governance review.","z":"Table (third-party apps with scope), Bar chart (apps by user count), Pie chart (scope distribution)."}]},{"i":"11.3","n":"Unified Communications","u":[{"i":"11.3.1","n":"Call Quality Monitoring (MOS)","c":"high","f":"intermediate","v":"MOS scores directly measure voice quality experience. Degradation impacts business communication and customer service.","t":"Cisco UCM CDR/CMR, Webex API","d":"Call Detail Records (CDR), Call Management Records (CMR)","q":"index=voip sourcetype=\"cisco:ucm:cmr\"\n| where MOS < 3.5\n| stats count, avg(MOS) as avg_mos by origDeviceName, destDeviceName\n| sort avg_mos","m":"Ingest CDR/CMR from UCM or cloud UC platform. Parse MOS, jitter, latency, and packet loss. Alert when MOS drops below 3.5 (fair quality). Correlate with network metrics to identify root cause. Track per-site quality.","z":"Gauge (average MOS), Line chart (MOS trend), Table (poor quality calls), Heatmap (site \u00d7 quality)."},{"i":"11.3.2","n":"Call Volume Trending","c":"medium","f":"intermediate","v":"Call volume patterns support capacity planning and detect anomalies (toll fraud, system issues).","t":"UCM CDR input","d":"CDR records","q":"index=voip sourcetype=\"cisco:ucm:cdr\"\n| timechart span=1h count as calls\n| predict calls as predicted","m":"Ingest CDR data. Track call volumes by hour, day, site. Baseline normal patterns. Alert on significant drops (possible outage) or spikes (possible toll fraud). Report on peak hour utilization.","z":"Line chart (call volume with prediction), Bar chart (calls by site), Area chart (hourly distribution)."},{"i":"11.3.3","n":"VoIP Jitter/Latency/Packet Loss","c":"high","f":"beginner","v":"Transport quality metrics identify network issues affecting voice quality before users report problems.","t":"UCM CMR, RTCP data","d":"CMR records (jitter, latency, packet loss), RTCP reports","q":"index=voip sourcetype=\"cisco:ucm:cmr\"\n| where jitter > 30 OR latency > 150 OR packet_loss_pct > 1\n| stats count by origDeviceName, destDeviceName, jitter, latency, packet_loss_pct","m":"Parse transport quality metrics from CMR. Alert on jitter >30ms, latency >150ms, or packet loss >1%. Correlate with WAN/LAN performance metrics. Track per-site to identify network segments needing attention.","z":"Multi-metric chart (jitter, latency, packet loss), Table (calls with poor transport), Heatmap (site \u00d7 metric)."},{"i":"11.3.4","n":"Trunk Utilization","c":"high","f":"beginner","v":"Trunk capacity limits cause busy signals and missed calls. Monitoring prevents capacity-related service degradation.","t":"UCM CDR, gateway logs","d":"CDR records, gateway/trunk metrics","q":"index=voip sourcetype=\"cisco:ucm:cdr\"\n| timechart span=15m dc(globalCallID_callId) as concurrent_calls by trunk_group\n| where concurrent_calls > 20","m":"Track concurrent calls per trunk group from CDR data. Alert when utilization exceeds 80% of capacity. Monitor for trunk failures and failover events. Report on peak utilization for capacity planning.","z":"Line chart (trunk utilization), Gauge (% capacity per trunk), Table (trunk utilization summary)."},{"i":"11.3.5","n":"Conference Bridge Capacity","c":"medium","f":"beginner","v":"Conference bridge resource exhaustion prevents users from joining meetings. Monitoring ensures adequate capacity.","t":"Webex API, UCM conference bridge metrics","d":"Conference bridge utilization, Webex meeting data","q":"index=voip sourcetype=\"webex:meetings\"\n| timechart span=1h max(concurrent_participants) as max_participants\n| where max_participants > 500","m":"Track conference bridge resource utilization and concurrent participant counts. Alert when approaching capacity limits. Monitor meeting quality metrics at scale. Report on peak usage patterns for capacity planning.","z":"Line chart (concurrent participants), Single value (peak participants today), Bar chart (meetings by size)."},{"i":"11.3.6","n":"Toll Fraud Detection","c":"critical","f":"intermediate","v":"Toll fraud causes significant financial loss. International premium-rate calls from compromised systems can cost thousands per hour.","t":"UCM CDR analysis","d":"CDR records (called party number, duration, time of day)","q":"index=voip sourcetype=\"cisco:ucm:cdr\"\n| where match(calledPartyNumber,\"^011|^00\") AND duration > 60\n| stats count, sum(duration) as total_min by callingPartyNumber, calledPartyNumber\n| where count > 10\n| sort -total_min","m":"Monitor CDR for international calls, premium-rate numbers (900, 976), and calls outside business hours. Baseline normal international calling patterns. Alert on anomalous patterns. Block suspicious numbers in real-time.","z":"Table (suspicious calls), Bar chart (international calls by destination), Timeline (unusual calling activity), Geo map (call destinations)."},{"i":"11.3.7","n":"Phone Registration Status","c":"high","f":"beginner","v":"Mass phone de-registration indicates network or UCM issues affecting the entire communications infrastructure.","t":"UCM syslog, RISPORT API","d":"UCM device status, RISPORT real-time data","q":"index=voip sourcetype=\"cisco:ucm:syslog\"\n| search \"DeviceUnregistered\" OR \"StationDeregister\"\n| timechart span=5m count as deregistrations\n| where deregistrations > 10","m":"Poll UCM RISPORT API for device registration status or forward UCM syslog. Alert on mass de-registrations (>10 devices in 5 minutes). Track registration counts per site. Monitor SRST fallback activations.","z":"Single value (registered phones), Line chart (registration count trend), Table (recently de-registered devices)."},{"i":"11.3.8","n":"Webex Meeting Analytics","c":"medium","f":"beginner","v":"Meeting analytics support collaboration optimization, license management, and quality improvement initiatives.","t":"Webex API input","d":"Webex meeting/participant data via API","q":"index=webex sourcetype=\"webex:meetings\"\n| stats count as meetings, avg(participant_count) as avg_participants, avg(duration_min) as avg_duration by organizerEmail\n| sort -meetings","m":"Poll Webex API for meeting data. Track meeting counts, participants, duration, and quality. Report on adoption metrics per department. Identify power users and underutilized licenses.","z":"Bar chart (meetings by department), Line chart (meeting volume trend), Table (usage summary), Pie chart (meeting types)."}]}]},{"i":12,"n":"DevOps & CI/CD","s":[{"i":"12.1","n":"Source Control","u":[{"i":"12.1.1","n":"Commit Activity Trending","c":"medium","f":"beginner","v":"Commit velocity indicates team productivity and project health. Drops may signal blockers; spikes may precede release issues.","t":"GitHub webhook, custom API input","d":"Git webhook events (push), GitHub/GitLab API","q":"index=devops sourcetype=\"github:webhook\" event=\"push\"\n| timechart span=1d count as commits by repository","m":"Configure GitHub/GitLab webhooks to send push events to Splunk HEC. Parse repository, author, branch, and commit count. Track trends per team and repository. Report on developer activity metrics.","z":"Line chart (commits over time), Bar chart (commits by repo), Stacked area (commits by team)."},{"i":"12.1.2","n":"Branch Protection Bypasses","c":"critical","f":"intermediate","v":"Direct pushes to protected branches bypass code review, introducing unreviewed code to production. Detection ensures process compliance.","t":"GitHub audit log, GitLab API","d":"GitHub/GitLab audit log, push events to protected branches","q":"index=devops sourcetype=\"github:audit\" action=\"protected_branch.policy_override\"\n| table _time, actor, repo, branch, action","m":"Ingest GitHub/GitLab audit logs. Alert on any push to protected branches (main, release) without PR merge. Alert on branch protection rule changes. Correlate with deployment events.","z":"Table (bypass events), Timeline (protection violations), Single value (bypasses this month \u2014 target: 0)."},{"i":"12.1.3","n":"Pull Request Metrics","c":"medium","f":"beginner","v":"PR cycle time affects development velocity. Long review times indicate bottlenecks; abandoned PRs indicate scope or alignment issues.","t":"GitHub API input","d":"PR events (opened, reviewed, merged, closed)","q":"index=devops sourcetype=\"github:pull_request\" action=\"closed\" merged=\"true\"\n| eval cycle_hours=round((merged_at_epoch-created_at_epoch)/3600,1)\n| stats avg(cycle_hours) as avg_cycle, median(cycle_hours) as median_cycle by repository\n| sort -avg_cycle","m":"Ingest PR lifecycle events. Calculate open-to-merge time, review cycles, and abandonment rates. Track per repository and team. Report on engineering efficiency metrics. Identify bottleneck reviewers.","z":"Bar chart (avg cycle time by repo), Line chart (PR metrics trend), Table (PR summary), Histogram (cycle time distribution)."},{"i":"12.1.4","n":"Secret Exposure Detection","c":"critical","f":"beginner","v":"Secrets committed to source control are immediately compromised. Detection within minutes enables rapid rotation before exploitation.","t":"GitGuardian webhook, GitHub secret scanning","d":"Pre-commit hook results, GitGuardian/GitHub secret scanning alerts","q":"index=devops sourcetype=\"github:secret_scanning\" OR sourcetype=\"gitguardian:alert\"\n| table _time, repository, secret_type, file_path, author, status\n| sort -_time","m":"Enable GitHub secret scanning or deploy GitGuardian. Forward alerts to Splunk. Alert at critical priority on any secret detection. Track remediation time (rotation). Report on secret types and recurrence.","z":"Table (exposed secrets), Single value (unresolved secrets \u2014 target: 0), Bar chart (secrets by type), Timeline (detection events)."},{"i":"12.1.5","n":"Repository Access Audit","c":"high","f":"beginner","v":"Repository permission changes can expose source code to unauthorized users. Audit trail supports IP protection and compliance.","t":"GitHub audit log","d":"GitHub/GitLab audit log (permission events)","q":"index=devops sourcetype=\"github:audit\" action IN (\"repo.add_member\",\"repo.remove_member\",\"repo.update_member\")\n| table _time, actor, repo, user, permission, action","m":"Ingest organization audit log. Track member additions, removals, and permission changes. Alert on permission escalation to admin. Report on repository access patterns for periodic access review.","z":"Table (access changes), Timeline (permission events), Bar chart (changes by actor)."},{"i":"12.1.6","n":"Force Push Detection","c":"high","f":"intermediate","v":"Force pushes overwrite git history, potentially destroying code and audit trails. Detection ensures accountability.","t":"GitHub webhook","d":"Git push events (forced flag)","q":"index=devops sourcetype=\"github:webhook\" event=\"push\" forced=\"true\"\n| table _time, repository, ref, pusher, forced","m":"Parse force push flag from webhook events. Alert on any force push to shared branches. Whitelist expected force pushes (e.g., squash-merge workflows on feature branches). Track frequency per developer.","z":"Table (force push events), Timeline (force pushes), Single value (force pushes this week)."}]},{"i":"12.2","n":"CI/CD Pipelines","u":[{"i":"12.2.1","n":"Build Success Rate Trending","c":"high","f":"beginner","v":"Declining build success rates indicate code quality issues, flaky tests, or infrastructure problems. Trending drives improvement.","t":"Splunk App for Jenkins, webhook input","d":"CI/CD build results (Jenkins, GitHub Actions, GitLab CI)","q":"index=cicd sourcetype=\"jenkins:build\"\n| stats count(eval(result=\"SUCCESS\")) as success, count(eval(result=\"FAILURE\")) as failed, count as total by job_name\n| eval success_rate=round(success/total*100,1)\n| sort success_rate","m":"Ingest CI/CD build events via TA or webhook. Track success/failure rates per pipeline. Alert when success rate drops below threshold (e.g., <90%). Identify most-failing pipelines for developer attention.","z":"Bar chart (success rate by pipeline), Line chart (success rate trend), Table (failing builds), Single value (overall success rate)."},{"i":"12.2.2","n":"Build Duration Monitoring","c":"medium","f":"intermediate","v":"Increasing build times slow development velocity. Detection enables build optimization and infrastructure right-sizing.","t":"Splunk App for Jenkins, CI/CD metrics","d":"Build start/end timestamps","q":"index=cicd sourcetype=\"jenkins:build\" result=\"SUCCESS\"\n| eval duration_min=round(duration/60000,1)\n| timechart span=1d avg(duration_min) as avg_build_time by job_name","m":"Track build duration for all pipelines. Alert when duration exceeds historical average by >50%. Identify slow build steps. Correlate with infrastructure metrics (runner CPU, disk I/O) to find bottlenecks.","z":"Line chart (build duration trend), Bar chart (avg duration by pipeline), Table (slowest builds today)."},{"i":"12.2.3","n":"Deployment Frequency (DORA)","c":"medium","f":"beginner","v":"Deployment frequency is a key DORA metric indicating engineering capability maturity. Higher frequency correlates with better outcomes.","t":"Deployment event webhook","d":"Deployment events from CI/CD pipelines","q":"index=cicd sourcetype=\"deployment_event\" environment=\"production\"\n| timechart span=1w count as deployments by application","m":"Emit deployment events from CI/CD pipelines to Splunk HEC. Track production deployments per team/application per week. Calculate DORA deployment frequency category (daily, weekly, monthly). Report to engineering leadership.","z":"Line chart (deployment frequency trend), Bar chart (deployments by team), Single value (deployments this week)."},{"i":"12.2.4","n":"Lead Time for Changes (DORA)","c":"medium","f":"beginner","v":"Lead time measures the commit-to-production pipeline efficiency. Shorter lead times enable faster value delivery and incident response.","t":"Git + deployment correlation","d":"Git commit timestamps + production deployment timestamps","q":"index=cicd sourcetype=\"deployment_event\" environment=\"production\"\n| eval lead_time_hours=round((deploy_time_epoch-commit_time_epoch)/3600,1)\n| stats avg(lead_time_hours) as avg_lead_time, median(lead_time_hours) as median_lead_time by application","m":"Correlate commit timestamps with deployment events. Calculate time from first commit to production deployment. Track per application and team. Classify per DORA categories (under 1 hour, under 1 day, under 1 week, over 1 month).","z":"Bar chart (lead time by application), Line chart (lead time trend), Histogram (lead time distribution)."},{"i":"12.2.5","n":"Failed Deployment Tracking","c":"critical","f":"beginner","v":"Failed deployments cause service disruption. Rapid detection enables rollback decisions. Change failure rate is a DORA metric.","t":"Deployment event webhook","d":"Deployment events with status, rollback events","q":"index=cicd sourcetype=\"deployment_event\" status=\"failed\"\n| table _time, application, environment, version, deployer, error_message\n| sort -_time","m":"Track all deployment outcomes including failures and rollbacks. Alert immediately on production deployment failures. Calculate change failure rate (DORA metric). Correlate with application error rate to measure deployment impact.","z":"Table (failed deployments), Single value (change failure rate %), Line chart (failure rate trend), Timeline (deployment events)."},{"i":"12.2.6","n":"Pipeline Queue Time","c":"medium","f":"beginner","v":"Long queue times indicate insufficient CI/CD runner capacity, slowing developer feedback loops and delivery velocity.","t":"Splunk App for Jenkins, CI/CD system metrics","d":"CI/CD queue metrics (time in queue, pending jobs)","q":"index=cicd sourcetype=\"jenkins:queue\"\n| timechart span=15m avg(wait_time_sec) as avg_wait, max(queue_length) as max_queue\n| where avg_wait > 300","m":"Track job queue wait times and queue lengths. Alert when average wait exceeds 5 minutes. Monitor runner/agent utilization. Report on peak hours to guide scaling decisions.","z":"Line chart (queue time trend), Bar chart (queue time by pipeline), Single value (current queue length)."},{"i":"12.2.7","n":"Test Coverage Trending","c":"medium","f":"beginner","v":"Declining test coverage increases risk of undetected bugs. Trending ensures quality standards are maintained.","t":"Custom test report input","d":"Test result reports (JUnit XML, coverage reports)","q":"index=cicd sourcetype=\"test_coverage\"\n| timechart span=1d latest(coverage_pct) as coverage by project\n| where coverage < 80","m":"Parse test coverage reports from CI/CD pipelines. Send to Splunk via HEC. Track coverage per project. Alert when coverage drops below minimum (e.g., <80%). Block merges when coverage decreases (enforce in CI).","z":"Line chart (coverage trend per project), Bar chart (coverage by project), Single value (avg coverage %)."},{"i":"12.2.8","n":"Security Scan Results in Pipeline","c":"critical","f":"intermediate","v":"SAST/DAST/SCA findings in CI/CD pipelines catch vulnerabilities before they reach production. Tracking ensures security gates work.","t":"Custom scan result input","d":"SAST (SonarQube, Checkmarx), DAST (ZAP, Burp), SCA (Snyk, Dependabot) results","q":"index=cicd sourcetype=\"security_scan\"\n| stats count by severity, scan_type, project\n| where severity IN (\"Critical\",\"High\")\n| sort -count","m":"Ingest security scan results from CI/CD pipelines. Track findings by severity, type, and project. Alert on critical findings blocking deployment. Report on vulnerability introduction rate and fix rate.","z":"Bar chart (findings by severity), Table (critical findings), Line chart (findings trend), Stacked bar (by scan type)."}]},{"i":"12.3","n":"Artifact & Package Management","u":[{"i":"12.3.1","n":"Artifact Repository Health","c":"medium","f":"intermediate","v":"Full artifact repositories prevent builds from publishing. Storage monitoring and cleanup policy verification ensures CI/CD continuity.","t":"Custom API input (Artifactory/Nexus)","d":"Repository storage metrics, cleanup policy logs","q":"index=devops sourcetype=\"artifactory:storage\"\n| eval pct_used=round(used_space/total_space*100,1)\n| where pct_used > 80\n| table repository, used_space_gb, total_space_gb, pct_used","m":"Poll Artifactory/Nexus storage API daily. Track storage per repository. Alert at 80% capacity. Verify cleanup policies are running and effective. Report on artifact growth rate.","z":"Gauge (% capacity used), Bar chart (storage by repository), Line chart (storage trend)."},{"i":"12.3.2","n":"Dependency Vulnerability Alerts","c":"critical","f":"beginner","v":"Vulnerable dependencies in the software supply chain are a primary attack vector. Tracking ensures timely patching.","t":"Snyk/Dependabot webhook","d":"SCA tool output (Snyk, Dependabot, GitHub Advisory)","q":"index=devops sourcetype=\"snyk:vulnerability\"\n| where severity IN (\"critical\",\"high\")\n| stats count by project, package_name, cve_id, severity\n| sort -severity, -count","m":"Ingest SCA scan results. Track vulnerable dependencies by project, severity, and package. Alert on new critical/high findings. Track remediation time. Report on dependency health per team.","z":"Table (vulnerable dependencies), Bar chart (vulns by project), Line chart (vulnerability trend), Single value (critical vulns count)."},{"i":"12.3.3","n":"Package Download Anomalies","c":"high","f":"intermediate","v":"Unusual package download patterns may indicate dependency confusion attacks or compromised internal packages.","t":"Artifactory/Nexus access logs","d":"Repository access logs (download events)","q":"index=devops sourcetype=\"artifactory:access\"\n| stats count by package_name, client_ip\n| eventstats avg(count) as avg_downloads, stdev(count) as stdev_downloads by package_name\n| where count > avg_downloads + 3*stdev_downloads","m":"Monitor package download patterns. Baseline normal download volumes per package. Alert on statistical outliers. Watch for downloads of internal packages from external IPs. Track new/unknown packages being introduced.","z":"Table (anomalous downloads), Bar chart (top downloaded packages), Line chart (download volume trend)."},{"i":"12.3.4","n":"License Compliance Tracking","c":"medium","f":"beginner","v":"Open-source license violations create legal risk. Automated tracking ensures compliance before code reaches production.","t":"SCA tool output","d":"SCA license scan results (Snyk, FOSSA, WhiteSource)","q":"index=devops sourcetype=\"sca:license\"\n| where license_risk IN (\"high\",\"critical\") OR license IN (\"GPL-3.0\",\"AGPL-3.0\")\n| stats count by project, package_name, license, license_risk\n| sort -license_risk","m":"Ingest SCA license scan results. Track license types across all projects. Alert on copyleft licenses in commercial products. Report on license distribution for legal review. Block deployments with policy violations.","z":"Table (license risks), Pie chart (license distribution), Bar chart (risks by project)."}]},{"i":"12.4","n":"Infrastructure as Code","u":[{"i":"12.4.1","n":"Terraform Plan/Apply Tracking","c":"high","f":"beginner","v":"Every Terraform apply changes infrastructure. Full audit trail enables change management, impact analysis, and rollback decisions.","t":"Terraform Cloud API, CI/CD output parsing","d":"Terraform CLI output (plan/apply), Terraform Cloud run events","q":"index=iac sourcetype=\"terraform:run\"\n| table _time, workspace, user, action, resources_added, resources_changed, resources_destroyed, status\n| sort -_time","m":"Send Terraform run events to Splunk via HEC (from CI/CD pipeline or Terraform Cloud webhooks). Track resource changes per workspace. Alert on destroy operations. Correlate infrastructure changes with monitoring alerts.","z":"Table (recent Terraform runs), Timeline (apply events), Bar chart (resource changes by workspace), Single value (applies today)."},{"i":"12.4.2","n":"Configuration Drift Detection","c":"high","f":"intermediate","v":"Drift from declared IaC state indicates manual changes that bypass change control, creating inconsistency and security risks.","t":"Terraform plan output, cloud config monitoring","d":"Terraform plan output (no-change runs showing drift), AWS Config","q":"index=iac sourcetype=\"terraform:plan\"\n| where drift_detected=\"true\"\n| table _time, workspace, resource_type, resource_name, drift_detail\n| sort -_time","m":"Schedule periodic `terraform plan` runs (detect-only). Parse output for unexpected changes. Alert on any drift detected. Correlate with cloud provider change logs to identify who made manual changes. Enforce drift remediation SLA.","z":"Table (drifted resources), Single value (resources with drift), Bar chart (drift by workspace), Timeline (drift events)."},{"i":"12.4.3","n":"Ansible Playbook Outcomes","c":"medium","f":"beginner","v":"Tracking Ansible run results ensures configuration management is working. Failed tasks indicate systems in unknown state.","t":"Ansible callback plugin (Splunk HEC callback)","d":"Ansible callback output (play results, task results)","q":"index=iac sourcetype=\"ansible:result\"\n| stats sum(ok) as ok, sum(changed) as changed, sum(failed) as failed, sum(unreachable) as unreachable by playbook, host\n| where failed > 0 OR unreachable > 0","m":"Configure Ansible Splunk callback plugin to send results to HEC. Track ok/changed/failed/unreachable counts per playbook and host. Alert on failed or unreachable hosts. Report on configuration management coverage.","z":"Table (playbook results), Status grid (host \u00d7 playbook status), Bar chart (failures by playbook), Single value (success rate)."},{"i":"12.4.4","n":"Puppet/Chef Compliance Reports","c":"medium","f":"beginner","v":"Configuration management compliance ensures systems match desired state. Non-compliance indicates security or operational risk.","t":"Puppet/Chef report forwarding","d":"Puppet agent reports, Chef client run reports","q":"index=iac sourcetype=\"puppet:report\"\n| stats latest(status) as status, latest(corrective_changes) as corrective by certname\n| where status=\"failed\" OR corrective > 0","m":"Forward Puppet/Chef reports to Splunk. Track agent compliance rates. Alert on failed runs (nodes in non-compliant state). Monitor corrective changes (Puppet remediated drift). Report on fleet compliance percentage.","z":"Single value (compliance %), Table (non-compliant nodes), Pie chart (status distribution), Line chart (compliance trend)."},{"i":"12.4.5","n":"IaC Policy Violations","c":"high","f":"beginner","v":"Policy-as-code (OPA/Sentinel) prevents non-compliant infrastructure from being provisioned. Tracking blocked deployments validates governance.","t":"Policy engine output (CI/CD integration)","d":"OPA/Sentinel policy check results, CI/CD pipeline logs","q":"index=iac sourcetype=\"policy_check\"\n| where result=\"DENY\"\n| stats count by policy_name, workspace, resource_type\n| sort -count","m":"Ingest policy check results from CI/CD pipelines. Track denied provisions by policy and team. Alert on repeated violations (may indicate training need). Report on policy effectiveness and most-violated rules.","z":"Bar chart (violations by policy), Table (denied provisions), Line chart (violation trend), Pie chart (by resource type)."}]}]},{"i":13,"n":"Observability & Monitoring Stack","s":[{"i":"13.1","n":"Splunk Platform Health","u":[{"i":"13.1.1","n":"Indexer Queue Fill Ratio","c":"critical","f":"beginner","v":"Backed-up indexing queues cause data loss or delay. Detection enables immediate investigation of ingestion bottlenecks.","t":"Monitoring Console (built-in)","d":"`_internal` (metrics.log, queue metrics)","q":"index=_internal sourcetype=splunkd group=queue\n| eval fill_pct=round(current_size/max_size*100,1)\n| where fill_pct > 70\n| timechart span=5m max(fill_pct) as queue_pct by name","m":"Monitor parsing, merging, and typing queues via `_internal`. Alert when any queue exceeds 70% fill ratio. Investigate source of data surge (new data source, burst events). Consider parallel pipelines or additional indexers.","z":"Gauge (queue fill % per pipeline), Line chart (queue fill over time), Table (queues above threshold)."},{"i":"13.1.2","n":"Search Concurrency Monitoring","c":"high","f":"beginner","v":"Exceeding search concurrency limits causes search skipping and degraded user experience. Monitoring guides capacity decisions.","t":"Monitoring Console","d":"`_internal` (scheduler logs, search dispatch)","q":"index=_internal sourcetype=splunkd group=search_concurrency\n| timechart span=5m max(active_hist_searches) as historical, max(active_rt_searches) as realtime","m":"Track concurrent searches vs configured limits. Alert when approaching concurrency limits. Identify resource-intensive searches consuming disproportionate capacity. Report on search workload distribution.","z":"Line chart (concurrent searches over time), Gauge (% of limit), Table (top resource consumers)."},{"i":"13.1.3","n":"Forwarder Connectivity","c":"critical","f":"intermediate","v":"Silent forwarder failures mean data gaps that may not be noticed until an investigation fails. Detection ensures data completeness.","t":"Monitoring Console, Deployment Monitor app","d":"`_internal` (metrics.log \u2014 tcpin_connections)","q":"index=_internal sourcetype=splunkd group=tcpin_connections\n| stats latest(_time) as last_seen by hostname, sourceIp\n| eval hours_since=round((now()-last_seen)/3600,1)\n| where hours_since > 1\n| table hostname, sourceIp, hours_since\n| sort -hours_since","m":"Track last-seen timestamp per forwarder from `_internal`. Alert when any forwarder hasn't reported in >1 hour. Maintain forwarder inventory for coverage analysis. Cross-reference with host downtime events.","z":"Table (silent forwarders), Single value (forwarders reporting), Status grid (forwarder \u00d7 health), Bar chart (silent by location)."},{"i":"13.1.4","n":"License Usage Trending","c":"high","f":"intermediate","v":"License overages cause enforcement (search blocking). Trending enables proactive management and capacity planning.","t":"Monitoring Console","d":"`_internal` (license_usage.log)","q":"index=_internal sourcetype=splunkd group=license_usage\n| timechart span=1d sum(b) as bytes_indexed\n| eval gb=round(bytes_indexed/1024/1024/1024,2)\n| predict gb as predicted future_timespan=30","m":"Track daily license usage against entitled volume. Alert at 80% and 90% of daily limit. Use `predict` for 30-day forecast. Identify top sourcetypes contributing to growth. Report on usage trends.","z":"Line chart (daily usage with license limit line), Single value (today's usage %), Bar chart (usage by sourcetype), Gauge (% of limit)."},{"i":"13.1.5","n":"Skipped Search Detection","c":"high","f":"intermediate","v":"Skipped searches mean scheduled reports, alerts, and data enrichments aren't running. This creates blind spots in monitoring and compliance.","t":"Monitoring Console","d":"`_internal` (scheduler.log)","q":"index=_internal sourcetype=scheduler status=\"skipped\"\n| stats count by savedsearch_name, reason\n| sort -count","m":"Monitor scheduler logs for skipped searches. Alert when critical searches are skipped. Track skip reasons (concurrency, disabled, cron). Optimize skipped searches or increase search concurrency limits.","z":"Table (skipped searches with reasons), Bar chart (top skipped searches), Line chart (skip rate trend)."},{"i":"13.1.6","n":"Index Size Trending","c":"medium","f":"intermediate","v":"Index size growth affects storage costs and search performance. Trending enables proactive storage planning.","t":"Monitoring Console","d":"`_internal` (indexes.conf, REST API)","q":"| rest /services/data/indexes\n| table title, currentDBSizeMB, maxTotalDataSizeMB, frozenTimePeriodInSecs\n| eval pct_used=round(currentDBSizeMB/maxTotalDataSizeMB*100,1)\n| sort -pct_used","m":"Poll index sizes via REST API daily. Track growth rates per index. Alert when indexes approach maxTotalDataSizeMB (data will roll to frozen). Use `predict` to forecast when limits will be reached.","z":"Table (index sizes with % used), Bar chart (top indexes by size), Line chart (growth trend), Gauge (% of max per index)."},{"i":"13.1.7","n":"KV Store Health","c":"high","f":"beginner","v":"KV Store failures break lookups, app functionality, and ES correlation. Health monitoring prevents cascading application issues.","t":"Monitoring Console","d":"`_internal` (kvstore logs)","q":"index=_internal sourcetype=splunkd component=KVStoreServlet OR component=KvStore\n| search log_level=ERROR OR log_level=WARN\n| stats count by host, log_level, message\n| sort -count","m":"Monitor KV Store logs for errors and replication issues. Track replication lag between SHC members. Alert on KV Store service unavailability. Monitor collection sizes for capacity planning.","z":"Status grid (SHC member \u00d7 KV Store health), Table (KV Store errors), Line chart (replication lag)."},{"i":"13.1.8","n":"Deployment Server Status","c":"medium","f":"beginner","v":"Deployment server issues prevent app/config distribution to forwarders, leaving them with stale or incorrect configurations.","t":"Monitoring Console","d":"`_internal` (deployment server logs)","q":"index=_internal sourcetype=splunkd component=DeploymentServer\n| search log_level=ERROR\n| stats count by message, host\n| sort -count","m":"Monitor deployment server logs for errors. Track successful vs failed deployments to clients. Alert on deployment failures. Verify client phone-home intervals are within expected ranges.","z":"Table (deployment errors), Single value (clients checking in), Bar chart (failures by server class)."},{"i":"13.1.9","n":"Data Ingestion Latency","c":"high","f":"intermediate","v":"High indexing latency (difference between event time and index time) means stale data for searches. Detection enables root cause analysis.","t":"Monitoring Console","d":"Any index (sampling `_time` vs `_indextime`)","q":"index=* earliest=-15m\n| eval latency=_indextime-_time\n| stats avg(latency) as avg_latency, perc95(latency) as p95_latency by index, sourcetype\n| where p95_latency > 300\n| sort -p95_latency","m":"Sample events periodically and calculate `_indextime` minus `_time`. Alert when p95 latency exceeds 5 minutes for critical sourcetypes. Investigate queue buildup, network latency, or time parsing issues.","z":"Table (sourcetypes with high latency), Line chart (latency trend), Bar chart (latency by sourcetype)."},{"i":"13.1.10","n":"Search Head Cluster Status","c":"critical","f":"intermediate","v":"SHC member failures affect user access and search capacity. Captain election issues can cause complete SHC outage.","t":"Monitoring Console","d":"`_internal` (SHC logs, REST endpoints)","q":"| rest /services/shcluster/member/members\n| table label, status, last_heartbeat, replication_count\n| eval heartbeat_age=now()-last_heartbeat\n| where status!=\"Up\" OR heartbeat_age > 300","m":"Monitor SHC member health via REST API. Track captain status and election events. Alert on member disconnection or replication failures. Monitor artifact replication lag between members.","z":"Status grid (SHC member \u00d7 status), Table (member health), Timeline (captain election events)."},{"i":"13.1.11","n":"Indexer Cluster Bucket Replication","c":"critical","f":"intermediate","v":"Under-replicated buckets mean data is at risk of loss. Monitoring ensures the replication factor is maintained.","t":"Monitoring Console","d":"`_internal` (CM logs, REST endpoints)","q":"| rest /services/cluster/master/buckets\n| where search_factor_met=0 OR replication_factor_met=0\n| stats count as non_compliant_buckets","m":"Monitor cluster master/manager REST endpoints. Track replication and search factor compliance. Alert on any buckets not meeting the configured factor. Investigate cause (indexer down, disk full, network issues).","z":"Single value (non-compliant buckets \u2014 target: 0), Table (non-compliant bucket details), Line chart (compliance trend)."},{"i":"13.1.12","n":"HEC Endpoint Health","c":"high","f":"beginner","v":"HEC is a primary data ingestion path. Failures silently drop data from applications, containers, and cloud services.","t":"Monitoring Console","d":"`_internal` (http_event_collector logs)","q":"index=_internal sourcetype=splunkd component=HttpEventCollector\n| stats count(eval(log_level=\"ERROR\")) as errors, count as total by host\n| eval error_rate=round(errors/total*100,2)\n| where error_rate > 1","m":"Monitor HEC endpoint health and error rates. Track HTTP status codes returned to clients. Alert on elevated error rates (4xx, 5xx). Monitor HEC token usage for capacity planning and security.","z":"Single value (HEC error rate), Line chart (HEC throughput), Table (errors by token), Bar chart (status codes)."},{"i":"13.1.13","n":"Sourcetype Breakdown Trending","c":"medium","f":"intermediate","v":"Understanding data volume per sourcetype enables cost optimization, retention tuning, and unexpected growth detection.","t":"Monitoring Console","d":"`_internal` (license_usage.log)","q":"index=_internal sourcetype=splunkd group=license_usage\n| stats sum(b) as bytes by st\n| eval gb=round(bytes/1024/1024/1024,2)\n| sort -gb\n| head 20","m":"Track daily volume per sourcetype. Identify top consumers. Alert on sourcetypes with unexpected growth (>20% week-over-week). Use for license optimization and retention policy tuning.","z":"Bar chart (top sourcetypes by volume), Pie chart (volume distribution), Line chart (growth trend for top sourcetypes)."},{"i":"13.1.14","n":"Long-Running Search Detection","c":"medium","f":"intermediate","v":"Long-running searches consume shared resources and may indicate poorly written SPL or excessive time ranges.","t":"Monitoring Console","d":"`_internal` (scheduler, search audit log)","q":"index=_audit action=search info=completed\n| where total_run_time > 600\n| table _time, user, savedsearch_name, total_run_time, scan_count, event_count\n| sort -total_run_time","m":"Monitor search audit log for long-running searches (>10 minutes). Alert on searches consuming excessive resources. Identify optimization opportunities. Report on top resource-consuming searches weekly.","z":"Table (long-running searches), Bar chart (top consumers by run time), Line chart (long search count trend)."},{"i":"13.1.15","n":"Splunk Certificate Expiration","c":"critical","f":"intermediate","v":"Expired Splunk internal certificates break inter-component communication (forwarder\u2192indexer, SHC replication, etc.).","t":"Monitoring Console, scripted input","d":"`_internal` (splunkd certificate warnings), certificate check script","q":"index=_internal sourcetype=splunkd \"certificate\" (\"expire\" OR \"expiration\" OR \"not yet valid\")\n| stats count by host, message","m":"Monitor `_internal` for certificate-related warnings. Deploy scripted input to check Splunk certificate files directly. Alert at 30, 14, and 7 days before expiry. Document certificate renewal procedure.","z":"Table (certificates with expiry), Single value (days until nearest expiry), Status grid (component \u00d7 cert status)."}]},{"i":"13.2","n":"Splunk ITSI (Premium)","u":[{"i":"13.2.1","n":"Service Health Score Trending","c":"critical","f":"beginner","v":"Service health scores provide a single-pane view of business service status. Trending enables SLA reporting and proactive management.","t":"Splunk ITSI","d":"`itsi_summary` index","q":"index=itsi_summary is_service_in_maintenance=0\n| timechart span=1h avg(health_score) by service_name","m":"Configure ITSI services with KPIs mapped to business services. Track health scores over time. Alert on score degradation. Use for SLA reporting and executive dashboards. Configure Glass Tables for NOC display.","z":"Service Analyzer (ITSI native), Glass Table, Line chart (health trend), Status grid."},{"i":"13.2.2","n":"KPI Degradation Alerting","c":"critical","f":"intermediate","v":"KPI threshold breaches provide early warning of service degradation. Adaptive thresholds reduce false positives vs static thresholds.","t":"Splunk ITSI","d":"ITSI correlation searches, KPI data","q":"index=itsi_summary severity_value>3\n| stats count by service_name, kpi_name, severity_label\n| sort -count","m":"Configure KPIs with adaptive thresholds (ITSI machine learning). Set up correlation searches for threshold breach alerting. Route alerts to Episode Review for analyst triage. Tune thresholds based on feedback.","z":"ITSI Deep Dive, Service Analyzer, Line chart with threshold bands."},{"i":"13.2.3","n":"Episode Volume and MTTR","c":"high","f":"intermediate","v":"Episode volume and resolution time measure IT operations effectiveness. Trending drives process improvement.","t":"Splunk ITSI","d":"`itsi_grouped_alerts` index","q":"index=itsi_grouped_alerts\n| stats count as episodes, avg(duration) as avg_duration_sec by severity\n| eval avg_mttr_min=round(avg_duration_sec/60,1)","m":"Track episode creation, severity distribution, and time-to-resolution. Monitor episode assignment and owner workload. Alert on episode volume spikes. Report on MTTR by severity for management.","z":"Bar chart (episodes by severity), Line chart (episode volume trend), Single value (avg MTTR), Table (open episodes)."},{"i":"13.2.4","n":"Entity Status Monitoring","c":"high","f":"intermediate","v":"Entity health provides granular visibility into individual infrastructure components feeding services. Unstable entities degrade service health.","t":"Splunk ITSI","d":"ITSI entity overview, entity health scores","q":"| inputlookup itsi_entities\n| where entity_status!=\"active\"\n| table title, entity_type, entity_status, last_seen","m":"Configure entity discovery (AD, CMDB, cloud APIs). Monitor entity states (active, inactive, unstable). Alert when critical entities become inactive. Track entity population for coverage analysis.","z":"Status grid (entities by type \u00d7 status), Table (inactive entities), Single value (active entity count)."},{"i":"13.2.5","n":"Base Search Performance","c":"medium","f":"beginner","v":"ITSI base searches feed all KPIs. Slow or skipped base searches cause stale or missing KPI data across multiple services.","t":"Splunk ITSI","d":"`_internal` (scheduler logs for ITSI searches)","q":"index=_internal sourcetype=scheduler savedsearch_name=\"ITSI*Base*\"\n| stats avg(run_time) as avg_runtime, count(eval(status=\"skipped\")) as skipped by savedsearch_name\n| where avg_runtime > 120 OR skipped > 0","m":"Monitor ITSI base search run times and skip rates. Alert when any base search is skipped or exceeds its schedule interval. Optimize slow base searches (reduce scope, improve SPL). Consider splitting overloaded base searches.","z":"Table (base search performance), Bar chart (runtime by search), Single value (skipped searches)."},{"i":"13.2.6","n":"Rules Engine Health","c":"critical","f":"beginner","v":"The ITSI Rules Engine processes events into episodes. Failure means alerts are not grouped or routed, breaking Event Analytics.","t":"Splunk ITSI","d":"`_internal` (itsi_internal_log)","q":"index=_internal sourcetype=itsi_internal_log component=RulesEngine\n| search log_level=ERROR OR log_level=WARN\n| stats count by log_level, message","m":"Monitor Rules Engine logs for errors and warnings. Alert on Rules Engine restarts or processing failures. Track event-to-episode latency. Verify aggregation policies are functioning correctly.","z":"Single value (Rules Engine status), Table (recent errors), Line chart (processing latency)."},{"i":"13.2.7","n":"Predictive Service Degradation","c":"high","f":"advanced","v":"Predicting service health degradation before it happens enables proactive remediation, reducing incident impact.","t":"Splunk ITSI + MLTK","d":"`itsi_summary` + ML models","q":"index=itsi_summary service_name=\"Production Web\"\n| timechart span=15m avg(health_score) as health\n| predict health as predicted_health future_timespan=24 algorithm=LLP5\n| where predicted_health < 50","m":"Train ML models on service health history using MLTK. Predict health scores 4-24 hours ahead. Alert when predicted health falls below threshold. Investigate contributing KPIs proactively. This is an advanced ITSI capability.","z":"Line chart (actual vs predicted health), Single value (predicted health in 4h), Alert timeline."},{"i":"13.2.8","n":"Glass Table NOC Display","c":"medium","f":"beginner","v":"Real-time service visualization for operations centers provides at-a-glance awareness of infrastructure and service health.","t":"Splunk ITSI Glass Tables","d":"ITSI service/KPI data","q":"","m":"Design Glass Tables representing logical infrastructure views (network topology, service dependency map, data center layout). Map ITSI services and KPIs to visual elements. Deploy on NOC screens with auto-refresh.","z":"ITSI Glass Table (custom visual layout with service health indicators, KPI widgets, and status icons)."}]},{"i":"13.3","n":"Third-Party Monitoring Integration","u":[{"i":"13.3.1","n":"Nagios/Zabbix Alert Ingestion","c":"medium","f":"beginner","v":"Consolidating legacy monitoring alerts into Splunk enables cross-tool correlation and single-pane-of-glass operations.","t":"Custom webhook input, syslog","d":"Nagios/Zabbix webhook exports, syslog notifications","q":"index=monitoring sourcetype=\"nagios:notification\" OR sourcetype=\"zabbix:webhook\"\n| stats count by host, service, state, severity\n| sort -count","m":"Configure Nagios/Zabbix to send alerts to Splunk via webhook or syslog. Normalize alert fields (host, service, severity, state) using CIM. Correlate with Splunk-native monitoring. Phase out legacy tools over time.","z":"Table (third-party alerts), Bar chart (alerts by source tool), Status grid (host \u00d7 service)."},{"i":"13.3.2","n":"Prometheus Metric Ingestion","c":"medium","f":"intermediate","v":"Ingesting Prometheus metrics into Splunk enables long-term storage, cross-domain correlation, and unified dashboarding.","t":"OpenTelemetry Collector, Prometheus remote write","d":"Prometheus remote write endpoint, OpenTelemetry metrics","q":"| mstats avg(_value) WHERE index=prometheus metric_name=\"node_cpu_seconds_total\" by host span=5m","m":"Configure Prometheus remote_write to Splunk's metrics endpoint or use OpenTelemetry Collector as intermediary. Ingest as Splunk metrics. Use `mstats` for efficient querying. Create unified dashboards combining Prometheus and Splunk data.","z":"Line chart (metric trends), Multi-metric dashboard, Table (metric summaries)."},{"i":"13.3.3","n":"PagerDuty/Opsgenie Integration","c":"medium","f":"intermediate","v":"Tracking alert lifecycle and on-call response metrics ensures incident response SLAs are met and identifies process improvements.","t":"PagerDuty API input","d":"PagerDuty incidents API, Opsgenie alerts API","q":"index=pagerduty sourcetype=\"pagerduty:incident\"\n| eval ack_time_min=round((acknowledged_at_epoch-created_at_epoch)/60,1)\n| stats avg(ack_time_min) as avg_ack, avg(resolved_at_epoch-created_at_epoch)/60 as avg_resolve by service","m":"Poll PagerDuty/Opsgenie API for incident data. Track acknowledgment time, resolution time, and escalation rates. Report on on-call workload distribution. Alert when acknowledgment SLA is breached.","z":"Bar chart (MTTA by service), Line chart (incident volume trend), Table (open incidents), Single value (avg MTTA)."},{"i":"13.3.4","n":"Monitoring Coverage Gap Detection","c":"high","f":"expert","v":"Hosts not covered by any monitoring tool are blind spots. Detection ensures comprehensive infrastructure visibility.","t":"Cross-tool asset correlation","d":"CMDB + all monitoring tool inventories","q":"| inputlookup cmdb_hosts.csv\n| join type=left hostname [search index=_internal group=tcpin_connections | stats latest(_time) as splunk_last by hostname]\n| join type=left hostname [search index=edr sourcetype=\"*sensor*\" | stats latest(_time) as edr_last by hostname]\n| where isnull(splunk_last) AND isnull(edr_last)\n| table hostname, os, department","m":"Cross-reference CMDB with all monitoring tool inventories (Splunk forwarders, EDR agents, SNMP targets). Identify assets not monitored by any tool. Alert on new unmonitored assets. Track coverage percentage as a KPI.","z":"Table (unmonitored hosts), Single value (coverage %), Pie chart (monitored vs unmonitored), Bar chart (gaps by department)."},{"i":"13.3.5","n":"Alert Storm Detection","c":"critical","f":"intermediate","v":"Correlated alert storms across monitoring tools indicate major incidents. Detection enables rapid escalation and noise reduction.","t":"Multi-source alert correlation","d":"All monitoring tool alerts ingested into Splunk","q":"index=alerts sourcetype=*\n| timechart span=5m count as alert_count\n| where alert_count > 50\n| eval storm=\"Alert storm detected\"","m":"Ingest alerts from all monitoring tools into a common index. Track alert rate across all sources. Alert when rate exceeds normal baseline by >5\u00d7 (indicates correlated event). Use ITSI Event Analytics for intelligent grouping.","z":"Line chart (alert rate across all sources), Single value (current alert rate), Timeline (alert storm events), Table (contributing alerts)."}]}]},{"i":14,"n":"IoT & Operational Technology (OT)","s":[{"i":"14.1","n":"Building Management Systems (BMS)","u":[{"i":"14.1.1","n":"HVAC Performance Monitoring","c":"high","f":"beginner","v":"HVAC issues in data centers risk equipment damage; in buildings they affect occupant comfort and energy costs.","t":"Modbus TA, MQTT input, BMS API","d":"BACnet/Modbus sensors (temperature setpoint, actual, supply/return air)","q":"index=bms sourcetype=\"modbus:hvac\"\n| eval deviation=abs(actual_temp-setpoint_temp)\n| where deviation > 3\n| table _time, zone, setpoint_temp, actual_temp, deviation","m":"Connect BMS to Splunk via MQTT broker or Modbus gateway. Ingest setpoints and actuals per zone. Alert when deviation exceeds 3\u00b0F/2\u00b0C for sustained period. Track energy consumption per HVAC unit.","z":"Line chart (setpoint vs actual per zone), Heatmap (zone \u00d7 temperature), Single value (zones out of spec)."},{"i":"14.1.2","n":"UPS Battery Monitoring","c":"critical","f":"beginner","v":"UPS battery failure during power loss causes complete outage. Proactive monitoring prevents unprotected power events.","t":"SNMP TA (UPS-MIB)","d":"SNMP UPS-MIB (upsEstimatedMinutesRemaining, upsBatteryStatus, upsBatteryTemperature)","q":"index=power sourcetype=\"snmp:ups\"\n| where battery_status!=\"normal\" OR runtime_remaining_min < 30 OR battery_temp_c > 35\n| table _time, ups_name, battery_status, charge_pct, runtime_remaining_min, battery_temp_c","m":"Poll UPS via SNMP every 5 minutes. Alert on low charge (<80%), low runtime (<30 min), high temperature (>35\u00b0C), or abnormal status. Track battery health trend to predict replacement needs.","z":"Gauge (charge %), Line chart (runtime trend), Table (UPS status), Single value (runtime remaining)."},{"i":"14.1.3","n":"Power Consumption Trending","c":"medium","f":"intermediate","v":"Power consumption trending supports capacity planning, cost management, and sustainability reporting. Anomalies indicate equipment issues.","t":"SNMP TA, smart PDU API","d":"Smart PDU metrics (per-outlet, per-circuit power)","q":"index=power sourcetype=\"snmp:pdu\"\n| timechart span=1h avg(power_watts) as avg_power by rack_id\n| predict avg_power as predicted future_timespan=30","m":"Poll PDU power metrics via SNMP. Track per-rack and per-circuit consumption. Baseline normal patterns. Alert on unusual spikes (potential hardware issue) or drops (server failure). Use for PUE calculation.","z":"Line chart (power per rack), Heatmap (rack \u00d7 time power usage), Bar chart (top consumers), Stacked area (floor/room power)."},{"i":"14.1.4","n":"Access Control Event Audit","c":"high","f":"intermediate","v":"Physical access logs correlate with logical access events for security investigation. Audit trail required for compliance.","t":"Access control syslog, API input","d":"Access control system logs (badge events, door status)","q":"index=physical sourcetype=\"access_control\"\n| stats count by badge_holder, door, action\n| sort -count","m":"Forward access control events via syslog or API. Parse badge holder, door, time, and action (granted, denied). Alert on after-hours access to sensitive areas. Correlate physical access with logical authentication events.","z":"Table (access events), Bar chart (access by door), Timeline (access events for specific person), Geo/floor plan."},{"i":"14.1.5","n":"Elevator/Equipment Health","c":"medium","f":"beginner","v":"Equipment fault codes enable predictive maintenance, reducing downtime and extending equipment life.","t":"BMS integration, MQTT","d":"BMS event logs, equipment fault codes","q":"index=bms sourcetype=\"bms:faults\"\n| stats count by equipment_id, fault_code, description\n| sort -count","m":"Forward BMS fault events to Splunk. Map fault codes to descriptions via lookup. Track fault frequency per equipment. Alert on critical faults. Report on recurring issues for maintenance planning.","z":"Table (equipment faults), Bar chart (faults by equipment), Timeline (fault events)."},{"i":"14.1.6","n":"Environmental Compliance","c":"critical","f":"beginner","v":"Temperature/humidity exceedances in data centers risk equipment damage; in labs they invalidate experiments. Compliance monitoring is mandatory.","t":"Environmental sensor inputs (SNMP, MQTT)","d":"Environmental sensors (temperature, humidity, differential pressure)","q":"index=environment sourcetype=\"sensor:environmental\"\n| where temp_f > 80 OR temp_f < 64 OR humidity_pct > 60 OR humidity_pct < 40\n| table _time, zone, sensor, temp_f, humidity_pct","m":"Deploy environmental sensors per ASHRAE guidelines. Ingest via SNMP or MQTT. Alert immediately on out-of-range conditions. Log compliance data for audit. Track seasonal patterns for cooling optimization.","z":"Heatmap (zone \u00d7 temperature), Line chart (temp/humidity trend), Single value (zones in compliance %), Gauge (current temp per zone)."}]},{"i":"14.2","n":"Industrial Control Systems (ICS/SCADA)","u":[{"i":"14.2.1","n":"PLC/RTU Health Monitoring","c":"critical","f":"beginner","v":"Controller failures halt industrial processes. Monitoring CPU, memory, and communication status prevents unplanned downtime.","t":"OPC-UA input, Modbus TA","d":"OPC-UA metrics (CPU, memory, I/O status), Modbus register data","q":"index=ot sourcetype=\"opcua:metrics\"\n| where plc_cpu_pct > 80 OR plc_memory_pct > 90 OR comm_status!=\"OK\"\n| table _time, plc_name, plc_cpu_pct, plc_memory_pct, comm_status","m":"Connect to PLCs via OPC-UA server or Modbus gateway through Splunk Edge Hub. Poll health metrics every 30 seconds. Alert on CPU >80%, memory >90%, or communication loss. Track uptime per controller.","z":"Status grid (PLC \u00d7 health), Gauge (CPU/memory per PLC), Line chart (health trend)."},{"i":"14.2.2","n":"Process Variable Anomalies","c":"critical","f":"intermediate","v":"Process variables (pressure, flow, temperature) outside normal ranges indicate equipment failure or process upset. Early detection prevents safety incidents.","t":"OPC-UA input, Edge Hub anomaly detection","d":"OPC-UA/Modbus process data (analog values)","q":"index=ot sourcetype=\"opcua:process\"\n| where value > high_limit OR value < low_limit\n| table _time, tag_name, value, low_limit, high_limit, unit","m":"Ingest process variables via OPC-UA. Define normal ranges per tag. Use Edge Hub kNN anomaly detection for ML-based alerting. Alert on limit exceedances. Track process stability over time.","z":"Line chart (process variable with limit bands), Table (out-of-range events), Single value (current value with status color)."},{"i":"14.2.3","n":"Safety System Activation","c":"critical","f":"beginner","v":"Safety system activations (ESD, interlocks) indicate dangerous conditions. Each activation requires investigation and documentation.","t":"Safety PLC logs, OPC-UA events","d":"Safety PLC event logs, emergency shutdown events","q":"index=ot sourcetype=\"safety_plc\"\n| search event_type IN (\"ESD\",\"interlock_trip\",\"safety_shutdown\")\n| table _time, system, event_type, cause, action_taken","m":"Forward safety PLC events to Splunk (isolated network \u2014 use data diode or Edge Hub). Alert at critical priority on any safety activation. Maintain incident log for regulatory compliance. Track activation frequency per system.","z":"Single value (safety activations \u2014 target: 0), Table (activation history), Timeline (safety events)."},{"i":"14.2.4","n":"Network Segmentation Monitoring","c":"critical","f":"intermediate","v":"IT/OT network boundary violations create cybersecurity risk to critical infrastructure. Continuous monitoring validates segmentation.","t":"Firewall TAs, network flow data","d":"Industrial firewall logs, network flow data at IT/OT boundary","q":"index=network sourcetype=\"pan:traffic\" zone_pair=\"IT-to-OT\"\n| where action=\"allow\"\n| stats count by src_ip, dest_ip, dest_port, app\n| sort -count","m":"Forward IT/OT boundary firewall logs. Monitor all traffic crossing the boundary. Alert on unexpected protocols or connections. Validate against whitelist of approved communications. Report for ICS security audits.","z":"Table (cross-boundary traffic), Sankey diagram (IT\u2192OT flows), Bar chart (by protocol), Single value (unauthorized connections)."},{"i":"14.2.5","n":"Firmware Version Tracking","c":"high","f":"intermediate","v":"OT devices with outdated firmware are vulnerable to exploitation. Inventory tracking supports patching during maintenance windows.","t":"Scripted inventory input, OPC-UA","d":"Asset inventory scans, OPC-UA system attributes","q":"index=ot sourcetype=\"ics_inventory\"\n| stats latest(firmware_version) as current by device_name, vendor, model\n| lookup approved_firmware.csv vendor, model OUTPUT approved_version\n| where current!=approved_version\n| table device_name, vendor, model, current, approved_version","m":"Conduct periodic OT asset inventory scans (during maintenance windows). Ingest firmware versions. Maintain approved firmware lookup. Report on compliance. Prioritize based on CISA ICS advisories.","z":"Table (devices with outdated firmware), Pie chart (compliance distribution), Single value (% compliant)."},{"i":"14.2.6","n":"Unauthorized Access Detection","c":"critical","f":"intermediate","v":"Unauthorized access to ICS systems could lead to physical damage or safety incidents. Detection is critical for industrial cybersecurity.","t":"Firewall TAs, ICS network monitoring","d":"ICS network logs, industrial firewalls, IDS alerts","q":"index=ot sourcetype=\"ics_firewall\"\n| search action=\"deny\" OR src_zone=\"untrusted\"\n| stats count by src_ip, dest_ip, dest_port\n| sort -count","m":"Monitor access to ICS networks from all sources. Alert on connections from non-whitelisted IPs. Track engineering workstation access sessions. Correlate with physical access to control rooms. Report for ICS cybersecurity compliance.","z":"Table (access events), Timeline (unauthorized attempts), Bar chart (blocked connections by source)."}]},{"i":"14.3","n":"Splunk Edge Hub","u":[{"i":"14.3.1","n":"Temperature Anomaly Detection","c":"high","f":"advanced","v":"Edge-based kNN anomaly detection provides faster response than cloud-based processing for critical temperature monitoring in data centers and industrial environments.","t":"Splunk Edge Hub (built-in kNN model), Splunk OT Intelligence","d":"`index=edge-hub-data` (metrics index), `index=edge-hub-anomalies` (anomaly metrics), `sourcetype=edge_hub`","q":"| mstats avg(_value) as avg_temp\n  where index=edge-hub-data AND metric_name=temperature\n  span=5m by extracted_host\n| where avg_temp > 35 OR avg_temp < 10\n\n`` Anomaly query: ``\n| mstats count where index=edge-hub-anomalies AND metric_name=temperature AND type=\"anomaly-detector\"\n  span=1h by extracted_host\n| where count > 0","m":"Deploy Edge Hub device (IP66-rated, built-in temperature sensor \u00b10.2\u00b0C accuracy). Enable kNN anomaly detection via the Edge Hub mobile app \u2014 toggle \"Anomaly Detection\" on the temperature sensor tile. Sensor data streams as metrics to `edge-hub-data` index; anomalies to `edge-hub-anomalies` index via HEC. Create alerts on anomaly count spikes. Optional: attach external I\u00b2C temperature probes via the 3.5mm jack for additional measurement points.","z":"Line chart (mstats temperature trend by device), Single value (current temperature), Timeline (anomaly events from edge-hub-anomalies)."},{"i":"14.3.2","n":"Vibration & Motion Monitoring","c":"high","f":"advanced","v":"Equipment vibration changes indicate bearing wear, misalignment, or imbalance. Edge Hub's built-in 3-axis accelerometer and gyroscope enable predictive maintenance without external sensors.","t":"Splunk Edge Hub (built-in sensors), Splunk OT Intelligence","d":"`index=edge-hub-data` (metrics index), `sourcetype=edge_hub` \u2014 built-in 3-axis accelerometer + 6-axis gyroscope","q":"| mstats avg(_value) as avg_accel\n  where index=edge-hub-data AND metric_name IN (accelerometer_x, accelerometer_y, accelerometer_z)\n  span=5m by metric_name, extracted_host\n| eval rms = sqrt(pow(avg_accel, 2))\n\n`` Anomaly-based approach: ``\n| mstats count where index=edge-hub-anomalies AND metric_name=\"accelerometer*\" AND type=\"anomaly-detector\"\n  span=1h by extracted_host\n| where count > 0","m":"Mount Edge Hub near rotating equipment (IP66 enclosure suits industrial environments, operating -40\u00b0C to 80\u00b0C). The built-in accelerometer and gyroscope stream metrics to `edge-hub-data`. Enable kNN anomaly detection via the mobile app for each axis. Deploy MLTK Smart Outlier Detection model for more advanced analysis (requires OT Intelligence 4.8.0+ and Edge Hub OS 2.0+). Alert on anomaly detections. Note: one ML model per sensor; performance degrades with 2+ concurrent models.","z":"Line chart (accelerometer axes over time), Single value (current RMS), Timeline (anomaly events)."},{"i":"14.3.3","n":"Air Quality & VOC Monitoring","c":"medium","f":"intermediate","v":"Indoor air quality affects occupant health and productivity. Edge Hub's optional VOC sensor provides IAQ scoring for workplace wellness monitoring.","t":"Splunk Edge Hub (optional air quality sensor), Splunk OT Intelligence","d":"`index=edge-hub-data` (metrics index), `sourcetype=edge_hub` \u2014 built-in VOC sensor (optional, <1s response, IAQ score)","q":"| mstats avg(_value) as avg_iaq\n  where index=edge-hub-data AND metric_name IN (voc, iaq_score)\n  span=15m by metric_name, extracted_host\n| where metric_name=\"iaq_score\" AND avg_iaq > 200\n\n`` Combined with humidity for comfort index: ``\n| mstats avg(_value) as value\n  where index=edge-hub-data AND metric_name IN (voc, humidity, temperature)\n  span=15m by metric_name, extracted_host","m":"Deploy Edge Hub with optional VOC/air quality sensor module. The sensor provides IAQ (Indoor Air Quality) score with <1 second response time. Data streams as metrics to `edge-hub-data` index. Note: Edge Hub measures VOC and IAQ score \u2014 it does not have a CO2 or PM2.5 sensor natively. For CO2/PM2.5, connect external sensors via MQTT or I\u00b2C. Alert when IAQ score exceeds thresholds. Correlate with humidity sensor data for comfort indexing.","z":"Line chart (IAQ score over time), Gauge (current IAQ), Multi-metric dashboard (VOC + humidity + temperature)."},{"i":"14.3.4","n":"Sound Level Anomalies","c":"medium","f":"intermediate","v":"Unusual sound patterns near equipment indicate mechanical issues. Edge Hub's stereo microphone enables acoustic monitoring without external sensors.","t":"Splunk Edge Hub (built-in stereo microphone), Splunk OT Intelligence","d":"`index=edge-hub-data` (metrics index), `sourcetype=edge_hub` \u2014 built-in stereo microphone","q":"| mstats avg(_value) as avg_db\n  where index=edge-hub-data AND metric_name=sound_level\n  span=5m by extracted_host\n| where avg_db > 85\n\n`` Anomaly detection: ``\n| mstats count where index=edge-hub-anomalies AND metric_name=sound_level AND type=\"anomaly-detector\"\n  span=1h by extracted_host\n| where count > 0","m":"Deploy Edge Hub near critical equipment. The built-in stereo microphone captures ambient sound levels. Enable kNN anomaly detection to baseline normal patterns and detect deviations. Alert on sustained high levels (OSHA >85dB threshold) and sudden changes (potential equipment failure). Sound data streams as metrics to `edge-hub-data`; anomalies to `edge-hub-anomalies`.","z":"Line chart (sound level trend), Single value (current dB), Timeline (anomaly events)."},{"i":"14.3.5","n":"MQTT Device Integration Monitoring","c":"high","f":"intermediate","v":"Edge Hub's built-in MQTT broker aggregates IoT sensor data from external devices. Monitoring broker health ensures data pipeline reliability.","t":"Splunk Edge Hub (built-in MQTT broker), Splunk OT Intelligence","d":"`index=edge-hub-data` (metrics from MQTT topics), `index=edge-hub-logs sourcetype=splunk_edge_hub_log` (broker logs)","q":"`` Metrics from MQTT-connected sensors: ``\n| mstats avg(_value) as avg_v\n  where index=edge-hub-data AND metric_name=temperature_celsius\n  span=1m by extracted_host\n\n`` Broker health via device logs: ``\nindex=edge-hub-logs sourcetype=splunk_edge_hub_log \"mqtt\" OR \"broker\"\n| stats count by log_level, message","m":"Configure MQTT topics via Edge Hub Advanced Settings \u2192 MQTT tab. Create metric or event topic subscriptions with transformations (metric name, dimensions, timestamps). External IoT devices publish to Edge Hub's built-in MQTT broker (port 1883). Data is transformed and forwarded to Splunk via HEC. For TLS-secured external brokers, upload certificates via Advanced Settings \u2192 MQTT \u2192 TLS Configuration. Monitor for disconnected publishers and message rate drops.","z":"Line chart (MQTT metric trends), Table (connected device inventory), Single value (active MQTT topics)."},{"i":"14.3.6","n":"SNMP Device Polling from Edge","c":"medium","f":"beginner","v":"Edg

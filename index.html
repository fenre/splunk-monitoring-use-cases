<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Splunk Infrastructure Monitoring — Use Case Repository</title>
<!-- Splunk Design System–aligned: design tokens, typography, accessibility (WCAG), component styling -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Inconsolata:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ==========================================================================
   Splunk Design System–inspired tokens (splunkui.splunk.com)
   - Design tokens: colors, typography, spacing (8px grid), elevation, borders
   - Accessibility: WCAG contrast, focus rings, color+ (labels with color)
   - Typography: Splunk Platform Sans–like (Source Sans 3), mono (Inconsolata)
   ========================================================================== */
:root {
  /* Surfaces (dark theme) — higher contrast; surfaces slightly darker */
  --splunk-bg-base: #0f1114;
  --splunk-bg-surface: #171a1f;
  --splunk-bg-elevated: #1e2228;
  --splunk-bg-overlay: #262a30;
  /* Borders — stronger so edges read clearly */
  --splunk-border-subtle: #3a3f46;
  --splunk-border-default: #484e56;
  --splunk-border-strong: #5a616b;
  /* Text — primary brighter, secondary/tertiary more legible */
  --splunk-text-primary: #f0f0f0;
  --splunk-text-secondary: #b0b0b0;
  --splunk-text-tertiary: #808890;
  /* Brand / accent */
  --splunk-green: #00b07c;
  --splunk-green-hover: #00c98a;
  --splunk-green-muted: rgba(0, 176, 124, 0.15);
  /* Semantic — earthy criticality (terracotta, ochre, tan, sage) */
  --splunk-critical: #c45c3e;
  --splunk-high: #c4942e;
  --splunk-medium: #b8a038;
  --splunk-low: #5c8a5c;
  --splunk-critical-rgb: 196, 92, 62;
  --splunk-high-rgb: 196, 148, 46;
  --splunk-medium-rgb: 184, 160, 56;
  --splunk-low-rgb: 92, 138, 92;
  /* Difficulty “intermediate” and mtype tag (shared blue) */
  --splunk-intermediate: #3498db;
  --splunk-intermediate-rgb: 52, 152, 219;
  /* Spacing (8px grid) */
  --space-1: 4px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 20px;
  --space-6: 24px;
  --space-8: 32px;
  /* Typography — readable scale; Splunk docs reference design-system typography but don’t publish px values; React UI uses rem. Base 16px aligns with common practice and readability. */
  --font-sans: 'Source Sans 3', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --font-mono: 'Inconsolata', 'JetBrains Mono', ui-monospace, monospace;
  --text-xs: 12px;
  --text-sm: 14px;
  --text-base: 16px;
  --text-lg: 18px;
  --text-xl: 20px;
  --text-2xl: 24px;
  --line-tight: 1.25;
  --line-normal: 1.5;
  /* Radius / elevation */
  --radius-sm: 4px;
  --radius-md: 6px;
  --radius-lg: 8px;
  --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.2);
  --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.25);
  --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.3);
  /* Focus (accessibility) */
  --focus-ring: 0 0 0 3px rgba(0, 176, 124, 0.35);
  /* Aliases for JS-generated content that references original vars */
  --text-dim: var(--splunk-text-secondary);
  --accent: var(--splunk-green);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--font-sans);
  font-size: var(--text-base);
  line-height: var(--line-normal);
  background: var(--splunk-bg-base);
  color: var(--splunk-text-primary);
  min-height: 100vh;
  overflow-x: hidden;
}

.bg-gradient {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: -1;
  background: var(--splunk-bg-base);
}
.bg-orbs { display: none; }

/* Cards: flat surface, clear border (design tokens) */
.glass {
  background: var(--splunk-bg-surface);
  border: 1px solid var(--splunk-border-subtle);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-sm);
  transition: border-color 0.2s ease, box-shadow 0.2s ease;
}
.glass:hover {
  border-color: var(--splunk-border-default);
  box-shadow: var(--shadow-md);
}

/* Header */
header {
  padding: var(--space-3) var(--space-8);
  position: sticky; top: 0; z-index: 100;
  background: var(--splunk-bg-surface);
  border-bottom: 1px solid var(--splunk-border-subtle);
}
.header-inner {
  max-width: 1600px; margin: 0 auto;
  display: flex; align-items: center; gap: var(--space-6); flex-wrap: wrap;
}
.logo {
  display: flex; align-items: center; gap: var(--space-3); flex-shrink: 0;
}
.logo-icon {
  width: 36px; height: 36px; border-radius: var(--radius-md);
  background: var(--splunk-green);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; font-weight: 700; color: #fff;
}
.logo h1 {
  font-size: var(--text-lg); font-weight: 600; color: var(--splunk-text-primary);
  letter-spacing: -0.02em;
}
.logo .subtitle {
  font-size: var(--text-xs); color: var(--splunk-text-secondary); font-weight: 400;
}

/* Search — Splunk-style search bar */
.search-wrap {
  flex: 1; min-width: 280px; max-width: 480px; position: relative;
}
.search-wrap input {
  width: 100%; padding: var(--space-2) var(--space-4) var(--space-2) 40px;
  background: var(--splunk-bg-base);
  border: 1px solid var(--splunk-border-subtle);
  border-radius: var(--radius-md);
  color: var(--splunk-text-primary);
  font-size: var(--text-base); font-family: inherit;
  transition: border-color 0.2s, box-shadow 0.2s;
  outline: none;
}
.search-wrap input:hover { border-color: var(--splunk-border-default); }
.search-wrap input:focus {
  border-color: var(--splunk-green);
  box-shadow: var(--focus-ring);
}
.search-wrap input::placeholder { color: var(--splunk-text-tertiary); }
.search-icon {
  position: absolute; left: var(--space-3); top: 50%; transform: translateY(-50%);
  color: var(--splunk-text-tertiary); font-size: 16px;
}

.header-stat {
  font-size: var(--text-sm); color: var(--splunk-text-secondary);
  display: flex; align-items: center; gap: var(--space-1); flex-shrink: 0;
}
.header-stat .num { font-weight: 600; color: var(--splunk-green); font-size: var(--text-base); }

/* Text size control — site-wide scale step */
.text-size-control {
  display: flex; align-items: center; gap: var(--space-2); flex-shrink: 0;
}
.text-size-label {
  font-size: var(--text-sm); color: var(--splunk-text-secondary); font-weight: 500;
}
.text-size-control button {
  width: 28px; height: 28px;
  font-size: var(--text-base); font-weight: 600; line-height: 1;
  font-family: var(--font-sans);
  color: var(--splunk-text-primary);
  background: var(--splunk-bg-elevated);
  border: 1px solid var(--splunk-border-subtle);
  border-radius: var(--radius-md);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.2s, border-color 0.2s, color 0.2s;
}
.text-size-control button:hover {
  background: var(--splunk-bg-overlay);
  border-color: var(--splunk-border-default);
  color: var(--splunk-green);
}
.text-size-control button:focus-visible {
  outline: none;
  box-shadow: var(--focus-ring);
}
.text-size-control button:disabled {
  opacity: 0.4; cursor: not-allowed;
}

/* Footer */
.site-footer {
  margin-top: var(--space-8);
  padding: var(--space-4) var(--space-6);
  background: var(--splunk-bg-surface);
  border-top: 1px solid var(--splunk-border-subtle);
}
.footer-inner {
  max-width: 1600px; margin: 0 auto;
  display: flex; align-items: center; justify-content: space-between; gap: var(--space-6); flex-wrap: wrap;
}
.footer-meta {
  display: flex; align-items: center; gap: var(--space-4); flex-wrap: wrap;
  font-size: var(--text-sm); color: var(--splunk-text-secondary);
}
.footer-author-text { margin: 0; }
.footer-link {
  color: var(--splunk-text-secondary); text-decoration: none;
}
.footer-link:hover { color: var(--splunk-green); }
.footer-link[href="#"] { display: none; }

.footer-cb-toggle {
  display: flex; align-items: center; gap: var(--space-2);
  font-size: var(--text-sm); color: var(--splunk-text-secondary);
  cursor: pointer; user-select: none;
}
.footer-cb-toggle input { accent-color: var(--splunk-green); cursor: pointer; }
.footer-cb-toggle:hover { color: var(--splunk-text-primary); }
.footer-cb-label { font-weight: 500; }

/* Color-blind friendly mode — palette distinguishable for protan/deutan (red–green) */
html.colorblind-friendly {
  --splunk-critical: #6b7bc4;
  --splunk-high: #d4833a;
  --splunk-medium: #c9a227;
  --splunk-low: #2a9d8f;
  --splunk-critical-rgb: 107, 123, 196;
  --splunk-high-rgb: 212, 131, 58;
  --splunk-medium-rgb: 201, 162, 39;
  --splunk-low-rgb: 42, 157, 143;
  --splunk-intermediate: #5ba3d4;
  --splunk-intermediate-rgb: 91, 163, 212;
}

/* Layout — sidebar and main align on same top and shared column grid */
.app-layout {
  max-width: 1600px; margin: 0 auto; padding: var(--space-6);
  display: grid;
  grid-template-columns: 320px 1fr;
  gap: var(--space-6);
  align-items: start;
  min-height: calc(100vh - 100px);
}

/* Sidebar — nav list styling; wider so labels don’t cut as much */
.sidebar {
  width: 320px; flex-shrink: 0; position: sticky; top: 100px;
  max-height: calc(100vh - 124px); overflow-y: auto;
  padding: var(--space-4);
  scrollbar-width: thin;
  scrollbar-color: var(--splunk-border-default) transparent;
}
.sidebar .cat-item:first-child { margin-top: 0; }
.sidebar::-webkit-scrollbar { width: 6px; }
.sidebar::-webkit-scrollbar-thumb { background: var(--splunk-border-default); border-radius: 3px; }

.cat-item {
  padding: var(--space-2) var(--space-3);
  border-radius: var(--radius-md);
  cursor: pointer;
  margin-bottom: var(--space-1);
  transition: background 0.15s ease;
  display: flex; align-items: center; gap: var(--space-2);
  font-size: var(--text-sm); font-weight: 400; color: var(--splunk-text-secondary);
}
.cat-item:hover { background: var(--splunk-bg-elevated); color: var(--splunk-text-primary); }
.cat-item:focus-visible { outline: 2px solid var(--splunk-green); outline-offset: 2px; }
.cat-item.active {
  background: var(--splunk-green-muted);
  color: var(--splunk-text-primary);
  font-weight: 600;
  border: 1px solid rgba(0, 176, 124, 0.35);
}
.cat-num {
  width: 24px; height: 24px; border-radius: var(--radius-sm);
  background: var(--splunk-bg-elevated);
  display: flex; align-items: center; justify-content: center;
  font-size: var(--text-xs); font-weight: 600; flex-shrink: 0;
  color: var(--splunk-green);
}
.cat-item.active .cat-num {
  background: var(--splunk-green);
  color: #fff;
}
.cat-count {
  margin-left: auto; font-size: var(--text-xs); color: var(--splunk-text-tertiary);
  background: var(--splunk-bg-elevated); padding: 2px var(--space-2);
  border-radius: var(--radius-sm);
}
.cat-chevron {
  margin-left: var(--space-1); font-size: var(--text-xs); color: var(--splunk-text-tertiary);
  transition: transform 0.2s ease; flex-shrink: 0;
}
.cat-item.active .cat-chevron { transform: rotate(90deg); }
/* Category/subcat labels: up to 2 lines then ellipsis so less text is cut */
.cat-item .cat-name,
.subcat-item .subcat-name {
  min-width: 0;
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  word-break: break-word;
  white-space: normal;
}
.subcat-list {
  max-height: 0; overflow: hidden; transition: max-height 0.25s ease;
  margin-left: var(--space-4); border-left: 1px solid var(--splunk-border-subtle);
}
.subcat-list.open { max-height: 2000px; }
.subcat-item {
  padding: var(--space-1) var(--space-3);
  border-radius: var(--radius-sm);
  cursor: pointer;
  margin: 1px 0;
  font-size: var(--text-sm);
  color: var(--splunk-text-secondary);
  transition: background 0.15s ease;
  display: flex; align-items: center; gap: var(--space-2);
  min-width: 0;
}
.subcat-item:hover { background: var(--splunk-bg-elevated); color: var(--splunk-text-primary); }
.subcat-item.active {
  background: var(--splunk-green-muted);
  color: var(--splunk-green);
  font-weight: 500;
}
.subcat-item .sc-count { margin-left: auto; font-size: var(--text-xs); color: var(--splunk-text-tertiary); flex-shrink: 0; }

/* Main content — top padding matches sidebar content (space-4), left/right gutters */
.main-content {
  min-width: 0;
  padding: var(--space-4) var(--space-6) 0 var(--space-4);
}
.main-content > .glass:first-child,
.main-content > .ov-hero:first-child,
.main-content > .cat-header:first-child { margin-top: 0; }

/* Category header — comfortable padding inside card */
.cat-header {
  padding: var(--space-5) var(--space-8) var(--space-5) var(--space-5);
  margin-bottom: var(--space-5);
  background: var(--splunk-bg-surface);
  border: 1px solid var(--splunk-border-subtle);
  border-radius: var(--radius-lg);
}
.cat-header h2 {
  font-size: var(--text-2xl); font-weight: 700; color: var(--splunk-text-primary);
  margin-bottom: var(--space-2);
}
.cat-header .cat-meta {
  font-size: var(--text-sm); color: var(--splunk-text-secondary);
  display: flex; gap: var(--space-4);
}

/* Filter bar — comfortable spacing from edges */
.filter-bar {
  display: flex; gap: var(--space-2); flex-wrap: wrap; margin-bottom: var(--space-5);
  padding: var(--space-2) 0;
}
.filter-btn {
  padding: var(--space-2) var(--space-3);
  border-radius: var(--radius-md);
  border: 1px solid var(--splunk-border-subtle);
  background: var(--splunk-bg-surface);
  color: var(--splunk-text-secondary);
  font-size: var(--text-sm); font-weight: 500; cursor: pointer;
  font-family: inherit;
  transition: border-color 0.2s, background 0.2s, color 0.2s;
}
.filter-btn:hover { background: var(--splunk-bg-elevated); color: var(--splunk-text-primary); }
.filter-btn:focus-visible { outline: 2px solid var(--splunk-green); outline-offset: 2px; }
.filter-btn.active {
  background: var(--splunk-green-muted);
  border-color: var(--splunk-green);
  color: var(--splunk-green);
}
.filter-btn.crit { border-color: rgba(var(--splunk-critical-rgb), 0.5); }
.filter-btn.crit.active { background: rgba(var(--splunk-critical-rgb), 0.12); color: var(--splunk-critical); }
.filter-btn.high { border-color: rgba(var(--splunk-high-rgb), 0.5); }
.filter-btn.high.active { background: rgba(var(--splunk-high-rgb), 0.12); color: var(--splunk-high); }
.filter-btn.med { border-color: rgba(var(--splunk-medium-rgb), 0.5); }
.filter-btn.med.active { background: rgba(var(--splunk-medium-rgb), 0.12); color: var(--splunk-medium); }
.filter-btn.low2 { border-color: rgba(var(--splunk-low-rgb), 0.5); }
.filter-btn.low2.active { background: rgba(var(--splunk-low-rgb), 0.12); color: var(--splunk-low); }
.filter-sep {
  width: 1px; height: 24px; background: var(--splunk-border-subtle);
  margin: 0 var(--space-1); align-self: center;
}
.filter-btn.beg { border-color: rgba(0, 176, 124, 0.5); }
.filter-btn.beg.active { background: var(--splunk-green-muted); color: var(--splunk-green); }
.filter-btn.inter { border-color: rgba(var(--splunk-intermediate-rgb), 0.5); }
.filter-btn.inter.active { background: rgba(var(--splunk-intermediate-rgb), 0.12); color: var(--splunk-intermediate); }
.filter-btn.advf { border-color: rgba(var(--splunk-high-rgb), 0.5); }
.filter-btn.advf.active { background: rgba(var(--splunk-high-rgb), 0.12); color: var(--splunk-high); }
.filter-btn.expf { border-color: rgba(var(--splunk-critical-rgb), 0.5); }
.filter-btn.expf.active { background: rgba(var(--splunk-critical-rgb), 0.12); color: var(--splunk-critical); }

.uc-diff-badge {
  font-size: var(--text-xs); padding: 2px var(--space-2); border-radius: var(--radius-sm);
  font-weight: 600; flex-shrink: 0; margin-left: auto;
}
.uc-diff-badge.beginner { background: var(--splunk-green-muted); color: var(--splunk-green); }
.uc-diff-badge.intermediate { background: rgba(var(--splunk-intermediate-rgb), 0.12); color: var(--splunk-intermediate); }
.uc-diff-badge.advanced { background: rgba(var(--splunk-high-rgb), 0.12); color: var(--splunk-high); }
.uc-diff-badge.expert { background: rgba(var(--splunk-critical-rgb), 0.12); color: var(--splunk-critical); }

.subcat-section { margin-bottom: var(--space-6); }
.subcat-header {
  font-size: var(--text-base); font-weight: 600; color: var(--splunk-green);
  padding: var(--space-3) 0 var(--space-2); margin-bottom: var(--space-3);
  border-bottom: 1px solid var(--splunk-border-subtle);
  display: flex; align-items: center; gap: var(--space-2);
}
.subcat-count { font-size: var(--text-xs); color: var(--splunk-text-secondary); font-weight: 400; }

/* Use case cards */
.uc-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: var(--space-4);
}
.uc-card {
  padding: var(--space-5);
  cursor: pointer;
  position: relative;
  overflow: hidden;
}
.uc-card:focus-visible { outline: 2px solid var(--splunk-green); outline-offset: 2px; }
.uc-card::before {
  content: '';
  position: absolute; top: 0; left: 0; width: 3px; height: 100%;
  border-radius: 3px 0 0 3px;
}
.uc-card.critical::before { background: var(--splunk-critical); }
.uc-card.high::before { background: var(--splunk-high); }
.uc-card.medium::before { background: var(--splunk-medium); }
.uc-card.low::before { background: var(--splunk-low); }

.uc-card-head {
  display: flex; align-items: flex-start; gap: var(--space-2); margin-bottom: var(--space-2);
}
.uc-id {
  font-size: var(--text-xs); font-weight: 600; font-family: var(--font-mono);
  color: var(--splunk-text-secondary);
  padding: 2px var(--space-2); border-radius: var(--radius-sm);
  background: var(--splunk-bg-elevated);
  flex-shrink: 0;
}
.uc-name { font-size: var(--text-base); font-weight: 600; color: var(--splunk-text-primary); line-height: var(--line-tight); }
.uc-crit-dot {
  width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 6px;
}
.uc-crit-dot.critical { background: var(--splunk-critical); }
.uc-crit-dot.high { background: var(--splunk-high); }
.uc-crit-dot.medium { background: var(--splunk-medium); }
.uc-crit-dot.low { background: var(--splunk-low); }

.uc-value {
  font-size: var(--text-sm); color: var(--splunk-text-secondary);
  line-height: var(--line-normal);
  display: -webkit-box;
  -webkit-line-clamp: 2;
  line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.uc-tags { display: flex; gap: var(--space-2); flex-wrap: wrap; margin-top: var(--space-2); }
.uc-tag {
  font-size: var(--text-xs); padding: 2px var(--space-2); border-radius: var(--radius-sm);
  background: rgba(0, 176, 124, 0.1); color: var(--splunk-green);
  border: 1px solid rgba(0, 176, 124, 0.25);
  font-family: var(--font-mono);
  max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.uc-cim-tag {
  font-size: var(--text-xs); padding: 2px var(--space-2); border-radius: var(--radius-sm);
  background: var(--splunk-green-muted); color: var(--splunk-green);
  border: 1px solid rgba(0, 176, 124, 0.3);
  font-family: var(--font-mono);
  white-space: nowrap;
}
.mitre-link { color: var(--splunk-green); text-decoration: underline; }
.mitre-link:hover { color: var(--splunk-green-hover); }
.uc-mtype-tag {
  font-size: var(--text-xs); padding: 2px var(--space-2); border-radius: var(--radius-sm);
  background: rgba(var(--splunk-intermediate-rgb), 0.12); color: var(--splunk-intermediate);
  border: 1px solid rgba(var(--splunk-intermediate-rgb), 0.25);
  white-space: nowrap;
}

.mtype-filter-wrap {
  display: flex; align-items: center; gap: var(--space-2); flex-wrap: wrap;
  margin-bottom: var(--space-4);
  padding: var(--space-3) 0;
  border-bottom: 1px solid var(--splunk-border-subtle);
}
.mtype-filter-wrap .mtype-label { font-size: var(--text-sm); font-weight: 600; color: var(--splunk-text-secondary); flex-shrink: 0; }
.mtype-filter-chip {
  font-size: var(--text-sm); padding: var(--space-2) var(--space-3); border-radius: var(--radius-md);
  background: var(--splunk-bg-surface);
  border: 1px solid var(--splunk-border-subtle);
  color: var(--splunk-text-secondary); cursor: pointer;
  transition: border-color 0.2s, background 0.2s, color 0.2s;
}
.mtype-filter-chip:hover { background: var(--splunk-bg-elevated); color: var(--splunk-text-primary); }
.mtype-filter-chip.active {
  background: rgba(var(--splunk-intermediate-rgb), 0.12);
  border-color: var(--splunk-intermediate);
  color: var(--splunk-intermediate);
}

/* Modal */
.modal-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0, 0, 0, 0.6);
  z-index: 1000; display: none; justify-content: center; align-items: flex-start;
  padding: 60px var(--space-6); overflow-y: auto;
}
.modal-overlay.show { display: flex; }
.modal {
  width: 100%; max-width: 800px;
  background: var(--splunk-bg-surface);
  border: 1px solid var(--splunk-border-default);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-lg);
  padding: var(--space-8);
  animation: modalIn 0.25s ease-out;
}
@keyframes modalIn {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}
.modal-close {
  position: absolute; top: var(--space-4); right: var(--space-5);
  width: 36px; height: 36px;
  border-radius: var(--radius-md);
  border: 1px solid var(--splunk-border-subtle);
  background: var(--splunk-bg-elevated);
  color: var(--splunk-text-secondary);
  font-size: 18px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.2s, color 0.2s, border-color 0.2s;
  z-index: 10;
}
.modal-close:hover { background: rgba(var(--splunk-critical-rgb), 0.15); color: var(--splunk-critical); border-color: rgba(var(--splunk-critical-rgb), 0.3); }
.modal-close:focus-visible { outline: 2px solid var(--splunk-green); outline-offset: 2px; }

.modal-head {
  display: flex; align-items: flex-start; gap: var(--space-4); margin-bottom: var(--space-6);
  padding-right: 48px;
}
.modal-crit-badge {
  padding: var(--space-1) var(--space-3); border-radius: var(--radius-sm);
  font-size: var(--text-sm); font-weight: 600; flex-shrink: 0;
}
.modal-crit-badge.critical { background: rgba(var(--splunk-critical-rgb), 0.12); color: var(--splunk-critical); border: 1px solid rgba(var(--splunk-critical-rgb), 0.35); }
.modal-crit-badge.high { background: rgba(var(--splunk-high-rgb), 0.12); color: var(--splunk-high); border: 1px solid rgba(var(--splunk-high-rgb), 0.35); }
.modal-crit-badge.medium { background: rgba(var(--splunk-medium-rgb), 0.12); color: var(--splunk-medium); border: 1px solid rgba(var(--splunk-medium-rgb), 0.35); }
.modal-crit-badge.low { background: rgba(var(--splunk-low-rgb), 0.12); color: var(--splunk-low); border: 1px solid rgba(var(--splunk-low-rgb), 0.35); }
.modal-crit-badge.beginner { background: var(--splunk-green-muted); color: var(--splunk-green); border: 1px solid rgba(0, 176, 124, 0.35); }
.modal-crit-badge.intermediate { background: rgba(var(--splunk-intermediate-rgb), 0.12); color: var(--splunk-intermediate); border: 1px solid rgba(var(--splunk-intermediate-rgb), 0.35); }
.modal-crit-badge.advanced { background: rgba(var(--splunk-high-rgb), 0.12); color: var(--splunk-high); border: 1px solid rgba(var(--splunk-high-rgb), 0.35); }
.modal-crit-badge.expert { background: rgba(var(--splunk-critical-rgb), 0.12); color: var(--splunk-critical); border: 1px solid rgba(var(--splunk-critical-rgb), 0.35); }

.modal h2 { font-size: var(--text-xl); font-weight: 700; color: var(--splunk-text-primary); line-height: var(--line-tight); }
.modal-id { font-size: var(--text-sm); font-family: var(--font-mono); color: var(--splunk-text-secondary); margin-top: var(--space-1); }
.modal-section { margin-bottom: var(--space-5); }
.modal-section h3 {
  font-size: var(--text-xs); text-transform: uppercase; letter-spacing: 0.06em;
  color: var(--splunk-green); margin-bottom: var(--space-2); font-weight: 600;
}
.modal-section p, .modal-section div { font-size: var(--text-base); line-height: 1.6; color: var(--splunk-text-primary); }
.impl-expand-section { margin-top: var(--space-2); }
.impl-details {
  border: 1px solid var(--splunk-border-subtle);
  border-radius: var(--radius-md);
  background: var(--splunk-bg-base);
  overflow: hidden;
}
.impl-details-summary {
  padding: var(--space-3) var(--space-4);
  font-size: var(--text-sm); font-weight: 600; color: var(--splunk-green);
  cursor: pointer; list-style: none; user-select: none;
}
.impl-details-summary::-webkit-details-marker { display: none; }
.impl-details-summary::before { content: '▸ '; font-size: var(--text-xs); margin-right: var(--space-2); }
.impl-details[open] .impl-details-summary::before { content: '▾ '; }
.impl-detail-body {
  padding: var(--space-4);
  font-size: var(--text-sm); line-height: 1.6; color: var(--splunk-text-primary);
  border-top: 1px solid var(--splunk-border-subtle);
}
.spl-block {
  background: var(--splunk-bg-base);
  border: 1px solid var(--splunk-border-subtle);
  border-radius: var(--radius-md);
  padding: var(--space-4);
  overflow-x: auto;
  font-family: var(--font-mono);
  font-size: var(--text-sm);
  line-height: 1.5;
  color: var(--splunk-text-secondary);
  white-space: pre-wrap; word-break: break-all;
  position: relative;
}
.spl-block .copy-btn {
  position: absolute; top: var(--space-2); right: var(--space-2);
  padding: var(--space-1) var(--space-2);
  border-radius: var(--radius-sm);
  background: var(--splunk-bg-elevated);
  border: 1px solid var(--splunk-border-subtle);
  color: var(--splunk-text-secondary);
  font-size: var(--text-xs); cursor: pointer;
  font-family: inherit;
  transition: background 0.2s, color 0.2s, border-color 0.2s;
}
.spl-block .copy-btn:hover { background: var(--splunk-green-muted); color: var(--splunk-green); border-color: rgba(0, 176, 124, 0.3); }
.modal-meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-3); }
.meta-item {
  padding: var(--space-3) var(--space-4);
  border-radius: var(--radius-md);
  background: var(--splunk-bg-base);
  border: 1px solid var(--splunk-border-subtle);
}
.meta-item h4 {
  font-size: var(--text-xs); text-transform: uppercase; letter-spacing: 0.05em;
  color: var(--splunk-text-tertiary); margin-bottom: var(--space-1);
}
.meta-item p { font-size: var(--text-sm); color: var(--splunk-text-primary); margin: 0; }

.modal-nav {
  display: flex; justify-content: space-between; align-items: center;
  margin-top: var(--space-6);
  padding-top: var(--space-4);
  border-top: 1px solid var(--splunk-border-subtle);
}
.nav-btn {
  padding: var(--space-2) var(--space-4);
  border-radius: var(--radius-md);
  background: var(--splunk-bg-elevated);
  border: 1px solid var(--splunk-border-subtle);
  color: var(--splunk-text-secondary);
  font-size: var(--text-sm); cursor: pointer;
  font-family: inherit;
  transition: background 0.2s, color 0.2s, border-color 0.2s;
}
.nav-btn:hover { background: var(--splunk-green-muted); color: var(--splunk-green); border-color: rgba(0, 176, 124, 0.35); }
.nav-btn:focus-visible { outline: 2px solid var(--splunk-green); outline-offset: 2px; }
.nav-btn:disabled { opacity: 0.4; cursor: not-allowed; }

.no-results { text-align: center; padding: 60px var(--space-5); color: var(--splunk-text-secondary); }
.no-results .big { font-size: 48px; margin-bottom: var(--space-3); }
.no-results p { font-size: var(--text-base); }

/* Overview hero — comfortable padding; clear left indent so title isn’t flush */
.ov-hero {
  padding: var(--space-5) var(--space-6) var(--space-6) var(--space-8);
  background: var(--splunk-bg-surface);
  border: 1px solid var(--splunk-border-subtle);
  border-radius: var(--radius-lg);
  margin-bottom: var(--space-6);
}
.ov-hero-badge {
  display: inline-flex; align-items: center; gap: var(--space-2);
  padding: var(--space-1) var(--space-3);
  border-radius: 999px;
  background: var(--splunk-green-muted);
  border: 1px solid rgba(0, 176, 124, 0.35);
  font-size: var(--text-xs); font-weight: 600; color: var(--splunk-green);
  margin-bottom: var(--space-4);
}
.ov-hero h2 {
  font-size: var(--text-2xl); font-weight: 700; color: var(--splunk-text-primary);
  letter-spacing: -0.02em; margin-bottom: var(--space-3); line-height: var(--line-tight);
}
.ov-hero h2 span { color: var(--splunk-green); }
.ov-hero p {
  font-size: var(--text-base); color: var(--splunk-text-secondary);
  max-width: 640px; line-height: 1.6;
}
.ov-stats {
  display: flex; gap: var(--space-8); margin-top: var(--space-6); flex-wrap: wrap;
}
.ov-stat-num { font-size: 28px; font-weight: 700; color: var(--splunk-green); line-height: 1; }
.ov-stat-label { font-size: var(--text-xs); color: var(--splunk-text-tertiary); margin-top: var(--space-1); text-transform: uppercase; letter-spacing: 0.05em; font-weight: 500; }
.ov-stat-clickable {
  cursor: pointer; border-radius: var(--radius-md); padding: var(--space-2) var(--space-3);
  margin: calc(-1 * var(--space-2)) calc(-1 * var(--space-3)); transition: background 0.2s;
  background: none; border: none; color: inherit; font: inherit; text-align: left;
}
.ov-stat-clickable:hover { background: var(--splunk-bg-elevated); }
.ov-stat-clickable:hover .ov-stat-num { color: var(--splunk-green-hover); }
.ov-stat-clickable:focus-visible { outline: 2px solid var(--splunk-green); outline-offset: 2px; }

.ov-roadmap {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: var(--space-4);
  margin-bottom: var(--space-6);
}
.ov-phase {
  background: var(--splunk-bg-surface);
  border: 1px solid var(--splunk-border-subtle);
  border-radius: var(--radius-lg);
  padding: var(--space-5) var(--space-6);
}
.ov-phase-num {
  font-size: var(--text-xs); font-weight: 700; color: var(--splunk-green);
  text-transform: uppercase; letter-spacing: 0.05em;
  margin-bottom: var(--space-2);
}
.ov-phase h3 { font-size: var(--text-base); font-weight: 600; color: var(--splunk-text-primary); margin-bottom: var(--space-2); }
.ov-phase p { font-size: var(--text-sm); color: var(--splunk-text-secondary); line-height: 1.5; margin-bottom: var(--space-2); }
.ov-phase-items { list-style: none; }
.ov-phase-items li {
  font-size: var(--text-xs); color: var(--splunk-text-primary);
  padding: var(--space-1) 0 var(--space-1) var(--space-4);
  position: relative;
}
.ov-phase-items li::before { content: '▸'; position: absolute; left: 0; color: var(--splunk-green); }

.ov-diff-legend {
  display: flex; gap: var(--space-4); flex-wrap: wrap;
  margin: var(--space-4) 0 var(--space-5);
  padding: var(--space-5);
  background: var(--splunk-bg-surface);
  border: 1px solid var(--splunk-border-subtle);
  border-radius: var(--radius-md);
}
.ov-diff-item { display: flex; align-items: center; gap: var(--space-2); font-size: var(--text-sm); color: var(--splunk-text-secondary); }
.ov-diff-dot { width: 8px; height: 8px; border-radius: 2px; }
.ov-diff-dot.beginner { background: var(--splunk-green); }
.ov-diff-dot.intermediate { background: var(--splunk-intermediate); }
.ov-diff-dot.advanced { background: var(--splunk-high); }
.ov-diff-dot.expert { background: var(--splunk-critical); }

.ov-filter-wrap { display: flex; gap: var(--space-2); flex-wrap: wrap; margin-bottom: var(--space-5); }
.ov-filter-chip {
  padding: var(--space-2) var(--space-3);
  border-radius: var(--radius-md);
  border: 1px solid var(--splunk-border-subtle);
  background: var(--splunk-bg-surface);
  color: var(--splunk-text-secondary);
  font-size: var(--text-sm); font-weight: 500; cursor: pointer;
  transition: border-color 0.2s, background 0.2s, color 0.2s;
  font-family: inherit;
}
.ov-filter-chip:hover { background: var(--splunk-bg-elevated); color: var(--splunk-text-primary); }
.ov-filter-chip.active {
  background: var(--splunk-green-muted);
  border-color: var(--splunk-green);
  color: var(--splunk-green);
}
.ov-quickwins-list { margin-top: var(--space-4); }
.ov-quickwins-title { font-size: var(--text-lg); font-weight: 600; color: var(--splunk-text-primary); margin-bottom: var(--space-4); }
.ov-quickwins-section { margin-bottom: var(--space-6); }
.ov-subcat-list { display: flex; flex-direction: column; gap: var(--space-1); }
.ov-subcat-row {
  display: flex; align-items: center; gap: var(--space-4); padding: var(--space-3) var(--space-4);
  background: var(--splunk-bg-surface); border: 1px solid var(--splunk-border-subtle);
  border-radius: var(--radius-md); cursor: pointer; text-align: left; font: inherit; color: var(--splunk-text-primary);
  transition: background 0.2s, border-color 0.2s;
}
.ov-subcat-row:hover { background: var(--splunk-bg-elevated); border-color: var(--splunk-border-default); color: var(--splunk-green); }
.ov-subcat-id { font-family: var(--font-mono); font-size: var(--text-sm); font-weight: 600; color: var(--splunk-green); min-width: 48px; }
.ov-subcat-name { flex: 1; font-weight: 500; }
.ov-subcat-count { font-size: var(--text-sm); color: var(--splunk-text-secondary); }

.ov-cat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: var(--space-4); }
.ov-cat-card {
  background: var(--splunk-bg-surface);
  border: 1px solid var(--splunk-border-subtle);
  border-radius: var(--radius-lg);
  padding: var(--space-5);
  cursor: pointer;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.ov-cat-card:hover {
  border-color: var(--splunk-border-default);
  box-shadow: var(--shadow-md);
}
.ov-cat-card.expanded {
  grid-column: 1 / -1;
  border-color: var(--splunk-green);
  background: var(--splunk-bg-elevated);
}
.ov-cat-head { display: flex; align-items: flex-start; gap: var(--space-3); margin-bottom: var(--space-2); }
.ov-cat-icon {
  font-size: 24px; flex-shrink: 0;
  width: 40px; height: 40px;
  display: flex; align-items: center; justify-content: center;
  background: var(--splunk-bg-elevated);
  border-radius: var(--radius-md);
}
.ov-cat-head h3 { font-size: var(--text-base); font-weight: 600; color: var(--splunk-text-primary); line-height: var(--line-tight); }
.ov-cat-head .ov-cat-num { font-size: var(--text-xs); color: var(--splunk-green); font-weight: 600; font-family: var(--font-mono); }
.ov-cat-head .ov-cat-count {
  margin-left: auto; font-size: var(--text-xs); color: var(--splunk-text-tertiary);
  background: var(--splunk-bg-base); padding: 2px var(--space-2); border-radius: var(--radius-sm);
  flex-shrink: 0;
}
.ov-expand-arrow { font-size: var(--text-xs); transition: transform 0.2s; color: var(--splunk-text-tertiary); margin-left: var(--space-1); }
.ov-cat-card.expanded .ov-expand-arrow { transform: rotate(90deg); }
.ov-cat-desc { font-size: var(--text-sm); color: var(--splunk-text-secondary); line-height: 1.5; margin-bottom: var(--space-2); }
.ov-cat-quick {
  font-size: var(--text-sm); color: var(--splunk-green);
  padding: var(--space-2) var(--space-3);
  background: var(--splunk-green-muted);
  border-radius: var(--radius-md);
  border: 1px solid rgba(0, 176, 124, 0.25);
  line-height: 1.4;
}
.ov-cat-quick strong { color: var(--splunk-green); font-weight: 600; }

.ov-starter-list { margin-top: var(--space-4); display: none; }
.ov-cat-card.expanded .ov-starter-list { display: block; }
.ov-starter-uc {
  padding: var(--space-3);
  background: var(--splunk-bg-base);
  border: 1px solid var(--splunk-border-subtle);
  border-radius: var(--radius-md);
  margin-bottom: var(--space-2);
  transition: border-color 0.2s, background 0.2s;
  cursor: pointer;
}
.ov-starter-uc:hover { background: var(--splunk-bg-elevated); border-color: var(--splunk-border-default); }
.ov-starter-head { display: flex; align-items: center; gap: var(--space-2); margin-bottom: var(--space-1); flex-wrap: wrap; }
.ov-starter-name { font-size: var(--text-sm); font-weight: 600; color: var(--splunk-text-primary); }
.ov-starter-id {
  font-size: var(--text-xs); color: var(--splunk-text-secondary);
  font-family: var(--font-mono);
  background: var(--splunk-bg-elevated); padding: 2px var(--space-2); border-radius: var(--radius-sm);
}
.ov-badge { font-size: 9px; padding: 2px var(--space-2); border-radius: var(--radius-sm); font-weight: 600; }
.ov-badge.critical { background: rgba(var(--splunk-critical-rgb), 0.12); color: var(--splunk-critical); }
.ov-badge.high { background: rgba(var(--splunk-high-rgb), 0.12); color: var(--splunk-high); }
.ov-badge.beginner { background: var(--splunk-green-muted); color: var(--splunk-green); }
.ov-badge.intermediate { background: rgba(var(--splunk-intermediate-rgb), 0.12); color: var(--splunk-intermediate); }
.ov-starter-value { font-size: var(--text-sm); color: var(--splunk-text-secondary); line-height: 1.4; margin-bottom: var(--space-2); }
.ov-starter-ta { font-size: var(--text-xs); color: var(--splunk-green); font-family: var(--font-mono); }
.ov-spl-toggle {
  font-size: var(--text-sm); color: var(--splunk-green); cursor: pointer; font-weight: 500;
  margin-top: var(--space-1); user-select: none;
}
.ov-spl-toggle:hover { color: var(--splunk-green-hover); }
.ov-spl-block {
  display: none; margin-top: var(--space-2); padding: var(--space-3);
  background: var(--splunk-bg-base);
  border: 1px solid var(--splunk-border-subtle);
  border-radius: var(--radius-md);
  font-family: var(--font-mono); font-size: var(--text-sm);
  line-height: 1.5; color: var(--splunk-text-secondary);
  white-space: pre-wrap; word-break: break-all;
}
.ov-spl-block.show { display: block; }
.ov-spl-block .copy-btn {
  display: block; margin-left: auto; margin-top: var(--space-2); padding: var(--space-1) var(--space-3);
  border-radius: var(--radius-sm);
  background: var(--splunk-green-muted);
  border: 1px solid rgba(0, 176, 124, 0.35);
  color: var(--splunk-green); font-size: var(--text-xs); cursor: pointer;
  font-family: inherit; font-weight: 500;
  transition: background 0.2s, color 0.2s;
}
.ov-spl-block .copy-btn:hover { background: rgba(0, 176, 124, 0.25); color: var(--splunk-green-hover); }

.ov-section-title { font-size: var(--text-xl); font-weight: 700; color: var(--splunk-text-primary); margin-bottom: var(--space-2); }
.ov-section-title.ov-collapsible {
  cursor: pointer; user-select: none; display: inline-flex; align-items: center; gap: var(--space-1);
  padding: var(--space-2) var(--space-3); border-radius: var(--radius-md);
  transition: background 0.2s;
}
.ov-section-title.ov-collapsible:hover { background: var(--splunk-bg-elevated); }
.ov-collapse-arrow { font-size: 12px; transition: transform 0.25s ease; color: var(--splunk-green); }
.ov-collapse-arrow.open { transform: rotate(90deg); }
.ov-collapsible-body { overflow: hidden; }
.ov-section-sub { font-size: var(--text-sm); color: var(--splunk-text-secondary); margin-bottom: var(--space-6); }

.sidebar-toggle {
  display: none;
  align-items: center; justify-content: center;
  width: 40px; height: 40px; flex-shrink: 0;
  background: var(--splunk-bg-elevated);
  border: 1px solid var(--splunk-border-subtle);
  border-radius: var(--radius-md);
  color: var(--splunk-text-primary);
  font-size: 18px; cursor: pointer;
  transition: background 0.2s;
}
.sidebar-toggle:hover { background: var(--splunk-bg-overlay); }

@media (max-width: 900px) {
  .app-layout { grid-template-columns: 1fr; padding: var(--space-4); }
  .main-content { padding: 0; }
  .sidebar { width: 100%; position: relative; top: 0; max-height: none; display: flex; flex-wrap: wrap; gap: var(--space-1); padding: var(--space-3); }
  .cat-item { padding: var(--space-2) var(--space-3); font-size: var(--text-sm); }
  .uc-grid { grid-template-columns: 1fr; }
  .modal-meta-grid { grid-template-columns: 1fr; }
  .header-inner { gap: var(--space-3); }
  .ov-roadmap { grid-template-columns: repeat(2, 1fr); }
  .ov-cat-grid { grid-template-columns: repeat(2, 1fr); }
}

@media (max-width: 600px) {
  header { padding: var(--space-2) var(--space-4); }
  .header-inner { gap: var(--space-2); flex-wrap: nowrap; }
  .logo .subtitle { display: none; }
  .logo h1 { font-size: var(--text-base); }
  .search-wrap { order: 3; flex-basis: 100%; min-width: 0; max-width: 100%; }
  .header-inner { flex-wrap: wrap; }
  .header-stat { display: none; }
  .sidebar-toggle { display: flex; }
  .sidebar { display: none; flex-direction: column; flex-wrap: nowrap; }
  .sidebar.open { display: flex; }
  .app-layout { padding: var(--space-3); gap: var(--space-3); }
  .cat-header { padding: var(--space-5) var(--space-4); }
  .cat-header h2 { font-size: var(--text-xl); }
  .cat-header .cat-meta { font-size: var(--text-sm); gap: var(--space-2); flex-wrap: wrap; }
  .filter-bar { gap: var(--space-2); }
  .filter-btn { padding: var(--space-2) var(--space-3); font-size: var(--text-sm); }
  .uc-grid { gap: var(--space-3); }
  .uc-card { padding: var(--space-3); }
  .modal-overlay { padding: 0; align-items: flex-end; }
  .modal {
    max-width: 100%; width: 100%;
    border-radius: var(--radius-lg) var(--radius-lg) 0 0;
    max-height: 92vh; overflow-y: auto;
  }
  .modal-close { top: var(--space-3); right: var(--space-4); }

}

1.2","n":"PDU Power per Rack","c":"high","f":"beginner","v":"Per-rack power monitoring prevents circuit overloads and enables efficient rack placement for new equipment.","t":"SNMP TA (PDU-MIB), vendor API","d":"Smart PDU per-outlet and per-circuit metrics","q":"index=power sourcetype=\"snmp:pdu\"\n| eval pct_capacity=round(current_amps/rated_amps*100,1)\n| where pct_capacity > 80\n| table rack_id, pdu_name, circuit, current_amps, rated_amps, pct_capacity","m":"Poll PDU metrics via SNMP. Track per-outlet and per-circuit power. Alert when any circuit exceeds 80% capacity. Report on rack power distribution for capacity planning. Track power trends per rack.","z":"Heatmap (rack \u00d7 power usage), Gauge (% capacity per circuit), Bar chart (power by rack), Table (overloaded circuits)."},{"i":"15.1.3","n":"Power Redundancy Status","c":"critical","f":"intermediate","v":"Loss of A/B feed redundancy means a single power failure will cause an outage. Immediate awareness enables emergency response.","t":"SNMP TA, PDU/UPS events","d":"PDU input status, UPS input voltage, transfer switch events","q":"index=power sourcetype=\"snmp:pdu\"\n| where input_status!=\"normal\" OR input_voltage < 180\n| table _time, pdu_name, rack_id, feed, input_status, input_voltage","m":"Monitor PDU input status and UPS input voltage. Alert immediately on loss of any power feed. Track ATS (Automatic Transfer Switch) events. Maintain power topology documentation for impact analysis.","z":"Status grid (rack \u00d7 A/B feed status), Table (power events), Timeline (redundancy loss events), Single value (racks with full redundancy %)."},{"i":"15.1.4","n":"Generator Test Results","c":"high","f":"beginner","v":"Generators are the last line of defense during extended outages. Failed tests mean they may not start when needed.","t":"BMS integration, manual log input","d":"Generator controller logs, BMS events","q":"index=power sourcetype=\"generator:test\"\n| stats latest(result) as last_result, latest(_time) as last_test by generator_id\n| eval days_since_test=round((now()-last_test)/86400)\n| where last_result!=\"pass\" OR days_since_test > 30","m":"Log generator test results (manual or automated). Track test frequency and outcomes. Alert on failed tests and missed test schedules. Monitor fuel levels. Report on generator readiness for management.","z":"Table (generator test history), Single value (days since last test), Status indicator (pass/fail)."},{"i":"15.1.5","n":"PUE Calculation","c":"medium","f":"beginner","v":"Power Usage Effectiveness is the primary data center efficiency metric. Trending drives energy optimization and sustainability goals.","t":"Aggregate power metrics from PDU/UPS/BMS","d":"Total facility power, IT load power","q":"index=power sourcetype=\"power:aggregate\"\n| timechart span=1h avg(total_facility_kw) as facility, avg(it_load_kw) as it_load\n| eval pue=round(facility/it_load,2)","m":"Aggregate total facility power and IT equipment power from PDU/UPS/BMS data. Calculate PUE hourly and daily. Track seasonal variation. Report monthly to operations and sustainability teams. Target PUE <1.5.","z":"Gauge (current PUE), Line chart (PUE trend), Single value (monthly average PUE), Bar chart (PUE by month)."},{"i":"15.1.6","n":"Circuit Breaker Trips","c":"critical","f":"beginner","v":"Breaker trips cause immediate power loss to affected equipment. Detection enables rapid response and root cause investigation.","t":"PDU/BMS event logs","d":"PDU events, BMS alerts, UPS transfer events","q":"index=power sourcetype=\"pdu:events\" OR sourcetype=\"bms:events\"\n| search \"breaker\" OR \"overcurrent\" OR \"trip\"\n| table _time, device, location, event_type, circuit, message","m":"Forward PDU and BMS events to Splunk. Alert immediately on breaker trips or overcurrent events. Track affected equipment from PDU-to-server mapping. Investigate root cause (overload, short circuit, equipment failure).","z":"Timeline (breaker events), Table (trip details), Single value (trips this month)."}]},{"i":"15.2","n":"Cooling & Environmental","u":[{"i":"15.2.1","n":"Temperature Monitoring per Zone","c":"critical","f":"beginner","v":"Data center temperature exceedances risk equipment damage and unplanned shutdowns. Per-zone monitoring localizes issues.","t":"SNMP environmental sensors","d":"Environmental sensors (intake, exhaust, ambient temperature)","q":"index=environment sourcetype=\"sensor:temperature\"\n| where temp_f > 80 OR temp_f < 64\n| table _time, zone, rack, sensor_position, temp_f\n| sort -temp_f","m":"Deploy temperature sensors per ASHRAE recommendations (intake, exhaust, per-row). Poll via SNMP every minute. Alert on exceedance of ASHRAE A1 limits (64-80\u00b0F intake). Correlate with cooling unit status.","z":"Heatmap (zone \u00d7 temperature), Line chart (temperature trend per zone), Floor plan visualization, Single value (hottest zone)."},{"i":"15.2.2","n":"Humidity Monitoring","c":"high","f":"beginner","v":"Low humidity causes ESD risk; high humidity causes condensation. Maintaining 40-60% RH protects equipment.","t":"SNMP environmental sensors","d":"Humidity sensors","q":"index=environment sourcetype=\"sensor:humidity\"\n| where humidity_pct > 60 OR humidity_pct < 40\n| table _time, zone, humidity_pct","m":"Deploy humidity sensors alongside temperature sensors. Alert on out-of-range humidity (below 40% or above 60% RH). Track dew point to prevent condensation. Correlate with HVAC system humidifier/dehumidifier operation.","z":"Line chart (humidity trend), Gauge (current humidity per zone), Table (zones out of range)."},{"i":"15.2.3","n":"CRAC/CRAH Unit Health","c":"critical","f":"beginner","v":"Cooling unit failures can cause rapid temperature rise. Monitoring operational status enables immediate response and failover.","t":"BMS/SNMP integration","d":"CRAC/CRAH unit SNMP metrics, BMS alarms","q":"index=cooling sourcetype=\"bms:crac\"\n| where unit_status!=\"running\" OR supply_temp_f > setpoint_f + 5 OR compressor_status!=\"normal\"\n| table _time, unit_name, unit_status, supply_temp_f, setpoint_f, compressor_status","m":"Monitor cooling unit operational status, supply/return temperatures, and compressor health via SNMP/BMS. Alert on unit failure or degraded performance. Track runtime hours for maintenance scheduling.","z":"Status grid (unit \u00d7 operational status), Table (unit health), Line chart (supply/return temps), Gauge (cooling capacity %)."},{"i":"15.2.4","n":"Hot Aisle Temperature Trending","c":"medium","f":"intermediate","v":"Hot aisle trends indicate cooling efficiency and capacity margin. Rising trends signal approaching cooling limits.","t":"Environmental sensors","d":"Hot aisle return air temperature sensors","q":"index=environment sourcetype=\"sensor:temperature\" position=\"hot_aisle\"\n| timechart span=1h avg(temp_f) as avg_temp by zone\n| predict avg_temp as predicted future_timespan=7","m":"Deploy sensors in hot aisle containment. Track return air temperatures. Compare hot aisle temps across zones to identify cooling imbalances. Use prediction to forecast capacity issues.","z":"Line chart (hot aisle temps with prediction), Heatmap (zone \u00d7 time), Bar chart (avg hot aisle by zone)."},{"i":"15.2.5","n":"Water Leak Detection","c":"critical","f":"intermediate","v":"Water in a data center causes immediate equipment damage and potential electrical hazards. Seconds matter in detection.","t":"Leak detection sensor inputs","d":"Water leak detection system (rope sensors, spot detectors)","q":"index=environment sourcetype=\"leak_detection\"\n| where leak_detected=\"true\"\n| table _time, zone, sensor_id, location_description","m":"Deploy water leak detection sensors under raised floors, near CRAC units, and along pipe routes. Alert at critical priority on any detection. Integrate with building facilities team notification. Test sensors quarterly.","z":"Single value (active leak alerts \u2014 target: 0), Floor plan (sensor locations with status), Timeline (leak events)."},{"i":"15.2.6","n":"Cooling Capacity Planning","c":"medium","f":"beginner","v":"Trending cooling load vs capacity ensures adequate cooling for current and planned equipment deployments.","t":"BMS metrics","d":"CRAC/CRAH cooling output, IT heat load calculations","q":"index=cooling sourcetype=\"bms:cooling_capacity\"\n| timechart span=1d avg(cooling_output_kw) as output, avg(cooling_capacity_kw) as capacity\n| eval utilization_pct=round(output/capacity*100,1)","m":"Calculate cooling load from IT power consumption (1 watt IT \u2248 3.41 BTU/h heat). Compare against total cooling capacity. Track utilization percentage. Alert when approaching 80% capacity. Plan for seasonal variations.","z":"Dual-axis chart (load vs capacity), Gauge (cooling utilization %), Line chart (utilization trend)."}]},{"i":"15.3","n":"Physical Security","u":[{"i":"15.3.1","n":"Badge Access Audit","c":"high","f":"beginner","v":"Complete badge access audit trail is required for compliance (SOC2, PCI-DSS) and supports security investigations.","t":"Access control syslog/API","d":"Access control system events","q":"index=physical sourcetype=\"access_control\"\n| table _time, badge_holder, badge_id, door, action, result\n| sort -_time","m":"Forward access control events to Splunk. Parse all badge events (granted, denied, door held, forced). Retain per compliance requirements. Enable search by person, door, or time for investigations.","z":"Table (access log), Bar chart (access by door), Timeline (access events for person), Single value (total access today)."},{"i":"15.3.2","n":"After-Hours Access Alerts","c":"high","f":"intermediate","v":"Data center access outside business hours requires additional scrutiny. Alerts ensure authorized personnel are verified.","t":"Access control system","d":"Access events with time-based rules","q":"index=physical sourcetype=\"access_control\" result=\"granted\"\n| eval hour=strftime(_time,\"%H\")\n| where (hour < 6 OR hour > 22) AND NOT match(badge_holder, \"NOC|Security|Facilities\")\n| table _time, badge_holder, door, badge_id","m":"Define business hours per facility. Alert on access outside hours (excluding authorized roles like NOC, security). Require pre-authorization for after-hours access. Track after-hours access patterns.","z":"Table (after-hours access events), Bar chart (after-hours by person), Heatmap (time \u00d7 access volume)."},{"i":"15.3.3","n":"Tailgating Detection","c":"high","f":"intermediate","v":"Tailgating bypasses access control, allowing unauthorized entry. Detection supports physical security integrity.","t":"Access control system","d":"Access events (badge-in vs badge-out patterns)","q":"index=physical sourcetype=\"access_control\" door=\"DC_Main_Entry\"\n| transaction badge_id maxspan=10s\n| where eventcount > 1 AND action=\"entry\"\n| table _time, badge_holder, badge_id, eventcount","m":"Analyze badge-in/badge-out patterns. Detect multiple entries without corresponding exits (or vice versa). Alert on anti-passback violations. Correlate with camera footage for investigation. Report on tailgating trends.","z":"Table (tailgating events), Bar chart (by door), Line chart (tailgating trend), Single value (incidents this week)."},{"i":"15.3.4","n":"Camera System Health","c":"high","f":"beginner","v":"Offline cameras create security blind spots. Monitoring ensures continuous surveillance coverage.","t":"NVR/VMS syslog or API","d":"Video management system logs (camera status, recording status)","q":"index=physical sourcetype=\"vms:camera_status\"\n| where recording_status!=\"recording\" OR connection_status!=\"connected\"\n| table camera_id, location, connection_status, recording_status, last_frame","m":"Poll camera/NVR status via API or forward VMS events. Alert on camera offline, recording failure, or storage issues. Track camera uptime percentage. Report on coverage gaps.","z":"Status grid (camera \u00d7 status), Table (offline cameras), Single value (cameras recording %), Floor plan (camera locations with status)."},{"i":"15.3.5","n":"Cabinet Door Monitoring","c":"medium","f":"beginner","v":"Unauthorized cabinet access could indicate tampering. Door sensors provide granular physical security for critical racks.","t":"Cabinet lock sensor input","d":"Smart cabinet lock events","q":"index=physical sourcetype=\"cabinet_lock\"\n| where action=\"opened\" AND NOT authorized=\"true\"\n| table _time, rack_id, user, action, method","m":"Deploy smart cabinet locks with event logging. Forward events to Splunk. Alert on unauthorized openings. Track door open duration. Correlate with badge access events for validation. Report on cabinet access frequency.","z":"Table (cabinet access events), Timeline (open/close events), Bar chart (access by rack)."}]}]},{"i":16,"n":"Service Management & ITSM","s":[{"i":"16.1","n":"Ticketing Systems","u":[{"i":"16.1.1","n":"Incident Volume Trending","c":"high","f":"intermediate","v":"Incident trends reveal infrastructure stability, staffing needs, and the effectiveness of problem management.","t":"`Splunk_TA_snow`","d":"ServiceNow incident table","q":"index=itsm sourcetype=\"snow:incident\"\n| timechart span=1d count by priority","m":"Ingest ServiceNow incidents via TA. Track creation rates by category, priority, and assignment group. Alert on volume spikes. Compare against historical baselines. Report on trending categories for problem management input.","z":"Line chart (incident volume trend), Stacked bar (by priority), Pie chart (by category), Table (today's incidents)."},{"i":"16.1.2","n":"SLA Compliance Monitoring","c":"critical","f":"beginner","v":"SLA breaches affect customer satisfaction and contractual obligations. Real-time monitoring enables intervention before breaches occur.","t":"`Splunk_TA_snow`","d":"ServiceNow SLA records (response, resolution)","q":"index=itsm sourcetype=\"snow:incident\"\n| eval response_met=if(response_time<=response_sla,\"Yes\",\"No\")\n| eval resolution_met=if(resolution_time<=resolution_sla,\"Yes\",\"No\")\n| stats count(eval(response_met=\"Yes\")) as met, count as total by priority\n| eval compliance_pct=round(met/total*100,1)","m":"Track response and resolution times against SLA targets per priority. Alert when tickets approach SLA breach. Report on compliance percentage per priority and assignment group. Identify teams with consistent breaches.","z":"Gauge (SLA compliance %), Bar chart (compliance by priority), Table (tickets approaching breach), Line chart (compliance trend)."},{"i":"16.1.3","n":"MTTR by Category","c":"high","f":"beginner","v":"MTTR per category identifies where process improvements or automation would have the greatest impact.","t":"`Splunk_TA_snow`","d":"Incident lifecycle data (open, assigned, resolved timestamps)","q":"index=itsm sourcetype=\"snow:incident\" state=\"resolved\"\n| eval mttr_hours=round((resolved_at-opened_at)/3600,1)\n| stats avg(mttr_hours) as avg_mttr, median(mttr_hours) as median_mttr by category\n| sort -avg_mttr","m":"Calculate MTTR from incident open to resolution timestamps. Break down by category, subcategory, and assignment group. Track trends over time. Set MTTR targets per category and report on achievement.","z":"Bar chart (MTTR by category), Line chart (MTTR trend), Table (category MTTR summary), Histogram (resolution time distribution)."},{"i":"16.1.4","n":"Change Success Rate","c":"high","f":"beginner","v":"Failed changes are the leading cause of incidents. Tracking success rate drives improvement in change management practices.","t":"`Splunk_TA_snow`","d":"ServiceNow change records","q":"index=itsm sourcetype=\"snow:change_request\"\n| stats count(eval(close_code=\"successful\")) as success, count(eval(close_code=\"failed\")) as failed, count as total by type\n| eval success_rate=round(success/total*100,1)","m":"Ingest change request records. Track outcomes (successful, failed, backed out). Calculate success rate by change type (standard, normal, emergency). Alert on failed changes. Report on DORA change failure rate metric.","z":"Pie chart (change outcomes), Bar chart (success rate by type), Line chart (success rate trend), Single value (overall success rate)."},{"i":"16.1.5","n":"Change Collision Detection","c":"high","f":"intermediate","v":"Overlapping changes on related systems increase outage risk. Detection enables coordination and conflict resolution.","t":"`Splunk_TA_snow`","d":"Change calendar, CI relationships","q":"index=itsm sourcetype=\"snow:change_request\" state=\"scheduled\"\n| eval change_window_start=start_date, change_window_end=end_date\n| join type=inner cmdb_ci [| search index=itsm sourcetype=\"snow:change_request\" state=\"scheduled\"]\n| where change_window_start < end_date AND change_window_end > start_date AND change_id!=other_change_id","m":"Analyze scheduled change windows for overlapping CIs. Cross-reference CI relationships for dependent systems. Alert when changes to related systems overlap. Create change calendar view for CAB review.","z":"Calendar view (change windows), Table (colliding changes), Gantt chart (change timeline)."},{"i":"16.1.6","n":"Problem Trending","c":"medium","f":"beginner","v":"Identifying recurring incident patterns that should become problems drives root cause resolution and reduces incident volume.","t":"`Splunk_TA_snow`","d":"Incident categorization data, problem records","q":"index=itsm sourcetype=\"snow:incident\"\n| stats count by category, subcategory, cmdb_ci\n| where count > 5\n| sort -count\n| head 20","m":"Analyze incident patterns by category, CI, and assignment group. Identify recurring incidents (>5 in 30 days). Flag candidates for problem record creation. Track problem management effectiveness (repeat incidents after RCA).","z":"Table (top recurring incidents), Bar chart (repeat incidents by category), Line chart (repeat rate trend)."},{"i":"16.1.7","n":"Ticket Reassignment Rate","c":"medium","f":"beginner","v":"High reassignment rates indicate poor routing or skills gaps. Reduction improves MTTR and customer satisfaction.","t":"`Splunk_TA_snow`","d":"Incident audit trail (assignment changes)","q":"index=itsm sourcetype=\"snow:incident\"\n| stats dc(assignment_group) as group_count, count as reassignments by number\n| where group_count > 2\n| sort -group_count","m":"Track assignment group changes per ticket. Calculate average reassignments. Identify tickets with >2 reassignments (ping-pong tickets). Report on routing accuracy by category. Improve auto-routing rules.","z":"Bar chart (avg reassignments by category), Table (most-reassigned tickets), Line chart (reassignment rate trend), Single value (avg reassignments)."},{"i":"16.1.8","n":"Aging Ticket Alerts","c":"medium","f":"intermediate","v":"Aging tickets indicate stuck processes or forgotten issues. Alerts ensure nothing falls through the cracks.","t":"`Splunk_TA_snow`","d":"Open incident data","q":"index=itsm sourcetype=\"snow:incident\" state IN (\"new\",\"in_progress\",\"on_hold\")\n| eval age_days=round((now()-opened_at)/86400)\n| eval age_threshold=case(priority=1,1, priority=2,3, priority=3,7, 1=1,14)\n| where age_days > age_threshold\n| table number, short_description, priority, assignment_group, age_days\n| sort -age_days","m":"Calculate ticket age against priority-based thresholds. Alert when tickets exceed expected resolution time. Escalate automatically via workflow rules. Report on aging ticket inventory daily.","z":"Table (aging tickets), Bar chart (aging by priority), Single value (total aging tickets), Line chart (aging trend)."},{"i":"16.1.9","n":"Change-Incident Correlation","c":"critical","f":"intermediate","v":"Correlating incidents with recent changes is the fastest path to root cause. Automated correlation accelerates MTTR.","t":"`Splunk_TA_snow` + monitoring data","d":"Change records + incident records + monitoring events","q":"index=itsm sourcetype=\"snow:incident\" priority IN (1,2)\n| join type=left cmdb_ci\n    [search index=itsm sourcetype=\"snow:change_request\" close_code=\"successful\" earliest=-24h\n     | table cmdb_ci, number as change_number, short_description as change_desc, end_date]\n| where isnotnull(change_number)\n| table number, short_description, cmdb_ci, change_number, change_desc","m":"When high-priority incidents are created, automatically search for changes completed in the last 24 hours on related CIs. Present correlation to incident team. Track change-related incident percentage. Feed back to change management.","z":"Table (incident-change correlation), Single value (% incidents with recent change), Timeline (changes + incidents overlaid)."},{"i":"16.1.10","n":"Service Request Fulfillment Time","c":"medium","f":"beginner","v":"Fulfillment time metrics drive service catalog optimization and customer satisfaction. Slow fulfillment reduces adoption.","t":"`Splunk_TA_snow`","d":"Service request data","q":"index=itsm sourcetype=\"snow:sc_request\"\n| eval fulfillment_hours=round((closed_at-opened_at)/3600,1)\n| stats avg(fulfillment_hours) as avg_hours, median(fulfillment_hours) as median_hours by cat_item\n| sort -avg_hours","m":"Track service request lifecycle from submission to fulfillment. Calculate fulfillment time per catalog item. Identify items with slow fulfillment for automation opportunities. Report on catalog efficiency.","z":"Bar chart (avg fulfillment by item), Table (catalog item performance), Line chart (fulfillment time trend)."}]},{"i":"16.2","n":"Configuration Management (CMDB)","u":[{"i":"16.2.1","n":"CMDB Data Quality Score","c":"high","f":"beginner","v":"Poor CMDB data quality undermines all ITSM processes. Scoring and trending drives data quality improvement initiatives.","t":"`Splunk_TA_snow`, custom metrics","d":"CMDB CI data (completeness, accuracy, freshness)","q":"index=itsm sourcetype=\"snow:cmdb_ci\"\n| eval complete=if(isnotnull(owner) AND isnotnull(support_group) AND isnotnull(environment),1,0)\n| eval fresh=if(last_discovered > relative_time(now(),\"-30d\"),1,0)\n| stats avg(complete) as completeness, avg(fresh) as freshness\n| eval quality_score=round((completeness*50+freshness*50),1)","m":"Define CMDB quality dimensions (completeness, accuracy, freshness, relationships). Score each dimension. Calculate composite quality score. Track trend over time. Set improvement targets. Report to CMDB governance board.","z":"Gauge (quality score), Line chart (quality trend), Bar chart (quality by dimension), Table (worst-scoring CIs)."},{"i":"16.2.2","n":"CI Discovery Reconciliation","c":"high","f":"intermediate","v":"CIs in the network but not in the CMDB are unmanaged risks. Reconciliation ensures CMDB completeness.","t":"Discovery tools + CMDB","d":"Discovery scan results, CMDB CI records","q":"| inputlookup discovered_assets.csv\n| join type=left hostname [search index=itsm sourcetype=\"snow:cmdb_ci\" | table hostname, sys_id, ci_class]\n| where isnull(sys_id)\n| table hostname, ip_address, os, discovered_date","m":"Compare auto-discovered assets (ServiceNow Discovery, SCCM, network scans) with CMDB records. Identify CIs found by discovery but absent from CMDB. Create workflow to review and add missing CIs. Track gap closure over time.","z":"Table (unmatched discovered assets), Single value (CMDB gap count), Pie chart (matched vs unmatched), Line chart (gap trend)."},{"i":"16.2.3","n":"Orphaned CI Detection","c":"medium","f":"beginner","v":"CIs without owners or service mappings aren't managed during incidents, creating accountability gaps and shadow infrastructure.","t":"`Splunk_TA_snow`","d":"CMDB CI attributes","q":"index=itsm sourcetype=\"snow:cmdb_ci\" operational_status=\"operational\"\n| where isnull(assigned_to) OR isnull(support_group) OR isnull(u_service)\n| table name, ci_class, assigned_to, support_group, u_service","m":"Query CMDB for operational CIs missing key attributes (owner, support group, service mapping). Report on orphaned CI inventory. Assign ownership through automated or manual workflow. Track orphan reduction over time.","z":"Table (orphaned CIs), Pie chart (by CI class), Bar chart (orphans by missing attribute), Single value (total orphaned CIs)."},{"i":"16.2.4","n":"Relationship Integrity Check","c":"medium","f":"intermediate","v":"Accurate CI relationships enable impact analysis during incidents. Incomplete relationships undermine service mapping.","t":"`Splunk_TA_snow`","d":"CMDB relationship data","q":"index=itsm sourcetype=\"snow:cmdb_ci\" ci_class IN (\"cmdb_ci_server\",\"cmdb_ci_app_server\")\n| join type=left sys_id [search index=itsm sourcetype=\"snow:cmdb_rel_ci\" | stats count as rel_count by child]\n| where isnull(rel_count) OR rel_count=0\n| table name, ci_class, rel_count","m":"Validate CI relationships are present and bidirectional. Identify servers with no application relationships, applications with no infrastructure dependencies. Report on relationship completeness. Use for impact analysis validation.","z":"Table (CIs without relationships), Network graph (CI dependency map), Single value (% CIs with relationships)."},{"i":"16.2.5","n":"CMDB Change Audit","c":"medium","f":"beginner","v":"Tracking all CI attribute changes supports compliance auditing and helps detect unauthorized configuration changes.","t":"`Splunk_TA_snow`","d":"CMDB audit trail (sys_audit)","q":"index=itsm sourcetype=\"snow:cmdb_audit\"\n| table _time, ci_name, field_name, old_value, new_value, changed_by\n| sort -_time","m":"Ingest CMDB audit records. Track all CI attribute changes. Alert on changes to critical CIs outside change windows. Report on change volume by CI class and source (manual vs discovery). Validate accuracy of discovery updates.","z":"Table (CI changes), Timeline (change events), Bar chart (changes by CI class), Line chart (change volume trend)."}]}]},{"i":17,"n":"Network Security & Zero Trust","s":[{"i":"17.1","n":"Network Access Control (NAC)","u":[{"i":"17.1.1","n":"NAC Authentication Trending","c":"high","f":"intermediate","v":"Authentication success/failure trends reveal infrastructure issues (certificate problems, RADIUS outages) and security events.","t":"Splunk_TA_cisco-ise","d":"RADIUS/ISE authentication logs","q":"index=nac sourcetype=\"cisco:ise:auth\"\n| eval status=if(match(message,\"PASS\"),\"success\",\"failure\")\n| timechart span=1h count by status","m":"Forward ISE syslog to Splunk. Parse authentication results, methods, and endpoints. Track success/failure rates per location and SSID. Alert on spike in failures (>10% rate). Report on authentication method adoption.","z":"Line chart (auth success/failure rates), Bar chart (failures by location), Pie chart (auth method distribution)."},{"i":"17.1.2","n":"Endpoint Posture Failures","c":"high","f":"beginner","v":"Non-compliant endpoints accessing the network pose security risks. Posture tracking ensures endpoint hygiene enforcement.","t":"Splunk_TA_cisco-ise","d":"ISE posture assessment logs","q":"index=nac sourcetype=\"cisco:ise:posture\"\n| where posture_status=\"NonCompliant\"\n| stats count by endpoint_mac, posture_policy, failure_reason\n| sort -count","m":"Ingest ISE posture assessment results. Track compliance rates per policy (AV status, patch level, disk encryption). Alert on critical endpoints failing posture (exec laptops, admin workstations). Report on remediation effectiveness.","z":"Pie chart (compliant vs non-compliant), Bar chart (failure reasons), Table (non-compliant endpoints), Line chart (compliance trend)."},{"i":"17.1.3","n":"VLAN Assignment Audit","c":"medium","f":"beginner","v":"Dynamic VLAN assignments reflect authorization decisions. Anomalous placements may indicate policy misconfiguration or attacks.","t":"Splunk_TA_cisco-ise","d":"ISE authorization logs (VLAN assignment)","q":"index=nac sourcetype=\"cisco:ise:auth\"\n| where assigned_vlan!=expected_vlan\n| table _time, endpoint_mac, username, assigned_vlan, expected_vlan, authorization_policy","m":"Track VLAN assignments per endpoint. Maintain expected VLAN lookup by user role/device type. Alert on unexpected VLAN placements. Audit authorization policy effectiveness.","z":"Table (VLAN assignments), Pie chart (assignments by VLAN), Bar chart (unexpected placements)."},{"i":"17.1.4","n":"Guest Network Usage","c":"medium","f":"beginner","v":"Guest network monitoring ensures acceptable use and identifies capacity needs. Unusual patterns may indicate abuse.","t":"Splunk_TA_cisco-ise","d":"ISE guest portal logs, RADIUS accounting","q":"index=nac sourcetype=\"cisco:ise:guest\"\n| stats count, sum(session_duration_min) as total_min by sponsor, guest_type\n| sort -count","m":"Track guest portal registrations, sponsor activity, and session durations. Alert on excessive guest registrations from single sponsors. Monitor guest bandwidth usage. Report on guest network utilization.","z":"Bar chart (guest registrations by sponsor), Line chart (guest sessions trend), Table (active guests)."},{"i":"17.1.5","n":"BYOD Onboarding Tracking","c":"medium","f":"beginner","v":"BYOD onboarding metrics inform mobile device management strategy and user experience optimization.","t":"Splunk_TA_cisco-ise","d":"ISE BYOD portal logs, certificate provisioning","q":"index=nac sourcetype=\"cisco:ise:byod\"\n| stats count by device_type, os_type, onboarding_status\n| sort -count","m":"Track BYOD registrations, device types, and onboarding success/failure rates. Alert on onboarding failures. Report on device type distribution for MDM policy planning.","z":"Pie chart (device types), Bar chart (onboarding status), Line chart (BYOD enrollment trend)."},{"i":"17.1.6","n":"MAC Authentication Bypass (MAB)","c":"high","f":"intermediate","v":"MAB devices bypass 802.1X and rely on MAC address only. Monitoring for unauthorized MACs prevents rogue device access.","t":"Splunk_TA_cisco-ise","d":"ISE MAB authentication logs","q":"index=nac sourcetype=\"cisco:ise:auth\" auth_method=\"MAB\"\n| lookup approved_mab_devices.csv mac_address OUTPUT device_description, approved\n| where isnull(approved) OR approved!=\"Yes\"\n| table _time, endpoint_mac, switch, port, location","m":"Maintain whitelist of approved MAB devices (printers, IP phones, IoT). Alert on unknown MAC addresses authenticating via MAB. Track MAB device population. Report on MAB vs 802.1X ratio for security posture.","z":"Table (unapproved MAB devices), Pie chart (MAB vs 802.1X), Bar chart (MAB by device type)."},{"i":"17.1.7","n":"Profiling Accuracy","c":"medium","f":"beginner","v":"Accurate device profiling enables correct authorization policies. Misprofiled devices may get inappropriate access.","t":"Splunk_TA_cisco-ise","d":"ISE profiler logs, re-profiling events","q":"index=nac sourcetype=\"cisco:ise:profiler\"\n| search \"re-profiled\" OR \"profile changed\"\n| stats count by endpoint_mac, old_profile, new_profile\n| sort -count","m":"Monitor profiling events and profile changes. Track devices that are frequently re-profiled (indicates ambiguous profiling rules). Validate profiling accuracy against known device inventory. Tune profiling policies.","z":"Table (profiling changes), Sankey diagram (old\u2192new profiles), Bar chart (re-profiling frequency)."},{"i":"17.1.8","n":"NAC Policy Change Audit","c":"high","f":"beginner","v":"NAC policy changes affect network access for all devices. Unauthorized changes can create security gaps or disrupt access.","t":"Splunk_TA_cisco-ise","d":"ISE admin audit logs","q":"index=nac sourcetype=\"cisco:ise:admin\"\n| search \"PolicySet\" OR \"AuthorizationRule\" OR \"AuthenticationRule\"\n| table _time, admin_user, action, object_name, details","m":"Forward ISE admin audit logs. Alert on any policy change. Track changes by administrator. Correlate with change management tickets. Report on policy change frequency.","z":"Table (policy changes), Timeline (change events), Bar chart (changes by admin)."}]},{"i":"17.2","n":"VPN & Remote Access","u":[{"i":"17.2.1","n":"VPN Concurrent Sessions","c":"high","f":"beginner","v":"VPN capacity planning prevents remote workers from being locked out. Trending identifies peak usage and growth patterns.","t":"Splunk_TA_cisco-asa, Splunk_TA_paloalto (GlobalProtect)","d":"VPN concentrator session logs","q":"index=vpn sourcetype=\"cisco:asa\"\n| where action=\"session_connect\" OR action=\"session_disconnect\"\n| timechart span=15m dc(user) as concurrent_users","m":"Track VPN session connects/disconnects. Calculate concurrent users over time. Alert when approaching license or capacity limits. Report on peak usage patterns for capacity planning. Track growth trends.","z":"Line chart (concurrent sessions), Gauge (% of capacity), Single value (current active sessions), Area chart (sessions over time)."},{"i":"17.2.2","n":"VPN Authentication Failures","c":"high","f":"intermediate","v":"Repeated VPN auth failures indicate credential attacks against the remote access perimeter, a primary attack vector.","t":"Splunk_TA_cisco-asa, Splunk_TA_paloalto (GlobalProtect)","d":"VPN authentication logs","q":"index=vpn sourcetype=\"cisco:asa\" action=\"authentication_failed\"\n| stats count by user, src_ip\n| where count > 5\n| sort -count","m":"Track VPN authentication failures by user and source IP. Alert on >5 failures per user per 15 minutes. Correlate with AD lockout events. Block source IPs with excessive failures. Report on attack patterns.","z":"Table (failed auth events), Bar chart (failures by user), Geo map (source IPs), Line chart (failure rate trend)."},{"i":"17.2.3","n":"Geo-Location Anomalies","c":"critical","f":"beginner","v":"VPN connections from unexpected countries may indicate compromised credentials being used from attacker infrastructure.","t":"VPN TA + GeoIP lookup","d":"VPN session logs with source IP","q":"index=vpn sourcetype=\"cisco:asa\" action=\"session_connect\"\n| iplocation src_ip\n| search NOT Country IN (\"United States\",\"Canada\",\"United Kingdom\")\n| table _time, user, src_ip, Country, City","m":"Enrich VPN connections with GeoIP data. Maintain whitelist of expected countries. Alert on connections from unexpected locations. Correlate with user travel records if available. Block sanctioned countries.","z":"Geo map (VPN connections), Table (anomalous locations), Bar chart (connections by country)."},{"i":"17.2.4","n":"Split-Tunnel Compliance","c":"medium","f":"beginner","v":"Split-tunnel configurations affect security visibility. Ensuring compliance with tunnel policy maintains security posture.","t":"VPN TA","d":"VPN session attributes (tunnel type, group policy)","q":"index=vpn sourcetype=\"cisco:asa\"\n| stats count by user, tunnel_type, group_policy\n| where tunnel_type=\"split\"\n| table user, tunnel_type, group_policy, count","m":"Track VPN tunnel configuration per session. Verify users are connecting with the correct group policy (full-tunnel for high-risk, split-tunnel for standard). Alert on policy violations. Report on tunnel type distribution.","z":"Pie chart (full vs split tunnel), Table (sessions by policy), Bar chart (tunnel type by department)."},{"i":"17.2.5","n":"VPN Tunnel Stability","c":"medium","f":"intermediate","v":"Frequent disconnects indicate network issues, client problems, or infrastructure instability affecting user productivity.","t":"VPN TA","d":"VPN session logs (connect/disconnect events)","q":"index=vpn sourcetype=\"cisco:asa\"\n| where action IN (\"session_connect\",\"session_disconnect\")\n| transaction user maxspan=1h\n| where eventcount > 4\n| table user, eventcount, duration\n| sort -eventcount","m":"Track connect/disconnect patterns per user. Identify users with >4 reconnections per hour. Correlate with network quality metrics. Alert on widespread instability (multiple users affected simultaneously). Report for helpdesk.","z":"Table (unstable connections), Bar chart (reconnects by user), Line chart (reconnection rate trend)."},{"i":"17.2.6","n":"Off-Hours VPN Access","c":"medium","f":"intermediate","v":"VPN access at unusual hours may indicate compromised credentials or unauthorized activity. Alerting supports investigation.","t":"VPN TA + user context","d":"VPN session logs, HR data (department, role)","q":"index=vpn sourcetype=\"cisco:asa\" action=\"session_connect\"\n| eval hour=strftime(_time,\"%H\")\n| where (hour < 5 OR hour > 23)\n| lookup user_roles.csv user OUTPUT department, role\n| where role!=\"on_call\" AND role!=\"sysadmin\"\n| table _time, user, department, src_ip, hour","m":"Define normal hours per user role/department. Alert on VPN connections outside hours for roles that don't require it. Whitelist on-call and sysadmin roles. Review weekly for patterns.","z":"Heatmap (user \u00d7 hour of day), Table (off-hours access), Bar chart (off-hours by department)."},{"i":"17.2.7","n":"VPN Bandwidth Consumption","c":"medium","f":"intermediate","v":"Per-user bandwidth tracking identifies heavy users, guides capacity planning, and detects potential data exfiltration.","t":"VPN TA, RADIUS accounting","d":"VPN session accounting (bytes in/out)","q":"index=vpn sourcetype=\"cisco:asa\"\n| stats sum(bytes_in) as bytes_in, sum(bytes_out) as bytes_out by user\n| eval total_gb=round((bytes_in+bytes_out)/1073741824,2)\n| sort -total_gb\n| head 20","m":"Track VPN session byte counters per user. Alert on users with excessive upload (potential data exfiltration). Report on bandwidth distribution for capacity planning. Identify optimization opportunities (video offload, split-tunnel).","z":"Bar chart (bandwidth by user), Pie chart (upload vs download), Line chart (total bandwidth trend), Table (top bandwidth consumers)."},{"i":"17.2.8","n":"Simultaneous Session Detection","c":"critical","f":"intermediate","v":"A single user with simultaneous VPN sessions from different locations strongly indicates credential compromise.","t":"VPN TA","d":"VPN session logs","q":"index=vpn sourcetype=\"cisco:asa\" action=\"session_connect\"\n| stats dc(src_ip) as unique_ips, values(src_ip) as ips by user\n| where unique_ips > 1","m":"Track active VPN sessions per user. Alert when a user has concurrent sessions from different IPs. Whitelist known scenarios (multiple devices). Trigger automated investigation including password reset.","z":"Table (users with multiple sessions), Single value (simultaneous sessions detected), Timeline (detection events)."}]},{"i":"17.3","n":"Zero Trust / SASE","u":[{"i":"17.3.1","n":"Conditional Access Enforcement","c":"high","f":"beginner","v":"Tracks zero-trust policy enforcement decisions, ensuring consistent security without creating user friction.","t":"SASE TA, Entra ID","d":"SASE/ZT policy decision logs","q":"index=zt sourcetype=\"zscaler:zpa\"\n| stats count by policy_action, application, user\n| eval pct=round(count/sum(count)*100,1)","m":"Ingest SASE/ZTNA policy decision logs. Track allow/block/step-up-auth decisions per application and user. Alert on policy blocks for critical applications. Report on policy effectiveness and user experience impact.","z":"Pie chart (policy decisions), Bar chart (blocks by application), Line chart (enforcement trend), Table (blocked users)."},{"i":"17.3.2","n":"Device Trust Scoring","c":"high","f":"beginner","v":"Device trust scores drive access decisions in zero-trust architecture. Monitoring ensures devices maintain compliance.","t":"ZT platform TA","d":"ZT device compliance/trust data","q":"index=zt sourcetype=\"zscaler:device_posture\"\n| where trust_score < 50 OR compliance_status!=\"compliant\"\n| table user, device_id, os, trust_score, compliance_status, non_compliant_checks","m":"Ingest device trust score data from ZT platform. Track compliance rates per OS and department. Alert when critical devices become non-compliant. Report on fleet trust posture for security leadership.","z":"Gauge (fleet compliance %), Table (non-compliant devices), Pie chart (compliance distribution), Line chart (trust score trend)."},{"i":"17.3.3","n":"Micro-Segmentation Audit","c":"high","f":"beginner","v":"Micro-segmentation limits lateral movement. Audit logs validate policy enforcement and detect bypasses.","t":"SDN/ZT policy logs","d":"Micro-segmentation policy logs (allow/deny events)","q":"index=zt sourcetype=\"microseg:policy\"\n| where action=\"deny\"\n| stats count by src_workload, dest_workload, dest_port, policy_name\n| sort -count","m":"Ingest micro-segmentation policy enforcement logs. Track allowed and denied traffic between workloads. Alert on unexpected denials (may indicate misconfiguration) and unexpected allows (policy gaps). Report on segmentation coverage.","z":"Heatmap (workload \u00d7 workload traffic), Table (policy violations), Sankey diagram (traffic flows)."},{"i":"17.3.4","n":"ZTNA Application Access","c":"medium","f":"beginner","v":"Per-application access patterns in ZTNA reveal usage trends, security risks, and application performance issues.","t":"SASE TA","d":"ZTNA access logs (application, user, device, action)","q":"index=zt sourcetype=\"zscaler:zpa\"\n| stats dc(user) as unique_users, count as total_access by application\n| sort -unique_users","m":"Track application access through ZTNA per user and device. Identify unused applications for decommissioning. Monitor access patterns for anomalies. Report on application adoption and usage.","z":"Bar chart (top applications by users), Table (application access summary), Line chart (access trends per app)."},{"i":"17.3.5","n":"Posture Assessment Trending","c":"medium","f":"beginner","v":"Endpoint posture compliance rates over time measure security improvement and identify persistent non-compliance areas.","t":"ZT platform TA","d":"ZT posture assessment data","q":"index=zt sourcetype=\"zt:posture\"\n| timechart span=1d avg(compliance_pct) as compliance by check_type","m":"Track posture assessment results over time by check type (AV, encryption, OS patch, firewall). Report on compliance improvement trends. Alert when compliance drops below target. Identify persistent non-compliance patterns.","z":"Line chart (compliance trend by check), Bar chart (compliance by OS), Single value (overall compliance %), Table (non-compliant checks)."},{"i":"17.3.6","n":"Policy Drift Detection","c":"high","f":"intermediate","v":"Zero-trust policies require continuous validation. Drift from baseline configuration introduces security gaps.","t":"ZT platform audit logs","d":"ZT policy audit logs, configuration snapshots","q":"index=zt sourcetype=\"zt:admin_audit\"\n| search action IN (\"policy_modified\",\"rule_added\",\"rule_deleted\",\"rule_disabled\")\n| table _time, admin, action, policy_name, details\n| sort -_time","m":"Track all ZT policy changes via audit logs. Compare current configuration against approved baseline. Alert on unauthorized modifications. Require change management approval for policy changes. Report on policy change frequency.","z":"Table (policy changes), Timeline (modification events), Bar chart (changes by admin), Single value (changes this week)."}]}]},{"i":18,"n":"Data Center Fabric & SDN","s":[{"i":"18.1","n":"Cisco ACI","u":[{"i":"18.1.1","n":"Fabric Health Score Monitoring","c":"critical","f":"advanced","v":"ACI fabric health scores provide a single-pane view of overall data center network health. Monitoring these scores lets you catch degradation before it impacts workloads, correlate health drops with specific faults, and maintain SLA compliance across your data center fabric.","t":"`TA_cisco-ACI`, APIC REST API via scripted input","d":"APIC REST API (`/api/node/mo/topology/health.json`), APIC syslog","q":"index=cisco_aci sourcetype=\"cisco:aci:health\"\n| eval node_type=case(dn LIKE \"%/node-1%\", \"APIC\", dn LIKE \"%/node-1___%\", \"Leaf\", dn LIKE \"%/node-2___%\", \"Spine\", 1==1, \"Other\")\n| stats latest(healthScore) as health_score by dn, node_type\n| eval status=case(health_score>=90, \"Healthy\", health_score>=70, \"Degraded\", health_score>=50, \"Warning\", 1==1, \"Critical\")\n| sort health_score","m":"Deploy scripted input to poll APIC health API every 60 seconds. Collect topology-wide and per-node health scores. Set threshold alerts: <90 degraded, <70 warning, <50 critical. Integrate with ITSI for service-level health correlation. Build trending to catch slow health degradation.","z":"Single value (fabric health), Gauge (per-node health), Timechart (health trending), Status grid (node health map)."},{"i":"18.1.2","n":"Fault Trending by Severity","c":"high","f":"intermediate","v":"ACI faults are the primary operational signal from the fabric. Trending faults by severity helps identify worsening conditions, recurring hardware issues, and configuration problems before they cascade into outages.","t":"`TA_cisco-ACI`, APIC syslog","d":"APIC faults API (`/api/node/class/faultInst.json`), APIC syslog","q":"index=cisco_aci sourcetype=\"cisco:aci:faults\"\n| eval severity_order=case(severity==\"critical\", 4, severity==\"major\", 3, severity==\"minor\", 2, severity==\"warning\", 1, 1==1, 0)\n| timechart span=1h count by severity\n| fields _time critical major minor warning","m":"Poll APIC fault instance class every 5 minutes. Parse severity, fault code, affected DN, and lifecycle state. Track fault creation/clearing patterns. Alert on critical/major fault count spikes. Build fault code frequency reports for proactive maintenance.","z":"Timechart (fault trends by severity), Bar chart (top fault codes), Table (active critical faults), Single value (open critical faults count)."},{"i":"18.1.3","n":"Endpoint Mobility Tracking","c":"high","f":"intermediate","v":"Endpoint mobility in ACI tracks workload movement across leaf switches. Anomalous mobility (rapid moves, unexpected locations) can indicate misconfigurations, loops, or security issues like MAC spoofing.","t":"`TA_cisco-ACI`, APIC endpoint tracker","d":"APIC endpoint tracker, ACI endpoint move events","q":"index=cisco_aci sourcetype=\"cisco:aci:endpoint\"\n| where action=\"move\"\n| stats count as move_count, values(from_leaf) as from_leaves, values(to_leaf) as to_leaves, latest(_time) as last_move by mac, ip, tenant, epg\n| where move_count > 5\n| sort -move_count\n| eval alert=if(move_count>20, \"Anomalous\", \"Normal\")","m":"Enable endpoint tracker on APIC. Ingest endpoint move events via syslog or API polling. Baseline normal mobility rates per EPG. Alert on endpoints with excessive moves (>20/hour). Investigate rapid moves for potential loops or spoofing. Correlate with contract hits.","z":"Table (high-mobility endpoints), Timechart (move rate trending), Sankey diagram (leaf-to-leaf moves), Single value (anomalous endpoints)."},{"i":"18.1.4","n":"Contract/Filter Hit Analysis","c":"high","f":"intermediate","v":"ACI contracts control EPG-to-EPG communication. Analyzing contract hits reveals traffic patterns, identifies overly permissive or unused contracts, and helps validate micro-segmentation policies are working as designed.","t":"`TA_cisco-ACI`, APIC flow logs","d":"APIC contract hit counters, ACI flow telemetry","q":"index=cisco_aci sourcetype=\"cisco:aci:contracts\"\n| stats sum(permit_count) as permitted, sum(deny_count) as denied by src_epg, dst_epg, contract_name, filter_name\n| eval total=permitted+denied\n| eval deny_pct=round((denied/total)*100, 2)\n| sort -total\n| table src_epg, dst_epg, contract_name, filter_name, permitted, denied, deny_pct","m":"Enable contract statistics on APIC. Poll contract hit counters via API every 5 minutes. Track permit vs deny ratios per contract. Identify contracts with zero hits (candidates for cleanup). Alert on unexpected deny spikes indicating policy or application issues.","z":"Table (contract hit summary), Bar chart (top contracts by hits), Timechart (deny trends), Sankey diagram (EPG-to-EPG flows)."},{"i":"18.1.5","n":"Tenant Configuration Audit","c":"medium","f":"intermediate","v":"Configuration changes in ACI tenants (BDs, EPGs, contracts) are a leading cause of outages. Auditing all changes provides accountability, supports compliance, and enables rapid rollback identification when issues occur.","t":"`TA_cisco-ACI`, APIC audit log","d":"APIC audit log (`/api/node/class/aaaModLR.json`)","q":"index=cisco_aci sourcetype=\"cisco:aci:audit\"\n| search affected LIKE \"uni/tn-*\"\n| rex field=affected \"uni/tn-(?<tenant>[^/]+)\"\n| stats count by _time, user, action, tenant, affected, descr\n| sort -_time\n| table _time, user, action, tenant, affected, descr","m":"Enable audit logging on APIC (enabled by default). Ingest audit records via API polling or syslog. Track all create/modify/delete operations on tenant objects. Correlate configuration changes with fault events. Require change management tickets for production tenant changes.","z":"Table (recent changes), Timeline (change events), Bar chart (changes by user), Pie chart (changes by tenant)."},{"i":"18.1.6","n":"Leaf/Spine Interface Utilization","c":"high","f":"intermediate","v":"Fabric link saturation causes packet drops and application latency. Monitoring leaf/spine interface utilization identifies hotspots, validates ECMP distribution, and supports capacity planning for fabric expansion.","t":"`TA_cisco-ACI`, APIC interface metrics","d":"APIC interface statistics API, fabric port counters","q":"index=cisco_aci sourcetype=\"cisco:aci:interface_stats\"\n| eval util_pct=round((bytesRate*8/speed)*100, 2)\n| stats avg(util_pct) as avg_util, max(util_pct) as peak_util by node, interface, speed\n| where peak_util > 70\n| sort -peak_util\n| table node, interface, speed, avg_util, peak_util","m":"Poll APIC interface statistics every 60 seconds. Calculate utilization from byte rates and link speed. Set thresholds at 70% warning, 85% critical. Track ECMP balance across parallel fabric links. Alert on sustained high utilization indicating need for fabric expansion.","z":"Heatmap (interface utilization by node), Timechart (utilization trending), Table (high-util interfaces), Gauge (fabric aggregate utilization)."},{"i":"18.1.7","n":"APIC Cluster Health","c":"critical","f":"advanced","v":"APIC controllers manage the entire ACI fabric. Cluster health issues (split-brain, leader election, convergence problems) can cause fabric-wide configuration and policy failures. Monitoring APIC cluster state is essential for fabric reliability.","t":"`TA_cisco-ACI`, APIC system logs","d":"APIC cluster health API, APIC system logs/syslog","q":"index=cisco_aci sourcetype=\"cisco:aci:system\"\n| search (cluster_status OR leader_election OR convergence)\n| eval status=case(\n    searchmatch(\"fully-fit\"), \"Healthy\",\n    searchmatch(\"partially-fit\"), \"Degraded\",\n    searchmatch(\"not-fit\"), \"Critical\",\n    1==1, \"Unknown\")\n| stats latest(status) as cluster_status, latest(_time) as last_update by apic_id\n| table apic_id, cluster_status, last_update","m":"Monitor APIC cluster health endpoint every 30 seconds. Track cluster fitness, leader election events, and database sync status. Alert immediately on any non-fully-fit state. Monitor APIC resource utilization (disk, CPU, memory). Document recovery procedures for cluster issues.","z":"Status grid (APIC cluster state), Timeline (cluster events), Single value (cluster fitness), Table (APIC node details)."}]},{"i":"18.2","n":"VMware NSX","u":[{"i":"18.2.1","n":"Distributed Firewall Rule Hits","c":"high","f":"beginner","v":"NSX Distributed Firewall (DFW) runs on every hypervisor, providing east-west traffic control. Monitoring rule hits validates security policy effectiveness, identifies unused rules for cleanup, and detects policy violations in real time.","t":"`vmware_nsx_addon`, NSX DFW syslog","d":"NSX DFW firewall logs (syslog), NSX Manager API","q":"index=vmware sourcetype=\"vmware:nsx:dfw\"\n| stats sum(eval(if(action=\"ALLOW\", 1, 0))) as allowed, sum(eval(if(action=\"DROP\", 1, 0))) as dropped, sum(eval(if(action=\"REJECT\", 1, 0))) as rejected by rule_id, rule_name, src_ip, dst_ip, dst_port, protocol\n| eval total=allowed+dropped+rejected\n| sort -total\n| table rule_id, rule_name, src_ip, dst_ip, dst_port, protocol, allowed, dropped, rejected","m":"Enable DFW logging on NSX Manager for desired rule sections. Forward DFW logs via syslog to Splunk. Parse rule ID, action, source, destination, and port fields. Identify rules with zero hits (candidates for removal). Alert on unexpected DENY hits indicating misconfiguration or attack.","z":"Bar chart (top rules by hits), Timechart (allow vs deny trending), Table (denied connections), Sankey diagram (source-to-destination flows)."},{"i":"18.2.2","n":"Micro-Segmentation Enforcement","c":"high","f":"intermediate","v":"NSX micro-segmentation is a key Zero Trust control. Monitoring enforcement validates that workloads are properly isolated, detects lateral movement attempts, and proves compliance with segmentation policies during audits.","t":"`vmware_nsx_addon`, NSX DFW logs","d":"NSX DFW logs, NSX security group membership","q":"index=vmware sourcetype=\"vmware:nsx:dfw\"\n| lookup nsx_security_groups vm_name OUTPUT security_group\n| stats count as hits, dc(dst_ip) as unique_destinations by security_group, action, direction\n| eval compliance=if(action=\"DROP\" AND direction=\"intra-group\", \"Violation\", \"Expected\")\n| sort -hits","m":"Define security groups in NSX aligned with application tiers. Enable DFW logging for inter-group and intra-group traffic. Enrich logs with security group membership. Track allowed vs denied inter-group communication. Alert on intra-group denials or unexpected inter-group allows.","z":"Heatmap (group-to-group traffic), Sankey diagram (flow paths), Bar chart (denials by group), Single value (policy violation count)."},{"i":"18.2.3","n":"Logical Switch Health","c":"high","f":"intermediate","v":"NSX logical switches and routers form the virtual network fabric. Monitoring their operational status ensures VM connectivity and helps identify overlay network issues before they impact applications.","t":"`vmware_nsx_addon`, NSX Manager events","d":"NSX Manager API, NSX system events/syslog","q":"index=vmware sourcetype=\"vmware:nsx:events\"\n| search object_type IN (\"LogicalSwitch\", \"LogicalRouter\", \"Tier0Router\", \"Tier1Router\")\n| eval status=case(severity==\"HIGH\" OR severity==\"CRITICAL\", \"Degraded\", severity==\"MEDIUM\", \"Warning\", 1==1, \"Healthy\")\n| stats latest(status) as current_status, count as event_count by object_name, object_type\n| sort -event_count","m":"Poll NSX Manager API for logical switch and router status every 60 seconds. Ingest NSX system events via syslog. Alert on logical switch or router down events. Track BFD session state for Tier-0/Tier-1 routers. Monitor VNI pool exhaustion.","z":"Status grid (switch/router health), Table (degraded components), Timechart (event trends), Single value (active logical switches)."},{"i":"18.2.4","n":"NSX Edge Performance","c":"high","f":"intermediate","v":"NSX Edge nodes handle north-south traffic, load balancing, and NAT. Performance bottlenecks on Edge nodes directly impact application availability and throughput for any workload communicating outside the NSX fabric.","t":"`vmware_nsx_addon`, NSX Edge metrics","d":"NSX Edge node metrics (CPU, memory, datapath), NSX Manager API","q":"index=vmware sourcetype=\"vmware:nsx:edge_metrics\"\n| stats avg(cpu_pct) as avg_cpu, max(cpu_pct) as peak_cpu, avg(mem_pct) as avg_mem, avg(datapath_cpu_pct) as avg_dp_cpu by edge_node, cluster\n| eval status=case(peak_cpu>90 OR avg_dp_cpu>80, \"Critical\", peak_cpu>75 OR avg_dp_cpu>60, \"Warning\", 1==1, \"Healthy\")\n| table edge_node, cluster, avg_cpu, peak_cpu, avg_mem, avg_dp_cpu, status\n| sort -peak_cpu","m":"Collect Edge node metrics via NSX Manager API every 60 seconds. Monitor both management plane and datapath CPU separately. Track interface throughput on uplinks. Set thresholds: datapath CPU >80% critical, >60% warning. Plan Edge node scale-out when sustained utilization exceeds thresholds.","z":"Gauge (Edge CPU/memory), Timechart (performance trending), Table (Edge node status), Single value (peak datapath CPU)."},{"i":"18.2.5","n":"Transport Node Connectivity","c":"critical","f":"intermediate","v":"Transport nodes are the hypervisors participating in the NSX overlay. Tunnel failures between transport nodes cause VM-to-VM communication loss across hosts, directly impacting application availability.","t":"`vmware_nsx_addon`, NSX transport node logs","d":"NSX transport node status API, TEP tunnel events","q":"index=vmware sourcetype=\"vmware:nsx:transport_node\"\n| eval tunnel_status=case(status==\"UP\", \"Healthy\", status==\"DEGRADED\", \"Degraded\", status==\"DOWN\", \"Down\", 1==1, \"Unknown\")\n| stats latest(tunnel_status) as current_status, latest(_time) as last_seen by transport_node, host_ip\n| search current_status!=\"Healthy\"\n| table transport_node, host_ip, current_status, last_seen","m":"Poll NSX Manager for transport node status every 30 seconds. Monitor TEP (Tunnel Endpoint) reachability between all transport nodes. Alert immediately on tunnel DOWN state. Track tunnel flapping (frequent UP/DOWN cycles). Correlate with physical network events (link failures, MTU issues).","z":"Status grid (transport node map), Table (degraded nodes), Timechart (tunnel status changes), Single value (healthy tunnel percentage)."}]},{"i":"18.3","n":"Other SDN","u":[{"i":"18.3.1","n":"Cilium/Calico Network Policy Monitoring","c":"medium","f":"intermediate","v":"Kubernetes CNI network policies enforce pod-to-pod communication rules. Monitoring policy enforcement validates that micro-segmentation is working in containerized environments, critical for multi-tenant clusters and compliance.","t":"Custom scripted inputs, Kubernetes logging pipeline","d":"Cilium/Calico policy logs, Kubernetes audit logs","q":"index=kubernetes sourcetype=\"kube:cni:policy\"\n| stats count as hits, dc(src_pod) as src_pods, dc(dst_pod) as dst_pods by policy_name, action, namespace\n| eval enforcement=if(action=\"deny\", \"Blocked\", \"Allowed\")\n| sort -hits\n| table namespace, policy_name, enforcement, hits, src_pods, dst_pods","m":"Enable CNI policy logging in Cilium/Calico configuration. Forward logs via Fluentd/Fluent Bit to Splunk HEC. Parse policy name, action, source/destination pod, and namespace. Track denied traffic for security visibility. Identify namespaces without network policies (compliance gap).","z":"Bar chart (policy hits by namespace), Table (denied flows), Heatmap (namespace-to-namespace traffic), Single value (namespaces without policies)."},{"i":"18.3.2","n":"OpenStack Neutron Events","c":"medium","f":"intermediate","v":"Neutron manages virtual networking in OpenStack. Tracking network operations (creation, modification, deletion) provides change audit, helps troubleshoot connectivity issues, and identifies unauthorized network modifications.","t":"Custom scripted input (OpenStack API), OpenStack syslog","d":"Neutron API logs, OpenStack syslog","q":"index=openstack sourcetype=\"openstack:neutron\"\n| search action IN (\"create\", \"update\", \"delete\")\n| stats count by action, resource_type, user, project_name\n| sort -count\n| table _time, user, project_name, action, resource_type, resource_name, count","m":"Ingest Neutron API logs via syslog or OpenStack notification bus. Track all network, subnet, port, and router CRUD operations. Alert on mass deletions or unauthorized modifications. Correlate network changes with VM connectivity issues.","z":"Table (recent operations), Bar chart (operations by type), Timeline (change events), Pie chart (operations by project)."},{"i":"18.3.3","n":"SDN Controller Health","c":"critical","f":"advanced","v":"SDN controllers are the brain of software-defined networks. Controller outages or cluster consensus failures can cause network-wide disruption. Monitoring controller health ensures the control plane remains available and consistent.","t":"Custom scripted input, SDN controller syslog","d":"SDN controller system logs, cluster status API","q":"index=sdn sourcetype=\"sdn:controller\"\n| search (cluster_state OR heartbeat OR leader_election OR consensus)\n| eval health=case(\n    searchmatch(\"healthy\") OR searchmatch(\"active\"), \"Healthy\",\n    searchmatch(\"degraded\") OR searchmatch(\"standby\"), \"Degraded\",\n    searchmatch(\"failed\") OR searchmatch(\"unreachable\"), \"Critical\",\n    1==1, \"Unknown\")\n| stats latest(health) as status, latest(_time) as last_heartbeat by controller_id, role\n| table controller_id, role, status, last_heartbeat","m":"Monitor SDN controller cluster via heartbeat polling every 15 seconds. Track cluster membership, leader election events, and consensus state. Alert immediately on controller failure or split-brain conditions. Monitor controller resource utilization (CPU, memory, database size). Maintain runbook for controller failover.","z":"Status grid (controller cluster), Timeline (cluster events), Single value (cluster health), Table (controller details)."}]}]},{"i":19,"n":"Compute Infrastructure (HCI & Converged)","s":[{"i":"19.1","n":"Cisco UCS","u":[{"i":"19.1.1","n":"Blade/Rack Server Health","c":"critical","f":"intermediate","v":"UCS blade and rack servers host critical workloads. Monitoring component health (CPU, memory, PSU, fans) enables proactive hardware replacement before failures cause VM outages and unplanned downtime.","t":"`Splunk_TA_cisco-ucs`, UCS Manager syslog","d":"UCS Manager faults, UCS Manager equipment API","q":"index=cisco_ucs sourcetype=\"cisco:ucs:faults\"\n| search dn=\"sys/chassis-*/blade-*\" OR dn=\"sys/rack-unit-*\"\n| eval component=case(\n    cause LIKE \"%cpu%\", \"CPU\",\n    cause LIKE \"%memory%\", \"Memory\",\n    cause LIKE \"%psu%\", \"PSU\",\n    cause LIKE \"%fan%\", \"Fan\",\n    cause LIKE \"%disk%\", \"Disk\",\n    1==1, \"Other\")\n| stats count by severity, component, dn, descr\n| sort -severity, -count","m":"Configure UCS Manager syslog forwarding to Splunk. Poll equipment health via UCS Manager XML API every 5 minutes. Track fault creation and clearing events. Alert on critical/major faults for immediate hardware replacement. Maintain server inventory with health status overlay.","z":"Status grid (server health map), Bar chart (faults by component), Table (active critical faults), Timechart (fault trending)."},{"i":"19.1.2","n":"Service Profile Compliance","c":"high","f":"intermediate","v":"UCS service profiles define the identity of compute resources. Non-compliant associations indicate configuration drift, failed hardware migrations, or policy violations that can impact workload performance and security.","t":"`Splunk_TA_cisco-ucs`, UCS Manager events","d":"UCS Manager service profile API, configuration events","q":"index=cisco_ucs sourcetype=\"cisco:ucs:config\"\n| search object_type=\"service_profile\"\n| eval compliance=case(\n    assoc_state=\"associated\" AND config_state=\"applied\", \"Compliant\",\n    assoc_state=\"associated\" AND config_state!=\"applied\", \"Non-Compliant\",\n    assoc_state=\"unassociated\", \"Unassociated\",\n    1==1, \"Unknown\")\n| stats count by compliance, org, sp_name, server_dn\n| sort compliance","m":"Poll service profile status via UCS Manager API every 5 minutes. Track association state and configuration compliance. Alert on non-compliant profiles requiring reapplication. Monitor service profile migrations during maintenance windows. Report on unassociated profiles (wasted compute capacity).","z":"Pie chart (compliance breakdown), Table (non-compliant profiles), Single value (compliance percentage), Status grid (profile status by org)."},{"i":"19.1.3","n":"Firmware Compliance","c":"medium","f":"intermediate","v":"Running inconsistent firmware across UCS creates compatibility issues and security vulnerabilities. Tracking firmware versions enables compliance reporting, patch planning, and ensures consistency across the compute fleet.","t":"`Splunk_TA_cisco-ucs`, UCS Manager inventory","d":"UCS Manager firmware inventory, UCS firmware policy","q":"index=cisco_ucs sourcetype=\"cisco:ucs:inventory\"\n| search object_type=\"firmware\"\n| stats count by component_type, running_version, server_dn\n| lookup ucs_approved_firmware component_type OUTPUT approved_version\n| eval compliant=if(running_version==approved_version, \"Yes\", \"No\")\n| stats count as server_count by component_type, running_version, approved_version, compliant\n| sort compliant, component_type","m":"Poll UCS firmware inventory weekly. Maintain a lookup of approved firmware versions per component type. Compare running versions against approved baselines. Generate compliance reports for audit. Prioritize non-compliant servers in maintenance windows.","z":"Table (firmware compliance matrix), Bar chart (servers by firmware version), Pie chart (compliant vs non-compliant), Single value (fleet compliance percentage)."},{"i":"19.1.4","n":"Fault Trending by Severity","c":"high","f":"intermediate","v":"UCS fault trends reveal systemic hardware issues, environmental problems, or configuration problems across the compute fleet. Rising fault counts indicate deteriorating conditions requiring proactive attention.","t":"`Splunk_TA_cisco-ucs`, UCS Manager faults","d":"UCS Manager fault log, syslog","q":"index=cisco_ucs sourcetype=\"cisco:ucs:faults\"\n| timechart span=1h count by severity\n| fields _time critical major minor warning info","m":"Forward UCS Manager faults via syslog or API polling. Categorize faults by severity and type. Track fault lifecycle (create, clear, acknowledge). Alert on critical/major fault count exceeding baseline by >50%. Report weekly on fault trends and resolution times.","z":"Timechart (fault trends by severity), Bar chart (top fault codes), Single value (open critical faults), Table (active faults detail)."},{"i":"19.1.5","n":"FI Port Channel Health","c":"critical","f":"intermediate","v":"Fabric Interconnects are the network gateway for all UCS compute. Port-channel failures reduce bandwidth or cause complete loss of connectivity, impacting every workload in the UCS domain.","t":"`Splunk_TA_cisco-ucs`, UCS Manager stats","d":"UCS Manager FI port-channel statistics, FI syslog","q":"index=cisco_ucs sourcetype=\"cisco:ucs:fi_stats\"\n| search object_type=\"port_channel\"\n| eval member_pct=round((active_members/configured_members)*100, 0)\n| stats latest(oper_state) as status, latest(member_pct) as active_pct, latest(rx_bps) as rx_rate, latest(tx_bps) as tx_rate by fi_id, pc_id, pc_name\n| eval health=case(status!=\"up\", \"Down\", active_pct<100, \"Degraded\", 1==1, \"Healthy\")\n| table fi_id, pc_id, pc_name, status, active_pct, rx_rate, tx_rate, health","m":"Monitor FI port-channel status every 30 seconds. Track member link count vs configured count. Alert on any port-channel with less than 100% members active. Monitor FI uplink utilization for capacity planning. Correlate FI events with server connectivity issues.","z":"Status grid (port-channel health), Gauge (member active percentage), Timechart (utilization trending), Table (degraded port-channels)."},{"i":"19.1.6","n":"Power and Thermal Monitoring","c":"high","f":"intermediate","v":"UCS power and thermal data helps optimize data center capacity planning, detect cooling failures before overheating causes server throttling, and track energy efficiency metrics for sustainability reporting.","t":"`Splunk_TA_cisco-ucs`, UCS Manager environmental","d":"UCS Manager environmental statistics, power supply metrics","q":"index=cisco_ucs sourcetype=\"cisco:ucs:environmental\"\n| eval metric_type=case(stat_name LIKE \"%power%\", \"Power\", stat_name LIKE \"%temp%\", \"Temperature\", stat_name LIKE \"%fan%\", \"Fan\", 1==1, \"Other\")\n| stats avg(value) as avg_val, max(value) as max_val by chassis_id, metric_type, unit\n| eval status=case(\n    metric_type==\"Temperature\" AND max_val>75, \"Critical\",\n    metric_type==\"Temperature\" AND max_val>65, \"Warning\",\n    metric_type==\"Fan\" AND avg_val<2000, \"Warning\",\n    1==1, \"Normal\")\n| table chassis_id, metric_type, avg_val, max_val, unit, status","m":"Collect UCS environmental data via API every 60 seconds. Track per-chassis power draw, inlet/outlet temperatures, and fan speeds. Set thermal thresholds based on vendor specs. Alert on overheating or fan failures. Report monthly power consumption for capacity and cost planning.","z":"Gauge (temperature/power), Timechart (power and thermal trending), Heatmap (chassis thermal map), Single value (total power draw)."}]},{"i":"19.2","n":"Hyper-Converged Infrastructure (HCI)","u":[{"i":"19.2.1","n":"Cluster Health Monitoring","c":"critical","f":"intermediate","v":"HCI cluster health directly determines workload availability. Monitoring overall cluster state, node availability, and service health enables rapid response to degradation before it impacts VMs and applications running on the cluster.","t":"`TA-nutanix` or vendor-specific TA, HCI management API","d":"HCI management API (Prism, vSAN Health), cluster status events","q":"index=hci sourcetype=\"hci:cluster_health\"\n| stats latest(cluster_status) as status, latest(num_nodes) as total_nodes, latest(healthy_nodes) as healthy_nodes, latest(storage_usage_pct) as storage_pct by cluster_name\n| eval node_health=round((healthy_nodes/total_nodes)*100, 0)\n| eval overall=case(status==\"HEALTHY\" AND node_health==100, \"Healthy\", status==\"WARNING\" OR node_health<100, \"Degraded\", 1==1, \"Critical\")\n| table cluster_name, overall, total_nodes, healthy_nodes, node_health, storage_pct","m":"Poll HCI management API every 60 seconds for cluster health. Track node online/offline state, storage health, and service availability. Alert on any cluster degradation (non-healthy state). Monitor rebuild operations and their impact on performance. Integrate with ITSI for service-level visibility.","z":"Status grid (cluster health map), Single value (cluster status), Gauge (storage capacity), Table (cluster details)."},{"i":"19.2.2","n":"Storage Pool Capacity","c":"high","f":"intermediate","v":"HCI storage pools are shared across all workloads. Running out of storage capacity causes VM provisioning failures, snapshot failures, and ultimately VM crashes. Proactive monitoring and forecasting prevents capacity emergencies.","t":"`TA-nutanix` or vendor-specific TA","d":"HCI storage metrics, capacity API","q":"index=hci sourcetype=\"hci:storage_metrics\"\n| stats latest(total_capacity_tb) as total_tb, latest(used_capacity_tb) as used_tb by cluster_name, storage_pool\n| eval free_tb=total_tb-used_tb\n| eval used_pct=round((used_tb/total_tb)*100, 1)\n| eval days_to_full=if(used_pct>50, round(free_tb/avg_daily_growth_tb, 0), \"N/A\")\n| table cluster_name, storage_pool, total_tb, used_tb, free_tb, used_pct, days_to_full\n| sort -used_pct","m":"Collect storage capacity metrics every 5 minutes. Track daily growth rates for forecasting. Alert at 75% warning and 85% critical thresholds. Use Splunk predict command for capacity forecasting. Plan procurement cycles based on projected exhaustion dates.","z":"Gauge (capacity utilization), Timechart (capacity trending with forecast), Table (pool details), Single value (days to capacity)."},{"i":"19.2.3","n":"Storage I/O Latency","c":"critical","f":"intermediate","v":"Storage latency directly impacts application performance on HCI. Elevated latency affects all VMs on the cluster. Early detection of latency spikes enables workload rebalancing or troubleshooting before user impact escalates.","t":"`TA-nutanix` or vendor-specific TA","d":"HCI performance metrics, per-VM I/O statistics","q":"index=hci sourcetype=\"hci:io_metrics\"\n| stats avg(read_latency_ms) as avg_read_lat, avg(write_latency_ms) as avg_write_lat, max(read_latency_ms) as peak_read_lat, max(write_latency_ms) as peak_write_lat, sum(iops) as total_iops by cluster_name, node\n| eval status=case(peak_read_lat>20 OR peak_write_lat>20, \"Critical\", peak_read_lat>10 OR peak_write_lat>10, \"Warning\", 1==1, \"Healthy\")\n| sort -peak_write_lat\n| table cluster_name, node, avg_read_lat, peak_read_lat, avg_write_lat, peak_write_lat, total_iops, status","m":"Collect HCI I/O metrics every 30 seconds. Track read/write latency at cluster, node, and VM level. Set thresholds: >10ms warning, >20ms critical (adjust per workload SLA). Correlate latency spikes with rebuild operations, snapshot activity, or capacity constraints. Alert on sustained latency above threshold.","z":"Timechart (latency trending), Gauge (current latency), Table (high-latency nodes), Heatmap (latency by node over time)."},{"i":"19.2.4","n":"Node Performance Balance","c":"medium","f":"intermediate","v":"HCI relies on balanced workload distribution across nodes. Imbalanced nodes lead to hotspots where some nodes are overloaded while others are underutilized, reducing overall cluster efficiency and increasing failure risk.","t":"`TA-nutanix` or vendor-specific TA","d":"HCI node-level performance metrics","q":"index=hci sourcetype=\"hci:node_metrics\"\n| stats avg(cpu_pct) as avg_cpu, avg(mem_pct) as avg_mem, avg(iops) as avg_iops by cluster_name, node\n| eventstats avg(avg_cpu) as cluster_avg_cpu, stdev(avg_cpu) as cluster_stdev_cpu by cluster_name\n| eval cpu_deviation=round(abs(avg_cpu-cluster_avg_cpu)/cluster_stdev_cpu, 2)\n| eval balance=case(cpu_deviation>2, \"Imbalanced\", cpu_deviation>1, \"Slightly Imbalanced\", 1==1, \"Balanced\")\n| table cluster_name, node, avg_cpu, avg_mem, avg_iops, cpu_deviation, balance\n| sort -cpu_deviation","m":"Collect per-node CPU, memory, and I/O metrics every 60 seconds. Calculate standard deviation across nodes to detect imbalance. Alert when any node deviates >2 standard deviations from cluster average. Recommend DRS or workload migration to rebalance. Track balance improvement after actions.","z":"Bar chart (node utilization comparison), Heatmap (node balance over time), Table (imbalanced nodes), Single value (cluster balance score)."},{"i":"19.2.5","n":"Disk Failure Tracking","c":"critical","f":"intermediate","v":"Disk failures in HCI trigger data rebuild operations that consume cluster resources and temporarily reduce resilience. Tracking failures enables rapid replacement, monitoring rebuild progress, and assessing the cluster's ability to tolerate additional failures.","t":"`TA-nutanix` or vendor-specific TA","d":"HCI disk events, SMART data, rebuild status","q":"index=hci sourcetype=\"hci:disk_events\"\n| search event_type IN (\"disk_failure\", \"disk_offline\", \"disk_rebuild_start\", \"disk_rebuild_complete\", \"smart_warning\")\n| stats count as events, latest(event_type) as latest_event, latest(_time) as last_event_time by cluster_name, node, disk_id, disk_serial\n| eval status=case(\n    latest_event==\"disk_failure\" OR latest_event==\"disk_offline\", \"Failed\",\n    latest_event==\"disk_rebuild_start\", \"Rebuilding\",\n    latest_event==\"smart_warning\", \"Warning\",\n    1==1, \"OK\")\n| search status!=\"OK\"\n| table cluster_name, node, disk_id, disk_serial, status, last_event_time","m":"Ingest HCI disk events and SMART health data. Alert immediately on disk failures. Track rebuild start/complete times to measure rebuild duration. Monitor cluster resiliency during rebuilds (can it tolerate another failure?). Maintain spare disk inventory based on failure rate trends.","z":"Status grid (disk health by node), Timeline (failure and rebuild events), Single value (disks in rebuild), Table (failed/warning disks)."},{"i":"19.2.6","n":"Replication Factor Compliance","c":"critical","f":"intermediate","v":"HCI data resilience depends on maintaining the configured replication factor (RF2/RF3). Non-compliant replication means data loss risk if additional failures occur. Monitoring RF compliance is essential for data protection assurance.","t":"`TA-nutanix` or vendor-specific TA","d":"HCI replication status, data protection metrics","q":"index=hci sourcetype=\"hci:replication\"\n| stats latest(configured_rf) as target_rf, latest(actual_rf) as current_rf, latest(rebuild_pct) as rebuild_progress by cluster_name, container\n| eval compliant=if(current_rf>=target_rf, \"Yes\", \"No\")\n| eval risk=case(current_rf<target_rf-1, \"Data Loss Risk\", current_rf<target_rf, \"Reduced Resilience\", 1==1, \"Protected\")\n| table cluster_name, container, target_rf, current_rf, compliant, risk, rebuild_progress\n| sort risk","m":"Monitor replication factor status continuously. Alert immediately when actual RF drops below configured RF. Track rebuild progress to estimate time to full compliance. Monitor cluster capacity to ensure sufficient space for re-replication. Alert critically if RF drops to 1 (single copy\u2014data loss imminent on next failure).","z":"Single value (RF compliance status), Gauge (rebuild progress), Table (non-compliant containers), Status grid (cluster RF map)."},{"i":"19.2.7","n":"CVM (Controller VM) Health","c":"critical","f":"intermediate","v":"Nutanix Controller VMs manage all storage I/O on each node. CVM failures cause I/O to redirect to other nodes, impacting performance. Monitoring CVM health ensures the HCI control plane remains operational across all nodes.","t":"`TA-nutanix`, Nutanix CVM logs","d":"Nutanix CVM resource metrics, CVM service status logs","q":"index=hci sourcetype=\"nutanix:cvm\"\n| stats latest(cpu_pct) as cpu, latest(mem_pct) as mem, latest(stargate_status) as stargate, latest(cassandra_status) as cassandra, latest(zookeeper_status) as zk by node, cvm_ip\n| eval all_services_up=if(stargate==\"UP\" AND cassandra==\"UP\" AND zk==\"UP\", \"Yes\", \"No\")\n| eval health=case(all_services_up==\"No\", \"Critical\", cpu>80 OR mem>85, \"Warning\", 1==1, \"Healthy\")\n| table node, cvm_ip, cpu, mem, stargate, cassandra, zk, health\n| sort health","m":"Monitor CVM service status (Stargate, Cassandra, Zookeeper, Prism) every 30 seconds. Track CVM CPU and memory utilization. Alert immediately on any CVM service failure. Monitor CVM-to-CVM communication for cluster stability. Track CVM restart events and correlate with I/O disruptions.","z":"Status grid (CVM health by node), Table (CVM service status), Gauge (CVM resource utilization), Timechart (CVM metrics trending)."}]}]},{"i":20,"n":"Cost & Capacity Management","s":[{"i":"20.1","n":"Cloud Cost Monitoring","u":[{"i":"20.1.1","n":"Daily Spend Trending","c":"high","f":"intermediate","v":"Cloud costs can spiral without visibility. Daily spend trending by service, account, and tag provides the financial governance foundation \u2014 enabling teams to understand where money goes, spot trends early, and make informed optimization decisions.","t":"`Splunk Add-on for AWS` (CUR ingestion), `Splunk Add-on for Microsoft Cloud Services`, `Splunk Add-on for Google Cloud Platform`","d":"AWS Cost and Usage Report (CUR), Azure Cost Management export, GCP Billing export","q":"index=cloud_billing sourcetype=\"aws:billing:cur\"\n| eval cost=tonumber(lineItem_UnblendedCost)\n| timechart span=1d sum(cost) as daily_spend by lineItem_ProductCode\n| addtotals\n| rename Total as total_daily_spend","m":"Ingest AWS CUR, Azure Cost export, or GCP billing data daily. Parse cost line items by service, account, region, and tags. Build daily/weekly/monthly spend reports. Set trending alerts when daily spend exceeds 7-day rolling average by >20%. Enable tag-based cost allocation from day one.","z":"Timechart (daily spend trending), Stacked bar chart (spend by service), Table (top 10 services by cost), Single value (today's spend vs yesterday)."},{"i":"20.1.2","n":"Cost Anomaly Detection","c":"critical","f":"advanced","v":"Unexpected cost spikes from runaway instances, misconfigured autoscaling, or crypto-mining attacks can generate thousands in charges within hours. Automated anomaly detection catches these events before they become budget disasters.","t":"`Splunk Add-on for AWS`, cloud billing TAs","d":"Billing data with historical trending","q":"index=cloud_billing sourcetype=\"aws:billing:cur\"\n| eval cost=tonumber(lineItem_UnblendedCost)\n| timechart span=1d sum(cost) as daily_spend by lineItem_UsageAccountId\n| foreach * [eval <<FIELD>>

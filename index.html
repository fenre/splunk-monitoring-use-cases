<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Splunk Infrastructure Monitoring — Use Case Repository</title>
<!-- Splunk Design System–aligned: @splunk/themes typography, spacing, accessibility (WCAG) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Inconsolata:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ==========================================================================
   Use Case Repository — Splunk Design System tokens (fonts, sizes, spacing)
   - Fonts: Source Sans 3 / Inconsolata (Splunk Platform Sans/Mono fallbacks)
   - Sizes: @splunk/themes scale (0.75rem–1.5rem), default body 0.875rem (14px)
   ========================================================================== */
:root {
  /* Surfaces — darker for stronger contrast */
  --splunk-bg-base: #08090b;
  --splunk-bg-surface: #0e1013;
  --splunk-bg-elevated: #14171b;
  --splunk-bg-overlay: #1a1d22;
  /* Borders — stronger so edges read clearly */
  --splunk-border-subtle: #2a2e35;
  --splunk-border-default: #3a4049;
  --splunk-border-strong: #4c535e;
  /* Text — brighter for higher contrast */
  --splunk-text-primary: #f4f5f6;
  --splunk-text-secondary: #b8bcc4;
  --splunk-text-tertiary: #8c929d;
  /* Brand — teal-green accent (one clear accent, no purple/gradient) */
  --splunk-green: #00a67e;
  --splunk-green-hover: #00c492;
  --splunk-green-muted: rgba(0, 166, 126, 0.14);
  --splunk-green-rgb: 0, 166, 126;
  /* Semantic — earthy criticality (terracotta, ochre, tan, sage) */
  --splunk-critical: #c45c3e;
  --splunk-high: #c4942e;
  --splunk-medium: #b8a038;
  --splunk-low: #5c8a5c;
  --splunk-critical-rgb: 196, 92, 62;
  --splunk-high-rgb: 196, 148, 46;
  --splunk-medium-rgb: 184, 160, 56;
  --splunk-low-rgb: 92, 138, 92;
  /* Difficulty “intermediate” and mtype tag (shared blue) */
  --splunk-intermediate: #3498db;
  --splunk-intermediate-rgb: 52, 152, 219;
  /* Spacing (8px grid) */
  --space-1: 4px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 20px;
  --space-6: 24px;
  --space-8: 32px;
  /* Typography — Splunk Design System: Platform Sans → Source Sans 3; Platform Mono → Inconsolata */
  --font-sans: 'Source Sans 3', 'Splunk Platform Sans', Roboto, Droid, 'Helvetica Neue', Helvetica, Arial, sans-serif;
  --font-mono: 'Inconsolata', 'Splunk Platform Mono', Consolas, 'Droid Sans Mono', Monaco, 'Courier New', Courier, monospace;
  /* @splunk/themes scale: fontSizeSmall 0.75rem, fontSize 0.875rem, fontSizeLarge 1rem, XLarge 1.25rem, XXLarge 1.5rem */
  --text-xs: 0.75rem;
  --text-sm: 0.875rem;
  --text-base: 0.875rem;
  --text-lg: 1rem;
  --text-xl: 1.25rem;
  --text-2xl: 1.5rem;
  --line-tight: 1.25;
  --line-normal: 1.5;
  /* Radius — square / minimal rounding */
  --radius-sm: 2px;
  --radius-md: 3px;
  --radius-lg: 4px;
  --radius-pill: 3px;
  --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.25);
  --shadow-md: 0 4px 14px rgba(0, 0, 0, 0.3);
  --shadow-lg: 0 10px 28px rgba(0, 0, 0, 0.35);
  /* Focus (accessibility) */
  --focus-ring: 0 0 0 3px rgba(0, 166, 126, 0.4);
  /* Aliases for JS-generated content that references original vars */
  --text-dim: var(--splunk-text-secondary);
  --accent: var(--splunk-green);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--font-sans);
  font-size: var(--text-base);
  line-height: var(--line-normal);
  background: var(--splunk-bg-base);
  color: var(--splunk-text-primary);
  min-height: 100vh;
  overflow-x: hidden;
}

.bg-gradient {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: -1;
  background: var(--splunk-bg-base);
}
.bg-orbs { display: none; }

/* Cards: flat surface, clear border (design tokens) */
.glass {
  background: var(--splunk-bg-surface);
  border: 1px solid var(--splunk-border-subtle);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-sm);
  transition: border-color 0.2s ease, box-shadow 0.2s ease;
}
.glass:hover {
  border-color: var(--splunk-border-default);
  box-shadow: var(--shadow-md);
}

/* Header — thin accent line so it doesn’t feel like every other dashboard */
header {
  padding: var(--space-3) var(--space-8);
  position: sticky; top: 0; z-index: 100;
  background: var(--splunk-bg-surface);
  border-bottom: 1px solid var(--splunk-border-subtle);
}
.header-inner {
  max-width: 1600px; margin: 0 auto;
  display: flex; align-items: center; gap: var(--space-6); flex-wrap: wrap;
}
.logo {
  display: flex; align-items: center; gap: var(--space-3); flex-shrink: 0;
}
.logo-icon {
  width: 36px; height: 36px; border-radius: var(--radius-md);
  background: var(--splunk-green);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; font-weight: 700; color: #fff;
}
.logo h1 {
  font-size: var(--text-lg); font-weight: 700; color: var(--splunk-text-primary);
  letter-spacing: -0.025em;
}
.logo .subtitle {
  font-size: var(--text-xs); color: var(--splunk-text-secondary); font-weight: 400;
}

/* View mode: Non-technical vs Technical */
.view-mode-toggle {
  display: flex; gap: 0; border-radius: var(--radius-md);
  border: 1px solid var(--splunk-border-subtle);
  overflow: hidden;
}
.view-mode-btn {
  padding: var(--space-2) var(--space-4);
  font-size: var(--text-sm); font-weight: 500;
  background: var(--splunk-bg-base);
  color: var(--splunk-text-secondary);
  border: none; cursor: pointer;
  transition: background 0.2s, color 0.2s;
}
.view-mode-btn:hover { background: var(--splunk-bg-elevated); color: var(--splunk-text-primary); }
.view-mode-btn.active {
  background: var(--splunk-green);
  color: #fff;
}
.view-mode-btn[aria-pressed="true"] {
  background: var(--splunk-green);
  color: #fff;
}
body.non-technical-view .technical-only { display: none !important; }
body.non-technical-view .view-mode-btn#view-nontech { background: var(--splunk-green); color: #fff; }
body.non-technical-view .view-mode-btn#view-tech { background: var(--splunk-bg-base); color: var(--splunk-text-secondary); }

/* Search — Splunk-style search bar */
.search-wrap {
  flex: 1; min-width: 280px; max-width: 480px; position: relative;
}
.search-wrap input {
  width: 100%; padding: var(--space-2) var(--space-4) var(--space-2) 40px;
  background: var(--splunk-bg-base);
  border: 1px solid var(--splunk-border-subtle);
  border-radius: var(--radius-md);
  color: var(--splunk-text-primary);
  font-size: var(--text-base); font-family: inherit;
  transition: border-color 0.2s, box-shadow 0.2s;
  outline: none;
}
.search-wrap input:hover { border-color: var(--splunk-border-default); }
.search-wrap input:focus {
  border-color: var(--splunk-green);
  box-shadow: var(--focus-ring);
}
.search-wrap input::placeholder { color: var(--splunk-text-tertiary); }
.search-icon {
  position: absolute; left: var(--space-3); top: 50%; transform: translateY(-50%);
  color: var(--splunk-text-tertiary); font-size: 16px; line-height: 0;
}
.si { display: inline-block; width: 1em; height: 1em; vertical-align: middle; fill: currentColor; }
.si-lg { width: 1.25em; height: 1.25em; }

.equipment-wrap {
  display: flex; align-items: center; gap: var(--space-2); flex-shrink: 0;
}
.equipment-label {
  font-size: var(--text-sm); color: var(--splunk-text-secondary); font-weight: 500;
  white-space: nowrap;
}
#equipment-select {
  min-width: 180px; max-width: 240px;
  padding: var(--space-2) var(--space-3);
  background: var(--splunk-bg-base);
  border: 1px solid var(--splunk-border-subtle);
  border-radius: var(--radius-md);
  color: var(--splunk-text-primary);
  font-size: var(--text-sm); font-family: inherit;
  cursor: pointer;
  transition: border-color 0.2s;
}
#equipment-select:hover { border-color: var(--splunk-border-default); }
#equipment-select:focus {
  outline: none;
  border-color: var(--splunk-green);
  box-shadow: var(--focus-ring);
}
.equipment-model-wrap {
  display: flex; align-items: center; gap: var(--space-2);
}
#equipment-model-select {
  min-width: 160px; max-width: 200px;
  padding: var(--space-2) var(--space-3);
  background: var(--splunk-bg-base);
  border: 1px solid var(--splunk-border-subtle);
  border-radius: var(--radius-md);
  color: var(--splunk-text-primary);
  font-size: var(--text-sm); font-family: inherit;
  cursor: pointer;
  transition: border-color 0.2s;
}
#equipment-model-select:hover { border-color: var(--splunk-border-default); }
#equipment-model-select:focus {
  outline: none;
  border-color: var(--splunk-green);
  box-shadow: var(--focus-ring);
}

.header-stat {
  font-size: var(--text-sm); color: var(--splunk-text-secondary);
  display: flex; align-items: center; gap: var(--space-1); flex-shrink: 0;
}
.header-stat .num { font-weight: 600; color: var(--splunk-green); font-size: var(--text-base); }

/* Theme switch — light-switch style, top right */
.theme-switch-btn {
  margin-left: auto;
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center; gap: var(--space-2);
  min-width: 72px; height: 36px;
  padding: 0 var(--space-4);
  font-size: var(--text-sm); font-weight: 500; font-family: inherit;
  color: var(--splunk-text-primary);
  background: var(--splunk-bg-elevated);
  border: 1px solid var(--splunk-border-default);
  border-radius: 18px;
  cursor: pointer;
  transition: background 0.2s, border-color 0.2s, box-shadow 0.2s;
  box-shadow: var(--shadow-sm);
}
.theme-switch-btn:hover {
  background: var(--splunk-bg-overlay);
  border-color: var(--splunk-border-strong);
  box-shadow: var(--shadow-md);
}
.theme-switch-btn:focus {
  outline: none;
  border-color: var(--splunk-green);
  box-shadow: var(--focus-ring);
}
.theme-switch-btn::before {
  content: '';
  width: 14px; height: 14px;
  border-radius: 50%;
  background: var(--splunk-text-tertiary);
  flex-shrink: 0;
}
html.light-mode .theme-switch-btn::before {
  background: #f0c040;
  box-shadow: 0 0 8px rgba(240, 192, 64, 0.5);
}

/* Text size control — site-wide scale step */
.text-size-control {
  display: flex; align-items: center; gap: var(--space-2); flex-shrink: 0;
}
.text-size-label {
  font-size: var(--text-sm); color: var(--splunk-text-secondary); font-weight: 500;
}
.text-size-control button {
  width: 28px; height: 28px;
  font-size: var(--text-base); font-weight: 600; line-height: 1;
  font-family: var(--font-sans);
  color: var(--splunk-text-primary);
  background: var(--splunk-bg-elevated);
  border: 1px solid var(--splunk-border-subtle);
  border-radius: var(--radius-md);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.2s, border-color 0.2s, color 0.2s;
}
.text-size-control button:hover {
  background: var(--splunk-bg-overlay);
  border-color: var(--splunk-border-default);
  color: var(--splunk-green);
}
.text-size-control button:focus-visible {
  outline: none;
  box-shadow: var(--focus-ring);
}
.text-size-control button:disabled {
  opacity: 0.4; cursor: not-allowed;
}

/* Footer */
.site-footer {
  margin-top: var(--space-8);
  padding: var(--space-4) var(--space-6);
  background: var(--splunk-bg-surface);
  border-top: 1px solid var(--splunk-border-subtle);
}
.footer-inner {
  max-width: 1600px; margin: 0 auto;
  display: flex; align-items: center; justify-content: space-between; gap: var(--space-6); flex-wrap: wrap;
}
.footer-meta {
  display: flex; align-items: center; gap: var(--space-4); flex-wrap: wrap;
  font-size: var(--text-sm); color: var(--splunk-text-secondary);
}
.footer-author-text { margin: 0; }
.footer-link {
  color: var(--splunk-text-secondary); text-decoration: none;
}
.footer-link:hover { color: var(--splunk-green); }
.footer-link[href="#"] { display: none; }

.footer-cb-toggle {
  display: flex; align-items: center; gap: var(--space-2);
  font-size: var(--text-sm); color: var(--splunk-text-secondary);
  cursor: pointer; user-select: none;
}
.footer-cb-toggle input { accent-color: var(--splunk-green); cursor: pointer; }
.footer-cb-toggle:hover { color: var(--splunk-text-primary); }
.footer-cb-label { font-weight: 500; }

/* Color-blind friendly mode — palette distinguishable for protan/deutan (red–green) */
html.colorblind-friendly {
  --splunk-critical: #6b7bc4;
  --splunk-high: #d4833a;
  --splunk-medium: #c9a227;
  --splunk-low: #2a9d8f;
  --splunk-critical-rgb: 107, 123, 196;
  --splunk-high-rgb: 212, 131, 58;
  --splunk-medium-rgb: 201, 162, 39;
  --splunk-low-rgb: 42, 157, 143;
  --splunk-intermediate: #5ba3d4;
  --splunk-intermediate-rgb: 91, 163, 212;
}

/* Light mode — full UI theme toggle */
html.light-mode {
  --splunk-bg-base: #f0f1f3;
  --splunk-bg-surface: #ffffff;
  --splunk-bg-elevated: #f5f6f8;
  --splunk-bg-overlay: #e8eaed;
  --splunk-border-subtle: #dadce0;
  --splunk-border-default: #c4c7cc;
  --splunk-border-strong: #9aa0a6;
  --splunk-text-primary: #202124;
  --splunk-text-secondary: #5f6368;
  --splunk-text-tertiary: #80868b;
  --splunk-green: #008c63;
  --splunk-green-hover: #00a070;
  --splunk-green-muted: rgba(0, 140, 99, 0.12);
  --splunk-green-rgb: 0, 140, 99;
  --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.08);
  --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.1);
  --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.12);
  --focus-ring: 0 0 0 3px rgba(0, 140, 99, 0.25);
}

/* Layout — sidebar and main align on same top and shared column grid */
.app-layout {
  max-width: 1600px; margin: 0 auto; padding: var(--space-6);
  display: grid;
  grid-template-columns: 320px 1fr;
  gap: var(--space-6);
  align-items: start;
  min-height: calc(100vh - 100px);
}

/* Sidebar — nav list styling; wider so labels don’t cut as much */
.sidebar {
  width: 320px; flex-shrink: 0; position: sticky; top: 100px;
  max-height: calc(100vh - 124px); overflow-y: auto;
  padding: var(--space-4);
  scrollbar-width: thin;
  scrollbar-color: var(--splunk-border-default) transparent;
}
.sidebar .cat-item:first-child { margin-top: 0; }
.sidebar::-webkit-scrollbar { width: 6px; }
.sidebar::-webkit-scrollbar-thumb { background: var(--splunk-border-default); border-radius: 3px; }

.cat-item {
  padding: var(--space-2) var(--space-3);
  border-radius: var(--radius-md);
  cursor: pointer;
  margin-bottom: var(--space-1);
  transition: background 0.15s ease;
  display: flex; align-items: center; gap: var(--space-2);
  font-size: var(--text-sm); font-weight: 400; color: var(--splunk-text-secondary);
}
.cat-item:hover { background: var(--splunk-bg-elevated); color: var(--splunk-text-primary); }
.cat-item:focus-visible { outline: 2px solid var(--splunk-green); outline-offset: 2px; }
.cat-item.active {
  background: var(--splunk-green-muted);
  color: var(--splunk-text-primary);
  font-weight: 600;
  border: 1px solid rgba(var(--splunk-green-rgb), 0.35);
}
.cat-num {
  width: 24px; height: 24px; border-radius: var(--radius-sm);
  background: var(--splunk-bg-elevated);
  display: flex; align-items: center; justify-content: center;
  font-size: var(--text-xs); font-weight: 600; flex-shrink: 0;
  color: var(--splunk-green);
}
.cat-item.active .cat-num {
  background: var(--splunk-green);
  color: #fff;
}
.cat-count {
  margin-left: auto; font-size: var(--text-xs); color: var(--splunk-text-tertiary);
  background: var(--splunk-bg-elevated); padding: 2px var(--space-2);
  border-radius: var(--radius-sm);
}
.cat-chevron {
  margin-left: var(--space-1); font-size: var(--text-xs); color: var(--splunk-text-tertiary);
  transition: transform 0.2s ease; flex-shrink: 0;
}
.cat-item.active .cat-chevron { transform: rotate(90deg); }
/* Category/subcat labels: up to 2 lines then ellipsis so less text is cut */
.cat-item .cat-name,
.subcat-item .subcat-name {
  min-width: 0;
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  word-break: break-word;
  white-space: normal;
}
.subcat-list {
  max-height: 0; overflow: hidden; transition: max-height 0.25s ease;
  margin-left: var(--space-4); border-left: 1px solid var(--splunk-border-subtle);
}
.subcat-list.open { max-height: 2000px; }
.subcat-item {
  padding: var(--space-1) var(--space-3);
  border-radius: var(--radius-sm);
  cursor: pointer;
  margin: 1px 0;
  font-size: var(--text-sm);
  color: var(--splunk-text-secondary);
  transition: background 0.15s ease;
  display: flex; align-items: center; gap: var(--space-2);
  min-width: 0;
}
.subcat-item:hover { background: var(--splunk-bg-elevated); color: var(--splunk-text-primary); }
.subcat-item.active {
  background: var(--splunk-green-muted);
  color: var(--splunk-green);
  font-weight: 500;
}
.subcat-item .sc-count { margin-left: auto; font-size: var(--text-xs); color: var(--splunk-text-tertiary); flex-shrink: 0; }

/* Main content — top padding matches sidebar content (space-4), left/right gutters */
.main-content {
  min-width: 0;
  padding: var(--space-4) var(--space-6) 0 var(--space-4);
}
.main-content > .glass:first-child,
.main-content > .ov-hero:first-child,
.main-content > .cat-header:first-child { margin-top: 0; }

/* Category header — comfortable padding inside card */
.cat-header {
  padding: var(--space-5) var(--space-8) var(--space-5) var(--space-5);
  margin-bottom: var(--space-5);
  background: var(--splunk-bg-surface);
  border: 1px solid var(--splunk-border-subtle);
  border-radius: var(--radius-lg);
}
.cat-header h2 {
  font-size: var(--text-2xl); font-weight: 700; color: var(--splunk-text-primary);
  margin-bottom: var(--space-2);
}
.cat-header .cat-meta {
  font-size: var(--text-sm); color: var(--splunk-text-secondary);
  display: flex; gap: var(--space-4);
}

/* Filter bar — comfortable spacing from edges */
.filter-bar {
  display: flex; gap: var(--space-2); flex-wrap: wrap; margin-bottom: var(--space-5);
  padding: var(--space-2) 0;
}
.filter-btn {
  padding: var(--space-2) var(--space-4);
  border-radius: var(--radius-pill);
  border: 1px solid var(--splunk-border-subtle);
  background: var(--splunk-bg-surface);
  color: var(--splunk-text-secondary);
  font-size: var(--text-sm); font-weight: 500; cursor: pointer;
  font-family: inherit;
  transition: border-color 0.2s, background 0.2s, color 0.2s;
}
.filter-btn:hover { background: var(--splunk-bg-elevated); color: var(--splunk-text-primary); }
.filter-btn:focus-visible { outline: 2px solid var(--splunk-green); outline-offset: 2px; }
.filter-btn.active {
  background: var(--splunk-green-muted);
  border-color: var(--splunk-green);
  color: var(--splunk-green);
}
.filter-btn.crit { border-color: rgba(var(--splunk-critical-rgb), 0.5); }
.filter-btn.crit.active { background: rgba(var(--splunk-critical-rgb), 0.12); color: var(--splunk-critical); }
.filter-btn.high { border-color: rgba(var(--splunk-high-rgb), 0.5); }
.filter-btn.high.active { background: rgba(var(--splunk-high-rgb), 0.12); color: var(--splunk-high); }
.filter-btn.med { border-color: rgba(var(--splunk-medium-rgb), 0.5); }
.filter-btn.med.active { background: rgba(var(--splunk-medium-rgb), 0.12); color: var(--splunk-medium); }
.filter-btn.low2 { border-color: rgba(var(--splunk-low-rgb), 0.5); }
.filter-btn.low2.active { background: rgba(var(--splunk-low-rgb), 0.12); color: var(--splunk-low); }
.filter-sep {
  width: 1px; height: 24px; background: var(--splunk-border-subtle);
  margin: 0 var(--space-1); align-self: center;
}
.filter-btn.beg { border-color: rgba(var(--splunk-green-rgb), 0.5); }
.filter-btn.beg.active { background: var(--splunk-green-muted); color: var(--splunk-green); }
.filter-btn.inter { border-color: rgba(var(--splunk-intermediate-rgb), 0.5); }
.filter-btn.inter.active { background: rgba(var(--splunk-intermediate-rgb), 0.12); color: var(--splunk-intermediate); }
.filter-btn.advf { border-color: rgba(var(--splunk-high-rgb), 0.5); }
.filter-btn.advf.active { background: rgba(var(--splunk-high-rgb), 0.12); color: var(--splunk-high); }
.filter-btn.expf { border-color: rgba(var(--splunk-critical-rgb), 0.5); }

.nt-uc-arrow .si { width: 12px; height: 12px; }

.nt-uc-item:hover { border-left-color: var(--splunk-green); background: rgba(101,166,55,0.06); }
.nt-uc-why { font-size: var(--text-sm); color: var(--splunk-text-secondary); line-height: 1.5; }

/* Non-technical visualization mockups */
.ntviz-desc { font-size: var(--text-sm); color: var(--splunk-text-secondary); margin-bottom: var(--space-4); line-height: 1.5; }
.ntviz-panels { display: flex; flex-wrap: wrap; gap: var(--space-4); margin-top: var(--space-3); }
.ntviz-panel {

  border: 1px solid var(--splunk-border-subtle);
  border-radius: var(--radius-md);
  overflow: hidden;
}
.ntviz-panel-title {
  font-size: 11px; font-weight: 600; color: var(--splunk-text-secondary);
  padding: 6px 10px;
  background: var(--splunk-bg-elevated);

}
.ntviz-svg { width: 100%; height: auto; display: block; }
.ntviz-sv { max-width: 200px; margin: 0 auto; }
.nt-full-link { margin-top: var(--space-6); padding-top: var(--space-4); border-top: 1px solid var(--splunk-border-subtle); }

}

.ov-starter-value { font-size: var(--text-sm); color: var(--splunk-text-secondary); line-height: 1.4; margin-bottom: var(--space-2); }
.ov-starter-ta { font-size: var(--text-xs); color: var(--splunk-green); font-family: var(--font-mono); }
.ov-spl-toggle {

.ov-spl-block {

  font-family: var(--font-mono); font-size: var(--text-sm);

.ov-spl-block.show { display: block; }
.ov-spl-block .copy-btn {

.ov-spl-block .copy-btn:hover { background: rgba(var(--splunk-green-rgb), 0.25); color: var(--splunk-green-hover); }

.ov-section-title { font-size: var(--text-xl); font-weight: 700; color: var(--splunk-text-primary); margin-bottom: var(--space-2); }
.ov-section-title.ov-collapsible {

}

.ov-collapse-arrow { font-size: 12px; transition: transform 0.25s ease; color: var(--splunk-green); }

.ov-section-sub { font-size: var(--text-sm); color: var(--splunk-text-secondary); margin-bottom: var(--space-6); }

.sidebar-toggle {

@media (max-width: 900px) {

}

@media (max-width: 600px) {

  .uc-grid { gap: var(--space-3); }
  .uc-card { padding: var(--space-3); }
  .modal-overlay { padding: 0; align-items: flex-end; }
  .modal {
    max-width: 100%; width: 100%;
    border-radius: var(--radius-lg) var(--radius-lg) 0 0;
    max-height: 92vh; overflow-y: auto;
  }
  .modal-close { top: var(--space-3); right: var(--space-4); }
  .modal-head { flex-wrap: wrap; gap: var(--space-2); padding-right: 48px; }
  .modal h2 { font-size: var(--text-lg); }
  .modal-meta-grid { grid-template-columns: 1fr; }
  .spl-block { font-size: var(--text-xs); padding: var(--space-3); }
  .ov-hero { padding: var(--space-6) var(--space-4); }
  .ov-hero h2 { font-size: var(--text-xl); }
  .ov-stat-num { font-size: 24px; }
  .ov-stats { gap: var(--space-4); }
  .ov-roadmap { grid-template-columns: 1fr; gap: var(--space-4); }
  .ov-cat-grid { grid-template-columns: 1fr; }
  .ov-spl-block { font-size: var(--text-xs); }
  .cat-item { min-height: 44px; }
  .subcat-item { min-height: 40px; }
  .filter-btn { min-height: 36px; }
}

::-webkit-scrollbar { width: 6px; height: 6px; }

.ov-spl-block pre { margin: 0; padding: 0; background: none; border: none; font: inherit; }

function si(name, cls) {
  return '<svg class="si' + (cls ? ' ' + cls : '') + '" viewBox="0 0 24 24" aria-hidden="true">' + SI_PATHS[name] + '</svg>';
}

// Flatten all UCs for quick search
let allUCs = [];
let ucIndex = {}; // id -> {cat, subcat, uc, flatIdx}
DATA.forEach(cat => {
  cat.s.forEach(sc => {
    sc.u.forEach(uc => {
      const entry = {cat, sc, uc, flatIdx: allUCs.length};
      allUCs.push(entry);
      ucIndex[uc.i] = entry;
    });
  });
});

let currentCat = null;
let currentFilter = 'all';
let currentDiffFilter = 'all';
let currentMtypeFilter = 'all';
let currentSearch = '';
let currentUCIdx = -1;
let selectedEquipmentId = '';
let currentDisplayedList = []; // list of {cat, sc, uc} currently shown (for modal prev/next)

// Non-technical view: plain-language mode for non-technical users (persisted)
let nonTechnicalView = false;
function setNonTechnicalView(on) {
  nonTechnicalView = on;
  try { localStorage.setItem('nonTechnicalView', on ? 'true' : 'false'); } catch (e) {}
  document.body.classList.toggle('non-technical-view', on);
  var btnNon = document.getElementById('view-nontech');
  var btnTech = document.getElementById('view-tech');
  if (btnNon) { btnNon.classList.toggle('active', on); btnNon.setAttribute('aria-pressed', on ? 'true' : 'false'); }
  if (btnTech) { btnTech.classList.toggle('active', !on); btnTech.setAttribute('aria-pressed', !on ? 'true' : 'false'); }
  buildSidebar();
  if (on) {
    if (currentCat === null) renderNonTechnicalOverview();
    else renderNonTechnicalCategory(currentCat);
  } else {
    if (currentCat === null) renderOverview();
    else renderCategory(currentCat);
  }
}

function isEquipmentModelId(compoundId) {
  var list = EQUIPMENT || [];
  for (var i = 0; i < list.length; i++) {
    var eq = list[i];
    if (!eq.models) continue;
    for (var j = 0; j < eq.models.length; j++) {
      if (compoundId === eq.id + '_' + eq.models[j].id) return true;
    }
  }
  return false;
}

function getFilteredUCs() {
  if (!selectedEquipmentId) return allUCs;
  var byModel = isEquipmentModelId(selectedEquipmentId);
  return allUCs.filter(function(e) {
    if (byModel) {
      var em = e.uc.em;
      return Array.isArray(em) && em.indexOf(selectedEquipmentId) !== -1;
    }
    var eq = e.uc.e;
    return Array.isArray(eq) && eq.indexOf(selectedEquipmentId) !== -1;
  });
}

function updateEquipmentSelect() {
  var sel = document.getElementById('equipment-select');
  if (!sel) return;
  sel.innerHTML = '<option value="">All equipment</option>';
  (EQUIPMENT || []).forEach(function(eq) {
    var opt = document.createElement('option');
    opt.value = eq.id;
    opt.textContent = eq.label;
    if (eq.id === selectedEquipmentId) opt.selected = true;
    sel.appendChild(opt);
  });
}

function updateCountLabel() {
  var n = selectedEquipmentId ? getFilteredUCs().length : allUCs.length;
  var el = document.getElementById('total-count');
  if (el) el.textContent = n;
}

function getEquipmentById(id) {
  return (EQUIPMENT || []).filter(function(e) { return e.id === id; })[0] || null;
}

function applyEquipmentFilter() {
  updateCountLabel();
  buildSidebar();
  if (nonTechnicalView) {
    if (currentCat === null) renderNonTechnicalOverview();
    else renderNonTechnicalCategory(currentCat);
  } else if (currentSearch) renderSearchResults();
  else if (currentCat !== null) renderCategory(currentCat);
  else {
    if (selectedEquipmentId) ovGroupFilter = 'alluc';
    renderOverview();
  }
}

// Init stats and equipment dropdown
document.getElementById('total-count').textContent = allUCs.length;
updateEquipmentSelect();
document.getElementById('equipment-select').addEventListener('change', function() {
  var val = (this.value || '').trim();
  var eq = val ? getEquipmentById(val) : null;
  var modelWrap = document.getElementById('equipment-model-wrap');
  var modelSel = document.getElementById('equipment-model-select');
  if (eq && eq.models && eq.models.length) {
    modelWrap.style.display = 'flex';
    modelSel.innerHTML = '<option value="">All models</option>';
    eq.models.forEach(function(m) {
      var opt = document.createElement('option');
      opt.value = m.id;
      opt.textContent = m.label;
      modelSel.appendChild(opt);
    });
    selectedEquipmentId = val;
  } else {
    modelWrap.style.display = 'none';
    modelSel.innerHTML = '<option value="">All models</option>';
    selectedEquipmentId = val;
  }
  applyEquipmentFilter();
});
document.getElementById('equipment-model-select').addEventListener('change', function() {
  var eqVal = (document.getElementById('equipment-select').value || '').trim();
  var modelVal = (this.value || '').trim();
  selectedEquipmentId = eqVal + (modelVal ? '_' + modelVal : '');
  applyEquipmentFilter();
});

// Text size: site-wide scale step (persisted in localStorage)
var TEXT_SIZE_STORAGE_KEY = 'uc-text-size-step';
var TEXT_SIZE_MIN = -2, TEXT_SIZE_MAX = 2;
// Splunk Design System scale (step 0 = @splunk/themes: 0.75rem–1.5rem, default body 0.875rem)
var TEXT_SIZE_SCALE = [
  { xs: '0.5625rem', sm: '0.6875rem', base: '0.6875rem', lg: '0.8125rem', xl: '1rem',     x2: '1.25rem' },  // -2
  { xs: '0.625rem',  sm: '0.75rem',   base: '0.75rem',   lg: '0.875rem', xl: '1.125rem', x2: '1.375rem' },  // -1
  { xs: '0.75rem',   sm: '0.875rem', base: '0.875rem',  lg: '1rem',     xl: '1.25rem',  x2: '1.5rem' },   // 0 Splunk default

];
function getTextSizeStep() {
  var s = localStorage.getItem(TEXT_SIZE_STORAGE_KEY);
  var n = s != null ? parseInt(s, 10) : 0;
  if (isNaN(n) || n < TEXT_SIZE_MIN || n > TEXT_SIZE_MAX) n = 0;
  return n;
}
function setTextSizeStep(step) {
  step = Math.max(TEXT_SIZE_MIN, Math.min(TEXT_SIZE_MAX, step));
  localStorage.setItem(TEXT_SIZE_STORAGE_KEY, String(step));
  var t = TEXT_SIZE_SCALE[step + 2];
  var r = document.documentElement;
  r.style.setProperty('--text-xs', t.xs);
  r.style.setProperty('--text-sm', t.sm);
  r.style.setProperty('--text-base', t.base);
  r.style.setProperty('--text-lg', t.lg);
  r.style.setProperty('--text-xl', t.xl);
  r.style.setProperty('--text-2xl', t.x2);
  var down = document.getElementById('text-size-down');
  var up = document.getElementById('text-size-up');
  if (down) down.disabled = step <= TEXT_SIZE_MIN;
  if (up) up.disabled = step >= TEXT_SIZE_MAX;
}
setTextSizeStep(getTextSizeStep());
document.getElementById('text-size-down').addEventListener('click', function() {
  setTextSizeStep(getTextSizeStep() - 1);
});
document.getElementById('text-size-up').addEventListener('click', function() {

});

// Derive top quick-win starters per category from DATA
const CRIT_ORDER = {critical:0, high:1, medium:2, low:3};
const DIFF_ORDER = {beginner:0, intermediate:1, advanced:2, expert:3};
// Quick win = high impact (critical/high) and low effort (beginner only)
function getStarters(cat, n) {
  const ucs = [];
  cat.s.forEach(sc => sc.u.forEach(uc => {
    if ((uc.c==='critical'||uc.c==='high') && uc.f==='beginner')
      ucs.push({uc, sc: sc.n});
  }));
  ucs.sort((a,b) => (CRIT_ORDER[a.uc.c]||9) - (CRIT_ORDER[b.uc.c]||9)
    || (DIFF_ORDER[a.uc.f]||9) - (DIFF_ORDER[b.uc.f]||9));
  return ucs.slice(0, n||5);
}

// Starters from a filtered list (when equipment selected: top by criticality, any difficulty)
function getStartersFromFiltered(filtered, catId, n) {
  const forCat = filtered.filter(function(e) { return e.cat.i === catId; });
  forCat.sort(function(a,b) {
    return (CRIT_ORDER[a.uc.c]||9) - (CRIT_ORDER[b.uc.c]||9)
      || (DIFF_ORDER[a.uc.f]||9) - (DIFF_ORDER[b.uc.f]||9);
  });
  return forCat.slice(0, n||5).map(function(e) { return { uc: e.uc, sc: e.sc.n }; });
}

function openNTUC(id, why) {
  var entry = ucIndex[id];
  if (!entry) return;
  renderNTModal(entry, why);
  document.getElementById('modal-overlay').classList.add('show');
  document.body.style.overflow = 'hidden';
}

function renderNTModal(entry, why) {
  var uc = entry.uc;
  var cat = entry.cat;
  var sc = entry.sc;
  var html = '<div style="position:relative">';
  html += '<button class="modal-close" onclick="closeModal()">' + si('cross') + '</button>';
  html += '<div class="modal-head">';
  html += '<div><h2>' + escHtml(uc.n) + '</h2>';
  html += '<div class="modal-id" style="margin-top:4px">' + escHtml(cat.n) + '</div>';
  html += '</div></div>';

  html += '<div class="modal-section"><h3>What this does</h3><p>' + escHtml(uc.v) + '</p></div>';

  if (why) {
    html += '<div class="modal-section"><h3>Why it matters</h3><p>' + escHtml(why) + '</p></div>';
  }

  if (uc.m) {
    var implSimple = uc.m;
    html += '<div class="modal-section"><h3>How it works</h3><p>' + escHtml(implSimple) + '</p></div>';
  }

  if (uc.z) {
    html += '<div class="modal-section"><h3>What the dashboard looks like</h3>';
    html += '<p class="ntviz-desc">' + escHtml(uc.z) + '</p>';
    html += ntVizMockups(uc.z);
    html += '</div>';
  }

  html += '<div class="nt-full-link"><button type="button" class="nt-full-btn" onclick="closeModal(); openUC(\'' + uc.i + '\')">View full technical details</button></div>';

  html += '</div>';
  document.getElementById('modal').innerHTML = html;
}

function filterBtns() {
  let html = [
    {id:'all',label:'All',cls:''},
    {id:'critical',label:'Critical',cls:' crit'},
    {id:'high',label:'High',cls:' high'},
    {id:'medium',label:'Medium',cls:' med'},
    {id:'low',label:'Low',cls:' low2'}
  ].map(f =>
    '<button class="filter-btn' + f.cls + (currentFilter===f.id?' active':'') +
    '" onclick="setFilter(\'' + f.id + '\')">' + f.label + '</button>'
  ).join('');
  html += '<div class="filter-sep"></div>';
  html += [
    {id:'all',label:'All Levels',cls:''},
    {id:'beginner',label:'Beginner',cls:' beg'},
    {id:'intermediate',label:'Intermediate',cls:' inter'},
    {id:'advanced',label:'Advanced',cls:' advf'},
    {id:'expert',label:'Expert',cls:' expf'}
  ].map(f =>
    '<button class="filter-btn' + f.cls + (currentDiffFilter===f.id?' active':'') +
    '" onclick="setDiffFilter(\'' + f.id + '\')">' + f.label + '</button>'
  ).join('');
  return html;
}

function getMtypeFilterBtns(catId, resultsForTypes) {
  const types = new Set();
  if (resultsForTypes && resultsForTypes.length) {
    resultsForTypes.forEach(e => {
      const uc = e.uc || e;
      if (Array.isArray(uc.mtype)) uc.mtype.forEach(t => types.add(t));
    });
  } else if (catId != null) {
    const cat = DATA.find(c => c.i === catId);
    if (cat) cat.s.forEach(sc => sc.u.forEach(uc => {
      if (Array.isArray(uc.mtype)) uc.mtype.forEach(t => types.add(t));
    }));
  }
  if (types.size === 0) return '';
  const order = ['Availability','Performance','Security','Configuration','Capacity','Fault','Anomaly','Compliance'];
  const sorted = [...types].sort((a,b) => {
    const ia = order.indexOf(a); const ib = order.indexOf(b);
    if (ia >= 0 && ib >= 0) return ia - ib;
    if (ia >= 0) return -1; if (ib >= 0) return 1;
    return a.localeCompare(b);
  });
  let html = '<div class="mtype-filter-wrap"><span class="mtype-label">Monitoring type:</span>';
  html += '<button class="mtype-filter-chip' + (currentMtypeFilter==='all'?' active':'') + '" data-mtype="all" onclick="setMtypeFilter(this.dataset.mtype)">All</button>';
  sorted.forEach(t => {
    html += '<button class="mtype-filter-chip' + (currentMtypeFilter===t?' active':'') + '" data-mtype="' + escHtml(t) + '" onclick="setMtypeFilter(this.dataset.mtype)">' + escHtml(t) + '</button>';
  });
  html += '</div>';
  return html;
}

function setMtypeFilter(mtype) {
  currentMtypeFilter = mtype;
  if (nonTechnicalView) return;
  if (currentSearch) renderSearchResults();
  else if (currentCat !== null) renderCategory(currentCat);
}

// Render category
function renderCategory(catId) {
  const cat = DATA.find(c => c.i === catId);
  if (!cat) return;

  let html = '<div class="cat-header glass">';
  html += '<h2>' + cat.i + '. ' + cat.n + '</h2>';
  const count = cat.s.reduce((a,s) => a + s.u.length, 0);
  html += '<div class="cat-meta"><span>' + cat.s.length + ' subcategories</span>';
  html += '<span>' + count + ' use cases</span></div></div>';

  html += '<div class="filter-bar">' + filterBtns() + '</div>';
  html += getMtypeFilterBtns(catId);

  currentDisplayedList = [];
  cat.s.forEach(sc => {
    let ucs = sc.u;
    if (selectedEquipmentId) {
      if (isEquipmentModelId(selectedEquipmentId))
        ucs = ucs.filter(function(u) { return Array.isArray(u.em) && u.em.indexOf(selectedEquipmentId) !== -1; });
      else
        ucs = ucs.filter(function(u) { return Array.isArray(u.e) && u.e.indexOf(selectedEquipmentId) !== -1; });
    }
    if (currentFilter !== 'all') ucs = ucs.filter(u => u.c === currentFilter);
    if (currentDiffFilter !== 'all') ucs = ucs.filter(u => u.f === currentDiffFilter);
    if (currentMtypeFilter !== 'all') ucs = ucs.filter(u => Array.isArray(u.mtype) && u.mtype.includes(currentMtypeFilter));
    if (currentSearch) {
      const q = currentSearch.toLowerCase();
      ucs = ucs.filter(u => {
        var text = [u.n, u.i, u.v, u.q, u.t, u.d, u.m, u.hw || ''].join(' ').toLowerCase();
        return matchesSearch(text, q);
      });
    }
    if (ucs.length === 0) return;

    html += '<div class="subcat-section" id="sc-' + sc.i.replace('.','_') + '">';
    html += '<div class="subcat-header">' + sc.i + ' ' + sc.n;
    html += '<span class="subcat-count">(' + ucs.length + ')</span></div>';
    html += '<div class="uc-grid">';
    ucs.forEach(uc => {
      currentDisplayedList.push({ cat: cat, sc: sc, uc: uc });
      html += renderUCCard(uc);
    });
    html += '</div></div>';
  });

  document.getElementById('main').innerHTML = html;
}

function renderUCCard(uc) {
  const ta = uc.t.replace(/`/g, '');
  const diffLabel = {beginner:'Beginner',intermediate:'Intermediate',advanced:'Advanced',expert:'Expert'}[uc.f]||'';
  let html = '<div class="glass uc-card ' + uc.c + '" onclick="openUC(\'' + uc.i + '\')">';
  html += '<div class="uc-card-head">';
  html += '<div class="uc-crit-dot ' + uc.c + '"></div>';
  html += '<div style="flex:1"><div class="uc-name">' + escHtml(uc.n) + '</div>';
  html += '<div class="uc-id">UC-' + uc.i + '</div></div>';
  if (diffLabel) html += '<span class="uc-diff-badge ' + uc.f + '">' + diffLabel + '</span>';
  html += '</div>';
  html += '<div class="uc-value">' + escHtml(uc.v) + '</div>';
  const cimModels = Array.isArray(uc.a) ? uc.a : null;
  const mtypes = Array.isArray(uc.mtype) ? uc.mtype : null;
  if (ta || cimModels || mtypes) {
    html += '<div class="uc-tags">';
    if (ta) html += '<span class="uc-tag">' + escHtml(ta.substring(0,40)) + '</span>';
    if (cimModels) html += '<span class="uc-cim-tag">⚡ ' + cimModels.join(', ') + '</span>';
    if (mtypes) mtypes.forEach(t => { html += '<span class="uc-mtype-tag">' + escHtml(t) + '</span>'; });
    html += '</div>';
  }
  html += '</div>';
  return html;
}

// Build searchable text for a use case entry (used by both search functions)
function ucSearchText(e) {
  const u = e.uc;
  return [u.n, u.i, u.v, u.q, u.t, u.d, u.m, e.cat.n, e.sc.n,
    Array.isArray(u.a) ? u.a.join(' ') : '',
    Array.isArray(u.mtype) ? u.mtype.join(' ') : '',
    u.hw || ''].join(' ').toLowerCase();
}
// Multi-word search: all words must appear somewhere in the searchable text
function matchesSearch(text, q) {
  var words = q.split(/\s+/).filter(function(w) { return w.length > 0; });
  for (var j = 0; j < words.length; j++) {
    if (text.indexOf(words[j]) === -1) return false;
  }
  return true;
}
// Search across all
function renderSearchResults() {
  const q = currentSearch.toLowerCase();
  let base = selectedEquipmentId ? getFilteredUCs() : allUCs;
  let results = base.filter(e => matchesSearch(ucSearchText(e), q));
  if (currentFilter !== 'all') results = results.filter(e => e.uc.c === currentFilter);
  if (currentDiffFilter !== 'all') results = results.filter(e => e.uc.f === currentDiffFilter);
  const resultsBeforeMtype = results.slice();
  if (currentMtypeFilter !== 'all') results = results.filter(e => Array.isArray(e.uc.mtype) && e.uc.mtype.includes(currentMtypeFilter));
  currentDisplayedList = results;

  let html = '<div class="cat-header glass"><h2>Search: "' + escHtml(currentSearch) + '"</h2>';
  html += '<div class="cat-meta"><span>' + results.length + ' results</span></div></div>';
  html += '<div class="filter-bar">' + filterBtns() + '</div>';
  html += getMtypeFilterBtns(null, resultsBeforeMtype);

  if (results.length === 0) {
    html += '<div class="no-results"><div class="big">' + si('magnifier') + '</div><p>No use cases match your search</p></div>';
  } else {
    // Group by category
    const grouped = {};
    results.forEach(e => {
      const key = e.cat.i;
      if (!grouped[key]) grouped[key] = {cat: e.cat, ucs: []};
      grouped[key].ucs.push(e.uc);
    });
    Object.values(grouped).forEach(g => {
      html += '<div class="subcat-section">';
      html += '<div class="subcat-header">' + g.cat.i + '. ' + g.cat.n;
      html += '<span class="subcat-count">(' + g.ucs.length + ')</span></div>';
      html += '<div class="uc-grid">';
      g.ucs.forEach(uc => { html += renderUCCard(uc); });
      html += '</div></div>';
    });
  }
  document.getElementById('main').innerHTML = html;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/** Render detailed implementation body: prose as escaped text + <br>, fenced code blocks as <pre><code>. */
function renderDetailBody(md) {
  if (!md) return '';
  var implGuideLink = '<a href="docs/implementation-guide.md" target="_blank" rel="noopener" class="impl-guide-link">Implementation guide</a>';
  var fence = /^```(\w*)$/;
  var lines = md.split('\n');
  var out = [];
  var inCode = false;
  var codeLang = '';
  var codeLines = [];
  for (var i = 0; i < lines.length; i++) {
    var line = lines[i];
    var m = line.match(fence);
    if (m) {
      if (!inCode) {
        inCode = true;
        codeLang = (m[1] || 'text').toLowerCase();
        codeLines = [];
      } else {
        inCode = false;
        var code = codeLines.join('\n');
        var langClass = codeLang ? ' language-' + codeLang : '';
        out.push('<pre><code class="' + langClass + '">' + escHtml(code) + '</code></pre>');
      }
      continue;
    }
    if (inCode) {
      codeLines.push(line);
    } else {
      var escaped = escHtml(line);
      escaped = escaped.replace(/docs\/implementation-guide\.md/g, implGuideLink);
      out.push(escaped + '<br>');
    }
  }
  if (inCode && codeLines.length) {
    var code = codeLines.join('\n');
    out.push('<pre><code class="language-' + codeLang + '">' + escHtml(code) + '</code></pre>');
  }
  return out.join('');
}

// Open use case detail
function openUC(id) {
  var idx = currentDisplayedList.findIndex(function(e) { return e.uc.i === id; });
  if (idx >= 0) {
    currentUCIdx = idx;
    renderModal(currentDisplayedList[idx]);
  } else {
    var entry = ucIndex[id];
    if (!entry) return;
    currentDisplayedList = allUCs;
    currentUCIdx = entry.flatIdx;
    renderModal(entry);
  }
  document.getElementById('modal-overlay').classList.add('show');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('show');
  document.body.style.overflow = '';
}

function renderModal(entry) {
  const uc = entry.uc;
  const cat = entry.cat;
  const sc = entry.sc;
  const critLabel = {critical:'Critical',high:'High',medium:'Medium',low:'Low'}[uc.c]||'';
  const diffLabel = {beginner:'Beginner',intermediate:'Intermediate',advanced:'Advanced',expert:'Expert'}[uc.f]||'';

  let html = '<div style="position:relative">';
  html += '<button class="modal-close" onclick="closeModal()">' + si('cross') + '</button>';
  html += '<div class="modal-head">';
  html += '<div class="modal-crit-badge ' + uc.c + '">' + critLabel + '</div>';
  if (diffLabel) html += '<div class="modal-crit-badge ' + uc.f + '">' + diffLabel + '</div>';
  html += '<div><h2>' + escHtml(uc.n) + '</h2>';
  html += '<div class="modal-id">UC-' + uc.i + ' &nbsp;|&nbsp; ' + escHtml(cat.n) + ' &rarr; ' + escHtml(sc.n) + '</div>';
  html += '</div></div>';

  html += '<div class="modal-section"><h3>Value</h3><p>' + escHtml(uc.v) + '</p></div>';

  html += '<div class="modal-meta-grid">';
  html += '<div class="meta-item"><h4>App / TA</h4><p>' + escHtml(uc.t||'—') + '</p></div>';
  html += '<div class="meta-item"><h4>Data Sources</h4><p>' + escHtml(uc.d||'—') + '</p></div>';
  if (uc.hw) {
    html += '<div class="meta-item"><h4>Equipment Models</h4><p>' + escHtml(uc.hw) + '</p></div>';
  }
  if (uc.premium) {
    html += '<div class="meta-item"><h4>Premium Apps</h4><p>' + escHtml(uc.premium) + '</p></div>';
  }
  const cimVal = Array.isArray(uc.a) ? uc.a.join(', ') : (uc.a || 'N/A');
  const hasCim = cimVal !== 'N/A' && cimVal !== '';
  const cimDocUrl = 'docs/cim-and-data-models.md';
  const cimSplunkCim = 'https://docs.splunk.com/Documentation/CIM/latest/User/Overview';
  const cimSplunkDma = 'https://docs.splunk.com/Documentation/Splunk/latest/Knowledge/Acceleratedatamodels';
  let cimHtml = hasCim
    ? '<span style="color:var(--accent);font-family:var(--font-mono);font-size:var(--text-xs)">⚡ ' + escHtml(cimVal) + '</span>'
    : '<span style="color:var(--text-dim)">N/A</span>';
  if (hasCim) {
    cimHtml += '<br><span style="font-size:11px;color:var(--text-dim);margin-top:4px;display:inline-block">';
    cimHtml += '<a href="' + cimSplunkCim + '" target="_blank" rel="noopener">CIM docs</a> · ';
    cimHtml += '<a href="' + cimSplunkDma + '" target="_blank" rel="noopener">Data model acceleration</a> · ';
    cimHtml += '<a href="' + cimDocUrl + '" target="_blank" rel="noopener">Guide</a></span>';
  }
  if (uc.dma) {
    cimHtml += (hasCim ? '<br>' : '') + '<span style="font-size:12px;margin-top:4px;display:inline-block">' + escHtml(uc.dma) + '</span>';
  }
  html += '<div class="meta-item"><h4>CIM / Data Model</h4><p>' + cimHtml + '</p></div>';
  if (uc.schema) {
    html += '<div class="meta-item"><h4>Schema</h4><p>' + escHtml(uc.schema) + (uc.schema.toLowerCase().indexOf('ocsf') !== -1 ? ' <a href="https://schema.ocsf.io/" target="_blank" rel="noopener" style="font-size:11px">OCSF</a>' : '') + '</p></div>';
  }
  if (Array.isArray(uc.mtype) && uc.mtype.length) {
    html += '<div class="meta-item"><h4>Monitoring type</h4><p>' + uc.mtype.map(t => '<span class="uc-mtype-tag" style="margin-right:4px">' + escHtml(t) + '</span>').join('') + '</p></div>';
  }
  if (uc.dtype) {
    html += '<div class="meta-item"><h4>Detection type</h4><p><span class="uc-mtype-tag">' + escHtml(uc.dtype) + '</span></p></div>';
  }
  if (uc.sdomain) {
    html += '<div class="meta-item"><h4>Security domain</h4><p>' + escHtml(uc.sdomain) + '</p></div>';
  }
  if (Array.isArray(uc.mitre) && uc.mitre.length) {
    html += '<div class="meta-item"><h4>MITRE ATT&amp;CK</h4><p>' + uc.mitre.map(t => '<a href="https://attack.mitre.org/techniques/' + t.replace(/\./g,'/') + '/" target="_blank" rel="noopener" class="mitre-link">' + escHtml(t) + '</a>').join(', ') + '</p></div>';
  }
  if (uc.reqf) {
    html += '<div class="meta-item"><h4>Required fields</h4><p><code style="font-size:var(--text-xs)">' + escHtml(uc.reqf) + '</code></p></div>';
  }
  html += '</div>';

  if (uc.q) {
    html += '<div class="modal-section" style="margin-top:16px"><h3>SPL Query</h3>';
    html += '<div class="spl-block"><button class="copy-btn" onclick="copySPL(this)">Copy</button><pre><code>' + escHtml(uc.q) + '</code></pre></div></div>';
  }

  if (uc.qs) {
    html += '<div class="modal-section" style="margin-top:16px"><h3>tstats Query <span style="font-size:var(--text-xs);font-weight:400;color:var(--text-dim);margin-left:8px">(Accelerated — requires DMA enabled)</span></h3>';
    html += '<div class="spl-block" style="border-color:rgba(101,166,55,0.3);background:rgba(101,166,55,0.05)"><button class="copy-btn" onclick="copySPL(this)">Copy</button><pre><code>' + escHtml(uc.qs) + '</code></pre></div></div>';
  }

  if (uc.script) {
    html += '<div class="modal-section" style="margin-top:16px"><h3>Script example</h3><p style="font-size:12px;color:var(--text-dim);margin-bottom:8px">Use in a scripted input; see <a href="docs/implementation-guide.md" target="_blank" rel="noopener">Implementation guide</a> for inputs.conf.</p>';
    html += '<div class="spl-block script-block"><button class="copy-btn" onclick="copySPL(this)">Copy</button><pre><code>' + escHtml(uc.script) + '</code></pre></div></div>';
  }

  if (uc.m) {
    html += '<div class="modal-section"><h3>Implementation</h3><p>' + escHtml(uc.m) + '</p></div>';
  }
  if (uc.md) {
    html += '<div class="modal-section impl-expand-section"><details class="impl-details"><summary class="impl-details-summary">View more detailed instructions</summary><div class="impl-detail-body">' + renderDetailBody(uc.md) + '</div></details></div>';
  }
  if (uc.kfp) {
    html += '<div class="modal-section"><h3>Known false positives</h3><p>' + escHtml(uc.kfp) + '</p></div>';
  }
  if (uc.refs) {
    const refList = uc.refs.split(/[,;]/).map(s => s.trim()).filter(Boolean);
    html += '<div class="modal-section"><h3>References</h3><p>' + (refList.length ? refList.map(r => r.startsWith('http') ? '<a href="' + escHtml(r) + '" target="_blank" rel="noopener">' + escHtml(r) + '</a>' : escHtml(r)).join(' &nbsp;|&nbsp; ') : escHtml(uc.refs)) + '</p></div>';
  }
  if (uc.z) {
    html += '<div class="modal-section"><h3>Visualization</h3><p>' + escHtml(uc.z) + '</p></div>';
  }

  // Nav
  html += '<div class="modal-nav">';
  var listLen = currentDisplayedList.length;
  html += '<button class="nav-btn" onclick="navUC(-1)"' + (currentUCIdx<=0?' disabled':'') + '>&larr; Previous</button>';
  html += '<span style="font-size:12px;color:var(--text-dim)">' + (currentUCIdx+1) + ' / ' + listLen + '</span>';
  html += '<button class="nav-btn" onclick="navUC(1)"' + (currentUCIdx>=listLen-1?' disabled':'') + '>Next &rarr;</button>';
  html += '</div></div>';

  document.getElementById('modal').innerHTML = html;
}

function navUC(dir) {
  var listLen = currentDisplayedList.length;
  var newIdx = currentUCIdx + dir;
  if (newIdx < 0 || newIdx >= listLen) return;
  currentUCIdx = newIdx;
  renderModal(currentDisplayedList[newIdx]);
  document.getElementById('modal').scrollTop = 0;
}

function copySPL(btn) {
  const block = btn.parentElement;
  const codeEl = block.querySelector('code');
  const text = codeEl ? codeEl.textContent : block.textContent.replace(/^(Copy|Copied!)\s*/i, '').trim();
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = 'Copied!';
    setTimeout(() => { btn.textContent = 'Copy'; }, 1500);
  });
}

// State management
function selectCat(id) {
  currentCat = id;
  currentSubcat = null;
  currentSearch = '';
  currentMtypeFilter = 'all';
  document.getElementById('search').value = '';
  buildSidebar();
  if (nonTechnicalView) {
    if (id === null) renderNonTechnicalOverview();
    else renderNonTechnicalCategory(id);
  } else {
    if (id === null) renderOverview();
    else renderCategory(id);
  }
  closeSidebarOnMobile();
}

function setFilter(f) {
  currentFilter = f;
  if (nonTechnicalView) return;
  if (currentSearch) renderSearchResults();
  else if (currentCat !== null) renderCategory(currentCat);
  else renderOverview();
}

function setDiffFilter(f) {
  currentDiffFilter = f;
  if (nonTechnicalView) return;
  if (currentSearch) renderSearchResults();
  else if (currentCat !== null) renderCategory(currentCat);
  else renderOverview();
}

// Search handler
let searchTimeout;
document.getElementById('search').addEventListener('input', function(e) {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(() => {
    currentSearch = e.target.value.trim();
    if (currentSearch) {
      currentCat = null;
      buildSidebar();
      renderSearchResults();
    } else {
      selectCat(null);
    }
  }, 200);
});

// Keyboard
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeModal();
  if (document.getElementById('modal-overlay').classList.contains('show')) {
    if (e.key === 'ArrowLeft') navUC(-1);
    if (e.key === 'ArrowRight') navUC(1);
  }
  if (e.key === '/' && !e.ctrlKey && !e.metaKey && document.activeElement.tagName !== 'INPUT') {
    e.preventDefault();
    document.getElementById('search').focus();
  }
});

document.getElementById('modal-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// Mobile sidebar toggle
document.getElementById('sidebar-toggle').addEventListener('click', function() {
  var sidebar = document.getElementById('sidebar');
  sidebar.classList.toggle('open');
  this.setAttribute('aria-expanded', sidebar.classList.contains('open'));
});

// Close sidebar when a category is selected on mobile
function closeSidebarOnMobile() {
  if (window.innerWidth <= 600) {
    document.getElementById('sidebar').classList.remove('open');
  }
}

// View mode toggle (Non-technical / Technical)
document.getElementById('view-nontech').addEventListener('click', function() { setNonTechnicalView(true); });
document.getElementById('view-tech').addEventListener('click', function() { setNonTechnicalView(false); });

// Init: restore view mode from localStorage and render
nonTechnicalView = (localStorage.getItem('nonTechnicalView') === 'true');
setNonTechnicalView(nonTechnicalView);
</script>
</body>
</html>

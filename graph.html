<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Interactive knowledge graph of 7,300+ Splunk monitoring use cases — categories, equipment, CIM models, and cross-references.">
<title>Use Case Graph — Community Reference</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --cisco-blue: #049FD9;
  --cisco-blue-dark: #003B8A;
  --cisco-teal: #04A4B0;
  --cisco-green: #6BA32A;
  --cisco-yellow: #D9B216;
  --cisco-red: #C24632;
  --cisco-orange: #F26722;
  --bg-page: #F7F7F7;
  --bg-surface: #FFFFFF;
  --bg-header: #003B8A;
  --bg-elevated: #FFFFFF;
  --bg-hover: #F0F1F2;
  --text-primary: #23282E;
  --text-secondary: #464C54;
  --text-tertiary: #656C75;
  --text-inverse: #FFFFFF;
  --text-link: #1D69CC;
  --border-default: #E1E4E8;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
  --shadow-lg: 0 8px 30px rgba(0,0,0,0.12);
  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 14px;
  --radius-pill: 999px;
  --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --header-h: 56px;
}
html.dark {
  --bg-page: #0F1214;
  --bg-surface: #23282E;
  --bg-header: #171B20;
  --bg-elevated: #2A2F35;
  --bg-hover: #373C42;
  --text-primary: #E8EBF1;
  --text-secondary: #D0D4D9;
  --text-tertiary: #979FA8;
  --text-inverse: #FFFFFF;
  --text-link: #6CB4EE;
  --border-default: #3A3F46;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: var(--font-sans);
  background: var(--bg-page);
  color: var(--text-primary);
  display: flex;
  flex-direction: column;
}

/* --- Header --- */
.header {
  height: var(--header-h);
  background: var(--bg-header);
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 16px;
  flex-shrink: 0;
  z-index: 100;
}
.header-title {
  color: var(--text-inverse);
  font-size: 16px;
  font-weight: 700;
  letter-spacing: -0.02em;
  white-space: nowrap;
}
.header-subtitle {
  color: rgba(255,255,255,0.65);
  font-size: 13px;
  font-weight: 400;
}
.header-nav {
  margin-left: auto;
  display: flex;
  gap: 8px;
  align-items: center;
}
.header-nav a {
  color: rgba(255,255,255,0.8);
  text-decoration: none;
  font-size: 13px;
  font-weight: 500;
  padding: 6px 12px;
  border-radius: var(--radius-sm);
  transition: background 0.15s;
}
.header-nav a:hover { background: rgba(255,255,255,0.1); }
.btn-theme {
  background: none;
  border: 1px solid rgba(255,255,255,0.25);
  color: var(--text-inverse);
  border-radius: var(--radius-sm);
  padding: 5px 8px;
  cursor: pointer;
  font-size: 14px;
  line-height: 1;
}

/* --- Main layout --- */
.main {
  flex: 1;
  display: flex;
  position: relative;
  overflow: hidden;
}

/* --- Sidebar --- */
.sidebar {
  width: 300px;
  flex-shrink: 0;
  background: var(--bg-surface);
  border-right: 1px solid var(--border-default);
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  z-index: 10;
}
.sidebar-section {
  padding: 14px 16px;
  border-bottom: 1px solid var(--border-default);
}
.sidebar-section h3 {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--text-tertiary);
  margin-bottom: 10px;
}
.stat-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}
.stat-card {
  background: var(--bg-elevated);
  border: 1px solid var(--border-default);
  border-radius: var(--radius-sm);
  padding: 10px;
  text-align: center;
}
.stat-card .num {
  font-size: 20px;
  font-weight: 800;
  color: var(--cisco-blue);
  line-height: 1;
}
.stat-card .lbl {
  font-size: 10px;
  color: var(--text-tertiary);
  margin-top: 2px;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}

/* Filter toggles */
.filter-group { display: flex; flex-direction: column; gap: 4px; }
.filter-toggle {
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  font-size: 13px;
  color: var(--text-secondary);
  padding: 3px 0;
  user-select: none;
}
.filter-toggle input { accent-color: var(--cisco-blue); width: 14px; height: 14px; }
.filter-toggle .dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}

/* --- Detail panel (appears on node selection) --- */
.detail-panel { display: none; }
.detail-panel.active { display: block; }

.detail-header {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  margin-bottom: 10px;
}
.detail-color {
  width: 14px;
  height: 14px;
  border-radius: 4px;
  flex-shrink: 0;
  margin-top: 2px;
}
.detail-title {
  font-size: 15px;
  font-weight: 700;
  line-height: 1.3;
}
.detail-type {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--text-tertiary);
  margin-top: 2px;
}
.detail-desc {
  font-size: 12px;
  color: var(--text-secondary);
  margin-bottom: 10px;
  line-height: 1.5;
}
.detail-stats {
  display: flex;
  gap: 12px;
  margin-bottom: 12px;
}
.detail-stat {
  font-size: 12px;
  color: var(--text-secondary);
}
.detail-stat strong {
  color: var(--cisco-blue);
  font-weight: 700;
}
.detail-actions {
  display: flex;
  gap: 8px;
  margin-bottom: 14px;
  flex-wrap: wrap;
}
.detail-btn {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 6px 12px;
  font-size: 12px;
  font-weight: 600;
  font-family: var(--font-sans);
  border-radius: var(--radius-sm);
  border: none;
  cursor: pointer;
  text-decoration: none;
  transition: background 0.15s, opacity 0.15s;
}
.detail-btn-primary {
  background: var(--cisco-blue);
  color: #fff;
}
.detail-btn-primary:hover { opacity: 0.85; }
.detail-btn-secondary {
  background: var(--bg-hover);
  color: var(--text-primary);
  border: 1px solid var(--border-default);
}
.detail-btn-secondary:hover { background: var(--border-default); }

.neighbor-group { margin-bottom: 12px; }
.neighbor-group-title {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--text-tertiary);
  margin-bottom: 6px;
}
.neighbor-list {
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.neighbor-link {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 5px 8px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  color: var(--text-link);
  text-decoration: none;
  cursor: pointer;
  transition: background 0.12s;
  border: none;
  background: none;
  font-family: var(--font-sans);
  text-align: left;
  width: 100%;
}
.neighbor-link:hover {
  background: var(--bg-hover);
}
.neighbor-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.neighbor-count {
  margin-left: auto;
  font-size: 11px;
  color: var(--text-tertiary);
  font-variant-numeric: tabular-nums;
}
.breadcrumb {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 10px;
  font-size: 12px;
}
.breadcrumb-back {
  color: var(--text-link);
  cursor: pointer;
  border: none;
  background: none;
  font-family: var(--font-sans);
  font-size: 12px;
  font-weight: 500;
  padding: 2px 6px;
  border-radius: var(--radius-sm);
  transition: background 0.12s;
}
.breadcrumb-back:hover { background: var(--bg-hover); }

/* --- Graph container --- */
.graph-wrap {
  flex: 1;
  position: relative;
  background: var(--bg-page);
}
#sigma-container {
  width: 100%;
  height: 100%;
  cursor: grab;
}
#sigma-container:active { cursor: grabbing; }

/* Tooltip */
.tooltip {
  position: fixed;
  display: none;
  background: var(--bg-surface);
  border: 1px solid var(--border-default);
  border-radius: var(--radius-md);
  padding: 10px 14px;
  box-shadow: var(--shadow-lg);
  max-width: 280px;
  pointer-events: none;
  z-index: 50;
  font-size: 13px;
  line-height: 1.4;
}
.tooltip.visible { display: block; }
.tooltip-title { font-weight: 700; font-size: 13px; }
.tooltip-type {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--text-tertiary);
  margin-bottom: 3px;
}
.tooltip-hint {
  font-size: 11px;
  color: var(--text-tertiary);
  margin-top: 4px;
  font-style: italic;
}

/* Search */
.search-box input {
  width: 100%;
  padding: 8px 12px;
  border: 1px solid var(--border-default);
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-family: var(--font-sans);
  background: var(--bg-elevated);
  color: var(--text-primary);
  outline: none;
  transition: border-color 0.15s;
}
.search-box input:focus { border-color: var(--cisco-blue); }

/* Controls overlay */
.graph-controls {
  position: absolute;
  bottom: 16px;
  right: 16px;
  display: flex;
  gap: 6px;
  z-index: 20;
}
.graph-controls button {
  width: 36px;
  height: 36px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border-default);
  background: var(--bg-surface);
  color: var(--text-primary);
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: var(--shadow-sm);
  transition: background 0.15s;
}
.graph-controls button:hover { background: var(--bg-hover); }

/* Loading */
.loading-overlay {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--bg-page);
  z-index: 30;
  transition: opacity 0.3s;
}
.loading-overlay.hidden { opacity: 0; pointer-events: none; }
.spinner {
  width: 40px;
  height: 40px;
  border: 3px solid var(--border-default);
  border-top-color: var(--cisco-blue);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

@media (max-width: 768px) {
  .sidebar { width: 240px; }
  .header-subtitle { display: none; }
}
@media (max-width: 600px) {
  .sidebar { display: none; }
}
</style>
</head>
<body>

<header class="header">
  <span class="header-title">Use Case Knowledge Graph</span>
  <span class="header-subtitle" id="stats-subtitle">Loading…</span>
  <nav class="header-nav">
    <a href="index.html">Catalog</a>
    <a href="docs.html">Docs</a>
    <a href="scorecard.html">Scorecard</a>
    <button class="btn-theme" id="btn-theme" title="Toggle dark mode">◑</button>
  </nav>
</header>

<div class="main">
  <aside class="sidebar" id="sidebar">
    <!-- Search -->
    <div class="sidebar-section">
      <h3>Search Nodes</h3>
      <div class="search-box">
        <input type="text" id="node-search" placeholder="Filter nodes…" autocomplete="off">
      </div>
    </div>

    <!-- Detail panel (shown when a node is selected) -->
    <div class="sidebar-section detail-panel" id="detail-panel"></div>

    <!-- Overview stats -->
    <div class="sidebar-section" id="overview-section">
      <h3>Overview</h3>
      <div class="stat-grid" id="stat-grid"></div>
    </div>

    <!-- Layer toggles -->
    <div class="sidebar-section">
      <h3>Show Layers</h3>
      <div class="filter-group" id="layer-filters"></div>
    </div>

    <!-- Legend -->
    <div class="sidebar-section">
      <h3>Legend</h3>
      <div style="font-size:12px;color:var(--text-secondary);margin-bottom:8px">Click any node to explore its connections</div>
      <div class="filter-group" id="legend"></div>
    </div>
  </aside>

  <div class="graph-wrap">
    <div id="sigma-container"></div>
    <div class="tooltip" id="tooltip"></div>
    <div class="graph-controls">
      <button id="btn-zoom-in" title="Zoom in">+</button>
      <button id="btn-zoom-out" title="Zoom out">−</button>
      <button id="btn-fit" title="Reset view">⊡</button>
      <button id="btn-relayout" title="Re-run layout">↻</button>
    </div>
    <div class="loading-overlay" id="loading">
      <div class="spinner"></div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/graphology/0.25.4/graphology.umd.min.js" integrity="sha384-643a1dipBp0OHFnm3WeZmMnuJ+ZY/MEll1vTGCjeFzkB/RySh+Almy3Ffn+sxO7y" crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/sigma.js/2.4.0/sigma.min.js" integrity="sha384-kqmavTGLPiJqDsleN0oa6ZH0tdnnPojYsHWMzc3M5hrlYyTcVdzwdHe10AVzSRhQ" crossorigin="anonymous"></script>
<script>
(function () {
  "use strict";

  /* ── Dark mode ─────────────────────────────────────────────────── */
  var darkKey = "uc-graph-dark";
  function applyTheme(dark) {
    document.documentElement.classList.toggle("dark", dark);
    localStorage.setItem(darkKey, dark ? "1" : "0");
  }
  var preferDark = localStorage.getItem(darkKey) === "1" ||
    (localStorage.getItem(darkKey) === null && matchMedia("(prefers-color-scheme:dark)").matches);
  applyTheme(preferDark);
  document.getElementById("btn-theme").addEventListener("click", function () {
    preferDark = !preferDark;
    applyTheme(preferDark);
    if (renderer) renderer.refresh();
  });

  /* ── State ─────────────────────────────────────────────────────── */
  var graph, renderer, camera;
  var graphData = null;
  var activeFilters = { category: true, equipment: true, cim: true, pillar: true };
  var hoveredNode = null;
  var selectedNode = null;       // currently selected / focused node
  var neighborSet = new Set();   // neighbors of selected node
  var navHistory = [];           // for back navigation
  var searchTerm = "";

  var TYPE_LABELS = {
    pillar: "Pillar",
    category: "Category",
    equipment: "Equipment",
    cim: "CIM Data Model",
  };

  var LAYER_META = {
    pillar:    { label: "Pillars",         color: "#D9B216" },
    category:  { label: "Categories",      color: "#049FD9" },
    equipment: { label: "Equipment",       color: "#8B95A2" },
    cim:       { label: "CIM Data Models", color: "#04A4B0" },
  };

  var EDGE_COLORS = {
    "belongs-to":      "rgba(217,178,22,0.30)",
    "relevant-to":     "rgba(107,163,42,0.22)",
    "uses-equipment":  "rgba(139,149,162,0.15)",
    "uses-cim":        "rgba(4,164,176,0.20)",
    "cross-ref":       "rgba(194,70,50,0.40)",
  };

  /* ── Load data ─────────────────────────────────────────────────── */
  fetch("graph-data.json")
    .then(function (r) { return r.json(); })
    .then(function (data) {
      graphData = data;
      buildUI(data.stats);
      buildGraph(data);
      document.getElementById("loading").classList.add("hidden");
    })
    .catch(function (err) {
      document.getElementById("loading").innerHTML =
        '<div style="text-align:center;color:var(--text-secondary)">' +
        '<p style="font-size:15px;font-weight:600">Could not load graph data</p>' +
        '<p style="font-size:13px;margin-top:6px">Run: <code>python3 tools/build-graph-data.py</code></p></div>';
      console.error(err);
    });

  /* ── Build sidebar UI ──────────────────────────────────────────── */
  function buildUI(stats) {
    document.getElementById("stats-subtitle").textContent =
      stats.totalUCs.toLocaleString() + " use cases · " +
      stats.totalCategories + " categories · " +
      stats.totalEquipment + " equipment types";

    var grid = document.getElementById("stat-grid");
    [[stats.totalUCs, "Use Cases"], [stats.totalCategories, "Categories"],
     [stats.totalEquipment, "Equipment"], [stats.totalCIM, "CIM Models"]].forEach(function (s) {
      var card = document.createElement("div");
      card.className = "stat-card";
      card.innerHTML = '<div class="num">' + s[0].toLocaleString() + '</div><div class="lbl">' + s[1] + '</div>';
      grid.appendChild(card);
    });

    var filterWrap = document.getElementById("layer-filters");
    Object.keys(LAYER_META).forEach(function (key) {
      var meta = LAYER_META[key];
      var label = document.createElement("label");
      label.className = "filter-toggle";
      var cb = document.createElement("input");
      cb.type = "checkbox";
      cb.checked = true;
      cb.addEventListener("change", function () {
        activeFilters[key] = cb.checked;
        if (renderer) renderer.refresh();
      });
      var dot = document.createElement("span");
      dot.className = "dot";
      dot.style.background = meta.color;
      label.appendChild(cb);
      label.appendChild(dot);
      label.appendChild(document.createTextNode(meta.label));
      filterWrap.appendChild(label);
    });

    var legendWrap = document.getElementById("legend");
    [
      { color: "#049FD9", label: "Observability" },
      { color: "#6BA32A", label: "IT Operations" },
      { color: "#C24632", label: "Security" },
      { color: "#D9B216", label: "Platform / Pillar" },
      { color: "#8B95A2", label: "Equipment" },
      { color: "#04A4B0", label: "CIM Data Model" },
    ].forEach(function (item) {
      var div = document.createElement("div");
      div.className = "filter-toggle";
      div.style.cursor = "default";
      div.innerHTML = '<span class="dot" style="background:' + item.color + '"></span>' + item.label;
      legendWrap.appendChild(div);
    });
  }

  /* ── Build graph ───────────────────────────────────────────────── */
  function buildGraph(data) {
    graph = new graphology.Graph({ multi: true });

    data.nodes.forEach(function (n) {
      graph.addNode(n.id, {
        label: n.label,
        x: 0, y: 0,
        size: n.size || 5,
        color: n.color || "#999",
        origColor: n.color || "#999",
        nodeType: n.type,
        ucCount: n.ucCount || 0,
        description: n.description || "",
        pillar: n.pillar || "",
      });
    });

    data.edges.forEach(function (e) {
      if (graph.hasNode(e.source) && graph.hasNode(e.target)) {
        graph.addEdge(e.source, e.target, {
          color: EDGE_COLORS[e.type] || "rgba(0,0,0,0.1)",
          origColor: EDGE_COLORS[e.type] || "rgba(0,0,0,0.1)",
          size: Math.min(0.5 + (e.weight || 1) * 0.15, 4),
          edgeType: e.type,
          weight: e.weight || 1,
        });
      }
    });

    runLayout();

    renderer = new Sigma(graph, document.getElementById("sigma-container"), {
      renderLabels: true,
      labelRenderedSizeThreshold: 5,
      labelFont: "Inter, sans-serif",
      labelWeight: "500",
      labelSize: 12,
      labelColor: { color: "#23282E" },
      defaultEdgeType: "line",
      minCameraRatio: 0.05,
      maxCameraRatio: 5,
      nodeReducer: nodeReducer,
      edgeReducer: edgeReducer,
    });

    camera = renderer.getCamera();
    setupInteractions();
  }

  /* ── Layout ────────────────────────────────────────────────────── */
  function runLayout() {
    var iterations = 400;
    var nodes = graph.nodes();
    var positions = {};
    var typeCounts = {};
    var typeIdx = {};
    var typeRadius = { pillar: 0, category: 30, equipment: 65, cim: 65 };

    nodes.forEach(function (n) {
      var t = graph.getNodeAttribute(n, "nodeType");
      typeCounts[t] = (typeCounts[t] || 0) + 1;
    });
    Object.keys(typeCounts).forEach(function (t) { typeIdx[t] = 0; });

    nodes.forEach(function (n) {
      var t = graph.getNodeAttribute(n, "nodeType");
      var count = typeCounts[t] || 1;
      var idx = typeIdx[t]++;
      var angle = (2 * Math.PI * idx / count) + (t === "cim" ? Math.PI / count : 0);
      var r = typeRadius[t] || 40;
      positions[n] = {
        x: Math.cos(angle) * r + (Math.random() - 0.5) * 8,
        y: Math.sin(angle) * r + (Math.random() - 0.5) * 8,
      };
    });

    for (var iter = 0; iter < iterations; iter++) {
      var temp = 12 * (1 - iter / iterations) + 0.1;
      var forces = {};
      nodes.forEach(function (n) { forces[n] = { x: 0, y: 0 }; });

      for (var i = 0; i < nodes.length; i++) {
        for (var j = i + 1; j < nodes.length; j++) {
          var a = nodes[i], b = nodes[j];
          var dx = positions[b].x - positions[a].x;
          var dy = positions[b].y - positions[a].y;
          var dist = Math.sqrt(dx * dx + dy * dy) + 0.1;
          var sA = graph.getNodeAttribute(a, "size") || 5;
          var sB = graph.getNodeAttribute(b, "size") || 5;
          var repulsion = (sA + sB) * 60 / (dist * dist);
          forces[a].x -= repulsion * dx / dist;
          forces[a].y -= repulsion * dy / dist;
          forces[b].x += repulsion * dx / dist;
          forces[b].y += repulsion * dy / dist;
        }
      }

      graph.forEachEdge(function (e, attrs, src, tgt) {
        var dx = positions[tgt].x - positions[src].x;
        var dy = positions[tgt].y - positions[src].y;
        var dist = Math.sqrt(dx * dx + dy * dy) + 0.1;
        var w = Math.log2((attrs.weight || 1) + 1) * 0.008;
        forces[src].x += dist * w * dx / dist;
        forces[src].y += dist * w * dy / dist;
        forces[tgt].x -= dist * w * dx / dist;
        forces[tgt].y -= dist * w * dy / dist;
      });

      nodes.forEach(function (n) {
        forces[n].x -= positions[n].x * 0.02;
        forces[n].y -= positions[n].y * 0.02;
      });

      nodes.forEach(function (n) {
        var f = forces[n];
        var mag = Math.sqrt(f.x * f.x + f.y * f.y) + 0.01;
        var cap = Math.min(mag, temp);
        positions[n].x += (f.x / mag) * cap;
        positions[n].y += (f.y / mag) * cap;
      });
    }

    nodes.forEach(function (n) {
      graph.setNodeAttribute(n, "x", positions[n].x);
      graph.setNodeAttribute(n, "y", positions[n].y);
    });
  }

  /* ── Reducers: drive visual filtering ──────────────────────────── */
  function nodeReducer(node, attrs) {
    var res = Object.assign({}, attrs);
    var nType = attrs.nodeType;

    if (!activeFilters[nType]) { res.hidden = true; return res; }

    /* Selection mode: only show selected + neighbors */
    if (selectedNode) {
      if (node === selectedNode) {
        res.highlighted = true;
        res.size = attrs.size * 1.4;
        res.zIndex = 10;
      } else if (neighborSet.has(node)) {
        res.zIndex = 5;
      } else {
        res.hidden = true;
        return res;
      }
    }

    /* Search dimming (only when no selection) */
    if (!selectedNode && searchTerm) {
      if (attrs.label.toLowerCase().indexOf(searchTerm) === -1) {
        res.color = dimColor(attrs.origColor, 0.12);
        res.label = "";
      }
    }

    /* Hover highlighting (only when no selection) */
    if (!selectedNode && hoveredNode) {
      if (node === hoveredNode) {
        res.highlighted = true;
        res.zIndex = 10;
      } else if (isNeighbor(hoveredNode, node)) {
        res.zIndex = 5;
      } else {
        res.color = dimColor(attrs.origColor, 0.12);
        res.label = "";
      }
    }

    return res;
  }

  function edgeReducer(edge, attrs) {
    var res = Object.assign({}, attrs);
    var src = graph.source(edge);
    var tgt = graph.target(edge);
    var srcType = graph.getNodeAttribute(src, "nodeType");
    var tgtType = graph.getNodeAttribute(tgt, "nodeType");

    if (!activeFilters[srcType] || !activeFilters[tgtType]) { res.hidden = true; return res; }

    if (selectedNode) {
      if (src === selectedNode || tgt === selectedNode) {
        res.color = brightenEdge(attrs.origColor);
        res.size = Math.max(attrs.size * 1.5, 1.5);
      } else {
        res.hidden = true;
      }
      return res;
    }

    if (hoveredNode) {
      if (src === hoveredNode || tgt === hoveredNode) {
        res.color = brightenEdge(attrs.origColor);
        res.size = attrs.size * 2;
      } else {
        res.hidden = true;
      }
    }

    return res;
  }

  function isNeighbor(a, b) {
    try { return graph.hasEdge(a, b) || graph.hasEdge(b, a); } catch (e) { return false; }
  }

  function dimColor(hex, alpha) {
    if (!hex || hex.indexOf("rgba") === 0) return hex || "rgba(0,0,0,0.1)";
    var r = parseInt(hex.slice(1, 3), 16) || 0;
    var g = parseInt(hex.slice(3, 5), 16) || 0;
    var b = parseInt(hex.slice(5, 7), 16) || 0;
    return "rgba(" + r + "," + g + "," + b + "," + alpha + ")";
  }

  function brightenEdge(color) {
    if (!color) return "rgba(100,100,100,0.5)";
    return color.replace(/[\d.]+\)$/, "0.7)");
  }

  /* ── Selection & detail panel ──────────────────────────────────── */
  function selectNode(nodeId, addToHistory) {
    if (addToHistory && selectedNode) {
      navHistory.push(selectedNode);
    }

    selectedNode = nodeId;
    neighborSet = new Set();

    if (nodeId) {
      graph.forEachEdge(nodeId, function (e, attrs, src, tgt) {
        neighborSet.add(src === nodeId ? tgt : src);
      });
      buildDetailPanel(nodeId);
      zoomToNeighborhood(nodeId);
    } else {
      hideDetailPanel();
      navHistory = [];
    }

    if (renderer) renderer.refresh();
  }

  function deselectNode() {
    selectedNode = null;
    neighborSet = new Set();
    navHistory = [];
    hideDetailPanel();
    if (renderer) renderer.refresh();
    if (camera) camera.animatedReset({ duration: 300 });
  }

  function goBack() {
    if (navHistory.length > 0) {
      var prev = navHistory.pop();
      selectedNode = null;
      selectNode(prev, false);
    } else {
      deselectNode();
    }
  }

  function zoomToNeighborhood(nodeId) {
    var xs = [], ys = [];
    var allNodes = [nodeId].concat(Array.from(neighborSet));
    allNodes.forEach(function (n) {
      if (graph.hasNode(n)) {
        xs.push(graph.getNodeAttribute(n, "x"));
        ys.push(graph.getNodeAttribute(n, "y"));
      }
    });
    if (xs.length === 0) return;

    var cx = xs.reduce(function (a, b) { return a + b; }, 0) / xs.length;
    var cy = ys.reduce(function (a, b) { return a + b; }, 0) / ys.length;

    var maxSpan = 0;
    xs.forEach(function (x) { maxSpan = Math.max(maxSpan, Math.abs(x - cx)); });
    ys.forEach(function (y) { maxSpan = Math.max(maxSpan, Math.abs(y - cy)); });

    var viewPos = renderer.framedGraphToViewport({ x: cx, y: cy });
    var ratio = Math.max(0.15, Math.min(maxSpan / 20, 1.5));

    camera.animate({ x: cx, y: cy, ratio: ratio }, { duration: 400 });
  }

  /* ── Build the detail panel ────────────────────────────────────── */
  function buildDetailPanel(nodeId) {
    var panel = document.getElementById("detail-panel");
    var attrs = graph.getNodeAttributes(nodeId);
    var neighbors = [];
    graph.forEachEdge(nodeId, function (e, eattrs, src, tgt) {
      var nid = src === nodeId ? tgt : src;
      var nattrs = graph.getNodeAttributes(nid);
      neighbors.push({
        id: nid,
        label: nattrs.label,
        type: nattrs.nodeType,
        color: nattrs.origColor || nattrs.color,
        ucCount: nattrs.ucCount || 0,
        edgeType: eattrs.edgeType,
        weight: eattrs.weight || 0,
      });
    });

    var html = '';

    /* Breadcrumb / back */
    html += '<div class="breadcrumb">';
    html += '<button class="breadcrumb-back" data-action="back">' +
            (navHistory.length > 0 ? '← Back' : '← All nodes') + '</button>';
    html += '</div>';

    /* Header */
    html += '<div class="detail-header">';
    html += '<span class="detail-color" style="background:' + esc(attrs.origColor || attrs.color) + '"></span>';
    html += '<div><div class="detail-title">' + esc(attrs.label) + '</div>';
    html += '<div class="detail-type">' + esc(TYPE_LABELS[attrs.nodeType] || attrs.nodeType) + '</div></div>';
    html += '</div>';

    if (attrs.description) {
      html += '<div class="detail-desc">' + esc(attrs.description) + '</div>';
    }

    /* Stats */
    html += '<div class="detail-stats">';
    if (attrs.ucCount) html += '<div class="detail-stat"><strong>' + attrs.ucCount.toLocaleString() + '</strong> use cases</div>';
    html += '<div class="detail-stat"><strong>' + neighbors.length + '</strong> connections</div>';
    if (attrs.pillar) html += '<div class="detail-stat">Pillar: ' + esc(attrs.pillar) + '</div>';
    html += '</div>';

    /* Action buttons */
    html += '<div class="detail-actions">';
    if (attrs.nodeType === "category") {
      var catNum = nodeId.replace("cat-", "");
      html += '<a class="detail-btn detail-btn-primary" href="index.html#cat-' + catNum + '" target="_blank">Open in Catalog →</a>';
    }
    if (attrs.nodeType === "equipment") {
      html += '<a class="detail-btn detail-btn-primary" href="index.html?q=' + encodeURIComponent(attrs.label) + '" target="_blank">Search in Catalog →</a>';
    }
    if (attrs.nodeType === "cim") {
      html += '<a class="detail-btn detail-btn-primary" href="index.html?q=' + encodeURIComponent(attrs.label) + '" target="_blank">Search in Catalog →</a>';
    }
    html += '</div>';

    /* Grouped neighbor lists */
    var groups = {};
    neighbors.forEach(function (n) {
      var key = n.type;
      if (!groups[key]) groups[key] = [];
      groups[key].push(n);
    });

    var groupOrder = ["pillar", "category", "equipment", "cim"];
    groupOrder.forEach(function (gkey) {
      var list = groups[gkey];
      if (!list || list.length === 0) return;

      list.sort(function (a, b) { return (b.weight || 0) - (a.weight || 0); });

      html += '<div class="neighbor-group">';
      html += '<div class="neighbor-group-title">Connected ' + (TYPE_LABELS[gkey] || gkey) + 's (' + list.length + ')</div>';
      html += '<div class="neighbor-list">';

      list.forEach(function (n) {
        html += '<button class="neighbor-link" data-node="' + esc(n.id) + '">';
        html += '<span class="neighbor-dot" style="background:' + esc(n.color) + '"></span>';
        html += esc(n.label);
        if (n.weight > 1) html += '<span class="neighbor-count">' + n.weight + ' UCs</span>';
        html += '</button>';
      });

      html += '</div></div>';
    });

    panel.innerHTML = html;
    panel.classList.add("active");

    /* Wire up clicks inside the panel */
    panel.querySelectorAll("[data-node]").forEach(function (el) {
      el.addEventListener("click", function () {
        selectNode(el.getAttribute("data-node"), true);
      });
    });
    panel.querySelectorAll("[data-action=back]").forEach(function (el) {
      el.addEventListener("click", goBack);
    });
  }

  function hideDetailPanel() {
    var panel = document.getElementById("detail-panel");
    panel.classList.remove("active");
    panel.innerHTML = "";
  }

  /* ── Interactions ──────────────────────────────────────────────── */
  function setupInteractions() {
    var tooltip = document.getElementById("tooltip");

    /* Hover → tooltip */
    renderer.on("enterNode", function (e) {
      hoveredNode = e.node;
      if (!selectedNode) renderer.refresh();
      var attrs = graph.getNodeAttributes(e.node);
      var html = '<div class="tooltip-title">' + esc(attrs.label) + '</div>';
      html += '<div class="tooltip-type">' + esc(TYPE_LABELS[attrs.nodeType] || attrs.nodeType);
      if (attrs.ucCount) html += ' · ' + attrs.ucCount.toLocaleString() + ' UCs';
      html += '</div>';
      html += '<div class="tooltip-hint">Click to explore connections</div>';
      tooltip.innerHTML = html;
      tooltip.classList.add("visible");
    });

    renderer.on("leaveNode", function () {
      hoveredNode = null;
      if (!selectedNode) renderer.refresh();
      tooltip.classList.remove("visible");
    });

    /* Mouse move → tooltip follows cursor */
    renderer.getMouseCaptor().on("mousemovebody", function (e) {
      if (tooltip.classList.contains("visible")) {
        var x = e.original.clientX + 14;
        var y = e.original.clientY + 14;
        if (x + 280 > window.innerWidth) x = e.original.clientX - 294;
        if (y + 100 > window.innerHeight) y = e.original.clientY - 110;
        tooltip.style.left = x + "px";
        tooltip.style.top = y + "px";
      }
    });

    /* Click node → select it */
    renderer.on("clickNode", function (e) {
      selectNode(e.node, true);
    });

    /* Fallback: captor click when hovering a node */
    var captorClickedOnNode = false;
    renderer.on("enterNode", function () { captorClickedOnNode = true; });
    renderer.on("leaveNode", function () { captorClickedOnNode = false; });

    renderer.getMouseCaptor().on("click", function () {
      if (hoveredNode) {
        selectNode(hoveredNode, true);
      } else if (selectedNode) {
        deselectNode();
      }
    });

    /* Search → filter */
    document.getElementById("node-search").addEventListener("input", function (ev) {
      searchTerm = ev.target.value.toLowerCase().trim();
      if (searchTerm && selectedNode) deselectNode();
      renderer.refresh();
    });

    /* Zoom controls */
    document.getElementById("btn-zoom-in").addEventListener("click", function () {
      camera.animatedZoom({ duration: 200 });
    });
    document.getElementById("btn-zoom-out").addEventListener("click", function () {
      camera.animatedUnzoom({ duration: 200 });
    });
    document.getElementById("btn-fit").addEventListener("click", function () {
      deselectNode();
      camera.animatedReset({ duration: 300 });
    });
    document.getElementById("btn-relayout").addEventListener("click", function () {
      graph.nodes().forEach(function (n) {
        graph.setNodeAttribute(n, "x", graph.getNodeAttribute(n, "x") + (Math.random() - 0.5) * 10);
        graph.setNodeAttribute(n, "y", graph.getNodeAttribute(n, "y") + (Math.random() - 0.5) * 10);
      });
      runLayout();
      renderer.refresh();
    });

    /* Keyboard: Escape to deselect */
    document.addEventListener("keydown", function (e) {
      if (e.key === "Escape") {
        if (selectedNode) { deselectNode(); }
        else if (searchTerm) {
          searchTerm = "";
          document.getElementById("node-search").value = "";
          renderer.refresh();
        }
      }
    });
  }

  function esc(s) {
    if (!s) return "";
    var div = document.createElement("div");
    div.appendChild(document.createTextNode(s));
    return div.innerHTML;
  }
})();
</script>
</body>

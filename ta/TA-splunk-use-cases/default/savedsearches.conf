| eval stage=case( \
    match(uri,"^/(home|landing|index)"), "1_Landing", \
    match(uri,"^/products?/"), "2_Product_View", \
    match(uri,"^/cart"), "3_Cart", \
    match(uri,"^/checkout"), "4_Checkout", \

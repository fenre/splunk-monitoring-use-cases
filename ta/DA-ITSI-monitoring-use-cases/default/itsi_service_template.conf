# ---------------------------------------------------------------------
# Service templates — reusable service blueprints that bundle entity rules
# and KPI templates together.  Apply a template to create a seeded service
# that stays linked to the template for centralised updates.
# ---------------------------------------------------------------------

[itsi_uc_linux_host_service]
title = Linux Host Service Template
description = Seeded service template for Linux hosts.  Applies the Linux Host KPI bundle and matches entities by `host` alias prefixes.
_owner = itsi
source_itsi_da = DA-ITSI-monitoring-use-cases
service_template_json = { \
  "title": "Linux Host Service Template", \
  "entity_rules": [ \
    { \
      "rule_items": [ \
        {"field":"host","field_type":"alias","rule_type":"matches","value":"linux-*"} \
      ], \
      "rule_condition":"AND" \
    } \
  ], \
  "kpi_template_ids": ["itsi_uc_linux_host_kpis"] \
}


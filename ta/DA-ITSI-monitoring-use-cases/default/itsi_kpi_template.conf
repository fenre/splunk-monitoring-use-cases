# ---------------------------------------------------------------------
# KPI templates — named groups of KPI definitions that can be applied to
# services.  Each template's `kpis` field is a JSON array of KPI objects
# that ITSI materializes into real KPIs when the template is applied.
# ---------------------------------------------------------------------

[itsi_uc_linux_host_kpis]
title = Linux Host KPIs (CPU / Memory / Disk)
description = Standard KPI bundle for Linux hosts.  Sourced from Quick Start use cases in category 1 (Compute & OS).
_owner = itsi
source_itsi_da = DA-ITSI-monitoring-use-cases
kpis = [ \
  { \
    "title":"CPU Used %", \
    "description":"Average CPU utilisation per host (UC-1.1.x).", \
    "type":"kpis_primary", \
    "search_type":"shared_base", \
    "base_search_id":"itsi_uc_linux_core_metrics", \
    "base_search_metric":"cpu_used_pct", \
    "importance":10, \
    "alert_period":5, \
    "unit":"%", \
    "threshold_template_id":"itsi_uc_threshold_percent_usage" \
  }, \
  { \
    "title":"Memory Used %", \
    "description":"Average memory utilisation per host.", \
    "type":"kpis_primary", \
    "search_type":"shared_base", \
    "base_search_id":"itsi_uc_linux_core_metrics", \
    "base_search_metric":"mem_used_pct", \
    "importance":8, \
    "alert_period":5, \
    "unit":"%", \
    "threshold_template_id":"itsi_uc_threshold_percent_usage" \
  }, \
  { \
    "title":"Disk Used %", \
    "description":"Highest filesystem utilisation per host.", \
    "type":"kpis_primary", \
    "search_type":"shared_base", \
    "base_search_id":"itsi_uc_linux_core_metrics", \
    "base_search_metric":"disk_use_pct", \
    "importance":11, \
    "alert_period":5, \
    "unit":"%", \
    "threshold_template_id":"itsi_uc_threshold_percent_usage" \
  } \
]


# ---------------------------------------------------------------------
# KPI threshold templates.  Each template applies to one or more KPIs and
# can be updated centrally; linked KPIs inherit threshold changes.
#
# The templates below use static thresholds expressed as a JSON blob for
# `time_variate_thresholds_specification`.  Customers with ≥ 7 days of
# historical data should switch `adaptive_thresholds_is_enabled = 1` and
# let ITSI auto-tune the bands.
# ---------------------------------------------------------------------

[itsi_uc_threshold_percent_usage]
title = Percent-Usage KPIs (generic 0–100% metrics)
time_variate_thresholds = 0
adaptive_thresholds_is_enabled = 0
adaptive_thresholding_training_window = -14d
# Severity bands: Normal < 70, Low 70–79, Medium 80–89, High 90–94, Critical >=95
time_variate_thresholds_specification = { \
  "policies": { \
    "default_policy": { \
      "title": "Default Policy", \
      "policy_type": "static", \
      "time_blocks": [[0,23]], \
      "aggregate_thresholds": { \
        "baseSeverityValue": 2, \
        "baseSeverityColor": "#99D18B", \
        "baseSeverityLabel": "normal", \
        "gaugeMax": 100, \
        "gaugeMin": 0, \
        "isMinStatic": true, \
        "isMaxStatic": true, \
        "thresholdLevels": [ \
          {"severityValue":3,"thresholdValue":70,"dynamicParam":0,"severityLabel":"low"}, \
          {"severityValue":4,"thresholdValue":80,"dynamicParam":0,"severityLabel":"medium"}, \
          {"severityValue":5,"thresholdValue":90,"dynamicParam":0,"severityLabel":"high"}, \
          {"severityValue":6,"thresholdValue":95,"dynamicParam":0,"severityLabel":"critical"} \
        ] \
      } \
    } \
  } \
}

[itsi_uc_threshold_availability]
title = Availability KPIs (higher is better)
time_variate_thresholds = 0
adaptive_thresholds_is_enabled = 0
adaptive_thresholding_training_window = -7d
# Severity bands (decreasing-is-worse): Normal >= 99.9, Low 99.5, Medium 99, High 97, Critical <95
time_variate_thresholds_specification = { \
  "policies": { \
    "default_policy": { \
      "title": "Default Policy", \
      "policy_type": "static", \
      "time_blocks": [[0,23]], \
      "aggregate_thresholds": { \
        "baseSeverityValue": 2, \
        "baseSeverityColor": "#99D18B", \
        "baseSeverityLabel": "normal", \
        "gaugeMax": 100, \
        "gaugeMin": 0, \
        "isMinStatic": true, \
        "isMaxStatic": true, \
        "thresholdLevels": [ \
          {"severityValue":3,"thresholdValue":99.9,"dynamicParam":0,"severityLabel":"low"}, \
          {"severityValue":4,"thresholdValue":99.5,"dynamicParam":0,"severityLabel":"medium"}, \
          {"severityValue":5,"thresholdValue":99,"dynamicParam":0,"severityLabel":"high"}, \
          {"severityValue":6,"thresholdValue":95,"dynamicParam":0,"severityLabel":"critical"} \
        ] \
      } \
    } \
  } \
}

[itsi_uc_threshold_error_count]
title = Error-Count KPIs (increasing-is-worse)
time_variate_thresholds = 0
adaptive_thresholds_is_enabled = 0
adaptive_thresholding_training_window = -14d
# Severity bands: Normal 0, Low 1-5, Medium 6-20, High 21-50, Critical >50
time_variate_thresholds_specification = { \
  "policies": { \
    "default_policy": { \
      "title": "Default Policy", \
      "policy_type": "static", \
      "time_blocks": [[0,23]], \
      "aggregate_thresholds": { \
        "baseSeverityValue": 2, \
        "baseSeverityColor": "#99D18B", \
        "baseSeverityLabel": "normal", \
        "gaugeMax": 100, \
        "gaugeMin": 0, \
        "isMinStatic": false, \
        "isMaxStatic": false, \
        "thresholdLevels": [ \
          {"severityValue":3,"thresholdValue":1,"dynamicParam":0,"severityLabel":"low"}, \
          {"severityValue":4,"thresholdValue":6,"dynamicParam":0,"severityLabel":"medium"}, \
          {"severityValue":5,"thresholdValue":21,"dynamicParam":0,"severityLabel":"high"}, \
          {"severityValue":6,"thresholdValue":50,"dynamicParam":0,"severityLabel":"critical"} \
        ] \
      } \
    } \
  } \
}

# ---------------------------------------------------------------------
# ITSI KPI base searches — derived from splunk-monitoring-use-cases.
#
# Each stanza corresponds to a single KPI base search that backs one or
# more KPIs.  Base searches are preferred over ad-hoc KPIs because they
# run once per schedule and feed multiple metrics (cuts scheduler load
# by ~75% when four KPIs share a search).
#
# NOTE: `entity_alias_filtering_fields` defaults to `host`.  Override per
# customer if you use different alias fields.
# ---------------------------------------------------------------------

# ---- Linux OS metrics ----------------------------------------------
[itsi_uc_linux_core_metrics]
title = Linux Core Metrics (CPU / Memory / Disk)
base_search = index=os sourcetype=cpu OR sourcetype=vmstat OR sourcetype=df \
| stats avg(pctIdle) AS pct_idle, avg(memUsedPct) AS mem_used_pct, min(UsePct) AS disk_use_pct BY host \
| eval cpu_used_pct = 100 - pct_idle
alert_period = 5
search_alert_earliest = 5
alert_lag = 30
is_entity_breakdown = 1
entity_breakdown_id_fields = host
entity_alias_filtering_fields = host
is_service_entity_filter = 1
metrics = [ \
  {"title":"CPU Used %","threshold_field":"cpu_used_pct","unit":"%","aggregate_statop":"avg","entity_statop":"avg"}, \
  {"title":"Memory Used %","threshold_field":"mem_used_pct","unit":"%","aggregate_statop":"avg","entity_statop":"avg"}, \
  {"title":"Disk Used %","threshold_field":"disk_use_pct","unit":"%","aggregate_statop":"max","entity_statop":"max"} \
]
sec_grp = default_itsi_security_group

# ---- Windows OS metrics --------------------------------------------
[itsi_uc_windows_core_metrics]
title = Windows Core Metrics (CPU / Memory / Disk)
base_search = index=perfmon sourcetype=Perfmon:* \
| eval cpu_used_pct=if(object=="Processor" AND counter=="% Processor Time" AND instance=="_Total", Value, null()), \
       mem_avail_mb=if(object=="Memory" AND counter=="Available MBytes", Value, null()), \
       disk_free_mb=if(object=="LogicalDisk" AND counter=="Free Megabytes" AND instance!="_Total", Value, null()) \
| stats avg(cpu_used_pct) AS cpu_used_pct, avg(mem_avail_mb) AS mem_avail_mb, min(disk_free_mb) AS disk_free_mb BY host
alert_period = 5
search_alert_earliest = 5
alert_lag = 30
is_entity_breakdown = 1
entity_breakdown_id_fields = host
entity_alias_filtering_fields = host
is_service_entity_filter = 1
metrics = [ \
  {"title":"CPU Used %","threshold_field":"cpu_used_pct","unit":"%","aggregate_statop":"avg","entity_statop":"avg"}, \
  {"title":"Memory Available MB","threshold_field":"mem_avail_mb","unit":"MB","aggregate_statop":"avg","entity_statop":"avg"}, \
  {"title":"Disk Free MB (min)","threshold_field":"disk_free_mb","unit":"MB","aggregate_statop":"min","entity_statop":"min"} \
]
sec_grp = default_itsi_security_group

# ---- Network interface health -------------------------------------
[itsi_uc_network_interface_health]
title = Network Interface Errors and Throughput
base_search = index=os sourcetype=interfaces \
| stats avg(speed) AS throughput_kbps, sum(iferrors) AS total_errors BY host, Name
alert_period = 5
search_alert_earliest = 5
alert_lag = 30
is_entity_breakdown = 1
entity_breakdown_id_fields = host
entity_alias_filtering_fields = host
is_service_entity_filter = 1
metrics = [ \
  {"title":"Interface Throughput (kbps)","threshold_field":"throughput_kbps","unit":"kbps","aggregate_statop":"avg","entity_statop":"avg"}, \
  {"title":"Interface Errors","threshold_field":"total_errors","unit":"count","aggregate_statop":"sum","entity_statop":"sum"} \
]
sec_grp = default_itsi_security_group

# ---- VMware vCenter health ----------------------------------------
[itsi_uc_vmware_host_metrics]
title = VMware Host Metrics (CPU / Memory)
base_search = index=vmware sourcetype="vmware:perf:*" object=HostSystem \
| stats avg(cpu_usage_percent) AS cpu_usage_pct, avg(mem_usage_percent) AS mem_usage_pct BY host
alert_period = 5
search_alert_earliest = 10
alert_lag = 30
is_entity_breakdown = 1
entity_breakdown_id_fields = host
entity_alias_filtering_fields = host
is_service_entity_filter = 1
metrics = [ \
  {"title":"CPU Usage %","threshold_field":"cpu_usage_pct","unit":"%","aggregate_statop":"avg","entity_statop":"avg"}, \
  {"title":"Memory Usage %","threshold_field":"mem_usage_pct","unit":"%","aggregate_statop":"avg","entity_statop":"avg"} \
]
sec_grp = default_itsi_security_group

# ---- Web application availability ----------------------------------
[itsi_uc_web_availability]
title = Web Application Availability (HTTP 2xx/3xx)
base_search = index=web sourcetype="access_combined*" \
| stats count AS total, count(eval(status>=200 AND status<400)) AS success BY host \
| eval availability_pct = round(success/total*100, 2)
alert_period = 5
search_alert_earliest = 5
alert_lag = 30
is_entity_breakdown = 1
entity_breakdown_id_fields = host
entity_alias_filtering_fields = host
is_service_entity_filter = 1
metrics = [ \
  {"title":"Availability %","threshold_field":"availability_pct","unit":"%","aggregate_statop":"avg","entity_statop":"avg"} \
]
sec_grp = default_itsi_security_group

# ---- Kubernetes node health ----------------------------------------
[itsi_uc_k8s_node_health]
title = Kubernetes Node Metrics
base_search = index=k8s sourcetype=kube_metrics \
| stats avg(cpu_usage_nanocores) AS cpu_usage_ns, avg(memory_usage_bytes) AS mem_usage_bytes BY host, node
alert_period = 5
search_alert_earliest = 5
alert_lag = 30
is_entity_breakdown = 1
entity_breakdown_id_fields = node
entity_alias_filtering_fields = node
is_service_entity_filter = 1
metrics = [ \
  {"title":"Node CPU (ns)","threshold_field":"cpu_usage_ns","unit":"ns","aggregate_statop":"avg","entity_statop":"avg"}, \
  {"title":"Node Memory (bytes)","threshold_field":"mem_usage_bytes","unit":"bytes","aggregate_statop":"avg","entity_statop":"avg"} \
]
sec_grp = default_itsi_security_group

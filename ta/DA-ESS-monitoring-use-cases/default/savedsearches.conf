[ESCS-22.2.17 - NIS2 Backup Management and Disaster Recovery Verification (Art. 21(2)(c))]
description = UC-22.2.17: NIS2 Backup Management and Disaster Recovery Verification (Art. 21(2)(c)). While UC-22.2.4 monitors live service health during crises, Article 21(2)(c) specifically requires backup management and disaster recovery capabilities. This use case tracks backup job success/failure, validates restore test completion, and monitors RTO/RPO target adherence — providing the operational evidence that NIS2 auditors specifically ask for: "show me your last successful restore test."
search = index=backup sourcetype IN ("veeam:backup","commvault:job","rubrik:event","aws:backup") earliest=-7d \
| eval job_status=lower(coalesce(status, result, job_result, state)) \
| eval success=if(match(job_status,"(?i)success|completed|ok"), 1, 0) \
| eval failed=if(match(job_status,"(?i)fail|error|warning|missed"), 1, 0) \
| stats sum(success) as successful, sum(failed) as failed, latest(_time) as last_backup by job_name, target_system \
| eval days_since_backup=round((now()-last_backup)/86400, 1) \
| eval backup_gap=if(days_since_backup > 1, "OVERDUE", "OK") \
| where failed > 0 OR backup_gap="OVERDUE" \
| sort - days_since_backup \
| table target_system, job_name, successful, failed, days_since_backup, backup_gap

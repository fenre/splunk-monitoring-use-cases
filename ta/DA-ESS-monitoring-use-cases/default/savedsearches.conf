[ESCS-17.3.29 - Cato SD-WAN Tunnel Health (Cato Networks)]
description = UC-17.3.29: Cato SD-WAN Tunnel Health (Cato Networks). Cato Sockets build IPsec/DTLS tunnels to the nearest PoP; when tunnels drop, the site loses cloud-delivered security, path selection, and centralized breakout. Measuring down events, duration, and time-to-recover supports SLA reporting and distinguishes transient blips from structural connectivity failures.
search = index=sase sourcetype IN ("cato:events","cato:sase") earliest=-7d \
| eval site=coalesce(site_name, site_id, socket_name, socket_serial) \
| eval tunnel_state=lower(coalesce(tunnel_state, tunnel_status, connection_state, link_state, "")) \
| where match(tunnel_state,"down|disconnected|failed|lost|inactive|degraded") OR match(lower(coalesce(event_sub_type, "")),"(?i)tunnel.*down|socket.*down|disconnect") \
| stats count earliest(_time) as first_event latest(_time) as last_event by site tunnel_state \
| eval window_sec=last_event-first_event \
| sort -count

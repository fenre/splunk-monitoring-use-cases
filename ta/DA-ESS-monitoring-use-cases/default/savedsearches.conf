[ESCS-22.5.6 - MiFID II Order and Decision Data Record Integrity (Art. 25)]
description = UC-22.5.6: MiFID II Order and Decision Data Record Integrity (Art. 25). Investment firms must keep orderly records of services and transactions. Detecting gaps or duplicate order IDs in OMS/EMS journals supports defensible reconstruction of the decision chain during regulatory reconstruction exercises.
search = index=trading sourcetype="_json" source="http:order_lifecycle" earliest=-1d \
| where event_type IN ("NewOrderSingle","OrderCancelReplaceRequest","ExecutionReport","OrderCancelRequest") \
| stats min(_time) as first_seen, max(_time) as last_seen, dc(event_type) as event_types, count as events by order_id \
| eval span_sec=last_seen-first_seen \
| eventstats dc(order_id) as total_orders \
| eventstats sum(events) as sum_events \
| eval dup_ratio=round(events/sum_events, 6) \
| where events<2 OR span_sec<0.001 \
| sort order_id

[ESCS-22.2.12 - NIS2 Multi-Factor Authentication and Secure Communications (Art. 21(2)(j))]
description = UC-22.2.12: NIS2 Multi-Factor Authentication and Secure Communications (Art. 21(2)(j)). Article 21(2)(j) requires MFA or continuous authentication, secured voice/video/text communications, and emergency communication systems. This use case monitors MFA enforcement across critical systems, detects authentication bypasses, and validates that administrative and emergency access channels are secured — providing evidence of the strongest authentication controls NIS2 mandates.
search = index=auth OR index=azure OR index=okta earliest=-24h \
  sourcetype IN ("ms:aad:signin","OktaIM2:log","linux:auth","WinEventLog:Security") \
| eval user=coalesce(userPrincipalName, actor.alternateId, Account_Name, user) \
| eval mfa_used=case( \
    match(lower(_raw),"(?i)mfa|multifactor|two.?factor|2fa|totp|fido|webauthn|push.*approve"), 1, \
    match(lower(authenticationRequirement),"(?i)multi"), 1, \
    match(lower(factor),"(?i)push|totp|sms|call|webauthn"), 1, \
    1=1, 0) \
| eval is_admin=if(match(lower(user),"(?i)admin|svc-|service|root|system") OR match(lower(_raw),"(?i)privileged|admin.*role"), 1, 0) \

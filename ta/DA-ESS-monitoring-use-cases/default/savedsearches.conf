[ESCS-22.21.5 - Bias Drift Monitoring Across Protected Attributes (Art. 12) (EU AI Act)]
description = UC-22.21.5: Bias Drift Monitoring Across Protected Attributes (Art. 12) (EU AI Act). Tracks disparate impact ratio across demographic buckets over sliding windows to evidence ongoing bias monitoring aligned with Art. 12 and Annex IV risk management.
search = index=ai_fairness sourcetype="ai:bias:eval" earliest=-48h \
| stats latest(selection_rate) as sr by attribute, bucket, model_id \
| eventstats max(sr) as sr_max, min(sr) as sr_min by attribute, model_id \
| eval dipr=round(sr_max/nullif(sr_min,0),3) \
| where dipr > 1.25 OR sr_min < 0.01 \
| sort attribute, -dipr \
| table model_id, attribute, bucket, sr, dipr

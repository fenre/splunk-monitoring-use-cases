[ESCS-22.3.22 - DORA ICT Concentration — Critical Service Dependency Fan-In by Provider]
description = UC-22.3.22: DORA ICT Concentration — Critical Service Dependency Fan-In by Provider. Multiple critical services routing through one provider’s shared edge or identity layer is hidden concentration. Fan-in metrics highlight when too many important business functions share a single third-party control point.
search = index=cmdb sourcetype="cmdb:dependency" tier="critical" earliest=-1d \
| stats dc(service_id) as dependent_services by provider_id, upstream_ci \
| where dependent_services>15 \
| sort - dependent_services

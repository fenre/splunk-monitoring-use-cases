description = UC-14.6.1: S7comm PLC Read/Write Operation Monitoring. Unexpected write-heavy traffic to Siemens PLCs can indicate tampering or mis-engineered automation; tracking read versus write ratios supports least-privilege engineering and early detection of process-impacting changes.
search = index=ot sourcetype="zeek:s7comm:json" \

[ESCS-10.15.1 - User Peer-Group Logon Volume Anomaly (MLTK)]
description = UC-10.15.1: User Peer-Group Logon Volume Anomaly (MLTK). Comparing each user's authentication volume to their peer group (same department, role, or location) surfaces compromised accounts and insider threats that per-user baselines alone cannot catch — a user whose logon count is normal for themselves but triple the peer average is a strong anomaly signal.
search = | tstats `security_content_summariesonly` count FROM datamodel=Authentication \
    WHERE Authentication.action="success" \
    BY _time span=1d, Authentication.user \
| `drop_dm_object_name(Authentication)` \
| lookup identity_lookup identity AS user OUTPUT bunit \
| eventstats avg(count) as peer_avg stdev(count) as peer_std by bunit, _time \
| eval z_score=round((count - peer_avg) / nullif(peer_std, 0), 2) \
| where z_score > 3 \
| fit DensityFunction count by bunit into peer_logon_model \
| where isOutlier > 0 \
| table _time, user, bunit, count, peer_avg, z_score \
| sort -z_score

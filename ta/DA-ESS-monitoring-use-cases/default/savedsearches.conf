[ESCS-10.15.4 - Credential Stuffing Burst Detection vs Baseline (MLTK)]
description = UC-10.15.4: Credential Stuffing Burst Detection vs Baseline (MLTK). Credential stuffing attacks generate sudden spikes in failed authentication from distributed sources. By baselining normal failure rates per application endpoint and flagging statistical outliers, this detection catches automated credential replay before account lockouts cascade.
search = | tstats `security_content_summariesonly` count FROM datamodel=Authentication \
    WHERE Authentication.action="failure" \
    BY _time span=5m, Authentication.app, Authentication.src \
| `drop_dm_object_name(Authentication)` \
| eventstats avg(count) as baseline_avg stdev(count) as baseline_std by app \
| eval z_score=round((count - baseline_avg) / nullif(baseline_std, 0), 2) \
| where z_score > 4 \
| stats sum(count) as total_failures dc(src) as unique_sources max(z_score) as peak_z by _time, app \
| where unique_sources > 10 AND total_failures > 100 \
| fit DensityFunction total_failures unique_sources into cred_stuffing_model \
| where isOutlier > 0 \
| table _time, app, total_failures, unique_sources, peak_z \
| sort -total_failures

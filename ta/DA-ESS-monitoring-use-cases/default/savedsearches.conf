description = UC-10.7.398: Network Traffic to Active Directory Web Services Protocol. The following analytic identifies network traffic directed to the Active Directory Web Services Protocol (ADWS) on port 9389. It leverages network traffic logs, focusing on source and destination IP addresses, application names, and destination ports. This activity is significant as ADWS is used to manage Active Directory, and unauthorized access could indicate malicious intent. If confirmed malicious, an attacker could manipulate Active Directory, potentially leading to privilege escalation, un…
search = | tstats count FROM datamodel=Network_Traffic \
      WHERE All_Traffic.dest_port=9389 \
      BY All_Traffic.action All_Traffic.app All_Traffic.dest \
         All_Traffic.dest_port All_Traffic.direction \

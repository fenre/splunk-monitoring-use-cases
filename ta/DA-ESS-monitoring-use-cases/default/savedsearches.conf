[ESCS-22.13.12 - Post-Termination Access Revocation within 24 Hours (CIP-004-6 R4 Part 4.2)]
description = UC-22.13.12: Post-Termination Access Revocation within 24 Hours (CIP-004-6 R4 Part 4.2). We measure hours from HR termination timestamp to Active Directory account disable for BES personnel, evidencing the one-day removal expectation.
search = index=hr sourcetype=hr:termination earliest=-14d \
| eval term_epoch=strptime(term_time,"%Y-%m-%d %H:%M:%S") \
| rename employee_id as user \
| join type=left user [ \
    search index=wineventlog sourcetype="WinEventLog:Security" EventCode=4726 earliest=-14d \
    | stats earliest(_time) as disable_epoch by TargetUserName \
    | rename TargetUserName as user \
  ] \

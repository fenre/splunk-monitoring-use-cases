[ESCS-22.1.10 - GDPR Privileged Access to Personal Data Stores (Art. 5(1)(f) / Art. 32)]
description = UC-22.1.10: GDPR Privileged Access to Personal Data Stores (Art. 5(1)(f) / Art. 32). Articles 5(1)(f) and 32 require integrity and confidentiality of personal data. Privileged access to databases and file stores containing personal data is the highest-risk vector for both accidental exposure and malicious exfiltration. This use case monitors DBA/admin access to personal data stores, detects bulk data exports, and identifies access outside approved change windows — providing the accountability evidence regulators expect.
search = index=dbaudit sourcetype IN ("mssql:audit","oracle:audit","postgres:csv","mysql:audit") earliest=-24h \
| eval user=coalesce(server_principal_name, os_username, user_name, db_user) \
| eval action=lower(coalesce(action_id, action_name, statement_type, command_tag)) \
| eval is_bulk=if(match(action,"(?i)select.*into|bulk|export|dump|copy|backup") OR match(_raw,"(?i)rows_affected.*[5-9]\d{3}|rows_affected.*\d{5,}"), 1, 0) \
| eval after_hours=if(tonumber(strftime(_time,"%H"))<7 OR tonumber(strftime(_time,"%H"))>19, 1, 0) \
| lookup gdpr_personal_data_systems.csv dest AS database_name OUTPUT data_category, contains_pii \
| where contains_pii="true" AND (is_bulk=1 OR after_hours=1 OR match(action,"(?i)grant|alter|drop|truncate|delete")) \
| table _time, user, database_name, data_category, action, is_bulk, after_hours \
| sort - _time

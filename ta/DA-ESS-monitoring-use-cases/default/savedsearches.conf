[ESCS-9.7.2 - MFA Adoption Rate Trending]
description = UC-9.7.2: MFA Adoption Rate Trending. Tracking the percentage of users enrolled in multi-factor authentication over time proves progress toward zero-trust and regulatory expectations. Flat or declining adoption after rollout indicates gaps in onboarding, excluded groups, or integration problems that leave accounts easier to abuse.
search = index=okta (sourcetype="Okta:im" OR sourcetype="OktaIM2") objectType=user earliest=-90d@d \
| eval has_mfa=if(mvcount('mfaFactors{}.factorType')>0 OR mvcount(mfaFactors)>0 OR like(lower(mfaStatus),"active"),1,0) \
| bin _time span=1d \
| stats sum(has_mfa) as mfa_enrolled_users, dc(id) as distinct_users by _time \
| eval adoption_pct=round(100*mfa_enrolled_users/distinct_users,2) \
| sort _time \
| trendline sma7(adoption_pct) as adoption_sma7 \
| predict adoption_pct as adoption_forecast algorithm=LLP future_timespan=14

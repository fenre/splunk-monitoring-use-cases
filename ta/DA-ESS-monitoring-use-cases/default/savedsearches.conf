[ESCS-10.15.3 - C2 Beaconing Detection via Time-Series Regularity (MLTK)]
description = UC-10.15.3: C2 Beaconing Detection via Time-Series Regularity (MLTK). Command-and-control (C2) implants call home at regular intervals. By measuring inter-arrival time variance for each src-dest-port tuple, this detection identifies periodic beaconing that blends into normal traffic volumes — catching Cobalt Strike, Sliver, and custom implants that frequency-based rules miss.
search = | tstats `security_content_summariesonly` count FROM datamodel=Network_Traffic \
    BY _time span=1s, All_Traffic.src, All_Traffic.dest, All_Traffic.dest_port \
| `drop_dm_object_name(All_Traffic)` \
| sort src, dest, dest_port, _time \
| streamstats current=f window=1 last(_time) as prev_time by src, dest, dest_port \
| eval iat=_time - prev_time \
| where isnotnull(iat) AND iat > 0 AND iat < 86400 \
| stats count, avg(iat) as avg_iat, stdev(iat) as std_iat, min(iat) as min_iat, max(iat) as max_iat by src, dest, dest_port \
| eval cv=round(std_iat / nullif(avg_iat, 0), 4) \
| where cv < 0.15 AND count > 50 AND avg_iat > 10 AND avg_iat < 3600 \
| apply beacon_density_model threshold=0.01 \
| rename "IsOutlier(cv)" as isBeacon \
| where isBeacon > 0 \
| table src, dest, dest_port, count, avg_iat, cv \
| sort cv

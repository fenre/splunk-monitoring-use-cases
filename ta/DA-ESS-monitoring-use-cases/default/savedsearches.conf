[ESCS-22.5.1 - MiFID II Trade and Transaction Reporting Completeness (Art. 26)]
description = UC-22.5.1: MiFID II Trade and Transaction Reporting Completeness (Art. 26). Detects reporting gaps (missing submissions vs expected trading-day volume) and ARM/APA rejection spikes to support completeness and accuracy controls for transaction reporting oversight.
search = index=trading sourcetype="_json" source="http:trx_reporting" earliest=-30d@d \
| eval rejected=if(isnotnull(reject_code) AND reject_code!="", 1, 0) \
| eval accepted=if(report_status IN ("ACCEPTED","ACKED","CONFIRMED") AND rejected=0, 1, 0) \
| bin _time span=1d \
| stats count as sent, sum(accepted) as accepted, sum(rejected) as rejects, dc(transaction_report_id) as distinct_reports by _time, venue \
| eventstats avg(sent) as baseline by venue \
| eval volume_gap=if(sent<baseline*0.75, 1, 0) \
| where volume_gap=1 OR rejects>0 \
| table _time, venue, sent, accepted, rejects, volume_gap \
| sort _time, venue

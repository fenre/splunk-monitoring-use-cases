[ESCS-22.8.6 - SOC 2 Processing Integrity — Financial Batch Job Reconciliation Exceptions (PI1.3)]
description = UC-22.8.6: SOC 2 Processing Integrity — Financial Batch Job Reconciliation Exceptions (PI1.3). Processing integrity criteria require system processing to be complete, valid, accurate, timely, and authorized. Monitoring ETL or billing batch exception counts versus totals provides continuous evidence that automated controls detect and surface out-of-balance conditions.
search = index=finance sourcetype="_json" source="http:batch_recon" earliest=-7d \
| eval fail_rate=round(100*records_failed/records_total,4) \
| eval amt_exc_rate=if(amount_total>0, round(100*amount_exception/amount_total,4), 0) \
| stats sum(records_total) as rows, sum(records_failed) as failed_rows, max(fail_rate) as peak_fail_rate by pipeline, batch_id \
| where failed_rows>0 OR peak_fail_rate>0.01 \
| sort - failed_rows

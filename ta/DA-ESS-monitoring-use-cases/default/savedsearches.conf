description = UC-10.6.6: Vulnerability SLA Compliance. SLA tracking ensures vulnerabilities are remediated within policy timeframes. Non-compliance creates audit findings.
search = index=vulnerability sourcetype="tenable:vuln" state="Active" \
| eval age_days=round((now()-first_seen)/86400) \
| eval sla_days=case(severity="Critical",7, severity="High",30, severity="Medium",90, 1=1,180) \
| eval sla_status=if(age_days>sla_days,"Overdue","Compliant") \
| stats count by severity, sla_status

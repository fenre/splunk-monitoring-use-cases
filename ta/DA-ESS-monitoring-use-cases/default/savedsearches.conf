[ESCS-10.16.3 - Mean Time to Detect (MTTD) Trending]
description = UC-10.16.3: Mean Time to Detect (MTTD) Trending. MTTD measures how quickly the organization notices malicious activity after it starts. Quarter-over-quarter trending supports leadership reporting, purple-team exercises, and investment in detection content versus response tooling.
search = index=notable earliest=-400d \
| eval mttd_sec=coalesce(time_to_detect, dwell_time_seconds, first_detection_lag) \
| where isnotnull(mttd_sec) AND mttd_sec>=0 AND mttd_sec<8640000 \
| eval quarter=strftime(_time,"%Y") . "-Q" . ceil(tonumber(strftime(_time,"%m"))/3) \
| stats median(mttd_sec) as median_mttd_sec p95(mttd_sec) as p95_mttd_sec count as cases by quarter \
| eval median_mttd_hrs=round(median_mttd_sec/3600,2) \
| table quarter, cases, median_mttd_hrs, p95_mttd_sec

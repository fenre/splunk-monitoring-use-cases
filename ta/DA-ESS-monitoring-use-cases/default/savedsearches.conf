[ESCS-17.2.14 - Geo-Impossible VPN Connections]
description = UC-17.2.14: Geo-Impossible VPN Connections. Detects logins from two distant countries faster than plausible travel — complements static geo allowlists (UC-17.2.3).
search = index=vpn sourcetype="cisco:asa" action="session_connect" earliest=-24h \
| iplocation src \
| eval country=Country \
| sort user _time \
| streamstats current=f last(_time) as prev_time last(Country) as prev_country by user \
| eval gap_hrs=round((_time-prev_time)/3600,2) \
| where isnotnull(prev_country) AND country!=prev_country AND gap_hrs < 6 \
| table _time, user, prev_country, country, gap_hrs, src

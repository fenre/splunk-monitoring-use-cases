[ESCS-22.2.18 - NIS2 Network Security Monitoring and Anomaly Detection (Art. 21(2)(a))]
description = UC-22.2.18: NIS2 Network Security Monitoring and Anomaly Detection (Art. 21(2)(a)). Article 21(2)(a) requires information system security policies to be operational, not just documented. This use case provides continuous network security monitoring — detecting lateral movement, unauthorized network segments, protocol anomalies, and traffic patterns that deviate from baseline — serving as the core evidence that network security policies are enforced through technical controls.
search = | tstats `summariesonly` count sum(All_Traffic.bytes) as total_bytes dc(All_Traffic.dest_port) as dest_ports \
  from datamodel=Network_Traffic.All_Traffic \
  where NOT All_Traffic.dest_category IN ("internal_server","dns","ntp") \
  by All_Traffic.src All_Traffic.dest All_Traffic.action span=1h \
| rename All_Traffic.* as * \
| where dest_ports > 20 OR (action="blocked" AND count > 100) OR total_bytes > 10737418240 \
| lookup asset_lookup_by_str key AS src OUTPUT category as src_category, priority as src_priority \
| eval risk_signal=case( \
    dest_ports > 50, "port_scan", \
    action="blocked" AND count > 500, "brute_force", \
    total_bytes > 10737418240, "data_exfiltration", \
    isnull(src_category), "unknown_asset", \
    1=1, "anomaly") \
| sort - count \
| table _time, src, dest, src_category, risk_signal, dest_ports, count, total_bytes, action

description = UC-22.4.22: CCPA/CPRA — Cross-Context Behavioral Advertising — SSP Auction Requests After “Limit Use of Sensitive PI” Flag. Limiting use of sensitive PI for advertising must be operationally enforced. Programmatic auction requests that still attach sensitive audience segments after the limit flag is set indicate pipeline defects with high regulatory salience.
search = index=privacy sourcetype="consent:state" limit_sensitive_ad_use=true earliest=-30d \
| eval eff=strptime(updated_ts,"%Y-%m-%dT%H:%M:%SZ") \
| join type=left user_id [ \
    search index=ads sourcetype="prebid:auction" earliest=-30d \
    | eval has_sensitive=if(match(segments,"(?i)(health|finance|precise_geo)"),1,0) \
    | rename _time as auction_time \
    | fields user_id, auction_time, has_sensitive, segments \
  ] \
| where auction_time>eff AND has_sensitive=1 \
| stats count by user_id \
| sort - count

[ESCS-22.4.6 - CCPA Global Privacy Control and “Do Not Sell or Share” Signal Enforcement (§1798.120, §1798.135(b))]
description = UC-22.4.6: CCPA Global Privacy Control and “Do Not Sell or Share” Signal Enforcement (§1798.120, §1798.135(b)). Opt-out preference signals including GPC must be honored where required. Aggregating API-side opt-out application outcomes demonstrates that technical controls downstream of the browser actually suppress sale/share processing, not only that marketing pages were visited.
search = index=privacy sourcetype="_json" source="http:ccpa_optout_apply" earliest=-24h \
| eval failed=if(opt_out_applied="false" OR isnotnull(failure_reason), 1, 0) \
| stats count as attempts, sum(failed) as failures, sum(eval(gpc_received="true")) as gpc_context by channel \
| eval fail_rate=round(100*failures/attempts, 2) \
| sort - failures

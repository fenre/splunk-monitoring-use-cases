[ESCS-14.1.40 - Domestic Hot Water Temperature Compliance (Legionella Prevention)]
description = UC-14.1.40: Domestic Hot Water Temperature Compliance (Legionella Prevention). Legionella bacteria thrive in water between 20-45°C. Building codes require domestic hot water storage above 60°C and distribution above 50°C. Temperature drops below these thresholds create serious health risks and regulatory violations.
search = index=building sourcetype="bms:water" system="domestic_hot_water" \
| bin _time span=15m \
| stats avg(temperature_c) as avg_temp, min(temperature_c) as min_temp by location, sensor_type, _time \
| eval compliance=case( \
    sensor_type="storage" AND min_temp>=60, "Compliant", \
    sensor_type="storage" AND min_temp<60, "NON-COMPLIANT", \
    sensor_type="return" AND min_temp>=50, "Compliant", \
    sensor_type="return" AND min_temp<50, "NON-COMPLIANT") \
| where compliance="NON-COMPLIANT" \
| table _time, location, sensor_type, avg_temp, min_temp, compliance

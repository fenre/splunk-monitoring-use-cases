[ESCS-22.7.6 - NIST CSF Respond — Incident Response Playbook Execution and Stage Timestamps (RS.RP-1)]
description = UC-22.7.6: NIST CSF Respond — Incident Response Playbook Execution and Stage Timestamps (RS.RP-1). RS.RP-1 requires response processes to be executed during and after an incident. Measuring Splunk SOAR incident-response playbook success rates alongside ServiceNow security-incident stage timing proves that documented response procedures actually run and that closure timelines are measurable for after-action review.
search = index=itsm sourcetype="snow:incident" earliest=-90d short_description="*security incident*" \
| eval start_epoch=strptime(work_start, "%Y-%m-%d %H:%M:%S") \
| eval end_epoch=strptime(resolved_at, "%Y-%m-%d %H:%M:%S") \
| eval duration_sec=if(isnotnull(start_epoch) AND isnotnull(end_epoch), end_epoch-start_epoch, null()) \
| stats count as incidents, median(duration_sec) as median_duration_sec by u_ir_stage, state \
| eval median_duration_h=round(median_duration_sec/3600,2) \
| sort - incidents

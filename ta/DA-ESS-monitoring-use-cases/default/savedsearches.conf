[ESCS-10.15.2 - Lateral Movement via Rare Destination Hosts (MLTK)]
description = UC-10.15.2: Lateral Movement via Rare Destination Hosts (MLTK). Attackers moving laterally connect to hosts they have never accessed before. By modeling each user's typical destination set and flagging first-seen or statistically rare destinations, this detection catches post-compromise pivoting that static ACLs and signature rules cannot see.
search = | tstats `security_content_summariesonly` count FROM datamodel=Authentication \
    WHERE Authentication.action="success" AND (Authentication.signature_id=4624) \
    BY _time span=1h, Authentication.user, Authentication.dest \
| `drop_dm_object_name(Authentication)` \
| stats earliest(_time) as first_seen latest(_time) as last_seen count by user, dest \
| join type=left user \
    [| tstats count FROM datamodel=Authentication WHERE Authentication.action="success" \
        BY Authentication.user, Authentication.dest \
        | `drop_dm_object_name(Authentication)` \
        | stats dc(dest) as historical_dest_count values(dest) as historical_dests by user] \
| where NOT match(historical_dests, dest) \
| fit LogisticRegression fit_intercept=true "is_lateral" from count, historical_dest_count into lateral_movement_model \
| where predicted(is_lateral) > 0.7 \
| table first_seen, user, dest, count, historical_dest_count \
| sort -first_seen

[ESCS-22.3.15 - DORA ICT Access Control and Authentication Monitoring (Art. 9(4)(c))]
description = UC-22.3.15: DORA ICT Access Control and Authentication Monitoring (Art. 9(4)(c)). Article 9(4)(c) requires policies for digital identity management, access control limiting physical and logical access to ICT assets and data, and strong authentication mechanisms. This use case monitors authentication patterns across DORA-regulated ICT systems — detecting shared accounts, weak authentication, privilege escalation, and access from unauthorized locations — providing the access control evidence DORA mandates for protection and prevention.
search = | tstats `summariesonly` count dc(Authentication.src) as src_count dc(Authentication.dest) as dest_count \
  from datamodel=Authentication.Authentication \
  where Authentication.action="success" \
  by Authentication.user Authentication.app span=1d \
| rename Authentication.* as * \
| lookup dora_critical_systems.csv system_name AS dest OUTPUT critical_function \
| where isnotnull(critical_function) \
| eval risk_signals=mvappend( \
    if(src_count > 5, "MULTI_LOCATION", null()), \
    if(match(lower(user),"(?i)shared|generic|test|admin[0-9]"), "SHARED_ACCOUNT", null()), \
    if(match(lower(app),"(?i)password|basic|ntlm") AND NOT match(lower(app),"(?i)mfa|2fa|cert|kerberos"), "WEAK_AUTH", null())) \
| where isnotnull(risk_signals) \
| table user, app, critical_function, count, src_count, dest_count, risk_signals \
| sort - count
cron_schedule = */15 * * * *
dispatch.earliest_time = -30m@m
dispatch.latest_time = now
enableSched = 0
is_scheduled = 0
disabled = 1
action.correlationsearch = 1
action.correlationsearch.label = UC-22.3.15: DORA ICT Access Control and Authentication Monitoring (Art. 9(4)(c))
action.notable = 1
action.notable.param.rule_title = UC-22.3.15: DORA ICT Access Control and Authentication Monitoring (Art. 9(4)(c))
action.notable.param.rule_description = Article 9(4)(c) requires policies for digital identity management, access control limiting physical and logical access to ICT assets and data, and strong authentication mechanisms. This use case monitors authentication patterns across DORA-regulated ICT systems — detecting shared accounts, weak authentication, privilege escalation, and access from unauthorized locations — providing the access control evidence DORA mandates for protection and prevention.
action.notable.param.severity = high
action.notable.param.drilldown_name = $name$
action.notable.param.drilldown_search = $drilldown_search$
action.risk = 0
action.risk.param._risk_score = 40
action.risk.param._risk_object = host

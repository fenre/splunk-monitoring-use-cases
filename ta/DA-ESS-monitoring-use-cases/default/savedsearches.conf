[ESCS-22.8.14 - SOC 2 CC4 — Fraud Risk Scenario Testing Evidence from Anomaly Correlation]
description = UC-22.8.14: SOC 2 CC4 — Fraud Risk Scenario Testing Evidence from Anomaly Correlation. CC4 includes fraud risk. Documenting that specific fraud scenarios (payroll diversion, vendor master change, refund abuse) are exercised and that monitoring fired in tabletop or purple-team events satisfies assessors that fraud is in scope.
search = index=security sourcetype="purple_team:event" earliest=-180d \
| stats earliest(_time) as first_seen, latest(_time) as last_seen, values(result) as results by scenario_id, phase \
| join type=left scenario_id [ \
    search `notable` earliest=-180d tag=fraud_scenario \
    | stats count as correlated_notables by rule_name \
    | rename rule_name as scenario_id \
  ] \
| eval evidence_ok=if(isnotnull(correlated_notables) AND correlated_notables>0,1,0) \
| where evidence_ok=0 AND phase="detection_validation" \
| table scenario_id, phase, first_seen, last_seen, correlated_notables

    | eval incorrect_cred=\"$incorrect_cred$\" \
    | eval ut_shannon=\"$ut_shannon$\" \
    | sort count" \
    | where user!=incorrect_cred \
    | outlier action=RM count \
    | `potential_password_in_username_filter`

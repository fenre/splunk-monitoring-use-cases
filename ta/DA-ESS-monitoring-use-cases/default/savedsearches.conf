[ESCS-22.2.39 - NIS2 OT Incident Detection — Process and Protocol Anomalies (Art. 21(2)(f))]
description = UC-22.2.39: NIS2 OT Incident Detection — Process and Protocol Anomalies (Art. 21(2)(f)). OT incidents may manifest as Modbus function anomalies, unusual OPC-UA browse depth, or historian gaps rather than Windows malware. This use case baselines industrial protocol traffic per cell line and alerts on deviations that suggest manipulation or sensor spoofing.
search = index=ot_protocol sourcetype="modbus:session" earliest=-7d \

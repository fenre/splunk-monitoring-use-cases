description = UC-10.8.15: Linux Impair Defenses Process Kill. The following analytic identifies the execution of the 'pkill' command, which is used to terminate processes on a Linux system. It leverages data from Endpoint Detection and Response (EDR) agents, focusing on process names and command-line executions. This activity is significant because threat actors often use 'pkill' to disable security defenses or terminate critical processes, facilitating further malicious actions. If confirmed malicious, this behavior could lead to the disruption of securit…
search = | tstats `security_content_summariesonly` count min(_time) as firstTime max(_time) as lastTime FROM datamodel=Endpoint.Processes \
      WHERE Processes.process_name IN ( "pgrep", "pkill") Processes.process = "*pkill *" \
      BY Processes.action Processes.dest Processes.original_file_name \
         Processes.parent_process Processes.parent_process_exec Processes.parent_process_guid \
         Processes.parent_process_id Processes.parent_process_name Processes.parent_process_path \
         Processes.process Processes.process_exec Processes.process_guid \
         Processes.process_hash Processes.process_id Processes.process_integrity_level \
         Processes.process_name Processes.process_path Processes.user \
         Processes.user_id Processes.vendor_product \
    | `drop_dm_object_name(Processes)` \
    | `security_content_ctime(firstTime)` \
    | `linux_impair_defenses_process_kill_filter`

[ESCS-10.7.22 - Detect Distributed Password Spray Attempts]
description = UC-10.7.22: Detect Distributed Password Spray Attempts. This analytic employs the 3-sigma approach to identify distributed password spray attacks. A distributed password spray attack is a type of brute force attack where the attacker attempts a few common passwords against many different accounts, connecting from multiple IP addresses to avoid detection. By utilizing the Authentication Data Model, this detection is effective for all CIM-mapped authentication events, providing comprehensive coverage and enhancing security against these attacks.
search = | tstats `security_content_summariesonly` count dc(Authentication.user) AS unique_accounts dc(Authentication.src) AS unique_src values(Authentication.app) AS app from datamodel=Authentication where Authentication.action="failure" by _time span=5m \
| eventstats avg(unique_accounts) AS avg_accounts stdev(unique_accounts) AS stdev_accounts avg(unique_src) AS avg_src stdev(unique_src) AS stdev_src \
| eval upper_accounts = avg_accounts + (3 * stdev_accounts), upper_src = avg_src + (3 * stdev_src) \
| where unique_accounts > upper_accounts AND unique_src > upper_src

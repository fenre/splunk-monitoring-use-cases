description = UC-10.7.183: Detect AWS Console Login by New User. The following analytic detects AWS console login events by new users. It leverages AWS CloudTrail events and compares them against a lookup file of previously seen users based on ARN values. This detection is significant because a new user logging into the AWS console could indicate the creation of new accounts or potential unauthorized access. If confirmed malicious, this activity could lead to unauthorized access to AWS resources, data exfiltration, or further exploitation within the cloud env…
search = | tstats earliest(_time) as firstTime latest(_time) as lastTime FROM datamodel=Authentication \
      WHERE Authentication.signature=ConsoleLogin \
      BY Authentication.user \
    | `drop_dm_object_name(Authentication)` \
    | join max=1 user type=outer [ \
    | inputlookup previously_seen_users_console_logins \
    | stats min(firstTime) as earliestseen \
      BY user] \
    | eval userStatus=if(earliestseen >= relative_time(now(), "-24h@h") OR isnull(earliestseen), "First Time Logging into AWS Console", "Previously Seen User") \
    | where userStatus="First Time Logging into AWS Console" \
    | `security_content_ctime(firstTime)` \
    | `security_content_ctime(lastTime)` \
    | `detect_aws_console_login_by_new_user_filter`

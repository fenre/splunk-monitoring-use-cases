[ESCS-14.3.44 - Local Backlog Monitoring & Data Loss Prevention]
description = UC-14.3.44: Local Backlog Monitoring & Data Loss Prevention. Prevents silent data loss by monitoring local SQLite backlog capacity and alerting before data is discarded.
search = index=edge-hub-health sourcetype=edge_hub \
| stats latest(backlog_sensor_data_count) as sensor_backlog, latest(backlog_max_capacity) as capacity, \
        latest(backlog_events_lost) as lost_count by host \
| eval backlog_utilization=(sensor_backlog / capacity) * 100 \
| eval data_loss_risk=case( \

[ESCS-10.4.8 - Email Attachments With Lots Of Spaces]
description = UC-10.4.8: Email Attachments With Lots Of Spaces. The following analytic detects email attachments with an unusually high number of spaces in their file names, which is a common tactic used by attackers to obfuscate file extensions. It leverages the Email data model to identify attachments where the ratio of spaces to the total file name length exceeds 10%. This behavior is significant as it may indicate an attempt to bypass security filters and deliver malicious payloads. If confirmed malicious, this activity could lead to the execution of har…
search = | tstats `security_content_summariesonly` count values(All_Email.recipient) as recipient_address min(_time) as firstTime max(_time) as lastTime FROM datamodel=Email \
      WHERE All_Email.file_name="*" \
      BY All_Email.src_user, All_Email.file_name All_Email.message_id \
    | `security_content_ctime(firstTime)` \
    | `security_content_ctime(lastTime)` \
    | `drop_dm_object_name("All_Email")` \
    | eval space_ratio = (mvcount(split(file_name," "))-1)/len(file_name) \
    | search space_ratio >= 0.1 \
    | rex field=recipient_address "(?<recipient_user>.*)@" \
    | `email_attachments_with_lots_of_spaces_filter`

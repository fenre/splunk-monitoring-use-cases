[ESCS-22.8.20 - SOC 2 CC7 — Unauthorized Production Configuration Change Detection]
description = UC-22.8.20: SOC 2 CC7 — Unauthorized Production Configuration Change Detection. CC7 addresses system operations. Detecting changes to firewall rules, cloud security groups, or database parameters without a matching approved change ticket demonstrates monitoring over unauthorized modifications.
search = index=aws sourcetype="aws:cloudtrail" eventName IN ("AuthorizeSecurityGroupIngress","RevokeSecurityGroupIngress","ModifyDBClusterParameterGroup") earliest=-7d \
| eval change_key=md5(_raw) \

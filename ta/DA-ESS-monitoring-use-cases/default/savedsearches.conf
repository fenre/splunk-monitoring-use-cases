description = UC-22.1.6: GDPR Cross-Border Data Transfer Monitoring (Art. 44-49). Highlights outbound traffic volumes to destinations outside the approved EEA/adequacy footprint so transfers can be gated by SCCs, BCRs, TIAs, or blocking controls.
search = | tstats summariesonly=t sum(All_Traffic.bytes_out) as bytes_out \
    from datamodel=Network_Traffic.All_Traffic \
    where All_Traffic.action="allowed" \

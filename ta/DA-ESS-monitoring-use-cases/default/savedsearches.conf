[ESCS-22.2.6 - NIS2 Risk Analysis and Information System Security Policy Evidence (Art. 21(2)(a))]
description = UC-22.2.6: NIS2 Risk Analysis and Information System Security Policy Evidence (Art. 21(2)(a)). Article 21(2)(a) requires documented risk analysis and information security policies. This use case continuously validates that organisational risk posture is tracked, risk treatments are assigned owners, and security policy coverage aligns with critical asset inventory — producing auditable evidence that risk management is an operational process, not a one-time exercise.
search = index=risk sourcetype="stash" earliest=-30d@d \

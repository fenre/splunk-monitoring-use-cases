[ESCS-22.1.29 - GDPR Processor Personal Data Breach Notification SLA (Art. 28(3)(f), Art. 33)]
description = UC-22.1.29: GDPR Processor Personal Data Breach Notification SLA (Art. 28(3)(f), Art. 33). The processor must notify the controller without undue delay after becoming aware of a personal data breach. This use case measures time from processor-reported incident timestamps to internal acknowledgement tickets — ensuring contractual SLA (often 24–72 hours) is met and evidence exists for supervisory authority files.
search = index=itsm sourcetype="snow:incident" category="*Vendor*" OR short_description="*processor*breach*" earliest=-30d \
| lookup gdpr_processor_register.csv vendor_name OUTPUT notification_sla_hours \
| eval reported=strptime(opened_at,"%Y-%m-%d %H:%M:%S") \
| eval acknowledged=strptime(work_start,"%Y-%m-%d %H:%M:%S") \
| eval ack_hours=round((acknowledged-reported)/3600,2) \
| eval sla_hours=coalesce(notification_sla_hours, 24) \
| eval sla_breach=if(ack_hours > sla_hours, 1, 0) \
| where sla_breach=1 OR isnull(acknowledged) \
| table number, vendor_name, opened_at, work_start, ack_hours, sla_hours, sla_breach

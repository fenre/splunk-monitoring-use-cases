description = UC-10.3.270: PowerShell - Connect To Internet With Hidden Window. The following analytic detects PowerShell commands using the WindowStyle parameter to hide the window while connecting to the Internet. This behavior is identified through Endpoint Detection and Response (EDR) telemetry, focusing on command-line executions that include variations of the WindowStyle parameter. This activity is significant because it attempts to bypass default PowerShell execution policies and conceal its actions, which is often indicative of malicious intent. If confirmed malicio…
search = | tstats `security_content_summariesonly` count min(_time) as firstTime max(_time) as lastTime FROM datamodel=Endpoint.Processes \
      WHERE `process_powershell` \
      BY Processes.action Processes.dest Processes.original_file_name \
         Processes.parent_process Processes.parent_process_exec Processes.parent_process_guid \
         Processes.parent_process_id Processes.parent_process_name Processes.parent_process_path \

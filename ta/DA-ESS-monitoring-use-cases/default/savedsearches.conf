description = UC-22.21.25: Regulatory Authority Notification Delivery Confirmation (Art. 73) (EU AI Act). Confirms secure notification channel message_id acknowledged by authority mailbox/API within policy window.
search = index=mail (sourcetype="o365:messaging" OR sourcetype="sendgrid:event") earliest=-30d recipient_domain="*authority*" \
| stats earliest(eval(if(event="queued",_time,null()))) as t_q, \
        earliest(eval(if(event="delivered",_time,null()))) as t_d, \
        earliest(eval(if(match(event,"bounce|dropped"),_time,null()))) as t_fail \

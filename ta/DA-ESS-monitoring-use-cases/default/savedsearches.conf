description = UC-9.7.7: Identity Provider Availability Trending. Identity provider outages block all applications that rely on them; weekly or monthly uptime trends show whether your vendor or network path is degrading over a quarter. That supports SLA discussions, architecture decisions, and communication to the business before users flood the service desk.
search = index=synthetics sourcetype=synthetics:url_probe earliest=-90d@d url IN ("https://login.microsoftonline.com/","https://*.okta.com/oauth2/","https://accounts.google.com/") \
| bin _time span=1d \
| stats count(eval(http_status<500)) as successes, count as probes by _time, url \
| eval daily_uptime_pct=round(100*successes/probes,3) \
| bin _time span=7d aligntime=@w0 \
| stats avg(daily_uptime_pct) as weekly_uptime_pct by _time, url \
| sort _time \
| trendline sma4(weekly_uptime_pct) as uptime_sma \
| predict weekly_uptime_pct as uptime_forecast algorithm=LLP future_timespan=4

[ESCS-10.15.8 - User and Entity Behavior Analytics — Anomalous Process Execution (MLTK)]
description = UC-10.15.8: User and Entity Behavior Analytics — Anomalous Process Execution (MLTK). Establishing per-host baselines of normal process execution and flagging rare or never-before-seen processes catches fileless malware, living-off-the-land binaries (LOLBins), and novel toolkits that signature-based EDR misses.
search = | tstats `security_content_summariesonly` count FROM datamodel=Endpoint.Processes \
    BY _time span=1d, Processes.dest, Processes.process_name, Processes.user \
| `drop_dm_object_name(Processes)` \
| eventstats dc(dest) as host_prevalence by process_name \
| eventstats avg(count) as user_avg stdev(count) as user_std by dest, process_name \
| eval rarity_score=1 - (host_prevalence / max_hosts) \
| eval z_score=round((count - user_avg) / nullif(user_std, 0), 2) \
| where (rarity_score > 0.95 OR z_score > 3) AND count < 5 \
| fit DensityFunction count by dest into process_anomaly_model \
| where isOutlier > 0 \
| lookup asset_lookup dest OUTPUT priority, bunit, category \
| table _time, dest, user, process_name, count, rarity_score, z_score, priority \
| sort -rarity_score
